<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Respiratory Quiz — Learning Objectives 27–52</title>
<style>
  :root {
    --bg: #f5f7fa;
    --surface: #ffffff;
    --border: #e2e8f0;
    --text: #1a202c;
    --muted: #64748b;
    --primary: #1f3a5f;
    --primary-light: #dbeafe;
    --correct: #16a34a;
    --correct-bg: #dcfce7;
    --wrong: #dc2626;
    --wrong-bg: #fee2e2;
    --shadow: 0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.03);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  header {
    background: var(--primary);
    color: white;
    padding: 14px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }
  header h1 {
    margin: 0;
    font-size: 18px;
    font-weight: 600;
  }
  .stats {
    display: flex;
    gap: 20px;
    align-items: center;
    font-size: 14px;
  }
  .stat {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .stat-value {
    font-weight: 600;
    font-size: 16px;
  }
  .progress-bar {
    width: 180px;
    height: 8px;
    background: rgba(255,255,255,0.2);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: #60a5fa;
    transition: width 0.3s ease;
  }
  .reset-btn {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.15s;
  }
  .reset-btn:hover { background: rgba(255,255,255,0.25); }

  .layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    max-width: 1400px;
    margin: 0 auto;
    gap: 0;
    min-height: calc(100vh - 56px);
  }
  nav.sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 16px 0;
    position: sticky;
    top: 56px;
    align-self: start;
    max-height: calc(100vh - 56px);
    overflow-y: auto;
  }
  .sidebar-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    padding: 0 20px 8px;
  }
  .topic-link {
    display: block;
    padding: 10px 20px;
    font-size: 13px;
    color: var(--text);
    text-decoration: none;
    border-left: 3px solid transparent;
    cursor: pointer;
    transition: background 0.15s;
    line-height: 1.3;
  }
  .topic-link:hover { background: var(--primary-light); }
  .topic-link.active {
    background: var(--primary-light);
    border-left-color: var(--primary);
    font-weight: 600;
  }
  .topic-link .num { color: var(--primary); font-weight: 600; margin-right: 6px; }
  .topic-link .count {
    float: right;
    font-size: 11px;
    color: var(--muted);
    background: var(--bg);
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 500;
  }
  .topic-link.complete .count {
    background: var(--correct-bg);
    color: var(--correct);
  }

  main {
    padding: 24px 32px;
    max-width: 900px;
  }
  .topic-header {
    font-size: 22px;
    font-weight: 700;
    color: var(--primary);
    margin: 0 0 4px;
  }
  .topic-subheader {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 24px;
  }
  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 22px;
    margin-bottom: 14px;
    box-shadow: var(--shadow);
  }
  .question-meta {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .question-stem {
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 12px;
    line-height: 1.55;
  }
  .options {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .option {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 14px;
    background: #f8fafc;
    border: 1.5px solid var(--border);
    border-radius: 7px;
    cursor: pointer;
    font-size: 14px;
    text-align: left;
    transition: all 0.12s;
    width: 100%;
    color: var(--text);
    line-height: 1.45;
  }
  .option:hover:not(.locked) {
    background: var(--primary-light);
    border-color: var(--primary);
  }
  .option .letter {
    font-weight: 700;
    color: var(--primary);
    min-width: 20px;
  }
  .option.correct {
    background: var(--correct-bg);
    border-color: var(--correct);
    color: #166534;
  }
  .option.correct .letter { color: var(--correct); }
  .option.wrong {
    background: var(--wrong-bg);
    border-color: var(--wrong);
    color: #991b1b;
  }
  .option.wrong .letter { color: var(--wrong); }
  .option.locked { cursor: default; }
  .option.dim { opacity: 0.55; }
  .feedback {
    margin-top: 12px;
    padding: 10px 14px;
    border-radius: 7px;
    font-size: 13.5px;
    line-height: 1.5;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.correct {
    background: var(--correct-bg);
    color: #14532d;
    border-left: 4px solid var(--correct);
  }
  .feedback.wrong {
    background: var(--wrong-bg);
    color: #7f1d1d;
    border-left: 4px solid var(--wrong);
  }
  .feedback-label {
    font-weight: 700;
    margin-right: 6px;
  }
  .topic-nav {
    display: flex;
    justify-content: space-between;
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }
  .nav-btn {
    padding: 10px 18px;
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: 7px;
    cursor: pointer;
    font-size: 14px;
    color: var(--primary);
    font-weight: 500;
    transition: all 0.15s;
  }
  .nav-btn:hover:not(:disabled) {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
  }
  .nav-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .topic-score {
    background: var(--primary-light);
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 20px;
    font-size: 13px;
    color: var(--primary);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .topic-score-bar {
    flex: 1;
    max-width: 200px;
    height: 6px;
    background: rgba(31,58,95,0.15);
    border-radius: 3px;
    overflow: hidden;
    margin: 0 12px;
  }
  .topic-score-fill {
    height: 100%;
    background: var(--primary);
    transition: width 0.3s;
  }

  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    nav.sidebar {
      position: static;
      max-height: none;
      border-right: none;
      border-bottom: 1px solid var(--border);
    }
    main { padding: 16px; }
    header { padding: 12px 16px; }
    header h1 { font-size: 16px; }
    .stats { font-size: 12px; gap: 12px; }
    .progress-bar { width: 120px; }
  }
</style>
</head>

     ["Angina pectoris", "Cellulitis of the submandibular space (bilateral) that can threaten the airway", "Malignant tumor of the tonsils", "Vasculitis"],

    ["Cat-scratch disease causing cervical lymphadenopathy is most often caused by:",

     1, "Cat-scratch disease is caused by Bartonella henselae, producing subacute regional lymphadenopathy, often with primary skin papule at scratch site."]
  ]],
  [4, "Neoplastic masses of the neck", [

     ["Lipoma", "Squamous cell carcinoma (often metastatic from upper aerodigestive tract)", "Thyroid cyst", "Hemangioma"],
     1, "Metastatic SCC from upper aerodigestive tract sources is the most common malignant neck mass in adults (particularly in smokers/HPV-positive patients)."],

     1, "Pulsatile mass after trauma = concern for vascular injury—pseudoaneurysm or enlarging hematoma; urgent imaging and possible intervention required."],

     ["Abdominal ultrasound", "Contrast-enhanced CT neck", "PET only", "Skull X-ray"],

// ============================================================
// APP LOGIC
// ============================================================
const STORAGE_KEY = "resp_quiz_v1";
let state = loadState();
let currentTopicIdx = 0;

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { answers: {} }; // key: "T_LO_Q" -> { selected: int, correct: bool }
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}
function questionKey(ti, li, qi) {
  return `${ti}_${li}_${qi}`;
}

function countTotalQuestions() {
  let total = 0;
  QUIZ.forEach(t => t[2].forEach(lo => total += lo[2].length));
  return total;
}
const TOTAL_Q = countTotalQuestions();

function countTopicQuestions(topicIdx) {
  return QUIZ[topicIdx][2].reduce((sum, lo) => sum + lo[2].length, 0);
}

function countTopicAnswered(topicIdx) {
  const t = QUIZ[topicIdx];
  const tNum = t[0];
  let answered = 0, correct = 0;
  t[2].forEach((lo, liIdx) => {
    lo[2].forEach((q, qi) => {
      const key = questionKey(tNum, lo[0], qi);
      if (state.answers[key]) {
        answered++;
        if (state.answers[key].correct) correct++;
      }
    });
  });
  return { answered, correct };
}

function updateStats() {
  let answered = 0, correct = 0;
  Object.values(state.answers).forEach(a => {
    answered++;
    if (a.correct) correct++;
  });
  document.getElementById("stat-answered").textContent = `${answered} / ${TOTAL_Q}`;
  const pct = answered === 0 ? 0 : Math.round(correct/answered*100);
  document.getElementById("stat-correct").textContent = `${correct} (${pct}%)`;
  document.getElementById("overall-progress").style.width = (answered/TOTAL_Q*100).toFixed(1)+"%";
}

function renderSidebar() {
  const list = document.getElementById("topic-list");
  list.innerHTML = "";
  QUIZ.forEach((t, i) => {
    const [num, title] = t;
    const total = countTopicQuestions(i);
    const { answered } = countTopicAnswered(i);
    const link = document.createElement("a");
    link.className = "topic-link" + (i === currentTopicIdx ? " active" : "") + (answered === total ? " complete" : "");
    link.innerHTML = `<span class="num">${num}.</span>${title}<span class="count">${answered}/${total}</span>`;
    link.onclick = (e) => { e.preventDefault(); currentTopicIdx = i; render(); window.scrollTo(0,0); };
    list.appendChild(link);
  });
}

function renderMain() {
  const main = document.getElementById("main");
  const t = QUIZ[currentTopicIdx];
  const [tNum, tTitle, los] = t;
  const { answered, correct } = countTopicAnswered(currentTopicIdx);
  const total = countTopicQuestions(currentTopicIdx);
  const pct = answered === 0 ? 0 : Math.round(correct/answered*100);

  let html = `<h2 class="topic-header">Topic ${tNum}. ${tTitle}</h2>
    <div class="topic-subheader">${los.length} learning objective${los.length>1?"s":""} · ${total} questions</div>
    <div class="topic-score">
      <span><strong>${answered}</strong> / ${total} answered</span>
      <div class="topic-score-bar"><div class="topic-score-fill" style="width:${(answered/total*100).toFixed(1)}%"></div></div>
      <span>${correct} correct (${pct}%)</span>
    </div>`;

  los.forEach((lo, liIdx) => {
    const [loNum, loText, qs] = lo;
    html += `<div class="lo-header" style="margin:18px 0 6px;font-size:14px;font-weight:600;color:#334155;">LO ${loNum}. ${escapeHtml(loText)}</div>`;
    qs.forEach((q, qi) => {
      const [stem, opts, correctIdx, explanation] = q;
      const key = questionKey(tNum, loNum, qi);
      const ans = state.answers[key];
      html += `<div class="question-card" data-key="${key}" data-correct="${correctIdx}" data-explanation="${escapeAttr(explanation)}">
        <div class="question-meta">Question ${qi+1}</div>
        <div class="question-stem">${escapeHtml(stem)}</div>
        <div class="options">`;
      opts.forEach((opt, i) => {
        let cls = "option";
        if (ans) {
          cls += " locked";
          if (i === correctIdx) cls += " correct";
          else if (i === ans.selected) cls += " wrong";
          else cls += " dim";
        }
        html += `<button class="${cls}" data-opt="${i}">
          <span class="letter">${String.fromCharCode(65+i)}.</span>
          <span>${escapeHtml(opt)}</span>
        </button>`;
      });
      html += `</div>`;
      if (ans) {
        const isCorrect = ans.selected === correctIdx;
        html += `<div class="feedback ${isCorrect?"correct":"wrong"} show">
          <span class="feedback-label">${isCorrect?"✓ Correct.":"✗ Incorrect."}</span>
          ${escapeHtml(explanation)}
        </div>`;
      } else {
        html += `<div class="feedback"></div>`;
      }
      html += `</div>`;
    });
  });

  html += `<div class="topic-nav">
    <button class="nav-btn" id="prev-btn" ${currentTopicIdx===0?"disabled":""}>← Previous Topic</button>
    <button class="nav-btn" id="next-btn" ${currentTopicIdx===QUIZ.length-1?"disabled":""}>Next Topic →</button>
  </div>`;

  main.innerHTML = html;

  // Bind option clicks
  main.querySelectorAll(".question-card").forEach(card => {
    const key = card.dataset.key;
    if (state.answers[key]) return; // already answered
    card.querySelectorAll(".option").forEach(btn => {
      btn.addEventListener("click", () => answerQuestion(card, btn));
    });
  });

  // Nav buttons
  const pb = document.getElementById("prev-btn");
  const nb = document.getElementById("next-btn");
  if (pb) pb.onclick = () => { if (currentTopicIdx>0) { currentTopicIdx--; render(); window.scrollTo(0,0); } };
  if (nb) nb.onclick = () => { if (currentTopicIdx<QUIZ.length-1) { currentTopicIdx++; render(); window.scrollTo(0,0); } };
}

function answerQuestion(card, btn) {
  const key = card.dataset.key;
  const correctIdx = parseInt(card.dataset.correct);
  const selected = parseInt(btn.dataset.opt);
  const isCorrect = selected === correctIdx;
  state.answers[key] = { selected, correct: isCorrect };
  saveState();

  // Update UI: lock buttons, highlight correct/wrong, show feedback
  const options = card.querySelectorAll(".option");
  options.forEach((opt, i) => {
    opt.classList.add("locked");
    if (i === correctIdx) opt.classList.add("correct");
    else if (i === selected) opt.classList.add("wrong");
    else opt.classList.add("dim");
    // Remove click handlers
    const newOpt = opt.cloneNode(true);
    opt.parentNode.replaceChild(newOpt, opt);
  });
  const fb = card.querySelector(".feedback");
  fb.className = "feedback " + (isCorrect ? "correct" : "wrong") + " show";
  fb.innerHTML = `<span class="feedback-label">${isCorrect?"✓ Correct.":"✗ Incorrect."}</span>` + escapeHtml(card.dataset.explanation);

  updateStats();
  renderSidebar();
}

function render() {
  renderSidebar();
  renderMain();
  updateStats();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s) { return escapeHtml(s); }

document.getElementById("reset-btn").onclick = () => {
  if (confirm("Reset all answers?")) {
    state = { answers: {} };
    saveState();
    render();
  }
};

render();
</script>

</html>
