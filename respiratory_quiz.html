  "L38 · Wheezing":         { bg:"#E1F5EE", border:"#5DCAA5", text:"#085041" },

  "L42 · Cough":            { bg:"#EAF3DE", border:"#97C459", text:"#173404" },
  "L43 · Antihistamines":   { bg:"#FAEEDA", border:"#EF9F27", text:"#633806" },
  "L44 · Nutrition/Resp":   { bg:"#E1F5EE", border:"#5DCAA5", text:"#085041" },
  "L45 · Critical Nutrition":{ bg:"#EEEDFE", border:"#AFA9EC", text:"#3C3489" },
  "L46 · ARDS":             { bg:"#FCEBEB", border:"#F09595", text:"#501313" },
  "L47 · Pulm Embolism":    { bg:"#FBEAF0", border:"#ED93B1", text:"#4B1528" },
  "L48 · Tuberculosis":     { bg:"#FAEEDA", border:"#EF9F27", text:"#633806" },
  "L49 · Dyspnea":          { bg:"#E6F1FB", border:"#85B7EB", text:"#042C53" },
  "L50 · CVS Complications":{ bg:"#EAF3DE", border:"#97C459", text:"#173404" },
  "L51 · Hemoptysis":       { bg:"#FCEBEB", border:"#F09595", text:"#501313" },
  "L52 · Neck Masses":      { bg:"#EEEDFE", border:"#AFA9EC", text:"#3C3489" },
};

const ALL_QUESTIONS = [
{"sec":"L27 · Neuromuscular","lo":"Neuromuscular syndromes","stem":"A 55-year-old man presents with progressive limb weakness and fasciculations. Pulmonary function tests show FVC 62% predicted with a supine drop to 48%, reduced MIP, and preserved FEV1/FVC ratio. Which pattern best describes this?","opts":["A. Obstructive pattern from airway involvement","B. Restrictive pattern from respiratory muscle weakness","C. Mixed obstructive-restrictive disease","D. Normal PFTs with isolated upper airway obstruction"],"answer":"B","exp":"Neuromuscular diseases (like ALS) cause weakness of the respiratory muscles → restrictive pattern: ↓ FVC, ↓ TLC, normal FEV1/FVC ratio. A >25% supine drop in FVC is a classic sign of diaphragm weakness specifically."},
{"sec":"L27 · Neuromuscular","lo":"Neuromuscular syndromes","stem":"A patient with Guillain-Barré syndrome is admitted with progressive respiratory distress. Which intervention is MOST appropriate for nocturnal hypoventilation before frank respiratory failure develops?","opts":["A. Prophylactic tracheostomy","B. Bilevel positive airway pressure (BiPAP)","C. Supplemental oxygen via nasal cannula only","D. Chest physiotherapy alone"],"answer":"B","exp":"BiPAP (non-invasive ventilation) is the first-line treatment for nocturnal hypoventilation in neuromuscular diseases. It supports both inspiratory and expiratory phases, correcting hypercapnia. Oxygen alone does not address the underlying hypoventilation. Tracheostomy is reserved for severe or prolonged cases."},

{"sec":"L28 · Osteopathic","lo":"Osteopathic approach","stem":"Which of the following best explains why parasympathetic stimulation worsens asthma symptoms?","opts":["A. Parasympathetics cause bronchodilation via β2 receptors","B. Parasympathetics increase mucus secretion and cause bronchoconstriction via vagal M3 receptors","C. Parasympathetics decrease mucociliary clearance and cause pulmonary vasoconstriction","D. Parasympathetics stimulate mast cell degranulation directly"],"answer":"B","exp":"The vagus nerve (CN X) activates M3 muscarinic receptors on airway smooth muscle and glands → bronchoconstriction + ↑ mucus secretion. This is why anticholinergics (ipratropium, tiotropium) are used in COPD/asthma — they block this pathway."},
{"sec":"L28 · Osteopathic","lo":"Osteopathic approach","stem":"An osteopathic physician uses thoracic inlet release and the pedal pump technique on a patient with pneumonia. What is the primary physiological rationale for these maneuvers?","opts":["A. Directly killing bacteria in the alveoli","B. Enhancing lymphatic drainage to reduce pulmonary congestion and improve immune cell delivery","C. Increasing tidal volume by stretching the diaphragm","D. Stimulating sympathetic tone to cause bronchodilation"],"answer":"B","exp":"Osteopathic lymphatic pump techniques enhance lymphatic flow, draining interstitial fluid from the lungs, reducing congestion, and facilitating delivery of immune cells to sites of infection. The thoracic duct empties into the left subclavian vein, and these techniques augment flow through this system."},

{"sec":"L29–30 · Imaging","lo":"Chest imaging","stem":"A 68-year-old woman has an acute right middle lobe pneumonia confirmed on CT. On the frontal CXR, which silhouette sign finding would you expect?","opts":["A. Loss of the left heart border","B. Loss of the right hemidiaphragm","C. Loss of the right heart border","D. Loss of the aortic knob contour"],"answer":"C","exp":"The right middle lobe is adjacent to the right heart border. Consolidation in the RML obliterates that interface → loss of the right heart border on PA CXR. Lower lobe pneumonia would instead obliterate the ipsilateral hemidiaphragm."},
{"sec":"L29–30 · Imaging","lo":"Chest imaging","stem":"A 72-year-old man with heart failure has a CXR showing bilateral perihilar 'bat-wing' opacities, Kerley B lines, and upper lobe vascular diversion. Which stage of pulmonary edema is most consistent?","opts":["A. Interstitial edema only","B. Alveolar edema with coexisting interstitial edema","C. Isolated pleural effusions without parenchymal edema","D. Lobar pneumonia superimposed on CHF"],"answer":"B","exp":"Alveolar pulmonary edema presents as bilateral perihilar/bat-wing consolidation. Interstitial edema precedes this and shows Kerley B lines, peribronchial cuffing, and upper lobe vascular diversion. This patient has signs of both stages present simultaneously."},

{"sec":"L31 · Pneumonia","lo":"Community-acquired pneumonia","stem":"A previously healthy 22-year-old college student presents with a 10-day history of gradual onset low-grade fever, dry cough, headache, and myalgias. CXR shows patchy bilateral infiltrates disproportionate to his mild symptoms. What is the most likely causative organism?","opts":["A. Streptococcus pneumoniae","B. Legionella pneumophila","C. Mycoplasma pneumoniae","D. Klebsiella pneumoniae"],"answer":"C","exp":"This is classic atypical ('walking') pneumonia: insidious onset, dry cough, myalgias, headache, and CXR findings worse than clinical appearance. Mycoplasma pneumoniae is the most common cause in young healthy adults. Legionella is also atypical but typically causes more severe illness with GI symptoms."},
{"sec":"L31 · Pneumonia","lo":"Nosocomial pneumonia","stem":"A 78-year-old nursing home resident develops pneumonia 5 days after hospital admission for a hip fracture. Sputum culture grows Pseudomonas aeruginosa. Which empiric antibiotic regimen is MOST appropriate pending sensitivities?","opts":["A. Oral amoxicillin-clavulanate","B. Azithromycin monotherapy","C. Vancomycin + piperacillin-tazobactam","D. Trimethoprim-sulfamethoxazole"],"answer":"C","exp":"This is hospital-acquired pneumonia (HAP — onset ≥48 h after admission). Empiric coverage must include MRSA (vancomycin or linezolid) + an anti-pseudomonal β-lactam (piperacillin-tazobactam, cefepime, or meropenem). Amoxicillin and azithromycin have no meaningful anti-pseudomonal activity."},

{"sec":"L32 · Thoracic Surgery","lo":"Thoracic surgery indications","stem":"A 28-year-old tall, thin male presents with his second episode of spontaneous pneumothorax on the right side within 6 months. What is the most appropriate next step in management?","opts":["A. Repeat observation with serial CXRs","B. Simple aspiration followed by discharge","C. VATS bullectomy and pleurodesis","D. Emergent open thoracotomy"],"answer":"C","exp":"Recurrent ipsilateral spontaneous pneumothorax is a clear indication for surgical intervention. VATS (video-assisted thoracoscopic surgery) bullectomy removes the underlying bullae and pleurodesis prevents recurrence. Simple aspiration is appropriate only for a first-episode small pneumothorax."},
{"sec":"L32 · Thoracic Surgery","lo":"Mediastinal masses","stem":"Which of the following mediastinal masses is correctly paired with its location?","opts":["A. Thymoma — posterior mediastinum","B. Teratoma — superior mediastinum","C. Neurogenic tumor — posterior mediastinum","D. Bronchogenic cyst — anterior mediastinum"],"answer":"C","exp":"The 4 T's of the anterior mediastinum: Thymoma, Teratoma, Thyroid mass, Terrible lymphoma. Neurogenic tumors (schwannoma, neurofibroma, ganglioneuroma) are the most common posterior mediastinal masses. Bronchogenic cysts occur in the middle mediastinum."},

{"sec":"L33 · Nasal & Sinus","lo":"Respiratory allergy","stem":"A 35-year-old with asthma, nasal polyps, and aspirin sensitivity presents with chronic nasal congestion and anosmia. This triad is classically associated with which condition?","opts":["A. Cystic fibrosis","B. Samter's triad (aspirin-exacerbated respiratory disease)","C. Churg-Strauss syndrome","D. Allergic bronchopulmonary aspergillosis"],"answer":"B","exp":"Samter's triad = asthma + nasal polyps + aspirin/NSAID sensitivity (AERD). COX-1 inhibition shifts arachidonic acid metabolism toward leukotrienes, triggering bronchoconstriction and nasal symptoms. Treatment: leukotriene receptor antagonists, nasal steroids, and aspirin desensitization."},
{"sec":"L33 · Nasal & Sinus","lo":"Allergic rhinitis treatment","stem":"A patient with allergic rhinitis requires treatment. Which of the following is considered the most effective first-line pharmacotherapy?","opts":["A. Oral 2nd generation antihistamines (fexofenadine)","B. Intranasal corticosteroids (fluticasone)","C. Leukotriene receptor antagonists (montelukast)","D. Oral decongestants (pseudoephedrine)"],"answer":"B","exp":"Intranasal corticosteroids are the most effective single agent for allergic rhinitis — they reduce all symptom domains (congestion, sneezing, rhinorrhea, itching) by suppressing local eosinophilic inflammation. Antihistamines are adjunctive; montelukast is less effective than intranasal steroids used alone."},

{"sec":"L34 · Airway Emergency","lo":"Failed airway management","stem":"During rapid sequence intubation (RSI) of an adult in the ED, direct laryngoscopy fails after two attempts. The patient cannot be ventilated with a BVM. What is the immediate next step?","opts":["A. Wait for spontaneous respiration to return","B. Attempt nasotracheal intubation","C. Perform an emergency cricothyrotomy","D. Call for a fiberoptic bronchoscope and wait"],"answer":"C","exp":"'Can't intubate, can't oxygenate' (CICO) is a surgical airway emergency. Cricothyrotomy — identify cricothyroid membrane, horizontal stab incision, insert tube or bougie — is the immediate life-saving intervention. Waiting or attempting other delayed measures risks fatal hypoxia."},
{"sec":"L34 · Airway Emergency","lo":"Pediatric airway differences","stem":"When intubating a 2-year-old child, which approach differs from adult intubation technique?","opts":["A. Use a curved (Macintosh) blade placed in the vallecula","B. A cuffed ETT should always be used to prevent air leak","C. An uncuffed ETT sized by the age/4 + 4 formula is preferred with a straight (Miller) blade","D. Strong neck extension is required; neutral position is contraindicated"],"answer":"C","exp":"In children <8 years: uncuffed ETT preferred (cricoid ring provides a natural seal); tube size = age/4 + 4; Miller (straight) blade preferred in infants to directly lift the floppy epiglottis. Neutral or slight sniffing position is used — the large occiput naturally flexes the neck and hyperextension is not needed."},

{"sec":"L35 · Pulm Rehab","lo":"Pulmonary rehabilitation outcomes","stem":"A 65-year-old with severe COPD (FEV1 35% predicted) completes a 12-week pulmonary rehab program. Which outcome is BEST supported by evidence?","opts":["A. Significant improvement in FEV1 and reversal of airflow obstruction","B. Improved exercise tolerance, reduced dyspnea, and improved quality of life","C. Complete resolution of exertional desaturation","D. Reduction in all-cause mortality by more than 50%"],"answer":"B","exp":"Pulmonary rehabilitation does NOT improve FEV1 or reverse airway obstruction. Evidence strongly supports improvements in: exercise capacity (6MWT, peak VO2), dyspnea (Borg scale, MRC scale), and health-related QOL (SGRQ). It also reduces hospitalizations. Mortality benefit is more modest and less consistent."},
{"sec":"L35 · Pulm Rehab","lo":"Exercise training mechanisms","stem":"Which mechanism best explains why endurance exercise training reduces dyspnea in COPD patients at the same workload?","opts":["A. Dilation of bronchi due to β2-adrenergic stimulation during exercise","B. Reduced lactic acidosis from improved peripheral muscle oxygen utilization, decreasing ventilatory drive","C. Recruitment of accessory respiratory muscles increasing tidal volume","D. Reduction in airway hyperresponsiveness through anti-inflammatory cytokines"],"answer":"B","exp":"Training improves peripheral muscle efficiency → same workload produces less lactic acid → less CO2 generated from bicarbonate buffering of lactate → lower ventilatory demand → less dyspnea. Patients can exercise at higher workloads with less breathlessness after rehab, even without any change in FEV1."},

{"sec":"L36 · Lung Tumors","lo":"Lung cancer complications","stem":"A 58-year-old smoker presents with hemoptysis, facial swelling, and distended neck veins. CT shows a large central mass with mediastinal involvement. Which lung cancer type and complication is most consistent?","opts":["A. Peripheral adenocarcinoma causing SIADH","B. Central squamous cell carcinoma causing SVC syndrome","C. Carcinoid tumor causing carcinoid syndrome","D. Small cell carcinoma causing Lambert-Eaton syndrome"],"answer":"B","exp":"SVC syndrome (facial/neck swelling, JVD, arm swelling) results from compression or invasion of the SVC — most commonly by a central lung tumor. Squamous cell carcinoma is a central tumor strongly associated with smoking. SVC syndrome is a clinical emergency requiring urgent CT and stenting or radiation."},
{"sec":"L36 · Lung Tumors","lo":"Targeted lung cancer therapy","stem":"A 45-year-old non-smoking woman has a peripheral lung adenocarcinoma with an EGFR exon 19 deletion. Which treatment is preferred over platinum-based chemotherapy as first-line therapy?","opts":["A. Pembrolizumab (anti-PD-1 immunotherapy)","B. Osimertinib (3rd generation EGFR tyrosine kinase inhibitor)","C. Carboplatin + paclitaxel chemotherapy","D. Surgical resection alone regardless of stage"],"answer":"B","exp":"EGFR-mutated NSCLC: osimertinib (3rd-gen EGFR-TKI) is the preferred 1st-line agent for exon 19 deletions or L858R mutations (FLAURA trial). TKIs produce superior progression-free and overall survival vs. chemotherapy in EGFR+ disease. PD-L1 expression guides immunotherapy, which is less effective in EGFR-mutant tumors."},

{"sec":"L37 · Carcinoid/Pleural","lo":"Carcinoid syndrome","stem":"A 42-year-old has episodic facial flushing, watery diarrhea, and wheezing. Urinary 5-HIAA is elevated. Imaging shows a right-sided bronchial mass with liver metastases. What is the diagnosis and mechanism?","opts":["A. Malignant mesothelioma releasing mesothelin","B. Bronchial carcinoid with carcinoid syndrome due to hepatic metastases releasing serotonin into systemic circulation","C. Pulmonary adenocarcinoma releasing PTHrP causing hypercalcemia","D. SCLC releasing ACTH causing Cushing syndrome"],"answer":"B","exp":"Carcinoid syndrome (flushing, diarrhea, bronchospasm, right-sided valvular disease) requires liver metastases because the liver normally inactivates serotonin. With hepatic mets, serotonin bypasses first-pass metabolism and reaches systemic circulation. Elevated urinary 5-HIAA (serotonin metabolite) is diagnostic."},
{"sec":"L37 · Carcinoid/Pleural","lo":"Malignant mesothelioma","stem":"A shipyard worker with 40 years of asbestos exposure develops progressive dyspnea and unilateral chest pain. Thoracoscopic biopsy shows calretinin+, CK5/6+, CEA– cells. What is the diagnosis?","opts":["A. Metastatic adenocarcinoma from a pulmonary primary","B. Malignant pleural mesothelioma, epithelioid type","C. Pleural involvement by lymphoma","D. Benign solitary fibrous tumor of the pleura"],"answer":"B","exp":"Malignant mesothelioma is strongly associated with asbestos (20–40 yr latency). IHC profile — positive: calretinin, WT-1, CK5/6, D2-40; negative: CEA, TTF-1, CD15. This IHC pattern distinguishes it from adenocarcinoma. Epithelioid subtype has the best prognosis. Treated with cisplatin + pemetrexed ± surgery."},

{"sec":"L38 · Wheezing","lo":"Severe asthma management","stem":"A 7-year-old presents to the ED with acute wheezing, RR 32, O2 sat 90%, using accessory muscles and unable to speak in full sentences. He is given albuterol nebs × 3 with minimal improvement. What is the next most appropriate step?","opts":["A. Discharge with an oral prednisolone prescription","B. Add IV magnesium sulfate and systemic corticosteroids; consider PICU transfer","C. Perform bronchoscopy to rule out foreign body","D. Initiate BiPAP for respiratory support only"],"answer":"B","exp":"This is a severe asthma exacerbation (O2 sat <92%, accessory muscle use, poor SABA response). Management: IV methylprednisolone (systemic steroids), continuous albuterol, ipratropium, IV magnesium sulfate (bronchodilator via Ca2+ antagonism), and PICU transfer. Magnesium is indicated when standard bronchodilators fail."},
{"sec":"L38 · Wheezing","lo":"Wheezing differential diagnosis","stem":"A 30-year-old nurse has recurrent wheezing and inspiratory stridor at work that resolves spontaneously. Pulmonary function tests are normal at baseline. Spirometry during an episode shows a truncated inspiratory loop. What is the most likely diagnosis?","opts":["A. Occupational asthma","B. Vocal cord dysfunction (paradoxical vocal fold motion)","C. Tracheal stenosis","D. Exercise-induced bronchospasm"],"answer":"B","exp":"Vocal cord dysfunction (VCD): paradoxical adduction of vocal cords during inspiration → inspiratory stridor/wheeze, episodic, often work-triggered, normal PFTs at baseline, flat/truncated inspiratory loop on flow-volume curve during episodes. Key distinguisher: responds to speech therapy and breathing retraining, NOT bronchodilators."},

{"sec":"L39 · Ear Disease","lo":"Malignant otitis externa","stem":"A 68-year-old diabetic man presents with severe right ear pain, purulent discharge, and facial nerve palsy. CT shows erosion of the temporal bone. What is the most likely diagnosis and causative organism?","opts":["A. Acute otitis media caused by Streptococcus pneumoniae","B. Malignant (necrotizing) otitis externa caused by Pseudomonas aeruginosa","C. Cholesteatoma with secondary infection","D. Herpes zoster oticus (Ramsay Hunt syndrome)"],"answer":"B","exp":"Malignant otitis externa is caused by Pseudomonas aeruginosa in diabetics and immunocompromised patients. It extends beyond the EAC → osteomyelitis of the skull base → cranial nerve palsies (CN VII most common). Treatment: IV antipseudomonal antibiotics (ciprofloxacin or piperacillin-tazobactam) ± surgical debridement."},
{"sec":"L39 · Ear Disease","lo":"Otitis media with effusion","stem":"A 4-year-old has persistent bilateral ear pain and hearing loss for 3 months. Otoscopy shows dull, retracted tympanic membranes with decreased mobility bilaterally. What is the recommended management?","opts":["A. Immediate mastoidectomy","B. Watchful waiting for 3 months, then tympanostomy tubes if no resolution with hearing loss","C. Oral amoxicillin-clavulanate for 14 days","D. IV vancomycin and hospital admission"],"answer":"B","exp":"Otitis media with effusion ('glue ear'): fluid in the middle ear without signs of acute infection. If bilateral and present >3 months with associated hearing loss, tympanostomy tube insertion is indicated after an initial observation period. Antibiotics are not indicated for OME — it is not an infectious process."},

{"sec":"L40–41 · Nodules/CA","lo":"Pulmonary nodule evaluation","stem":"A 62-year-old ex-smoker has an 11mm pulmonary nodule found incidentally on CT. It has a spiculated margin, upper lobe location, and no prior comparison imaging. What is the appropriate next step per Fleischner Society guidelines?","opts":["A. Repeat CT in 12 months","B. PET-CT scan and/or tissue biopsy","C. Observation with no follow-up needed","D. Immediate surgical resection without further workup"],"answer":"B","exp":"Nodules >8 mm with high-risk features (spiculation, upper lobe, smoking history): PET-CT to assess metabolic activity and/or CT-guided biopsy are indicated. PET-CT SUV >2.5 is suspicious for malignancy. VATS resection follows if malignancy is confirmed. Small, low-risk nodules (<6 mm) need no immediate follow-up."},
{"sec":"L40–41 · Nodules/CA","lo":"SCLC staging","stem":"A 70-year-old smoker has a central right hilar mass. Biopsy shows 'oat cell' morphology. What staging workup is critical before treatment planning?","opts":["A. Right heart catheterization to assess surgical risk","B. CT chest/abdomen/pelvis, PET-CT, and brain MRI to define limited vs. extensive stage","C. Pulmonary function tests to determine if lobectomy is feasible","D. Bone scan only, as SCLC rarely metastasizes to the brain"],"answer":"B","exp":"SCLC requires urgent staging. It is classified as limited (one hemithorax, can fit in an RT field) vs. extensive. Brain MRI is essential — SCLC metastasizes to the brain in ~20% at diagnosis. PET-CT detects distant mets. This staging determines treatment: chemoradiation (limited) or chemotherapy ± immunotherapy (extensive). Surgery has no role in SCLC."},

{"sec":"L42 · Cough","lo":"ACE inhibitor cough","stem":"A 45-year-old woman on lisinopril for hypertension develops a persistent dry cough for 6 weeks. Spirometry, CXR, and chest exam are all normal. What is the most appropriate initial management?","opts":["A. Add an inhaled corticosteroid empirically for asthma","B. Switch lisinopril to an ARB (e.g., losartan)","C. Prescribe a proton pump inhibitor for presumed GERD","D. Refer immediately for bronchoscopy"],"answer":"B","exp":"ACE inhibitor cough is a class effect occurring in 5–20% of patients (higher in Asian populations). It is caused by bradykinin/substance P accumulation in the airways (ACE normally degrades these). Cough resolves within 1–4 weeks of stopping the ACE-I. ARBs do not inhibit ACE and are not associated with this side effect."},
{"sec":"L42 · Cough","lo":"Chronic cough causes","stem":"The 'anatomic diagnostic protocol' identifies three conditions responsible for over 90% of chronic cough cases. Which triad is correct?","opts":["A. COPD, lung cancer, and pulmonary fibrosis","B. Upper airway cough syndrome (UACS), asthma, and GERD","C. Bronchiectasis, heart failure, and tuberculosis","D. ACE inhibitor use, sarcoidosis, and acute bronchitis"],"answer":"B","exp":"The classic triad causing chronic cough (>8 weeks): (1) Upper airway cough syndrome (UACS/post-nasal drip) — #1 cause; (2) Asthma — #2; (3) GERD — #3. Sequential empirical treatment targeting these three conditions resolves cough in >90% of non-smokers with a normal CXR not on an ACE inhibitor."},

{"sec":"L43 · Antihistamines","lo":"1st generation antihistamine toxicity","stem":"A 72-year-old man with BPH and glaucoma presents confused with urinary retention and a heart rate of 118 after taking his grandson's diphenhydramine. Which pharmacological property explains these findings?","opts":["A. H2 receptor blockade causing increased gastric pH","B. Anticholinergic (antimuscarinic) effects of 1st generation H1 blockers","C. Direct α1-adrenergic receptor agonism","D. Inhibition of dopamine reuptake in the CNS"],"answer":"B","exp":"1st-generation antihistamines (diphenhydramine, hydroxyzine, promethazine) are lipophilic → cross the BBB → CNS sedation/confusion. They also block muscarinic (M) receptors → anticholinergic toxidrome: tachycardia, urinary retention, constipation, dry mouth, blurred vision. Contraindicated in BPH and closed-angle glaucoma."},
{"sec":"L43 · Antihistamines","lo":"Histamine receptor signaling","stem":"H1, H2, H3, and H4 receptors are coupled to different G-proteins. Which receptor–signaling pair is CORRECTLY matched?","opts":["A. H1 — Gi → ↓ cAMP → sedation","B. H2 — Gq → ↑ IP3/DAG → bronchoconstriction","C. H3 — Gi → ↓ presynaptic neurotransmitter release","D. H4 — Gs → ↑ cAMP → eosinophil chemotaxis"],"answer":"C","exp":"H1 (Gq/PLC/IP3 → ↑Ca2+): bronchoconstriction, pruritus, vascular permeability. H2 (Gs/↑cAMP): gastric acid secretion, ↑HR. H3 (Gi/↓cAMP): presynaptic autoreceptor — ↓ histamine and other NT release in CNS/PNS. H4 (Gi/↓cAMP): immune cell chemotaxis. H3 coupled to Gi causing decreased neurotransmitter release is the correct pairing."},

{"sec":"L44 · Nutrition/Resp","lo":"COPD and nutrition","stem":"A 55-year-old male with severe COPD (FEV1 28%) and BMI of 17 is admitted for an exacerbation. Which nutritional intervention is most appropriate to minimize hypercapnia while maximizing caloric intake?","opts":["A. High-carbohydrate diet to spare protein catabolism","B. High-fat, low-carbohydrate diet to reduce CO2 production","C. High-protein, high-fluid intake to improve mucociliary clearance","D. Total parenteral nutrition to bypass the gut and maximize absorption"],"answer":"B","exp":"Carbohydrate metabolism produces more CO2 per O2 consumed (respiratory quotient RQ = 1.0) versus fat (RQ = 0.7). In hypercapnic COPD patients, a high-fat/low-carb diet reduces CO2 production and ventilatory demand. Small frequent meals prevent early satiety from diaphragmatic flattening. Enteral route is preferred over parenteral when the gut is functional."},
{"sec":"L44 · Nutrition/Resp","lo":"Obesity and COVID-19","stem":"Which mechanism best explains why obesity is an independent risk factor for severe COVID-19?","opts":["A. Obesity causes structural lung destruction similar to emphysema","B. Adipose tissue expresses high ACE2 levels serving as a viral reservoir, and adipokines potentiate cytokine storm","C. Obese patients have higher neutralizing antibodies that paradoxically worsen inflammation","D. Obesity increases PaCO2 at baseline, impairing the hypercapnic ventilatory response"],"answer":"B","exp":"In obesity: ↑ ACE2 receptor expression in adipose tissue → larger viral reservoir; ↑ leptin (pro-inflammatory), ↓ adiponectin (anti-inflammatory) → baseline inflammatory state; ↑ pro-inflammatory cytokines (TNF-α, IL-6) potentiate cytokine storm; and ↓ FRC from mechanical disadvantage. All contribute to severe COVID-19 outcomes."},

{"sec":"L45 · Critical Nutrition","lo":"Refeeding syndrome","stem":"An ICU patient on day 10 of mechanical ventilation was severely malnourished on admission. Enteral feeding is started at full rate. Six hours later: K+ 2.8 mEq/L, PO4 0.7 mg/dL, Mg 0.6 mg/dL. What is the most likely diagnosis?","opts":["A. Acute kidney injury from contrast nephropathy","B. Refeeding syndrome","C. Diabetic ketoacidosis","D. Syndrome of inappropriate ADH secretion (SIADH)"],"answer":"B","exp":"Refeeding syndrome: rapid reintroduction of carbohydrates in a starved patient → insulin surge → intracellular shift of K+, PO4, Mg → hypophosphatemia, hypokalemia, hypomagnesemia. Can cause respiratory failure, cardiac arrhythmias, and Wernicke encephalopathy. Prevention: start feeds slowly, supplement electrolytes and thiamine before and during refeeding."},
{"sec":"L45 · Critical Nutrition","lo":"Enteral vs parenteral nutrition","stem":"In a mechanically ventilated ICU patient with a functional GI tract, what is the preferred route of nutrition and ideal timing of initiation?","opts":["A. Parenteral nutrition started within 6 hours of ICU admission","B. Enteral nutrition started within 24–48 hours of ICU admission","C. Withhold all nutrition for 72 hours to prevent aspiration","D. Oral diet as tolerated regardless of sedation level"],"answer":"B","exp":"Early enteral nutrition (within 24–48 h) in critically ill patients with a functional GI tract: maintains gut barrier integrity (↓ bacterial translocation), modulates immune response, is cheaper, and has fewer complications than TPN. Parenteral nutrition is reserved for when EN is contraindicated or not tolerated after 7 days."},

{"sec":"L46 · ARDS","lo":"Lung-protective ventilation","stem":"A 38-year-old with septic shock develops worsening hypoxemia. Current vent settings: FiO2 1.0, PEEP 14, TV 500 mL (predicted BW 70 kg). ABG: pH 7.28, PaO2 58, PaCO2 52. P/F ratio = 58. What immediate vent adjustment is most evidence-based?","opts":["A. Increase TV to 700 mL to correct hypercapnia","B. Reduce TV to 420 mL (6 mL/kg IBW) and ensure plateau pressure <30 cmH2O","C. Add nebulized corticosteroids to reduce alveolar inflammation","D. Perform emergency bronchoscopy to suction secretions"],"answer":"B","exp":"Lung-protective ventilation (ARDSnet protocol): TV 6 mL/kg ideal body weight, plateau pressure <30 cmH2O. The current TV of 500 mL / 70 kg = 7.1 mL/kg — too high. High TV causes volutrauma and barotrauma, worsening ARDS. Permissive hypercapnia is acceptable. Prone positioning should also be considered for severe ARDS (P/F <150)."},
{"sec":"L46 · ARDS","lo":"Berlin ARDS classification","stem":"The 2012 Berlin definition reclassified ARDS into three severity categories. A patient with bilateral infiltrates, PEEP ≥5, no cardiac origin, and PaO2/FiO2 of 165 falls into which category?","opts":["A. Mild ARDS (P/F 201–300)","B. Moderate ARDS (P/F 101–200)","C. Severe ARDS (P/F ≤100)","D. Acute lung injury (ALI) — this term is still in use"],"answer":"B","exp":"Berlin 2012 classification: Mild ARDS = P/F 201–300; Moderate = P/F 101–200; Severe = P/F ≤100. A P/F of 165 = moderate ARDS. The Berlin definition eliminated the term 'ALI' (previously defined as P/F ≤300) and replaced it with the mild ARDS category. All categories require bilateral opacities, PEEP ≥5, onset within 1 week, and non-cardiogenic origin."},

{"sec":"L47 · Pulm Embolism","lo":"PE diagnosis","stem":"A 54-year-old woman, 3 weeks post-total hip replacement, presents with sudden dyspnea, pleuritic chest pain, and O2 sat 88%. HR 118, BP 110/72. ECG shows new S1Q3T3. D-dimer is 4,200 ng/mL. What is the MOST appropriate next diagnostic step?","opts":["A. Ventilation-perfusion (V/Q) scan","B. CT pulmonary angiography (CTPA)","C. Echocardiography alone","D. Repeat D-dimer in 6 hours"],"answer":"B","exp":"High clinical probability of PE (post-surgical immobility + acute dyspnea + tachycardia + pleuritic pain + ↑D-dimer + S1Q3T3). CTPA is the gold standard — it directly visualizes filling defects in pulmonary arteries with high sensitivity and specificity. V/Q scan is used when contrast is contraindicated (CKD, contrast allergy). Echo is used in hemodynamically unstable patients to guide thrombolysis decisions."},
{"sec":"L47 · Pulm Embolism","lo":"Massive PE treatment","stem":"A 60-year-old with massive PE presents with BP 80/50 despite fluids, HR 130, and O2 sat 82% on 15L O2. Echo shows a severely dilated RV with McConnell sign. There are no contraindications to thrombolysis. What is the most appropriate definitive treatment?","opts":["A. Anticoagulation with LMWH alone","B. Systemic thrombolysis with IV alteplase (tPA)","C. IVC filter placement","D. Oral anticoagulation with rivaroxaban alone"],"answer":"B","exp":"Massive/high-risk PE = hemodynamic instability (SBP <90 mmHg or drop >40 mmHg). Systemic thrombolysis with IV alteplase (100 mg over 2 h) is indicated when there are no contraindications. It rapidly dissolves clot, restores RV function, and reverses shock. Anticoagulation alone is insufficient for massive PE. IVC filter is used only when anticoagulation is contraindicated."},

{"sec":"L48 · Tuberculosis","lo":"Latent TB","stem":"A 28-year-old Somali refugee (BCG-vaccinated as a child) has a positive QuantiFERON-TB Gold. CXR shows a calcified right upper lobe granuloma. He is asymptomatic and sputum has no AFB. What is the diagnosis and recommended treatment?","opts":["A. Active pulmonary TB — start RIPE therapy immediately","B. Latent TB infection (LTBI) — treat with isoniazid × 9 months or rifampin × 4 months","C. Sarcoidosis — no treatment needed","D. NTM infection — treat with azithromycin + ethambutol"],"answer":"B","exp":"LTBI = positive IGRA (or TST) + no symptoms of active disease + normal or quiescent CXR. IGRA (QuantiFERON) is preferred over TST in BCG-vaccinated individuals because BCG causes false-positive TST reactions. Treatment: isoniazid × 9 months (add pyridoxine B6) or rifampin × 4 months. Active TB requires full 6-month RIPE regimen."},
{"sec":"L48 · Tuberculosis","lo":"NTM in immunosuppressed","stem":"A patient with AIDS (CD4 count 35 cells/μL) develops fevers, night sweats, 20 lb weight loss, and diarrhea for 2 months. Blood cultures grow acid-fast bacilli resistant to standard TB drugs. What is the most likely pathogen and treatment?","opts":["A. M. tuberculosis — treat with RIPE therapy","B. Mycobacterium avium complex (MAC) — treat with azithromycin + ethambutol","C. M. kansasii — treat with rifampin + INH + ethambutol","D. M. abscessus — treat with amikacin + imipenem"],"answer":"B","exp":"Disseminated MAC is the most common NTM infection in AIDS with CD4 <50 cells/μL. Presents with constitutional symptoms, hepatosplenomegaly, and diarrhea. Treatment: azithromycin + ethambutol (± rifabutin). Weekly azithromycin prophylaxis is recommended once CD4 <50. MAC is intrinsically resistant to most standard TB drugs."},

{"sec":"L49 · Dyspnea","lo":"Heart failure vs other dyspnea","stem":"A 55-year-old woman reports 2-month exertional dyspnea worse when lying flat and awakening her at night. Exam shows JVD, bilateral basilar crackles, an S3 gallop, and bilateral pitting ankle edema. BNP is 1,450 pg/mL. What is the most likely diagnosis?","opts":["A. Exacerbation of COPD","B. Decompensated heart failure (acute pulmonary edema)","C. Bilateral pleural effusions from malignancy","D. Pulmonary arterial hypertension"],"answer":"B","exp":"Classic decompensated HF: orthopnea, PND, JVD, S3 gallop, bilateral crackles, pitting edema, and ↑BNP (>400 pg/mL is highly suggestive of HF). BNP is released by ventricular myocytes under wall stress. Orthopnea and PND result from fluid redistribution to the lungs when supine, worsening pulmonary edema."},
{"sec":"L49 · Dyspnea","lo":"Undifferentiated dyspnea workup","stem":"A 40-year-old triathlete presents with 3-month exertional dyspnea. Resting O2 sat, spirometry, and CXR are all normal. What test would BEST differentiate between cardiac, pulmonary, deconditioning, or psychogenic causes?","opts":["A. Resting echocardiogram","B. Cardiopulmonary exercise test (CPET)","C. High-resolution CT chest","D. Bronchial provocation (methacholine challenge) test"],"answer":"B","exp":"CPET (cardiopulmonary exercise test) is the gold standard for undifferentiated dyspnea. It simultaneously measures cardiac (peak VO2, HR reserve), pulmonary (VE/VCO2, O2 sat during exercise), and metabolic (anaerobic threshold) responses to graded exercise, identifying the limiting organ system. Resting tests frequently miss exercise-induced abnormalities."},

{"sec":"L50 · CVS Complications","lo":"Cor pulmonale pathophysiology","stem":"A 68-year-old with severe COPD (FEV1 28%, chronic hypoxemia on home O2) develops worsening dyspnea, lower extremity edema, and RV enlargement on echo with RVSP 52 mmHg. What is the pathophysiological mechanism?","opts":["A. LV hypertrophy from systemic hypertension causing backward failure into the pulmonary circulation","B. Chronic hypoxia → hypoxic pulmonary vasoconstriction → pulmonary vascular remodeling → pulmonary hypertension → cor pulmonale","C. Direct toxic effect of inhaled medications on the RV myocardium","D. Pericardial effusion from chronic lung inflammation compressing the RV"],"answer":"B","exp":"Cor pulmonale: RV failure secondary to pulmonary hypertension caused by lung disease. Mechanism: chronic hypoxia → hypoxic pulmonary vasoconstriction (acute) → vascular smooth muscle hypertrophy and remodeling (chronic) → fixed ↑ PVR → RV pressure overload → RV dilation/failure. Long-term O2 therapy (if PaO2 <55 mmHg) attenuates HPV and is the only intervention proven to slow progression."},
{"sec":"L50 · CVS Complications","lo":"Beta-blockers in COPD","stem":"A patient with cor pulmonale secondary to COPD needs beta-blocker therapy for new-onset atrial fibrillation. Which beta-blocker is most appropriate?","opts":["A. Propranolol (non-selective β1+β2 blocker)","B. Carvedilol (non-selective α1+β1+β2 blocker)","C. Metoprolol succinate (selective β1 blocker — preferred in COPD)","D. All beta-blockers are absolutely contraindicated in COPD"],"answer":"C","exp":"Selective β1 blockers (metoprolol, bisoprolol, atenolol) are preferred in COPD — they have minimal β2 blockade at therapeutic doses and do not significantly worsen bronchoconstriction. Carvedilol is non-selective but used in HF patients with COPD. Propranolol (non-selective) should be avoided. Beta-blockers are NOT absolutely contraindicated in COPD — evidence shows they reduce cardiovascular mortality."},

{"sec":"L51 · Hemoptysis","lo":"Hemoptysis airway management","stem":"A 65-year-old with a 40-pack-year smoking history presents with frank hemoptysis (~60 mL × 3 episodes over 2 days). CXR shows a right hilar mass. What is the MOST important initial management priority?","opts":["A. Immediately start IV anticoagulation for presumed PE","B. Protect the airway — position the patient with the bleeding lung side DOWN and arrange urgent bronchoscopy","C. Administer IV tranexamic acid before any imaging","D. Order a V/Q scan to confirm PE as the cause"],"answer":"B","exp":"Airway protection is the top priority in hemoptysis. The patient is positioned with the bleeding lung DEPENDENT (down) to prevent aspiration of blood into the unaffected contralateral lung — asphyxiation from blood aspiration is the primary cause of death in massive hemoptysis. Urgent bronchoscopy localizes the source and allows therapeutic intervention."},
{"sec":"L51 · Hemoptysis","lo":"Massive hemoptysis treatment","stem":"After stabilizing a patient with massive hemoptysis (>600 mL/24 h) from bronchiectasis, what is the most effective definitive intervention to stop the bleeding?","opts":["A. Systemic corticosteroids to reduce airway inflammation","B. Bronchial artery embolization (BAE)","C. Emergent pneumonectomy as first-line treatment","D. Intravenous aminocaproic acid (antifibrinolytic)"],"answer":"B","exp":"Bronchial artery embolization (BAE) is the definitive treatment for massive hemoptysis — achieving hemostasis in ~90% of cases with low morbidity. It is preferred over surgery as first-line. Surgery (lobectomy/pneumonectomy) is reserved for BAE failure, inaccessible vessels, or focal resectable disease. Bronchoscopy is performed first for localization and tamponade."},

{"sec":"L52 · Neck Masses","lo":"Congenital neck masses","stem":"A 3-year-old boy presents with a painless midline neck mass that moves superiorly when he protrudes his tongue. The mass has been present since birth. What is the most likely diagnosis?","opts":["A. Branchial cleft cyst","B. Thyroglossal duct cyst","C. Cystic hygroma","D. Reactive lymph node"],"answer":"B","exp":"Thyroglossal duct cyst: a remnant of the thyroglossal duct (the thyroid's embryological descent from the foramen cecum). Classic features: midline or paramedian position, moves superiorly with tongue protrusion AND swallowing (attached to hyoid bone), typically presents in children. Treatment: Sistrunk procedure (excision of cyst + tract + middle third of hyoid bone) to prevent recurrence."},
{"sec":"L52 · Neck Masses","lo":"Neck mass evaluation","stem":"A 58-year-old non-smoker presents with a painless, firm, rubbery right neck mass for 6 weeks, night sweats, and 15 lb weight loss. CXR shows mediastinal widening. FNA is non-diagnostic. What is the next best step?","opts":["A. Repeat FNA with a larger gauge needle","B. Excisional lymph node biopsy to allow full architecture assessment for lymphoma","C. CT-guided core needle biopsy of the mediastinal mass only","D. Empiric antibiotics for presumed reactive lymphadenopathy"],"answer":"B","exp":"Lymphoma (B symptoms: fever, night sweats, weight loss; rubbery non-tender nodes; mediastinal mass) requires excisional biopsy because FNA is insufficient — lymphoma diagnosis requires intact nodal architecture to determine subtype (Hodgkin vs. NHL subtype). Core needle biopsy may be used in some centers but excisional biopsy remains the gold standard."},
];

const SECTIONS = ["All","L27 · Neuromuscular","L28 · Osteopathic","L29–30 · Imaging","L31 · Pneumonia","L32 · Thoracic Surgery","L33 · Nasal & Sinus","L34 · Airway Emergency","L35 · Pulm Rehab","L36 · Lung Tumors","L37 · Carcinoid/Pleural","L38 · Wheezing","L39 · Ear Disease","L40–41 · Nodules/CA","L42 · Cough","L43 · Antihistamines","L44 · Nutrition/Resp","L45 · Critical Nutrition","L46 · ARDS","L47 · Pulm Embolism","L48 · Tuberculosis","L49 · Dyspnea","L50 · CVS Complications","L51 · Hemoptysis","L52 · Neck Masses"];

let qs = [...ALL_QUESTIONS];
let currentIdx = 0;
let answered = new Array(qs.length).fill(null);
let filterSec = "All";

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}
shuffle(qs);

function getFiltered() {
  if (filterSec === "All") return qs;
  return qs.filter(q => q.sec === filterSec);
}

function render() {
  const filtered = getFiltered();
  if (filtered.length === 0) { return; }
  const q = filtered[currentIdx];
  const qOrigIdx = qs.indexOf(q);
  const ans = answered[qOrigIdx];
  const col = SECTION_COLORS[q.sec] || { bg:"#F1EFE8", border:"#B4B2A9", text:"#2C2C2A" };
  const answered_count = answered.filter(a => a !== null).length;
  const correct_count = qs.filter((q, i) => answered[i] && answered[i] === q.answer).length;

  document.getElementById("quiz-main").innerHTML = `
    <div class="header">
      <h2>Respiratory System Practice Quiz</h2>
      <p>${ALL_QUESTIONS.length} questions &nbsp;·&nbsp; ${answered_count} answered &nbsp;·&nbsp; ${correct_count} correct</p>
      <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${answered_count / qs.length * 100}%"></div></div>
      <div class="progress-label"><span>${answered_count} / ${qs.length} answered</span><span>${Math.round(answered_count / qs.length * 100)}%</span></div>
    </div>

    <div class="filter-row">
      <span class="filter-label">Lecture:</span>
      ${SECTIONS.map(s => `<button class="filter-btn${filterSec === s ? ' active' : ''}" onclick="setFilter('${s.replace(/'/g,"\\'")}')">
        ${s === "All" ? "All lectures" : s}
      </button>`).join("")}
      <span class="q-counter">Q ${currentIdx + 1} / ${filtered.length}</span>
    </div>

    <div class="q-card">
      <div class="lo-tag">
        <span style="display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;background:${col.bg};color:${col.text};border:0.5px solid ${col.border}">${q.sec}</span>
        &nbsp;<span style="color:var(--color-text-tertiary)">${q.lo}</span>
      </div>
      <div class="q-stem">${q.stem}</div>
      <div class="opts">
        ${q.opts.map(opt => {
          const letter = opt[0];
          let cls = "opt-btn";
          if (ans) {
            if (letter === q.answer) cls += " correct";
            else if (letter === ans && letter !== q.answer) cls += " wrong";
          }
          return `<button class="${cls}" ${ans ? "disabled" : ""} onclick="selectAnswer('${letter}', ${qOrigIdx})">${opt}</button>`;
        }).join("")}
      </div>
      <div class="explanation ${ans ? 'show' : ''}">
        <strong>Explanation:</strong> ${q.exp}
      </div>
    </div>

    <div class="nav-row">
      <button class="btn-nav" onclick="prev()" ${currentIdx === 0 ? 'disabled' : ''}>← Previous</button>
      <button class="btn-nav" onclick="next()" ${currentIdx >= filtered.length - 1 ? 'disabled' : ''}>Next →</button>
      <button class="btn-nav" onclick="jumpRandom()">Random question</button>
      <button class="btn-nav primary" onclick="showScore()">See results ↗</button>
    </div>
  `;
}

function selectAnswer(letter, origIdx) {
  if (answered[origIdx] !== null) return;
  answered[origIdx] = letter;
  render();
}

function setFilter(sec) {
  filterSec = sec;
  currentIdx = 0;
  render();
}

function next() {
  const filtered = getFiltered();
  if (currentIdx < filtered.length - 1) { currentIdx++; render(); }
}

function prev() {
  if (currentIdx > 0) { currentIdx--; render(); }
}

function jumpRandom() {
  const filtered = getFiltered();
  const unanswered = filtered.map((q, i) => i).filter(i => answered[qs.indexOf(filtered[i])] === null);
  if (unanswered.length > 0) {
    currentIdx = unanswered[Math.floor(Math.random() * unanswered.length)];
  } else {
    currentIdx = Math.floor(Math.random() * filtered.length);
  }
  render();
}

function showScore() {
  const total = qs.length;
  const attempted = answered.filter(a => a !== null).length;
  const correct = qs.filter((q, i) => answered[i] === q.answer).length;
  const pct = attempted > 0 ? Math.round(correct / attempted * 100) : 0;

  const secs = SECTIONS.filter(s => s !== "All");
  const secData = secs.map(s => {
    const secQs = qs.map((q, i) => ({ q, i })).filter(({ q }) => q.sec === s);
    const secCorrect = secQs.filter(({ q, i }) => answered[i] === q.answer).length;
    const secAttempted = secQs.filter(({ q, i }) => answered[i] !== null).length;
    return { s, correct: secCorrect, attempted: secAttempted, total: secQs.length };
  });

  document.getElementById("quiz-main").style.display = "none";
  document.getElementById("score-screen").style.display = "block";
  document.getElementById("score-screen").innerHTML = `
    <div class="score-panel">
      <div><span class="score-num">${correct}</span><span class="score-denom"> / ${attempted}</span></div>
      <div class="score-pct">${pct}% correct of answered questions</div>
      <div class="score-sub">${total - attempted} question${total - attempted !== 1 ? 's' : ''} not yet answered</div>
      <div class="section-scores">
        ${secData.map(d => `
          <div class="sec-score-card">
            <div class="sec-name">${d.s}</div>
            <div class="sec-frac" style="color:${d.attempted > 0 && d.correct / d.attempted >= 0.7 ? '#3B6D11' : d.attempted > 0 && d.correct / d.attempted < 0.5 ? '#A32D2D' : 'var(--color-text-primary)'}">${d.correct}/${d.attempted}<span style="font-size:12px;color:var(--color-text-secondary)"> of ${d.total}</span></div>
          </div>
        `).join("")}
      </div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <button class="btn-nav primary" onclick="resumeQuiz()">Resume quiz</button>
        <button class="btn-nav" onclick="restartQuiz()">Restart (reshuffle)</button>
        <button class="btn-nav" onclick="reviewWrong()">Review wrong answers</button>
      </div>
    </div>
  `;
}

function resumeQuiz() {
  document.getElementById("quiz-main").style.display = "block";
  document.getElementById("score-screen").style.display = "none";
  render();
}

function restartQuiz() {
  answered = new Array(qs.length).fill(null);
  shuffle(qs);
  currentIdx = 0;
  filterSec = "All";
  document.getElementById("quiz-main").style.display = "block";
  document.getElementById("score-screen").style.display = "none";
  render();
}

function reviewWrong() {
  const wrongSecs = qs.filter((q, i) => answered[i] !== null && answered[i] !== q.answer).map(q => q.sec);
  const wrongSecSet = [...new Set(wrongSecs)];
  document.getElementById("quiz-main").style.display = "block";
  document.getElementById("score-screen").style.display = "none";
  if (wrongSecSet.length === 1) filterSec = wrongSecSet[0];
  else filterSec = "All";
  currentIdx = 0;
  const firstWrong = qs.findIndex((q, i) => answered[i] !== null && answered[i] !== q.answer);
  if (firstWrong >= 0) {
    const filtered = getFiltered();
    const wIdx = filtered.indexOf(qs[firstWrong]);
    if (wIdx >= 0) currentIdx = wIdx;
  }
  render();
}

render();
</script>
