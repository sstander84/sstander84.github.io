  [8, "Interpret atrial premature beats in ECG", [
    ["A PAC on ECG is identified by:",
     ["A premature wide QRS complex", "An early P wave with abnormal morphology, followed by a QRS that is usually narrow", "An early QRS with no preceding P wave", "Absence of any P-wave"],
     1, "PAC: early P wave with morphology different from sinus P, followed by a normal QRS (unless aberrancy). Usually with non-compensatory pause.", "basic"],
    ["A non-conducted PAC appears on ECG as:",
     ["A QRS with no P", "An early abnormal P wave with NO QRS following it (P 'buried' in T)", "A wide QRS complex", "A pause with no P or QRS"],
     1, "Non-conducted PAC: premature P (often hidden in preceding T wave) without a QRS — most common cause of an unexpected pause on a tracing.", "basic"],
    ["A 60-year-old has a tracing showing a P-wave occurring early after the previous T wave that LOOKS LIKE a sinus rhythm pause but with subtle T-wave distortion. This is most likely:",
     ["Sinus arrest", "Non-conducted PAC", "Mobitz II AV block", "Sinus exit block"],
     1, "Non-conducted PACs are the most common cause of unexpected pauses. Look closely at the T wave preceding the pause for a hidden premature P.", "advanced"],
    ["An atrial bigeminy pattern shows:",
     ["Every other beat is a PAC", "Every third beat is a PAC", "Two PACs in a row", "Continuous PACs"],
     0, "Bigeminy = every other beat is premature (one normal followed by one PAC). Trigeminy = every third beat. Couplets = two PACs in a row.", "advanced"]
  ]],
  [9, "List the causes of atrial fibrillation and atrial flutter", [
    ["The most common reversible/precipitating cause of new-onset AFib (mnemonic 'PIRATES') includes:",
     ["Pulmonary embolism, ischemia, rheumatic heart disease, anemia/atrial myxoma, thyroid disease, ethanol/electrolytes, sepsis", "Pure idiopathic only", "Hypothyroidism", "Hypocalcemia primarily"],
     0, "PIRATES: Pulmonary disease/PE, Ischemia, Rheumatic heart disease/Atrial myxoma, Anemia, Thyrotoxicosis, Ethanol ('holiday heart')/Electrolytes, Sepsis. Always evaluate for reversible triggers.", "basic"],
    ["AFib is most strongly associated with which structural heart disease?",
     ["Ventricular septal defect", "Mitral stenosis or MR (LA dilation)", "Hypertrophic cardiomyopathy", "Pulmonary stenosis"],
     1, "LA enlargement (mitral disease, HFpEF, HTN) is a major substrate for AFib. Other associations: HFrEF, post-cardiac surgery, hyperthyroidism, OSA.", "basic"],
    ["A 50-year-old develops new AFib after a weekend of heavy drinking. This pattern is termed:",
     ["Lone AFib", "Holiday heart syndrome (alcohol-induced AFib)", "Permanent AFib", "Tachycardia-induced cardiomyopathy"],
     1, "'Holiday heart' = AFib precipitated by acute alcohol binge in someone without prior structural heart disease. Often self-resolves with abstinence.", "advanced"],
    ["A 65-year-old with longstanding hypertension presents with new AFib. Which mechanism most likely contributes?",
     ["Acute myocarditis", "Chronic LV diastolic dysfunction → LA pressure → LA dilation → atrial fibrosis providing reentry substrate", "Acute pulmonary embolism", "Conduction system aging only"],
     1, "Chronic HTN → LV hypertrophy → diastolic dysfunction → ↑LA pressure → LA enlargement and fibrosis → substrate for AFib. HTN is the most common modifiable risk factor for AFib.", "advanced"]
  ]],
  [10, "Identify atrial fibrillation and atrial flutter on ECG", [
    ["The hallmark ECG finding of AFib is:",
     ["Regular sawtooth pattern", "Irregularly irregular RR with no discrete P waves", "Slow regular P waves", "Wide QRS at fast rate"],
     1, "AFib: irregularly irregular ventricular response with absent organized P waves (replaced by fibrillatory waves). Diagnostic finding on ECG.", "basic"],
    ["The hallmark ECG finding of typical (Type I) atrial flutter is:",
     ["Sawtooth flutter waves at ~300/min, best seen in II/III/aVF", "Irregularly irregular RR with absent P", "Constant PR with dropped beats", "Wide QRS at slow rate"],
     0, "Typical (counterclockwise) atrial flutter: sawtooth waves at ~300 bpm, negative in inferior leads, positive in V1, often with 2:1 conduction.", "basic"],
    ["A 70-year-old with COPD has narrow QRS tachycardia at 150 bpm. The rhythm appears 'regular,' but applying carotid sinus massage briefly slows ventricular rate and reveals sawtooth waves at 300. The diagnosis is:",
     ["Atrial fibrillation with rapid response", "Atrial flutter with 2:1 conduction unmasked by vagal maneuver", "AVNRT", "Sinus tachycardia"],
     1, "Vagal maneuvers/adenosine slow AV conduction temporarily, unmasking flutter waves. AFlutter with 2:1 conduction is exactly 150 bpm — highly suspicious whenever narrow tach is at 150.", "advanced"],
    ["A patient's ECG shows narrow complexes at 100 bpm with no visible P waves and a baseline that appears 'fine and undulating' rather than discrete flutter waves. The diagnosis is:",
     ["Atrial flutter at 3:1 conduction", "Atrial fibrillation with controlled ventricular rate", "Junctional rhythm", "Sinus rhythm with first-degree AV block"],
     1, "Fine fibrillatory baseline with irregularly irregular ventricular rate = AFib. Rate 100 with no P waves favors AFib over flutter (which has organized 'F' waves).", "advanced"]
  ]],
  [11, "Interpret supraventricular tachycardia on ECG", [
    ["AVNRT typically appears on ECG as:",
     ["Wide QRS tachycardia", "Narrow QRS regular tachycardia (~150-220 bpm) with no visible P or P 'buried' in QRS (pseudo-R' in V1)", "Slow narrow QRS rhythm", "Irregular wide QRS rhythm"],
     1, "AVNRT (most common SVT): narrow regular QRS, ~150-220 bpm, P often buried in QRS or visible just after as 'pseudo-R' in V1 / pseudo-S in II. Adenosine is diagnostic and therapeutic.", "basic"],
    ["AVRT (involving an accessory pathway, e.g., WPW) on baseline (sinus) ECG may show:",
     ["Delta wave, short PR, wide QRS", "Constant 1° AV block", "Tall peaked T waves", "RBBB pattern"],
     0, "WPW pre-excitation: short PR (<120 ms), delta wave (slurred QRS upstroke), wide QRS — due to ventricular pre-excitation through accessory pathway.", "basic"],
    ["First-line treatment for stable narrow QRS regular SVT (presumed AVNRT) is:",
     ["Vagal maneuvers, then IV adenosine if unsuccessful", "DC cardioversion as initial step", "IV beta-blocker only", "IV digoxin loading"],
     0, "Stable AVNRT: vagal maneuvers (Valsalva, modified Valsalva) → IV adenosine 6 mg push → 12 mg if needed. Cardioversion if hemodynamically unstable.", "advanced"],
    ["A patient with WPW develops AFib with rapid pre-excitation. Which agent should be AVOIDED?",
     ["IV procainamide", "IV ibutilide", "AV-nodal blockers (adenosine, β-blocker, verapamil, digoxin)", "Direct cardioversion if unstable"],
     2, "AV-nodal blockers in WPW + AFib can cause preferential conduction down the accessory pathway and degenerate to VF. Use procainamide, ibutilide, or cardioversion.", "advanced"]
  ]],
  [12, "Describe junctional rhythm", [
    ["Junctional rhythm originates from:",
     ["The SA node", "The AV node / junctional tissue", "The His-Purkinje system below the bifurcation", "The ventricular myocardium"],
     1, "Junctional rhythm originates in the AV node/junction. Intrinsic rate ~40-60 bpm. Junctional escape (when SA fails) at ~40-60.", "basic"],
    ["The classical ECG finding of a junctional rhythm includes:",
     ["Wide QRS at slow rate", "Narrow QRS, retrograde inverted P (in II) just before, during, or after QRS, or absent P wave", "Sawtooth atrial pattern", "Irregularly irregular RR"],
     1, "Junctional rhythm: narrow QRS (since conduction goes down normal pathway), inverted P in II (retrograde atrial activation) appearing just before, during (buried), or after QRS.", "basic"],
    ["A patient post-inferior MI has a regular narrow rhythm at 50 bpm with no visible P waves and inverted retrograde P in lead III. The most likely diagnosis is:",
     ["Sinus bradycardia", "Junctional escape rhythm (likely from inferior MI affecting SA/AV nodal blood supply)", "Mobitz I AV block", "Ventricular tachycardia"],
     1, "Inferior MI affects RCA territory, which often supplies SA and AV nodes. Junctional escape can take over when SA node is impaired. Usually transient.", "advanced"],
    ["An accelerated junctional rhythm (60-100 bpm) is most suggestive of:",
     ["Increased vagal tone", "Increased automaticity, classically associated with digoxin toxicity, post-cardiac surgery, or inferior MI", "AV nodal block", "Pulmonary embolism"],
     1, "Accelerated junctional rhythm (60-100) reflects increased junctional automaticity. Classic causes: digitalis toxicity, post-op cardiac surgery, inferior MI, myocarditis.", "advanced"]
  ]]
]],
[12, "ECG: Pathological Morphologies II", [
  [1, "Describe the ECG features of left and right atrial enlargement", [
    ["The terminal negative P-wave deflection in V1 indicating LAE should be:",
     ["≥1 mm deep and ≥40 ms wide", "≥3 mm deep and ≥80 ms wide", "Any negative deflection", "Always biphasic with positive predominance"],
     0, "Morris criterion for LAE: terminal negative deflection in V1 ≥1 mm deep AND ≥40 ms wide. Reflects delayed left atrial activation.", "basic"],
    ["A peaked P wave >2.5 mm tall in lead II is termed:",
     ["P-mitrale", "P-pulmonale", "P-cardiale", "P-cor"],
     1, "P-pulmonale = tall peaked P in II from RAE (often pulmonary causes). P-mitrale = broad notched P from LAE (mitral disease).", "basic"],
    ["A patient with severe COPD has tall peaked P waves in lead II. The pathophysiology involves:",
     ["LV pressure overload causing LAE", "Pulmonary HTN → RV pressure overload → RA enlargement", "Tricuspid regurgitation only", "Mitral stenosis"],
     1, "COPD → chronic hypoxia → pulmonary vasoconstriction/hypertension → RV pressure overload → RA enlargement → P-pulmonale.", "advanced"],
    ["A patient has biatrial enlargement on ECG. Which is the LEAST likely cause?",
     ["Severe mitral stenosis with pulmonary HTN", "Restrictive cardiomyopathy", "Acute pulmonary embolism", "Chronic complex congenital heart disease"],
     2, "Acute PE causes acute RV strain but typically not biatrial enlargement (which requires chronic atrial dilation/hypertrophy). MS, RCM, and CHD chronically dilate both atria.", "advanced"]
  ]],
  [2, "Describe the diagnostic criteria for left and right ventricular hypertrophy and identify on ECG", [
    ["Cornell voltage criteria for LVH in men is:",
     ["R(aVL) + S(V3) >28 mm", "R(I) + S(III) >35 mm", "S(V1) + R(V5) >40 mm", "R(V1) + S(V5) >40 mm"],
     0, "Cornell criteria: R(aVL) + S(V3) >28 mm in men, >20 mm in women. More accurate than Sokolow-Lyon, especially in older patients.", "basic"],
    ["The 'strain pattern' associated with LVH refers to:",
     ["Tall peaked T waves", "Downsloping ST depression and asymmetric TWI in V5-V6, I, aVL", "ST elevation in V1-V3", "Tall U waves"],
     1, "LVH with strain: ST depression with asymmetric T inversion in lateral leads. Reflects subendocardial repolarization abnormality from chronic pressure overload.", "basic"],
    ["A 75-year-old with severe AS shows LVH voltage criteria, LAD, and TWI in V5-V6. Which finding most directly reflects 'strain'?",
     ["Voltage criteria", "Left axis deviation", "Repolarization abnormality (ST depression, asymmetric TWI in lateral leads)", "Wide QRS"],
     2, "Strain pattern is specifically the repolarization abnormality (ST/T changes), not voltage. Strain in the setting of LVH suggests advanced disease and worse prognosis.", "advanced"],
    ["A young athlete has high QRS voltages but NO strain pattern, no LAE, normal axis, and TWI in V1-V2 only. The most likely interpretation is:",
     ["Pathologic LVH from hypertensive heart disease", "Athlete's heart (physiologic remodeling) with normal variant TWI", "Hypertrophic cardiomyopathy", "Acute myocarditis"],
     1, "Athletic remodeling can produce isolated voltage criteria without strain or LAE. T-wave inversion in V1-V2 is a normal variant. HCM typically has deep TWI in lateral leads with LAE.", "advanced"]
  ]],
  [3, "Describe the ECG changes of the 1st, 2nd, and 3rd degree AV block", [
    ["A 65-year-old has PR interval 240 ms with all P waves followed by QRS. He is asymptomatic. The diagnosis and management are:",
     ["Mobitz II — pacemaker indicated", "First-degree AV block — typically observation only", "Complete heart block — pacemaker", "Sinus rhythm — no diagnosis"],
     1, "Asymptomatic 1° AV block usually requires only observation. Workup precipitants (drugs, ischemia). Pacing rare unless markedly prolonged with symptoms.", "basic"],
    ["The most reliable feature distinguishing Mobitz I from Mobitz II during 2:1 block is:",
     ["Heart rate", "PR interval consistency between conducted beats and QRS width (narrow favors Mobitz I; wide favors Mobitz II)", "ST segment morphology", "P wave amplitude"],
     1, "QRS width helps: narrow QRS suggests AV nodal block (Mobitz I); wide QRS suggests infranodal block (Mobitz II). Atropine challenge can also help differentiate.", "basic"],
    ["A patient with acute inferior MI develops 2nd degree AV block with progressive PR lengthening. The most likely mechanism is:",
     ["Direct His-Purkinje injury", "Increased vagal tone and ischemia of the AV node from RCA territory", "Lateral wall infarction", "Anterior wall infarction"],
     1, "Inferior MIs often involve the RCA, which supplies the AV node in ~90% of patients → AV nodal Mobitz I, usually transient and atropine-responsive.", "advanced"],
    ["Acute anterior MI with new high-degree AV block (Mobitz II or CHB) usually reflects:",
     ["RCA occlusion with reversible AV nodal ischemia", "Extensive infarction of the His-Purkinje system from LAD occlusion — high-mortality scenario", "Vagal tone", "Drug effect alone"],
     1, "Anterior MI with high-degree block = LAD occlusion damaging the conduction system below the AV node — high mortality, often requires temporary then permanent pacing.", "advanced"]
  ]],
  [4, "Differentiate Mobitz type I and Mobitz type II in 2nd degree AV block", [
    ["Mobitz I responds to atropine because:",
     ["Atropine slows ischemic injury", "AV nodal block has parasympathetic input that atropine blocks", "Atropine increases sinus rate only", "Atropine paces the ventricle"],
     1, "Mobitz I (AV nodal level) is responsive to atropine because the AV node has rich parasympathetic innervation. Mobitz II (infranodal) does not respond to atropine.", "basic"],
    ["Mobitz II carries a worse prognosis than Mobitz I because:",
     ["It is reversible", "It often progresses to complete heart block and asystole", "It is associated with mild bradycardia only", "It is benign in most cases"],
     1, "Mobitz II is infranodal disease with high risk of sudden progression to CHB and asystole; pacemaker is indicated.", "basic"],
    ["A 70-year-old has 2:1 AV block. He receives atropine 0.5 mg IV and the conduction improves to 1:1. This response suggests:",
     ["Mobitz II (infranodal disease)", "Mobitz I (AV nodal disease)", "Complete heart block", "Atrial flutter"],
     1, "Atropine improving conduction supports AV nodal (vagally-mediated) block = Mobitz I. Mobitz II rarely improves with atropine and may worsen.", "advanced"],
    ["Mobitz II in the setting of bifascicular block carries which implication?",
     ["No special significance", "Trifascicular disease — high risk of progression to CHB; pacing is generally indicated", "Likely benign vagal phenomenon", "Diagnostic of acute MI"],
     1, "Mobitz II + bifascicular block = trifascicular block, with high risk of progression to CHB. Pacemaker is generally indicated.", "advanced"]
  ]],
  [5, "Describe the right bundle branch block and the left bundle branch block in ECG", [
    ["Which is a CLASSIC finding of RBBB?",
     ["Broad notched R in V1, delta wave", "Wide rabbit-ear (rSR') pattern in V1-V2 with terminal slurred S in I/V6 and discordant TWI in V1-V3", "QS in V1-V3, monomorphic", "Wide R in V5-V6 with no S"],
     1, "Classic RBBB: rSR' in V1, slurred S in I/V6, discordant TWI in V1-V3. QRS ≥120 ms.", "basic"],
    ["Sgarbossa criteria are used to:",
     ["Diagnose AFib", "Identify acute MI in the presence of LBBB or paced rhythm", "Diagnose Wolff-Parkinson-White", "Localize accessory pathways"],
     1, "Sgarbossa criteria detect acute MI in LBBB or paced rhythm: concordant ST elevation ≥1 mm; concordant ST depression in V1-V3; discordant ST elevation excessively large vs QRS (≥25% of S wave in modified Sgarbossa).", "basic"],
    ["A patient with new LBBB and chest pain has concordant ST elevation of 2 mm in lead V5. This finding suggests:",
     ["Normal LBBB pattern", "Acute MI (positive Sgarbossa criterion)", "Pericarditis", "Hyperkalemia"],
     1, "Concordant ST elevation ≥1 mm in any lead is the most specific Sgarbossa criterion for acute MI in LBBB. This patient should go for emergent reperfusion.", "advanced"],
    ["Why is RBBB considered LESS clinically significant than LBBB in adults without structural heart disease?",
     ["RBBB always reflects severe disease", "RBBB can occur as a normal variant or with pulmonary disease, while new LBBB more often reflects significant LV pathology", "LBBB is always benign", "Both are equally significant"],
     1, "RBBB can be a benign variant or due to lung disease. LBBB more often signifies underlying LV disease (CAD, cardiomyopathy, valvular disease, HTN). New LBBB warrants evaluation.", "advanced"]
  ]],
  [6, "Describe the intraventricular conduction delay, left anterior hemiblock, left posterior hemiblock in an ECG", [
    ["Nonspecific intraventricular conduction delay (IVCD) refers to:",
     ["QRS ≥110 ms but not meeting criteria for typical RBBB or LBBB", "QRS <100 ms with delta wave", "Pure RBBB pattern", "Pure LBBB pattern"],
     0, "IVCD: QRS prolongation (≥110 ms, often ≥120 ms) without classic RBBB or LBBB morphology. Causes: cardiomyopathy, hyperkalemia, drugs, ischemia.", "basic"],
    ["Compared with LAFB, LPFB is:",
     ["More common in clinical practice", "Less common; requires exclusion of RVH and lateral MI before diagnosis", "Always benign and ignored", "Diagnostic for inferior MI"],
     1, "LPFB is much less common than LAFB. Diagnose LPFB only after excluding RVH and lateral wall MI as causes of RAD.", "basic"],
    ["A patient with LBBB and 1° AV block presenting with syncope has which combination?",
     ["Normal conduction", "Trifascicular block (LBBB = both left fascicles + 1° AV block; or alternatively LBBB + AV nodal block)", "Bifascicular block only", "RBBB + LAFB only"],
     1, "LBBB blocks both left fascicles. Adding 1° AV block creates trifascicular pattern. Combined with syncope, evaluate for higher-degree block — pacemaker often indicated.", "advanced"],
    ["The classical fascicular block pattern with LAD, qR in lead I, rS in lead III is termed:",
     ["LPFB", "LAFB", "Bifascicular block", "Trifascicular block"],
     1, "LAFB: small q with R wave in lateral leads (I, aVL), small r with deep S in inferior leads (II, III, aVF), with marked LAD (-45° to -90°).", "advanced"]
  ]],
  [7, "List the causes of atrial premature beats", [
    ["Hyperthyroidism contributes to PACs and AFib via:",
     ["Increased β-adrenergic responsiveness and direct effects on atrial electrical properties", "Decreased atrial refractoriness only", "Acute pericarditis", "Decreased thyroid hormone receptors in atria"],
     0, "Hyperthyroidism: ↑sympathetic tone, ↑sensitivity to catecholamines, shortened atrial refractoriness — promotes atrial ectopy and AFib. Always check TSH in new AFib.", "basic"],
    ["Electrolyte abnormalities most likely to provoke PACs include:",
     ["Hypernatremia", "Hypokalemia and hypomagnesemia", "Hypercalcemia only", "Hypochloremia"],
     1, "Hypokalemia and hypomagnesemia destabilize atrial membrane potential → increased ectopy. Always check and correct K and Mg in arrhythmias.", "basic"],
    ["A 50-year-old presents with new PACs after starting albuterol nebulizers for COPD exacerbation. The likely mechanism is:",
     ["Direct AV nodal block", "β2-agonist effects increasing atrial automaticity", "Vagal tone", "Hypoxia alone"],
     1, "β2-agonists have some β1 cross-reactivity → ↑atrial automaticity → PACs and possibly AFib. COPD exacerbation, hypoxia, and steroids also contribute.", "advanced"],
    ["A 75-year-old with frequent monomorphic PACs (>10% of beats over 24 hours on Holter) is at increased risk for:",
     ["Lone aortic stenosis", "Future development of AFib and atrial cardiomyopathy", "Severe ventricular tachyarrhythmias", "Mitral stenosis"],
     1, "High PAC burden (>10%/day or >100/hour) is associated with future AFib, stroke, and atrial cardiomyopathy. Monitor and treat comorbidities.", "advanced"]
  ]],
  [8, "Interpret atrial premature beats in ECG", [
    ["A premature atrial contraction conducted with aberrancy appears as:",
     ["A premature P with narrow QRS", "A premature P followed by a wide QRS resembling BBB (often RBBB pattern)", "Absent P with narrow QRS", "Wide QRS with no P"],
     1, "Aberrant PAC: premature P followed by wide QRS (often RBBB-like) due to refractoriness of one bundle when the early impulse arrives. Distinguish from PVC (no preceding P).", "basic"],
    ["A PAC is followed by a NON-compensatory pause because:",
     ["The PAC has no effect on subsequent timing", "The premature atrial impulse resets the SA node, so the next P comes earlier than 2 R-R intervals from the prior sinus P", "The SA node fully recovers in time", "The AV node is blocked"],
     1, "PAC resets the SA node, producing a non-compensatory pause (PAC-to-next-P interval less than 2 sinus intervals). PVCs typically have compensatory pauses (SA node not reset).", "basic"],
    ["A patient's tracing shows a premature wide QRS without preceding P wave. The pause that follows is exactly 2 R-R intervals long. This best fits:",
     ["PAC with aberrancy", "PVC with compensatory pause (SA node not reset)", "Sinus arrest", "Mobitz II AV block"],
     1, "Compensatory pause (=2 R-R) and absent preceding P are classic for PVC, since the SA node continues to depolarize on its own schedule despite the ventricular ectopic.", "advanced"],
    ["Distinguishing aberrant PAC from PVC on ECG is best done by:",
     ["Looking for a preceding ectopic P wave (favors aberrant PAC) and the post-pause type (compensatory in PVC)", "QRS amplitude only", "ST segment morphology", "Heart rate alone"],
     0, "Key distinguishing features: ectopic P preceding the QRS (favors PAC w/ aberrancy) and pause type (compensatory in PVC, non-compensatory in PAC). QRS morphology resembling RBBB favors aberrancy; bizarre morphology favors PVC.", "advanced"]
  ]],
  [9, "List the causes of atrial fibrillation and atrial flutter", [
    ["Which of the following is the SINGLE strongest risk factor for AFib?",
     ["Female sex", "Advanced age", "Diabetes alone", "Hypercholesterolemia"],
     1, "Age is the strongest non-modifiable risk factor (1% prevalence at 60-65, ~10% at >80). HTN, OSA, obesity, alcohol, and structural heart disease are major modifiable risks.", "basic"],
    ["Cardiac surgery and atrial flutter/fibrillation:",
     ["Have no association", "Post-cardiac surgery AFib/flutter is very common (20-40%) and usually transient", "AFib post-surgery is exclusively chronic", "Surgery prevents AFib"],
     1, "Post-op AFib (POAF) occurs in 20-40% of cardiac surgery patients (highest after CABG/valve surgery), peaking on day 2-3. Anticoagulation guided by CHA2DS2-VASc.", "basic"],
    ["A 45-year-old woman presents with new AFib, palpitations, and weight loss. The most useful initial laboratory test is:",
     ["BNP", "TSH and free T4", "Lipid panel", "Hemoglobin A1c"],

    ["A 68-year-old has new AFib in the setting of severe sepsis. The most appropriate initial approach is:",
     ["Long-term warfarin immediately", "Treat underlying sepsis; rate control with caution; assess thromboembolic risk before anticoagulation", "DC cardioversion immediately", "Refer for catheter ablation"],
     1, "AFib in sepsis often resolves with treatment of underlying illness. Rate control as needed. Anticoagulation balanced against bleeding risk in critical illness; CHA2DS2-VASc guides decision.", "advanced"]
  ]],
  [10, "Identify atrial fibrillation and atrial flutter on ECG", [
    ["Atypical (Type II) atrial flutter differs from typical flutter by:",
     ["Slower atrial rate (~250/min) and variable circuit (often involving LA scar)", "Faster atrial rate (~600/min)", "Absent flutter waves entirely", "Always 1:1 conduction"],
     0, "Type II / atypical flutter: usually post-ablation or after surgery, slower (~240 bpm), variable circuit (LA, scar-based). Typical (Type I) flutter is CTI-dependent at ~300 bpm.", "basic"],
    ["A 'fine' AFib waveform versus 'coarse' AFib refers to:",
     ["Different rhythms entirely", "Amplitude of fibrillatory baseline waves; coarse fibrillation has amplitude >0.5 mm and may resemble flutter", "Different ventricular rates", "Treatment options"],
     1, "Coarse AFib (large fibrillatory waves, often >0.5 mm) can be confused with flutter. Both are still AFib (irregularly irregular). Coarse AFib is sometimes a sign of LA enlargement.", "basic"],
    ["A young patient has 1:1 conduction during atrial flutter, leading to ventricular rate ~300 bpm. The most likely scenario is:",
     ["Normal AV nodal function in healthy young adult", "Pre-excitation via accessory pathway (WPW), or use of class IC antiarrhythmics slowing flutter rate", "Hyperkalemia", "Severe AV block"],
     1, "1:1 flutter conduction usually requires either WPW (bypassing AV nodal limitation) or class IC drugs (e.g., flecainide) that slow flutter rate enough for the AV node to keep up. Dangerous — use AV nodal blocker first.", "advanced"],
    ["A patient on flecainide for paroxysmal AFib presents with regular wide complex tachycardia at 200 bpm. The most likely diagnosis is:",
     ["VT", "1:1 atrial flutter with class IC drug effect (use-dependent QRS widening)", "Acute MI", "Pulmonary embolism"],
     1, "Class IC drugs (flecainide, propafenone) slow atrial flutter to ~200 bpm and cause use-dependent QRS widening, allowing 1:1 conduction with wide QRS. Always combine class IC with AV nodal blocker.", "advanced"]
  ]],
  [11, "Interpret supraventricular tachycardia on ECG", [
    ["Atrial tachycardia (focal AT) differs from sinus tachycardia by:",
     ["Faster rates only", "Different P-wave morphology than sinus P (focal AT originates outside SA node)", "Wider QRS", "AV dissociation"],
     1, "Focal AT: P-wave morphology differs from sinus P (different origin). Rate usually 100-250 bpm. Adenosine slows but rarely terminates focal AT (unlike AVNRT/AVRT).", "basic"],
    ["The classic ECG finding of WPW syndrome (pre-excitation) on baseline rhythm is:",
     ["Long PR with normal QRS", "Short PR (<120 ms), delta wave (slurred QRS upstroke), wide QRS", "RBBB pattern", "Tall peaked T waves"],
     1, "WPW pre-excitation: short PR (<120 ms), delta wave (slurred upstroke of QRS), wide QRS — due to ventricular pre-excitation through accessory pathway bypassing AV nodal delay.", "basic"],
    ["A patient with regular SVT receives 6 mg adenosine. The rhythm slows briefly and then resumes the same SVT. This response is most consistent with:",
     ["Sinus tachycardia", "AVNRT or AVRT (would terminate)", "Atrial flutter (slows but persists, revealing flutter waves)", "Ventricular tachycardia"],
     2, "Adenosine slows AV conduction transiently. AVNRT/AVRT typically terminate (AV node is part of circuit). AFlutter slows ventricular response but flutter persists. AT may slow but not terminate.", "advanced"],
    ["A wide QRS tachycardia at 200 bpm in a patient with known WPW is most likely:",
     ["VT", "Antidromic AVRT (down accessory pathway, up AV node)", "Sinus tachycardia with aberrancy", "AFib with rapid response only"],
     1, "Antidromic AVRT: antegrade conduction down accessory pathway (wide QRS, fully pre-excited), retrograde via AV node. AFib with WPW can also be wide and irregular.", "advanced"]
  ]],
  [12, "Describe junctional rhythm", [
    ["Junctional rhythm intrinsic rate is approximately:",
     ["20-40 bpm", "40-60 bpm", "60-100 bpm", "100-150 bpm"],
     1, "AV junctional intrinsic rate: 40-60 bpm. Faster (60-100) = accelerated junctional. Faster than 100 = junctional tachycardia. Slower than ~40 typically reflects ventricular escape.", "basic"],
    ["A retrograde P wave appearing AFTER the QRS in a junctional rhythm reflects:",
     ["Slow conduction up to the atria after the ventricles have already depolarized", "Antegrade conduction from sinus node", "Ventricular pre-excitation", "Atrial flutter"],
     0, "If retrograde conduction to atria is slower than antegrade conduction to ventricles, the inverted P appears AFTER QRS. If atria are reached first, P appears before QRS. If simultaneous, P is buried.", "basic"],
    ["A patient on digoxin has accelerated junctional rhythm at 80 bpm with regularly irregular periods of slowing. The most likely cause is:",
     ["Hypothyroidism", "Digitalis toxicity (increased junctional automaticity, often with AV block)", "Hyperkalemia alone", "Acute pulmonary embolism"],
     1, "Digitalis toxicity classically causes increased junctional automaticity (accelerated junctional rhythm), often with concomitant AV block. Treat with digoxin-Fab if hemodynamically significant.", "advanced"],
    ["AV dissociation as part of junctional rhythm vs complete heart block can be distinguished because:",
     ["Both look identical and cannot be distinguished", "In junctional rhythm with AV dissociation, the junctional rate exceeds the sinus rate (the junction is leading); in CHB, sinus rate exceeds the lower escape rate", "Junctional rhythm always has wide QRS", "CHB always has narrow QRS"],
     1, "Junctional rhythm with isorhythmic AV dissociation: junctional rate ≈ or > sinus rate. CHB: atrial rate > ventricular escape rate, with no impulse penetrating to ventricles regardless of timing.", "advanced"]

]],
[13, "ECG: Clinical ECG I", [
  [1, "Recognize ECG findings in various clinical scenarios", [
    ["A 65-year-old man presents with crushing chest pain. His ECG shows 3 mm ST elevation in II, III, aVF and reciprocal ST depression in I and aVL. The diagnosis is:",
     ["Anterior STEMI", "Inferior STEMI", "Lateral STEMI", "Pericarditis"],
     1, "ST elevation in II, III, aVF = inferior STEMI (typically RCA occlusion). Reciprocal ST depression in I, aVL supports the diagnosis.", "basic"],
    ["A patient has chest pain and the ECG shows diffuse concave ST elevation in multiple leads with PR depression. The most likely diagnosis is:",
     ["Acute pericarditis", "Anterior STEMI", "Hyperkalemia", "Pulmonary embolism"],
     0, "Acute pericarditis: diffuse concave ST elevation, PR depression (especially in II), no reciprocal changes (except aVR), and improves with NSAIDs ± colchicine.", "basic"],
    ["A 70-year-old has new ST elevation in V1-V4. He also has ST elevation in V4R. Which additional management consideration is critical?",
     ["Aggressive nitrate therapy", "Avoid nitrates and excessive diuresis (RV infarction is preload-dependent)", "Beta-blocker IV bolus", "ACE inhibitor immediately"],
     1, "ST elevation in V4R = RV infarction (often with inferior MI). RV is preload-dependent; nitrates and diuretics can cause profound hypotension. Maintain preload with IV fluids.", "advanced"],
    ["A 50-year-old develops chest pain. ECG shows ST elevation in V1-V2 with ST depression and tall R waves in V8-V9 (posterior leads show elevation). The diagnosis is:",
     ["Anteroseptal STEMI", "Posterior STEMI (often associated with inferior or lateral)", "Pulmonary embolism", "Pericarditis"],
     1, "Tall R, ST depression in V1-V2 with ST elevation in posterior leads (V7-V9) = posterior STEMI (often with inferior or lateral involvement). Mirror image in anterior leads.", "advanced"]
  ]],
  [2, "Recognize rate, rhythm and axis of EKGs associated with various clinical scenarios", [
    ["A 50-year-old presents with palpitations. ECG: irregularly irregular RR at average rate 130 bpm, no P waves, narrow QRS. The diagnosis is:",
     ["Sinus tachycardia", "Atrial fibrillation with rapid ventricular response", "Atrial flutter at 2:1", "AVNRT"],
     1, "Irregularly irregular RR with absent P waves = AFib. Average rate 130 = rapid ventricular response. Treatment: rate control, anticoagulation if appropriate, rhythm strategy as indicated.", "basic"],
    ["A 25-year-old athlete has resting HR 50 bpm, normal P-QRS-T pattern, and normal axis. The diagnosis is:",
     ["Sinus bradycardia (likely physiologic)", "First-degree AV block", "Sinus arrhythmia", "Mobitz I"],
     0, "Sinus rhythm at 50 bpm with normal sinus P morphology in a trained athlete is physiologic from increased vagal tone. Asymptomatic bradycardia is normal.", "basic"],
    ["A 45-year-old presents with sudden onset dyspnea and pleuritic chest pain. ECG: sinus tachycardia at 110, RAD, S1Q3T3 pattern, T-wave inversion in V1-V3. The diagnosis is:",
     ["Anterior MI", "Pulmonary embolism with RV strain", "Pericarditis", "WPW syndrome"],
     1, "S1Q3T3 + sinus tach + RAD + right precordial TWI suggests acute PE with RV strain. Order CTPA to confirm. Sinus tach is most common ECG finding in PE.", "advanced"],
    ["A 40-year-old with palpitations has wide QRS regular tachycardia at 180 bpm. He has WPW on prior baseline ECG. Which finding most strongly suggests antidromic AVRT rather than VT?",
     ["AV dissociation", "Pre-existing WPW with the same wide QRS morphology when sinus rhythm is restored", "Capture beats", "Fusion beats"],
     1, "Antidromic AVRT (in WPW): wide QRS due to antegrade conduction down accessory pathway. Comparing baseline WPW QRS morphology to the tachycardia QRS can help distinguish from VT.", "advanced"]
  ]]
]],
[14, "Imaging of the Cardiovascular System I", [
  [1, "Describe the normal cardiac silhouette on PA and lateral chest radiographs", [
    ["The normal cardiothoracic ratio on a PA chest radiograph is:",
     ["<25%", "<50%", "<75%", "<90%"],
     1, "Normal CTR <50% on a properly inspired PA CXR. CTR ≥50% suggests cardiomegaly. AP films artifactually enlarge the heart and CTR cutoff doesn't apply directly.", "basic"],
    ["The right heart border on a normal PA CXR is formed primarily by the:",
     ["Right ventricle", "Right atrium", "Aortic arch", "Superior vena cava"],
     1, "Normal right heart border = right atrium. The SVC and azygos vein can also contribute superiorly.", "basic"],
    ["The left heart border on a PA CXR is formed (from top to bottom) by:",
     ["Aortic knob, pulmonary trunk, RV outflow tract, RV apex", "Aortic knob, pulmonary trunk/LA appendage, LV", "Aortic knob, RA, LV", "Pulmonary trunk, RV, RA"],
     1, "Normal left border (top to bottom): aortic knob → main PA / LA appendage → LV. LA appendage can become prominent in mitral disease.", "advanced"],
    ["On a lateral CXR, the right ventricle abuts the:",
     ["Posterior cardiac border", "Lower sternum (anterior)", "Trachea", "Diaphragm only"],
     1, "On lateral CXR: RV is anterior, abutting the lower sternum. LV/LA form the posterior cardiac border. RV enlargement = filling of retrosternal clear space.", "advanced"]
  ]],
  [2, "Recognize major abnormalities of the cardiomediastinal silhouette, including chamber enlargement", [
    ["LA enlargement on PA CXR is suggested by:",
     ["Lifting of the left mainstem bronchus / 'double density' behind the right heart border", "Boot-shaped heart", "Right heart border bulging only", "Wide mediastinum alone"],
     0, "LAE: 'double density' behind right heart border (LA visible through RA), splaying of carina (>90°), elevation of left mainstem bronchus, enlarged LA appendage causing 'straightening' of left heart border.", "basic"],
    ["Right ventricular enlargement on lateral CXR is suggested by:",
     ["Filling of the retrosternal clear space anteriorly", "Retrocardiac density", "Boot-shaped heart silhouette only", "Tracheal deviation"],
     0, "RV enlargement: encroachment on retrosternal clear space on lateral view. Other findings: prominent RV outflow tract, displaced apex.", "basic"],
    ["A 'boot-shaped' heart on CXR (coeur en sabot) is classic for:",
     ["Atrial septal defect", "Tetralogy of Fallot (RV hypertrophy with elevated apex)", "Mitral stenosis", "Mitral valve prolapse"],
     1, "Boot-shaped heart: upturned apex from RVH and concave PA segment — classic for tetralogy of Fallot. Caused by RVH with reduced PA flow.", "advanced"],
    ["A widened mediastinum on a CXR in a patient with severe chest pain raises concern for:",
     ["Pericarditis", "Aortic dissection", "Pulmonary edema", "Pneumonia"],
     1, "Widened mediastinum (>8 cm) with sudden severe pain suggests aortic dissection. Confirm with CT angiography, transesophageal echo, or MRI.", "advanced"]
  ]],
  [3, "Understand the use of 2D and Doppler echocardiography in the evaluation of the heart", [
    ["2D echocardiography is most useful for:",
     ["Assessing pressure gradients only", "Visualizing cardiac structure and chamber size, wall motion, and valves", "Quantifying coronary calcium", "Direct visualization of coronary arteries"],
     1, "2D echo provides real-time imaging of cardiac structure: chamber size, wall thickness, wall motion, valves, pericardium. Cannot directly visualize coronaries (need cath/CT).", "basic"],
    ["Doppler echocardiography measures:",
     ["Static cardiac dimensions", "Blood flow velocity (and direction), allowing pressure gradient and severity estimation", "Coronary artery anatomy", "Electrical activity"],
     1, "Doppler measures velocity using frequency shift. Pressure gradient ≈ 4v² (Bernoulli equation) — used for AS severity, MR severity, PA pressure (TR jet).", "basic"],
    ["A patient with suspected severe AS has peak velocity of 5 m/s across the aortic valve. The peak gradient is approximately:",
     ["20 mmHg", "50 mmHg", "100 mmHg", "200 mmHg"],
     2, "Simplified Bernoulli: peak gradient = 4v². 4 × (5)² = 4 × 25 = 100 mmHg. Severe AS: peak velocity ≥4 m/s, mean gradient ≥40 mmHg, AVA ≤1.0 cm².", "advanced"],
    ["A patient has TR with peak velocity of 3.5 m/s and estimated RA pressure of 5 mmHg. The estimated PA systolic pressure (PASP) is approximately:",
     ["10 mmHg (normal)", "30 mmHg", "55 mmHg (elevated, suggesting pulmonary HTN)", "85 mmHg"],
     2, "PASP = 4v² + RAP = 4(3.5)² + 5 = 49 + 5 = 54 mmHg. PASP >35 mmHg suggests pulmonary HTN. Estimating RV systolic pressure via TR jet is a key echo skill.", "advanced"]
  ]],
  [4, "Recognize anatomic structures and common pathologic conditions on the standard echocardiographic views", [
    ["The 'parasternal long-axis' view is best for visualizing:",
     ["Apex of the LV only", "LA, mitral valve, LV, aortic valve, and ascending aorta in long axis", "Right heart only", "Apex four-chamber"],
     1, "Parasternal long axis: shows LA, MV, LV, AV, proximal aorta — workhorse view for LV function, valve assessment, and dimensions.", "basic"],
    ["The 'apical 4-chamber' view shows:",
     ["LV outflow tract only", "All four cardiac chambers in long axis with both AV valves", "Right heart isolated from left", "Aorta only"],
     1, "Apical 4-chamber: probe at apex, all four chambers, both AV valves visible. Used for chamber size, wall motion, and Doppler of MV/TV.", "basic"],
    ["A patient has septal wall hypokinesis on echo. This finding most directly suggests:",
     ["Right coronary artery occlusion", "LAD territory dysfunction (anterior septum)", "Circumflex disease only", "Right atrial myxoma"],
     1, "Septal hypokinesis: anterior septum is supplied by LAD. Wall motion abnormality in LAD territory suggests prior or active LAD ischemia/infarction.", "advanced"],
    ["Echo finding of severe LV dilation with diffusely reduced contractility (EF 20%) and no regional wall motion abnormalities is most consistent with:",
     ["Recent anterior MI", "Dilated cardiomyopathy (idiopathic, viral, alcohol, etc.)", "Hypertrophic cardiomyopathy", "Restrictive cardiomyopathy"],
     1, "Diffuse global hypokinesis with chamber dilation and no regional wall motion abnormality favors non-ischemic dilated cardiomyopathy. CAD typically causes regional dysfunction matching coronary territory.", "advanced"]
  ]],
  [5, "Recognize the imaging manifestations of congestive heart failure, and of right heart failure", [
    ["The earliest CXR finding of left heart failure is:",
     ["Bilateral pleural effusions", "Cephalization (cranial redistribution) of pulmonary vasculature", "Kerley B lines", "Bat-wing alveolar opacities"],
     1, "CXR progression of LHF: cephalization (~PCWP 13-18) → interstitial edema with Kerley B lines (~18-25) → alveolar edema with bat-wing pattern (>25 mmHg).", "basic"],
    ["Kerley B lines on CXR represent:",
     ["Cavitary lesions in the lung", "Thickened interlobular septa from edema or lymphangitic disease", "Pleural calcifications", "Bronchiectatic airways"],
     1, "Kerley B lines: short horizontal lines at lung periphery, perpendicular to pleura — represent thickened interlobular septa, commonly from pulmonary edema.", "basic"],
    ["A patient with right heart failure typically shows which CXR/echo findings?",
     ["Cardiomegaly with pulmonary edema only", "Enlarged RA/RV, dilated SVC/IVC, dilated PA, and possibly hepatic congestion on imaging", "Lung consolidation only", "Boot-shaped heart"],
     1, "Right heart failure: RA/RV enlargement, dilated SVC/IVC, RV dysfunction on echo, hepatic congestion (nutmeg liver on CT/US), peripheral edema clinically.", "advanced"],
    ["Which imaging finding distinguishes ARDS (non-cardiogenic edema) from cardiogenic pulmonary edema on CXR?",
     ["Bilateral infiltrates only", "Patchy peripheral distribution with normal heart size and no effusions in ARDS, vs cardiomegaly with effusions in cardiogenic edema", "Cephalization is exclusive to ARDS", "Hilar enlargement is unique to ARDS"],
     1, "Cardiogenic edema: cardiomegaly, cephalization, Kerley B lines, pleural effusions, central distribution. ARDS: normal heart size, peripheral distribution, no effusions, often patchy.", "advanced"]
  ]],
  [6, "List the imaging modalities (CT calcium scoring, nuclear medicine stress tests, and angiography) currently used in evaluation of CAD and how they are performed", [
    ["Coronary artery calcium (CAC) scoring is performed using:",
     ["Conventional X-ray", "Non-contrast cardiac CT (low-dose) measuring calcified plaque burden via Agatston score", "Contrast-enhanced echo", "Cardiac MRI"],
     1, "CAC scoring: low-dose non-contrast CT, ECG-gated, calculates Agatston score. CAC = 0 = very low risk; CAC ≥100 = increased risk; CAC ≥300 = high risk.", "basic"],
    ["Nuclear myocardial perfusion imaging (e.g., SPECT) typically uses which radiotracer?",
     ["Iodine-131", "Technetium-99m sestamibi (or thallium-201)", "Fluorine-18 only", "Gadolinium"],
     1, "SPECT MPI: typically Tc-99m sestamibi or Tc-tetrofosmin; thallium-201 also used. Stress and rest images compared to identify reversible (ischemia) vs fixed (infarct) defects.", "basic"],
    ["A 60-year-old undergoes coronary angiography that shows 80% stenosis of the proximal LAD. The most likely next step in management is:",
     ["Reassurance", "Discussion of revascularization options (PCI vs CABG) along with optimal medical therapy", "Medical therapy alone without further consideration", "Coronary CT angiography"],
     1, "Significant LAD stenosis (>70%) with appropriate clinical context (symptoms, ischemia on stress test) usually warrants discussion of revascularization. SYNTAX score and clinical factors guide PCI vs CABG.", "advanced"],
    ["Coronary CT angiography (CCTA) is most useful in:",
     ["High-pretest probability ACS for emergent intervention", "Low-to-intermediate pretest probability CAD as a non-invasive 'rule-out'", "Diagnosing AFib", "Quantifying calcium only"],
     1, "CCTA: excellent NEGATIVE predictive value (rules out obstructive CAD) in low-to-intermediate-risk patients. Can show plaque morphology and calcium. Less useful in high-pretest probability where invasive cath is preferred.", "advanced"]
  ]],
  [7, "List the imaging modalities available to evaluate (and treat) peripheral vascular disease (CTA, MRA, conventional angiography) and terminology for common abnormalities", [
    ["The first-line imaging study for suspected PAD in a stable outpatient is typically:",
     ["Conventional angiography", "Ankle-brachial index (ABI) followed by duplex ultrasound or CTA/MRA if intervention is considered", "MRI brain", "Echocardiography"],
     1, "Initial PAD workup: ABI <0.9 = abnormal. Duplex US, CTA, or MRA used for further assessment if intervention considered. Conventional angiography is invasive — usually reserved for therapeutic intervention.", "basic"],
    ["CTA for PAD requires:",
     ["No contrast", "Iodinated contrast IV with rapid imaging", "MRI gadolinium", "Radioactive isotope"],
     1, "CTA: requires iodinated IV contrast — concerns include contrast nephropathy and allergy. Provides excellent vessel detail. MRA can be alternative for renal failure (avoids iodine contrast, but gadolinium has its own concerns).", "basic"],
    ["A 70-year-old with claudication has a CTA showing diffuse atherosclerosis with a focal high-grade stenosis at the right superficial femoral artery. The next best step is:",
     ["Surgical bypass immediately", "Initial trial of supervised exercise + medical therapy (cilostazol, statins, antiplatelets) before considering endovascular intervention", "Conventional angiography only without therapeutic plan", "MRI brain"],
     1, "First-line PAD: medical therapy (statins, antiplatelets, smoking cessation, BP/diabetes control) and supervised exercise. Endovascular or surgical revascularization for lifestyle-limiting/refractory claudication or critical limb ischemia.", "advanced"],
    ["A patient with severe contrast allergy and renal dysfunction needs imaging for suspected PAD. The best modality is:",
     ["CTA with iodinated contrast", "Non-contrast MRA or duplex ultrasound", "Conventional angiography with iodinated contrast", "Nuclear scan"],
     1, "Patients with iodinated contrast allergy or severe renal dysfunction: non-contrast MRA (e.g., time-of-flight) or duplex ultrasound. Gadolinium contrast also concerning at GFR <30 (NSF risk).", "advanced"]
  ]]
]],
[15, "Imaging of the Cardiovascular System II", [
  [1, "Describe the normal cardiac silhouette on PA and lateral chest radiographs", [
    ["A properly inspired PA CXR should show how many posterior ribs above the hemidiaphragm?",
     ["At least 5", "At least 7", "At least 9-10", "At least 12"],
     2, "Adequate inspiration: ≥9-10 posterior ribs visible above the hemidiaphragm. Poor inspiration falsely enlarges the heart and creates basilar crowding mimicking edema.", "basic"],
    ["The normal aortic knob is seen on PA CXR as:",
     ["Right heart border", "Bulge on the upper left mediastinal contour, just above the main PA segment", "Lower left heart border", "Cardiac apex"],
     1, "The aortic knob appears as a bulge on the upper left mediastinal contour above the main PA segment. Calcification, enlargement, or 'unfolding' suggests aging or hypertensive vascular disease.", "basic"],
    ["The 'silhouette sign' on CXR refers to:",
     ["Loss of normally visible interface between adjacent structures of similar density indicating disease in the contiguous lung", "Calcification of vessels", "Hyperlucent areas in lungs", "Mediastinal shift"],
     0, "Silhouette sign: when a normally crisp interface (e.g., right heart border) is lost, the disease must be in the lung adjacent to that border. Loss of right heart border = RML disease.", "advanced"],
    ["A loss of the LEFT hemidiaphragm silhouette on PA CXR localizes pathology to:",
     ["Right middle lobe", "Lingula", "Left lower lobe", "Right upper lobe"],
     2, "The left hemidiaphragm abuts the LLL. Silhouette loss there indicates LLL pathology. (Loss of left heart border = lingula; loss of right heart border = RML.)", "advanced"]
  ]],
  [2, "Recognize major abnormalities of the cardiomediastinal silhouette, including chamber enlargement", [
    ["A 'water bottle' shaped cardiac silhouette on CXR suggests:",
     ["Pulmonary embolism", "Large pericardial effusion", "Tricuspid regurgitation", "Mitral stenosis"],
     1, "Water-bottle heart: globular cardiac silhouette from large pericardial effusion. Confirm with echo. Sign that may be subtle — clinical context essential.", "basic"],
    ["LA enlargement on lateral CXR is suggested by:",
     ["Posterior bulge of the upper cardiac border (LA pushing posteriorly)", "Filling of retrosternal clear space", "Boot-shaped silhouette", "Wide mediastinum"],
     0, "On lateral CXR, an enlarged LA bulges posteriorly, displacing the esophagus posteriorly (visible on barium swallow). Lifts left mainstem bronchus on PA view.", "basic"],
    ["A 60-year-old has a CXR showing an enlarged 'figure-of-3' aortic contour. The most likely diagnosis is:",
     ["Aortic aneurysm only", "Coarctation of the aorta with pre- and post-stenotic dilation", "Mitral stenosis", "ASD"],
     1, "'Figure of 3' on CXR: indentation at site of coarctation with pre/post-stenotic dilation of the aorta. Rib notching may also be seen from collateral circulation.", "advanced"],
    ["A patient has CXR showing pulmonary plethora and prominent main PA segment. Echo shows shunt at the atrial level. This pattern is most consistent with:",
     ["Atrial septal defect (left-to-right shunt)", "Aortic stenosis", "Mitral regurgitation only", "Tetralogy of Fallot"],
     0, "Pulmonary plethora (increased pulmonary vasculature) + prominent main PA + RV dilation suggests a left-to-right shunt. ASD is a common adult presentation. Echo confirms.", "advanced"]
  ]],
  [3, "Understand the use of 2D and Doppler echocardiography in the evaluation of the heart", [
    ["Color Doppler is most useful for:",
     ["Static structural anatomy", "Visualizing the direction and turbulence of blood flow (e.g., regurgitation jets)", "Wall thickness", "Quantifying calcium"],
     1, "Color Doppler superimposes flow direction (red toward, blue away) on 2D image. Excellent for identifying valvular regurgitation, shunts, and turbulent jets.", "basic"],
    ["Continuous-wave Doppler is preferred over pulsed-wave Doppler when:",
     ["Anatomic localization of flow is required", "High-velocity flow (e.g., severe AS or regurgitation jet) needs to be measured without aliasing", "No flow needs measurement", "Only color information is needed"],
     1, "PW Doppler: range-gated (location-specific) but limited by Nyquist limit (aliases at high velocity). CW Doppler: any velocity but no localization. Use CW for high-velocity stenotic/regurgitant jets.", "basic"],
    ["Transesophageal echo (TEE) is preferred over TTE for:",
     ["General LV function assessment", "Better visualization of LA appendage thrombus, prosthetic valves, posterior structures, and aortic dissection", "Quick bedside imaging", "Pediatric patients only"],
     1, "TEE: probe in esophagus close to LA/aorta. Better resolution of posterior structures (LAA, MV, prosthetic valves), aortic dissection. Used pre-cardioversion in AFib for LAA thrombus.", "advanced"],
    ["A patient with persistent AFib for 4 weeks needs cardioversion. To proceed without 3 weeks of anticoagulation, the appropriate next step is:",
     ["Immediate cardioversion without imaging", "TEE to rule out left atrial appendage thrombus, then cardioversion if no thrombus", "TTE alone is sufficient", "Cardiac MRI"],
     1, "TEE-guided cardioversion: rule out LAA thrombus (TTE cannot reliably image LAA). If no thrombus, cardioversion can proceed. Anticoagulation still required for at least 4 weeks post-cardioversion.", "advanced"]
  ]],
  [4, "Recognize anatomic structures and common pathologic conditions on the standard echocardiographic views", [
    ["The 'apical 2-chamber' view shows:",
     ["LV and LA only (anterior and inferior LV walls)", "All four chambers", "Right heart only", "Aorta isolated"],
     0, "Apical 2-chamber: LV and LA only — visualizes anterior and inferior LV walls. Apical 3-chamber adds aortic valve/LVOT. Apical 4-chamber shows all four chambers.", "basic"],
    ["A pericardial effusion on echo appears as:",
     ["Echo-bright thickening of the myocardium", "Echo-free (anechoic) space surrounding the heart between visceral and parietal pericardium", "Bright color flow inside the LV", "Concentric LVH"],
     1, "Pericardial effusion = anechoic space around the heart. Differentiate from pleural effusion (lateral to descending aorta vs medial). Quantify size as small/moderate/large.", "basic"],
    ["A patient with cardiac tamponade physiology will show which echo finding?",
     ["Hyperdynamic LV", "RA collapse during systole and RV diastolic collapse, plus respiratory variation in mitral inflow >25%", "LVH alone", "AS alone"],
     1, "Tamponade echo: RA systolic collapse (sensitive), RV diastolic collapse (specific), respiratory variation in mitral inflow (>25%) and tricuspid inflow (>40%) — equivalent of pulsus paradoxus.", "advanced"],
    ["Asymmetric septal hypertrophy with systolic anterior motion (SAM) of the mitral valve and dynamic LVOT obstruction is characteristic of:",
     ["Dilated cardiomyopathy", "Hypertrophic obstructive cardiomyopathy (HOCM)", "Restrictive cardiomyopathy", "Aortic stenosis"],
     1, "HOCM hallmarks on echo: asymmetric septal hypertrophy, SAM of MV, dynamic LVOT obstruction (gradient that increases with Valsalva or standing), often MR.", "advanced"]
  ]],
  [5, "Recognize the imaging manifestations of congestive heart failure, and of right heart failure", [
    ["A 'bat-wing' or 'butterfly' pattern of bilateral perihilar opacities on CXR represents:",
     ["Mediastinal mass", "Alveolar pulmonary edema", "Bilateral pneumonia", "Lymphangitic carcinomatosis only"],
     1, "Bat-wing/butterfly: bilateral central perihilar alveolar opacities sparing periphery, classic for severe alveolar pulmonary edema (cardiogenic).", "basic"],
    ["A pleural effusion on CXR appears as:",
     ["Hyperlucent area at the lung apex", "Blunting of the costophrenic angle (small) progressing to meniscus sign and opacification", "Increased perihilar markings", "Cavitary lesion"],
     1, "Pleural effusion: blunting of costophrenic angle initially (~150-200 mL needed), progressing to meniscus and complete hemithorax opacification with mediastinal shift in massive effusion.", "basic"],
    ["A patient with chronic right heart failure may show which CT finding in the abdomen?",
     ["Pancreatic atrophy", "Hepatic congestion ('nutmeg liver') and ascites", "Spleen calcifications", "Adrenal hyperplasia"],
     1, "Chronic right HF: hepatic congestion (heterogeneous enhancement = nutmeg liver), hepatomegaly, ascites, and dilated IVC and hepatic veins on CT/US.", "advanced"],
    ["Echo shows D-shaped LV in short axis during systole. This finding most directly reflects:",
     ["LV pressure overload", "RV pressure overload (e.g., pulmonary HTN, PE) flattening the interventricular septum", "Atrial septal defect", "Aortic stenosis"],
     1, "RV pressure overload causes the IVS to flatten/bulge into the LV, giving a D-shaped LV in short axis (especially in systole). Seen in PE, pulmonary HTN, RV failure.", "advanced"]
  ]],
  [6, "List the imaging modalities (CT calcium scoring, nuclear medicine stress tests, and angiography) currently used in evaluation of CAD and how they are performed", [
    ["A patient unable to exercise is referred for stress testing. The most appropriate study is:",
     ["Standard treadmill exercise stress test", "Pharmacologic stress (e.g., regadenoson or dobutamine) with imaging", "ECG only at rest", "Echo only at rest"],
     1, "Patients unable to exercise: pharmacologic stress (vasodilator [adenosine, regadenoson, dipyridamole] for nuclear; dobutamine for echo). Combine with imaging since stress ECG alone has low sensitivity.", "basic"],
    ["A reversible perfusion defect on SPECT MPI represents:",
     ["Old myocardial scar/infarction", "Inducible ischemia (defect with stress that resolves at rest)", "Normal myocardium", "Coronary calcium"],
     1, "Reversible defect: poor perfusion with stress, normal at rest = ischemia from significant CAD. Fixed defect (poor at both stress and rest) = scar/old MI.", "basic"],
    ["A 65-year-old asymptomatic man with intermediate ASCVD risk (10-year risk 8%) wants to refine risk stratification. The most appropriate test is:",
     ["Coronary CTA", "Coronary artery calcium (CAC) score", "Invasive coronary angiography", "Stress echocardiography"],
     1, "CAC scoring is best for ASYMPTOMATIC intermediate-risk individuals (5-20% 10-year risk) for further refinement. CAC 0 reduces risk; CAC >100 raises it. Consider statin if elevated.", "advanced"],
    ["Why is coronary CTA NOT typically the first test in patients with high pretest probability of CAD or active chest pain?",
     ["It cannot assess coronary arteries", "Its main strength is rule-OUT (high NPV); high-risk patients with chest pain need invasive cath for definitive diagnosis and possible intervention", "It is too expensive", "It only measures calcium"],
     1, "CCTA: excellent NPV (rule out CAD in low-intermediate risk). High-risk symptomatic patients need invasive cath where intervention can be performed at the same time. Stress testing is intermediate.", "advanced"]
  ]],
  [7, "List the imaging modalities available to evaluate (and treat) peripheral vascular disease (CTA, MRA, conventional angiography) and terminology for common abnormalities", [
    ["The ankle-brachial index (ABI) is calculated as:",
     ["Highest brachial / lowest ankle systolic pressure", "Highest ankle systolic pressure / highest brachial systolic pressure", "Mean of brachial pressures", "Heart rate / age"],
     1, "ABI = highest ankle systolic pressure (DP or PT) / highest brachial systolic pressure. Normal: 1.0-1.4. <0.9: PAD. <0.4: severe/critical limb ischemia. >1.4: non-compressible (e.g., DM, CKD).", "basic"],
    ["Conventional (catheter-based) angiography is most often used for:",
     ["Initial screening for PAD", "Therapeutic intervention (e.g., angioplasty/stent) and definitive evaluation when intervention is planned", "Routine follow-up", "Screening calcium"],
     1, "Conventional angiography is invasive — provides excellent vessel detail and allows immediate intervention (angioplasty, stent, atherectomy). Reserved for diagnostic uncertainty or planned therapy.", "basic"],
    ["A patient with sudden cold, painful, pulseless leg has clinical 'acute limb ischemia.' The next imaging step is:",
     ["Wait for ABI", "Urgent angiography or CTA to identify level of occlusion, with simultaneous preparation for revascularization", "MRI of the spine", "Routine duplex US in 1 week"],
     1, "Acute limb ischemia (Rutherford classification): immediate imaging (CTA, conventional angio) and urgent revascularization (open or endovascular). Time-critical (6 P's: pain, pallor, pulselessness, paresthesia, paralysis, poikilothermia).", "advanced"],
    ["A patient with severe CKD (GFR 25) has suspected mesenteric ischemia. Which imaging is preferred?",
     ["CTA with iodinated contrast", "Non-contrast MRA or carefully planned imaging with low-dose contrast", "MRA with full-dose gadolinium (high risk)", "No imaging needed"],
     1, "Severe CKD (GFR <30): high gadolinium NSF risk; iodinated contrast nephropathy risk. Risk-benefit must be carefully weighed; non-contrast MRA, duplex, or careful contrast use with prophylaxis. In emergencies, contrast may still be required.", "advanced"]
  ]]
]],
[16, "Pericarditis", [
  [1, "List the causes of pericarditis and differentiate them into acute, subacute or chronic in nature", [
    ["The most common cause of acute pericarditis in developed countries is:",
     ["Tuberculosis", "Idiopathic / presumed viral", "Malignancy", "Bacterial infection"],
     1, "In developed countries, the majority of acute pericarditis is idiopathic (presumed viral — coxsackie, echovirus, adenovirus). TB remains a major cause in developing countries.", "basic"],
    ["Acute pericarditis is defined as symptoms lasting:",
     ["<6 weeks", "6 weeks to 6 months", ">6 months", ">1 year"],
     0, "Acute pericarditis: <6 weeks. Subacute: 6 weeks-6 months. Chronic: >6 months. Recurrent: symptom-free interval ≥4-6 weeks before recurrence.", "basic"],
    ["A 65-year-old develops pericarditis 3 weeks after MI. The most likely diagnosis is:",
     ["Idiopathic pericarditis", "Dressler syndrome (post-MI immune-mediated pericarditis)", "Tuberculous pericarditis", "Uremic pericarditis"],
     1, "Dressler syndrome: post-MI immune-mediated pericarditis 1-8 weeks after infarction. Now uncommon due to reperfusion therapy. Treat with NSAIDs/colchicine.", "advanced"],
    ["A patient with end-stage renal disease and BUN 120 develops pericarditis. The most likely cause is:",
     ["Viral pericarditis", "Uremic pericarditis", "Bacterial pericarditis", "Tuberculous pericarditis"],
     1, "Uremic pericarditis: occurs in advanced renal failure (BUN >60 typically). Treat with intensification of dialysis. Heparin-free dialysis preferred (risk of hemorrhagic pericardial effusion).", "advanced"]
  ]],
  [2, "Describe the historical and physical exam findings associated with pericarditis", [
    ["The classic chest pain of acute pericarditis is:",
     ["Crushing substernal pressure radiating to left arm", "Sharp, pleuritic, worse supine and improved by leaning forward", "Burning epigastric pain after meals", "Tearing pain radiating to back"],
     1, "Pericarditic chest pain: sharp, pleuritic, positional (worse supine, better leaning forward). May radiate to trapezius ridge (specific finding due to phrenic nerve irritation).", "basic"],
    ["A pericardial friction rub is best heard:",
     ["With the patient supine, using bell at apex", "With the diaphragm at the LLSB with the patient leaning forward at end-expiration", "Over the right 2nd ICS", "Over the femoral artery"],
     1, "Pericardial rub: scratchy, leathery, often triphasic (atrial systole, ventricular systole, ventricular diastole). Best heard with diaphragm at LLSB, patient leaning forward, end-expiration.", "basic"],
    ["A 30-year-old has 4 days of sharp pleuritic chest pain that improves leaning forward. He has a low-grade fever and a 3-component friction rub. ECG shows diffuse concave ST elevation with PR depression. The diagnosis is:",
     ["Acute MI", "Acute pericarditis (most likely viral)", "Pulmonary embolism", "Aortic dissection"],
     1, "Pleuritic positional chest pain + friction rub + diffuse concave ST elevation with PR depression = acute pericarditis. At least 2 of 4 criteria (pain, rub, ECG changes, effusion) needed for diagnosis.", "advanced"],
    ["Which physical finding most specifically suggests cardiac tamponade complicating pericarditis?",
     ["Pericardial friction rub", "Beck's triad (hypotension, JVD, muffled heart sounds) and pulsus paradoxus >10 mmHg", "Bibasilar crackles", "S4 gallop"],
     1, "Cardiac tamponade triad (Beck's): hypotension, JVD, muffled heart sounds. Pulsus paradoxus >10 mmHg is a key sign. The friction rub may disappear as effusion grows.", "advanced"]
  ]],
  [3, "Describe the features of pericarditis found on various diagnostic testing modalities", [
    ["The classic ECG findings of acute pericarditis include:",
     ["Diffuse concave ST elevation with PR depression (and reciprocal PR elevation in aVR)", "Localized ST elevation with reciprocal ST depression in opposite leads", "Pathologic Q waves", "Tall peaked T waves"],
     0, "Acute pericarditis ECG: stage 1 = diffuse concave ST elevation + PR depression (PR elevation in aVR). Stage 2 = normalization. Stage 3 = TWI. Stage 4 = normalization.", "basic"],
    ["A pericardial effusion on echocardiogram appears as:",
     ["Echogenic mass within the heart", "Anechoic (echo-free) space surrounding the heart between visceral and parietal pericardium", "Hyperechoic thickening of the LV wall", "Bright color flow inside the LA"],
     1, "Pericardial effusion = anechoic space around the heart (between layers of pericardium). Quantify by depth: small (<1 cm), moderate (1-2 cm), large (>2 cm). Can cause tamponade if rapid.", "basic"],
    ["Cardiac MRI is increasingly used in pericarditis evaluation because it:",
     ["Replaces all other testing", "Detects pericardial inflammation (late gadolinium enhancement of pericardium) and helps assess constrictive vs effusive-constrictive pericarditis", "Measures coronary calcium", "Replaces echo for tamponade"],
     1, "Cardiac MRI: detects pericardial thickening (>4 mm) and inflammation (LGE) — useful for chronic pericarditis, recurrent pericarditis, and evaluating constriction vs restriction.", "advanced"],
    ["A patient with pericarditis has elevated troponin. This finding suggests:",
     ["Pure pericarditis (rules out myocardial involvement)", "Myopericarditis (concomitant myocardial inflammation)", "Pulmonary embolism", "Aortic dissection"],
     1, "Elevated troponin in pericarditis = myopericarditis (myocardial involvement). Generally has good prognosis. Restrict exercise. Monitor for arrhythmia and LV dysfunction; not given high-dose NSAIDs typically.", "advanced"]
  ]],
  [4, "Discuss the various treatment options", [
    ["First-line therapy for idiopathic acute pericarditis is:",
     ["Corticosteroids", "NSAIDs (e.g., ibuprofen or aspirin) plus colchicine", "Empiric antibiotics", "Pericardiectomy"],
     1, "First-line: high-dose NSAIDs (ibuprofen 600-800 mg TID, or ASA 750-1000 mg TID) + colchicine 0.5 mg BID. Colchicine reduces recurrence risk by ~50%.", "basic"],
    ["Colchicine is added to NSAID therapy in pericarditis primarily to:",
     ["Treat infection", "Reduce risk of recurrent pericarditis", "Provide pain relief only", "Replace NSAIDs entirely"],
     1, "Colchicine reduces pericarditis symptoms duration AND substantially decreases recurrence (CORP, ICAP trials). Standard adjunct to NSAIDs unless contraindicated.", "basic"],
    ["A patient with idiopathic pericarditis has had two recurrences despite NSAIDs and colchicine. The next reasonable step is:",
     ["Stop all therapy", "Add low-dose corticosteroids (e.g., prednisone) and continue colchicine", "Pericardiocentesis", "Empiric anti-TB therapy"],
     1, "Recurrent pericarditis refractory to NSAIDs + colchicine: add low-dose steroids (prednisone) — taper carefully. Colchicine reduces recurrence even with steroid use. Anakinra/rilonacept for refractory cases.", "advanced"],
    ["A patient on rivaroxaban for AFib develops pericardial effusion with hemodynamic compromise. The most appropriate management is:",
     ["NSAIDs alone", "Pericardiocentesis with reversal of anticoagulation as needed; hold anticoagulant", "Increase rivaroxaban", "Bedside chest tube"],
     1, "Hemodynamically significant pericardial effusion needs urgent pericardiocentesis. In bleeding-related effusion, hold anticoagulation and reverse if needed (andexanet, PCC).", "advanced"]
  ]],
  [5, "Discuss the complications associated with pericarditis", [
    ["The most life-threatening immediate complication of acute pericarditis is:",
     ["Pleural effusion", "Cardiac tamponade", "Atrial fibrillation", "Pulmonary embolism"],
     1, "Cardiac tamponade is the most acutely life-threatening complication. Rapidly accumulating effusions (even small) can cause tamponade. Treatment is urgent pericardiocentesis.", "basic"],
    ["Constrictive pericarditis is a chronic complication characterized by:",
     ["Acute large effusion", "Fibrosis/calcification of the pericardium causing impaired diastolic filling and right heart failure-like presentation", "Acute MI", "Atrial septal defect"],
     1, "Constrictive pericarditis: rigid pericardium impairs ventricular filling → right heart failure picture (JVD, ascites, edema, Kussmaul sign, pericardial knock, pericardial calcification on imaging).", "basic"],
    ["A patient with prior tuberculous pericarditis presents with progressive lower extremity edema, ascites, and elevated JVP that paradoxically rises with inspiration (Kussmaul sign). The most likely diagnosis is:",
     ["Acute pericarditis with effusion", "Chronic constrictive pericarditis", "Right heart failure from cor pulmonale", "Cardiac tamponade"],
     1, "Constrictive pericarditis classically follows TB, radiation, viral, or post-cardiac surgery. Kussmaul sign and pericardial knock are characteristic. Treatment: pericardiectomy.", "advanced"],
    ["The KEY hemodynamic distinction between cardiac tamponade and constrictive pericarditis is:",
     ["Tamponade has prominent y descent (rapid early filling); constriction has blunted y descent", "Tamponade has BLUNTED y descent (filling impaired throughout diastole); constriction has prominent y descent (rapid early filling, then sudden halt)", "Both have absent y descent", "Tamponade has Kussmaul sign while constriction does not"],
     1, "Tamponade: blunted y descent (filling impaired throughout diastole). Constriction: prominent y descent (early rapid filling halted by rigid pericardium = 'square root' or 'dip and plateau' sign on RV pressure tracing).", "advanced"]
  ]]
]],
[17, "ECG Review/Self-Study (Wide Complex Tachycardias)", [
  [1, "Describe the locations or sources of wide complex tachycardias, including below the AV node, within His-Purkinje, and over an accessory pathway", [
    ["A wide complex tachycardia originating below the AV node from ventricular myocardium is termed:",
     ["SVT with aberrancy", "Ventricular tachycardia", "Atrial flutter with rapid response", "Junctional tachycardia"],
     1, "VT originates in ventricular myocardium below the bundle bifurcation. Wide QRS due to slow non-Purkinje conduction. The most dangerous WCT category.", "basic"],
    ["SVT with aberrancy refers to:",
     ["Ventricular ectopic beats only", "Supraventricular tachycardia conducted with bundle branch block (or rate-related aberrancy)", "Antidromic AVRT", "Atrial fibrillation always"],
     1, "SVT with aberrancy: supraventricular impulse (sinus tach, AFib, AVNRT, etc.) conducted via abnormal pathway producing wide QRS. The wide QRS resembles RBBB or LBBB.", "basic"],
    ["A patient with WPW develops AFib that conducts antegrade down the accessory pathway. The ECG appearance is:",
     ["Narrow QRS regular tachycardia", "Wide, irregular tachycardia (often very fast, with bizarre morphology)", "Slow narrow QRS with irregularly irregular RR", "Sinus tachycardia"],
     1, "AFib in WPW with antegrade accessory pathway conduction: irregularly irregular wide-complex tachycardia (often 200+ bpm) — high risk for VF. Avoid AV nodal blockers; use procainamide or cardioversion.", "advanced"],
    ["A wide regular tachycardia at 180 bpm with QRS that resembles the patient's known LBBB at baseline is most likely:",
     ["Ventricular tachycardia", "Sinus tachycardia or SVT with pre-existing LBBB (rate-independent BBB)", "Antidromic AVRT", "Atrial flutter with 1:1 conduction"],
     1, "Pre-existing BBB with comparable QRS morphology in tachycardia favors SVT with aberrancy. Always compare WCT morphology to baseline ECG when available.", "advanced"]
  ]],
  [2, "Explain the initial approach to a patient suspected of a wide complex tachycardia", [
    ["The FIRST step in evaluating a wide complex tachycardia is:",
     ["Detailed ECG analysis", "Assess hemodynamic stability — unstable patients require immediate synchronized cardioversion", "Order troponins", "Adenosine challenge"],
     1, "Always assess hemodynamic stability first. Unstable WCT (hypotension, AMS, ischemia, HF) → immediate synchronized cardioversion regardless of mechanism. Stable WCT can be evaluated.", "basic"],
    ["A stable patient with wide complex tachycardia should be presumed to have:",
     ["SVT with aberrancy", "VT until proven otherwise (especially with structural heart disease history)", "Atrial flutter", "Sinus tachycardia"],
     1, "All wide-complex tachycardia is treated as VT until proven otherwise (~80% are VT, ~95% in patients with prior MI/CMP). Mistreating VT as SVT is dangerous.", "basic"],
    ["A 60-year-old with prior MI presents with WCT at 170 bpm and BP 95/60. The next best step is:",
     ["Adenosine to test response", "IV procainamide or amiodarone (or cardioversion if status worsens)", "Verapamil IV", "Diltiazem IV"],
     1, "Stable VT in patient with structural heart disease: IV procainamide (preferred per recent guidelines, may also terminate SVT) or amiodarone. Avoid verapamil/diltiazem (can degenerate stable VT to unstable). Cardioversion if instability develops.", "advanced"],
    ["A patient in WCT becomes pulseless. The next step is:",
     ["Synchronized cardioversion at 100J", "Defibrillation (unsynchronized) and CPR per ACLS", "Adenosine bolus", "Beta-blocker IV"],
     1, "Pulseless VT/VF: immediate unsynchronized defibrillation + CPR per ACLS. Synchronized cardioversion is for unstable but pulse-having patients.", "advanced"]
  ]],
  [3, "Define the entire ECG features noted in a wide complex tachycardia", [
    ["Capture beats and fusion beats on a wide complex tachycardia ECG strongly suggest:",
     ["SVT with aberrancy", "Ventricular tachycardia (AV dissociation evidence)", "Sinus rhythm", "First-degree AV block"],
     1, "Capture beats (occasional narrow QRS interspersed) and fusion beats (combined sinus + ectopic) imply AV dissociation — strongly suggests VT.", "basic"],
    ["AV dissociation on a WCT strip is identified by:",
     ["P waves marching at one rate, QRS at a different rate, with no consistent relationship", "Constant PR interval", "Regular sinus rhythm", "Atrial fibrillation"],
     0, "AV dissociation: independent atrial and ventricular activity (atrial rate < ventricular rate in VT). Strong evidence for VT.", "basic"],
    ["A 'concordance' pattern where ALL precordial leads (V1-V6) show monomorphic positive (or all negative) QRS is:",
     ["Common in SVT with aberrancy", "Strongly suggestive of VT", "A sign of normal sinus rhythm", "Diagnostic of WPW"],
     1, "Precordial concordance (all positive or all negative QRS V1-V6) strongly favors VT — supraventricular impulses through normal/aberrant pathways usually have transition zone in precordium.", "advanced"],
    ["A WCT with monomorphic QRS, AV dissociation, and QRS duration >160 ms with extreme axis is:",
     ["Almost certainly SVT with aberrancy", "Almost certainly ventricular tachycardia", "Junctional rhythm", "Ventricular escape"],
     1, "VT favored: AV dissociation, very wide QRS (>160 ms LBBB-like or >140 ms RBBB-like), extreme/NW axis, concordance, fusion/capture beats. Use Brugada or aVR criteria.", "advanced"]
  ]],
  [4, "Explain the diagnostic criteria for wide complex tachycardias", [
    ["The first step of the Brugada criteria for WCT diagnosis is:",
     ["Look for AV dissociation in any lead", "Absence of RS complex in all precordial leads (V1-V6) → if absent, diagnose VT", "Look at QRS morphology in V1 only", "Measure PR interval"],
     1, "Brugada step 1: absence of RS pattern in all precordial leads → VT. If RS is present anywhere, proceed to step 2 (RS interval >100 ms → VT) and beyond.", "basic"],
    ["The Vereckei (aVR) criteria for VT include:",
     ["Initial R wave in aVR (instead of usual Q) suggests VT", "Tall T wave in aVR is diagnostic", "Absent QRS in aVR is normal", "Wide QRS only matters in V6"],
     0, "aVR criteria: presence of an INITIAL R wave in aVR (rather than the usual Q) suggests VT. Other steps assess initial vs terminal velocity ratios in aVR.", "basic"],
    ["Apply Brugada to a WCT: V1-V6 all show RS pattern. The RS interval (start of R to nadir of S) measures 120 ms. The diagnosis is:",
     ["VT (RS interval >100 ms in any precordial lead)", "SVT with aberrancy", "Sinus tachycardia", "First-degree AV block"],
     0, "Brugada step 2: any precordial RS interval >100 ms = VT. The longer interval reflects slow conduction typical of VT (not normal Purkinje conduction).", "advanced"],
    ["According to Brugada criteria, AV dissociation diagnosed at any step indicates:",
     ["SVT with aberrancy", "VT (highly specific finding)", "Atrial flutter", "Junctional rhythm"],
     1, "AV dissociation at any Brugada step → VT (highly specific). Absent in most SVTs with aberrancy where atria and ventricles maintain a fixed relationship.", "advanced"]
  ]]
]],
[18, "Primary (Essential)/Resistant Hypertension", [
  [1, "Describe the stages of hypertension", [
    ["According to current ACC/AHA guidelines, Stage 1 hypertension is defined as:",
     ["BP 120-129 / <80 mmHg", "BP 130-139 / 80-89 mmHg", "BP 140-159 / 90-99 mmHg", "BP ≥160 / ≥100 mmHg"],
     1, "ACC/AHA 2017+: Normal <120/80; Elevated 120-129/<80; Stage 1 130-139/80-89; Stage 2 ≥140/90.", "basic"],
    ["Stage 2 hypertension by ACC/AHA criteria is:",
     ["BP 130-139 / 80-89 mmHg", "BP 140-159 / 90-99 mmHg only", "BP ≥140 / ≥90 mmHg", "BP ≥180 / ≥120 mmHg"],
     2, "Stage 2 HTN: BP ≥140/90 mmHg. The cutpoints are conservative compared to JNC8. Stage 1 (130-139/80-89) often warrants pharmacotherapy if 10-year ASCVD risk ≥10%.", "basic"],
    ["A 50-year-old has a clinic BP of 138/86 mmHg confirmed on multiple visits. He has no other CV risk factors and a 10-year ASCVD risk of 5%. The most appropriate initial management is:",
     ["Start ACE inhibitor immediately", "Lifestyle modifications (DASH diet, exercise, weight loss, alcohol moderation, sodium restriction)", "Add 3 antihypertensive drugs", "Beta-blocker monotherapy"],
     1, "Stage 1 HTN with ASCVD risk <10%: lifestyle changes first. Pharmacotherapy if Stage 1 with ≥10% ASCVD risk, diabetes, CKD, prior CV event, or Stage 2.", "advanced"],
    ["A patient has clinic BP 145/92, but home BP averages 128/78. The diagnosis is:",
     ["True Stage 2 HTN", "White coat hypertension", "Masked hypertension", "Resistant HTN"],
     1, "White coat HTN: clinic BP elevated but home/ABPM normal. Confirmed by ABPM. Generally has lower CV risk than sustained HTN but still warrants periodic monitoring.", "advanced"]
  ]],
  [2, "Describe the clinical and laboratory evaluation of hypertension", [
    ["Initial laboratory workup of new HTN should include:",
     ["CBC, CMP, lipid panel, urinalysis, ECG, and TSH", "Stress test only", "Genetic testing", "Cardiac MRI"],
     0, "Initial HTN evaluation: serum chemistries (electrolytes, creatinine, glucose, calcium), lipid panel, urinalysis (proteinuria), ECG (LVH, prior MI), TSH, urine albumin/Cr ratio. Look for end-organ damage and secondary causes.", "basic"],
    ["A 35-year-old with new severe HTN (170/110) and hypokalemia despite no diuretics raises suspicion for:",
     ["Essential hypertension", "Primary aldosteronism (Conn syndrome)", "Pheochromocytoma", "Renal artery stenosis"],
     1, "Hypokalemia + HTN + young age = primary hyperaldosteronism. Screen with plasma aldosterone-to-renin ratio. Most common cause of secondary HTN; often missed.", "basic"],
    ["A 60-year-old with severe HTN and bilateral abdominal bruits has a creatinine that rises after starting an ACE inhibitor. The most likely diagnosis is:",
