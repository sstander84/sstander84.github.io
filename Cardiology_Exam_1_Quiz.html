     ["Essential HTN", "Bilateral renal artery stenosis (atherosclerotic) — ACEi removes efferent vasoconstriction in already underperfused kidneys", "Pheochromocytoma", "Primary aldosteronism"],
     1, "Bilateral RAS or unilateral RAS in solitary functioning kidney: ACEi/ARB drops GFR (efferent vasodilation in low-flow kidney). Imaging (Duplex, CTA, MRA) confirms.", "advanced"],
    ["A young woman with new HTN, episodic palpitations, headaches, and sweating has urine metanephrines markedly elevated. The most likely diagnosis is:",
     ["Pheochromocytoma", "Hyperthyroidism", "Anxiety disorder", "Primary aldosteronism"],
     0, "Pheochromocytoma classic triad: episodic headache + palpitations + sweating with paroxysmal HTN. Diagnosis: plasma free or 24-h urine fractionated metanephrines. Treatment: α-blockade FIRST, then β-blockade, then surgery.", "advanced"]
  ]],
  [3, "Describe the general overview of non-pharmacological and pharmacological treatment of hypertension", [
    ["The DASH diet is recommended in HTN because it:",
     ["Eliminates carbohydrates", "Emphasizes fruits, vegetables, low-fat dairy, whole grains, lean protein with reduced sodium", "Is high in saturated fat", "Avoids all dairy"],
     1, "DASH (Dietary Approaches to Stop Hypertension): rich in fruits, vegetables, low-fat dairy, whole grains, lean protein. Lowers BP by 8-14 mmHg; works synergistically with sodium restriction.", "basic"],
    ["First-line antihypertensive drug classes for the general non-Black population include:",
     ["Beta-blockers and alpha-blockers", "Thiazide diuretics, ACEi/ARB, and CCBs", "Hydralazine and minoxidil", "Loop diuretics alone"],
     1, "First-line HTN therapy (general population): thiazide-type diuretic (chlorthalidone preferred), ACEi/ARB, dihydropyridine CCB (e.g., amlodipine). Beta-blockers reserved for compelling indications (CAD, HF).", "basic"],
    ["A 55-year-old Black patient without CKD or HF is starting therapy for Stage 2 HTN. Which initial regimen has best evidence?",
     ["ACE inhibitor monotherapy", "Thiazide diuretic and/or CCB (better BP-lowering and outcomes in Black patients)", "Beta-blocker monotherapy", "Alpha-blocker"],
     1, "ALLHAT and other data: Black patients without compelling indication respond best to thiazide and CCB. ACEi/ARB less effective as monotherapy. ACEi/ARB still preferred if CKD or HF.", "advanced"],
    ["A patient with HTN AND diabetic nephropathy with proteinuria should be initiated on:",
     ["Beta-blocker monotherapy", "ACE inhibitor or ARB (renal-protective)", "Thiazide alone", "Hydralazine"],
     1, "Diabetic nephropathy with proteinuria: ACEi/ARB are renoprotective (reduce intraglomerular pressure, slow progression). Compelling indication beyond BP control alone.", "advanced"]
  ]],
  [4, "Define hypertensive crisis and understand its management", [
    ["Hypertensive crisis is defined as:",
     ["BP >130/80", "BP ≥180/120 mmHg", "BP >140/90 with headache", "BP >150/95"],
     1, "Hypertensive crisis: BP ≥180/120 mmHg. Subdivided into urgency (no end-organ damage) and emergency (with end-organ damage).", "basic"],
    ["Hypertensive emergency differs from hypertensive urgency by:",
     ["BP being even higher in emergency", "Presence of acute end-organ damage in emergency (e.g., encephalopathy, ACS, dissection, AKI, papilledema)", "Need for IV therapy in urgency", "Faster onset of urgency"],
     1, "Hypertensive emergency: ≥180/120 PLUS acute end-organ damage (encephalopathy, ACS, ADHF, dissection, eclampsia, AKI, papilledema). Urgency: ≥180/120 without acute damage.", "basic"],
    ["A 60-year-old has BP 220/130, severe headache, papilledema, and confusion. The most appropriate management is:",
     ["Oral nifedipine sublingual", "IV antihypertensive (e.g., nicardipine, labetalol, clevidipine) with goal of MAP reduction by ~20-25% in the first hour", "Wait and observe", "Oral hydrochlorothiazide alone"],
     1, "Hypertensive emergency: IV antihypertensives. Lower MAP by 20-25% in the first hour, then to ~160/100-110 over next 2-6 hours. Avoid abrupt reduction (risk of cerebral hypoperfusion).", "advanced"],
    ["For acute aortic dissection with severe HTN, the goal includes:",
     ["BP reduction with vasodilator alone (e.g., nitroprusside)", "Heart rate control (IV β-blocker like esmolol) FIRST, then vasodilator if needed — to reduce shear stress (dP/dt)", "Increase BP", "Wait for surgery without medical management"],
     1, "Aortic dissection: target SBP ~100-120 mmHg AND HR <60. Use β-blocker FIRST to reduce dP/dt (shear stress). Then add vasodilator (nicardipine, nitroprusside). Avoid pure vasodilators alone (reflex tachycardia worsens shear).", "advanced"]
  ]],
  [5, "Describe clinical aspects and treatment of isolated systolic hypertension", [
    ["Isolated systolic hypertension is defined as:",
     ["SBP <120, DBP >80", "SBP ≥130 with DBP <80", "SBP and DBP both ≥140/90", "Variable BP without specific criteria"],
     1, "ISH: SBP elevated (≥130 by ACC/AHA, classically ≥140) with DBP <80. Common in older adults due to large-artery stiffening, with wide pulse pressure.", "basic"],
    ["The most common cause of isolated systolic HTN in older adults is:",
     ["Pheochromocytoma", "Age-related arterial stiffening (loss of arterial compliance)", "Cushing syndrome", "Acute renal failure"],
     1, "Aging → arterial stiffening (loss of elastin, collagen accumulation) → reduced Windkessel effect → increased SBP and decreased DBP → wide pulse pressure.", "basic"],
    ["A 75-year-old has BP 168/72 (wide PP). Treatment is associated with reduced stroke and CV events when:",
     ["Aggressive BP lowering to SBP <120", "SBP is reduced gradually with thiazide and/or CCB, with care to avoid hypotension and DBP <60", "BP is left untreated", "DBP is targeted alone"],
     1, "ISH treatment: target SBP <130 (or per shared decision-making in elderly with frailty). Thiazide ± dihydropyridine CCB. Watch for hypotension; avoid driving DBP too low (<60 may compromise coronary perfusion).", "advanced"],
    ["A 78-year-old with ISH has BP 170/65 mmHg, CKD stage 3, and orthostatic dizziness. The goal of therapy includes:",
     ["Aggressive lowering regardless of orthostasis", "Individualized goal balancing CV risk reduction with avoidance of orthostatic hypotension and AKI", "Stop all therapy", "DBP target as primary goal"],
     1, "Elderly ISH with frailty/orthostasis/CKD: individualized goal. SPRINT showed benefit of <120 systolic in non-frail elderly, but accept higher targets if intolerance, AKI, or symptomatic hypotension.", "advanced"]
  ]],
  [6, "Define resistant hypertension and discuss its management options", [
    ["Resistant hypertension is defined as:",
     ["BP elevated on monotherapy", "BP above goal despite ≥3 antihypertensive medications at maximally tolerated doses including a diuretic, OR BP at goal requiring ≥4 medications", "BP >150 systolic only", "Failure of one ACEi"],
     1, "Resistant HTN: BP above goal on ≥3 drugs (including a diuretic) at appropriate doses, OR controlled on ≥4 drugs. Confirm BP measurements; rule out white coat, non-adherence, and secondary causes.", "basic"],
    ["The first step in evaluating apparent resistant HTN is:",
     ["Add a 4th medication immediately", "Verify proper BP measurement, assess adherence, and consider ABPM (rule out white coat HTN)", "Start IV antihypertensives", "Order brain MRI"],
     1, "Workup of resistant HTN: confirm BP technique, exclude white coat HTN with ABPM, review adherence, look for offending substances (NSAIDs, decongestants, alcohol), and screen for secondary causes.", "basic"],
    ["A 50-year-old with truly resistant HTN despite chlorthalidone, lisinopril, and amlodipine at maximal doses. The next agent with strongest evidence is:",
     ["Beta-blocker", "Spironolactone (mineralocorticoid receptor antagonist)", "Hydralazine", "Clonidine"],
     1, "PATHWAY-2 trial: spironolactone is superior to bisoprolol/doxazosin as a 4th-line agent in resistant HTN. Reflects role of subclinical aldosterone excess. Watch K+ and creatinine.", "advanced"],
    ["Renal artery stenosis is suggested as a cause of resistant HTN by which finding?",
     ["Bilateral abdominal bruits, AKI on starting ACEi, or asymmetric kidneys on imaging", "Hypokalemia alone", "Cushingoid features", "Adrenal mass"],
     0, "Clues to RAS: abdominal bruit, AKI on starting ACEi/ARB, asymmetric kidneys (>1.5 cm difference), flash pulmonary edema, atherosclerotic disease elsewhere. Confirm with Duplex, CTA, or MRA.", "advanced"]
  ]]
]],
[19, "Antihypertensive Agents I", [
  [1, "List different classes of drugs (Central-cerebral, Cardiac, Renal, Peripheral) used in treating hypertension with specific agents", [
    ["Which medication is a CENTRAL alpha-2 agonist used in hypertension?",
     ["Lisinopril", "Clonidine", "Amlodipine", "Hydrochlorothiazide"],
     1, "Clonidine: central α2 agonist that decreases sympathetic outflow. Other central agents: methyldopa (preferred in pregnancy). Reserved for resistant HTN due to side effects.", "basic"],
    ["Which represents a CARDIAC-acting antihypertensive (β-blocker)?",
     ["Lisinopril", "Atenolol", "Lisdexamfetamine", "Lanthanum"],
     1, "Atenolol is a β1-selective blocker. Other β-blockers: metoprolol, bisoprolol, propranolol (non-selective), carvedilol (also α1-blocker). Lower HR, contractility, and renin release.", "basic"],
    ["A 60-year-old with HTN starts amlodipine 5 mg. The mechanism of this CCB is:",
     ["Block presynaptic Ca uptake", "Block L-type Ca²⁺ channels in vascular smooth muscle (dihydropyridine class) — vasodilation with little cardiac effect", "Block sympathetic nerves", "Block renin"],
     1, "Amlodipine is a dihydropyridine CCB: blocks L-type Ca²⁺ channels primarily in vascular smooth muscle → vasodilation. Less cardiac depression than non-DHP (verapamil/diltiazem). Common SE: peripheral edema.", "advanced"],
    ["Hydralazine acts on which target?",
     ["Sympathetic nervous system", "Direct arterial vasodilation (mechanism not fully defined; possibly via nitric oxide pathway)", "ACE", "K-ATP channels"],
     1, "Hydralazine: direct arterial vasodilator. Used in HF (with isosorbide dinitrate) in Black patients (A-HeFT trial), pregnancy HTN, and refractory HTN. Reflex tachycardia and lupus-like reaction at high doses.", "advanced"]
  ]],
  [2, "Explain the mechanisms of action of each drug class", [
    ["ACE inhibitors lower BP by:",
     ["Blocking aldosterone receptors directly", "Inhibiting conversion of angiotensin I to angiotensin II, reducing vasoconstriction and aldosterone", "Blocking β1 receptors", "Blocking Ca²⁺ channels"],
     1, "ACEi inhibits ACE → ↓ATII → ↓vasoconstriction, ↓aldosterone, ↑bradykinin (cough, angioedema). Renal: efferent arteriolar dilation reduces glomerular pressure (renoprotective).", "basic"],
    ["ARBs (angiotensin II receptor blockers) act by:",
     ["Blocking ACE enzyme", "Blocking the AT1 receptor for angiotensin II", "Blocking renin release", "Blocking aldosterone"],
     1, "ARBs: AT1 receptor antagonists. Block ATII action → similar effects to ACEi but no bradykinin accumulation (less cough, less angioedema, but still some risk). Examples: losartan, valsartan, telmisartan.", "basic"],
    ["A patient develops cough on lisinopril. Switching to losartan eliminates the cough because:",
     ["ARBs work on β receptors", "ARBs do not increase bradykinin (which causes ACEi cough), since they act downstream of ACE", "Losartan is given IV", "ARBs prevent cough by suppressing the cough reflex centrally"],
     1, "ACEi increases bradykinin (less broken down) → cough in 5-20%, angioedema. ARBs block AT1 receptor downstream — no bradykinin accumulation → no cough.", "advanced"],
    ["Verapamil and diltiazem differ from amlodipine because they:",
     ["Are dihydropyridines", "Are non-dihydropyridine CCBs that act on cardiac as well as vascular Ca channels (slow HR, decrease contractility)", "Have no antihypertensive effect", "Are pure vasodilators"],
     1, "Non-DHP CCBs (verapamil, diltiazem): cardiac and vascular effects; slow AV conduction (used for rate control in AFib), decrease contractility. Avoid combining with β-blockers (additive AV block, hypotension).", "advanced"]
  ]],
  [3, "Describe other therapeutic uses and rationale for various antihypertensive drugs", [
    ["Beta-blockers have a compelling indication in:",
     ["Asthma", "Heart failure with reduced ejection fraction, post-MI, and angina", "Pure peripheral vascular disease", "Volume depletion"],
     1, "β-blockers: compelling indications include HFrEF (carvedilol, metoprolol succinate, bisoprolol), post-MI, angina, AFib rate control, migraine. Avoid in active asthma (especially non-selective).", "basic"],
    ["ACE inhibitors are preferred in HTN patients with:",
     ["Pregnancy", "Heart failure, diabetic nephropathy, post-MI with LV dysfunction, CKD", "Bilateral renal artery stenosis", "Pure aortic stenosis"],
     1, "ACEi compelling indications: HFrEF, diabetic nephropathy, post-MI with LV dysfunction, CKD with proteinuria. Contraindicated in pregnancy and bilateral RAS.", "basic"],
    ["A 55-year-old with HTN and HFrEF (EF 30%) is started on which combination?",
     ["Amlodipine + clonidine", "ACEi or ARNI + β-blocker (e.g., carvedilol or metoprolol succinate) + spironolactone + SGLT2 inhibitor (GDMT)", "HCTZ alone", "Verapamil + diltiazem"],
     1, "HFrEF GDMT (4 pillars, 2026): ARNI (or ACEi/ARB) + evidence-based β-blocker + MRA (spironolactone/eplerenone) + SGLT2 inhibitor. Diuretics for symptom control.", "advanced"],
    ["A 50-year-old with HTN and benign prostatic hyperplasia (BPH) might benefit from which agent?",
     ["β-blocker", "α1-blocker (e.g., doxazosin or terazosin) — addresses BPH and HTN", "Diuretic", "ACE inhibitor"],
     1, "α1-blockers (doxazosin, terazosin, tamsulosin) relax bladder neck/prostate smooth muscle → improved BPH symptoms AND modest BP reduction. Watch for orthostasis. Not first-line for HTN alone (ALLHAT).", "advanced"]
  ]],
  [4, "Describe adverse effects of different classes of antihypertensive drugs", [
    ["The most common adverse effect of dihydropyridine CCBs (e.g., amlodipine) is:",
     ["Cough", "Peripheral edema", "Hyperkalemia", "Bradycardia"],
     1, "Amlodipine: peripheral edema (precapillary dilation > postcapillary) — dose-dependent, more in women. Other SEs: flushing, headache, gingival hyperplasia. NOT volume overload — diuretics don't help.", "basic"],
    ["Thiazide diuretics commonly cause:",
     ["Hyperkalemia", "Hypokalemia, hyponatremia, hyperuricemia, mild hyperglycemia, hypercalcemia", "Bradycardia", "Hyperthyroidism"],
     1, "Thiazide SEs: hypoK, hypoNa, hyperCa, hyperuricemia (gout), mild hyperglycemia, increased lipids, sexual dysfunction, sulfa allergy possible.", "basic"],
    ["A 70-year-old on lisinopril 40 mg has K of 5.6 mEq/L and creatinine rising from 1.2 to 1.6. The next step is:",
     ["Increase the dose", "Reduce dose, evaluate volume status, hold offending agents, look for underlying issues (RAS, AKI, dehydration), recheck labs", "Continue without change", "Switch to spironolactone"],
     1, "ACEi can cause hyperkalemia, AKI (especially in volume depletion, RAS, CKD). Mild rise (<30%) often acceptable; persistent hyperkalemia or larger Cr increase warrants reduction/discontinuation.", "advanced"],
    ["Carvedilol is generally avoided in:",
     ["Severe asthma (non-selective β-blocker can trigger bronchospasm)", "Hypertension", "Heart failure", "Atrial fibrillation"],
     0, "Carvedilol: non-selective β + α1 blocker. Avoid in severe reactive airway disease (β2 blockade → bronchospasm). Cardioselective (β1) options like metoprolol/bisoprolol are preferred in mild asthma if β-blocker required.", "advanced"]
  ]],
  [5, "Identify the drugs used in the RAAS system and explain mechanisms of therapeutic and adverse effects", [
    ["Aliskiren is a:",
     ["ACE inhibitor", "Direct renin inhibitor", "ARB", "Mineralocorticoid receptor antagonist"],
     1, "Aliskiren: direct renin inhibitor. Blocks renin → reduced ATI/ATII/aldosterone. Modest BP-lowering. Avoid combining with ACEi/ARB (renal, hyperK, hypotension risk).", "basic"],
    ["Spironolactone acts as:",
     ["ACE inhibitor", "Mineralocorticoid receptor antagonist (aldosterone antagonist)", "Loop diuretic", "ARB"],
     1, "Spironolactone: aldosterone receptor antagonist (also blocks androgen receptors → gynecomastia). Used in HFrEF, resistant HTN, primary hyperaldosteronism, ascites. Watch K and creatinine.", "basic"],
    ["A 60-year-old patient with HFrEF is on lisinopril, carvedilol, and spironolactone. He develops K 6.0. The most appropriate action is:",
     ["Stop spironolactone first; consider eplerenone (less hyperK risk) or reduce ACEi dose; recheck K closely", "Increase the lisinopril", "Continue with no change", "Add another ACE inhibitor"],
     0, "Hyperkalemia from RAAS combination: hold/reduce spironolactone first; eplerenone has slightly less hyperK risk. Reduce ACEi/ARB if needed. Newer options: K-binders (patiromer, sodium zirconium) allow GDMT continuation.", "advanced"],
    ["Sacubitril/valsartan (ARNI) combines an ARB with a:",
     ["ACE inhibitor", "Neprilysin inhibitor (sacubitril) — preserves natriuretic peptides", "Beta-blocker", "Diuretic"],
     1, "ARNI = ARB (valsartan) + neprilysin inhibitor (sacubitril). Neprilysin breaks down ANP/BNP/bradykinin; inhibition preserves these → vasodilation, natriuresis, antifibrotic effects. Superior to enalapril in HFrEF (PARADIGM-HF). Wait 36 hr after ACEi.", "advanced"]
  ]],
  [6, "List agents used in hypertensive emergencies, explaining mechanisms and adverse effects", [
    ["First-line IV agents for hypertensive emergency include:",
     ["Oral nifedipine sublingual (avoided)", "Nicardipine, clevidipine, labetalol, esmolol, nitroprusside, hydralazine (depending on context)", "Atenolol PO", "Furosemide PO"],
     1, "Hypertensive emergency IV agents: nicardipine, clevidipine, labetalol, esmolol, nitroprusside, fenoldopam, hydralazine, enalaprilat. Choice depends on clinical scenario (dissection vs encephalopathy vs eclampsia, etc.).", "basic"],
    ["Sodium nitroprusside acts by:",
     ["β-blockade", "Releasing nitric oxide → balanced arterial and venous vasodilation", "Blocking ACE", "Blocking Ca channels"],
     1, "Nitroprusside: NO donor → balanced arteriovenous vasodilation. Rapid onset/offset. Risk of cyanide and thiocyanate toxicity with prolonged use, hepatic/renal failure. Use lowest effective dose; consider alternatives.", "basic"],
    ["A pregnant patient with eclampsia has BP 195/115. Which IV agent is preferred?",
     ["Nitroprusside (avoid; cyanide toxicity to fetus)", "IV labetalol or hydralazine (preferred in pregnancy)", "ACE inhibitor IV", "ARB IV"],
     1, "Pregnancy hypertensive emergency (eclampsia, severe preeclampsia): IV labetalol, hydralazine, or oral nifedipine. AVOID ACEi/ARB (teratogenic) and nitroprusside (cyanide). Magnesium for seizure prophylaxis.", "advanced"],
    ["A patient with acute pulmonary edema and hypertensive emergency benefits most from:",
     ["IV β-blocker", "IV nitroglycerin (preload and afterload reduction) plus IV loop diuretic", "Hydralazine PO", "Nitroprusside infusion only"],
     1, "Acute decompensated HF / pulmonary edema with hypertensive emergency: IV NTG (venous > arterial dilation, reduces preload and PCWP) + loop diuretic. Avoid β-blocker acutely if shock physiology.", "advanced"]
  ]]
]],
[20, "Antihypertensive Agents II", [
  [1, "List different classes of drugs used in treating hypertension with specific agents", [
    ["Examples of THIAZIDE-type diuretics include:",
     ["Furosemide and bumetanide", "Hydrochlorothiazide, chlorthalidone, indapamide", "Spironolactone and eplerenone", "Mannitol"],
     1, "Thiazide diuretics: HCTZ, chlorthalidone (longer t½, more potent BP effect), indapamide, metolazone. Block Na/Cl cotransporter in DCT. Loop diuretics (furosemide, bumetanide) act in TAL.", "basic"],
    ["Examples of LOOP diuretics include:",
     ["HCTZ and chlorthalidone", "Furosemide, bumetanide, torsemide, ethacrynic acid", "Triamterene and amiloride", "Spironolactone"],
     1, "Loop diuretics: furosemide (Lasix), bumetanide, torsemide, ethacrynic acid (sulfa-free option). Block Na/K/2Cl in TAL. More potent than thiazides; preferred in HF and CKD.", "basic"],
    ["A 55-year-old with HTN and gout flare is currently on HCTZ. Which alternative might be preferred?",
     ["Continue HCTZ", "Consider switching to a different class (e.g., ACEi/ARB, CCB, or loop diuretic) to avoid worsening hyperuricemia", "Add allopurinol and continue HCTZ regardless", "Stop all antihypertensives"],
     1, "Thiazides decrease urate excretion → can worsen gout. Consider non-thiazide options (ACEi, CCB) in patients with refractory gout. Losartan has mild uricosuric effect (modest benefit).", "advanced"],
    ["A 60-year-old with HTN and gynecomastia on spironolactone for HFrEF should be switched to:",
     ["Eplerenone (more selective MR antagonist, less androgen blockade)", "Furosemide instead", "Stop the MRA without replacement", "Use HCTZ instead"],
     0, "Spironolactone: ~10% gynecomastia (androgen receptor blockade). Eplerenone is more selective MR antagonist → less endocrine SE but more expensive. Continue MRA in HFrEF if possible.", "advanced"]
  ]],
  [2, "Explain the mechanisms of action of each drug class", [
    ["Beta-blockers lower BP by:",
     ["Blocking calcium channels", "Decreasing HR, contractility, and renin release; reducing CO and over time, peripheral resistance", "Blocking ACE", "Blocking aldosterone"],
     1, "β-blockers: ↓HR (chronotropy), ↓contractility (inotropy), ↓renin → ↓ATII → ↓BP. Long-term reduction in SVR partly via reduced sympathetic outflow.", "basic"],
    ["Loop diuretics work in the:",
     ["Distal convoluted tubule", "Thick ascending limb of the loop of Henle (block Na/K/2Cl cotransporter)", "Proximal tubule", "Collecting duct"],
     1, "Loop diuretics block Na/K/2Cl in the thick ascending limb. Disrupts countercurrent multiplication → strong diuresis (~25% Na excretion). Also wastes Mg and Ca.", "basic"],
    ["A patient with severe CKD (GFR 20) and resistant HTN is failing thiazide therapy. The next reasonable step is:",
     ["Continue thiazide alone", "Switch to a loop diuretic (or use loop + thiazide combination)", "Stop diuretic", "Add another beta blocker"],
     1, "Thiazides lose efficacy at GFR <30. Switch to loop diuretic (furosemide, torsemide). For diuretic-resistant edema: combine loop with thiazide (e.g., metolazone) for sequential nephron blockade. Monitor closely.", "advanced"],
    ["Verapamil's effect on the AV node makes it useful for:",
     ["Sinus tachycardia", "Rate control in AFib (slows AV nodal conduction)", "Increasing inotropy", "Treating HFrEF"],
     1, "Non-DHP CCBs (verapamil, diltiazem): slow AV nodal conduction → useful for rate control in AFib/atrial flutter. Avoid in HFrEF (negative inotropy worsens HF).", "advanced"]
  ]],
  [3, "Describe other therapeutic uses and rationale for various antihypertensive drugs", [
    ["A patient with HTN and migraine prophylaxis indication might benefit from:",
     ["Hydralazine", "Propranolol or metoprolol (β-blocker; first-line for migraine prophylaxis)", "HCTZ", "Spironolactone"],
     1, "β-blockers (propranolol, metoprolol) and CCBs (verapamil) are first-line migraine prophylactics. Topiramate, valproate also used. β-blockers also useful for HTN+anxiety/tremor (non-selective propranolol).", "basic"],
    ["Methyldopa is uniquely safe in:",
     ["End-stage renal disease", "Pregnancy (long history of safety)", "Acute MI", "Hyperkalemia"],
     1, "Methyldopa: classic agent for HTN in pregnancy. Long history of fetal safety. Slow onset, sedation, possible hemolytic anemia. Other pregnancy-safe agents: labetalol, nifedipine.", "basic"],
    ["A 65-year-old has HTN and benign essential tremor. The most useful antihypertensive (one drug, two indications) is:",
     ["Lisinopril", "Propranolol (non-selective β-blocker — treats both essential tremor and HTN)", "Amlodipine", "Spironolactone"],
     1, "Propranolol: first-line for essential tremor (also performance anxiety) AND treats HTN. Crosses BBB (non-selective lipophilic β-blocker).", "advanced"],
    ["A patient with HTN and bilateral lower extremity edema on amlodipine should ideally be managed by:",
     ["Increasing amlodipine dose", "Adding an ACEi/ARB to mitigate the CCB-induced edema (or reducing CCB dose)", "Adding furosemide (CCB edema does not respond well to diuretics)", "Stopping all antihypertensives"],
     1, "DHP-CCB edema = precapillary dilation; doesn't respond well to diuretics. Adding ACEi/ARB equalizes pre/postcapillary tone, reducing edema. Reducing dose also helps.", "advanced"]
  ]],
  [4, "Describe adverse effects of different classes of antihypertensive drugs", [
    ["Angioedema is an important adverse effect of which drug class?",
     ["Thiazides", "ACE inhibitors (and to a lesser extent ARBs)", "Calcium channel blockers", "β-blockers"],
     1, "ACEi angioedema: rare but serious (lips, tongue, airway). Higher risk in Black patients. Avoid all ACEi after angioedema. ARBs have slightly lower risk but generally also avoided.", "basic"],
    ["Hydralazine in high doses can cause which immunologic reaction?",
     ["Drug-induced lupus syndrome (with anti-histone antibodies)", "Stevens-Johnson syndrome only", "Acute hemolytic anemia exclusively", "Pure aplastic anemia"],
     0, "Hydralazine drug-induced lupus: positive ANA, anti-histone antibodies. Reversible with discontinuation. Other agents: procainamide, isoniazid, minocycline, TNF-α inhibitors.", "basic"],
    ["A patient on amiodarone develops corneal microdeposits and a bluish skin discoloration. Which other adverse effects should be monitored?",
     ["Pulmonary toxicity, hepatotoxicity, thyroid dysfunction (hypo or hyper), corneal deposits, optic neuropathy, peripheral neuropathy", "Hyperkalemia only", "Hypoglycemia", "Vitiligo"],
     0, "Amiodarone: extensive SE profile — pulmonary fibrosis, hepatotoxicity, thyroid (Tx with TSH q6 mo), corneal deposits, blue-gray skin, neuropathy, prolonged QT. Long t½ (~50 days).", "advanced"],
    ["A 60-year-old on metoprolol has new bradycardia at 45 bpm and dizziness. The next step is:",
     ["Increase the dose", "Hold metoprolol; evaluate for combined drug effects, ECG, and assess underlying conduction; consider permissive bradycardia in HF or reduce dose", "Add atropine continuously", "Switch to verapamil"],
     1, "Symptomatic bradycardia from β-blocker: hold dose, assess ECG/conduction. In HF, accept lower HR if asymptomatic. Combined with non-DHP CCB or digoxin can cause severe block.", "advanced"]
  ]],
  [5, "Identify the drugs used in the RAAS system and explain mechanisms of therapeutic and adverse effects", [
    ["Eplerenone differs from spironolactone in that:",
     ["It is a loop diuretic", "It is more selective for mineralocorticoid receptors → fewer endocrine side effects (less gynecomastia)", "It blocks β receptors", "It is given IV only"],
     1, "Eplerenone: more selective MR antagonist than spironolactone. Less gynecomastia/menstrual irregularities. More expensive. Both increase K and creatinine; monitor closely.", "basic"],
    ["The 'aldosterone escape' phenomenon refers to:",
     ["Loss of aldosterone effect after long-term ACEi/ARB therapy, with rebound aldosterone levels", "Acute electrolyte loss", "Cardiac arrest", "Pituitary failure"],
     0, "Aldosterone escape: chronic ACEi/ARB initially decreases aldosterone, but levels can return toward baseline over time → contributes to clinical importance of MRA in HFrEF and resistant HTN.", "basic"],
    ["A 70-year-old with HFrEF on ACEi, β-blocker, and spironolactone is started on sacubitril/valsartan. The MOST important transition step is:",
     ["No washout needed", "Discontinue ACEi at least 36 hours BEFORE starting ARNI (to reduce angioedema risk)", "Start ARNI same day as ACEi", "Discontinue β-blocker too"],
     1, "ARNI + ACEi simultaneously: high risk of angioedema (combined bradykinin and substance P accumulation). Wait at least 36 hours after last ACEi dose before starting ARNI.", "advanced"],
    ["Sacubitril/valsartan benefits in HFrEF compared to enalapril include:",
     ["Higher rate of cough and angioedema only", "Reduced cardiovascular death and HF hospitalization (PARADIGM-HF) due to combined ARB and natriuretic peptide preservation", "Worse prognosis", "No effect on mortality"],
     1, "PARADIGM-HF: ARNI superior to enalapril in HFrEF — reduced CV death and HF hospitalization. Mechanism: ARB + neprilysin inhibition increases ANP/BNP/cGMP → vasodilation, natriuresis, antifibrotic effects.", "advanced"]
  ]],
  [6, "List agents used in hypertensive emergencies, explaining mechanisms and adverse effects", [
    ["Esmolol is preferred in some hypertensive emergencies because of its:",
     ["Long half-life", "Very short half-life (~9 min) allowing rapid titration and quick offset", "Predominantly α1-blocking effect", "Oral availability"],
     1, "Esmolol: ultra-short-acting IV β1-selective blocker (t½ ~9 min). Rapid titration. Useful in aortic dissection, perioperative HTN, thyroid storm. Not for severe asthma or HFrEF acutely.", "basic"],
    ["Fenoldopam is unique among IV antihypertensives because it:",
     ["Is a β-blocker", "Acts as a selective dopamine D1 agonist causing renal vasodilation and natriuresis (may preserve renal function)", "Causes vasoconstriction", "Releases nitric oxide"],
     1, "Fenoldopam: selective D1 agonist → arterial vasodilation including renal (improves renal blood flow, natriuresis). Useful in hypertensive emergency with AKI. SE: tachycardia, IOP increase.", "basic"],
    ["A patient with hypertensive emergency from cocaine intoxication should AVOID which drug?",
     ["Benzodiazepines", "Pure β-blockers without α-blockade (unopposed α-agonism worsens vasoconstriction)", "Phentolamine", "Calcium channel blockers"],
     1, "Cocaine HTN: avoid pure β-blockers (unopposed α causes worsening vasoconstriction). Use benzodiazepines first; then phentolamine, nitroglycerin, CCB. Labetalol (mixed α/β) is debated but generally acceptable.", "advanced"],
    ["The risk of cyanide toxicity from prolonged nitroprusside infusion is increased in:",
     ["Liver failure, renal failure, prolonged duration, high doses", "Healthy young patients only", "Patients with normal organ function", "Pediatric patients exclusively"],
     0, "Nitroprusside cyanide toxicity: increased with high doses, prolonged infusion (>24-48 hr), liver dysfunction (impaired conversion to thiocyanate), renal dysfunction (impaired thiocyanate clearance). Monitor lactate, mental status; treat with hydroxocobalamin.", "advanced"]
  ]]
]],
[21, "Pathology of Hypertensive Heart Disease & Cor Pulmonale", [
  [1, "Discuss the pathogenesis, morphology and complications of hypertensive heart disease", [
    ["The earliest cardiac structural change in chronic systemic hypertension is:",
     ["LV dilation with eccentric hypertrophy", "Concentric left ventricular hypertrophy", "Right ventricular hypertrophy", "Atrial dilation alone"],
     1, "Chronic pressure overload (HTN, AS) → CONCENTRIC LVH (parallel sarcomere addition, increased wall thickness with normal/small cavity). Eccentric LVH (chamber dilation) reflects volume overload.", "basic"],
    ["Histologically, hypertensive heart disease is characterized by:",
     ["Myocyte atrophy with adipose replacement", "Myocyte hypertrophy with enlarged 'box-car' nuclei and interstitial fibrosis", "Granulomatous inflammation", "Caseous necrosis"],
     1, "HHD histology: enlarged myocytes with prominent rectangular ('box-car') nuclei from polyploidy, increased interstitial fibrosis. Eventually, microvascular dysfunction and decompensation.", "basic"],
    ["A 65-year-old with longstanding HTN develops dyspnea on exertion. Echo shows EF 60%, concentric LVH, LAE, and impaired diastolic relaxation (E/A reversal, elevated E/e'). The most likely diagnosis is:",
     ["HFrEF", "HFpEF (hypertensive heart disease with diastolic dysfunction)", "Acute MI", "Restrictive cardiomyopathy from amyloidosis"],
     1, "Concentric LVH with preserved EF and diastolic dysfunction = classic HFpEF (often hypertensive). Stiff LV → impaired filling → elevated LA pressure → pulmonary congestion. Difficult to treat (no GDMT until SGLT2i).", "advanced"],
    ["A patient with malignant hypertension has BP 240/140 with progressive renal failure. Renal histology may show:",
     ["Hyaline arteriolosclerosis only", "Hyperplastic arteriolosclerosis ('onion-skinning') and fibrinoid necrosis of arterioles", "Granulomas", "Caseating necrosis"],
     1, "Malignant HTN: hyperplastic arteriolosclerosis ('onion-skin' concentric layers of smooth muscle and basement membrane) + fibrinoid necrosis. Targets renal arterioles, brain (encephalopathy), retina (papilledema, flame hemorrhages).", "advanced"]
  ]],
  [2, "Describe the pathogenetic conditions of pulmonary heart disease", [
    ["Cor pulmonale is defined as:",
     ["Left heart failure causing pulmonary edema", "Right heart failure (RV hypertrophy or dilation) due to pulmonary disease causing pulmonary hypertension", "Combined left and right HF from any cause", "Acute MI of the right ventricle"],
     1, "Cor pulmonale: RV dysfunction (hypertrophy ± failure) secondary to pulmonary disease. Excludes RV failure from primary left heart disease, congenital heart disease, or congenital pulmonary vascular disease.", "basic"],
    ["The MOST common cause of chronic cor pulmonale is:",
     ["Chronic obstructive pulmonary disease (COPD)", "Pulmonary embolism", "Idiopathic pulmonary arterial hypertension", "Mitral stenosis"],
     0, "COPD is by far the most common cause of chronic cor pulmonale. Hypoxic pulmonary vasoconstriction → chronic pulmonary HTN → RV pressure overload → RV hypertrophy and eventual failure.", "basic"],
    ["A 70-year-old with severe COPD on home oxygen has progressive lower extremity edema and JVD. Echo shows RV dilation, RVH, and PASP 60 mmHg. The pathogenetic sequence is:",
     ["Pulmonary edema → RV dysfunction", "Chronic alveolar hypoxia → hypoxic pulmonary vasoconstriction → vascular remodeling → ↑PVR → RV pressure overload → RVH/dilation/failure", "Acute MI of the RV", "Constrictive pericarditis"],
     1, "COPD pathogenesis of cor pulmonale: chronic hypoxia → hypoxic pulmonary vasoconstriction (von Euler-Liljestrand reflex) → muscularization of pulmonary arterioles → chronic pulmonary HTN → RV strain.", "advanced"],
    ["Acute massive pulmonary embolism can cause acute cor pulmonale because:",
     ["Sudden mechanical obstruction and humoral vasoconstriction abruptly increase PVR, overwhelming the thin-walled RV", "It causes left heart failure", "It triggers acute MI of the LAD", "It directly damages the LV"],
     0, "Massive PE: acute large rise in pulmonary vascular resistance from clot burden + neurohumoral vasoconstriction → acute RV pressure overload. Thin RV cannot generate high pressures → acute RV failure, hypotension, shock.", "advanced"]
  ]],
  [3, "Discuss the major pathologic features and complications of acute and chronic cor-pulmonale", [
    ["Chronic cor pulmonale on gross pathology shows:",
     ["RV hypertrophy with thickened RV free wall and dilation", "LVH with thickened LV wall", "Atrial myxoma", "Coronary artery calcification"],
     0, "Chronic cor pulmonale: RV concentric hypertrophy (free wall typically >5 mm, normally ~3 mm), eventual dilation, possible TR. RA enlargement common.", "basic"],
    ["A clinical complication of chronic cor pulmonale is:",
     ["Mitral stenosis", "Right heart failure with peripheral edema, hepatic congestion, and ascites", "Aortic dissection", "Acute MI"],
     1, "Chronic cor pulmonale → progressive RV failure → systemic venous congestion: peripheral edema, JVD, hepatic congestion (nutmeg liver), ascites, TR with prominent v wave on JVP.", "basic"],
    ["A 55-year-old with idiopathic pulmonary arterial hypertension has a mean PAP 50 mmHg, RA pressure 12, and CO 3 L/min. Pulmonary vascular resistance (in Wood units) is approximately:",
     ["3 Wood units (normal)", "13 Wood units (markedly elevated)", "5 Wood units", "20 Wood units"],
     1, "PVR = (mPAP - PCWP) / CO. Assuming PCWP ~10: PVR = (50-10)/3 ≈ 13 WU. Normal ~1-2 WU. PAH definition: mPAP ≥20 mmHg, PVR >2 WU, PCWP ≤15 mmHg.", "advanced"],
    ["A 35-year-old with idiopathic PAH has a positive vasoreactivity test (significant fall in PAP with inhaled NO). The most appropriate first-line therapy is:",
     ["Long-term oxygen alone", "High-dose calcium channel blocker (e.g., amlodipine, nifedipine, or diltiazem)", "Beta-blocker", "Loop diuretic alone"],
     1, "Vasoreactive PAH (~10% of patients): high-dose CCB (e.g., nifedipine, diltiazem) can produce sustained benefit. Non-vasoreactive PAH: PDE5 inhibitors, ERAs, prostacyclin analogues, riociguat.", "advanced"]
  ]]
]],
[22, "Introduction to Electrophysiology", [
  [1, "Explain the mechanisms of arrhythmia", [
    ["The three principal mechanisms of cardiac arrhythmias are:",
     ["Ischemia, infection, infiltration", "Disorders of impulse formation, disorders of impulse conduction, and triggered activity", "Anaphylaxis, atrophy, autoimmunity", "Apoptosis, necrosis, fibrosis"],
     1, "Three arrhythmia mechanisms: (1) abnormal impulse formation (enhanced automaticity, ectopic foci), (2) abnormal conduction (reentry, block), (3) triggered activity (EADs, DADs).", "basic"],
    ["Reentry arrhythmias require which three conditions?",
     ["Anatomic/functional circuit, unidirectional block, slow conduction allowing recovery", "Increased automaticity only", "Vagal tone alone", "Hyperkalemia exclusively"],
     0, "Reentry: requires (1) circuit (anatomic or functional), (2) unidirectional block (allows wave to travel one direction), (3) slow conduction (gives the original tissue time to recover excitability).", "basic"],
    ["A patient with prior anterior MI develops monomorphic VT 6 months later. The most likely mechanism is:",
     ["Triggered activity from EADs", "Reentry around scar tissue from previous infarction (a fixed anatomic circuit)", "Increased SA automaticity", "Vagal tone"],
     1, "Post-MI scar provides anatomic substrate for macro-reentry → sustained monomorphic VT. Catheter ablation targets and modifies the scar circuit. Often requires ICD for sudden death prevention.", "advanced"],
    ["A patient with congenital long QT syndrome develops polymorphic VT during emotional stress. The mechanism is:",
     ["Reentry around scar", "Triggered activity from early afterdepolarizations (EADs) due to prolonged repolarization", "Conduction block at AV node", "Sinus tachycardia"],
     1, "LQTS: prolonged phase 3 → EADs → triggered activity → torsades. Adrenergic stress (LQT1 esp. exercise/emotion) precipitates. Treatment: β-blockers, avoid QT-prolonging drugs, ICD if recurrent or high-risk.", "advanced"]
  ]],
  [2, "Explain the indication and physiology of ablation", [
    ["Catheter ablation works by:",
     ["Resecting myocardium surgically", "Delivering energy (radiofrequency or cryothermal) to create a focal lesion that destroys the arrhythmic substrate", "Implanting a pacemaker", "Suppressing rhythm with medication"],
     1, "Catheter ablation: RF or cryo energy delivered via catheter creates targeted scar to destroy or block arrhythmic circuits/foci. Less invasive than surgery, performed in EP lab.", "basic"],
    ["Pulmonary vein isolation (PVI) is the cornerstone of ablation for:",
     ["VT", "Atrial fibrillation (paroxysmal)", "AVNRT", "Sinus tachycardia"],
     1, "PVI: encircling pulmonary veins isolates ectopic foci that initiate AFib (most foci arise in/around PVs). Cornerstone of catheter ablation for paroxysmal/persistent AFib.", "basic"],
    ["A 50-year-old with paroxysmal AFib has frequent symptomatic episodes despite flecainide. The next reasonable step is:",
     ["Increase flecainide dose", "Catheter ablation (PVI) — increasingly recommended early in symptomatic paroxysmal AFib", "Switch to digoxin", "Add beta-blocker only"],
     1, "Symptomatic paroxysmal AFib refractory to (or even before) one antiarrhythmic: catheter ablation indicated. EARLY-AF and STOP-AF trials support first-line ablation in selected patients.", "advanced"],
    ["AVNRT ablation typically targets the:",
     ["Bundle of His", "Slow pathway of the AV node (preserves fast pathway and AV conduction)", "All accessory pathways", "Sinoatrial node"],
     1, "AVNRT slow-pathway ablation: targets slow pathway in posterior right atrium near coronary sinus. Highly successful (>95%); risk of AV block (<1%). Curative in most cases.", "advanced"]
  ]],
  [3, "Explain the indication and function of pacemakers/defibrillator", [
    ["A permanent pacemaker is indicated for:",
     ["First-degree AV block alone", "Symptomatic bradycardia (sinus node dysfunction with symptoms, or high-grade AV block)", "Asymptomatic atrial flutter", "Stable angina"],
     1, "Pacemaker indications: symptomatic SA node dysfunction, symptomatic high-degree AV block, Mobitz II, complete heart block, alternating BBB. NOT for asymptomatic 1° block or asymptomatic Mobitz I.", "basic"],
    ["An ICD (implantable cardioverter-defibrillator) primarily protects against:",
     ["Sinus bradycardia", "Sudden cardiac death from VT/VF (delivers cardioversion or defibrillation)", "Atrial fibrillation", "Heart block"],
     1, "ICD: detects and treats VT/VF (anti-tachycardia pacing or shock). Indicated for: secondary prevention (survived SCA/sustained VT) or primary prevention (LVEF ≤35% in ischemic or non-ischemic CMP, certain genetic conditions).", "basic"],
    ["A 60-year-old with ischemic cardiomyopathy and EF 25% on optimized GDMT for >3 months meets criteria for primary prevention with:",
     ["Pacemaker only", "ICD (preferably with consideration of CRT-D if QRS ≥150 ms with LBBB)", "Pacemaker plus medical therapy", "Catheter ablation"],
     1, "Primary prevention ICD in ischemic CMP: EF ≤35% on GDMT for ≥3 months, NYHA II-III. CRT-D if QRS ≥150 ms with LBBB and EF ≤35% (improved survival in dyssynchrony).", "advanced"],
    ["Cardiac resynchronization therapy (CRT) is indicated for:",
     ["Sinus bradycardia alone", "Symptomatic HFrEF (EF ≤35%) with LBBB and QRS ≥150 ms (and other intermediate criteria)", "Asymptomatic patients", "AFib without HF"],
     1, "CRT (biventricular pacing): EF ≤35%, LBBB with QRS ≥150 ms, NYHA II-IV on GDMT — strongest indication. Improves symptoms, EF, and survival in selected patients with electrical dyssynchrony.", "advanced"]
  ]]
]],
[23, "ECG: Ischemia/Infarction I", [
  [1, "Describe the ST-T changes on the ECG consistent with ischemia", [
    ["The earliest ECG sign of acute transmural ischemia is:",
     ["Pathologic Q waves", "Hyperacute peaked T waves (often before ST elevation)", "T-wave inversion at presentation", "Bundle branch block"],
     1, "Acute STEMI sequence: hyperacute Ts → ST elevation → Q waves develop → T-wave inversion → eventual normalization. Hyperacute Ts may be missed; serial ECGs essential in chest pain.", "basic"],
    ["Subendocardial ischemia (NSTEMI/UA) typically produces:",
     ["ST elevation", "ST depression and/or T-wave inversion", "Q waves", "Wide QRS"],

// ============================================================
// APP LOGIC
// ============================================================
const STORAGE_KEY = "cards_exam1_quiz_v1";
let state = loadState();
let currentTopicIdx = 0;

// Deterministic per-question option shuffle: removes position/length bias
// while keeping the order stable across reloads (so answers persist correctly).
function seededRand(seed) {
  // Simple LCG; deterministic from seed
  let s = seed >>> 0;
  return function() {
    s = (Math.imul(s, 1664525) + 1013904223) >>> 0;
    return s / 0x100000000;
  };
}
function hashString(str) {
  let h = 2166136261 >>> 0;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 16777619) >>> 0;
  }
  return h;
}
const _shuffleCache = {};
function getShuffleOrder(qKey, len) {
  if (_shuffleCache[qKey]) return _shuffleCache[qKey];
  const order = Array.from({length: len}, (_, i) => i);
  const rng = seededRand(hashString(qKey));
  // Fisher-Yates
  for (let i = order.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [order[i], order[j]] = [order[j], order[i]];
  }
  _shuffleCache[qKey] = order;
  return order;
}
// Returns {opts: shuffled options, correctIdx: new correct index, order: orig→display map}
function getShuffledQuestion(qKey, opts, correctIdx) {
  const order = getShuffleOrder(qKey, opts.length);
  const newOpts = order.map(i => opts[i]);
  const newCorrectIdx = order.indexOf(correctIdx);
  return { opts: newOpts, correctIdx: newCorrectIdx, order };
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { answers: {} };
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}
function questionKey(ti, li, qi) {
  return `${ti}_${li}_${qi}`;
}

function countTotalQuestions() {
  let total = 0;
  QUIZ.forEach(t => t[2].forEach(lo => total += lo[2].length));
  return total;
}
const TOTAL_Q = countTotalQuestions();

function countTopicQuestions(topicIdx) {
  return QUIZ[topicIdx][2].reduce((sum, lo) => sum + lo[2].length, 0);
}

function countTopicAnswered(topicIdx) {
  const t = QUIZ[topicIdx];
  const tNum = t[0];
  let answered = 0, correct = 0;
  t[2].forEach((lo) => {
    lo[2].forEach((q, qi) => {
      const key = questionKey(tNum, lo[0], qi);
      if (state.answers[key]) {
        answered++;
        if (state.answers[key].correct) correct++;
      }
    });
  });
  return { answered, correct };
}

function updateStats() {
  let answered = 0, correct = 0;
  Object.values(state.answers).forEach(a => {
    answered++;
    if (a.correct) correct++;
  });
  document.getElementById("stat-answered").textContent = `${answered} / ${TOTAL_Q}`;
  const pct = answered === 0 ? 0 : Math.round(correct/answered*100);
  document.getElementById("stat-correct").textContent = `${correct} (${pct}%)`;
  document.getElementById("overall-progress").style.width = (answered/TOTAL_Q*100).toFixed(1)+"%";
}

function renderSidebar() {
  const list = document.getElementById("topic-list");
  list.innerHTML = "";
  QUIZ.forEach((t, i) => {
    const [num, title] = t;
    const total = countTopicQuestions(i);
    const { answered } = countTopicAnswered(i);
    const link = document.createElement("a");
    link.className = "topic-link" + (i === currentTopicIdx ? " active" : "") + (answered === total && total > 0 ? " complete" : "");
    link.innerHTML = `<span class="num">L${num}.</span>${title}<span class="count">${answered}/${total}</span>`;
    link.onclick = (e) => { e.preventDefault(); currentTopicIdx = i; render(); window.scrollTo(0,0); };
    list.appendChild(link);
  });
}

function renderMain() {
  const main = document.getElementById("main");
  const t = QUIZ[currentTopicIdx];
  const [tNum, tTitle, los] = t;
  const { answered, correct } = countTopicAnswered(currentTopicIdx);
  const total = countTopicQuestions(currentTopicIdx);
  const pct = answered === 0 ? 0 : Math.round(correct/answered*100);

  let html = `<h2 class="topic-header">Lecture ${tNum}. ${tTitle}</h2>
    <div class="topic-subheader">${los.length} learning objective${los.length>1?"s":""} · ${total} questions</div>
    <div class="topic-score">
      <span><strong>${answered}</strong> / ${total} answered</span>
      <div class="topic-score-bar"><div class="topic-score-fill" style="width:${total === 0 ? 0 : (answered/total*100).toFixed(1)}%"></div></div>
      <span>${correct} correct (${pct}%)</span>
    </div>`;

  los.forEach((lo) => {
    const [loNum, loText, qs] = lo;
    html += `<div class="lo-header" style="margin:18px 0 6px;font-size:14px;font-weight:600;color:#334155;">LO ${loNum}. ${escapeHtml(loText)}</div>`;
    qs.forEach((q, qi) => {
      const [stem, origOpts, origCorrectIdx, explanation, qtype] = q;
      const key = questionKey(tNum, loNum, qi);
      const shuffled = getShuffledQuestion(key, origOpts, origCorrectIdx);
      const opts = shuffled.opts;
      const correctIdx = shuffled.correctIdx;
      const ans = state.answers[key];
      const tagClass = qtype === "advanced" ? "advanced" : "basic";
      const tagText = qtype === "advanced" ? "Multi-step" : "Foundational";
      html += `<div class="question-card" data-key="${key}" data-correct="${correctIdx}" data-explanation="${escapeAttr(explanation)}">
        <div class="question-meta">Question ${qi+1}<span class="question-tag ${tagClass}">${tagText}</span></div>
        <div class="question-stem">${escapeHtml(stem)}</div>
        <div class="options">`;
      opts.forEach((opt, i) => {
        let cls = "option";
        if (ans) {
          cls += " locked";
          if (i === correctIdx) cls += " correct";
          else if (i === ans.selected) cls += " wrong";
          else cls += " dim";
        }
        html += `<button class="${cls}" data-opt="${i}">
          <span class="letter">${String.fromCharCode(65+i)}.</span>
          <span>${escapeHtml(opt)}</span>
        </button>`;
      });
      html += `</div>`;
      if (ans) {
        const isCorrect = ans.selected === correctIdx;
        html += `<div class="feedback ${isCorrect?"correct":"wrong"} show">
          <span class="feedback-label">${isCorrect?"✓ Correct.":"✗ Incorrect."}</span>
          ${escapeHtml(explanation)}
        </div>`;
      } else {
        html += `<div class="feedback"></div>`;
      }
      html += `</div>`;
    });
  });

  html += `<div class="topic-nav">
    <button class="nav-btn" id="prev-btn" ${currentTopicIdx===0?"disabled":""}>← Previous Lecture</button>
    <button class="nav-btn" id="next-btn" ${currentTopicIdx===QUIZ.length-1?"disabled":""}>Next Lecture →</button>
  </div>`;

  main.innerHTML = html;

  main.querySelectorAll(".question-card").forEach(card => {
    const key = card.dataset.key;
    if (state.answers[key]) return;
    card.querySelectorAll(".option").forEach(btn => {
      btn.addEventListener("click", () => answerQuestion(card, btn));
    });
  });

  const pb = document.getElementById("prev-btn");
  const nb = document.getElementById("next-btn");
  if (pb) pb.onclick = () => { if (currentTopicIdx>0) { currentTopicIdx--; render(); window.scrollTo(0,0); } };
  if (nb) nb.onclick = () => { if (currentTopicIdx<QUIZ.length-1) { currentTopicIdx++; render(); window.scrollTo(0,0); } };
}

function answerQuestion(card, btn) {
  const key = card.dataset.key;
  const correctIdx = parseInt(card.dataset.correct);
  const selected = parseInt(btn.dataset.opt);
  const isCorrect = selected === correctIdx;
  state.answers[key] = { selected, correct: isCorrect };
  saveState();

  const options = card.querySelectorAll(".option");
  options.forEach((opt, i) => {
    opt.classList.add("locked");
    if (i === correctIdx) opt.classList.add("correct");
    else if (i === selected) opt.classList.add("wrong");
    else opt.classList.add("dim");
    const newOpt = opt.cloneNode(true);
    opt.parentNode.replaceChild(newOpt, opt);
  });
  const fb = card.querySelector(".feedback");
  fb.className = "feedback " + (isCorrect ? "correct" : "wrong") + " show";
  fb.innerHTML = `<span class="feedback-label">${isCorrect?"✓ Correct.":"✗ Incorrect."}</span>` + escapeHtml(card.dataset.explanation);

  updateStats();
  renderSidebar();
}

function render() {
  renderSidebar();
  renderMain();
  updateStats();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
