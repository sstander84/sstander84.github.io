<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cardiology Exam 1 — Lectures 1-25</title>
<style>
  :root {
    --bg: #f5f7fa;
    --surface: #ffffff;
    --border: #e2e8f0;
    --text: #1a202c;
    --muted: #64748b;
    --primary: #7f1d1d;
    --primary-light: #fee2e2;
    --correct: #16a34a;
    --correct-bg: #dcfce7;
    --wrong: #dc2626;
    --wrong-bg: #fee2e2;
    --shadow: 0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.03);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  header {
    background: var(--primary);
    color: white;
    padding: 14px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }
  header h1 {
    margin: 0;
    font-size: 18px;
    font-weight: 600;
  }
  .stats {
    display: flex;
    gap: 20px;
    align-items: center;
    font-size: 14px;
  }
  .stat {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .stat-value {
    font-weight: 600;
    font-size: 16px;
  }
  .progress-bar {
    width: 180px;
    height: 8px;
    background: rgba(255,255,255,0.2);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: #fca5a5;
    transition: width 0.3s ease;
  }
  .reset-btn {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.15s;
  }
  .reset-btn:hover { background: rgba(255,255,255,0.25); }

  .layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    max-width: 1400px;
    margin: 0 auto;
    gap: 0;
    min-height: calc(100vh - 56px);
  }
  nav.sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 16px 0;
    position: sticky;
    top: 56px;
    align-self: start;
    max-height: calc(100vh - 56px);
    overflow-y: auto;
  }
  .sidebar-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    padding: 0 20px 8px;
  }
  .topic-link {
    display: block;
    padding: 10px 20px;
    font-size: 13px;
    color: var(--text);
    text-decoration: none;
    border-left: 3px solid transparent;
    cursor: pointer;
    transition: background 0.15s;
    line-height: 1.3;
  }
  .topic-link:hover { background: var(--primary-light); }
  .topic-link.active {
    background: var(--primary-light);
    border-left-color: var(--primary);
    font-weight: 600;
  }
  .topic-link .num { color: var(--primary); font-weight: 600; margin-right: 6px; }
  .topic-link .count {
    float: right;
    font-size: 11px;
    color: var(--muted);
    background: var(--bg);
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 500;
  }
  .topic-link.complete .count {
    background: var(--correct-bg);
    color: var(--correct);
  }

  main {
    padding: 24px 32px;
    max-width: 900px;
  }
  .topic-header {
    font-size: 22px;
    font-weight: 700;
    color: var(--primary);
    margin: 0 0 4px;
  }
  .topic-subheader {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 24px;
  }
  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 22px;
    margin-bottom: 14px;
    box-shadow: var(--shadow);
  }
  .question-meta {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .question-stem {
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 12px;
    line-height: 1.55;
  }
  .options {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .option {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px 14px;
    background: #f8fafc;
    border: 1.5px solid var(--border);
    border-radius: 7px;
    cursor: pointer;
    font-size: 14px;
    text-align: left;
    transition: all 0.12s;
    width: 100%;
    min-height: 52px;
    color: var(--text);
    line-height: 1.5;
  }
  .option:hover:not(.locked) {
    background: var(--primary-light);
    border-color: var(--primary);
  }
  .option .letter {
    font-weight: 700;
    color: var(--primary);
    min-width: 20px;
  }
  .option.correct {
    background: var(--correct-bg);
    border-color: var(--correct);
    color: #166534;
  }
  .option.correct .letter { color: var(--correct); }
  .option.wrong {
    background: var(--wrong-bg);
    border-color: var(--wrong);
    color: #991b1b;
  }
  .option.wrong .letter { color: var(--wrong); }
  .option.locked { cursor: default; }
  .option.dim { opacity: 0.55; }
  .feedback {
    margin-top: 12px;
    padding: 10px 14px;
    border-radius: 7px;
    font-size: 13.5px;
    line-height: 1.5;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.correct {
    background: var(--correct-bg);
    color: #14532d;
    border-left: 4px solid var(--correct);
  }
  .feedback.wrong {
    background: var(--wrong-bg);
    color: #7f1d1d;
    border-left: 4px solid var(--wrong);
  }
  .feedback-label {
    font-weight: 700;
    margin-right: 6px;
  }
  .topic-nav {
    display: flex;
    justify-content: space-between;
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }
  .nav-btn {
    padding: 10px 18px;
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: 7px;
    cursor: pointer;
    font-size: 14px;
    color: var(--primary);
    font-weight: 500;
    transition: all 0.15s;
  }
  .nav-btn:hover:not(:disabled) {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
  }
  .nav-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .topic-score {
    background: var(--primary-light);
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 20px;
    font-size: 13px;
    color: var(--primary);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .topic-score-bar {
    flex: 1;
    max-width: 200px;
    height: 6px;
    background: rgba(127,29,29,0.15);
    border-radius: 3px;
    overflow: hidden;
    margin: 0 12px;
  }
  .topic-score-fill {
    height: 100%;
    background: var(--primary);
    transition: width 0.3s;
  }
  .question-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-left: 8px;
    vertical-align: middle;
  }
  .question-tag.basic {
    background: #dbeafe;
    color: #1e40af;
  }
  .question-tag.advanced {
    background: #fef3c7;
    color: #92400e;
  }

  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    nav.sidebar {
      position: static;
      max-height: none;
      border-right: none;
      border-bottom: 1px solid var(--border);
    }
    main { padding: 16px; }
    header { padding: 12px 16px; }
    header h1 { font-size: 16px; }
    .stats { font-size: 12px; gap: 12px; }
    .progress-bar { width: 120px; }
  }
</style>
</head>

  [8, "List those conditions associated with left and right axis deviations", [

]],
[4, "Self-Study #1: OPP in Cardiovascular Medicine", [
  [1, "Explain the effects of the sympathetic and parasympathetic divisions of the autonomic nervous system on the cardiovascular system", [
    ["Sympathetic stimulation of the heart primarily acts through which receptor?",
     ["β1-adrenergic", "β2-adrenergic", "α1-adrenergic", "M2 muscarinic"],
     0, "Sympathetic effects on the heart are mediated primarily by β1 receptors → ↑HR, ↑contractility, ↑conduction velocity. β2 acts on vascular smooth muscle (vasodilation) and bronchi.", "basic"],
    ["Parasympathetic stimulation to the heart travels via which nerve and acts on which receptor?",
     ["Phrenic nerve, nicotinic", "Sympathetic chain, β2", "Vagus nerve, M2 muscarinic", "Spinal accessory nerve, β1"],
     2, "Parasympathetic input via the vagus nerve (CN X) acts on M2 muscarinic receptors at the SA node, AV node, and atria — slowing rate and AV conduction.", "basic"],
    ["A patient with vasovagal syncope had an episode triggered by venipuncture. The mechanism most directly involves:",
     ["Pure sympathetic surge causing tachycardia", "Sudden reflex parasympathetic activation with sympathetic withdrawal causing bradycardia and vasodilation", "Cerebral vasospasm", "Carotid artery dissection"],
     1, "Vasovagal syncope: emotional or pain stimulus triggers reflex parasympathetic surge (bradycardia) and sympathetic withdrawal (vasodilation, hypotension), causing transient cerebral hypoperfusion.", "advanced"],
    ["The sympathetic preganglionic neurons innervating the heart originate at which spinal levels?",
     ["C1-C3", "T1-T4", "T5-L2", "S2-S4"],
     1, "Sympathetic cardiac innervation arises from T1-T4 spinal levels (intermediolateral cell column), synapsing in the cervical and upper thoracic ganglia (cardiac plexus). Parasympathetic = vagus (cranial origin).", "advanced"]
  ]],
  [2, "Explain the effects of the lymphatic system on the cardiovascular system", [
    ["The thoracic duct drains lymph into the:",
     ["Right subclavian vein", "Junction of left subclavian and left internal jugular veins", "Inferior vena cava", "Left atrium directly"],
     1, "The thoracic duct drains lymph from most of the body into the venous system at the junction of the left subclavian and left internal jugular veins (left venous angle).", "basic"],
    ["Cardiac lymphatic drainage is important because:",
     ["Lymph supplies oxygen to myocardium", "Lymph clears interstitial fluid and macromolecules from the myocardium", "Lymph regulates coronary perfusion pressure", "Lymph carries the cardiac action potential"],
     1, "Cardiac lymphatics return interstitial fluid, proteins, and metabolic byproducts. Disruption (post-cardiac surgery, radiation) can cause myocardial edema and impaired function.", "basic"],
    ["A patient with severe right heart failure may develop chylous effusions if lymphatic return is impaired. Why does right heart failure impair lymphatic drainage?",
     ["Right heart failure damages thoracic duct lymphocytes", "Elevated central venous pressure raises pressure at the lymphovenous junction, impeding lymph drainage", "Right heart failure causes lymphangitis", "It increases lymphatic vessel contractility excessively"],
     1, "Lymph drains into the venous system at low pressure. Elevated CVP (right HF, SVC obstruction, constrictive pericarditis) impairs lymph return → tissue edema and possible chylous effusions.", "advanced"],
    ["Osteopathic lymphatic techniques (e.g., thoracic pump) are thought to improve cardiovascular status primarily by:",
     ["Direct stimulation of myocardial contractility", "Enhancing lymphatic return and reducing interstitial congestion", "Producing coronary artery vasodilation", "Increasing red cell mass"],
     1, "Lymphatic techniques aim to enhance lymphatic flow, mobilize interstitial fluid, and reduce edema/congestion — supporting venous return and reducing peripheral and pulmonary edema.", "advanced"]
  ]],
  [3, "List the somatovisceral effects on the cardiovascular system", [
    ["The Chapman reflex point for the heart is classically located:",
     ["Over the iliac crest", "In the second intercostal space near the sternum", "At the medial malleolus", "Posterior to the umbilicus"],
     1, "Chapman points reflect somatovisceral relationships. The heart's anterior point is in the 2nd ICS near the sternum; posterior point is between T2-T3 transverse processes.", "basic"],
    ["Somatovisceral reflexes from the upper thoracic spine (T1-T5) can affect the cardiovascular system because:",
     ["These segments share parasympathetic innervation with the heart", "These segments share sympathetic innervation with the heart", "These segments share dermatomal supply with skin only", "There is no real connection"],
     1, "T1-T5 are the same spinal levels supplying sympathetic outflow to the heart. Somatic dysfunction at these segments may produce facilitated sympathetic tone affecting cardiac function.", "basic"],
    ["A patient with chronic upper-thoracic somatic dysfunction at T1-T4 is hypothesized to have which cardiovascular effect from facilitated sympathetic outflow?",
     ["Bradycardia and vasodilation", "Tachycardia, increased contractility, and vasoconstriction", "Decreased cardiac output", "AV block"],
     1, "Increased sympathetic tone from facilitated T1-T4 segments → ↑HR, ↑contractility, peripheral vasoconstriction. OPP aims to reduce sympathetic facilitation in cardiac patients.", "advanced"],
    ["Viscerosomatic reflexes from the heart most commonly produce tissue texture changes in which paraspinal region?",
     ["C2-C4", "T1-T5", "T10-L2", "L4-S1"],
     1, "Cardiac viscerosomatic reflexes typically produce tissue texture changes (TART) in the upper thoracic paraspinal region (T1-T5), corresponding to sympathetic supply.", "advanced"]
  ]],
  [4, "Formulate basic treatment approaches for patients with common cardiac diseases", [
    ["Which OMT modality is generally CONTRAINDICATED in a patient with acute decompensated heart failure?",
     ["Soft tissue techniques in seated position with rest periods", "Lymphatic pump techniques performed aggressively", "Suboccipital release", "Indirect myofascial release"],
     1, "Aggressive lymphatic pump in acute decompensated HF could overwhelm the failing heart with mobilized fluid. Gentle techniques are preferred; aggressive lymphatic mobilization is contraindicated until compensated.", "advanced"],
    ["The osteopathic treatment plan for a patient with stable angina includes:",
     ["Replacing all medical therapy with OMT", "Adjunctive OMT focused on T1-T5 sympathetic balance and rib motion, alongside guideline-based medical therapy", "Aggressive HVLA only at C7-T1", "OMT only after cardiac arrest"],
     1, "OMT is ADJUNCTIVE to evidence-based medical therapy (antiplatelets, statins, β-blockers). Goals include normalizing autonomic tone and improving thoracic mechanics — never replacing medical management.", "advanced"],
    ["Rib raising techniques are thought to:",
     ["Compress the heart directly", "Reduce sympathetic tone by addressing thoracic somatic dysfunction", "Increase myocardial oxygen demand", "Cause bradycardia via vagal reflex only"],
     1, "Rib raising may reduce sympathetic tone (via thoracic sympathetic chain) and improve thoracic mechanics. Used adjunctively in CV patients (e.g., post-MI rehabilitation, with appropriate cautions).", "basic"],
    ["For a patient with hypertension, which OMT goal is most appropriate as adjunct to medical therapy?",
     ["Replace antihypertensive medications entirely", "Address upper thoracic and suboccipital somatic dysfunction to balance autonomic tone", "Increase sympathetic tone for better perfusion", "Cause acute hypotension via aggressive technique"],
     1, "Adjunctive OMT addresses sympathetic facilitation (T1-T5) and parasympathetic balance (suboccipital, OA) to support autonomic regulation. Medical therapy remains primary.", "basic"]
  ]]
]],
[5, "Features of the Cardiovascular System", [
  [1, "Describe the structure-function features and arrangements of the cardiovascular system (CVS) components and their interrelationships", [
    ["The CVS components are arranged in which configuration relative to the heart's two pumps?",
     ["Two pumps in series (right then left)", "Two pumps in parallel", "A single pump", "Three pumps in sequence"],
     0, "The right and left hearts are arranged in series — RV pumps to lungs, LV pumps to systemic circulation. Output of one must equal output of the other over time.", "basic"],
    ["The functional purpose of capillaries is primarily:",
     ["Storage of blood volume", "Exchange of gases, nutrients, and waste", "Generating arterial pressure", "Generating cardiac contractility"],
     1, "Capillaries are the exchange vessels — gases, nutrients, and waste cross via diffusion and bulk flow due to thin walls and large total surface area.", "basic"],
    ["A patient with severe AS has impaired LV emptying. Because the right and left hearts are in series, the FIRST chamber to show pressure elevation upstream is:",
     ["Right atrium", "Right ventricle", "Left atrium", "Pulmonary capillaries"],
     2, "Reduced LV emptying → elevated LV end-diastolic pressure → backward to LA → pulmonary venous → eventually pulmonary capillaries (causing pulmonary congestion). RV/RA elevation occurs late.", "advanced"],
    ["The most appropriate description of the cardiovascular system is:",
     ["A static reservoir of blood", "A closed-loop system with a series-coupled dual pump and exchange beds", "An open system that loses fluid continuously", "A unidirectional system without valves"],
     1, "The CVS is a closed loop with a dual series pump (RV → pulmonary; LV → systemic), valves to ensure unidirectional flow, and capillary exchange beds in each circuit.", "advanced"]
  ]],
  [2, "Contrast features and functions of systemic, pulmonary and lymphatic circulations", [
    ["Compared with systemic circulation, the pulmonary circulation has:",
     ["Higher pressures and higher resistance", "Lower pressures and lower resistance", "Higher pressures and lower resistance", "Equal pressures and equal resistance"],
     1, "Pulmonary circulation: low pressure (~25/8 mmHg), low resistance, high compliance. Systemic: high pressure (~120/80), high resistance.", "basic"],
    ["The lymphatic system primarily returns:",
     ["Oxygenated blood to the heart", "Filtered interstitial fluid and proteins to venous circulation", "Bile to the liver", "Cerebrospinal fluid to the spinal cord"],
     1, "The lymphatics return excess interstitial fluid, plasma proteins, and absorbed dietary lipids (chyle) to the venous circulation, helping maintain fluid homeostasis.", "basic"],
    ["A patient with pulmonary hypertension has a mean PA pressure of 35 mmHg. Compared with a normal mPAP of ~14 mmHg, what physiologic challenge does this pose for the right ventricle?",
     ["Decreased afterload, allowing dilation", "Increased afterload, requiring greater RV work and predisposing to RV failure", "No effect on the right ventricle", "Reduced preload"],
     1, "Elevated PA pressure increases RV afterload. The thin-walled RV is poorly suited for chronic pressure overload — leading to hypertrophy, dilation, and ultimately RV failure (cor pulmonale).", "advanced"],
    ["Why is pulmonary edema more likely than systemic edema when LEFT atrial pressure increases?",
     ["The pulmonary capillaries lack tight junctions", "The pulmonary capillaries operate at low hydrostatic pressure, so even small increases push past the threshold for fluid filtration", "The pulmonary lymphatics do not exist", "The lungs lack interstitial space"],
     1, "Normal pulmonary capillary pressure (~7-8 mmHg) is well below plasma oncotic pressure (~25 mmHg). Even modest LA pressure elevation can exceed the threshold and cause filtration into alveoli.", "advanced"]
  ]],
  [3, "Describe main features and function of each vessel type", [
    ["The vessels with the largest TOTAL cross-sectional area are:",
     ["Aorta", "Large arteries", "Capillaries", "Vena cava"],
     2, "Capillaries have the largest total cross-sectional area in the body, allowing slow flow ideal for exchange. The aorta has the smallest total cross-section but largest single vessel.", "basic"],
    ["Resistance vessels of the systemic circulation are predominantly:",
     ["Capillaries", "Veins", "Arterioles", "Aorta"],
     2, "Arterioles, with their thick smooth-muscle walls, are the principal resistance vessels and the main site of regulation of systemic vascular resistance and tissue perfusion.", "basic"],
    ["Approximately what percentage of total blood volume is contained in the systemic veins at rest?",
     ["10%", "25%", "65%", "90%"],
     2, "About 60-70% of total blood volume is in the systemic venous system (capacitance vessels). Veins serve as a reservoir mobilized by sympathetic venoconstriction.", "advanced"],
    ["Which vessel type primarily dampens the pulsatile output of the LV into more continuous flow?",
     ["Arterioles", "Capillaries", "Large elastic arteries (aorta and major branches)", "Venules"],
     2, "Elastic arteries (aorta, large branches) expand during systole and recoil during diastole — the 'Windkessel' effect — converting pulsatile output into more continuous downstream flow.", "advanced"]
  ]],
  [4, "Describe how mean and pulse blood pressure vary within the circulation", [
    ["Pulse pressure is calculated as:",
     ["Systolic + diastolic pressure", "Systolic - diastolic pressure", "Mean of systolic and diastolic", "Cardiac output × resistance"],
     1, "Pulse pressure = SBP - DBP. Normal PP ~40 mmHg. Increased by stiff aorta, AR, anemia, fever; decreased in tamponade, AS, shock.", "basic"],
    ["Mean arterial pressure (MAP) at rest is approximated by:",
     ["DBP + 1/3 (SBP - DBP)", "SBP - 1/3 (DBP - SBP)", "SBP + DBP / 2", "(SBP × DBP) / 2"],
     0, "MAP ≈ DBP + 1/3 PP. Diastole occupies more of the cardiac cycle at normal HR, so DBP weighs more. At very high HR, MAP approaches the simple mean.", "basic"],
    ["Pulse pressure decreases progressively from the aorta to capillaries because:",
     ["The heart is far from the capillaries", "Vessel compliance and resistance dampen the pulse, with most damping occurring across arterioles", "Capillaries actively absorb pulsatility", "Veins generate a counter-pulse"],
     1, "Pulse pressure dampens through the resistance vessels (arterioles); flow becomes essentially nonpulsatile in capillaries. Mean pressure also drops most across arterioles.", "advanced"],
    ["A 75-year-old has BP 170/65. Which CV change best explains the wide pulse pressure?",
     ["Severe mitral regurgitation", "Increased aortic stiffness due to age-related arteriosclerosis", "Severe aortic stenosis", "Cardiac tamponade"],
     1, "Isolated systolic hypertension with wide pulse pressure in elderly typically reflects loss of aortic compliance (arteriosclerosis) — reduced Windkessel function raises SBP and lowers DBP.", "advanced"]
  ]],
  [5, "Describe the relationship between pressure, flow and resistance in all its forms", [
    ["The hemodynamic version of Ohm's law states:",
     ["Q = ΔP × R", "ΔP = Q × R", "R = Q / ΔP", "ΔP = Q + R"],
     1, "Hemodynamic Ohm's law: ΔP = Q × R, equivalent to flow Q = ΔP/R. Used to relate blood flow, pressure gradient, and vascular resistance.", "basic"],
    ["According to Poiseuille's equation, vascular resistance is most sensitive to:",
     ["Vessel length (linear)", "Blood viscosity (linear)", "Vessel radius (4th power)", "Vessel cross-sectional area only"],
     2, "Resistance ∝ 8ηL/πr⁴ — radius is the 4th power. A 50% reduction in radius = 16-fold increase in resistance. Tiny changes in arteriolar diameter dramatically alter resistance.", "basic"],
    ["A patient's MAP is 90 mmHg, RAP is 5 mmHg, and cardiac output is 5 L/min. Systemic vascular resistance (in Wood units) is approximately:",
     ["5 Wood units (mmHg/L/min)", "10 Wood units", "17 Wood units", "20 Wood units"],
     2, "SVR = (MAP - RAP) / CO = (90-5)/5 = 17 mmHg/L/min (Wood units). To convert to dyn·s·cm⁻⁵, multiply by 80.", "advanced"],
    ["A patient with sepsis has MAP 60, CO 9 L/min, RAP 5. The most likely SVR is:",
     ["Markedly elevated", "Markedly reduced (vasodilation)", "Normal", "Cannot be calculated"],
     1, "SVR = (60-5)/9 ≈ 6 Wood units (low). Sepsis classically produces high CO with low SVR (distributive shock) due to systemic vasodilation.", "advanced"]
  ]]
]],
[6, "Features of Cardiac Function", [
  [1, "Describe the cardiac cycle in terms of the cardiac pressure-volume loop and in terms of the temporal relationship between electrical, mechanical and hemodynamic events", [
    ["On the LV pressure-volume loop, isovolumetric contraction occurs:",
     ["Between mitral closure and aortic opening", "Between aortic opening and aortic closure", "Between aortic closure and mitral opening", "Between mitral opening and mitral closure"],
     0, "Isovolumetric contraction: mitral valve closed, aortic not yet open — pressure rises rapidly with no volume change. The vertical rising segment of the PV loop.", "basic"],
    ["The dicrotic notch on the aortic pressure tracing corresponds to:",
     ["Mitral valve opening", "Aortic valve closure", "Pulmonic valve closure", "Atrial contraction"],
     1, "The dicrotic notch (incisura) reflects aortic valve closure and the brief backflow before valve closure halts retrograde flow. Marks end of systole.", "basic"],
    ["The 'a' wave on the jugular venous pressure tracing corresponds to which event?",
     ["Tricuspid valve closure", "Atrial contraction", "Ventricular systole onset", "Atrial relaxation"],
     1, "JVP waves: 'a' = atrial contraction (large in TS, pulmonary HTN, cannon a in CHB), 'c' = TV bulging during systole, 'v' = atrial filling against closed TV (large in TR), 'x' descent = atrial relaxation, 'y' descent = TV opening.", "advanced"],
    ["The 'v' wave on the JVP corresponds to which phase of the cardiac cycle?",
     ["Atrial contraction", "Ventricular contraction with closed TV; right atrial filling against closed TV", "Atrial relaxation", "Tricuspid valve opening"],
     1, "The 'v' wave reflects passive filling of the RA during ventricular systole when the tricuspid valve is closed. Large 'v' wave = severe TR.", "advanced"]
  ]],
  [2, "Determine stroke volume and ejection fraction from either the pressure-volume loop or from ventricular end diastolic and end systolic volumes", [
    ["A patient has LVEDV of 130 mL and LVESV of 50 mL. The stroke volume is:",
     ["50 mL", "80 mL", "130 mL", "180 mL"],
     1, "Stroke volume = EDV - ESV = 130 - 50 = 80 mL. Normal SV is approximately 60-100 mL.", "basic"],
    ["A patient has LVEDV of 150 mL and LVESV of 90 mL. The ejection fraction is:",
     ["20%", "40%", "60%", "100%"],
     1, "EF = SV/EDV = (150-90)/150 = 60/150 = 40%. EF <40% defines HFrEF; ≥50% is preserved EF (HFpEF).", "basic"],
    ["A 65-year-old has SV 50 mL at HR 80 bpm. The cardiac output is:",
     ["2 L/min", "4 L/min", "6 L/min", "8 L/min"],
     1, "CO = SV × HR = 50 × 80 = 4000 mL/min = 4 L/min. Normal CO is ~4-8 L/min, with cardiac index 2.5-4.0 L/min/m².", "advanced"],
    ["A patient with EF 25% and EDV 200 mL has which stroke volume?",
     ["25 mL", "50 mL", "75 mL", "100 mL"],
     1, "EF = SV/EDV → SV = EF × EDV = 0.25 × 200 = 50 mL. Despite a dilated ventricle, low EF results in normal-to-low SV.", "advanced"]
  ]],
  [3, "Describe the relationship between myocardial wall stress and myocardial afterload", [
    ["According to the Law of Laplace, ventricular wall stress is:",
     ["Directly proportional to pressure × radius and inversely proportional to wall thickness", "Inversely proportional to pressure", "Proportional to wall thickness only", "Independent of cavity radius"],
     0, "Wall stress σ = (P × r) / (2h). Higher cavity pressure or radius increases wall stress; greater wall thickness reduces it. Hence pressure overload → concentric hypertrophy to normalize stress.", "basic"],
    ["Afterload of the left ventricle is best approximated by:",
     ["Preload at end-diastole", "Aortic pressure (and wall stress) during ejection", "Heart rate", "Stroke volume"],
     1, "LV afterload corresponds to the load against which the LV must eject — clinically approximated by aortic systolic pressure (and more precisely, peak systolic wall stress).", "basic"],
    ["A patient with severe systemic hypertension develops concentric LVH. The hypertrophy normalizes wall stress because:",
     ["Increased radius offsets increased pressure", "Increased wall thickness counterbalances increased pressure (per Laplace)", "Cardiac output decreases proportionally", "EF rises automatically"],
     1, "Per Laplace, increased wall thickness (h) reduces wall stress despite the elevated pressure (P). Concentric hypertrophy is the LV's adaptive response to chronic pressure overload.", "advanced"],
    ["A patient with chronic severe MR develops eccentric LV hypertrophy (dilated chamber). According to Laplace, what happens to wall stress?",
     ["It decreases markedly", "It tends to increase due to ↑radius unless compensatory wall thickening occurs", "It stays the same", "Wall stress is independent of geometry"],
     1, "Volume overload (e.g., MR) causes eccentric hypertrophy with increased radius. Per Laplace, this raises wall stress; modest wall thickening may not fully compensate, leading to progressive dysfunction.", "advanced"]
  ]],
  [4, "Interpret pump function changes from cardiac pressure-volume (P-V) loops and PIP curves", [
    ["The end-systolic pressure-volume relationship (ESPVR) slope reflects:",
     ["Preload", "Afterload", "Contractility (inotropic state)", "Heart rate"],
     2, "ESPVR slope (Emax) is a load-independent measure of contractility. Steeper slope = increased contractility (e.g., catecholamines); flatter slope = decreased contractility (e.g., HF).", "basic"],
    ["The end-diastolic pressure-volume relationship (EDPVR) reflects:",
     ["Active contractility", "Passive ventricular compliance/stiffness", "Heart rate", "Aortic valve resistance"],
     1, "EDPVR represents passive ventricular filling and compliance. Steeper EDPVR = stiffer ventricle (e.g., HFpEF, restrictive CMP); flatter EDPVR = more compliant (e.g., dilated CMP).", "basic"],
    ["A PV loop shifts rightward with a flatter ESPVR slope, larger EDV, and larger ESV. This pattern best reflects:",
     ["Increased contractility", "Decreased contractility (e.g., dilated cardiomyopathy)", "Acute volume depletion", "Acute pressure overload"],
     1, "Decreased contractility (HFrEF, DCM) reduces ESPVR slope; the loop shifts rightward (larger EDV/ESV) because the ventricle cannot eject as effectively, resulting in lower SV and EF.", "advanced"],
    ["A PV loop with markedly increased width (high SV) and elevated end-diastolic pressure but normal ESPVR slope most likely reflects:",
     ["Volume overload (e.g., AR or MR) with preserved contractility", "Severe contractile failure", "Acute hypovolemia", "Cardiac tamponade"],
     0, "Chronic AR/MR causes volume overload with widened PV loop (large SV) and rightward shift, but ESPVR slope (contractility) initially preserved. Over time, contractility declines.", "advanced"]
  ]],
  [5, "Relate changes in P-V loops to changes in temporal representations of the cardiac cycle", [
    ["The width of the LV PV loop along the volume axis equals:",
     ["Heart rate", "Stroke volume", "Mean arterial pressure", "Cardiac output"],
     1, "The horizontal width of the loop = EDV - ESV = stroke volume. The area inside the loop equals stroke work.", "basic"],
    ["A taller PV loop (higher peak pressure) at unchanged stroke volume corresponds to which temporal change?",
     ["Reduced ventricular pressure during systole", "Increased peak LV systolic pressure (e.g., due to higher afterload)", "Slower diastolic filling", "Diminished afterload"],
     1, "The vertical 'top' of the PV loop = peak LV systolic pressure. A taller loop (without volume change) corresponds to higher pressure during systole on temporal tracings.", "basic"],
    ["A shift in the bottom of the PV loop UPWARD (higher EDP) without change in EDV indicates:",
     ["Increased ventricular compliance", "Decreased ventricular compliance (stiffer ventricle)", "Decreased afterload", "Increased contractility"],
     1, "Higher EDP at the same EDV = stiffer ventricle (decreased compliance, steeper EDPVR). Seen in HFpEF, restrictive cardiomyopathy, and tamponade.", "advanced"],
    ["When mitral valve closure is delayed (e.g., severe MR with long regurgitation), the PV loop:",
     ["Becomes a perfect rectangle with vertical isovolumetric phases", "Loses its isovolumetric contraction phase (no closed-valve phase) because regurgitation occurs throughout systole", "Becomes infinitely wide", "Disappears entirely"],
     1, "In severe MR, blood leaks back into LA throughout systole — there is no true isovolumetric contraction phase. The PV loop loses its sharp vertical rise on the left side.", "advanced"]
  ]],
  [6, "Describe P-V loop changes associated with changes in preload, afterload and contractility", [
    ["An ACUTE increase in preload (e.g., rapid IV fluids) causes the PV loop to:",
     ["Shift leftward (smaller EDV)", "Shift rightward at end-diastole (larger EDV) with increased SV via Frank-Starling", "Shrink in width", "Flatten the ESPVR"],
     1, "Increased preload → larger EDV → larger SV (per Frank-Starling), all else equal. ESV is largely unchanged for a given afterload and contractility.", "basic"],
    ["An ACUTE increase in afterload (without contractility change) causes:",
     ["Increased SV and decreased ESV", "Decreased SV and increased ESV", "Increased ESPVR slope", "Decreased EDP"],
     1, "Increased afterload → ventricle ejects less against higher pressure → ↑ESV, ↓SV. The loop becomes taller and narrower.", "basic"],
    ["A patient receiving an IV inotrope (e.g., dobutamine) has a PV loop change that includes:",
     ["Steepened ESPVR slope, decreased ESV, increased SV", "Flattened ESPVR with increased ESV", "Increased EDV with no change in ESPVR", "Decreased contractility"],
     0, "Positive inotropy steepens ESPVR (Emax↑), reducing ESV and increasing SV at any given preload/afterload. Loop area (stroke work) increases.", "advanced"],
    ["A patient with cardiogenic shock has a PV loop with rightward shift, flattened ESPVR, narrow loop width, and elevated EDP. This pattern indicates:",
     ["Volume depletion", "Severely reduced contractility with elevated filling pressures", "Acute aortic regurgitation alone", "Pure tamponade"],
     1, "Cardiogenic shock from acute MI: contractility ↓ (flat ESPVR), ESV ↑, SV ↓ (narrow loop), and elevated EDP from poor systolic emptying with ongoing filling. Goal: support contractility and reduce afterload cautiously.", "advanced"]
  ]]
]],
[7, "Cardiac Electrical Activity I", [
  [1, "Describe the main features, arrangements, pathways and sequence of electrical excitation and conduction in the heart and the types and features of the cardiac action potentials", [
    ["The normal pacemaker of the heart is the:",
     ["AV node", "Sinoatrial (SA) node", "Bundle of His", "Purkinje fibers"],
     1, "The SA node has the fastest spontaneous depolarization rate (~60-100/min) and serves as the dominant pacemaker. AV node ~40-60; ventricular escape ~20-40.", "basic"],
    ["The normal sequence of electrical conduction is:",
     ["SA → bundle of His → AV node → Purkinje", "SA → AV node → bundle of His → bundle branches → Purkinje", "AV node → SA node → ventricles", "Purkinje → His → AV → SA"],
     1, "Normal sequence: SA node → atria → AV node (delay) → bundle of His → R/L bundle branches → Purkinje fibers → ventricular myocardium.", "basic"],
    ["A 'fast response' cardiac action potential (e.g., ventricular myocyte) has phase 0 mediated by:",
     ["Slow Ca²⁺ influx", "Rapid Na⁺ influx via voltage-gated channels", "K⁺ efflux", "Cl⁻ influx"],
     1, "Fast-response APs (atrial/ventricular myocytes, His-Purkinje) have phase 0 driven by rapid Na⁺ influx. Slow-response APs (SA, AV nodes) have phase 0 driven by Ca²⁺.", "advanced"],
    ["The AV nodal delay is functionally important because it:",
     ["Maximizes ventricular afterload", "Allows atrial contraction to complete ventricular filling before ventricular contraction", "Prevents SA nodal pacing", "Causes physiologic splitting of S2"],
     1, "AV nodal delay (~0.1 s) ensures atrial systole completes before ventricular contraction, optimizing diastolic filling — especially important in atrial-paced rhythms and in HFpEF/AS.", "advanced"]
  ]],
  [2, "Describe the ionic basis for cardiac fast and slow response action potentials and be able to explain how changes in ionic currents may occur and the effect of these changes on action potential features and cardiac function", [
    ["Phase 2 (plateau) of the ventricular AP is characterized by:",
     ["Rapid Na⁺ entry", "Balance between Ca²⁺ entry (L-type) and K⁺ exit", "Massive K⁺ entry", "Cl⁻ entry"],
     1, "Phase 2 (plateau) reflects roughly equal inward Ca²⁺ (L-type channels) and outward K⁺ currents. This plateau is unique to cardiac myocytes and prolongs refractory period.", "basic"],
    ["Phase 3 (repolarization) of the cardiac AP is primarily driven by:",
     ["Sustained Na⁺ influx", "Closure of Ca²⁺ channels and increased K⁺ efflux", "Cl⁻ influx", "Mg²⁺ exchange"],
     1, "Phase 3 = repolarization due to L-type Ca²⁺ channel closure with continued/increased K⁺ efflux (delayed rectifier currents — IKr, IKs).", "basic"],
    ["A drug that BLOCKS the rapid delayed rectifier K⁺ current (IKr) would most likely cause:",
     ["Shortened action potential and short QT", "Prolonged repolarization, prolonged QT, and increased risk of torsades", "Bradycardia with PR prolongation only", "Atrial fibrillation"],
     1, "IKr blockade (Class III antiarrhythmics, many other drugs) prolongs phase 3 repolarization → ↑APD → QT prolongation → torsades risk.", "advanced"],
    ["The 'funny current' (If) responsible for SA node phase 4 spontaneous depolarization is carried by:",
     ["Voltage-gated Na⁺ channels", "HCN channels (mixed Na⁺/K⁺)", "T-type Ca²⁺ channels only", "Cl⁻ channels"],
     1, "If is a slow inward Na⁺/K⁺ current through HCN (hyperpolarization-activated cyclic-nucleotide-gated) channels. β-adrenergic stimulation increases If, accelerating SA rate. Ivabradine blocks If to reduce HR.", "advanced"]
  ]],
  [3, "Explain the following cardiac electrophysiological concepts/terms: rectification, ectopic pacemaker, overdrive suppression, refractory periods, vulnerable periods, arrhythmia, reentry, decremental conduction, reentrant and triggered arrhythmias, conduction block, supraventricular arrhythmias", [
    ["The absolute refractory period of cardiac myocytes corresponds to:",
     ["Phase 4", "Phases 0-2 and early phase 3", "Late phase 3 only", "Phase 0 only"],
     1, "Absolute refractory: phase 0 through about midway through phase 3 — Na⁺ channels remain inactivated and cannot fire regardless of stimulus. Relative refractory follows in late phase 3.", "basic"],
    ["Reentry as a mechanism of arrhythmia requires:",
     ["A single impulse traveling through normal tissue at increased rate", "An anatomic or functional circuit, unidirectional block, and slow conduction", "Increased automaticity of the SA node only", "Electrolyte abnormality only"],
     1, "Reentry requires: (1) a circuit (anatomic or functional), (2) unidirectional block in one limb, (3) slow conduction in the other to allow recovery before re-excitation. Examples: AVNRT, VT around scar.", "basic"],
    ["A patient with WPW has an AVRT. The reentry circuit travels:",
     ["Down the AV node and back up the accessory pathway (orthodromic)", "Down the bundle of His only", "Within the SA node", "Within the atrial muscle only"],
     0, "Orthodromic AVRT (most common, narrow QRS): antegrade through AV node, retrograde via accessory pathway. Antidromic AVRT (wide QRS): antegrade via accessory pathway, retrograde via AV node.", "advanced"],
    ["The vulnerable period of the ventricle (when stimulation can trigger VF) corresponds approximately to:",
     ["Mid-systole during phase 0", "The peak of the T wave (late phase 3)", "Beginning of phase 4", "End of phase 0"],
     1, "Vulnerable period ≈ peak/upslope of T wave (late phase 3) where some cells are recovered and others are not. R-on-T phenomenon in this window can trigger VF.", "advanced"]
  ]],
  [4, "Describe the origin of the electrocardiogram and explain the relationship between its deflections, segments and intervals to underlying electrophysiological events and timing", [
    ["The P wave on the ECG represents:",
     ["SA node depolarization", "Atrial depolarization", "Ventricular depolarization", "Atrial repolarization"],
     1, "The P wave reflects atrial depolarization. SA node firing is too small to detect on surface ECG. Atrial repolarization is masked by the QRS.", "basic"],
    ["The QRS complex represents:",
     ["Atrial depolarization", "Ventricular depolarization", "Ventricular repolarization", "AV nodal conduction"],
     1, "QRS = ventricular depolarization. T wave = ventricular repolarization. AV nodal conduction is electrically silent on surface ECG (within PR interval).", "basic"],
    ["The PR segment (after the P wave, before the QRS) corresponds to:",
     ["Ventricular depolarization", "AV nodal conduction delay (electrically silent on ECG)", "Atrial repolarization (clearly visible)", "Ventricular repolarization"],
     1, "PR segment is when the impulse traverses the AV node and His-Purkinje system — too small to be visible on surface ECG, hence the isoelectric segment.", "advanced"],
    ["The U wave, when prominent, may indicate:",
     ["Hypocalcemia", "Hypokalemia", "Hyperkalemia", "Hypermagnesemia"],
     1, "Prominent U waves are classically seen in hypokalemia. The U wave reflects late repolarization of the Purkinje system or M cells.", "advanced"]
  ]]
]],
[8, "Cardiac Electrical Activity II", [
  [1, "Describe the main features, arrangements, pathways and sequence of electrical excitation and conduction in the heart and the types and features of the cardiac action potentials", [
    ["Compared to ventricular myocytes, AV nodal cells have:",
     ["Faster phase 0 with steeper upstroke", "Slower phase 0 driven by Ca²⁺ rather than Na⁺", "More negative resting membrane potential", "Greater excitability"],
     1, "AV nodal cells are 'slow response' tissue: phase 0 mediated by L-type Ca²⁺ channels, less negative resting potential, slower conduction — ideal for the AV nodal delay.", "basic"],
    ["Conduction velocity is FASTEST in which cardiac tissue?",
     ["AV node", "Atrial muscle", "Purkinje fibers", "SA node"],
     2, "Purkinje fibers conduct at ~2-4 m/s — the fastest in the heart, allowing nearly simultaneous ventricular activation. AV node is slowest (~0.05 m/s).", "basic"],
    ["A patient develops AV node dysfunction. Which escape rhythm is most likely to take over?",
     ["Atrial escape (~70 bpm)", "Junctional escape (~40-60 bpm)", "Ventricular escape (~20-40 bpm)", "No escape rhythm — will become asystolic"],
     1, "AV nodal dysfunction allows the next-fastest pacemaker (junctional, 40-60 bpm) to take over via overdrive suppression release. If His-Purkinje fails too, ventricular escape (20-40) takes over.", "advanced"],
    ["A patient's ECG shows wide QRS complexes at 35 bpm with no preceding P waves and AV dissociation. The most likely rhythm is:",
     ["Sinus bradycardia", "Junctional escape rhythm", "Ventricular escape rhythm with complete heart block", "Atrial flutter"],
     2, "Wide QRS escape at 20-40 bpm with AV dissociation = ventricular escape, typical of complete heart block when both AV node and His bundle fail. Patient may need pacing.", "advanced"]
  ]],
  [2, "Describe the ionic basis for cardiac fast and slow response action potentials", [
    ["Phase 0 of a ventricular myocyte action potential is caused by:",
     ["Opening of voltage-gated Na⁺ channels with rapid Na⁺ influx", "Opening of L-type Ca²⁺ channels", "Opening of K⁺ channels", "Closure of Cl⁻ channels"],
     0, "Phase 0 of fast-response APs is the rapid upstroke from voltage-gated Na⁺ channel opening — large inward Na⁺ current depolarizes the cell quickly.", "basic"],
    ["Phase 1 (early repolarization) of the ventricular AP is mediated by:",
     ["Continued Na⁺ influx", "Transient outward K⁺ current (Ito) and Na⁺ channel inactivation", "L-type Ca²⁺ channel opening", "Cl⁻ efflux"],
     1, "Phase 1 = brief notch from inactivation of Na⁺ channels and opening of transient outward K⁺ current (Ito). Most prominent in epicardial cells; partial cause of the J wave.", "basic"],
    ["A patient is on a Class III antiarrhythmic that blocks IKr. Which AP feature changes most prominently?",
     ["Phase 0 amplitude decreases", "Phase 3 prolongation with increased AP duration and refractoriness", "Phase 4 slope steepens", "Resting membrane potential becomes more positive"],
     1, "IKr blockade (e.g., sotalol, dofetilide) prolongs phase 3 repolarization, lengthening APD and effective refractory period — basis of antiarrhythmic effect AND torsades risk.", "advanced"],
    ["Hyperkalemia causes a less negative resting membrane potential. The clinical consequence on cardiac APs is:",
     ["Faster phase 0 upstroke", "Slower phase 0 upstroke (due to inactivated Na⁺ channels) and slower conduction", "Steeper phase 4 spontaneous depolarization", "Shortened phase 2"],
     1, "Less negative resting potential leaves more Na⁺ channels in inactivated state → slower/smaller phase 0 → slowed conduction (wide QRS, eventual sine wave). Severe hyperkalemia is lethal.", "advanced"]
  ]],
  [3, "Explain the following cardiac electrophysiological concepts/terms: rectification, ectopic pacemaker, overdrive suppression, refractory periods, vulnerable periods, arrhythmia, reentry, decremental conduction, reentrant and triggered arrhythmias, conduction block, supraventricular arrhythmias", [
    ["Overdrive suppression refers to:",
     ["A pacemaker firing too fast", "A faster pacemaker suppressing slower latent pacemakers via Na/K ATPase activity", "AV nodal block", "An escape rhythm taking over"],
     1, "A faster site (e.g., SA node) repeatedly depolarizes lower pacemakers, increasing Na/K ATPase activity, hyperpolarizing them, and suppressing their automaticity — overdrive suppression.", "basic"],
    ["Triggered activity arrhythmias result from:",
     ["Disorders of impulse formation due to early or delayed afterdepolarizations", "Reentry only", "Increased SA node automaticity", "Conduction block at the AV node"],
     0, "Triggered activity arises from afterdepolarizations: EADs (early — phase 2/3, prolonged QT, → torsades) or DADs (delayed — calcium overload, digitalis toxicity).", "basic"],
    ["A 60-year-old on digoxin develops PVCs and bidirectional VT. The most likely mechanism is:",
     ["Reentry due to scar", "Triggered activity from delayed afterdepolarizations (calcium overload from digitalis toxicity)", "Increased SA automaticity", "Vagal tone"],
     1, "Digitalis toxicity causes intracellular Ca²⁺ overload → DADs → triggered activity. Bidirectional VT and atrial tachycardia with block are characteristic. Treat with digoxin-Fab.", "advanced"],
    ["Decremental conduction is a feature of which cardiac tissue?",
     ["His-Purkinje system", "Atrial muscle", "AV node", "Ventricular myocardium"],
     2, "AV node exhibits decremental conduction (slowing with increasing rate of stimulation), protecting ventricles from rapid atrial rates (e.g., during AFib).", "advanced"]
  ]],
  [4, "Describe the origin of the electrocardiogram and explain the relationship between its deflections, segments and intervals to underlying electrophysiological events and timing", [
    ["The T wave on the ECG corresponds to:",
     ["Atrial depolarization", "Ventricular depolarization", "Ventricular repolarization", "AV nodal conduction"],
     2, "T wave = ventricular repolarization. Note that ventricular repolarization proceeds in the OPPOSITE direction to depolarization (epi → endo for repol), so T waves are usually concordant with QRS.", "basic"],
    ["The QT interval represents:",
     ["Atrial depolarization plus AV nodal delay", "Total ventricular depolarization plus repolarization", "Atrial repolarization", "Conduction through the bundle of His"],
     1, "QT measures from start of QRS to end of T = total ventricular depolarization + repolarization. Lengthens at slower HR (corrected = QTc).", "basic"],
    ["A patient has a wide QRS (140 ms), discordant T wave inversion in V1-V3, and T wave concordant with QRS in V5-V6. This is most consistent with:",
     ["Acute MI with reciprocal changes", "Right bundle branch block with normal repolarization pattern", "Pericarditis", "Hyperkalemia"],
     1, "RBBB has discordant T waves in V1-V3 (TWI) — a normal repolarization abnormality of BBB. Concordant T waves with the wide QRS in BBB raise concern for ischemia (Sgarbossa).", "advanced"],
    ["A patient's ECG shows narrow QRS complexes with regular RR intervals at 165 bpm and no visible P waves. Which arrhythmia is most likely?",
     ["Atrial fibrillation", "Atrial flutter at 4:1 conduction", "AV nodal reentrant tachycardia (AVNRT)", "Ventricular tachycardia"],
     2, "Narrow QRS, regular, fast (~150-220 bpm), no visible P (or buried in QRS) = AVNRT — the most common SVT. Carotid sinus massage or adenosine often terminates.", "advanced"]
  ]]
]],
[9, "ECG: Rhythm Diagnosis I", [
  [1, "Identify the following rhythms on a rhythm strip: normal sinus rhythm, atrial fibrillation, first/second/third-degree heart block, ventricular tachycardia, ventricular fibrillation, sinus arrhythmia, asystole, sinus bradycardia/tachycardia, junctional rhythm, ventricular escape, Torsade de Pointes, supraventricular tachycardia, premature atrial contractions, premature ventricular contractions, and atrial flutter", [
    ["A rhythm strip shows irregularly irregular R-R intervals with no discernible P waves and an undulating baseline. The diagnosis is:",
     ["Sinus arrhythmia", "Atrial flutter", "Atrial fibrillation", "Multifocal atrial tachycardia"],
     2, "AFib: irregularly irregular RR, absent P waves, and fine fibrillatory baseline. Atrial flutter is regular with 'sawtooth' F waves. MAT has ≥3 distinct P morphologies.", "basic"],
    ["A wide QRS tachycardia at 180 bpm with regular R-R intervals and AV dissociation is most consistent with:",
     ["Sinus tachycardia with aberrancy", "Ventricular tachycardia", "Atrial flutter with rapid response", "AVNRT with bundle branch block"],
     1, "Wide QRS tachycardia with AV dissociation, capture beats, or fusion beats strongly suggests VT. Always treat wide complex tach as VT until proven otherwise, especially with structural heart disease.", "basic"],
    ["A 78-year-old with syncope has a rhythm strip showing P waves at 80 bpm and QRS complexes at 35 bpm with no consistent PR relationship. The diagnosis is:",
     ["First-degree AV block", "Mobitz I (Wenckebach)", "Mobitz II AV block", "Third-degree (complete) heart block"],
     3, "Complete (3rd-degree) AV block: AV dissociation with independent atrial and (slower) ventricular rates. Symptomatic 3rd-degree block requires pacemaker.", "advanced"],
    ["A polymorphic, twisting wide-QRS tachycardia in a patient with QTc 530 ms is:",
     ["Monomorphic VT", "Atrial fibrillation with aberrancy", "Torsades de Pointes", "Ventricular fibrillation"],
     2, "Torsades de Pointes is polymorphic VT in the setting of prolonged QT — appears to twist around the baseline. Treat with IV magnesium and identify QT-prolonging causes.", "advanced"]
  ]]
]],
[10, "ECG: Rhythm Diagnosis II", [
  [1, "Identify the following rhythms on a rhythm strip (continued: NSR, AFib, AV blocks, VT, VF, junctional, escape, torsades, SVT, PACs, PVCs, atrial flutter)", [
    ["A rhythm strip shows regular P waves at 75 bpm, regular QRS at 75 bpm, but the PR interval is 0.26 s. The diagnosis is:",
     ["First-degree AV block", "Second-degree AV block", "Sinus tachycardia", "Junctional rhythm"],
     0, "First-degree AV block: PR >200 ms, every P followed by QRS, regular. By itself usually benign and rarely needs treatment.", "basic"],
    ["A regular sawtooth pattern at atrial rate of 300 with ventricular rate of 150 best describes:",
     ["Atrial fibrillation", "Atrial flutter with 2:1 conduction", "Sinus tachycardia", "AVNRT"],
     1, "Atrial flutter: atrial rate ~250-350 bpm, classic sawtooth flutter waves (best seen in II, III, aVF, V1), often with 2:1 AV conduction giving ventricular rate of 150.", "basic"],
    ["An asymptomatic 25-year-old athlete has a sinus rate of 48 bpm with normal P morphology and no symptoms. The most likely interpretation is:",
     ["Pathologic sinus bradycardia requiring pacemaker", "Sinus bradycardia, likely a normal physiologic finding from increased vagal tone", "First-degree AV block", "Junctional rhythm"],
     1, "Sinus bradycardia in a trained athlete is typically physiologic from high vagal tone. Pathologic significance requires symptoms or hemodynamic compromise.", "advanced"],
    ["A patient's rhythm strip shows progressive PR lengthening followed by a non-conducted P wave, then the cycle repeats. This is:",
     ["Mobitz I (Wenckebach) AV block", "Mobitz II AV block", "Complete heart block", "Sinus arrhythmia"],
     0, "Mobitz I (Wenckebach): progressive PR lengthening with eventual dropped beat. Typically benign, AV nodal level. Mobitz II has constant PR with sudden dropped beats and is below the AV node — higher risk.", "advanced"]
  ]]
]],
[11, "ECG: Pathological Morphologies I", [
  [1, "Describe the ECG features of left and right atrial enlargement", [
    ["The classic ECG sign of LEFT atrial enlargement is:",
     ["Tall peaked P in lead II (>2.5 mm)", "Notched, broad P wave in lead II ('P-mitrale') with terminal negativity in V1", "Inverted P in lead I", "Absent P waves"],
     1, "LAE: P wave duration >120 ms, often notched ('P-mitrale') in lead II; terminal negative deflection in V1 >40 ms or >1 mm. Common with mitral stenosis, LV diastolic dysfunction.", "basic"],
    ["The classic ECG sign of RIGHT atrial enlargement is:",
     ["Tall peaked P in lead II (>2.5 mm) — 'P-pulmonale'", "Notched broad P wave in lead II", "Wide PR interval >0.20 s", "Absent P in V1"],
     0, "RAE: tall, peaked P in lead II (>2.5 mm) called 'P-pulmonale' — seen in COPD, pulmonary HTN, tricuspid valve disease.", "basic"],
    ["A 65-year-old with mitral stenosis has an ECG showing notched P in lead II and a deep terminal negative component in V1. This finding is:",
     ["Right atrial enlargement", "Left atrial enlargement", "Biatrial enlargement", "First-degree AV block"],
     1, "MS classically causes LA pressure overload → LAE → P-mitrale (broad notched P in II) and terminal negative P force in V1. P-mitrale = 'M-shaped' P wave.", "advanced"],
    ["A patient with severe COPD has tall peaked P waves >2.5 mm in lead II AND a notched broad P >120 ms. This indicates:",
     ["Right atrial enlargement only", "Left atrial enlargement only", "Biatrial enlargement", "Normal P morphology"],
     2, "Biatrial enlargement: features of both RAE (tall P in II) and LAE (broad/notched P in II, terminal negative in V1). May be seen in advanced cor pulmonale with comorbid LA disease.", "advanced"]
  ]],
  [2, "Describe the diagnostic criteria for left and right ventricular hypertrophy and identify on ECG", [
    ["The Sokolow-Lyon criteria for LVH require:",
     ["S in V1 + R in V5 or V6 ≥ 35 mm", "R in aVL ≥ 5 mm", "S in V1 ≥ 7 mm only", "R in V1 ≥ 10 mm"],
     0, "Sokolow-Lyon: S(V1) + R(V5 or V6) ≥35 mm. Cornell criteria: R(aVL) + S(V3) >28 mm (men) or >20 mm (women). Other supportive findings: LAD, strain pattern, LAE.", "basic"],
    ["The classic ECG finding of right ventricular hypertrophy includes:",
     ["Tall R in V1 (R/S ratio >1) with right axis deviation", "Deep S in V1 with normal axis", "Broad notched R in V1", "PR prolongation"],
     0, "RVH: R/S ratio >1 in V1, RAD >+90°, deep S in V5-V6, often with right ventricular strain (TWI in V1-V3, II/III/aVF).", "basic"],
    ["A 70-year-old with severe AS has an ECG with deep S in V2 and tall R in V5 totaling 42 mm, plus T-wave inversion in V5-V6. This pattern is:",
     ["Normal variant", "LVH with strain pattern", "RVH", "Old anterior MI"],
     1, "LVH with strain: meets voltage criteria + 'strain' (downsloping ST depression and asymmetric TWI in lateral leads V5-V6, I, aVL). Common in chronic pressure overload (HTN, AS).", "advanced"],
    ["RVH is suggested by which combination of findings?",
     ["LAD, deep S V1-V2, tall R in I", "RAD, tall R in V1, right ventricular strain (TWI V1-V3)", "Normal axis, deep Q in I/aVL", "LAD, prolonged QRS, LBBB pattern"],
     1, "RVH triad: RAD + tall R in V1 (R/S >1) + RV strain (TWI V1-V3 ± inferior leads). Causes: chronic lung disease, pulmonary HTN, mitral stenosis, congenital heart disease.", "advanced"]
  ]],
  [3, "Describe the ECG changes of the 1st, 2nd, and 3rd degree AV block", [
    ["First-degree AV block is defined by:",
     ["PR interval >0.20 s, all P waves conducted", "Dropped QRS complexes", "AV dissociation", "Absent P waves"],
     0, "First-degree: PR >200 ms with every P conducted to a QRS. Usually asymptomatic; rarely requires pacing.", "basic"],
    ["The defining feature of Mobitz I (Wenckebach) is:",
     ["Sudden non-conducted P with constant PR", "Progressive PR prolongation until a P fails to conduct", "Complete dissociation of P and QRS", "Absent P waves"],
     1, "Mobitz I: PR progressively lengthens, then a P is dropped, then cycle resets. Usually AV nodal — often benign and transient.", "basic"],
    ["A patient has 2:1 AV block with constant PR intervals and narrow QRS. To distinguish Mobitz I from Mobitz II, you should:",
     ["Order an echo first", "Look at the patient's other rhythm strips for PR variability or use atropine/exercise", "Assume it is always Mobitz II", "Implant a pacemaker immediately"],
     1, "2:1 block alone is indeterminate. Atropine or exercise can help: Mobitz I improves with sympathetic stimulation; Mobitz II can worsen. PR variability on other strips also helps.", "advanced"],
    ["Complete heart block (3rd degree) requires which specific feature?",
     ["Constant PR interval >200 ms", "Progressive PR prolongation", "Atrial and ventricular activity completely independent (AV dissociation)", "Dropped beats with constant PR"],
     2, "Third-degree AV block: AV dissociation — atria and ventricles depolarize independently. Atrial rate exceeds ventricular escape rate. Symptomatic CHB requires pacing.", "advanced"]
  ]],
  [4, "Differentiate Mobitz type I and Mobitz type II in 2nd degree AV block", [
    ["Mobitz I (Wenckebach) typically reflects block at the level of:",
     ["AV node", "Bundle of His", "Right bundle branch", "Purkinje fibers"],
     0, "Mobitz I block is typically at the AV node level, often benign and reversible (vagal tone, drugs, ischemia of the inferior wall).", "basic"],
    ["Mobitz II typically reflects block at the level of:",
     ["AV node", "Below the AV node (His-Purkinje)", "SA node", "Bundle of Kent"],
     1, "Mobitz II is infranodal (His-Purkinje). High risk of progression to complete heart block. Almost always requires pacemaker.", "basic"],
    ["A 70-year-old has narrow QRS, constant PR, and intermittent dropped P waves with no PR change. The most appropriate next step is:",
     ["Observation alone", "Pacemaker implantation due to risk of progression to complete block", "IV atropine drip", "Vigorous IV fluids"],
     1, "Mobitz II: high risk of progression to CHB and asystole. Indication for pacemaker (Class I), regardless of symptoms.", "advanced"],
    ["Which feature MOST favors Mobitz II over Mobitz I in a 2:1 AV block strip?",
     ["Wide QRS, suggesting infranodal block", "Narrow QRS with PR prolonging on the conducted beat", "PR interval shortening with exercise", "Junctional escape during dropped beats"],
     0, "Wide QRS (BBB pattern) on conducted beats favors Mobitz II (infranodal disease). Narrow QRS favors Mobitz I (AV nodal).", "advanced"]
  ]],
  [5, "Describe the right bundle branch block and the left bundle branch block in ECG", [
    ["RBBB criteria include:",
     ["QRS ≥120 ms with rSR' in V1 and slurred S in I/V6", "QRS ≥120 ms with broad notched R in V1", "QRS <100 ms with normal precordial pattern", "Pathologic Q waves in V1-V3"],
     0, "RBBB: QRS ≥120 ms, rSR' (rabbit ears) in V1, broad slurred S in I, V5-V6, with discordant T inversion in V1-V3.", "basic"],
    ["LBBB criteria include:",
     ["Broad notched/monomorphic R in I, aVL, V5-V6 with QS or rS in V1, QRS ≥120 ms", "rSR' pattern in V1", "Normal QRS duration with TWI in V5-V6", "Tall R in V1 with normal width"],
     0, "LBBB: QRS ≥120 ms, broad/notched R in lateral leads (I, aVL, V5, V6), QS or rS in V1. Discordant ST/T (Sgarbossa criteria help diagnose MI in LBBB).", "basic"],
    ["A new LBBB in a patient with chest pain should be treated as:",

    ["A patient with chronic RBBB has anterior chest pain. Assessing for anterior MI in RBBB requires:",
     ["Looking for new ST elevation in V1-V3, since RBBB typically does not obscure anterior MI", "Assuming RBBB always masks MI", "Comparing T-wave morphology only", "Routine echo with no ECG analysis"],
     0, "RBBB does NOT typically obscure ST elevation in anterior leads (unlike LBBB). New ST elevation in V1-V3 with chest pain is suspicious for anterior STEMI even with chronic RBBB.", "advanced"]
  ]],
  [6, "Describe the intraventricular conduction delay, left anterior hemiblock, left posterior hemiblock in an ECG", [
    ["LAFB (left anterior fascicular block) is characterized by:",
     ["Left axis deviation (-45° to -90°), qR in I/aVL, rS in II/III/aVF, normal QRS width", "Right axis deviation with rS in I", "QRS >150 ms with monomorphic R", "rSR' in V1"],
     0, "LAFB: marked LAD (-45° to -90°), small q in I/aVL with R, small r/deep S in II/III/aVF, QRS usually <120 ms.", "basic"],
    ["LPFB is characterized by:",
     ["LAD with qR in I", "RAD (>+90°), rS in I/aVL, qR in II/III/aVF, QRS usually <120 ms (after excluding RVH and lateral MI)", "Wide QRS >150 ms in lateral leads", "Tall R in V1 only"],
     1, "LPFB: RAD with qR in inferior leads, rS in I/aVL. Diagnose only after excluding RVH and lateral MI as causes of RAD. Less common than LAFB.", "basic"],
    ["A patient has both RBBB pattern and LAFB. This is termed:",
     ["Bifascicular block (RBBB + LAFB)", "Trifascicular block", "Complete heart block", "Bundle of His block"],
     0, "Bifascicular block = RBBB + LAFB or LPFB. Trifascicular = bifascicular + 1° AV block (or alternating BBB). Increased risk of progression to CHB.", "advanced"],
    ["A patient with bifascicular block (RBBB + LAFB) and intermittent syncope is found to also have first-degree AV block. The next best step is:",
     ["Reassurance only", "Electrophysiology study and consideration for pacemaker", "Beta-blocker therapy", "Loop recorder placement only without referral"],

  ]],
  [7, "List the causes of atrial premature beats", [
    ["A common cause of atrial premature contractions (PACs) is:",
     ["Increased vagal tone", "Sympathetic stimulation (caffeine, stress, alcohol, hyperthyroidism, COPD)", "Hypothermia", "Decreased cardiac output"],
     1, "PAC triggers: caffeine, stress, alcohol, nicotine, hyperthyroidism, COPD, electrolyte abnormalities, atrial dilation. Often benign.", "basic"],
    ["A patient with mitral stenosis has frequent PACs. The most likely contributing factor is:",
     ["Atrial pressure overload and dilation", "Decreased preload", "Bradycardia", "Hypotension"],
     0, "MS → LA pressure overload → LA dilation → atrial stretch → ectopic foci → PACs (and progression to AFib).", "basic"],
    ["A 28-year-old with palpitations has an ECG showing isolated PACs at rest. Caffeine intake is ~5 cups/day. The best initial management is:",
     ["Beta-blocker for life", "Reassurance and reduction of stimulants (caffeine, nicotine, alcohol)", "Catheter ablation", "Anticoagulation"],
     1, "Asymptomatic or mildly symptomatic isolated PACs in a healthy person are usually benign. Reduce stimulants and reassure. Beta-blockers reserved for symptomatic, frequent PACs.", "advanced"],
    ["Multifocal atrial tachycardia (≥3 distinct P-wave morphologies) is most commonly associated with:",

     0, "MAT classically occurs in COPD, often with hypoxia. ≥3 distinct P morphologies, irregular RR. Treat by addressing underlying disease; avoid β-blockers in COPD bronchospasm; verapamil/Mg can help.", "advanced"]
