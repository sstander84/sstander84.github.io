      ["Suboccipital release is typically performed by:", ["Sustained gentle fingertip pressure under the occiput between mastoid processes, supine", "Forcefully thrusting through the OA joint with the patient seated upright in chair", "Compressing both carotid arteries bilaterally with sustained moderate manual pressure", "Stretching the cervical spine into full passive extension combined with deep rotation"], 0, "Suboccipital release uses sustained gentle fingertip pressure beneath the occiput (in the soft tissue between mastoid processes) with the patient supine, allowing the suboccipital muscles to relax — often produces marked patient comfort. Forceful thrusts, carotid compression, or extreme extension/rotation are not the technique.", "basic"],
      ["Which is a contraindication to vigorous cervical soft tissue technique?", ["Acute cervical muscle strain with mild tightness", "Postural cervical tightness in a healthy young adult", "Cervical artery dissection or vertebrobasilar insufficiency", "Mild trigger points within the upper trapezius region"], 2, "Suspected vascular pathology — cervical artery dissection or vertebrobasilar insufficiency — is a strong contraindication because cervical manipulation/strong soft tissue can extend a dissection or trigger a stroke. Acute mild strain, postural tightness, and benign trigger points are usually indications for gentle soft tissue, not contraindications.", "advanced"],
      ["A 28-year-old presents with acute neck pain and sudden severe occipital headache after a chiropractic adjustment 6 hours ago. She has new HORNER syndrome (right ptosis, miosis, anhidrosis) and dysarthria. The MOST important next step is:", ["Reapply the soft tissue technique to relieve her symptoms", "Urgent evaluation for cervical artery dissection with CT angiography", "Discharge home with NSAIDs and simple reassurance", "Apply heat and recheck the patient in one week"], 1, "New neurologic symptoms after cervical manipulation are a RED FLAG for cervical artery dissection (vertebral or internal carotid) — Horner syndrome plus headache plus neuro symptoms warrant emergent CT/CTA, MRI/MRA, and neurology evaluation. Continued OMT, reassurance, or heat application could delay recognition of a life-threatening condition.", "advanced"],
      ["A patient with severe muscle guarding and trigger points in the upper trapezius would benefit from ischemic compression (sustained pressure) at the trigger point. The PRESSURE applied should be:", ["Maximum tolerated pressure held for the full 90 seconds", "Moderate discomfort held until tissue softening, about 30-60 seconds", "Light brushing strokes applied repeatedly only", "A quick HVLA-style thrust to the trigger point"], 1, "Ischemic compression technique: apply pressure to MODERATE (not maximal) intensity, sustain until the trigger point releases (felt as softening of the taut band, typically 30-60 sec), then move on. Maximal pressure causes tissue damage; brushing strokes are insufficient; HVLA thrusts are not indicated for trigger points.", "advanced"],
      ["A patient with chronic forward head posture and tight upper trapezius/levator scapulae benefits from soft tissue techniques aimed at:", ["Strengthening the already tight upper trapezius further", "Lengthening the tight posterior chain and strengthening deep flexors", "Avoiding all stretching because of the injury risk", "Applying heat alone with no manual technique used"], 1, "The Janda upper cross syndrome pattern (tight upper trap, levator, suboccipitals, pectorals; weak deep cervical flexors and lower scap stabilizers) is addressed by STRETCHING the tight muscles AND STRENGTHENING the weak ones. Strengthening already-tight muscles worsens the imbalance. Avoidance and heat alone are insufficient.", "advanced"]
    ]],
    [7, "Treat cervical spine somatic dysfunctions using facilitated positional release (Lab)", [
      ["Facilitated Positional Release (FPR) is classified as which type of technique?", ["Direct technique requiring engagement of the restrictive barrier", "Indirect technique that uses positioning into the freedom plus a facilitating force", "High-velocity, low-amplitude thrust technique", "Active patient-engagement technique like muscle energy"], 1, "FPR is an INDIRECT technique developed by Stanley Schiowitz that flattens the spinal curve (neutral), then positions the segment into all planes of EASE while applying a facilitating compressive or torsional force, held briefly. Direct, HVLA, and active patient force describe other technique categories.", "basic"],
      ["The standard FPR hold time at the position of ease with facilitating force applied is approximately:", ["About 3 to 5 seconds", "About 30 full seconds", "About 90 full seconds", "About 5 full minutes"], 0, "FPR holds the position of ease with the facilitating force for approximately 3 to 5 SECONDS — much shorter than counterstrain's 90 seconds. This brief hold is a hallmark of FPR. 30 seconds, 90 seconds (counterstrain), or 5 minutes are not the standard FPR times.", "basic"],
      ["The classic FPR sequence consists of which three steps?", ["Flatten the spinal curve, add facilitating force, position the segment into all planes of ease", "Engage the restrictive barrier; apply a quick HVLA thrust; reassess motion afterward", "Position into ease; have patient push against operator resistance for several seconds; relax", "Apply sustained traction; rotate the segment fully to the barrier; deliver a thrust"], 0, "The FPR sequence is: (1) flatten the spinal curve to neutral, (2) add a facilitating force (typically axial compression, sometimes torsion), (3) position the segment into all planes of ease. Step 2 differentiates FPR from other indirect techniques. The other choices describe HVLA, muscle energy, or articulatory technique.", "basic"],
      ["For a C4 ERSright (extended, rotated right, sidebent right) dysfunction, the FPR set-up positions the patient in:", ["Cervical extension, sidebending and rotation to the LEFT with sustained axial traction applied", "Slight flexion to flatten lordosis, then extension + right SB + right rotation + axial compression for 3-5s", "Slight extension to flatten lordosis, then flexion + left SB + left rotation + axial compression for 3-5s", "Pure rotation to the left without any added sidebending or facilitating compression force"], 1, "FPR set-up for C4 ERSright: first flatten the cervical lordosis with slight flexion (neutral the spine), then position the segment into all planes of ease — extension, right sidebending, right rotation — and apply axial compression for 3 to 5 seconds. Positioning into the LEFT engages barriers, not ease. Full flexion plus HVLA describes a different technique. Pure rotation alone omits sidebending, extension, and the facilitating force.", "advanced"],
      ["FPR was developed by which osteopathic physician?", ["Andrew Taylor Still, MD, DO", "Stanley Schiowitz, DO, around 1980", "William Garner Sutherland, DO", "Irvin M. Korr, PhD physiologist"], 1, "Stanley Schiowitz, DO developed Facilitated Positional Release (FPR) — combining position of ease with a facilitating axial compressive (or torsional) force, briefly held to release somatic dysfunction. Still founded osteopathy generally; Sutherland founded cranial osteopathy; Korr researched neurophysiology of facilitation.", "advanced"],
      ["The CRUCIAL difference between FPR and counterstrain is:", ["FPR holds for 90 seconds while counterstrain holds for 3-5 seconds", "FPR holds 3-5 seconds with a facilitating force; counterstrain 90 seconds without", "They are identical techniques given two different names", "Counterstrain applies an HVLA thrust at the end of the hold"], 1, "FPR = 3-5 sec hold WITH added facilitating force (axial compression or torsion). COUNTERSTRAIN = 90 sec hold WITHOUT added facilitating force (purely position of ease). Both are indirect but differ in hold time and the presence of facilitating force. They are not identical. Counterstrain does not use HVLA.", "advanced"],
      ["For an OA F SR RL (flexed, sidebent right, rotated left) dysfunction, the FPR setup positions the patient in:", ["Extension with sidebending left and rotation right, the barrier position", "Neutral cervical with axial compression, then OA flexion, sidebend right, rotate left", "Pure axial traction maintained throughout the hold", "Flexion with sidebending and rotation to the same side"], 1, "FPR for OA F SR RL: flatten cervical lordosis to neutral, add axial compression, then position OA into ALL PLANES OF EASE — flexion + SB right + rotation LEFT (because OA couples SB and rotation to opposite sides) — hold 3-5 sec, return to neutral, reassess. Positioning into the barriers reverses the technique. Pure traction misses the facilitating force. Same-side SB/rotation is not the OA pattern of ease.", "advanced"]
    ]]
  ]],
  [6, "Cervical Spine II — Radiculopathy and Myelopathy", [
    [1, "Identify selected etiologies of cervical radiculopathy", [
      ["In adults over 50 years old, the MOST common cause of cervical radiculopathy is:", ["An acute traumatic cervical disc herniation", "Cervical spondylosis with foraminal narrowing", "A Pancoast tumor at the apex of the lung", "A cervical epidural abscess with infection"], 1, "In older adults (>50), cervical SPONDYLOSIS with osteophyte-induced foraminal narrowing is the most common cause of cervical radiculopathy. Acute disc herniation is more common in younger adults (30s-40s). Pancoast tumor is a rare cause of C8/T1 radiculopathy. Epidural abscess is rare and presents with constitutional symptoms.", "basic"],
      ["In younger adults (typically 30 to 50 years old), the MOST common cause of cervical radiculopathy is:", ["Cervical spondylosis from degenerative osteophytes", "Acute or subacute cervical disc herniation", "Pancoast tumor", "Vertebrobasilar dissection"], 1, "Younger adults typically develop cervical radiculopathy from acute or subacute soft disc HERNIATION, often after lifting or sudden neck strain. Spondylosis predominates in older adults. Pancoast tumor and vertebrobasilar dissection are rare causes. Disc herniation usually affects the inferior nerve root at the level (e.g., C6-C7 disc affects C7 root).", "basic"],
      ["The MOST commonly affected nerve root in cervical radiculopathy is:", ["C5", "C6", "C7", "C8"], 2, "C7 is the most commonly affected nerve root in cervical radiculopathy, typically from C6-C7 disc herniation or foraminal narrowing — producing triceps weakness, decreased triceps reflex, and sensory changes in the middle finger. C6 is the second most common. C5 and C8 are less common.", "basic"],
      ["A 65-year-old smoker presents with C8/T1 radiculopathy plus ipsilateral Horner syndrome. The MOST important diagnosis to exclude is:", ["Cervical spondylosis at C7-T1 with foraminal narrowing", "Pancoast tumor at the lung apex invading sympathetics", "Carpal tunnel syndrome with median nerve involvement", "Acute cervical disc herniation at C7-T1 disc space"], 1, "Lower trunk brachial plexus symptoms (C8/T1 — small finger weakness, intrinsic hand atrophy) plus ipsilateral Horner syndrome (ptosis, miosis, anhidrosis) in a smoker classically points to PANCOAST TUMOR invading the apical pleura and sympathetic chain. Cervical spondylosis and disc herniation would not cause Horner. Carpal tunnel does not cause Horner or T1 weakness.", "advanced"],
      ["A disc herniation at the C6-C7 LEVEL most commonly compresses which nerve root?", ["C6 (the nerve root exiting ABOVE the affected disc level in the cervical spine)", "C7 (the nerve root exiting BELOW the affected disc level — in the cervical spine, the nerve EXITING the level numerically matches the lower vertebra)", "Both C6 and C7 equally", "T1 root"], 1, "In the CERVICAL spine, nerve roots exit ABOVE their corresponding numbered vertebra (e.g., C7 exits above C7 vertebra, between C6 and C7 vertebrae) — so a C6-C7 disc herniation typically compresses the C7 root. This is OPPOSITE the lumbar pattern where roots exit below their vertebra. C8 root exits between C7 and T1.", "advanced"],
      ["Cervical radiculopathy from foraminal narrowing develops more INSIDIOUSLY in older adults because:", ["Disc material in older adults is far more hydrated", "Osteophytes form gradually, narrowing the foramen over years", "Older adults tend to have stronger immune systems", "The cervical lordosis steadily increases with age"], 1, "Older adults more commonly develop foraminal stenosis from gradual OSTEOPHYTE FORMATION at the uncovertebral joints (Luschka) and facet joints — symptoms develop insidiously and may fluctuate. Younger patients are more likely to have acute SOFT DISC herniations. The other options misstate aging physiology or anatomy.", "advanced"],
      ["A 32-year-old woman 24 weeks pregnant develops new acute cervical radiculopathy. Which medication is MOST appropriately AVOIDED?", ["Standard oral acetaminophen for pain relief", "NSAIDs like ibuprofen after 20 weeks gestation", "Topical lidocaine applied to the skin surface", "A course of supervised physical therapy"], 1, "NSAIDs are CONTRAINDICATED in pregnancy beyond 20 weeks (FDA black-box warning) due to risk of premature closure of the fetal ductus arteriosus and oligohydramnios. Acetaminophen is generally considered safe (used judiciously). Topical lidocaine and PT are appropriate. OMT with positioning considerations is also a useful adjunct.", "advanced"]
    ]],
    [2, "Identify signs and symptoms of cervical radiculopathy", [
      ["A patient with a C6 radiculopathy classically presents with which combination of motor and sensory findings?", ["Biceps weakness, decreased brachioradialis reflex, thumb numbness", "Triceps weakness, decreased triceps reflex, middle finger numbness", "Hand intrinsic weakness, decreased finger flexor reflex, small finger numbness", "Deltoid weakness, decreased biceps reflex, lateral shoulder numbness"], 0, "C6 radiculopathy: biceps and wrist extension weakness, decreased brachioradialis reflex, and sensory loss in the thumb and lateral forearm. Triceps weakness with middle finger numbness = C7. Hand intrinsics and small finger = C8. Deltoid and lateral shoulder = C5.", "basic"],
      ["A patient with a C7 radiculopathy classically presents with:", ["Biceps weakness and thumb numbness", "Triceps weakness, decreased triceps reflex, middle finger numbness", "Intrinsic hand muscle weakness and small finger numbness", "Deltoid weakness and lateral shoulder numbness"], 1, "C7 = triceps and wrist flexor weakness, decreased TRICEPS reflex, sensory loss in the middle finger. Biceps + thumb = C6. Intrinsics + small finger = C8. Deltoid + lateral shoulder = C5.", "basic"],
      ["A patient with a C8 radiculopathy classically presents with:", ["Biceps weakness with numbness over the thumb side", "Triceps weakness with middle finger numbness present", "Finger flexor and hand intrinsic weakness, small finger numbness", "Deltoid weakness with lateral shoulder numbness"], 2, "C8 = finger flexor and intrinsic hand muscle weakness with sensory loss in the small finger and medial forearm. The other choices match C6, C7, and C5 respectively.", "basic"],
      ["Cervical radiculopathy from foraminal narrowing typically WORSENS with which neck position?", ["Cervical flexion forward", "Cervical extension with ipsilateral rotation (closes the foramen)", "Contralateral sidebending of the neck", "Cervical traction"], 1, "Extension and ipsilateral rotation CLOSE the affected neural foramen, worsening radicular pain — this is the basis of the Spurling test. Flexion and contralateral sidebending OPEN the foramen and often relieve symptoms. Cervical traction also relieves pain by opening foramina, supporting a positive cervical distraction test.", "advanced"],
      ["A patient with chronic cervical radiculopathy reports new bowel and bladder incontinence and progressive lower extremity weakness with bilateral hand clumsiness. The MOST appropriate next step is:", ["Continue conservative therapy with oral NSAIDs", "Urgent cervical MRI for cord compression and surgical referral", "Order an outpatient EMG and nerve conduction study", "Refer for a cervical epidural steroid injection"], 1, "Progressive long-tract findings (bilateral LE weakness, hand clumsiness) + sphincter dysfunction in a patient with cervical pathology raises urgent concern for cervical MYELOPATHY — emergent MRI and surgical consultation are warranted. Continued conservative care, outpatient EMG, or ESI would dangerously delay diagnosis.", "advanced"],
      ["A patient with chronic C6 radiculopathy on the right has normal MRI findings. The MOST important alternative consideration is:", ["Functional radiculopathy without anatomic basis", "DYNAMIC foraminal narrowing (which may only appear on extension/oblique views or with provocative maneuvers) OR a non-radicular mimicker (carpal tunnel, thoracic outlet, brachial plexopathy)", "Cervical hyperhidrosis", "Conversion disorder"], 1, "Normal static MRI does NOT rule out radiculopathy — DYNAMIC stenosis (only visible with oblique views, extension, or flexion-extension dynamic imaging) and non-radicular mimickers (carpal tunnel, TOS, brachial plexopathy) must be considered. EMG/NCS often helps localize. Conversion disorder is a diagnosis of exclusion.", "advanced"],
      ["The SHOULDER ABDUCTION test (Bakody sign) is positive in cervical radiculopathy because:", ["Placing the hand on top of the head increases nerve root tension", "Placing the hand on the head slackens the plexus and relieves nerve root tension", "It directly compresses the brachial plexus trunks", "It transiently increases intracranial pressure"], 1, "Bakody sign: placing the affected hand on top of the head SLACKENS the brachial plexus and unloads the nerve root, RELIEVING radicular pain — a positive finding supports radiculopathy. The opposite (worsening) would suggest other pathology. The plexus is not compressed; ICP is unrelated.", "advanced"]
    ]],
    [3, "Identify the differential diagnosis of cervical radiculopathy", [
      ["Which condition can mimic C6 radiculopathy and must be considered in the differential?", ["Carpal tunnel syndrome, a median neuropathy at the wrist", "Sciatic nerve compression at the piriformis muscle", "Meralgia paresthetica from a tight belt or waistband", "Common peroneal nerve palsy at the fibular head"], 0, "Carpal tunnel syndrome causes thenar/digit 1-3 sensory symptoms that can mimic C6 radiculopathy — distinguish with provocative tests (Tinel, Phalen, flick sign) and absence of biceps or brachioradialis reflex change. Sciatic, LFC, and common peroneal are lower extremity conditions unrelated to the cervical spine.", "basic"],
      ["A patient with C8 radiculopathy must be differentiated from which similar peripheral nerve entrapment?", ["Median nerve at the carpal tunnel", "Ulnar nerve at the cubital tunnel", "Radial nerve at the spiral groove", "Musculocutaneous nerve at the elbow"], 1, "Ulnar neuropathy at the cubital tunnel produces small finger and medial ring finger sensory symptoms with intrinsic hand weakness — overlapping with C8 distribution. Differentiate with positive Tinel at the elbow, EMG/NCS localizing the lesion, and the C8 dermatome extending into the medial forearm/upper arm. Median, radial, and musculocutaneous entrapments produce different patterns.", "basic"],
      ["Brachial plexopathy (e.g., Parsonage-Turner syndrome) differs from cervical radiculopathy in that it:", ["Always presents with strictly bilateral, identical motor and sensory findings on exam", "Involves multiple nerve distributions in a non-myotomal pattern, often post-viral, with severe pain", "Has identical EMG findings as cervical radiculopathy at a single nerve root level", "Is treated with cervical fusion as the standard first-line surgical intervention"], 1, "Brachial plexopathy involves multiple nerves and muscles in a non-myotomal, non-radicular pattern; pain often precedes weakness; viral infection or vaccination is a common antecedent. Cervical radiculopathy follows a single nerve root distribution. EMG localizes plexopathy distinct from radiculopathy. Treatment is conservative, not cervical fusion.", "basic"],
      ["A patient presents with arm weakness, hyperreflexia in the lower extremities, bilateral hand clumsiness, and a positive Hoffman sign. The MOST likely diagnosis is:", ["Isolated C7 cervical radiculopathy", "Cervical spondylotic myelopathy", "Carpal tunnel syndrome", "Brachial plexitis"], 1, "Long-tract signs (lower extremity hyperreflexia, positive Hoffman, bilateral hand clumsiness, gait disturbance) point to CERVICAL MYELOPATHY, not isolated radiculopathy. C7 radiculopathy involves a single nerve root without long-tract signs. Carpal tunnel is a peripheral neuropathy without UMN signs. Brachial plexitis is regional, not bilateral with long-tract findings.", "advanced"],
      ["A patient with a dissociated sensory loss in a cape-like distribution (loss of pain and temperature with preserved light touch and proprioception over the shoulders and upper arms) most likely has:", ["An acute C7 cervical radiculopathy", "Syringomyelia, a central spinal cord cyst", "Bilateral median carpal tunnel syndrome", "A Pancoast tumor of the lung apex"], 1, "Syringomyelia (often associated with Chiari malformation) is a central cord cyst that interrupts decussating spinothalamic fibers in the anterior commissure, sparing the dorsal columns — producing dissociated sensory loss (loss of pain/temperature with preserved touch/proprioception) in a CAPE distribution. The other options do not produce this pattern.", "advanced"],
      ["Patients with rheumatoid arthritis and chronic neck pain have an INCREASED risk of which catastrophic complication?", ["Traumatic brachial plexus avulsion injury", "Atlantoaxial subluxation from ligament erosion", "Degenerative rotator cuff muscle tears", "Adhesive capsulitis, or frozen shoulder"], 1, "RA classically erodes the synovial transverse ligament of the atlas, leading to ATLANTOAXIAL SUBLUXATION with cord compression — particularly during cervical flexion. Screening lateral flexion-extension X-rays should be obtained before any procedure involving cervical positioning (including intubation). The other complications are not specific to RA neck disease.", "advanced"],
      ["A patient with a known Chiari I malformation develops new bilateral upper extremity weakness, dissociated sensory loss, and gait disturbance. The MOST important next step is:", ["Reassure the patient and recheck again in 6 months", "Cervical MRI for syringomyelia and neurosurgery referral", "Perform immediate cervical HVLA manipulation", "Begin systemic anticoagulation therapy"], 1, "Chiari I is associated with development of SYRINGOMYELIA — new progressive neurologic findings warrant MRI to evaluate for a syrinx and urgent neurosurgical evaluation. Watchful waiting, cervical manipulation, and anticoagulation are inappropriate or dangerous.", "advanced"]
    ]],
    [4, "Describe the physical examination and special tests of the patient with suspected cervical radiculopathy", [
      ["The Spurling test for cervical radiculopathy is performed by:", ["Flexing the cervical spine forward while applying axial compression", "Extending and sidebending/rotating toward the affected side with axial compression", "Distracting the cervical spine gently while turning the head", "Compressing the median nerve at the wrist crease"], 1, "Spurling test = cervical EXTENSION + ipsilateral sidebending and rotation + axial compression — reproduces radicular pain by closing the affected neural foramen. Forward flexion opens the foramen and relieves pain. Distraction also relieves symptoms. Median nerve compression at the wrist is the Phalen/Tinel for carpal tunnel.", "basic"],
      ["The cervical distraction test is considered POSITIVE for cervical radiculopathy when:", ["Applying upward distraction REPRODUCES the radicular pain", "Applying upward distraction RELIEVES the radicular pain", "The patient cannot tolerate any distraction force", "Sidebending to the opposite side reproduces the pain"], 1, "Cervical distraction RELIEVES radicular pain by opening neural foramina — a positive test = relief. Reproduction with distraction is not the expected positive finding. Inability to tolerate is non-specific. Contralateral sidebending tends to relieve, not provoke.", "basic"],
      ["The shoulder abduction relief sign is positive in cervical radiculopathy when:", ["Placing the affected hand on the head relieves radicular pain", "Abducting the arm instead reproduces the radicular pain", "The patient is completely unable to abduct the arm", "There is decreased shoulder strength on both sides"], 0, "Placing the hand of the affected arm on top of the head shortens the brachial plexus and decompresses the affected nerve root, RELIEVING pain — a useful supporting sign. The other choices do not describe a positive shoulder abduction relief sign.", "basic"],
      ["A positive Hoffman sign on cervical examination most strongly suggests:", ["Isolated cervical radiculopathy at C6", "Cervical myelopathy (upper motor neuron pathology)", "Carpal tunnel syndrome", "Normal age-related cervical change"], 1, "Hoffman sign (flicking the middle finger DIP produces flexion of the thumb IP) is an UPPER MOTOR NEURON sign suggesting cervical spinal cord compression / myelopathy — NOT radiculopathy, which is a LMN process. Carpal tunnel and normal age changes do not produce Hoffman sign. Lhermitte sign (electric shock down spine with neck flexion) is another myelopathy clue.", "advanced"],
      ["UPPER LIMB TENSION TESTS (ULTT) are designed to assess:", ["Patency of the vertebral artery within the neck", "Mechanosensitivity of peripheral nerves by limb stretching", "Bone density of the cervical vertebral bodies", "Presence of audible carotid artery bruits"], 1, "ULTT (or upper limb neurodynamic tests) progressively position the upper limb to maximally tension a target nerve (median = ULTT1; ulnar = ULTT4; radial = ULTT2b) — reproduction of symptoms or asymmetric range suggests neural mechanosensitivity, useful in radiculopathy and peripheral entrapment differentiation. The other tests assess unrelated structures.", "advanced"],
      ["The CERVICAL NERVE ROOT FORAMINAL closing maneuver during Spurling test is performed by:", ["Bending the cervical spine into pure forward flexion", "Extension with ipsilateral sidebending, rotation, and compression", "Applying pure axial distraction to the cervical spine", "Rotating the head only to the contralateral side"], 1, "Spurling test: cervical EXTENSION + ipsilateral SB + ipsilateral rotation + axial compression closes the affected foramen and reproduces radicular pain (high specificity, moderate sensitivity). The other maneuvers either open the foramen or do not engage the relevant biomechanics.", "advanced"],
      ["A positive BABINSKI sign in a patient with neck pain suggests:", ["A normal age-related neurological finding", "Upper motor neuron pathology, possibly cervical myelopathy", "A localized peripheral nerve injury at the wrist", "An isolated lumbar disc herniation only"], 1, "Babinski sign (dorsiflexion of great toe with stroking of the lateral plantar surface) is an UMN finding — suggests corticospinal tract pathology. In a patient with cervical complaints, this supports myelopathy and warrants urgent MRI. Babinski is normally absent after age 2 — its presence in adults is pathologic.", "advanced"]
    ]],
    [5, "Identify the diagnostic testing used for the patient with suspected cervical radiculopathy", [
      ["The diagnostic test of choice to confirm cervical radiculopathy from disc herniation or foraminal narrowing is:", ["Plain cervical radiographs, or X-rays", "MRI of the cervical spine region", "Cervical spine ultrasound imaging", "Nuclear bone scintigraphy scan"], 1, "MRI of the cervical spine is the gold standard for evaluating disc herniation, foraminal narrowing, cord signal change, and nerve root compression. X-rays show bony alignment and spondylosis but not soft disc or cord. Cervical ultrasound has very limited role for radiculopathy. Bone scan detects malignancy or infection but not the typical radiculopathy etiology.", "basic"],
      ["EMG/NCS in cervical radiculopathy is most useful for:", ["Confirming the involved nerve root and ruling out peripheral neuropathy or plexopathy", "Visualizing the disc herniation directly within the cervical neural foramen on imaging", "Quantifying bone mineral density to assess for osteoporotic vertebral fracture risk", "Confirming the presence of a tumor or other space-occupying mass at the segment"], 0, "EMG/NCS confirms the level of root involvement, differentiates radiculopathy from peripheral entrapment (e.g., carpal tunnel) or brachial plexopathy, and assesses acute vs chronic denervation. It does not visualize discs (that is MRI), bone density (DEXA), or tumors (MRI/biopsy).", "basic"],
      ["Plain cervical radiographs are useful in the workup of cervical radiculopathy primarily to evaluate:", ["Soft cervical disc protrusion and herniation", "Bony alignment, spondylosis, and foraminal narrowing", "Spinal cord signal abnormalities on imaging", "Continuity of the brachial plexus nerves"], 1, "X-rays show bony alignment, spondylotic changes, foraminal narrowing on oblique views, fractures, and dynamic instability on flexion-extension views. Soft disc protrusion and cord signal require MRI. Brachial plexus is assessed with MRI/EMG, not X-ray.", "basic"],
      ["Which patient with cervical radiculopathy should be sent for CT myelogram rather than MRI?", ["A patient with mild symptoms and no contraindications", "A patient with a pacemaker or other MRI contraindication", "A patient with poorly controlled diabetes mellitus", "A patient with chronic essential hypertension"], 1, "CT myelogram is the alternative for patients who cannot have an MRI — pacemakers, certain implants, severe claustrophobia, or contrast issues. It provides detailed imaging of nerve root compression but is invasive. Diabetes and hypertension do not contraindicate MRI.", "advanced"]
    ]],
    [6, "Describe the treatment plan for the patient with cervical radiculopathy", [
      ["The FIRST-LINE treatment for most acute cervical radiculopathy without red flags is:", ["Immediate surgical decompression with anterior cervical discectomy and fusion", "Conservative care: NSAIDs, physical therapy, OMT, and short activity modification", "Long-term high-dose opioid therapy as sole monotherapy for symptom control", "Cervical fusion surgery within 48 hours of symptom onset for all patients"], 1, "Conservative care is first-line — most cervical radiculopathy resolves within 6-12 weeks with NSAIDs, structured PT, OMT, and short-term activity modification. Immediate surgery is reserved for progressive deficit, myelopathy, or refractory cases. Long-term opioids are not appropriate. Fusion within 48 hours is not standard care.", "basic"],
      ["Cervical epidural steroid injection is most appropriately considered when:", ["At the very first visit, before trying any physical therapy", "After 4-6 weeks of conservative care with persistent radicular pain", "Only in patients who are completely asymptomatic", "Always required as a step before any surgery"], 1, "ESI is typically considered after 4-6 weeks of failed conservative therapy with persistent significant radicular pain — it can provide bridge relief allowing further rehabilitation. Not used as first visit (try conservative first), not for asymptomatic patients, and not absolutely required before surgery.", "basic"],
      ["Indications for urgent surgical evaluation in cervical radiculopathy include all EXCEPT:", ["Progressive motor weakness", "Signs of cervical myelopathy", "Mild numbness in one finger for 2 days", "Refractory severe pain after 6-12 weeks of optimal conservative therapy"], 2, "Mild brief numbness without weakness is not an urgent surgical indication. URGENT surgical evaluation IS warranted for progressive motor weakness, myelopathy signs, bowel/bladder dysfunction, or severe refractory pain after appropriate conservative care.", "basic"],
      ["Use of a soft cervical collar in cervical radiculopathy should be:", ["Made mandatory for at least 6 full weeks", "Limited to a few days to avoid muscle deconditioning", "Worn around the clock indefinitely long-term", "Avoided entirely since it has no real role"], 1, "Soft collar use should be LIMITED to a few days for symptom relief — prolonged use leads to deconditioning of cervical musculature and may delay recovery. It is not mandatory for 6 weeks, not for 24/7 use, and not absolutely contraindicated.", "advanced"]
    ]],
    [7, "Describe the clinical features of cervical myelopathy", [
      ["The most common cause of cervical myelopathy in adults over 55 is:", ["An acute traumatic spinal cord injury", "Cervical spondylotic myelopathy from degeneration", "Demyelinating disease, multiple sclerosis", "A cervical epidural abscess infection"], 1, "Cervical SPONDYLOTIC myelopathy from degenerative spondylosis, OPLL, and disc-osteophyte complexes is the most common cause of cervical myelopathy in older adults. Traumatic injury, MS, and epidural abscess are less common causes. CSM produces insidious onset of long-tract signs.", "basic"],
      ["Which of the following is an UPPER MOTOR NEURON sign suggesting cervical myelopathy?", ["Decreased deep tendon reflexes in the affected limb", "Hoffman sign, hyperreflexia, Babinski sign, and spasticity", "Areflexia and flaccid paralysis", "Pure sensory loss without motor involvement"], 1, "UMN signs (Hoffman, hyperreflexia, Babinski, spasticity, clonus) suggest cervical myelopathy with cord compression — these are the hallmark findings. Decreased reflexes, areflexia, and pure sensory loss are not UMN signs and suggest other pathology.", "basic"],
      ["Patients with cervical myelopathy classically complain of:", ["Sudden, severe headache of very rapid onset", "Insidious gait disturbance with hand clumsiness", "Acute pain in one knee joint with swelling", "Fever along with a productive cough"], 1, "Cervical myelopathy presents insidiously with gait disturbance (broad-based, unsteady), hand clumsiness (difficulty buttoning, dropping objects), and balance impairment — sometimes called 'numb, clumsy hands.' Severe headache, monoarticular knee pain, or febrile illness suggest other diagnoses.", "basic"],
      ["Lhermitte sign in suspected cervical myelopathy is described as:", ["Reproduction of arm radicular pain with neck extension plus ipsilateral rotation", "Electric shock-like sensation down the spine or limbs with neck FLEXION", "Loss of light touch sensation triggered by manual cervical distraction maneuvers", "Sudden vertigo and nystagmus with rapid head turning in a sitting position"], 1, "Lhermitte sign is an electric shock-like sensation down the spine and into the limbs triggered by neck FLEXION — suggests cervical cord pathology (myelopathy, MS, B12 deficiency). Spurling reproduces radicular pain. Distraction relieves radiculopathy. Vertigo with head turning suggests BPPV or VBI.", "advanced"]
    ]],
    [8, "Describe cervical spine somatic dysfunctions and the application of cervical spine muscle energy technique (Lab)", [
      ["For a typical C2-C7 cervical Type II somatic dysfunction, the muscle energy set-up positions the segment at:", ["The position of ease only, then operator delivers a quick thrust into the barrier", "The restrictive barrier; patient pushes gently away for 3-5 sec, relax, take up new barrier, repeat 3-5 times", "Neutral position only with no engagement of either the barrier or the position of ease", "Maximum passive end-range with no active patient muscle effort needed throughout treatment"], 1, "Muscle energy is a DIRECT technique: position to the RESTRICTIVE BARRIER in all three planes, patient performs a 3-5 second isometric contraction (typically ~3-5 lb force) away from the barrier against operator resistance, then relax, take up the new barrier, repeat 3-5 times, reassess. Positioning at ease describes indirect techniques. Neutral or end-range without effort are not ME.", "basic"],
      ["The amount of patient force used during cervical muscle energy is typically:", ["Maximum effort the patient can voluntarily generate", "Approximately 3 to 5 pounds of gentle isometric force", "Sufficient force to fully overcome operator counter", "No active patient force is required at any point"], 1, "ME for the cervical spine uses gentle (approximately 3-5 lb) isometric contraction sustained for 3-5 seconds — too much force defeats the purpose by recruiting accessory muscles. Maximum or operator-overcoming force is incorrect. ME absolutely requires active patient effort.", "basic"],
      ["The typical number of repetitions for cervical muscle energy at a single segment is:", ["1 repetition only", "3 to 5 repetitions, taking up the new barrier each time", "20 or more repetitions until the patient is exhausted", "Continuous until the dysfunction resolves regardless of count"], 1, "3 to 5 repetitions is standard, with the operator taking up the new restrictive barrier between each contraction-relaxation cycle. Single repetition is often insufficient. 20+ reps risks fatigue and inflammation. Endless repetition is not the standard protocol.", "basic"],
      ["For an OA F SR RL (flexed, sidebent right, rotated left) dysfunction, the muscle energy set-up positions the OA at the barriers, which are:", ["Flexion, sidebending right, rotation left", "Extension, sidebending left, rotation right", "Pure flexion only with no sidebending or rotation", "Pure rotation right only with no sidebending or flexion"], 1, "The barriers for OA F SR RL are EXTENSION (opposite of flexion), sidebending LEFT (opposite of SR), and rotation RIGHT (opposite of RL). Patient pushes gently into flexion, right SB, and left rotation against operator resistance, relax, take up new barriers, repeat. Positioning at the ease (flexion, SR, RL) is incorrect for direct ME setup.", "advanced"]
    ]],
    [9, "Identify the location of cervical counterstrain tenderpoints (Lab)", [
      ["The anterior counterstrain tenderpoint for C1 (AC1) is most commonly located:", ["On the posterior aspect of the mandibular angle", "At the inferior medial border of the clavicle", "Over the manubrium of the upper sternum", "At the posterior occipital protuberance area"], 0, "AC1 is found at the posterior aspect of the angle of the mandible, over the transverse process of C1. The infra-medial clavicle is AR1 (rib 1) territory. The manubrium overlies rib 2. The posterior occipital protuberance is a midline landmark.", "basic"],
      ["The anterior cervical tenderpoints for C2 through C6 are most commonly located:", ["On the spinous processes posteriorly in the midline", "On the anterolateral aspect of the cervical transverse processes", "Along the manubrium just below the sternal notch", "Over the sternocleidomastoid bellies in the middle third"], 1, "AC2-AC6 tenderpoints sit on the anterolateral aspect of the cervical transverse processes (anterior tubercles), palpated through SCM with gentle pressure. Posterior spinous processes are midline posterior landmarks. The manubrium is sternal. The SCM bellies can have trigger points but are not the classic anterior cervical tenderpoint locations.", "basic"],
      ["The posterior counterstrain tenderpoint for the occipital condyle / suboccipital area (PC1 inion) is most commonly located:", ["1 inch lateral to the external occipital protuberance (inion)", "At the angle of the mandible posteriorly", "Over the C7 spinous process", "On the anterior aspect of the upper cervical transverse process"], 0, "The PC1 inion tenderpoint sits approximately 1 inch lateral to the external occipital protuccoasiparberance (inion). The angle of the mandible is AC1. The C7 spinous process is a lower cervical landmark. Anterior cervical TP is AC2-C6 territory.", "basic"],
      ["A patient presents with an AC4 tenderpoint requiring counterstrain. Anatomically, you should expect to find this point at:", ["The midline anterior neck just below the cricoid cartilage", "The anterolateral aspect of the C4 transverse process, just behind SCM", "The posterior aspect of the inion at the external occipital protuberance", "Over the lateral aspect of the upper trapezius at the C4 vertebral level"], 1, "AC4 sits on the anterolateral aspect of the C4 transverse process (anterior tubercle), palpated by gently displacing SCM laterally. Midline below cricoid is over the trachea. The inion is the posterior midline landmark. Lateral trapezius is posterior-lateral, not the AC location.", "advanced"]
    ]],
    [10, "Describe the treatment position for cervical counterstrain tenderpoints (Lab)", [
      ["The general treatment position for ANTERIOR cervical counterstrain tenderpoints (AC2-AC6) is:", ["Extension, sidebending and rotation TOWARD the tenderpoint", "Flexion, sidebending and rotation AWAY from the tenderpoint", "Flexion, sidebending TOWARD and rotation AWAY from the tenderpoint", "Neutral with traction only"], 1, "Anterior cervical tenderpoints (AC2-AC6) are treated with FLEXION + sidebending AWAY + rotation AWAY (FSARA). Pure extension is for posterior tenderpoints. Flexion with sidebending toward and rotation away is not the standard position. Neutral with traction is not counterstrain.", "basic"],
      ["The general treatment position for POSTERIOR cervical counterstrain tenderpoints (PC2-PC6) is:", ["Flexion with sidebending directly toward the tender point", "Extension, sidebending and rotation away from the tenderpoint", "Flexion, sidebending and rotation away from the tenderpoint", "Neutral position with axial compression only"], 1, "Posterior cervical tenderpoints (PC2-PC6) are typically treated with EXTENSION + sidebending and rotation AWAY (ESARA) from the tenderpoint. Some sources use slight rotation toward depending on the specific point. Flexion is for anterior tenderpoints. Neutral with compression alone is not the counterstrain set-up.", "basic"],
      ["The treatment position for an AC1 tenderpoint (anterior C1, posterior to mandible angle) is:", ["Marked flexion with sidebending and rotation toward the tenderpoint", "Flexion with marked rotation AWAY from the tenderpoint, sidebending AWAY", "Extension with rotation toward the tenderpoint", "Flexion with marked rotation TOWARD the tenderpoint, sidebending TOWARD"], 1, "AC1 treatment uses flexion (often substantial) with MARKED rotation AWAY from the tenderpoint and minimal sidebending — the heavy rotation away is characteristic. Rotation toward the tenderpoint engages the wrong direction. Extension is for posterior cervical points. Pure traction is not counterstrain.", "basic"],
      ["The treatment position for a PC1 inion tenderpoint (1 inch lateral to inion) is:", ["Marked OA extension with sidebending and rotation away from the tenderpoint", "Marked cervical flexion with sidebending toward the tenderpoint and rotation", "Neutral cervical with sustained axial traction applied throughout the hold", "Pure rotation toward the tenderpoint without any added sidebending or extension"], 0, "PC1 inion is treated with marked extension (focused at OA) plus sidebending and rotation AWAY from the tenderpoint, often held with the operator's hand cradling the occiput. Flexion with SB toward describes an anterior tenderpoint set-up. Neutral with traction is not counterstrain. Pure rotation is insufficient.", "advanced"]
    ]]
  ]],
  [7, "Cumulative Review — OPP 1 and OPP 2", [
    [1, "Philosophy, history, and tenets of osteopathic medicine", [
      ["Osteopathic medicine was founded in what year and by whom?", ["1874 by Andrew Taylor Still in Kirksville", "1892 by William Osler in Baltimore, Maryland", "1901 by Daniel David Palmer in Davenport, Iowa", "1910 by Abraham Flexner in New York City"], 0, "A.T. Still founded osteopathy on June 22, 1874, in Kirksville, Missouri, and opened the first osteopathic school (American School of Osteopathy) there in 1892. William Osler was an MD at Johns Hopkins. D.D. Palmer founded chiropractic. Abraham Flexner authored the 1910 Flexner Report on medical education reform.", "basic"],
      ["The four tenets of osteopathic medicine include all of the following EXCEPT:", ["The body is a unit of mind, body, and spirit", "The body is capable of self-regulation, self-healing, and health maintenance", "Structure and function are reciprocally interrelated", "Treatment must always include pharmacotherapy as the primary modality"], 3, "The four tenets are: (1) The body is a unit (person is a unit of body, mind, spirit); (2) The body is capable of self-regulation, self-healing, and health maintenance; (3) Structure and function are reciprocally interrelated; (4) Rational treatment is based on the previous three principles. Pharmacotherapy as the PRIMARY required modality is not a tenet — DOs use a wide range of approaches including OMT.", "basic"],
      ["A.T. Still's foundational philosophy emphasized which therapeutic principle?", ["Aggressive pharmacologic management with minimal manual therapy at any visit", "The body has its own pharmacy; the physician removes obstructions to allow healing", "Mandatory surgical correction of every documented somatic dysfunction in the body", "Pure observation without intervention as the primary mode of medical practice"], 1, "A.T. Still's core philosophy was that the body contains its own pharmacy (homeostasis, self-healing) and the physician's role is to FIND IT, FIX IT, LEAVE IT ALONE — remove obstructions and allow the body to heal. The other options misrepresent osteopathic philosophy.", "basic"],
      ["The American Osteopathic Association formally established osteopathic medicine in the United States. Which year is associated with the founding of the first osteopathic medical school?", ["1865, post-Civil War reconstruction", "1874, the year Still 'flung the banner of osteopathy to the breeze'", "1892, founding of the American School of Osteopathy in Kirksville", "1910, the year of the Flexner Report"], 2, "The American School of Osteopathy (now A.T. Still University) was founded by A.T. Still in 1892 in Kirksville, Missouri — the first osteopathic medical school. 1874 is the conceptual founding year of osteopathy itself. The 1910 Flexner Report led to school closures across allopathic and osteopathic medicine. 1865 marks Lincoln's assassination, not relevant here.", "advanced"],
      ["Which event in A.T. Still's personal life is historically credited as the primary catalyst for his rejection of orthodox medicine and founding of osteopathy?", ["His own near-fatal episode of pneumonia in the early 1860s", "The deaths of three of his children from spinal meningitis in 1864", "His service as a Union Army surgeon during the Battle of Gettysburg", "His training under Daniel David Palmer in Iowa"], 1, "Still lost three of his children to spinal meningitis in 1864 despite the best orthodox treatment available, an event he credited as his motivation to seek a new approach to medicine. He served as a hospital steward and de facto surgeon in the Civil War but not at Gettysburg specifically. Palmer founded chiropractic AFTER Still founded osteopathy. Still's pneumonia did not catalyze his departure from orthodox medicine.", "advanced"],
      ["A 58-year-old woman with type 2 diabetes, depression, and chronic low back pain asks why her DO recommended OMT, dietary changes, and counseling rather than escalating her opioid dose. The MOST accurate philosophical basis for this approach is:", ["Osteopathic practice forbids all opioid use in every circumstance", "The body-as-a-unit tenet supports integrated biomechanical and behavioral care", "Osteopathic schools require OMT before any pharmacotherapy is started", "Tenet 2 mandates that all chronic pain be treated nonpharmacologically"], 1, "Tenet 1 (body as a unit of body/mind/spirit) supports integrated multimodal care addressing the biomechanical, metabolic, and behavioral domains rather than reducing the patient to a single symptom — fully consistent with the biopsychosocial model. Osteopathic practice does not forbid opioids, does not require OMT before pharmacotherapy, and does not mandate nonpharmacologic treatment only.", "advanced"],
      ["The five osteopathic models of treatment as articulated by the AACOM/AOA include all of the following EXCEPT:", ["Biomechanical model", "Respiratory-circulatory model", "Neurological model", "Pharmacological-genomic model"], 3, "The five recognized osteopathic models are biomechanical, respiratory-circulatory, neurological, metabolic-energy, and behavioral. A pharmacological-genomic model is not part of this framework. The models help structure clinical reasoning and treatment selection in OMM.", "advanced"],
      ["A patient with chronic obstructive pulmonary disease and frequent exacerbations would MOST benefit from OMT framed primarily through which osteopathic model?", ["The purely behavioral and psychosocial model", "Respiratory-circulatory model addressing thoracic cage and diaphragm", "Metabolic-energy model focused on vitamin status", "Biomechanical model focused only on the lumbar mechanics"], 1, "COPD treatment via OMT is best framed through the respiratory-circulatory model, addressing rib cage mobility, diaphragm function, thoracic inlet, and lymphatic drainage to support gas exchange and reduce work of breathing. Behavioral and metabolic-energy models are adjunctive but not primary. Pure lumbar biomechanics is not the central concern in COPD.", "advanced"],
      ["Which statement best captures A.T. Still's view on the relationship between osteopathy and allopathic pharmacology of his era?", ["He embraced all available medications and merely added manual therapy", "He was skeptical of the toxic medications of his era and emphasized intrinsic healing", "He believed medications should always be combined with OMT in equal measure", "He had no published opinion on the medication use of his time"], 1, "Still was openly critical of the heroic and often toxic medications of the late 19th century (calomel, mercury, bleeding) and emphasized the body's self-healing capacity when obstructions were removed. He did not embrace all medications or advocate equal proportions — modern integration of pharmacology came later. He was prolific in writing his philosophy.", "advanced"],
      ["A patient who is recovering from rotator cuff surgery returns 4 weeks post-op with significant cervical and upper thoracic stiffness. According to the structure-function tenet, the MOST defensible OMT approach is:", ["Strictly avoid OMT in any surgical patient for a full 6 months", "Address cervical and thoracic mechanics to support shoulder recovery", "Treat only the operated shoulder with HVLA at the glenohumeral joint", "Refer the patient back to surgery for a revision procedure"], 1, "Tenet 3 (structure and function are reciprocally interrelated) supports addressing adjacent regions whose mechanics impact recovery — restoring cervicothoracic motion supports shoulder rehabilitation. Strict avoidance is overcautious. Direct HVLA at the operated joint is contraindicated in the early postoperative period. Surgical revision is not indicated for stiffness alone.", "advanced"],
      ["The 1910 Flexner Report had which MAJOR effect on osteopathic medical education?", ["It mandated the immediate closure of all osteopathic schools nationwide", "It pressured schools to raise scientific standards, closing many weaker programs", "It formally merged osteopathic and chiropractic medical education", "It established the AOA as the sole accreditor of all U.S. medical schools"], 1, "The Flexner Report criticized weak medical schools across both professions, leading to mass closures and a strengthened scientific curriculum at surviving schools — including osteopathic schools that adopted enhanced basic-science and clinical training. It did not target osteopathic schools for closure specifically, did not merge with chiropractic, and did not establish the AOA as the universal accrediting body.", "advanced"],
      ["The 2020 single GME accreditation system in the United States resulted in:", ["All osteopathic residencies being abolished entirely under ACGME oversight", "ACGME accrediting all residency programs while preserving osteopathic recognition", "The AOA taking over accreditation of all allopathic residency programs", "DOs being prohibited from training in any ACGME-accredited programs"], 1, "As of 2020, ACGME became the single accrediting body for all U.S. residency programs, but the AOA's osteopathic recognition designation continues for programs that incorporate OPP training — preserving osteopathic distinctiveness within a unified system. Osteopathic residencies were not abolished; AOA did not take over allopathic accreditation; DOs train freely in any ACGME program.", "advanced"],
      ["A patient who insists that all of her health issues are due to misaligned vertebrae and asks for weekly HVLA adjustments is MOST appropriately counseled that:", ["She is correct and weekly cervical HVLA is indicated for general wellness", "Care should integrate multiple modalities; routine prophylactic HVLA lacks evidence", "All osteopathic treatment must be HVLA-based in order to be effective", "She should be referred to a chiropractor since DOs do not perform manipulation"], 1, "Osteopathic care addresses the whole patient and integrates multiple modalities; routine prophylactic HVLA in the absence of symptoms or somatic dysfunction lacks evidence support and risks cumulative harm. The other options misrepresent osteopathic philosophy: HVLA is one of many techniques, not mandatory, and DOs absolutely perform manipulation.", "advanced"],
      ["A patient asks whether DOs and MDs receive the same training and have the same scope of practice in the United States. The MOST accurate response is:", ["DOs train for half as long and have a more restricted scope of practice", "DOs and MDs have equivalent training and unrestricted licenses; DOs add OMM training", "DOs are not permitted to prescribe any controlled substances at all", "DOs may only ever practice within primary care medical fields"], 1, "DOs and MDs both complete 4-year medical school plus residency, hold equivalent unrestricted licenses in all 50 states, and may pursue any specialty (surgery, cardiology, neurosurgery, etc.). DOs additionally complete ~200 hours of OMM/OPP training during medical school. They have identical prescribing authority including controlled substances.", "advanced"]
    ]],
    [2, "Function/dysfunction, facilitated segment, and viscerosomatic reflexes", [
      ["Somatic dysfunction is best defined as:", ["Any musculoskeletal pain regardless of objective palpatory findings on exam", "Impaired function of skeletal, arthrodial, myofascial, and related neural elements", "A radiographic bone abnormality confirmed on plain film or advanced imaging", "A purely psychogenic complaint with no physical correlate on careful exam"], 1, "Somatic dysfunction is defined as impaired or altered function of related components of the somatic (body framework) system — skeletal, arthrodial, myofascial, and their associated vascular, lymphatic, and neural elements. Pain alone is not sufficient; radiographic abnormality is not required; it is a physical, diagnosable finding, not psychogenic.", "basic"],
      ["The TART criteria for diagnosing somatic dysfunction stand for:", ["Tenderness, Anesthesia, Reflexes, and Tone changes", "Tissue texture change, Asymmetry, Restriction, Tenderness", "Tendon, Articulation, Range of motion, and Touch", "Traction, Articular play, Rotation, and Tilt"], 1, "TART = Tissue texture change, Asymmetry, Restriction of motion, Tenderness — the four cardinal signs (also remembered as STAR with Sensitivity replacing T). The other options mix unrelated terms.", "basic"],
      ["A facilitated spinal segment is best described as:", ["A vertebral level that has previously been surgically fused", "A cord segment kept hyperexcitable by chronic afferent input", "A spinal segment with entirely normal nociceptive function", "A purely peripheral nerve phenomenon with no spinal involvement"], 1, "A facilitated segment is a spinal cord level in a hyperexcitable state from chronic afferent input (somatic or visceral), making it more responsive to subsequent inputs — basis for the viscerosomatic reflex and segmental tenderness patterns. Surgical fusion, normal function, and purely peripheral mechanisms do not define facilitation.", "basic"],
      ["Viscerosomatic reflexes at T1-T5 on the left side most classically reflect pathology of which organ?", ["The renal kidneys", "The heart muscle", "The sigmoid colon", "The ovaries or gonads"], 1, "T1-T5 viscerosomatic reflexes on the LEFT reflect cardiac pathology (cardiac sympathetic afferents enter at T1-T5 left). Kidneys at T10-T11, sigmoid colon at L1-L2, ovaries at T10-L2 — different levels and not specific to the left T1-T5 distribution.", "advanced"],
      ["A patient with acute appendicitis classically develops a viscerosomatic reflex at:", ["Around T5-T6 on the left side of the back", "T9-T10 on the right, then shifting to T12-L1", "Around L4-L5 bilaterally in the low back", "Around C2-C4 on the right side of the neck"], 1, "Appendix afferents are primarily T10-T12; classic appendicitis pain first presents periumbilically (T10) and migrates to McBurney's point (T12-L1) as the parietal peritoneum becomes involved. T5-T6 left = cardiac; L4-L5 = lower colon/pelvic; C2-C4 right = ear/sinus territory.", "advanced"],
      ["The hallmark tissue texture finding of an ACUTE somatic dysfunction is:", ["Cool, pale, fibrotic skin with a leathery texture", "Boggy, warm, edematous, erythematous tissue with muscle guarding", "Ropy fibrosis without erythema or temperature change", "Atrophic, dry skin with diminished underlying tone"], 1, "Acute SD: warm, boggy, edematous, erythematous, often with reactive muscle guarding — driven by inflammation. Chronic SD: cool/pale, fibrotic, ropy/stringy, decreased tone, dry skin. The other choices describe chronic findings or unrelated patterns.", "advanced"],
      ["A patient with right shoulder tip pain and no shoulder pathology on imaging should prompt the clinician to evaluate for:", ["Cervical radiculopathy at the C5 nerve root", "Diaphragmatic irritation from gallbladder or liver disease", "Lumbar facet joint pain in the low back", "Median nerve carpal tunnel syndrome at the wrist"], 1, "Right shoulder tip pain without shoulder pathology classically reflects referred pain via the phrenic nerve (C3-C5) from diaphragmatic irritation — gallbladder disease, subphrenic abscess, or hepatic capsular stretch. C5 radiculopathy would cause deltoid weakness/lateral shoulder sensory; facet pain is local; carpal tunnel is hand-distributed.", "advanced"],
      ["Kidney pathology classically produces a viscerosomatic reflex at:", ["T1-T4 bilaterally", "T9-T11 ipsilaterally", "L4-S2 bilaterally", "C3-C5 ipsilaterally"], 1, "Kidney VSR is at T10-T11 (some sources T9-L1) on the ipsilateral side. T1-T4 = heart/lungs upper; L4-S2 = lower bowel/pelvic floor; C3-C5 = phrenic territory.", "advanced"],
      ["Dr. Irvin Korr's research on the facilitated segment most prominently demonstrated:", ["That somatic dysfunction is purely a peripheral muscle phenomenon", "Facilitated-segment sympathetic neurons show heightened responsiveness and lower threshold", "That OMT can entirely replace antibiotics in infectious disease", "That visceral afferents never converge with somatic afferents in the spinal cord"], 1, "Irvin Korr's hallmark research demonstrated heightened excitability of sympathetic neurons at facilitated segments — lower thresholds, broader fields, sustained discharge after stimulus — supporting the segmental basis of VSR and somatic dysfunction patterns. Pure peripheral phenomena, antibiotic replacement, and absence of convergence are not Korr's findings.", "advanced"],
      ["A 45-year-old man presents with mid-thoracic back pain at T5-T7 that does not change with movement, position, or palpation. He is mildly tachycardic and diaphoretic. The MOST important next step is:", ["Reassure him and treat with OMT for thoracic somatic dysfunction", "Obtain an ECG and consider acute coronary syndrome before manual treatment", "Order an MRI of the lumbar spine for evaluation", "Prescribe a muscle relaxant and recheck him in two weeks"], 1, "Mid-thoracic pain unrelated to movement plus autonomic features (tachycardia, diaphoresis) is a viscerosomatic red flag for ACS — the cardiac sympathetic afferents converge on T1-T5 left and can refer to mid-thoracic. ECG and ACS workup take priority. OMT and muscle relaxants are inappropriate before excluding cardiac etiology; lumbar MRI is not indicated for mid-thoracic pain.", "advanced"],
      ["The MOST reliable way to differentiate a primary somatic dysfunction from a viscerosomatic reflex is:", ["Tissue texture changes considered alone", "Persistent failure of the SD to resolve with appropriate OMT", "Patient self-report of organ-specific symptoms only", "Imaging of the affected vertebral segment level"], 1, "A key red flag for visceral etiology is somatic dysfunction that recurs or fails to resolve with appropriate OMT — the underlying visceral pathology continues to drive segmental facilitation. Tissue texture, self-report, and imaging alone are insufficient — clinical reasoning plus treatment response is required.", "advanced"],
      ["Liver and gallbladder pathology classically produces a viscerosomatic reflex at:", ["T1-T4 on the left", "T5-T9 on the right", "L1-L2 bilaterally", "S2-S4 on the right"], 1, "Liver and gallbladder sympathetic afferents enter at T5-T9 on the RIGHT side. T1-T4 left = heart; L1-L2 = lower colon/upper pelvic; S2-S4 = parasympathetic pelvic outflow.", "advanced"],
      ["The dorsal horn lamina most directly involved in nociceptive processing and the facilitated segment phenomenon is:", ["Lamina IX, the motor neuron pool region", "Laminae I, II, and V of the dorsal horn", "Lamina VII, the intermediate zone area", "Lamina X, around the central spinal canal"], 1, "Nociceptive afferents (Aδ and C fibers) terminate primarily in Rexed laminae I (marginal zone), II (substantia gelatinosa), and V (wide-dynamic-range neurons) of the dorsal horn — these are also the sites where facilitation develops. Lamina IX is motor (ventral horn); lamina VII is intermediate; lamina X is around the central canal.", "advanced"],
      ["Sympathetic innervation to the head and neck (eye, salivary glands, vasculature) originates from preganglionic neurons in which spinal cord segments?", ["The C1-C4 cervical spinal cord segments only", "T1-T4 segments ascending to the superior cervical ganglion", "The T6-T10 mid-thoracic spinal cord segments only", "The L1-L2 lumbar spinal cord segments only"], 1, "All sympathetic outflow originates between T1 and L2 (thoracolumbar). Head and neck sympathetics arise from T1-T4, ascend the sympathetic chain to synapse in the SUPERIOR CERVICAL GANGLION, then travel to target organs (eye, salivary glands). Disruption causes Horner syndrome. There are no preganglionic sympathetic cell bodies in the cervical or lumbar regions below L2.", "advanced"]
    ]],
    [3, "Chapman's reflexes — locations and visceral correlations", [
      ["Anterior Chapman points are primarily used for what clinical purpose?", ["Direct treatment of the corresponding visceral dysfunction", "Diagnosis of the corresponding visceral dysfunction", "Aesthetic evaluation of dermatologic skin conditions", "Detection of cutaneous skin malignancies early"], 1, "ANTERIOR Chapman points are used DIAGNOSTICALLY to identify visceral dysfunction — they feel like small, discrete, tender nodules. POSTERIOR Chapman points are used for TREATMENT (light circular pressure for ~10-30 sec or until tenderness resolves). Aesthetic/dermatologic uses are not part of Chapman's reflexes.", "basic"],
      ["The Chapman point for the appendix is located:", ["In the right upper quadrant near the gallbladder", "On the right abdominal wall near the tip of the 12th rib", "Directly over the bony xiphoid process", "Anywhere along the left costal rib margin"], 1, "The appendix Chapman point is on the right anterolateral abdominal wall near the tip of the 12th rib. Other GI organ points have different specific locations. The xiphoid and left costal margin are not appendix points.", "basic"],
      ["The Chapman point for the adrenal gland is located:", ["At the 1st intercostal space near the sternum edge", "1 inch lateral and superior to the umbilicus bilaterally", "Directly over the bony iliac crest", "At the sternal angle of Louis level"], 1, "The adrenal anterior Chapman point sits approximately 1 inch lateral and 1 inch superior to the umbilicus bilaterally (or 2.5 cm lateral and 2.5 cm superior). The 1st intercostal space points are middle ear (or otitis media-related). The iliac crest is not a standard Chapman point. The angle of Louis is the manubriosternal junction.", "basic"],
      ["The Chapman point for the stomach is found:", ["Bilaterally at the 10th intercostal space level", "On the left at the 5th and 6th intercostal spaces", "Only on the right side at the 4th intercostal space", "Over the umbilicus along the midline"], 0, "The stomach Chapman points are on the LEFT side: acidity at the 5th intercostal space near the sternum, peristalsis at the 6th ICS near the sternum. The other options describe other organs or are nonspecific locations.", "advanced"],
      ["Chapman reflex points are thought to represent visceral dysfunction via which anatomic substrate?", ["Direct visceral-to-cutaneous nerve branches", "Reflex fascial changes over the organ's lymphatic drainage", "Tendon insertions of the postural muscles alone", "Aberrant peripheral nerve fiber sprouting"], 1, "Chapman's reflexes are believed to be neurolymphatic — palpable contractures in the deep fascia overlying lymphatic drainage of the corresponding viscera, mediated through autonomic reflex arcs. They are NOT direct visceral-cutaneous branches, not tendon insertions, and not aberrant nerve sprouting.", "advanced"],
      ["The treatment technique for an active POSTERIOR Chapman point is:", ["A quick HVLA thrust applied directly over the point", "Gentle rotary fingertip pressure for 10-30 seconds until tenderness eases", "Sustained 90-second compression at maximum tolerated pressure", "Cold cryotherapy followed by passive stretching"], 1, "Posterior Chapman points are treated with light circular/rotary pressure for 10-30 seconds, repeated until tenderness resolves or tissue texture changes — a gentle stimulus to the reflex. HVLA, 90-second sustained pressure, or cryotherapy are not the standard Chapman protocol.", "advanced"],
      ["The Chapman point for the LUNG (upper) is found anteriorly at:", ["The 3rd and 4th intercostal spaces near the sternum", "The tip of the 12th rib on the right side", "One inch lateral to the umbilicus bilaterally", "Over the manubrium at the sternal angle of Louis"], 0, "Upper lung Chapman points sit anteriorly at the 3rd and 4th ICS bilaterally near the sternum; lower lung points are at the 4th and 5th ICS. Rib 12 tip = appendix; lateral umbilicus = kidney; angle of Louis is a manubrial landmark, not a lung point.", "advanced"],
      ["A patient with chronic recurrent sinusitis is found to have tender Chapman points along the:", ["On the greater wing of the sphenoid only", "Anterior clavicle near the sternoclavicular junction", "Posterior aspect of the mastoid process bilaterally", "Over the tip of the 11th rib bilaterally"], 1, "Sinus Chapman points are found along the anterior clavicle near the sternoclavicular junction and inferior to the clavicle. Sphenoid and mastoid points are not classic Chapman locations. Rib 11 tip is the spleen point.", "advanced"],
      ["The Chapman point for the appendix is anatomically located on the right at:", ["The 12th intercostal space midaxillary", "The tip of the right 12th rib", "1 inch superior to the umbilicus", "Over the right ASIS"], 1, "The appendix Chapman point is at the tip of the right 12th rib. The other locations describe different organs or non-Chapman landmarks.", "advanced"],
      ["A persistent anterior Chapman point that does not resolve despite multiple OMT sessions and appropriate posterior treatment should prompt the clinician to:", ["Increase the duration and pressure of treatment until it resolves", "Evaluate for ongoing visceral pathology in the corresponding organ", "Ignore the finding since Chapman points are not clinically reliable", "Switch to HVLA at the corresponding vertebral level"], 1, "A non-resolving Chapman point may indicate persistent visceral pathology driving the reflex — this should prompt evaluation of the corresponding organ. Increased pressure is not the answer; ignoring the finding misses diagnostic information; HVLA is not the appropriate response.", "advanced"],
      ["The Chapman point for the URINARY BLADDER is located:", ["Around the umbilicus", "1 inch lateral and 1 inch superior to umbilicus", "Periumbilically on the abdomen at the level of bladder dome", "Over the symphysis pubis posteriorly"], 2, "The bladder Chapman point is periumbilical (around the umbilicus). Periumbilical + 1 inch superior/lateral = adrenal/kidney. The other locations are not standard Chapman bladder points.", "advanced"],
      ["Posterior Chapman points typically lie:", ["Directly over the spinous processes at the midline", "Between the transverse processes, in the paraspinal tissues", "On the angle of the rib at each spinal level", "Over the iliac crest on both sides bilaterally"], 1, "Posterior Chapman points sit between the transverse processes of the corresponding vertebral segments in the paraspinal soft tissue — they correspond predictably to the anterior point and the relevant viscerosomatic segment. Spinous processes, rib angles, and iliac crest are not the posterior Chapman locations.", "advanced"],
      ["The thyroid Chapman point is found anteriorly at:", ["The 2nd intercostal space near the sternum bilaterally", "Over the lateral surface of the thyroid cartilage", "Anterior surface of the manubrium directly", "Behind the angle of the mandible"], 0, "The thyroid Chapman point is at the 2nd ICS near the sternum bilaterally. Direct thyroid cartilage palpation, manubrial surface, and mandibular angle (which is AC1 territory) are not the thyroid Chapman point location.", "advanced"],
      ["A patient with chronic recurrent UTIs has tender anterior Chapman points where?", ["At the tip of the right 12th rib margin", "Around the umbilicus and on the upper inner thigh", "At the 5th intercostal space on the left", "Over the pubic symphysis area posteriorly"], 1, "Urinary tract Chapman points sit periumbilically (BLADDER) and over the upper medial thigh near the labium/scrotum (URETHRA). Tip of right 12th rib = appendix; left 5th ICS = stomach acidity; posterior symphysis is not a standard Chapman location.", "advanced"]
    ]],
    [4, "Lymphatic system anatomy and lymphatic OMT techniques", [
      ["The thoracic duct drains lymph into the venous circulation at which junction?", ["Junction of the right internal jugular and right subclavian veins", "Junction of the left internal jugular and left subclavian veins", "Right atrium directly", "Inferior vena cava at the diaphragm"], 1, "The thoracic duct drains the majority of body lymph (entire body except right upper quadrant) into the junction of the LEFT internal jugular and LEFT subclavian veins. The right lymphatic duct drains the right upper quadrant into the corresponding right junction. The right atrium and IVC are not lymphatic drainage sites.", "basic"],
      ["Which OMT technique is classically used to promote lymphatic return from the lower extremities and is contraindicated in DVT?", ["Thoracic pump", "Pedal (Dalrymple) pump", "Cervical chain palpation", "Suboccipital release"], 1, "The pedal (Dalrymple) pump uses rhythmic dorsiflexion-plantarflexion at the ankles to promote lower extremity lymphatic return and is CONTRAINDICATED in DVT (risk of embolization). Thoracic pump promotes thoracic/lymphatic flow but is not the lower-extremity-specific technique. Cervical chain palpation and suboccipital release are not lymphatic pumps.", "basic"],
      ["Which is a CONTRAINDICATION to lymphatic pump techniques?", ["Mild upper respiratory infection in a healthy adult", "Acute bacterial sepsis or osteomyelitis at the site", "Stable chronic lymphedema", "Postoperative edema 4 weeks after surgery"], 1, "Acute bacterial infection (sepsis, osteomyelitis at the treatment site, untreated bacterial infection where pump could spread organisms) is a contraindication to lymphatic OMT. URI, chronic lymphedema, and postoperative edema (after appropriate healing) are typical indications.", "basic"],
      ["The diaphragm functions as a key lymphatic pump because:", ["It mechanically compresses the lymph nodes during contraction", "Its rhythmic contraction creates pressure changes that propel lymph onward", "It directly produces new circulating lymphocytes", "It passively absorbs interstitial tissue fluid"], 1, "Diaphragmatic contraction creates intra-abdominal pressure changes that propel lymph cephalad through the thoracic duct, making diaphragmatic function central to lymph movement. Direct lymph node compression, lymphocyte production (occurs in nodes/marrow/thymus), and passive absorption are not the primary mechanism.", "advanced"],
      ["The cisterna chyli is anatomically located:", ["Just superior to the diaphragm in the posterior mediastinum", "Just inferior to the diaphragm, anterior to L1-L2 near the aorta", "In the deep cervical fascia near the carotid sheath", "Within the right atrium chamber of the heart"], 1, "The cisterna chyli is a sac-like dilation that collects lymph from the lower body, located just below the diaphragm anterior to L1-L2 on the right of the aorta — it gives rise to the thoracic duct. The other locations are anatomically incorrect.", "advanced"],
      ["BEFORE initiating thoracic or pedal pump techniques, the operator should FIRST address fascial diaphragm restrictions in which order?", ["Pelvic diaphragm → respiratory diaphragm → thoracic inlet → cranial base, working caudal to cephalad", "Cranial base → thoracic inlet → respiratory diaphragm → pelvic diaphragm, working cephalad to caudad", "Either direction — order does not matter clinically", "Only address the abdominal diaphragm"], 0, "Standard sequence is CAUDAD to CEPHALAD: pelvic diaphragm → respiratory diaphragm → thoracic inlet → cranial base (sometimes also tentorium). This opens drainage pathways before driving fluid through them. Random order or single-diaphragm focus is suboptimal.", "advanced"],
      ["A patient with non-Hodgkin lymphoma in active treatment presents for general OMT. Which is the MOST appropriate consideration regarding lymphatic pump techniques?", ["Pump techniques are absolutely contraindicated in any patient with a cancer history", "Pump techniques are relatively contraindicated in active malignancy; consult oncology", "Pump techniques are strongly recommended at high intensity to improve immune surveillance", "Lymphatic pumps may be used safely at maximum intensity regardless of disease status"], 1, "Active lymphatic malignancy is a relative contraindication for vigorous lymphatic pump techniques due to theoretical concern about spreading malignant cells; gentle techniques may be acceptable but oncology consultation is appropriate. Universal contraindication, mandatory use, or unrestricted high-intensity use are not supported.", "advanced"],
      ["The Galbreath (mandibular drainage) technique is used primarily to address:", ["Peripheral lymphedema of the lower extremities", "Eustachian tube congestion and middle ear effusion", "Cervical nerve root radiculopathy pain", "Bell palsy causing facial paralysis"], 1, "Galbreath technique uses gentle rhythmic mandibular distraction to mobilize lymph drainage of the Eustachian tube and middle ear — particularly useful adjunct in otitis media with effusion. It is not designed for LE lymphedema, radiculopathy, or facial palsy.", "advanced"],
      ["A patient develops new fever and chills 12 hours after thoracic pump treatment for chronic bronchitis. The MOST likely explanation is:", ["A treatment-induced viral reactivation event", "Transient bacteremia from mobilizing infected lymph", "Idiopathic post-OMT fever of unknown mechanism", "An allergic reaction to the operator's hand cream"], 1, "Vigorous lymphatic pumping can mobilize lymph from infected regions, producing transient bacteremia or a flu-like response — a known reason to avoid vigorous pumping in active untreated bacterial infection. Viral reactivation, idiopathic fever, and hand-cream allergy are far less likely explanations.", "advanced"],
      ["The thoracic duct typically enters the venous circulation by passing posterior to which structure before joining the IJ-subclavian junction?", ["Right vagus nerve", "Left common carotid artery (or anterior to left vertebral artery, depending on source)", "Right subclavian vein", "Brachiocephalic trunk"], 1, "The thoracic duct ascends along the left side of the thorax, arches at the level of C7-T1, passes posterior to the left common carotid (or anterior to the left vertebral artery), and empties at the left IJ-subclavian junction. The other relationships do not match.", "advanced"],
      ["A 70-year-old with bilateral lower-extremity 3+ pitting edema, recent stroke, and chronic atrial fibrillation on warfarin is being considered for pedal pump. The MOST important consideration is:", ["Pedal pump is fully indicated to drain the edema fluid", "Evaluate for DVT first; pedal pump can mobilize a clot and is contraindicated", "Pedal pump is contraindicated only in patients with congestive heart failure", "Pedal pump can be safely performed if the patient is on anticoagulation"], 1, "Pedal pump is contraindicated in suspected or known DVT regardless of anticoagulation status because mobilization may cause embolization. Risk factors (stroke, AF, edema) increase suspicion — evaluate before pumping. The other options understate the risk.", "advanced"],
      ["Splenic pump technique is performed by:", ["Compressing the left upper abdomen below the left costal margin in rhythmic fashion", "Rhythmic anterior-posterior compressions over the left lower ribs (8-12) anterolaterally with patient supine", "Sustained pressure over the right upper quadrant only", "Cervical chain milking on the right"], 1, "Splenic pump involves rhythmic compression over the left lower posterior ribs (8-12) with patient supine to stimulate splenic and lymphatic activity — useful in viral illness and convalescence. The other options describe other techniques or are non-specific.", "advanced"],
