      ["For a typical inhaled (inhalation) pump handle dysfunction of ribs 2-10, the EXPECTED palpatory finding on the back is that the:", ["Superior edge of the posterior rib angle is recessed", "Superior edge of the posterior rib angle is prominent", "Entire rib is symmetric to the contralateral side", "Inferior edge of the posterior rib angle is recessed"], 1, "In a pump handle inhalation dysfunction, the anterior end is held up and the posterior portion rotates so that the superior edge of the posterior rib angle becomes prominent (and the inferior edge of the anterior rib is prominent as well). A recessed superior edge or symmetric rib would not indicate this dysfunction. A recessed inferior posterior edge is not the classic finding.", "basic"],
      ["For a bucket handle inhalation dysfunction, the mid-axillary rib distance to the rib above and the rib below typically shows:", ["Closer to the rib above and farther from the rib below", "Closer to the rib below and farther from the rib above", "Equidistant from both adjacent ribs", "Compressed against both adjacent ribs"], 0, "An inhaled bucket handle rib rises at the mid-axillary line and becomes closer to the rib above while moving away from the rib below. An exhaled bucket handle rib shows the OPPOSITE — closer to the rib below, farther from the rib above. Equidistant means no dysfunction. Compressed against both is not a typical pattern.", "basic"],
      ["You feel a posterior prominence of ribs 6, 7, and 8 on the right that all fail to recede with exhalation, with the greatest motion change at the mid-axillary line. The dysfunction pattern represents:", ["A group of three exhalation pump handle dysfunctions", "A group of three inhalation bucket handle dysfunctions", "A Type I neutral group thoracic dysfunction", "Isolated single rib 7 dysfunction only"], 1, "Three adjacent ribs (6, 7, 8) all stuck inhaled with greatest motion at the mid-axillary line represents a GROUP of inhalation bucket handle dysfunctions — ribs 6-10 are predominantly bucket handle. Exhalation pump handle would show recessed anterior findings. A Type I thoracic SD refers to vertebral, not rib, dysfunction. Isolated rib 7 alone does not explain ribs 6 and 8.", "advanced"],
      ["A patient with chronic right-sided inhalation rib dysfunctions of ribs 3-5 develops new ipsilateral T3-T5 vertebral somatic dysfunctions. The MOST likely mechanistic relationship is:", ["The rib and vertebral findings are completely unrelated", "Costovertebral joint dysfunction can drive secondary vertebral SD", "The vertebral findings alone caused the rib dysfunctions", "These combined findings indicate underlying malignancy"], 1, "Rib and vertebral dysfunctions are biomechanically linked through the costotransverse and costovertebral joints — chronic rib SD perpetuates corresponding thoracic vertebral SD and vice versa. Treatment must address both. Unrelated findings, one-directional causation, and malignancy as default are incorrect framings.", "advanced"],
      ["A patient post-CABG develops new bilateral exhalation rib dysfunctions of ribs 4-5 with restricted inhalation excursion. The MOST likely cause is:", ["Coincidental thoracic strain unrelated to surgery", "Sternotomy chest wall guarding limiting rib elevation", "Acute thoracic disc herniation from positioning", "Rib fracture from intraoperative compressions"], 1, "Post-sternotomy patients commonly develop bilateral exhalation rib dysfunctions of upper ribs (3-5) from anterior chest wall guarding, pectoralis hypertonicity preventing rib elevation, and edema-related restricted respiratory mechanics. Gentle ME, MFR, and lymphatic techniques are appropriate adjunctive OMT. Rib fracture and disc herniation would have additional findings; coincidence is not the best explanation given the predictable post-sternotomy pattern.", "advanced"],
      ["A patient with kyphoscoliosis shows a Type I thoracic dysfunction T5-T8 sidebent right, rotated left. Which rib dysfunction pattern would you EXPECT to find based on rib-vertebral coupling?", ["No predictable rib dysfunction pattern emerges", "Right ribs 5-8 exhaled, left ribs 5-8 inhaled", "Bilateral symmetric inhalation dysfunctions", "Caliper motion dysfunctions of ribs 11-12"], 1, "In a Type I rotated-left thoracic group, the spinous processes rotate LEFT (vertebral bodies rotate right) — this RAISES the right rib heads (relative inhalation/expansion on right) and LOWERS the left rib heads (relative exhalation). Wait — actually the rotation analysis: with rotation LEFT (spinous left, bodies right), the convexity of the curve is on the RIGHT, where ribs are CROWDED inferiorly (exhalation on the right). Concavity is LEFT where ribs are spread (inhalation). The choice listing right exhalation + left inhalation matches this scoliotic rib hump pattern with rib hump on the convex side.", "advanced"]
    ]],
    [2, "Identify the proper naming of rib dysfunctions", [
      ["When naming a rib somatic dysfunction, all of the following must be included EXCEPT:", ["The side of the dysfunction, left or right", "The rib number that is affected", "The position of ease, inhaled or exhaled", "The corresponding Fryette vertebral level"], 3, "Naming a rib SD requires FOUR things: side (left/right), rib number, position of ease (inhaled/exhaled), and predominant motion type (pump/bucket). A corresponding Fryette vertebral diagnosis is documented separately and is NOT part of the rib SD name itself. The other three options are all required components.", "basic"],
      ["A rib that prefers the inhalation position with greatest motion change at the costosternal junction is named:", ["An exhalation pump handle dysfunction", "An inhalation pump handle dysfunction", "An exhalation bucket handle dysfunction", "An inhalation bucket handle dysfunction"], 1, "Greatest motion at the costosternal junction = pump handle predominance. Preferring inhalation = inhalation dysfunction. So the name is inhalation pump handle dysfunction. The other three combinations either reverse the motion type or the position of ease.", "basic"],
      ["When ribs 6 and 7 on the left both demonstrate the same somatic dysfunction pattern at the mid-axillary line, the proper documentation is:", ["Left ribs 6 and 7 inhalation bucket handle group dysfunction", "Right ribs 6 and 7 exhalation pump handle dysfunction", "Bilateral ribs 6 and 7 caliper motion restriction", "Left rib 6 only — rib 7 cannot be diagnosed simultaneously"], 0, "Two or more adjacent ribs with the same dysfunction pattern on the same side constitute a GROUP dysfunction, documented as such. Right-sided documentation for a left-sided finding is incorrect. Caliper motion is reserved for ribs 11 and 12. Multiple adjacent ribs can absolutely be diagnosed and named together.", "basic"],
      ["You diagnose static findings: rib 4 on the right is closer to rib 5 and farther from rib 3 anteriorly; rib 4 moves freely into exhalation but not into inhalation. The proper name is:", ["Right rib 4 inhalation pump handle dysfunction", "Right rib 4 exhalation pump handle dysfunction", "Left rib 4 inhalation bucket handle dysfunction", "Right rib 4 exhalation bucket handle dysfunction"], 1, "Rib 4 is a pump handle rib. It moves freely into EXHALATION but resists INHALATION — so the position of ease is exhaled, naming it an exhalation pump handle dysfunction on the right. Inhalation pump handle would move freely into inhalation. Bucket handle naming is wrong for rib 4. The side (right) matches the findings.", "advanced"],
      ["The OFFICIAL Foundations for Osteopathic Medicine (the Glossary of Osteopathic Terminology) names a rib dysfunction by listing four required components. Which sequence reflects the STANDARDIZED order most commonly accepted in clinical documentation?", ["Motion type, side, rib number, position of ease", "Side, rib number, position of ease, predominant motion type (e.g., Right rib 5 inhalation pump handle)", "Rib number, position of ease, motion type, side", "Position of ease, side, motion type, rib number"], 1, "Standard documentation: SIDE → RIB NUMBER → POSITION OF EASE → MOTION TYPE (e.g., 'Right rib 5 inhalation pump handle'). While four components must appear, this is the most commonly used sequence in clinical notes. The other sequences contain the same elements but in non-standard order.", "advanced"],
      ["When documenting a single rib 1 dysfunction, the convention REQUIRES specifying:", ["Only pump or bucket handle, since rib 1 is 50/50", "Side, rib 1, and position of ease of the dysfunction", "Side, rib 1, and motion type only", "No specific naming convention applies to rib 1"], 1, "Rib 1 dysfunctions are typically named by SIDE + RIB 1 + POSITION OF EASE (e.g., 'Right rib 1 inhalation dysfunction') — motion type designation is sometimes omitted because rib 1 demonstrates approximately equal pump and bucket motion and is assessed at a single location at the thoracic inlet. The other options either omit required information or apply inappropriate distinctions.", "advanced"],
      ["A patient has 3 ribs (ribs 5, 6, 7) on the right with the following findings: rib 5 prefers exhaled position (pump handle), rib 6 prefers inhaled (bucket), rib 7 prefers inhaled (bucket). The MOST appropriate description of this pattern is:", ["A single homogenous group dysfunction of ribs 5-7", "Mixed: rib 5 exhaled, ribs 6-7 inhaled group", "Cannot be diagnosed without rib imaging", "All three are caliper-motion dysfunctions"], 1, "A GROUP dysfunction requires the SAME position of ease and motion type. Here rib 5 is exhaled pump while ribs 6-7 are inhaled bucket — these are MIXED and cannot be lumped into a single group. Documentation should reflect both findings separately. Imaging is not needed. Caliper motion is reserved for ribs 11-12.", "advanced"]
    ]],
    [3, "Recognize clinical syndromes associated with rib dysfunctions", [
      ["Costochondritis most commonly affects which group of ribs?", ["Ribs 1 and 2", "Ribs 2 through 5", "Ribs 8 through 10", "Floating ribs 11 and 12"], 1, "Costochondritis preferentially involves the upper costochondral and chondrosternal junctions of ribs 2-5, presenting with tenderness, sometimes puffy tissue texture, and reproducible pain to palpation. Ribs 1 and 2 are less common as a group. Lower ribs 8-10 are not the classic distribution. Floating ribs 11 and 12 lack anterior cartilage and are not affected by costochondritis.", "basic"],
      ["The clinical feature that distinguishes Tietze syndrome from costochondritis is:", ["Bilateral joint involvement", "Visible swelling at the joint", "Fever above 38 degrees C", "Radiation of the pain to the back"], 1, "Tietze syndrome is differentiated from costochondritis primarily by the presence of visible swelling (edema) of the costochondral or chondrosternal junction; costochondritis has tenderness but no edema. Bilateral involvement, fever, or back radiation are not the distinguishing features.", "basic"],
      ["A cervical rib (anomalous extra rib originating from C7) classically produces which clinical syndrome by compressing the proximal lower trunk of the brachial plexus?", ["Thoracic outlet syndrome", "Carpal tunnel syndrome", "Cubital tunnel syndrome", "Radial tunnel syndrome"], 0, "A cervical rib (or congenital fibrocartilaginous band running from the C7 transverse process to rib 1) classically compresses the proximal lower trunk of the brachial plexus and/or subclavian vessels, producing thoracic outlet syndrome. Carpal tunnel is median nerve at the wrist. Cubital and radial tunnel syndromes are at the elbow/forearm and unrelated to a cervical rib.", "basic"],
      ["A patient with a known myocardial infarction develops a new T2-T3 viscerosomatic finding on the left. The most likely explanation is:", ["A new lumbar disc herniation referring to the chest", "Spinal facilitation from cardiac afferent input", "Direct mechanical compression of T2-T3 by the heart", "A coincidental thoracic strain unrelated to the MI"], 1, "Viscerosomatic reflexes arise when inflamed or injured viscera send afferent input that facilitates the corresponding spinal cord segments — for the heart, the classic levels are T1-T5 on the left, producing tissue texture and motion changes at those levels. Lumbar pathology does not refer to T2-T3. The heart does not mechanically compress vertebrae. Coincidence does not explain a stereotyped segmental pattern.", "advanced"],
      ["A patient with chronic anterior chest wall pain, point tenderness at multiple costochondral junctions, and reproducible pain on palpation has an inflammatory marker panel showing normal ESR, normal CRP, and negative ANA. The MOST likely diagnosis is:", ["Ankylosing spondylitis with costochondritis", "Idiopathic costochondritis, usually self-limited", "Tietze syndrome with characteristic edema", "Acute coronary syndrome with chest pain"], 1, "IDIOPATHIC COSTOCHONDRITIS is the most common cause of anterior chest wall pain in young to middle-aged adults — multiple tender costochondral junctions, reproducible pain, and NORMAL inflammatory markers are typical. Tietze syndrome adds visible swelling/edema (not described here). AS would show positive HLA-B27 and abnormal markers. ACS produces a different clinical picture.", "advanced"],
      ["A 24-year-old male athlete with HLA-B27 positive ankylosing spondylitis presents with progressive thoracic stiffness. Beyond standard thoracic SD, which CHARACTERISTIC rib finding may develop?", ["Flail chest with paradoxical chest wall motion", "Costovertebral fusion restricting chest expansion", "Atypical floating ribs 11 and 12", "Bilateral congenital cervical ribs"], 1, "AS classically causes progressive costovertebral/costotransverse fusion and restricted chest expansion (measured circumferentially at the 4th ICS, normal >5 cm, AS often <2.5 cm) — leading to a rigid 'barrel chest' and reliance on diaphragmatic breathing. Flail chest is acute traumatic; floating ribs and cervical ribs are anatomic variants unrelated to AS.", "advanced"],
      ["A patient with intermittent right shoulder, jaw, and arm pain during exertion has a normal cardiac stress test but persistent T2-T5 viscerosomatic findings on the LEFT. The MOST important next step is:", ["Conclude the pain is musculoskeletal and treat with OMT", "Pursue further cardiac evaluation for possible CAD", "Reassure the patient and discharge home", "Refer the patient for psychiatric evaluation"], 1, "Stress tests have limited sensitivity, especially for microvascular disease (often called Syndrome X), single-vessel disease in collateral-rich vasculature, or non-ischemic causes of cardiac pain. Persistent T2-T5 left VSR plus exertional symptoms warrant further evaluation. Concluding MSK origin, reassurance/discharge, and psychiatric referral are premature without further cardiac workup.", "advanced"]
    ]],
    [4, "Identify exercise rehabilitation for rib-related issues", [
      ["Which group of muscles are considered scapular STABILIZERS that are commonly targeted in scapular dyskinesis rehabilitation?", ["Serratus anterior, trapezius, levator scapulae, rhomboids", "Pectoralis major, deltoid, biceps brachii, triceps", "Latissimus dorsi, teres major, infraspinatus, supraspinatus", "Diaphragm, intercostals, scalenes, sternocleidomastoid"], 0, "Scapular stabilizers include serratus anterior, trapezius (upper, middle, lower), levator scapulae, and rhomboids — together they control scapulothoracic position. The second option lists prime movers of the arm. The third lists rotator cuff/glenohumeral muscles. The fourth lists respiratory muscles, not scapular stabilizers.", "basic"],
      ["The scapular repositioning test is positive when:", ["Manual restoration of scapular position WORSENS the patient's shoulder pain", "Manual restoration of scapular position IMPROVES the patient's shoulder pain", "There is no change in shoulder pain with repositioning", "The patient develops new arm numbness"], 1, "A positive scapular repositioning test occurs when manually restoring proper scapular position IMPROVES symptoms — implicating scapular dyskinesis as a contributing factor to the shoulder pain and supporting scapular stabilization exercises. Worsening or no change is a negative test. New numbness suggests a neurologic process rather than scapular dyskinesis.", "basic"],
      ["SICK scapula syndrome includes which of the following findings?", ["Superior elevation, internal rotation, contralateral kyphosis", "Malposition, inferior border prominence, coracoid pain, dyskinesis", "Scapular winging only without pain or malposition", "Isolated coracoid tenderness with normal motion"], 1, "SICK scapula stands for Scapular malposition, Inferior medial border prominence, Coracoid pain, dysKinesis of scapular motion — all four features together define the syndrome. The other choices describe only partial or alternative findings that do not constitute the full syndrome.", "basic"],
      ["An exercise rehab plan for chronic exhalation rib dysfunctions would MOST appropriately emphasize:", ["Strengthening inspiratory muscles and stretching expiratory muscles", "Strengthening abdominal expiratory muscles to deepen exhalation", "Avoiding any thoracic motion exercises for six weeks", "Sustained breath-holding at functional residual capacity"], 0, "Exhalation dysfunctions are stuck in exhalation and need help moving INTO inhalation — so strengthening accessory inspiratory muscles (SCM, scalenes, serratus posterior superior) and stretching the internal intercostals and abdominal expiratory muscles makes biomechanical sense. Strengthening expiratory muscles would worsen the dysfunction. Avoiding motion is the opposite of indicated rehab. Breath-holding does not address the dysfunction.", "advanced"],
      ["Diaphragmatic breathing exercises (belly breathing) are MOST appropriate for rehabilitating which patient population?", ["A patient with paradoxical breathing and accessory muscle overuse", "A patient with an acute rib fracture in the first 48 hours", "A patient with an active untreated pneumothorax", "A patient with end-stage severe pulmonary fibrosis"], 0, "Diaphragmatic breathing retraining is most useful in patients with PARADOXICAL or APICAL breathing patterns (overuse of SCM/scalenes, restricted diaphragm) — common in anxiety, COPD, chronic stress. Retraining shifts work to the diaphragm and reduces upper rib dysfunction. Acute fracture, pneumothorax, and end-stage fibrosis have other priorities.", "advanced"],
      ["A scapular stabilization program for SICK scapula syndrome focuses on which muscle pairs to address the typical weakness pattern?", ["Strengthen pectoralis major and minor; stretch lower trapezius and serratus anterior", "Strengthen lower trapezius and serratus anterior; stretch tight pectoralis minor and upper trapezius", "Strengthen all scapular muscles equally without considering imbalance patterns", "Avoid strengthening exercises and use only passive stretching"], 1, "SICK scapula and most scapular dyskinesis involves TIGHT pectoralis minor and upper trapezius (which contribute to scapular protraction/elevation) and WEAK lower trapezius and serratus anterior (which should depress and protract the scapula appropriately). Strengthen the weak, stretch the tight — the OPPOSITE pattern would worsen dyskinesis.", "advanced"],
      ["A patient with chronic costochondritis has failed NSAIDs and 8 weeks of conservative therapy. The NEXT most appropriate consideration is:", ["Surgical excision of the affected costal cartilages", "Local corticosteroid and anesthetic joint injection", "Long-term opioid analgesia as monotherapy", "Urgent coronary angiography evaluation"], 1, "Persistent costochondritis after 8+ weeks of conservative care often responds to local corticosteroid injection at the affected junctions, with re-evaluation for alternative diagnoses (cardiac, pulmonary, rheumatologic). Surgery is not first-line. Long-term opioids are inappropriate. Coronary angiography is warranted only if cardiac suspicion arises.", "advanced"]
    ]],
    [5, "Discuss concepts of ME and HVLA treatment for ribs (Lab)", [
      ["For muscle energy treatment of an exhalation pump handle dysfunction of rib 1, which muscle is used?", ["The pectoralis minor muscle", "The anterior and middle scalenes", "The posterior scalene muscle", "The serratus anterior muscle"], 1, "Rib 1 exhalation dysfunctions are treated with muscle energy using the anterior and middle scalenes, which elevate rib 1 when the patient lifts the head against operator resistance. Pectoralis minor is for ribs 3-5. Posterior scalene is for rib 2. Serratus anterior is for ribs 6-10.", "basic"],
      ["For muscle energy treatment of an exhalation dysfunction of rib 2, the muscle used is:", ["Anterior and middle scalenes", "Posterior scalene", "Pectoralis minor", "Latissimus dorsi"], 1, "Rib 2 exhalation dysfunctions use the POSTERIOR scalene, which inserts on rib 2 and helps elevate it. Anterior and middle scalenes elevate rib 1. Pectoralis minor is for ribs 3-5. Latissimus dorsi is for ribs 11-12 along with quadratus lumborum.", "basic"],
      ["For muscle energy treatment of an exhalation dysfunction of ribs 6 through 10, the muscle used is:", ["Pectoralis minor", "Serratus anterior", "Anterior scalenes", "Quadratus lumborum"], 1, "Ribs 6-10 exhalation dysfunctions use the SERRATUS ANTERIOR — the patient pushes the affected-side arm anteriorly against operator resistance to elevate the ribs. Pectoralis minor handles ribs 3-5. Anterior scalenes handle rib 1. Quadratus lumborum handles ribs 11-12.", "basic"],
      ["A patient has a group of inhalation rib dysfunctions of ribs 4, 5, and 6 on the right. According to the BITE rule, which rib should be treated FIRST?", ["Rib 4 — the top rib of the group", "Rib 5 — the middle rib of the group", "Rib 6 — the bottom rib of the group", "Treat all three simultaneously"], 2, "BITE = Bottom rib for Inhaled, Top rib for Exhaled. For a group of INHALATION dysfunctions, treat the BOTTOM (most inferior) rib first — rib 6 in this case. The top rib (rib 4) would be treated first only for an EXHALATION group. The middle rib is not the starting point. Simultaneous treatment of all three is not the standard sequence.", "advanced"],
      ["For muscle energy treatment of an INHALATION dysfunction (rib stuck inhaled), the operator anchors the rib in its exhaled position while the patient performs which active maneuver?", ["Slow forced exhalation against resistance", "Deep inhalation against operator resistance", "A forceful coughing maneuver", "Breath-holding at total lung capacity"], 1, "ME for INHALATION rib dysfunctions: operator anchors the rib inferiorly (in exhaled position); patient inhales deeply (rib tries to elevate); operator resists; on exhalation, operator takes the rib further into exhalation. Repeat 3-5 times. Forced exhalation against resistance, coughing, and breath-holding do not constitute the standard ME protocol.", "advanced"],
      ["For muscle energy treatment of an EXHALATION rib 1 dysfunction, which patient position and active maneuver are used?", ["Patient prone, lifting head against resistance", "Patient supine, head turned away, lifts head", "Patient sidelying with arm overhead", "Patient seated, sidebending against resistance"], 1, "Standard ME for rib 1 EXHALATION: patient supine with head rotated AWAY from affected side (to bring the muscle into line of pull); operator anchors rib 1 inferiorly; patient lifts head against operator's hand on forehead — the anterior and middle scalenes contract to elevate rib 1. Repeat 3-5 times. Prone, sidelying with arm overhead, or seated setups are not standard for rib 1 ME.", "advanced"],
      ["For HVLA treatment of a single PUMP HANDLE rib 4 exhalation dysfunction, the supine setup typically places the operator's fulcrum where?", ["The angle of rib 4 on the affected side", "The opposite-side rib angle, no cooperation needed", "The midline thoracic spinous processes", "Directly over the body of the sternum"], 0, "Supine pump handle HVLA: fulcrum (fist or thenar) under the rib angle on the affected side; cross patient's arms across chest; lean patient's torso over the fulcrum to engage the barriers; deliver controlled thrust through patient's crossed arms timed with exhalation. Other options describe non-standard or incorrect setups.", "advanced"]
    ]],
    [6, "Identify the location of rib counterstrain tenderpoints (Lab)", [
      ["The anterior counterstrain tenderpoint for rib 1 (AR1) is most commonly located:", ["Inferior to the medial clavicle near rib 1", "At the angle of Louis on the manubrium", "Along the mid-axillary line at rib 1", "Over the spinous process of T1 posteriorly"], 0, "The AR1 tenderpoint is just inferior to the medial clavicle near the costoclavicular junction. The angle of Louis is at the manubriosternal joint (rib 2 level). The mid-axillary line is the bucket handle palpation point, not the rib 1 tenderpoint. The T1 spinous process is a posterior landmark for vertebral diagnosis, not the AR1.", "basic"],
      ["The posterior counterstrain tenderpoint for rib 1 (PR1) is most commonly located:", ["At the posterior angle of rib 1 under the trapezius", "At the angle of the second rib posteriorly", "Over the spinous process of C7 in the midline", "Anterior to the medial clavicle on the chest"], 0, "PR1 is found at the superior aspect of the posterior angle of rib 1, palpated between the trapezius and the medial border of the scapula. The angle of rib 2 corresponds to PR2. The C7 spinous process is a midline vertebral landmark. Anterior to the medial clavicle is the AR1 (anterior) tenderpoint, not posterior.", "basic"],
      ["The anterior tenderpoint for rib 2 (AR2) is typically located:", ["Mid-axillary line at the level of rib 2", "Mid-clavicular line at the inferior border of rib 2", "Over the manubriosternal joint", "Inferior to the medial clavicle near the costoclavicular junction"], 1, "AR2 tenderpoints sit along the mid-clavicular line at the inferior border of rib 2. The mid-axillary line is for bucket handle ribs (6-10) tenderpoints, not anterior rib 2. The manubriosternal joint marks the angle of Louis but is not the AR2 tenderpoint. The infra-clavicular costoclavicular junction is the AR1 tenderpoint.", "basic"],
      ["Posterior rib counterstrain tenderpoints for ribs 2 through 10 are most reliably found at:", ["The transverse process of the corresponding vertebra in the paraspinal groove", "The angle of the corresponding rib posteriorly", "The midline spinous process at the same level", "The contralateral rib angle"], 1, "Posterior rib tenderpoints sit at the angle of the corresponding rib (not the vertebral transverse process or spinous process and not the contralateral side). The transverse process is a vertebral landmark associated with vertebral tenderpoints. The spinous process is midline and not the rib tenderpoint location. Contralateral findings indicate a different segment.", "advanced"],
      ["A patient has both an anterior AR4 tenderpoint and a posterior PR4 tenderpoint on the SAME rib. The MOST appropriate clinical interpretation is:", ["Two separate dysfunctions to be treated as a group", "Treat the more tender point first; it often resolves both", "Both points are coincidental and need no treatment", "There is a fracture, so OMT is contraindicated"], 1, "When both anterior and posterior tenderpoints exist on the same rib, treat the more clinically relevant (or more tender) point first — they often share the same underlying dysfunction and one treatment may resolve both. Coincidence is unlikely. Fracture would have other findings on history/exam.", "advanced"],
      ["A patient with multiple bilateral anterior rib tenderpoints (AR3-AR6 bilaterally) and clear restriction of inspiratory excursion likely has:", ["An acute asthma exacerbation with wheezing", "Bilateral exhalation rib group dysfunctions", "An acute pulmonary thromboembolism", "Sjogren autoimmune sicca syndrome"], 1, "Bilateral anterior rib tenderpoints map to bilateral EXHALATION dysfunctions (anterior tenderpoints = exhalation dysfunction by counterstrain mapping) — common after thoracic surgery, in anxiety-related shallow chest breathing, or postural collapse. Asthma exacerbation and PE would have additional findings; Sjogren is glandular.", "advanced"],
      ["Posterior rib counterstrain tenderpoints differ in palpation depth from typical posterior thoracic vertebral tenderpoints because they sit:", ["Right at the spinous process tip", "Lateral to the spinous process at the rib angle", "Within the lamina groove of the spinous", "On the anterior surface of the body"], 1, "Posterior rib tenderpoints sit ~1-2 finger-breadths LATERAL to the corresponding spinous process at the RIB ANGLE in the paraspinal soft tissue — somewhat deeper than vertebral transverse process tenderpoints. The spinous process tip and lamina groove are midline vertebral landmarks; the anterior vertebral body is not palpable from posterior.", "advanced"]
    ]],
    [7, "Describe the treatment position for rib counterstrain tenderpoints (Lab)", [
      ["The general treatment principle for ANTERIOR rib counterstrain tenderpoints is to position the patient in:", ["Extension, sidebend away, rotate toward the tenderpoint", "Flexion, sidebend toward, rotate away from the tenderpoint", "Pure rotation toward the tenderpoint without sidebending", "Pure traction along the affected rib only"], 1, "Anterior rib tenderpoints (associated with EXHALATION dysfunctions) are treated with FLEXION, sidebend TOWARD, and rotate AWAY from the tenderpoint. Extension/sidebend away/rotate toward describes a posterior tenderpoint position. Pure rotation or pure traction alone are insufficient counterstrain set-ups.", "basic"],
      ["The general treatment principle for POSTERIOR rib counterstrain tenderpoints is to position the patient in:", ["Flexion with sidebending toward the tenderpoint", "Extension with sidebending away from the tenderpoint", "Neutral with axial traction only", "Pure rotation toward the tenderpoint"], 1, "Posterior rib tenderpoints (associated with INHALATION dysfunctions) are treated with EXTENSION and sidebending AWAY from the tenderpoint, often with subtle rotation toward. Flexion with sidebending toward describes the anterior tenderpoint position. Neutral with traction is not counterstrain. Pure rotation toward alone is insufficient.", "basic"],
      ["For an AR1 (anterior rib 1) tenderpoint, the treatment position is:", ["Head fully extended with rotation toward and sidebending toward the tenderpoint", "Head flexed with rotation away from and sidebending toward the tenderpoint", "Head neutral with strong axial traction", "Patient prone with arm abducted overhead"], 1, "The AR1 treatment position is head FLEXED, sidebent TOWARD the tenderpoint, and rotated AWAY from the tenderpoint to slacken the scalenes and unload the first rib. Full extension reverses the position. Neutral with traction is not the indicated set-up. Prone with arm overhead is not the AR1 position.", "advanced"],
      ["For an AR6 (anterior rib 6) tenderpoint, the treatment position involves:", ["Seated with sidebending and leg curling towards ", "Prone with full thoracic extension applied", "Sidelying with cervical rotation toward the side", "Seated with full trunk rotation away"], 0, "Anterior rib tenderpoint for rib 6 involves the patient being seated in the mermaid position, with legs curled up and sidebending towards the tenderpoint, while the opposite arm rests on the physician's thigh", "advanced"],
      ["For an AR6 (anterior rib 6) tenderpoint, the treatment position involves:", ["Supine, thoracic flexion, sidebend right, rotate left", "Prone with full thoracic extension applied", "Sidelying with cervical rotation toward the side", "Seated with full trunk rotation away"], 0, "Anterior rib tenderpoint set-up (general FSTRA — Flexion + Sidebend Toward + Rotate Away) applied to AR6 right: supine, thoracic flexion, sidebend right (toward), rotate left (away). Prone extension, side-lying, and seated full rotation away describe other techniques or non-standard positions.", "advanced"],
      ["A frail elderly patient with multiple chronic rib tenderpoints and difficulty tolerating prolonged positioning may benefit from which COUNTERSTRAIN MODIFICATION?", ["Hold the position of ease for a much longer duration of 5+ minutes", "Use a shorter hold (some sources allow 30-60 seconds in fragile patients while still aiming for 70% tenderness reduction) and pad/support the patient carefully to prevent positional injury", "Apply HVLA instead since it is faster", "Discontinue OMT entirely"], 1, "Frail patients may not tolerate the full 90-second hold but can still benefit from MODIFIED counterstrain (shorter hold of 30-60 sec while still achieving 70% tenderness reduction, careful padding, slower transitions). Prolonged holds, HVLA substitution, or discontinuation miss the opportunity. Always titrate to the individual patient.", "advanced"]
    ]]
  ]],
  [4, "Complex Regional Pain Syndrome (CRPS)", [
    [1, "Recognize Complex Regional Pain Syndrome (CRPS)", [
      ["The defining pain feature of CRPS is that the pain is:", ["Confined to a single dermatomal distribution", "Disproportionate to the inciting injury", "Limited to deep visceral structures only", "Always accompanied by motor paralysis"], 1, "CRPS is characterized by spontaneous or evoked pain DISPROPORTIONATE in severity or duration to the inciting injury — this is its cardinal feature. CRPS pain notably does NOT follow a single dermatomal or specific nerve distribution. It is somatic, not purely visceral. Complete paralysis is not characteristic — motor findings include weakness, dystonia, tremor, but not full paralysis.", "basic"],
      ["CRPS pain typically follows which distribution pattern?", ["A single peripheral nerve territory", "A single specific dermatomal level", "Distal, not following nerve or dermatomal lines", "Bilateral symmetric extremity involvement"], 2, "CRPS has DISTAL predominance in the affected extremity but does NOT follow a specific peripheral nerve or dermatomal distribution — this is one of its diagnostic clues. Strict nerve or dermatomal patterns suggest mononeuropathy or radiculopathy instead. Bilateral symmetric involvement is unusual; CRPS is typically unilateral and regional.", "basic"],
      ["The Budapest Criteria require evidence of abnormalities in which symptom domains?", ["Sensory, vasomotor/sudomotor, and motor/trophic", "Cognitive, behavioral, and emotional only", "Cardiovascular and respiratory only", "Visual, auditory, and olfactory"], 0, "The Budapest Criteria require findings across the four CRPS symptom domains — Sensory (hyperesthesia, allodynia), Vasomotor (color/temperature asymmetry), Sudomotor/Edema (sweating, swelling), and Motor/Trophic (weakness, dystonia, skin/nail/hair changes). Cognitive, cardiovascular, or sensory-organ domains are not part of CRPS criteria.", "basic"],
      ["The key distinction between CRPS Type I (formerly RSD) and CRPS Type II (formerly causalgia) is:", ["Type II has identifiable peripheral nerve injury; Type I does not", "Type I is more painful than Type II", "Type II affects only the lower extremity; Type I only the upper", "Type I always resolves; Type II never resolves"], 0, "CRPS Type I (replaces RSD) occurs WITHOUT confirmed major nerve injury, while CRPS Type II (replaces causalgia) occurs WITH a clearly identifiable peripheral nerve injury. The two types share clinical features and severity. Distribution is not by extremity. Course is variable in both — neither always resolves nor always becomes chronic.", "advanced"],
      ["The CRPS subtype known as 'CRPS-NOS' (not otherwise specified) refers to:", ["Patients meeting all criteria for Type I or II", "Patients who partially meet the Budapest Criteria", "Patients with only severe advanced disease", "An obsolete term that is no longer used"], 1, "CRPS-NOS captures patients with partial features of CRPS who do not fully meet Budapest Criteria — important to recognize for early presentations or atypical disease. Full criteria-meeting patients are Type I or II. Severity-based subtyping is not the basis for NOS. The term remains in current use.", "advanced"],
      ["The historical term 'causalgia' was coined by Silas Weir Mitchell in 1872 to describe:", ["A simple ligament sprain in athletes", "Burning pain in soldiers with nerve injuries", "Postoperative surgical wound infections", "Chronic diffuse abdominal pain"], 1, "Mitchell, a Union Army neurologist, observed Civil War soldiers with partial nerve injuries who developed severe burning pain disproportionate to injury — he coined CAUSALGIA (Greek: kausos = burning + algos = pain). His 1872 'Injuries of Nerves and Their Consequences' is a foundational CRPS text. The other descriptions do not match Mitchell's contribution.", "advanced"],
      ["A 14-year-old gymnast with a sprained ankle 6 weeks ago now has burning pain, edema, color changes, and refuses to bear weight. She is otherwise healthy with no known comorbidities. The MOST important next step is:", ["Order long-course opioid analgesia and bed rest", "Begin early aggressive PT, mirror therapy, and desensitization", "Delay treatment six months to watch for resolution", "Perform surgical sympathectomy at presentation"], 1, "Pediatric CRPS responds best to EARLY aggressive multidisciplinary therapy — graded PT, mirror therapy, desensitization, CBT — with pharmacotherapy as adjunct. Pediatric prognosis is generally BETTER than adult CRPS with appropriate care. Delay, opioid monotherapy, and primary sympathectomy are inappropriate.", "advanced"]
    ]],
    [2, "Identify the etiologies of CRPS", [
      ["The most common precipitating event for CRPS in adults is:", ["Spontaneous onset with no clear trigger", "A fracture, especially of the distal radius", "A severe thermal burn injury", "A stroke or transient ischemic attack"], 1, "Fractures — particularly distal radius (Colles) fractures — account for approximately 42 to 44 percent of CRPS cases and are the single most common precipitating event. Spontaneous onset is rare (~5 percent). Burns and stroke can precede CRPS but are far less common triggers.", "basic"],
      ["The approximate female-to-male ratio of adult CRPS is:", ["1:1 (equal)", "3:1 to 4:1 female predominance", "1:3 male predominance", "10:1 female predominance"], 1, "Adult CRPS is roughly 3 to 4 times more common in women than men, with about 75 percent of cases occurring in females. Equal distribution, male predominance, or a 10:1 ratio overestimates the skew. Peak incidence in women is ages 61 to 70 with a median onset around age 46.", "basic"],
      ["Approximately what percentage of CRPS cases have no identifiable precipitating event (spontaneous CRPS)?", ["Less than 1 percent", "Approximately 5 percent", "Approximately 25 percent", "More than 50 percent"], 1, "Roughly 5 to 10 percent of CRPS patients have no identifiable trigger and are classified as spontaneous CRPS. Less than 1 percent underestimates this; 25 percent and more than half overestimate it. Most cases have an identifiable precipitating fracture, sprain, surgery, or carpal tunnel.", "basic"],
      ["Pediatric CRPS differs from adult CRPS in which way?", ["Lower extremity is most common in children", "It is more common in boys than in girls", "Children always require surgical intervention", "It has a uniformly worse prognosis than in adults"], 0, "In children, the LOWER extremity is involved in roughly 71-85 percent of CRPS cases, while in adults the UPPER extremity is more common (about 60 percent). Children are still ~75-90 percent female. Surgery is rarely required and pediatric CRPS generally has a BETTER prognosis than adult CRPS, though recurrence is common.", "advanced"],
      ["Which COMORBIDITY has been MOST consistently associated with increased CRPS risk?", ["Chronic untreated hyperthyroidism alone", "Migraine and asthma involving sensitization", "Type 2 diabetes mellitus on metformin", "Mild hypertension on monotherapy"], 1, "Patients with conditions involving central sensitization or chronic neurogenic inflammation (migraine, asthma, fibromyalgia, IBS) appear to have higher CRPS risk after triggering events — likely due to underlying neuroimmune predisposition. Hyperthyroidism, T2DM, and HTN alone do not consistently correlate with elevated CRPS risk.", "advanced"],
      ["The Sudeck atrophy described in 1900 was a radiographic finding of:", ["Diffuse cortical bone thickening", "Patchy bone demineralization on radiograph", "Stress fractures of the metatarsals", "Soft tissue dystrophic calcification"], 1, "Paul Sudeck in 1900 documented post-traumatic PATCHY BONE DEMINERALIZATION on radiograph within weeks of injury — Sudeck atrophy. This inflammatory demineralization is one of the earliest objective imaging findings in CRPS (now reproducible on 3-phase bone scan). The other options do not match Sudeck's description.", "advanced"],
      ["A 50-year-old patient develops new-onset CRPS following carpal tunnel release surgery. This is classified as:", ["A surgical complication unrelated to CRPS", "Type I if no nerve injury, Type II if nerve injured", "Routine expected postoperative pain only", "Postsurgical phantom limb syndrome"], 1, "Postsurgical CRPS is well documented — carpal tunnel release is among the more common precipitating procedures. Subclassification depends on whether major nerve injury occurred: Type I (no identified nerve injury) vs Type II (confirmed nerve injury). The other options misclassify the condition.", "advanced"]
    ]],
    [3, "Identify clinical manifestations of CRPS", [
      ["Allodynia is best defined as:", ["Exaggerated pain response to a normally painful stimulus", "Pain perception in response to a stimulus that is not normally painful", "Complete loss of all sensation in the affected limb", "Pain occurring only with active limb movement"], 1, "Allodynia is pain in response to a stimulus that does not normally provoke pain — for example, light touch from clothing causing severe burning pain. An exaggerated response to noxious stimuli defines hyperalgesia. Complete sensory loss is anesthesia. Pain only with movement does not define allodynia.", "basic"],
      ["Stage 1 (acute) CRPS classically features:", ["Cold, cyanotic, atrophic skin with contractures", "Warm, red, moist skin with edema and hair growth", "Dry pale skin with brittle, ridged nails", "Brawny non-pitting edema with osteoporosis"], 1, "Stage 1 CRPS (acute, weeks to ~3 months) features warm, red, moist skin (hyperhidrosis), localized edema, hyperesthesia, decreased mobility, and increased hair and nail growth. Cold cyanotic atrophic skin with contractures describes Stage 3 (atrophic). Dry pale skin with brittle nails fits Stage 2 (dystrophic). Brawny edema with patchy osteoporosis is a Stage 2 finding.", "basic"],
      ["Stage 3 (atrophic) CRPS is characterized by:", ["Warm, edematous, hyperhidrotic skin", "Irreversible atrophy, contractures, livedo", "Initial onset of allodynia and hyperalgesia", "Spontaneous and complete resolution"], 1, "Stage 3 (atrophic) features marked, often irreversible dystrophy/atrophy, contractures, livedo reticularis, intractable pain, and possible spread of pain beyond the original limb. Warm edematous hyperhidrotic skin is Stage 1. Initial allodynia onset is Stage 1. Spontaneous complete resolution is not characteristic of any stage but particularly not Stage 3.", "basic"],
      ["The Budapest Criteria for CRPS require all of the following EXCEPT:", ["An initiating noxious event or cause of immobilization", "Continuing pain disproportionate to the inciting event", "Confirmatory laboratory or imaging test result", "Exclusion of other diagnoses that better account for the symptoms"], 2, "The Budapest Criteria are CLINICAL — there is NO confirmatory laboratory or imaging test that establishes CRPS. The criteria require an initiating event (though 5-10 percent are spontaneous), disproportionate pain, evidence of edema/skin blood flow or sudomotor changes, and exclusion of other conditions. Tests like 3-phase bone scan, thermography, or X-ray are SUPPORTIVE only.", "advanced"],
      ["The 3-phase bone scan in CRPS typically shows:", ["Decreased uptake in all three phases", "Increased periarticular uptake on delayed phase", "Bilateral symmetric uptake without asymmetry", "A localized cold spot at the injury site"], 1, "3-phase bone scan in CRPS: PHASE 3 (delayed/static) shows INCREASED periarticular tracer uptake around the distal joints of the affected limb — reflects the increased bone turnover from autonomic/inflammatory dysregulation. The other patterns are not typical for CRPS.", "advanced"],
      ["LIVEDO RETICULARIS observed in CRPS Stage 3 reflects which pathophysiology?", ["Localized bacterial skin infection", "Arteriolar vasospasm with venous pooling", "Acute thromboembolism in dermal vessels", "Direct allergic contact dermatitis"], 1, "Livedo reticularis in CRPS Stage 3 is a sign of severe autonomic dysregulation: arteriolar vasospasm reduces capillary perfusion; deoxygenated blood pools in the subpapillary venous plexus producing the classic lace-like purplish-red net pattern. Infection, thromboembolism, and allergic dermatitis produce different patterns.", "advanced"],
      ["A patient with suspected CRPS has been treated empirically with prednisone for 4 weeks with substantial improvement. The MOST appropriate next step is:", ["Continue chronic steroid therapy indefinitely", "Taper prednisone while continuing PT/OT", "Switch to long-term opioid therapy", "Order an immediate surgical sympathectomy"], 1, "Short-course corticosteroids can be helpful in EARLY warm CRPS, but should be tapered (not chronic) while maintaining multimodal therapy. Continuing PT/OT and adding neuropathic pain agents as needed is appropriate. Long-term steroids cause significant harms (osteoporosis, glucose intolerance, immune suppression). Switching to opioid monotherapy or moving to sympathectomy is premature.", "advanced"]
    ]],
    [4, "Identify the treatment approach to the patient with CRPS", [
      ["The single most important factor in CRPS prognosis is:", ["Patient age greater than 50 years", "Early diagnosis and prompt initiation of multimodal therapy", "Strict bed rest for 6 weeks after diagnosis", "Avoiding all physical activity until pain resolves"], 1, "Early diagnosis is the most important prognostic factor — delays worsen outcomes and may render dystrophy irreversible. Bed rest and avoidance of activity actually WORSEN CRPS by promoting disuse atrophy and contractures. Age affects prognosis but is not as decisive as early treatment.", "basic"],
      ["First-line non-pharmacologic treatment of CRPS is:", ["Surgical sympathetic ganglion ablation", "Implanted spinal cord stimulation", "Graded PT/OT with desensitization", "Surgical amputation of the limb"], 2, "Physical and occupational therapy with graded mobilization, desensitization, and functional restoration is the cornerstone of CRPS treatment and should begin EARLY. Sympathectomy, spinal cord stimulation, and amputation are reserved for refractory cases after conservative options have failed.", "basic"],
      ["Which medication class is commonly used for the neuropathic pain component of CRPS?", ["Loop diuretics", "Gabapentinoids and tricyclic antidepressants", "Antipsychotics as monotherapy", "Long-acting opioids as monotherapy"], 1, "Neuropathic pain in CRPS is commonly treated with gabapentinoids (gabapentin, pregabalin) and tricyclic antidepressants. Other adjuncts include sodium channel blockers, baclofen for dystonia, clonidine, NSAIDs, and short-course corticosteroids. Loop diuretics have no role. Antipsychotic or opioid monotherapy is not standard.", "basic"],
      ["When using OMT in a patient with established CRPS and patchy osteoporosis, which technique requires the GREATEST caution?", ["Counterstrain", "Myofascial release with gentle indirect engagement", "High-velocity, low-amplitude thrust", "Lymphatic pump techniques"], 2, "HVLA must be used with great caution (relative contraindication) in CRPS because of the patchy osteoporosis (Sudeck atrophy) characteristic of stages 2 and 3 — thrust can fracture demineralized bone. Counterstrain, gentle indirect myofascial release, and lymphatic pumps are typically well tolerated and often preferred. Goals of OMT include normalizing the CNS, improving blood flow, decreasing pain, and improving mobility.", "advanced"],
      ["MIRROR THERAPY for CRPS works on which neurophysiologic principle?", ["Direct pharmacologic sympathetic blockade", "Visual feedback that leverages cortical plasticity", "Mechanical compression of the affected limb", "Cooling of the affected dermatomes"], 1, "Mirror therapy: patient places the affected limb behind a vertical mirror and views the reflection of the unaffected limb moving normally — visual feedback creates an illusion of normal painless movement, engaging cortical plasticity and reducing central sensitization. The other choices describe other interventions.", "advanced"],
      ["The MOST effective patient with CRPS for SPINAL CORD STIMULATION is typically:", ["A newly diagnosed patient with mild early symptoms", "Refractory CRPS that failed conservative therapy", "A patient with active infection at the lead site", "A patient unable to operate the remote control"], 1, "SCS is reserved for REFRACTORY CRPS (typically >6 months symptom duration) after failure of conservative multidisciplinary therapy — RCT evidence supports its use. Active infection at the proposed site is a contraindication. Cognitive ability to operate the device is needed. Mild new-onset disease responds to conservative care first.", "advanced"],
      ["A patient on a 5-year course of high-dose long-term opioids for chronic CRPS may develop OPIOID-INDUCED HYPERALGESIA, which is characterized by:", ["Decreased pain despite stable opioid dosing", "Paradoxically increasing pain with higher opioid doses", "Reduced opioid efficacy at stable pain levels", "Sedation as the only notable side effect"], 1, "OPIOID-INDUCED HYPERALGESIA (OIH) is paradoxical worsening of pain sensitivity (allodynia, hyperalgesia) with chronic opioid use that WORSENS with dose escalation — driven by central pro-nociceptive changes. Distinct from tolerance (reduced efficacy, treat by dose increase). Recognition leads to weaning rather than escalating opioids. The other options describe tolerance or unrelated effects.", "advanced"]
    ]],
    [5, "Demonstrate how to diagnose and treat rib dysfunctions with HVLA (Lab)", [
      ["When performing supine HVLA for a typical rib 4 dysfunction, the operator's fulcrum is typically placed at:", ["The contralateral transverse process of T4", "The angle of rib 4 on the affected side", "The sternum directly", "The contralateral spinous process of T3"], 1, "Supine rib HVLA typically uses a fulcrum (closed fist or thenar) placed at the ANGLE of the affected rib on the side of dysfunction, with the operator using patient body weight as the lever. The contralateral T4 transverse process is the setup for a vertebral dysfunction, not a rib. The sternum is not a fulcrum point. The T3 spinous process is not the rib HVLA fulcrum.", "basic"],
      ["Which finding is an absolute contraindication to rib HVLA?", ["Rib somatic dysfunction with point tenderness", "Acute rib fracture in the region", "Mild costochondritis without swelling", "Inhalation dysfunction of multiple ribs"], 1, "Acute rib fracture is an absolute contraindication to HVLA because thrust can displace fragments and cause pneumothorax. A typical rib SD with tenderness, mild costochondritis, and group inhalation dysfunctions are all indications for OMT, not contraindications.", "basic"],
      ["When treating a GROUP of exhalation rib dysfunctions, which rib should be treated FIRST per the BITE rule?", ["The most inferior (bottom) rib of the group", "The most superior (top) rib of the group", "The middle rib of the group", "Whichever rib is most tender to palpation"], 1, "BITE = Bottom rib for Inhaled groups, Top rib for Exhaled groups. For an EXHALATION group, treat the most SUPERIOR (top) rib first. The bottom rib is for inhalation groups. Middle rib and most-tender approaches are not the BITE rule.", "basic"],
      ["A patient has a known osteoporosis T-score of -3.5 and bilateral rib exhalation dysfunctions of ribs 4-5. The MOST appropriate next osteopathic step is:", ["Perform standard HVLA thrust on the affected ribs", "Use muscle energy or counterstrain, not HVLA", "Perform HVLA only on the most tender side", "Refer immediately for surgical rib fixation"], 1, "Severe osteoporosis is a strong relative contraindication to HVLA because of fracture risk; muscle energy (using pectoralis minor for ribs 3-5) or counterstrain are safer, well-tolerated alternatives. Standard HVLA in this setting risks iatrogenic rib fracture. Selective HVLA does not mitigate the fracture risk. Surgery is not indicated for rib SD.", "advanced"],
      ["A patient with a known anterior superior labral tear (SLAP lesion) of the right shoulder presents with restricted right rib 1-3 dysfunction. The HVLA approach should AVOID:", ["Any active movement of the shoulder joint", "Long-lever techniques using the arm as a fulcrum", "Any examination of the shoulder", "All forms of OMT to the area"], 1, "Long-lever HVLA techniques that use the affected arm to apply torque across the shoulder joint can aggravate underlying labral or capsular pathology. For patients with known SLAP, rotator cuff, or instability, use SHORT-LEVER techniques targeting the rib angle directly or non-thrust modalities (ME, counterstrain). The other options either prohibit all assessment/treatment or fail to identify the relevant precaution.", "advanced"],
      ["A patient develops a 'CLICK and POP' in the upper thoracic spine during HVLA. The MOST appropriate next step is:", ["Repeat the thrust at higher force to ensure cavitation", "Reassess symptoms and motion; the pop is not required", "Refer for emergent imaging because of the cavitation", "Conclude treatment failed since no second pop occurred"], 1, "The audible pop with HVLA is gas cavitation from facet joint synovial fluid — NOT required for treatment success and not indicative of injury. After thrust, reassess motion (the actual treatment endpoint) and patient symptoms. Repeating thrust to force cavitation can cause harm. Emergent imaging is not needed for a normal cavitation sound.", "advanced"],
      ["A patient with chronic rib dysfunction reports significant relief after rib HVLA but returns 1 week later with the same dysfunction recurring. The MOST appropriate evaluation is:", ["Repeat HVLA at higher force until corrected", "Identify and address the perpetuating factors", "Conclude OMT is ineffective and discharge", "Switch the patient to opioid analgesia"], 1, "Recurrent dysfunction after appropriate OMT suggests an underlying PERPETUATING FACTOR — postural, occupational, visceral, muscular, or behavioral — that drives the cycle. Identification and treatment of these factors plus continued OMT yields durable improvement. Escalating force, abandoning OMT, or substituting opioids are not appropriate.", "advanced"]
    ]]
  ]],
  [5, "Cervical Spine I — Functional Anatomy and Diagnosis, Fryette's Principles", [
    [1, "Describe the muscular and ligamentous attachments of the cervical spine", [
      ["The ligamentum nuchae is the cervical-region extension of which spinal ligament?", ["Anterior longitudinal ligament", "Posterior longitudinal ligament", "Supraspinous ligament", "Ligamentum flavum"], 2, "The ligamentum nuchae is the cervical continuation of the supraspinous ligament, extending from the external occipital protuberance to the C7 spinous process. The anterior longitudinal ligament runs along the anterior vertebral bodies. The posterior longitudinal ligament lies within the spinal canal. The ligamentum flavum connects adjacent laminae.", "basic"],
      ["The alar ligaments primarily limit which motion?", ["Flexion of the head on the upper neck", "Extension of the head on the upper neck", "Excessive rotation of the head on C1", "Lateral translation of C7 on the T1 body"], 2, "The alar ligaments run from the dens of C2 to the medial occipital condyles and primarily limit excessive rotation and contralateral sidebending at the atlanto-axial (C1-C2) joint. Flexion is limited by the tectorial membrane and posterior structures. Extension is limited by anterior bony contact. C7-T1 lateral translation is not a function of alar ligaments.", "basic"],
      ["The sternocleidomastoid muscle is innervated by which nerve?", ["Spinal accessory nerve, CN XI", "The vagus nerve, also CN X", "Phrenic nerve, roots C3 to C5", "Greater occipital nerve from C2"], 0, "The SCM is innervated by the spinal accessory nerve (CN XI) for motor function with sensory contributions from C2-C3 ventral rami. The vagus is parasympathetic visceral. The phrenic nerve innervates the diaphragm. The greater occipital is a posterior cutaneous nerve, not a motor nerve to SCM.", "basic"],
      ["The suboccipital muscle group consists of four muscles. Which combination is correct?", ["Rectus capitis posterior major and minor, obliquus capitis superior and inferior", "Splenius capitis, splenius cervicis, semispinalis capitis, and longissimus capitis", "Anterior, middle, and posterior scalenes together with the longus colli muscle", "Trapezius, levator scapulae, and the rhomboid major and minor muscles"], 0, "The suboccipital group is rectus capitis posterior major, rectus capitis posterior minor, obliquus capitis superior, and obliquus capitis inferior — they extend and rotate the head at the OA/AA joints and house high-density proprioceptors. The splenius/longissimus group are deeper posterior cervical muscles. The scalenes/longus colli are anterior cervical muscles. Trapezius and rhomboids are scapular muscles.", "advanced"],
      ["The transverse ligament of the atlas is critical for cervical stability. Disruption of this ligament most directly results in:", ["An acute cervical disc herniation at the C5-C6 level", "Atlantoaxial instability with anterior subluxation of C1 on C2", "Avulsion injury of the brachial plexus nerve roots", "Dissection of the vertebral artery within the neck"], 1, "The transverse ligament of the atlas holds the dens against the anterior arch of C1; its rupture (trauma, rheumatoid arthritis, Down syndrome) allows ANTERIOR ATLANTOAXIAL SUBLUXATION with risk of cord compression. Disc herniation, plexus avulsion, and VA dissection involve different structures.", "advanced"],
      ["The TECTORIAL MEMBRANE is anatomically a continuation of which ligament and serves which function?", ["Anterior longitudinal ligament; chiefly limits cervical extension", "Posterior longitudinal ligament; covers the dens and limits cervical flexion", "The ligamentum nuchae; primarily limits cervical flexion", "The ligamentum flavum; helps to limit cervical flexion"], 1, "The tectorial membrane is the cephalad continuation of the posterior longitudinal ligament, extending into the cranium to cover the dens and upper cruciate ligament — it limits upper cervical flexion. The other ligaments have different anatomic continuations and functions.", "advanced"],
      ["The APICAL LIGAMENT of the dens runs from:", ["The dens of C2 to the anterior arch of C1", "The TIP (apex) of the dens to the anterior margin of the foramen magnum (basion)", "C1 transverse process to occipital condyle", "Spinous process of C2 to the occipital protuberance"], 1, "The apical ligament runs from the APEX of the dens to the BASION (anterior foramen magnum margin) — provides additional stability between the dens and the cranial base. The other relationships describe the alar ligaments, transverse ligament, or other structures.", "advanced"]
    ]],
    [2, "Describe how the muscles affect the spine", [
      ["Bilateral contraction of the sternocleidomastoid muscles produces which primary head motion?", ["Pure rotation to one side without flexion", "Forward flexion of the head and neck", "Pure sidebending without rotation", "Lateral translation only"], 1, "Bilateral SCM contraction flexes the head and neck forward (and assists with deep inspiration by elevating the sternum/clavicles). UNILATERAL SCM contraction rotates the face to the OPPOSITE side and sidebends the head to the SAME side. Pure rotation or pure sidebending are not produced by bilateral SCM. Lateral translation is not a primary SCM action.", "basic"],
      ["The scalene muscles share which dual function?", ["Flex the lumbar spine and elevate the pelvis", "Sidebend the cervical spine and elevate the upper ribs", "Extend the thoracic spine and depress the scapula", "Rotate the cervical spine and depress the ribs"], 1, "Scalenes (anterior, middle, posterior) sidebend the cervical spine to the same side and serve as accessory inspiratory muscles by elevating ribs 1 (anterior/middle scalenes) and rib 2 (posterior scalene). They do not act on lumbar, thoracic, or scapular regions and they elevate, not depress, the ribs.", "basic"],
      ["The longus colli is best described as which type of cervical muscle?", ["A primary posterior cervical extensor muscle", "A deep anterior cervical flexor and stabilizer", "An accessory muscle of forced expiration", "A primary elevator of the scapula"], 1, "The longus colli is a deep anterior cervical flexor that stabilizes the cervical spine in conjunction with longus capitis — important for deep cervical flexor endurance and postural stability. Cervical extension is performed by posterior musculature. Longus colli has no respiratory role. It does not move the scapula.", "basic"],
      ["Suboccipital muscle dysfunction is classically associated with which clinical syndrome?", ["Cervicogenic tension-type headache", "Carpal tunnel syndrome of the wrist", "Lumbar sciatica with leg pain", "Anterior chest wall costochondritis"], 0, "Suboccipital tension and trigger points classically produce cervicogenic headaches felt in an occipital and retro-orbital distribution, often described as a tight band — the dense proprioceptors here also contribute to dizziness when irritated. Carpal tunnel is a median nerve issue at the wrist. Sciatica is lumbosacral. Costochondritis is a chest wall condition.", "advanced"],
      ["Bilateral STERNOCLEIDOMASTOID weakness in a patient with otherwise intact cervical strength suggests a problem with:", ["The C5 cervical nerve root on both sides of the neck", "Spinal accessory nerve, CN XI, on both sides of the neck", "The C8 cervical nerve root on both sides of the neck", "The upper trunks of the brachial plexus bilaterally"], 1, "The SCM is innervated by CN XI (spinal accessory) — bilateral weakness suggests a CN XI lesion, often at the jugular foramen (also affects trapezius). C5/C8 affect different muscles. Brachial plexus does not motor-innervate SCM.", "advanced"],
      ["The deep cervical flexor MUSCLES (longus colli and longus capitis) have which important POSTURAL role?", ["They serve as the primary movers of active cervical rotation", "They provide intrinsic postural support, counterbalancing posterior extensors", "They function only as accessory muscles of forced expiration", "They have essentially no clinical or postural importance"], 1, "Longus colli and capitis are deep cervical flexors essential for cervical stability and proper lordosis — WEAKNESS or POOR ENDURANCE is associated with forward head posture, chronic neck pain, and tension headaches. Strengthening (chin tuck exercises) is a cornerstone of cervical rehab. They are not primary rotators and have no respiratory role.", "advanced"],
      ["The LEVATOR SCAPULAE muscle has dual functions including:", ["Flexion of the hip and rotation of the trunk", "Scapular elevation and ipsilateral cervical sidebending", "Extension of the knee and dorsiflexion of the ankle", "Elevation of the mandible during chewing only"], 1, "Levator scapulae originates from C1-C4 transverse processes and inserts on the superior medial scapular angle — it ELEVATES the scapula AND can ipsilaterally sidebend/rotate the cervical spine when the scapula is fixed. Bilateral contraction with fixed scapulae extends the cervical spine. The other choices describe unrelated muscles.", "advanced"]
    ]],
    [3, "Explain how to test and palpate the musculature", [
      ["To palpate the sternocleidomastoid most easily, the operator should ask the patient to:", ["Turn the head toward the side being palpated", "Turn the head to the side OPPOSITE the one being palpated", "Fully flex the cervical spine forward", "Fully extend the cervical spine backward"], 1, "The SCM is best palpated by having the patient turn the head to the OPPOSITE side — this contracts and makes the muscle stand out from origin (sternal/clavicular heads) to insertion (mastoid process). Turning toward the side relaxes and shortens the muscle. Pure flexion or extension does not isolate the SCM the same way.", "basic"],
      ["The suboccipital triangle is most reliably palpated:", ["Anterior to the SCM muscle with the patient seated upright", "Just below the external occipital protuberance, near the mastoids", "Over the clavicle within the supraclavicular fossa", "At the anterior chest wall near the sternum"], 1, "The suboccipital region is palpated just inferior to the external occipital protuberance, in the soft tissue between the mastoid processes. The supraclavicular fossa is for scalene/brachial plexus palpation. Anterior chest wall and anterior SCM areas are not suboccipital palpation sites.", "basic"],
      ["The upper trapezius is best palpated:", ["Along the medial border of the scapular blade", "Along the curve from the occiput to the acromion", "Deep within the axillary region", "Over the posterior iliac crest of the pelvis"], 1, "The upper trapezius spans from the occiput and ligamentum nuchae along the top of the shoulder to the lateral clavicle, acromion, and scapular spine — palpated by following that curve. The medial scapular border is rhomboid territory. The axilla and iliac crest are not trapezius regions.", "basic"],
      ["A positive scalene length test (e.g., shortened anterior scalene) typically reveals:", ["Restricted contralateral sidebending and rotation toward the side of the short scalene", "Restricted ipsilateral sidebending and rotation toward the side of the short scalene", "Pure flexion restriction only without rotational or sidebending changes", "No reliable findings — scalene length cannot be tested"], 0, "A short scalene pulls the cervical spine into ipsilateral sidebending and contralateral rotation, restricting contralateral sidebending and rotation toward the affected side when stretched. Pure flexion restriction without rotation is not the typical scalene length finding. Scalene length absolutely can be assessed with positional tests.", "advanced"],
      ["The CRANIOCERVICAL FLEXION TEST (using a pressure biofeedback unit) is used to assess:", ["The maximum strength of the cervical extensor muscles", "Endurance of the deep cervical flexors, longus colli/capitis", "Patency of the vertebral artery within the neck", "Pressure within the carpal tunnel of the wrist"], 1, "The craniocervical flexion test (Jull/O'Leary) uses a pressure biofeedback cuff behind the neck to assess deep cervical flexor activation and endurance — important in chronic neck pain rehab. Patient performs chin tuck, holds at incremental pressures (20-30 mmHg). The other tests assess different structures.", "advanced"],
      ["When palpating cervical articular pillars, the operator typically uses which technique?", ["Forceful axial compression using both thumbs firmly", "Light gliding pressure with the thumb pads, comparing side to side", "Sharp pin-point pressure at each spinous process", "Repeated striking with a reflex hammer at each spinal level"], 1, "Cervical articular pillar palpation uses LIGHT, gliding pressure with finger pads or thumbs, comparing sides at each level for TART criteria. Forceful axial compression, sharp pressure, and percussion can cause harm and are not the technique.", "advanced"],
      ["The 'crowing rooster' test or 'distraction-extension test' assesses:", ["Median nerve carpal tunnel syndrome at the wrist joint", "Vertebrobasilar insufficiency from neck extension and rotation", "Lumbar spinal stenosis in the lower back", "Anterior glenohumeral shoulder instability"], 1, "The Wallenberg or de Kleyn test (and variants like sustained extension-rotation, 'crowing rooster') screens for vertebrobasilar insufficiency before cervical HVLA — sustained provocative positioning while monitoring for dizziness, nystagmus, dysarthria, drop attack, or visual changes. Positive findings contraindicate HVLA. The other tests assess different conditions.", "advanced"]
    ]],
    [4, "Discuss evaluation and movement patterns of the cervical spine", [
      ["Approximately 50% of cervical FLEXION and EXTENSION occurs at which joint?", ["The C1-C2 atlanto-axial joint", "The C2-C3 cervical joint", "The occiput-C1 atlanto-occipital joint", "The C7-T1 cervicothoracic joint"], 2, "About 50% of cervical flexion-extension occurs at the OCCIPUT-C1 (atlanto-occipital) joint — the classic 'yes' joint. C1-C2 is the 'no' joint, responsible for ~50% of cervical ROTATION. C2-C3 and C7-T1 contribute smaller amounts of motion across multiple planes.", "basic"],
      ["Approximately 50% of cervical ROTATION occurs at which joint?", ["Occiput-C1", "C1-C2 (atlanto-axial)", "C3-C4", "C7-T1"], 1, "Roughly 50% of cervical rotation occurs at C1-C2 because the atlas rotates around the dens of C2 — this is the 'no' joint. The occiput-C1 is the 'yes' joint for flexion-extension. C3-C4 and C7-T1 contribute smaller amounts of rotation as part of the typical cervical spine.", "basic"],
      ["Fryette's first and second principles apply to which region of the cervical spine?", ["The entire cervical spine including occiput-C1 and C1-C2", "Only C2-C7 (the typical cervical segments)", "Only the upper cervical (OA and AA) joints", "Only C7"], 1, "Fryette's principles I and II apply to the TYPICAL cervical segments C2-C7 (with SB and rotation coupled to the SAME side regardless of flexion/extension — a cervical exception worth noting). The OA and AA joints follow different biomechanics (OA: SB and rotation OPPOSITE; AA: pure rotation). Restricting principles to upper cervical or only C7 is incorrect.", "basic"],
      ["At the atlanto-occipital (OA) joint, sidebending and rotation couple in which way?", ["To the SAME side (cervical type II pattern)", "To OPPOSITE sides (sidebending and rotation oppose)", "Always toward the side of dysfunction regardless of position", "There is no reliable coupling at OA"], 1, "The OA joint exhibits coupled sidebending and rotation to OPPOSITE sides — a sidebent-right OA dysfunction is also rotated-left and named OA F/E SR RL. The C2-C7 typical cervicals couple SB and rotation to the SAME side. Type II patterns apply to lower cervicals, not OA. Coupling at OA is reliable and well described.", "advanced"],
      ["The atlanto-axial (AA) joint primarily allows what type of motion?", ["Mainly flexion and extension, the 'yes' motion", "Pure rotation, about 50% of all cervical rotation", "Primarily lateral sidebending motion", "Equal motion in all three cardinal planes"], 1, "The AA (C1-C2) joint is structurally optimized for ROTATION — the atlas pivots around the dens of C2 — providing approximately 50% of cervical rotation with minimal coupled motion. Pure flexion-extension occurs at OA ('yes joint'). Sidebending is minimal. AA does NOT show equal motion in all planes.", "advanced"],
      ["The UNCOVERTEBRAL JOINTS (joints of Luschka) are unique to the cervical spine and located:", ["Between the adjacent cervical spinous processes", "On the superolateral aspect of the C3-C7 vertebral bodies", "Within the spinal canal between the dura and bone", "Anterior to the disc at each cervical level"], 1, "Uncovertebral joints (joints of Luschka) form on the superolateral cervical vertebral bodies (C3-C7) and articulate with the inferolateral aspect of the vertebra above — they GUIDE flexion-extension and LIMIT lateral translation. Important clinically because osteophytes here narrow the neural foramen → cervical radiculopathy. They are not in the spinal canal or anterior to the disc.", "advanced"],
      ["The OA joint motion test for sidebending (with the patient supine) is performed by:", ["Forcefully twisting the head from side to side", "Cradling the occiput and gently inducing lateral translation", "Compressing the cervical spine along its axis", "Seating the patient and forcing the neck into flexion"], 1, "OA sidebending is best evaluated with the patient supine, operator at head, one hand under the occiput and the other on the chin or maxilla — induce lateral occipital translation (which produces OA sidebending) while keeping the chin steady; compare ease of motion left vs right. The other options describe other tests or non-standard maneuvers.", "advanced"]
    ]],
    [5, "Diagnose cervical spine somatic dysfunctions (Lab)", [
      ["The TART acronym used to identify somatic dysfunction stands for:", ["Tenderness, Asymmetry, Restriction of motion, Tissue texture change", "Trauma, Atrophy, Rigidity, and a recurrent Trigger point", "Translation, Approximation, Rotation, and axial Traction", "Tendon, Articulation, Ribs, and bony Tubercle landmarks"], 0, "TART = Tissue texture change, Asymmetry, Restriction of motion, Tenderness — the four cardinal signs used to diagnose somatic dysfunction at any spinal segment. The other choices mix unrelated terms and do not match the standard osteopathic acronym.", "basic"],
      ["Translation testing is used to assess which motion at a typical cervical segment?", ["Flexion-extension", "Sidebending", "Pure rotation", "Distraction"], 1, "Translation testing applies a lateral glide to a segment to test SIDEBENDING — sidebending opposite to the direction of translation. Easy translation to the right means sidebending easily to the left. Flexion-extension is tested in the sagittal plane. Rotation is tested separately. Distraction is a longitudinal force.", "basic"],
      ["An OA somatic dysfunction is named at the occiput-C1 joint using which convention?", ["By the position of restriction (barrier)", "By the position of ease (freedom) with sidebending and rotation to opposite sides", "By the position of ease with sidebending and rotation to the same side", "By a vertebral level number only"], 1, "OA dysfunctions are named by the position of EASE (freedom), and because OA mechanics couple SB and rotation to OPPOSITE sides, the name reflects that opposition (e.g., OA F SR RL). Naming by the barrier is not standard. Same-side SB/rotation describes C2-C7 mechanics. Vertebral level number alone is insufficient for naming.", "basic"],
      ["A C4 segment is restricted in flexion, sidebending left, and rotation left. The proper dysfunction name is:", ["C4 FSLRL — flexed, sidebent left, rotated left", "C4 ERRSR — extended, rotated right, sidebent right", "C4 NSLRR — neutral, sidebent left, rotated right", "C4 SLRR — sidebent left, rotated right"], 1, "Dysfunctions are named by the position of EASE, not the barrier. Restricted in flexion/SB-left/rotation-left means the segment PREFERS extension, sidebending right, rotation right — a Type II ERRSR pattern. The other options either reverse the convention or describe a different dysfunction.", "advanced"],
      ["A patient with an OA dysfunction has occiput sidebent RIGHT (with C1 in neutral). According to OA biomechanics, the occiput will ALSO be rotated to the:", ["Right (same side as sidebending)", "LEFT (OA couples SB and rotation to OPPOSITE sides)", "Neutral with no rotation", "Either left or right unpredictably"], 1, "OA mechanics: sidebending and rotation couple to OPPOSITE sides. SB right at OA = rotated LEFT. This is named OA F/E SR RL. The other options misstate or are wrong.", "advanced"],
      ["A patient has marked tenderness over the right C2 articular pillar that does NOT change with cervical flexion or extension. Asymmetric translation suggests C2 is rotated right. The MOST likely diagnosis is:", ["C2 Type I dysfunction with rotation to the left side", "C2 Type II dysfunction, unchanged in flexion and extension", "Normal cervical asymmetry, not a dysfunction", "Degenerative spondylosis at the C2 level"], 1, "Tenderness/asymmetry that does NOT improve with either flexion or extension is a hallmark of TYPE II somatic dysfunction (non-neutral, single segment). Type I would improve in one of the positions. The cervical exception is that even Type I cervical SDs couple SB/rotation to the same side, so naming requires checking flex/ext preference.", "advanced"],
      ["When using a translation test to evaluate cervical sidebending, easy LEFT translation of a vertebra implies that the segment SIDEBENDS easily:", ["LEFT (same as translation direction)", "RIGHT (translation OPPOSITE to sidebending — pushing left creates sidebending right)", "There is no relationship between translation and sidebending", "The test only assesses rotation"], 1, "TRANSLATION TEST: lateral translation produces sidebending in the OPPOSITE direction. Easy LEFT translation = easy RIGHT sidebending. A restriction in translation indicates restriction in sidebending in the opposite direction (the barrier).", "advanced"]
    ]],
    [6, "Review soft tissue techniques for the cervical spine (Lab)", [
      ["Soft tissue (ST) osteopathic technique is classified as:", ["A direct technique using rhythmic stretch or pressure on paravertebral muscles", "An indirect technique moving the patient into the position of ease", "A high-velocity thrust technique that requires joint cavitation", "A purely visceral technique with no musculoskeletal component"], 0, "Soft tissue is a DIRECT technique applying rhythmic linear stretch, kneading, sustained pressure, or perpendicular traction to paravertebral musculature to reduce hypertonicity, stretch fascia, and improve circulation. It is not indirect, not HVLA, and not purely visceral.", "basic"],
      ["The cervical longitudinal traction soft-tissue technique is performed with the patient:", ["Supine, operator at head, gentle cephalad traction with hands cradling occiput", "Prone with operator pressing caudally with both palms on the upper trapezius bilaterally", "Seated with the head fully flexed forward and a quick downward thrust applied", "Side-lying with the head turned and a strong sustained cervical rotation force"], 0, "Cervical longitudinal traction is performed supine with the operator at the head, hands cradling the occiput, applying gentle sustained cephalad traction to stretch paravertebral musculature and decompress the cervical spine. The other set-ups do not describe a longitudinal traction technique.", "basic"],
