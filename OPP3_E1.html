const LO_ANSWERS = {
  "10_1": "High-yield entrapment neuropathies: Common peroneal (fibular head, most common LE, foot drop, cannot heel walk); Tibial (tarsal tunnel, cannot toe walk); Median (carpal tunnel MC, pronator teres = pain with pronation + thenar sensory loss, anterior interosseous = weak OK sign); Ulnar (cubital tunnel/Guyon, claw hand + Froment); Radial (spiral groove, Saturday night palsy, wrist drop); Axillary (anterior dislocation, lost abduction + lateral shoulder numbness); Suprascapular (spinoglenoid notch, weak abduction/ER); Musculocutaneous (anesthesia positioning, weak elbow flexion + lateral forearm); Dorsal scapular (rhomboids, winging); Femoral (anterior thigh, weak knee extension); Obturator (adductors, medial thigh); Lateral femoral cutaneous (meralgia paresthetica, pure sensory anterolateral thigh); Sciatic/piriformis (posterior thigh, hip prefers ER).",
  "10_2": "Ribs: true 1-7 (own cartilage to sternum), false 8-10 (cartilage above), floating 11-12 (no anterior attachment); typical 3-9 articulate with same-number vertebra and the one above. Pump-handle 2-5 = AP diameter, bucket-handle 6-10 = transverse, caliper 11-12 = both. Dysfunction named for position of ease (pain on inhalation = exhalation SD). Muscle energy for exhalation pump dysfunction: rib 1 scalenes, rib 2 posterior scalene, ribs 3-5 pectoralis minor, ribs 6-10 serratus anterior, ribs 11-12 latissimus/QL. Forced expiration uses internal/innermost intercostals + abdominals.",
  "10_3": "CRPS: Stage 1 acute (edema, warmth, increased hair/nail growth); Stage 2 chronic trophic changes (hair loss, brittle nails, cyanosis, wasting, diffuse burning); Stage 3 irreversible dystrophy/contractures, livedo reticularis. Type I = no major nerve damage; type II = with major nerve damage. Bone scan preferred over radiographs early. Ketamine blocks NMDA. HVLA relatively contraindicated; favor indirect/gentle techniques.",
  "10_4": "Cervical: superior facets BUM (backward, upward, medial). OA primary motion F/E with sidebending and rotation opposite (OA = Always Opposite); AA primary rotation; C2-C4 rotation, C5-C7 sidebending, with sidebending/rotation same side. Left-to-right translation induces left sidebending. Articular pillars used for motion testing. Radiculopathy = nerve root (gold standard needle EMG; C6-C7 disc compresses C7 root that exits above C7). Myelopathy = cord compression, broad-based gait, Babinski/Hoffmann, Lhermitte. Roots: C5 deltoid/biceps/biceps reflex/lateral arm; C6 wrist extensors/brachioradialis reflex/thumb; C7 finger extensors/triceps reflex/middle finger; C8 finger flexors/medial forearm.",
  "10_5": "Pulmonary: sympathetics T2-T7 (bronchodilation, vasoconstriction, thick secretions); parasympathetic vagus OA-C3 (bronchoconstriction, vasodilation, thin secretions). Acute asthma = sympathetic stimulation, sustained rib raising >90s for bronchodilation; pumps avoided while febrile, added once afebrile (Stage III). MOPSE: reduced length of stay, IV antibiotic duration, respiratory failure, and death.",
  "10_6": "Cardiac: sympathetics T1-T6. Right cervical chain to SA node (hyperactivity = SVT); left chain to AV node (hyperactivity = VF/ectopy). Right vagus to SA node (bradycardia); left vagus to AV node (AV block). Right pectoralis major trigger point = SVT. Increased sympathetic tone = coronary vasospasm. Post-MI OMT only after stabilization: paraspinal inhibition to calm sympathetics; indirect to ribs/sternum if CPR done.",
  "1_1": "Entrapment neuropathies result from compression, traction, or repetitive microtrauma to peripheral nerves; presentation is sensory (paresthesias, allodynia in the nerve distribution) and/or motor (weakness of innervated muscles), and Tinel sign is the classic provocative test. Key nerves: Suprascapular (suprascapular/spinoglenoid notch — shoulder pain, weak ER/abduction); Axillary (humeral neck fracture or dislocation — lateral shoulder numbness, deltoid weakness); Musculocutaneous (shoulder dislocation, anesthesia positioning — lateral forearm sensory loss, weak elbow flexion); Dorsal Scapular (rhomboid/levator spasm — scapular winging, medial border pain); Median (carpal tunnel is the MC UE entrapment — nocturnal thumb/index/middle paresthesias with flick sign; pronator teres syndrome adds pain with pronation; anterior interosseous syndrome is pure motor with inability to form the OK sign); Ulnar (cubital tunnel at elbow most common, also Guyon canal — digit 4-5 sensory and intrinsic hand weakness); Radial (spiral groove — wrist drop, dorsal hand sensory loss; PIN syndrome spares wrist extension and sensation); Sciatic (piriformis syndrome — buttock pain worse with sitting, positive FAIR test, posterior thigh radiation; foot drop at presentation is a poor prognostic sign); Superior Cluneal (iliac crest pain radiating to buttocks); Obturator (pelvic trauma/mass — medial thigh sensation, adductor weakness); Femoral (pelvic mass, childbirth, surgery — anterior thigh and medial leg sensory loss with quad/hip flexion weakness); Lateral Femoral Cutaneous (meralgia paresthetica from tight belts, obesity, pregnancy — purely sensory anterolateral thigh); Common Peroneal (MC LE entrapment, at fibular head — foot drop, dorsal foot numbness); Tibial (tarsal tunnel — plantar foot sensory and weak toe flexion).",
  "1_2": "HVLA (High-Velocity, Low-Amplitude) is a direct technique using a quick, short-distance thrust at the restrictive barrier to restore motion at a Type II somatic dysfunction. Dysfunctions are named for the position of EASE (e.g., T5 ERSright = extended, rotated right, sidebent right). Standard supine thoracic HVLA: patient supine with arms crossed over chest; operator places a fist or thenar fulcrum beneath the contralateral transverse process of the dysfunctional segment; flex the patient over the fulcrum to engage all three barriers (flexion, contralateral sidebending, contralateral rotation); deliver a quick, controlled thrust downward through the patient's elbows. ABSOLUTE contraindications include fracture, dislocation/instability, bony metastasis at the target segment, vertebrobasilar insufficiency, Down syndrome (C-spine), and Klippel-Feil. RELATIVE contraindications include severe osteopenia/osteoporosis, advanced age, acute herniation, anticoagulation, recent surgery. The audible pop is gas cavitation in the facet joint and is NOT required for technique success — restoration of motion is the goal.",
  "2_1": "Ribs are classified by anterior attachment and osseous features. TRUE RIBS (1-7) attach to the sternum via their own costal cartilage (vertebrosternal). FALSE RIBS (8-10) attach indirectly to the cartilage of the rib above (vertebrochondral). FLOATING RIBS (11, 12, sometimes 10) have no anterior attachment (vertebral). TYPICAL RIBS (3-9) have a head with TWO articulations (its own vertebra plus the one above), a neck, tubercle, body/shaft, and costal angle. ATYPICAL RIBS (1, 2, 10, 11, 12 — the '1s and 2s') vary: Rib 1 is broadest and most sharply curved, articulates only with T1; Rib 2 is longer and thinner with serratus anterior insertion, articulates with T1 and T2; Rib 10 articulates only with T10; Ribs 11 and 12 are short with no neck or tubercle, articulate only with their own vertebra.",
  "2_2": "Ribs connect to and influence multiple body regions through bony, ligamentous, fascial, muscular, and visceral relationships. SYMPATHETIC CHAIN GANGLIA lie ANTERIOR to the rib heads — rib dysfunctions can therefore drive viscerosomatic reflexes. SIBSON FASCIA (suprapleural membrane) is a continuation of deep cervical fascia covering the lung apex, attaching to rib 1 at the thoracic inlet. The 1ST RIB, MANUBRIUM, and T1 act as a functional unit at the thoracic inlet. THORACIC INLET CONTENTS: aortic arch, brachiocephalic trunk, common carotid, subclavian artery, thoracic duct, right lymphatic duct, vagus nerve, phrenic nerve, sympathetic chain, trachea, esophagus, lung apices. Ribs also serve as attachment for scapular stabilizers (serratus anterior, pectoralis), accessory respiratory muscles, and the diaphragm — making rib mechanics central to respiration, venous and lymphatic return, and shoulder girdle function.",
  "2_3": "PRIMARY MUSCLES OF INSPIRATION: diaphragm (the major driver), external intercostals, levatores costarum. ACCESSORY INSPIRATORY MUSCLES: sternocleidomastoid, scalenes (anterior, middle, posterior), serratus posterior superior, pectoralis major and minor, inferior portions of serratus anterior and latissimus dorsi, superior portion of iliocostalis. EXPIRATION is primarily PASSIVE during quiet breathing, driven by elastic recoil of costal cartilage, lung tissue, internal intercostals, sternocostalis, and innermost intercostals. ACCESSORY EXPIRATORY MUSCLES (for forced expiration): rectus abdominis, external and internal obliques, transversus abdominis, serratus posterior inferior, transversus thoracis, quadratus lumborum, iliocostalis, longissimus, and latissimus dorsi (depending on arm position). Recognizing accessory muscle recruitment is a clinical sign of respiratory distress.",
  "2_4": "Ribs exhibit three motion patterns based on geometry and articulations. PUMP HANDLE (one end fixed, free end arcs upward like an old water pump) increases the ANTERIOR-POSTERIOR diameter and predominates in ribs 2-5. BUCKET HANDLE (both ends fixed, lateral midportion rises) increases the TRANSVERSE diameter and predominates in ribs 6-10. CALIPER MOTION (no costotransverse articulations limiting horizontal plane motion) produces slight increases in BOTH AP and transverse diameters and predominates in ribs 11-12. Rib 1 is unique with approximately 50% pump and 50% bucket motion. All ribs exhibit all three types to varying degrees, but the predominant pattern determines how and where to palpate.",
  "2_5": "Rib somatic dysfunctions are named for the POSITION OF EASE (freedom), not the barrier. An INHALATION dysfunction means the rib prefers to stay inhaled and resists exhalation — anterior portion (pump handle) or lateral mid-axillary line (bucket handle) feels PROMINENT statically, rises easily with inhalation but does NOT recede on exhalation. An EXHALATION dysfunction means the rib prefers exhalation — the same landmarks feel RECESSED, descend easily with exhalation but do NOT rise on inhalation. Assessment steps: (1) identify predominant motion type, (2) palpate the area of greatest excursion, (3) static check for prominences/recesses, (4) dynamic check during the respiratory cycle. The rib that fails to move with one phase of respiration is the dysfunctional one.",
  "2_6": "DIAGNOSIS workflow for rib SD: PUMP HANDLE ribs (2-5) palpated as close to the costosternal junction as possible to capture greatest AP excursion; BUCKET HANDLE ribs (6-10) palpated at the mid-axillary line to capture greatest lateral excursion. RIB 1 is found by placing fingers at the bottom of the ear lobes and moving directly caudal (pull trapezius posteriorly if needed) — assessed for both inhalation and exhalation dysfunction at the medial thoracic inlet. RIBS 11 & 12 are assessed prone: locate the top of the ilium, walk up the quadratus lumborum until you hit bone — that is rib 12. The rib that stops first during the respiratory cycle is the dysfunctional rib. Inhaled rib 11/12 will be more posterior/prominent; exhaled rib 11/12 will be more anterior/less prominent.",
  "2_7": "COUNTERSTRAIN is an indirect technique: locate the tenderpoint, move patient to position of ease that reduces tenderness by at least 70%, HOLD for 90 SECONDS (some sources say 120 sec for ribs), slowly passively return to neutral, recheck. ANTERIOR rib tenderpoints (along the mid-clavicular and anterior axillary lines) are associated with EXHALATION dysfunctions and are treated with flexion, sidebending toward, and rotation away from the tenderpoint. POSTERIOR rib tenderpoints (at the angle of the rib) are associated with INHALATION dysfunctions and are treated with extension and sidebending. RIB 1 anterior tenderpoint sits just inferior to the medial clavicle near the costoclavicular junction; RIB 1 posterior tenderpoint sits posteriorly between trapezius and scapula. Counterstrain is well tolerated and useful when HVLA or muscle energy are contraindicated (osteoporosis, acute pain, frailty).",
  "3_1": "Rib biomechanics center on inhalation/exhalation dysfunction patterns specific to each rib's motion type. INHALATION DYSFUNCTION = rib stuck inhaled with EXHALATION restriction (pump handle: anterior end remains cephalad, sternochondral junction prominent, superior edge of posterior angle prominent; bucket handle: mid-axillary portion prominent, closer to rib above, farther from rib below). EXHALATION DYSFUNCTION = rib stuck exhaled with INHALATION restriction (mirror findings). RIB 1 (50% pump/bucket) inhalation: elevated relative to opposite side, springs poorly, tender at costotransverse; exhalation: depressed. RIBS 11 & 12 (caliper) inhalation: prominent posteriorly; exhalation: less prominent, anterior. GROUP DYSFUNCTIONS are common when several adjacent ribs share the same pattern; the rib that stops first in the cycle is the dysfunctional one.",
  "3_2": "Four elements MUST be included when naming a rib somatic dysfunction: (1) SIDE (left or right), (2) RIB NUMBER (e.g., rib 4), (3) POSITION OF EASE (inhaled or exhaled — named for where the rib LIVES, not the restriction), (4) PREDOMINANT MOTION TYPE (pump handle or bucket handle; caliper for 11/12). Example: 'Right rib 4 exhalation pump handle dysfunction' = rib 4 on the right that prefers exhalation with greatest motion change at the costosternal junction. GROUP dysfunctions are documented as 'Left ribs 6-8 inhalation bucket handle group dysfunction.' Always name by the freedom (the position the rib prefers), never by the restriction.",
  "3_3": "Clinical syndromes commonly associated with rib dysfunctions: (a) RIB ANOMALIES — cervical rib (or fibrocartilaginous band from C7 to rib 1) causes thoracic outlet syndrome by compressing lower brachial plexus trunk and/or subclavian vessels. (b) SHOULDER INSTABILITY — SICK scapula syndrome (Scapular malposition, Inferior medial border prominence, Coracoid pain, dysKinesis); scapular repositioning test improves pain when scapula is manually restored. (c) COSTOCHONDRITIS — irritation of chondrosternal/costochondral joints, MC ribs 2-5, no edema. TIETZE syndrome adds visible swelling/edema. (d) COSTOCHONDRAL SEPARATION/FRACTURE — direct trauma, focal point tenderness, distal rib cage compression reproduces pain in proximal area. (e) PULMONARY — pneumonia produces pleuritic chest pain; herpes zoster causes deep dermatomal pain. (f) CARDIAC — MI pain refers to T1-T5 left chest/arm. (g) VISCEROSOMATICS — heart, lungs, esophagus, GI, kidneys can all produce rib pain via spinal cord facilitation with hyperalgesia and tissue texture changes.",
  "3_4": "Exercise rehabilitation for rib-related issues centers on three goals: (1) restoring scapulothoracic mechanics, (2) balancing inspiratory/expiratory muscle length-tension, (3) preventing recurrence. SCAPULAR STABILIZER strengthening (serratus anterior, trapezius — especially middle and lower fibers, levator scapulae, rhomboids) addresses scapular dyskinesis. POSTURAL retraining corrects forward-head/rounded-shoulder patterns that perpetuate exhalation dysfunctions. BREATHING exercises (diaphragmatic breathing, lateral costal expansion drills) restore rib motion. For EXHALATION dysfunctions: strengthen accessory inspiratory muscles, stretch internal intercostals/abdominals. For INHALATION dysfunctions: relax accessory inspiratory muscles, engage core stability for controlled exhalation. Pectoralis stretches and thoracic extension exercises (foam roller, prone Y/T/W) round out a typical program.",
  "3_5": "MUSCLE ENERGY for rib EXHALATION dysfunctions uses specific muscles to elevate the rib during patient effort against operator resistance: Rib 1 — anterior and middle scalenes (patient lifts head); Rib 2 — posterior scalene; Ribs 3-5 — pectoralis minor (patient pushes shoulder anteriorly/upward); Ribs 6-10 — serratus anterior (patient pushes arm anteriorly); Ribs 11-12 — latissimus dorsi and quadratus lumborum. For INHALATION dysfunctions, the operator anchors the rib in exhaled position while the patient inhales deeply, repeated 3-5 times. HVLA for rib dysfunctions uses supine or prone setups with a fulcrum at the rib angle and an articulatory thrust. THE BITE RULE: treat the BOTTOM rib of an INHALED group first; treat the TOP rib of an EXHALED group first. Always reassess after each treatment.",
  "3_6": "Rib counterstrain tenderpoints: ANTERIOR — AR1 sits just inferior to the medial clavicle near the costoclavicular junction; AR2 sits at the mid-clavicular line, inferior border of rib 2; AR3 through AR6 sit along the mid-clavicular line at the inferior border of each rib; AR7 through AR10 shift laterally toward the anterior axillary line at the inferior rib border. POSTERIOR — PR1 sits at the superior aspect of the posterior angle of rib 1, palpated between trapezius and the medial border of the scapula; PR2 through PR10 sit at the angle of the corresponding rib posteriorly. Anterior tenderpoints associate with EXHALATION dysfunctions; posterior tenderpoints associate with INHALATION dysfunctions.",
  "3_7": "Counterstrain treatment positions for rib tenderpoints: hold position of ease for 90 seconds (some sources 120 sec for ribs), slowly return to neutral, recheck. ANTERIOR tenderpoints (exhalation dysfunctions): FLEXION + SidebenD TOWARD the tenderpoint + RotatE AWAY. POSTERIOR tenderpoints (inhalation dysfunctions): EXTENSION + sidebend AWAY + rotate TOWARD (or slight rotation away depending on source). AR1 SPECIFIC: head flexed, sidebent toward, rotated away — slackens scalenes. PR1 SPECIFIC: head extended, sidebent away, rotated toward. AR2-10 / PR2-10: similar principles using the patient's torso instead of head when needed. Reduce tenderness by at least 70% in the position of ease — that confirms correct positioning.",
  "4_1": "CRPS is characterized by spontaneous or evoked pain DISPROPORTIONATE in severity or duration to the inciting injury. Pain does NOT follow a specific peripheral nerve territory or dermatomal distribution. Distal predominance with abnormal sensory (allodynia, hyperalgesia), vasomotor (color/temperature asymmetry), sudomotor (sweating, edema), and motor/trophic (weakness, tremor, dystonia, skin/nail/hair changes) findings. Course is variable — may improve, stabilize, or worsen. CRPS TYPE I (formerly RSD) = no confirmed major nerve injury; CRPS TYPE II (formerly causalgia) = confirmed peripheral nerve injury. The term CRPS was adopted in 1994 by the IASP to be purely descriptive — Complex (multi-system), Regional (distal extremity, not dermatomal), Pain (cardinal feature), Syndrome (cluster of signs/symptoms, not single-mechanism disease).",
  "4_2": "ETIOLOGY of CRPS — most cases follow an identifiable precipitating event: FRACTURE (~42-44%, especially Colles/distal radius) is the most common; blunt trauma/sprains/soft tissue injury (~21%); surgery (~12%, orthopedic, carpal tunnel, shoulder); carpal tunnel syndrome / nerve entrapment (~7%); SPONTANEOUS (no identifiable precipitant) in ~5-10%. Also reported: immobilization, MI/CVA, venipuncture, minor procedures. ADULT CRPS: ~75% female (F:M 3-4:1); peak incidence ages 61-70; median onset ~46 years; upper extremity most common (~60%). PEDIATRIC CRPS: rare; ~75-90% female; mean age ~12; lower extremity affected in 71-85%; generally better prognosis but recurrence common. PATHOGENESIS involves peripheral and central sensitization, ectopic and ephaptic neural activity, autonomic dysregulation, and neurogenic inflammation.",
  "4_3": "CLINICAL MANIFESTATIONS span four domains: SENSORY (severe burning/aching pain, allodynia — pain from light touch; hyperalgesia — exaggerated pain to noxious stim); VASOMOTOR/SUDOMOTOR (skin color changes — red, mottled, pale; temperature asymmetry >1°C vs contralateral; abnormal sweating; edema); MOTOR (weakness, reduced ROM — present in ~87%; tremor, dystonia, myoclonus; neglect-like phenomenon); TROPHIC (shiny/thin/glossy skin; abnormal nail/hair growth; muscle atrophy; patchy osteoporosis on X-ray). THREE STAGES: Stage 1 (acute, weeks-3 months) — warm, red, hyperhidrotic, edema, increased hair/nails. Stage 2 (dystrophic, 3-6 months) — brawny non-pitting edema, cyanotic cool dry skin, brittle nails, patchy osteoporosis, muscle wasting. Stage 3 (atrophic) — marked irreversible dystrophy, contractures, livedo reticularis (lace-like purplish mottling), often intractable pain.",
  "4_4": "TREATMENT is multimodal and EARLY initiation is critical for prognosis. NON-PHARMACOLOGIC (first line): physical and occupational therapy with graded mobilization, desensitization, mirror therapy, functional restoration; psychotherapy. PHARMACOLOGIC: gabapentinoids, tricyclic antidepressants, sodium channel blockers, NSAIDs, short-course steroids, baclofen for dystonia, clonidine, beta-blockers; opioids only as adjuncts. PROCEDURAL: sympathetic nerve blocks (stellate ganglion for UE, lumbar sympathetic for LE) — diagnostic and therapeutic; spinal cord stimulation (implanted epidural electrodes) for refractory cases; surgical sympathectomy as last resort. OMT goals: normalize CNS, improve blood flow, decrease pain, improve mobility. OMT precautions: HVLA used with caution due to osteoporosis; INDIRECT techniques (counterstrain, myofascial release, BLT) are usually better tolerated. PROGNOSIS better with early diagnosis; chronic CRPS can lead to lifelong pain, loss of function, depression, and disability.",
  "4_5": "Rib HVLA is a direct technique using a quick, short-distance thrust to restore physiologic rib motion at the restrictive barrier. SUPINE setup: operator's fist or thenar at the ANGLE of the dysfunctional rib on the affected side; cross the patient's arms; lean patient's torso over the fulcrum to engage barriers; deliver controlled thrust through patient's elbows. INDICATIONS: Type II rib SDs failing to improve with indirect or muscle energy techniques. ABSOLUTE CONTRAINDICATIONS: acute fracture, severe osteoporosis with high fracture risk, malignancy at the segment, infection, pneumothorax. RELATIVE: anticoagulation, recent surgery, pregnancy depending on position. BITE rule for groups: Bottom rib for Inhaled groups, Top rib for Exhaled groups, treated first. Always reassess after each thrust — the audible pop is gas cavitation and is NOT required for treatment success.",
  "5_1": "LIGAMENTS — Anterior longitudinal ligament (anterior vertebral bodies, limits extension); Posterior longitudinal ligament (within canal, limits flexion); Ligamentum flavum (laminae, limits flexion); Interspinous and supraspinous ligaments; LIGAMENTUM NUCHAE (cervical continuation of supraspinous ligament, extends from external occipital protuberance to C7 spinous process). UPPER CERVICAL LIGAMENTS: tectorial membrane (continuation of PLL), cruciate ligament (transverse + longitudinal portions hold dens against C1), alar ligaments (dens to medial occipital condyles — limit excessive rotation and contralateral sidebending at AA), apical ligament. MUSCLES — Anterior: SCM, scalenes (anterior/middle/posterior), longus colli, longus capitis. Posterior superficial: trapezius, splenius capitis/cervicis. Posterior deep: semispinalis capitis/cervicis, levator scapulae. Deepest: erector spinae (iliocostalis, longissimus, spinalis cervicis), suboccipitals (rectus capitis posterior major/minor, obliquus capitis superior/inferior). SCM is innervated by spinal accessory (CN XI); trapezius also by CN XI.",
  "5_2": "MUSCLE ACTIONS — Sternocleidomastoid: bilateral contraction = forward flexion of head/neck plus assists inspiration by elevating sternum/clavicles; unilateral contraction = ipsilateral sidebending + contralateral rotation. Scalenes: bilateral = neck flexion; unilateral = ipsilateral sidebending; accessory inspiration by elevating ribs 1 (anterior/middle) and rib 2 (posterior). Longus colli/capitis: deep anterior cervical flexors and stabilizers — critical for deep cervical flexor endurance in postural control. Trapezius: upper fibers elevate scapula and extend head; middle adduct scapula; lower depress and rotate scapula. Splenius capitis/cervicis: bilateral = extend; unilateral = ipsilateral SB and rotation. Suboccipitals (rectus capitis posterior major/minor, obliquus capitis superior/inferior): fine-tune head extension and rotation at OA/AA, dense proprioceptive innervation — dysfunction → cervicogenic headaches, dizziness. Levator scapulae: elevates scapula, downwardly rotates; tight when shoulders are chronically elevated.",
  "5_3": "PALPATION & TESTING — SCM: turn head AWAY to contract and outline the muscle from sternal/clavicular heads to mastoid. Scalenes: palpate in the posterior triangle, just anterior to the trapezius; scalene length test = passive contralateral sidebending and rotation reveals shortened scalene by restriction. Trapezius: follow curve from occiput along top of shoulder to acromion; check for trigger points. Suboccipital triangle: supine, fingers under occiput between mastoid processes, sustained pressure releases tension. Levator scapulae: palpate from medial superior scapular angle to upper cervical transverse processes; tight when patient cannot fully rotate head toward the opposite side. Deep cervical flexor endurance test: supine, patient gently tucks chin and lifts head ~1 inch — normal endurance >30 sec. Active and passive ROM testing for flexion, extension, sidebending (right/left), rotation (right/left) — compare to normal ranges and assess for restriction patterns.",
  "5_4": "EVALUATION & MOVEMENT PATTERNS — Normal cervical ROM: flexion ~45-50°, extension ~45-75°, sidebending ~45° each side, rotation ~80° each side. ~50% of FLEXION-EXTENSION occurs at OCCIPUT-C1 (the 'yes' joint). ~50% of ROTATION occurs at C1-C2 (the 'no' joint). FRYETTE MECHANICS — Principles I and II apply to TYPICAL cervical segments C2-C7, with a cervical exception: sidebending and rotation are coupled to the SAME side regardless of flexion/extension position (so Type I-like and Type II patterns both couple to same side in cervicals). OCCIPUT-C1 (OA) couples SB and rotation to OPPOSITE sides — sidebent-right OA is rotated-left (named e.g., OA F SR RL). C1-C2 (AA) primarily allows pure rotation; sidebending is minimal. Cervical spine has uncovertebral joints (joints of Luschka) that guide motion and contribute to degenerative spondylosis patterns.",
  "5_5": "CERVICAL SOMATIC DYSFUNCTION DIAGNOSIS uses TART (Tissue texture, Asymmetry, Restriction, Tenderness). Palpate transverse processes/articular pillars in neutral, flexion, and extension to identify Type II (non-neutral) dysfunctions. TRANSLATION TESTING: lateral glide to assess sidebending — easy translation in one direction means easier sidebending in the OPPOSITE direction. ROTATION TESTING: palpate which articular pillar moves posteriorly with active rotation, or assess passive rotation in flexion/extension to localize segment. OA DIAGNOSIS: passive flexion/extension with sidebending and counter-rotation; named by ease (e.g., OA F SR RL = flexed, sidebent right, rotated left). AA DIAGNOSIS: pure rotation — named for direction of greatest ease. C2-C7: standard Fryette Type II naming (e.g., C4 ERSright = extended, rotated right, sidebent right; SB and rotation always same side in cervicals).",
  "5_6": "CERVICAL SOFT TISSUE TECHNIQUES are DIRECT techniques using rhythmic stretch, kneading, sustained pressure, or perpendicular traction to reduce hypertonicity and improve circulation. COMMON CERVICAL ST TECHNIQUES: (1) Cervical longitudinal traction (supine, operator at head, hands cradle occiput, gentle cephalad pull); (2) Suboccipital release (sustained fingertip pressure under occiput between mastoids); (3) Bilateral paravertebral kneading (supine, fingers under cervical paraspinals, lifting and rolling); (4) Unilateral cervical perpendicular stretch (head turned away, push paravertebrals away from spine); (5) Forearm fulcrum stretch on upper trapezius; (6) Scalene stretch (passive contralateral sidebending and rotation). CONTRAINDICATIONS: acute cervical fracture/instability, vertebrobasilar insufficiency, cervical artery dissection, acute infection, malignancy at segment. CAUTIONS: post-surgical changes, severe disc disease, advanced osteoporosis.",
  "5_7": "FACILITATED POSITIONAL RELEASE (FPR) developed by Stanley Schiowitz is an INDIRECT technique. SEQUENCE: (1) FLATTEN the spinal curve to neutral position; (2) add a FACILITATING FORCE (axial compression for cervicals/lumbars, sometimes torsion); (3) position the segment into ALL planes of EASE (the freedom in all three planes); (4) HOLD for 3-5 SECONDS; (5) return to neutral and reassess. Much shorter hold than counterstrain (90 sec). Examples: For C4 ERSright — slight cervical flexion to neutral, axial compression, then extension + right SB + right rotation, hold 3-5 sec. For OA F SR RL — neutral cervical, compression, flex OA + SB right + rotate left, hold 3-5 sec. FPR is well tolerated, time-efficient, and especially useful for chronic muscular hypertonicity that maintains the segmental dysfunction. Combine with soft tissue and ME for layered correction.",
  "6_1": "ETIOLOGIES of cervical radiculopathy: in OLDER adults (>50) the most common cause is CERVICAL SPONDYLOSIS with osteophyte-induced foraminal narrowing; in YOUNGER adults (30-50) it is acute or subacute soft DISC HERNIATION. Other causes: cervical spinal stenosis, ossification of the posterior longitudinal ligament (OPLL), tumors (including Pancoast at C8/T1), epidural abscess (rare), trauma, facet cyst, hematoma. The disc herniation pattern typically affects the inferior nerve root at the level (C6-C7 disc compresses C7 root). MOST COMMONLY AFFECTED ROOT: C7 > C6 > C8 > C5. Pancoast tumor invading apical pleura/sympathetic chain produces lower trunk plexopathy (C8/T1) plus Horner syndrome and should be suspected in smokers with these findings.",
  "6_2": "SIGNS & SYMPTOMS by nerve root — C5 (rare): deltoid weakness, decreased BICEPS reflex, lateral shoulder sensory. C6: BICEPS and wrist extension weakness, decreased BRACHIORADIALIS reflex, thumb/lateral forearm sensory. C7 (most common): TRICEPS and wrist flexion weakness, decreased TRICEPS reflex, MIDDLE finger sensory. C8: finger flexors and INTRINSIC HAND weakness, no reflex change, small finger and medial forearm sensory. T1: intrinsic hand weakness, medial upper arm sensory. RADICULAR PAIN: sharp, lancinating, follows myotomal/dermatomal distribution, WORSE with neck extension and ipsilateral rotation (closes foramen), BETTER with flexion, distraction, and abduction of the affected arm onto the head (shoulder abduction relief sign). May have positive Spurling test, positive cervical distraction relief, and absent long-tract signs.",
  "6_3": "DIFFERENTIAL DIAGNOSIS of cervical radiculopathy includes: peripheral nerve entrapments (carpal tunnel can mimic C6; cubital tunnel/Guyon can mimic C8; radial tunnel can mimic C7), brachial plexopathy (Parsonage-Turner — multi-nerve, non-myotomal, often post-viral), thoracic outlet syndrome, cervical myelopathy (UMN signs vs LMN radiculopathy), Pancoast tumor (C8/T1 + Horner), shoulder pathology (rotator cuff, frozen shoulder), referred cardiac or diaphragmatic pain, MS, ALS (mixed UMN/LMN), syringomyelia (dissociated sensory loss with cape distribution), herpes zoster (dermatomal pain + rash). Key discriminators: distribution (myotomal vs not), reflex changes, presence of LMN vs UMN signs, provocative test results, EMG/NCS localization, MRI findings.",
  "6_4": "PHYSICAL EXAM & SPECIAL TESTS for cervical radiculopathy: SPURLING TEST — cervical extension + ipsilateral SB and rotation + axial compression reproduces radicular pain (high specificity, moderate sensitivity); CERVICAL DISTRACTION — upward distraction RELIEVES radicular pain (positive); SHOULDER ABDUCTION RELIEF (Bakody) — placing affected hand on top of head relieves pain by reducing nerve root tension; UPPER LIMB TENSION TESTS (ULTT) for median, ulnar, radial — reproduce symptoms when nerve is at maximal stretch; VALSALVA — increased intrathecal pressure provokes radicular pain. Always check sensation in dermatomes, MMT in myotomes, deep tendon reflexes (biceps C5/6, brachioradialis C6, triceps C7), and screen for UMN signs (Hoffman, Babinski, hyperreflexia, gait, balance) to rule in myelopathy.",
  "6_5": "DIAGNOSTIC TESTING for cervical radiculopathy: MRI of the cervical spine (gold standard — discs, foramina, cord, soft tissue, ligaments); EMG/NCS to confirm involved root level, identify peripheral entrapments, assess acuity vs chronicity; PLAIN RADIOGRAPHS (AP, lateral, oblique, flexion-extension views) for bony alignment, spondylosis, foraminal narrowing on obliques, instability on dynamic views; CT scan (less sensitive for discs but excellent for bony anatomy); CT MYELOGRAM as alternative when MRI is contraindicated (pacemaker, claustrophobia, severe implants). Selective nerve root blocks both diagnostic and therapeutic. Lab tests usually unhelpful unless infection (CRP, ESR, CBC), malignancy, or systemic inflammatory cause suspected. Order tests based on clinical findings — most patients can be managed conservatively without immediate imaging unless red flags are present.",
  "6_6": "TREATMENT PLAN for cervical radiculopathy: FIRST-LINE conservative care for 6-12 weeks: NSAIDs, short course oral steroid taper for severe acute pain, physical therapy (gentle traction, postural correction, deep cervical flexor strengthening, scapular stabilization), OMT (soft tissue, myofascial, ME, counterstrain, gentle articulatory — HVLA with appropriate caution), short-term activity modification, ergonomic adjustments, brief (days) soft cervical collar use ONLY. If insufficient at 4-6 weeks → consider cervical epidural steroid injection. URGENT SURGICAL EVALUATION for: progressive motor weakness, cervical myelopathy signs, bowel/bladder dysfunction, severe refractory pain after optimal conservative care. SURGICAL OPTIONS: anterior cervical discectomy and fusion (ACDF), cervical disc arthroplasty, posterior foraminotomy. AVOID long-term opioids, prolonged collar use, and bed rest.",
  "6_7": "CERVICAL MYELOPATHY clinical features (cord compression, not root): typical cause = CERVICAL SPONDYLOTIC MYELOPATHY (CSM) in older adults from spondylosis + OPLL + disc-osteophyte complexes. INSIDIOUS onset, NOT a single radicular distribution. CLASSIC SYMPTOMS: gait disturbance (broad-based, unsteady), hand clumsiness (difficulty buttoning, dropping objects), numb clumsy hands, balance impairment, bowel/bladder dysfunction (late). UMN SIGNS: HOFFMAN sign (flicking middle finger DIP causes thumb flexion); hyperreflexia; clonus; Babinski sign; spasticity; LHERMITTE sign (electric shock down spine with neck FLEXION). Lower extremity weakness with spasticity, sensory level on the trunk, and proprioceptive loss (positive Romberg) may also occur. MRI is diagnostic — shows cord compression and T2 hyperintensity. Treatment: surgical decompression for moderate-severe CSM — natural history without surgery is often progressive.",
  "6_8": "CERVICAL MUSCLE ENERGY is a DIRECT technique: (1) position segment to the RESTRICTIVE BARRIER in all three planes (flexion-extension, sidebending, rotation); (2) patient contracts gently (~3-5 lb) for 3-5 seconds AGAINST operator's unyielding counterforce, away from the barrier; (3) patient relaxes; (4) operator passively takes up the new restrictive barrier; (5) repeat 3-5 times; (6) reassess. For C2-C7 Type II SD (cervical SB and rotation always same side), e.g., C4 ERSright: barriers are flexion, sidebending left, rotation left — patient pushes into extension/SR/RR, relax, take up new barriers. For OA F SR RL: barriers are extension, SB left, rotation right (OA couples SB and rotation OPPOSITE). For AA dysfunction (pure rotation): barrier is the restricted rotation direction. ME is gentle, well tolerated, and an excellent alternative to HVLA when contraindications exist.",
  "6_9": "CERVICAL COUNTERSTRAIN TENDERPOINTS — ANTERIOR (AC): AC1 — posterior aspect of the angle of the mandible (TP of C1); AC2 through AC6 — anterolateral aspect of the corresponding cervical TP (anterior tubercle), palpated through SCM; AC7 — superior surface of the medial clavicle near sternoclavicular joint; AC8 — superior surface of the medial clavicle just lateral to AC7. POSTERIOR (PC): PC1 inion — 1 inch lateral to inion (external occipital protuberance); PC1 occiput — at the lateral inferior occipital edge; PC2 — spinous process of C2; PC3 — inferolateral spinous process of C2 or interspinous space; PC4-PC8 — articular pillars/posterior elements of corresponding segments. Use ~70% reduction of tenderness as confirmation of correct position of ease.",
  "6_10": "COUNTERSTRAIN TREATMENT POSITIONS for cervical tenderpoints: hold 90 seconds, slow passive return, recheck. ANTERIOR tenderpoints (general FSTRA): FLEXION + SidebenD TOWARD + RotatE AWAY. POSTERIOR tenderpoints (general ESARA): EXTENSION + sidebend AWAY + rotate AWAY (some texts: rotate toward — verify by tenderness reduction). SPECIFICS: AC1 — flexion + MARKED rotation away + minimal SB; AC2-AC6 — flexion + SB toward + rotation away; AC7 and AC8 — flexion + marked rotation away; PC1 inion — marked OA EXTENSION + SB away + rotation away; PC1 occiput — flexion of OA + SB away + rotation toward; PC2-PC8 — extension + SB away + rotation away (some sources rotate toward). Always titrate position by tenderness — at least 70% reduction confirms correct setup.",
  "7_1": "FOUNDED 1874 by A.T. Still in Kirksville, Missouri; first osteopathic school (American School of Osteopathy) opened 1892 in Kirksville. FOUR TENETS OF OSTEOPATHIC MEDICINE: (1) The body is a unit; the person is a unit of body, mind, and spirit. (2) The body is capable of self-regulation, self-healing, and health maintenance. (3) Structure and function are reciprocally interrelated. (4) Rational treatment is based on understanding and integrating these three principles. Still's philosophy: 'find it, fix it, leave it alone' — the body contains its own pharmacy; the physician's role is to remove obstructions and let homeostasis work. DOs and MDs have equivalent unrestricted licenses to practice medicine and surgery in all 50 states; DOs add OMM to their toolkit.",
  "7_2": "SOMATIC DYSFUNCTION = impaired or altered function of related components of the somatic (body framework) system: skeletal, arthrodial, myofascial, and related vascular/lymphatic/neural elements. TART criteria: Tissue texture change, Asymmetry, Restriction of motion, Tenderness. FACILITATED SEGMENT = a spinal cord segment maintained in a state of hyperexcitability by chronic afferent input (somatic or visceral), lowering threshold for output; produces stereotyped tissue texture/motion changes at predictable levels. VISCEROSOMATIC REFLEXES — visceral afferents converge on dorsal horn neurons that also receive somatic input, producing characteristic somatic findings: HEART T1-T5 (left); LUNG T2-T7; UPPER GI/STOMACH T5-T9 (left); LIVER/GALLBLADDER T5-T9 (right); KIDNEYS T9-T11 (ipsilateral); APPENDIX T12 (right); OVARIES/TESTES T10-T11; UTERUS T10-L2; BLADDER T11-L2; SIGMOID/RECTUM L1-L2; PARASYMPATHETICS via vagus (head to right colon) and S2-S4 (left colon to pelvis).",
  "7_3": "CHAPMAN'S REFLEXES are small, discrete, tender ganglioform contractures in fascia overlying specific visceral organs. ANTERIOR points are used for DIAGNOSIS; POSTERIOR points are used for TREATMENT (light circular pressure for ~10-30 seconds or until tenderness resolves). KEY POINTS: ADRENAL — anterior: 1 inch superior, 1 inch lateral to umbilicus bilaterally; posterior: between T11-T12 transverse processes. KIDNEY — anterior: 1 inch lateral to umbilicus bilaterally; posterior: between T12-L1. APPENDIX — anterior: tip of right 12th rib. STOMACH — anterior: left 5th ICS (acidity) and 6th ICS (peristalsis) near sternum. LIVER/GALLBLADDER — anterior: right 5th-6th ICS. SINUSES — anterior: along clavicle/sternum upper points; MIDDLE EAR — first intercostal space lateral to sternum. The Chapman point feels like a 'shotty BB' under the skin and is exquisitely tender if active.",
  "7_4": "LYMPHATIC SYSTEM — Thoracic duct drains the entire body EXCEPT the right upper quadrant (right arm, right side of head/neck/chest) into the junction of the LEFT internal jugular and LEFT subclavian veins. Right lymphatic duct drains the right upper quadrant into the right IJ/subclavian junction. KEY LYMPHATIC OMT: (1) Thoracic inlet/Sibson fascia release (release before any pump); (2) Diaphragmatic redoming (releases the diaphragm — primary lymphatic pump); (3) Thoracic pump (rhythmic chest compressions, 100/min); (4) Pedal/Dalrymple pump (ankle dorsiflexion-plantarflexion, contraindicated in DVT); (5) Lymphatic chain releases; (6) Visceral techniques. ABSOLUTE CONTRAINDICATIONS: untreated bacterial infection (sepsis risk), osteomyelitis at site, acute bacterial endocarditis, DVT (for pedal pump). Always release fascial diaphragms (tentorium, thoracic inlet, abdominal diaphragm, pelvic diaphragm) before pumping.",
  "7_5": "DIRECT vs. INDIRECT classification of OMT techniques: DIRECT engages and moves through the restrictive barrier (HVLA, muscle energy, articulatory, direct MFR, BLT moving into ease then through barrier with respiratory cooperation); INDIRECT moves AWAY from the barrier into the position of ease (counterstrain, FPR, indirect MFR, BLT/LAS). INDICATIONS for OMT: somatic dysfunction in any system, musculoskeletal pain, postural strain, visceral dysfunction (adjunctive), post-surgical recovery, peripartum care. ABSOLUTE CONTRAINDICATIONS to HVLA: acute fracture, dislocation, AA instability (Down syndrome, RA), severe osteoporosis at segment, vertebrobasilar insufficiency, bony metastasis. RELATIVE: anticoagulation, recent surgery, advanced age, severe disc disease. INDIRECT techniques are usually well tolerated when direct is contraindicated. ALL OMT requires patient consent and an appropriate clinical setting.",
  "7_6": "SACRUM has 5 motion axes (3 transverse: superior/respiratory, middle/postural, inferior/innominate; plus left and right oblique for torsion). SACRAL DYSFUNCTIONS: FORWARD TORSIONS (L on L, R on R) — sacrum rotates same direction as the named oblique axis; deep contralateral sulcus, posterior ipsilateral ILA, NEGATIVE spring test, L5 rotates OPPOSITE to sacrum. BACKWARD TORSIONS (R on L, L on R) — sacrum rotates opposite to the axis; opposite findings, POSITIVE spring test, L5 rotates SAME as sacrum. UNILATERAL SACRAL FLEXION/EXTENSION — sacrum bends and rotates on one side only. INNOMINATE DYSFUNCTIONS: anterior rotation (long leg on that side), posterior rotation (short leg on that side), inflare (ASIS medial), outflare (ASIS lateral), superior shear/UPSLIP (ASIS and PSIS both superior on affected side), inferior shear/downslip. Standard pelvic exam: ASIS, PSIS, iliac crest, medial malleolus heights; sacral landmarks (base, ILA, sulcus); spring test; standing/seated flexion tests; ASIS compression.",
  "7_7": "PSOAS SYNDROME — chronic psoas spasm produces flexed lumbar posture, forward trunk shift, ipsilateral pelvic findings (often anterior innominate), POSITIVE THOMAS TEST (cannot fully extend hip while contralateral hip is held flexed = psoas tightness). Psoas major originates from T12-L5 vertebral bodies/TPs and inserts on the lesser trochanter of the femur — most powerful hip flexor; iliopsoas combines with iliacus. PIRIFORMIS SYNDROME — sciatic nerve compression as it passes piriformis (~15-20% of people have sciatic nerve piercing piriformis — Beaton variants). Symptoms: buttock pain worse with sitting, posterior thigh radiation, hip prefers external rotation, decreased internal rotation. POSITIVE TESTS: FAIR (Flexion, Adduction, Internal Rotation reproduces pain), Pace sign (resisted abduction of flexed hip), Freiberg sign (passive IR with extended hip). Treatment: stretching/strengthening external rotators/abductors, OMT (counterstrain, MFR, ME), trigger point injection, surgical release in refractory cases.",
  "7_8": "POSTURE — ideal alignment: external auditory meatus, shoulder, hip, knee, lateral malleolus all in vertical line. Common deviations: forward head, rounded shoulders (upper cross syndrome), increased lumbar lordosis with anterior pelvic tilt (lower cross), flat back, sway back. SCOLIOSIS — Cobb angle ≥10° with vertebral rotation defines scoliosis; idiopathic (MC, adolescent female), congenital, neuromuscular. Screening: Adams forward bend test (rib hump, lumbar prominence). Bracing typically 25-40°; surgery typically >45-50° in skeletally immature. SHORT LEG SYNDROME — anatomic (true length difference) vs functional (e.g., pelvic obliquity, scoliosis); sacral base unleveling toward the short side, compensatory lumbar group curve (Type I) convex toward short side. Heel lift introduced GRADUALLY: 1/3-1/2 of difference initially, advance ~1/8 inch every 2 weeks; full correction over months. Consider total correction by ~age 22; adults may not fully correct due to chronic adaptive changes.",
  "7_9": "FRYETTE'S PRINCIPLES — apply to thoracic and lumbar spine: (I) NEUTRAL (Type I): SB and rotation OPPOSITE sides, multiple vertebrae (group); (II) NON-NEUTRAL (Type II): SB and rotation SAME side, single segment (flexed or extended). Cervical exception: C2-C7 always couple SB and rotation to same side regardless of neutral position. NORMAL CURVES: cervical lordosis, thoracic kyphosis, lumbar lordosis, sacral kyphosis. RULE OF THREES (thoracic spinous processes vs TPs): T1-T3 same level; T4-T6 ~half level below; T7-T9 one level below; T10 like T9; T11 like T2; T12 like T1. LUMBAR: 5 vertebrae, large bodies, sagittally oriented facets (limit rotation, allow flexion/extension/sidebending). DIAGNOSIS: palpate TPs in neutral, flexion, extension; identify Type I (improves equally in flex/ext or worsens in both) vs Type II (improves in one, worsens in other). Springing test for chronicity. Always document by position of EASE.",
  "7_10": "LUMBAR RADICULOPATHY — L4 (less common): quad weakness, decreased patellar reflex, medial leg/foot sensory; L5 (common): EHL/dorsiflexion weakness, dorsal foot + great toe sensory, no reliable reflex; S1 (common): plantarflexion weakness, decreased ACHILLES reflex, lateral foot/heel sensory. STRAIGHT LEG RAISE (SLR): + at 30-70° hip flexion reproducing radicular pain = L5/S1 root irritation; crossed SLR (contralateral leg raise reproduces pain on affected side) is highly specific. LOW BACK PAIN — 80-90% mechanical/non-specific; remaining ~10-20% includes radiculopathy, spondylolisthesis, stenosis, fracture, infection, malignancy. RED FLAGS for serious LBP: trauma, age >50 first episode, weight loss, fever, IVDU, h/o cancer, neurologic deficit, bowel/bladder dysfunction, saddle anesthesia, night pain, no relief with rest. CAUDA EQUINA SYNDROME — surgical emergency: bilateral leg weakness, urinary retention/incontinence, saddle anesthesia → emergent MRI + surgical consult.",
  "7_11": "COMPARTMENT SYNDROME — increased pressure within osseofascial compartment compromises perfusion. 5 Ps: Pain (out of proportion, worse with passive stretch), Paresthesias, Paralysis, Pallor, Pulselessness (late, ominous). Pressure >30 mmHg or delta pressure (DBP - compartment) <30 → emergent fasciotomy. Most common in tibial fractures, crush injuries, reperfusion. FIBROMYALGIA — chronic widespread MSK pain with fatigue, sleep disturbance, cognitive dysfunction. 2010/2016 ACR CRITERIA: Widespread Pain Index (WPI) + Symptom Severity Scale (SSS), >3 months, no alternative diagnosis. Old criteria (1990): 11/18 tender points. Treatment: education, exercise (low-impact aerobic, gradual), CBT, sleep hygiene, SNRIs (duloxetine, milnacipran), pregabalin, OMT. POLYMYALGIA RHEUMATICA — different entity: bilateral shoulder/hip girdle pain + morning stiffness, ESR markedly elevated (often >50), age >50, dramatic response to low-dose prednisone. Always screen PMR for giant cell arteritis (temporal headache, jaw claudication, vision changes) — needs urgent high-dose steroids and biopsy.",
  "8_1": "SYMPATHETIC CARDIAC CONTROL — preganglionic fibers arise from T1-T6 (some preganglionics ascend to synapse in the cervical chain ganglia). Right cardiac sympathetics project mainly to the SA node (rate); left sympathetics project to the AV node and ventricle. Increased sympathetic tone is positively chronotropic, inotropic, and dromotropic (raises rate, contractility, conduction, and cardiac output). Right hypersympathetic tone favors supraventricular tachycardia; left hypersympathetic tone favors ventricular ectopy and fibrillation. Excess sympathetic tone can provoke coronary vasospasm. Essential hypertension is viewed as cardiovascular hyperreactivity to sympathetic input. Anterior wall MI refers viscerosomatic findings to the LEFT T2-T3 paraspinal tissues.",

function qKey(lec,lo,i){return lec+"_"+lo+"_"+i}
function getLiveQuiz(){
  // Returns the live QUIZ array with edits/additions applied and deletions removed.
  return QUIZ.map(([lecNum,lecTitle,los])=>{
    const newLos = los.map(([loNum,loText,qs])=>{
      let liveQs = qs.map((q,i)=>{
        const k = qKey(lecNum,loNum,i);
        if(state.deleted[k]) return null;
        if(state.edits[k]) return state.edits[k];
        return q;
      }).filter(Boolean);
      const addKey = lecNum+"_"+loNum;
      if(state.added[addKey]) liveQs = liveQs.concat(state.added[addKey]);
      return [loNum,loText,liveQs];
    });
    return [lecNum,lecTitle,newLos];
  });
}
function fnvHash(s){
  let h = 2166136261;
  for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=(h*16777619)>>>0}
  return h>>>0;
}
function seededShuffle(arr, seed){
  const a = arr.slice();
  let s = seed;
  for(let i=a.length-1;i>0;i--){
    s = (s*1664525 + 1013904223) >>> 0;
    const j = s % (i+1);
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function getShuffledOpts(key, opts, correctIdx){
  if(state.shuffleCache[key]) return state.shuffleCache[key];
  const seed = fnvHash(key);
  const indices = seededShuffle(opts.map((_,i)=>i), seed);
  const newOpts = indices.map(i=>opts[i]);
  const newCorrect = indices.indexOf(correctIdx);
  const res = {opts:newOpts, correct:newCorrect, indices};
  state.shuffleCache[key] = res;
  return res;
}
function stripParens(opts){
  // If all have parens, keep them; else strip the ones that do
  const haveParens = opts.map(o=>/\([^)]*\)/.test(o));
  if(haveParens.every(Boolean)) return opts;
  return opts.map((o,i)=>haveParens[i] ? o.replace(/\s*\([^)]*\)/g,"").trim() : o);
}
function getAllQuestionsFlat(){
  const out = [];
  getLiveQuiz().forEach(([lecNum,lecTitle,los])=>{
    los.forEach(([loNum,loText,qs])=>{
      qs.forEach((q,i)=>{
        out.push({lecNum,lecTitle,loNum,loText,q,key:qKey(lecNum,loNum,i)});
      });
    });
  });
  return out;
}

function renderSidebar(){

  live.forEach(([lecNum,lecTitle,los])=>{

      total += qs.length;
      qs.forEach((q,i)=>{ if(state.answers[qKey(lecNum,loNum,i)] !== undefined) answered++; });
    });
    const active = (lecNum===state.currentLecture && !state.reviewMode) ? "active" : "";
    html += `<div class="sb-item ${active}" data-lec="${lecNum}">
      <span class="sb-item-title">${lecNum}. ${escapeHtml(lecTitle)}</span>
      <span class="sb-item-count">${answered} / ${total} answered</span>

function escapeHtml(s){return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]))}

function renderMain(){
  const live = getLiveQuiz();
  const lec = live.find(([n])=>n===state.currentLecture);
  if(!lec){document.getElementById("mainContent").innerHTML = "<p>Lecture not found.</p>"; return}
  const [lecNum,lecTitle,los] = lec;
  let total=0, answered=0, correct=0;
  los.forEach(([loNum,_,qs])=>{
    total += qs.length;
    qs.forEach((q,i)=>{
      const k = qKey(lecNum,loNum,i);
      if(state.answers[k] !== undefined){
        answered++;
        if(state.answers[k] === true) correct++;
      }
    });
  });
  const pct = total ? Math.round(100*answered/total) : 0;
  let html = `<div class="lec-head">
    <div class="lec-title">${lecNum}. ${escapeHtml(lecTitle)}</div>
    <div class="lec-sub">${los.length} learning objective${los.length===1?"":"s"} · ${total} question${total===1?"":"s"}</div>
  </div>
  <div class="topic-score">
    <div class="score-bar-wrap"><div class="score-bar-fill" style="width:${pct}%"></div></div>
    <div class="score-text">${correct} / ${answered} correct (${pct}%)</div>

  </div>`;

  los.forEach(([loNum,loText,qs])=>{
    const aKey = lecNum+"_"+loNum;
    html += `<div class="lo-card">
      <div class="lo-head">
        <div class="lo-text"><span class="lo-num">LO ${loNum}</span>${escapeHtml(loText)}</div>
        <button class="lo-answer-btn" data-la="${aKey}">Answer LO</button>
      </div>
      <div class="lo-answer-panel" data-la-panel="${aKey}">${LO_ANSWERS[aKey] ? escapeHtml(LO_ANSWERS[aKey]) : "<em style='color:var(--muted)'>No LO answer written yet.</em>"}</div>
      <div class="lo-questions" data-loq="${aKey}">`;
    if(qs.length===0){
      html += `<div class="empty-lo">No questions yet for this LO. Toggle Edit Mode and click + Add a question once material is uploaded.</div>`;
    } else {
      qs.forEach((q,i)=>{
        html += renderQuestionCard(lecNum,loNum,i,q);
      });
    }
    html += `<button class="add-q-btn edit-only" data-addto="${aKey}">+ Add a question to this LO</button>`;
    html += `</div></div>`;
  });

  html += `<div class="lec-nav">
    <button class="btn" id="prevLec">← Previous Lecture</button>
    <button class="btn" id="nextLec">Next Lecture →</button>
  </div>`;
  document.getElementById("mainContent").innerHTML = html;

  // Wire up interactions
  document.querySelectorAll(".lo-answer-btn").forEach(b=>{
    b.onclick = ()=>{
      const panel = document.querySelector(`[data-la-panel="${b.dataset.la}"]`);
      panel.classList.toggle("open");
    };
  });
  document.querySelectorAll(".q-opt").forEach(o=>{
    o.onclick = ()=>handleAnswer(o);
  });
  document.querySelectorAll(".q-flag").forEach(b=>{
    b.onclick = (e)=>{ e.stopPropagation(); toggleFlag(b.dataset.flag); renderMain(); };
  });
  document.querySelectorAll(".reset-lec-btn").forEach(b=>{
    b.onclick = ()=>resetLecture(parseInt(b.dataset.lec));
  });
  document.querySelectorAll(".q-edit-btn").forEach(b=>{
    b.onclick = ()=>openEditForm(b.dataset.key);
  });
  document.querySelectorAll(".q-delete-btn").forEach(b=>{
    b.onclick = ()=>deleteQuestion(b.dataset.key);
  });
  document.querySelectorAll(".q-revert-btn").forEach(b=>{
    b.onclick = ()=>revertQuestion(b.dataset.key);
  });
  document.querySelectorAll(".add-q-btn").forEach(b=>{
    b.onclick = ()=>openAddForm(b.dataset.addto);
  });
  document.getElementById("prevLec").onclick = ()=>navLec(-1);
  document.getElementById("nextLec").onclick = ()=>navLec(1);
}
function navLec(dir){
  const live = getLiveQuiz();
  const ids = live.map(l=>l[0]);
  const idx = ids.indexOf(state.currentLecture);
  const next = idx + dir;
  if(next>=0 && next<ids.length){
    state.currentLecture = ids[next];
    renderAll();
    window.scrollTo({top:0,behavior:"smooth"});
  }
}
function renderQuestionCard(lecNum,loNum,i,q){
  const [stem,opts,correctIdx,explanation,tag,imgHtml] = q;
  const key = qKey(lecNum,loNum,i);
  const cleanedOpts = stripParens(opts);
  const sh = getShuffledOpts(key, cleanedOpts, correctIdx);
  const answered = state.answers[key];
  const wasEdited = !!state.edits[key];
  const flagged = isFlagged(key);
  let html = `<div class="q-card" data-key="${key}">
    <div class="q-meta">
      <span>Question ${i+1}</span>
      <span class="q-meta-right">
        <button class="q-flag${flagged?' flagged':''}" data-flag="${key}">${flagged?'★ Flagged':'☆ Flag'}</button>
        <span class="q-tag ${tag==='advanced'?'advanced':'basic'}">${tag==='advanced'?'Multi-step':'Foundational'}</span>
      </span>
    </div>
    <div class="q-stem">${escapeHtml(stem)}</div>`;
  if(imgHtml) html += `<div class="q-img">${imgHtml}</div>`;
  html += `<div class="q-opts">`;
  sh.opts.forEach((o,idx)=>{
    const letter = "ABCD"[idx];
    let cls = "q-opt";
    if(answered !== undefined){
      cls += " locked";
      if(idx === sh.correct) cls += " correct";
      else if(state.answers[key+"_pick"] === idx) cls += " wrong";
      else cls += " dim";
    }
    html += `<div class="${cls}" data-key="${key}" data-pick="${idx}" data-correct="${sh.correct}">
      <span class="opt-letter">${letter}.</span><span>${escapeHtml(o)}</span>
    </div>`;
  });
  html += `</div>`;
  html += `<div class="q-explain${answered!==undefined?" shown":""}">${escapeHtml(explanation)}</div>`;
  html += `<div class="q-edit-row edit-only">
    <button class="btn q-edit-btn" data-key="${key}">Edit</button>
    <button class="btn q-delete-btn" data-key="${key}">Delete</button>
    ${wasEdited ? `<button class="btn q-revert-btn" data-key="${key}">Revert</button>` : ""}
  </div>`;
  html += `</div>`;
  return html;
}
function resetLecture(lec){
  if(!confirm("Reset all answers for Lecture "+lec+"? Edits and added questions are kept.")) return;
  const live = getLiveQuiz();
  const lecData = live.find(([n])=>n===lec);
  if(!lecData) return;
  lecData[2].forEach(([loNum,_,qs])=>{
    qs.forEach((q,i)=>{
      const k = qKey(lec,loNum,i);
      delete state.answers[k];
      delete state.answers[k+"_pick"];
    });
  });
  persist();
  renderAll();
}

function handleAnswer(optEl){
  if(optEl.classList.contains("locked")) return;
  const key = optEl.dataset.key;
  const pick = parseInt(optEl.dataset.pick);
  const correctIdx = parseInt(optEl.dataset.correct);
  const isCorrect = pick === correctIdx;
  state.answers[key] = isCorrect;
  state.answers[key+"_pick"] = pick;
  persist();
  if(isCorrect){
    state.points++;
    state.streak++;
    showFloatingPlusOne(optEl);
    if(state.streak % 5 === 0 && state.streak > 0){
      state.points++;
      // visible nudge for streak bonus is in Fast Mode; keep simple here
    }
  } else {
    state.streak = 0;
  }
  checkAchievements();
  renderMain();
  renderRSidebar();
  renderHdrStats();
  renderSidebar();
}
function showFloatingPlusOne(el){
  const r = el.getBoundingClientRect();
  const fp = document.createElement("div");
  fp.className = "floating-plus-one";
  fp.textContent = "+1";
  fp.style.left = (r.right - 30)+"px";
  fp.style.top = (r.top + 5)+"px";
  document.body.appendChild(fp);
  setTimeout(()=>fp.remove(), 1300);
}

  if(p >= 50){zone = "MASTER PALPATOR"; cls = "fire"}
  else if(p >= 25){zone = "PALPATING"; cls = "hot"}
  else if(p >= 10){zone = "WARMING UP"; cls = "warm"}
  const hc = document.getElementById("handCard");
  hc.className = "rs-card hand-card " + cls;
  document.getElementById("handZone").textContent = zone;
  document.getElementById("handPoints").textContent = p;

const BADGE_DEFS = [
  {id:"first", icon:"👋", label:"First Touch"},
  {id:"streak5", icon:"🔥", label:"5 in a Row"},
  {id:"streak10", icon:"⚡", label:"10 in a Row"},
  {id:"ten", icon:"🩺", label:"Diagnostician"},
  {id:"fifty", icon:"👨‍⚕️", label:"Clinician"},

  {id:"fastSurvivor", icon:"⚡", label:"Fast Mode Survivor"}

function renderBadges(){
  const el = document.getElementById("badges");
  el.innerHTML = BADGE_DEFS.map(b=>{

    return `<div class="badge ${earned}" title="${escapeHtml(b.label)}"><span class="badge-icon">${b.icon}</span>${escapeHtml(b.label)}</div>`;
  }).join("");

function checkAchievements(){
  const a = totalAnswered(), c = totalCorrect();
  if(c>=1) state.achievements.first = true;
  if(state.streak>=5) state.achievements.streak5 = true;
  if(state.streak>=10) state.achievements.streak10 = true;
  if(a>=10) state.achievements.ten = true;
  if(a>=50) state.achievements.fifty = true;
  if(a>=100) state.achievements.hundred = true;
  // perfect lecture
  const live = getLiveQuiz();
  for(const [lecNum,_,los] of live){
    let tot=0, cor=0;
    los.forEach(([loNum,__,qs])=>{
      qs.forEach((q,i)=>{
        const k = qKey(lecNum,loNum,i);
        if(state.answers[k] !== undefined){ tot++; if(state.answers[k]) cor++ }
      });
    });
    if(tot>0 && tot===cor && tot>=4){ state.achievements.perfect = true; break; }
  }
  persist();
}

function startFactTicker(){
  const el = document.getElementById("factText");
  function show(){
    el.style.opacity = 0;
    setTimeout(()=>{
      el.textContent = FACTS[state.factIndex % FACTS.length];
      state.factIndex++;
      el.style.opacity = 1;
    }, 400);
  }
  show();
  setInterval(show, 12000);
}

// ============================================================
// REVIEW MODE
// ============================================================
function updateReviewButtons(){
  document.getElementById("btnReview").textContent = state.reviewMode==='incorrect' ? "Exit Review" : "Review Incorrect";
  document.getElementById("btnFlagged").textContent = state.reviewMode==='flagged' ? "Exit Review" : "Review Flagged";
}
function enterReviewMode(type){
  // type: 'incorrect' | 'flagged'
  state.reviewMode = type;
  state.reviewRevealed = new Set();
  document.body.classList.add("review-mode");
  if(type==='incorrect'){
    state.reviewInitialIncorrect = new Set();
    Object.keys(state.answers).forEach(k=>{
      if(!k.endsWith("_pick") && state.answers[k]===false) state.reviewInitialIncorrect.add(k);
    });
  }
  updateReviewButtons();
  renderReviewView();
}
function exitReviewMode(){
  state.reviewMode = false;
  state.reviewRevealed = new Set();
  document.body.classList.remove("review-mode");
  updateReviewButtons();
  renderMain();
  renderSidebar();
}
function lookupQuestion(key){
  const [lec,lo,i] = key.split("_").map(Number);
  const live = getLiveQuiz();
  const lecData = live.find(([n])=>n===lec); if(!lecData) return null;
  const loData = lecData[2].find(([n])=>n===lo); if(!loData) return null;
  const q = loData[2][i]; if(!q) return null;
  return {lec,lo,i,q,key,loText:loData[1],lecTitle:lecData[1]};
}
// A practice card that does NOT reveal the answer until the user picks an option.
function renderReviewCard(item){
  const {lec,lo,i,q,key,loText} = item;
  const [stem,opts,correctIdx,explanation,tag,imgHtml] = q;
  const cleaned = stripParens(opts);
  const sh = getShuffledOpts(key, cleaned, correctIdx); // same shuffle as main view -> pick storage stays consistent
  const revealed = state.reviewRevealed.has(key);
  const pick = revealed ? state.answers[key+"_pick"] : undefined;
  const flagged = isFlagged(key);
  let html = `<div class="review-q-meta">LO ${lo}: ${escapeHtml(loText)}</div>`;
  html += `<div class="q-card" data-key="${key}">
    <div class="q-meta">
      <span>Lecture ${lec}</span>
      <span class="q-meta-right">
        <button class="q-flag${flagged?' flagged':''}" data-flag="${key}">${flagged?'★ Flagged':'☆ Flag'}</button>
        <span class="q-tag ${tag==='advanced'?'advanced':'basic'}">${tag==='advanced'?'Multi-step':'Foundational'}</span>
      </span>
    </div>
    <div class="q-stem">${escapeHtml(stem)}</div>`;
  if(imgHtml) html += `<div class="q-img">${imgHtml}</div>`;
  html += `<div class="q-opts">`;
  sh.opts.forEach((o,idx)=>{
    const letter = "ABCD"[idx];
    let cls = "q-opt";
    if(revealed){
      cls += " locked";
      if(idx === sh.correct) cls += " correct";
      else if(pick === idx) cls += " wrong";
      else cls += " dim";
    }
    html += `<div class="${cls}" data-rev-key="${key}" data-pick="${idx}" data-correct="${sh.correct}">
      <span class="opt-letter">${letter}.</span><span>${escapeHtml(o)}</span>
    </div>`;
  });
  html += `</div>`;
  html += `<div class="q-explain${revealed?' shown':''}">${escapeHtml(explanation)}</div>`;
  if(revealed) html += `<button class="try-again-btn" data-retry="${key}">↻ Try Again</button>`;
  html += `</div>`;
  return html;
}
function renderReviewView(){
  const banner = document.querySelector(".review-banner-title");
  let keys;
  if(state.reviewMode==='flagged'){
    if(banner) banner.textContent = "Reviewing Flagged Questions";
    keys = Object.keys(state.flagged);
  } else {
    if(banner) banner.textContent = "Reviewing Incorrect Answers";
    keys = [...state.reviewInitialIncorrect];
  }
  // Build items, grouped by lecture, in lecture/LO/question order
  const items = keys.map(lookupQuestion).filter(Boolean);
  items.sort((a,b)=> a.lec-b.lec || a.lo-b.lo || a.i-b.i);
  // Banner stats
  const stats = document.getElementById("reviewBannerStats");
  if(stats){
    if(state.reviewMode==='flagged'){
      stats.textContent = `${items.length} flagged question${items.length===1?"":"s"}`;
    } else {
      let nowCorrect = 0;
      state.reviewInitialIncorrect.forEach(k=>{ if(state.answers[k]===true) nowCorrect++ });
      stats.textContent = `${state.reviewInitialIncorrect.size} to review · ${nowCorrect} answered correctly`;
    }
  }
  let html = "";
  if(items.length === 0){
    html = state.reviewMode==='flagged'
      ? `<div class="empty-review">🚩 No flagged questions yet. Click ☆ Flag on any question to save it here for focused review.</div>`
      : `<div class="empty-review">🎯 No incorrect answers yet! Questions you miss will appear here, answerable fresh — without the answer shown.</div>`;
  } else {
    let curLec = null;
    items.forEach(item=>{
      if(item.lec !== curLec){
        curLec = item.lec;
        html += `<div class="review-lec-h">Lecture ${item.lec}. ${escapeHtml(item.lecTitle)}</div>`;
      }
      html += renderReviewCard(item);
    });
  }
  document.getElementById("mainContent").innerHTML = html;
  // Wire
  document.querySelectorAll(".q-opt").forEach(o=>{ o.onclick = ()=>handleAnswerReview(o); });
  document.querySelectorAll(".q-flag").forEach(b=>{
    b.onclick = (e)=>{ e.stopPropagation(); toggleFlag(b.dataset.flag); renderReviewView(); renderSidebar(); };
  });
  document.querySelectorAll(".try-again-btn").forEach(b=>{
    b.onclick = ()=>{
      const k = b.dataset.retry;
      state.reviewRevealed.delete(k);
      delete state.answers[k];
      delete state.answers[k+"_pick"];
      persist();
      renderReviewView();
      renderHdrStats();
      renderSidebar();
    };
  });
}
function handleAnswerReview(optEl){
  if(optEl.classList.contains("locked")) return;
  const key = optEl.dataset.revKey;
  const pick = parseInt(optEl.dataset.pick);
  const correctIdx = parseInt(optEl.dataset.correct);
  const isCorrect = pick === correctIdx;
  state.answers[key] = isCorrect;
  state.answers[key+"_pick"] = pick;
  state.reviewRevealed.add(key);
  if(isCorrect){state.points++; state.streak++} else {state.streak=0}
  persist();
  checkAchievements();
  renderReviewView();
  renderRSidebar();
  renderHdrStats();
  renderSidebar();
}

  form.innerHTML = `
    <label>Stem</label><textarea data-f="stem">${escapeHtml(stem)}</textarea>
    <label>Option A</label><input data-f="o0" value="${escapeHtml(opts[0])}">
    <label>Option B</label><input data-f="o1" value="${escapeHtml(opts[1])}">

    <label>Option D</label><input data-f="o3" value="${escapeHtml(opts[3])}">
    <label>Correct (0-3, refers to source order shown above)</label><input data-f="ci" type="number" min="0" max="3" value="${correctIdx}">
    <label>Explanation</label><textarea data-f="exp">${escapeHtml(explanation)}</textarea>
    <label>Tag</label><select data-f="tag"><option value="basic"${tag==='basic'?' selected':''}>Foundational</option><option value="advanced"${tag==='advanced'?' selected':''}>Multi-step</option></select>

function deleteQuestion(key){
  if(!confirm("Delete this question? You can revert from the committed snapshot if needed.")) return;
  state.deleted[key] = true;
  persist();
  renderAll();
}
function revertQuestion(key){
  delete state.edits[key];
  delete state.shuffleCache[key];
  persist();
  renderAll();
}

// ============================================================
// COMMIT + DOWNLOAD
// ============================================================
function buildQuizArraySource(){
  // Serialize the live QUIZ array into JS source between QUIZ_START / QUIZ_END
  const live = getLiveQuiz();
  function esc(s){return JSON.stringify(s)}
  function serQ(q){
    const [stem,opts,ci,exp,tag,img] = q;
    let s = "  [" + esc(stem) + ", [" + opts.map(esc).join(", ") + "], " + ci + ", " + esc(exp) + ", " + esc(tag);
    if(img) s += ", " + esc(img);
    s += "]";
    return s;
  }
  let out = "const QUIZ = [\n";
  live.forEach(([lecNum,lecTitle,los],li)=>{
    out += "  [" + lecNum + ", " + esc(lecTitle) + ", [\n";
    los.forEach(([loNum,loText,qs],loi)=>{
      out += "    [" + loNum + ", " + esc(loText) + ", [";
      if(qs.length){
        out += "\n";
        qs.forEach((q,qi)=>{
          out += "    " + serQ(q) + (qi<qs.length-1?",":"") + "\n";
        });
        out += "    ]]";
      } else {
        out += "]]";
      }
      out += loi<los.length-1?",\n":"\n";
    });
    out += "  ]]";
    out += li<live.length-1?",\n":"\n";
  });
  out += "];";
  return out;
}
function commitChanges(){
  const src = buildQuizArraySource();
  localStorage.setItem(KEYS.committed, src);
  alert("Changes committed. They will be included in the next Download Changes export.");
}
function downloadChanges(){
  const committed = localStorage.getItem(KEYS.committed) || buildQuizArraySource();
  // Re-fetch this HTML file's text, replace QUIZ array, trigger download
  fetch(location.href).then(r=>r.text()).then(html=>{
    const newHtml = html.replace(
      /\/\/ QUIZ_START\r?\n[\s\S]*?\r?\n\/\/ QUIZ_END/,
      "// QUIZ_START\n" + committed + "\n// QUIZ_END"
    );
    const blob = new Blob([newHtml], {type:"text/html"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "OPP_III_Quiz.html";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    setTimeout(()=>{
      if(confirm("File downloaded. Clear local edits, additions, and the committed snapshot? (Choose OK if you've replaced the original file with the download.)")){
        localStorage.removeItem(KEYS.edits);
        localStorage.removeItem(KEYS.added);
        localStorage.removeItem(KEYS.deleted);
        localStorage.removeItem(KEYS.committed);
        state.edits = {}; state.added = {}; state.deleted = {};
        state.shuffleCache = {};
        renderAll();
      }
    }, 400);
  }).catch(e=>{
    alert("Couldn't fetch the page source. If you opened this from file://, the download may not work via fetch. Try serving over a local web server. Error: " + e.message);
  });
}

let FM = null;
function openFastMode(){
  document.getElementById("fastModeOverlay").classList.add("open");
  renderFastRules();
}
function closeFastMode(){
  document.getElementById("fastModeOverlay").classList.remove("open");
  if(FM && FM.timerInt){clearInterval(FM.timerInt); FM.timerInt = null}
  FM = null;
}
function renderFastRules(){
  const w = document.getElementById("fmWrap");
  w.innerHTML = `
    <div class="fm-header">
      <div class="fm-title">⚡ FAST MODE</div>
      <button class="fm-close" onclick="closeFastMode()">Close</button>
    </div>
    <div class="fm-rules">
      <h3 style="margin-bottom:8px">Rules</h3>
      <ul>
        <li>⏱️ <b>45 seconds</b> per question</li>
        <li>✅ <b>+1 point</b> per correct answer</li>
        <li>🔥 <b>+1 bonus</b> for every 5-question streak</li>
        <li>❤️ <b>3 lives</b> — lose one on wrong or timeout</li>
        <li>❤️ <b>+1 life</b> at every 25 correct</li>
        <li>🎲 Random questions from all lectures</li>
      </ul>
      <button class="fm-start-btn" onclick="startFastRound()">START</button>
    </div>`;
}
function startFastRound(){
  const all = getAllQuestionsFlat();
  if(all.length === 0){
    alert("No questions written yet — add some questions before launching Fast Mode!");
    return;
  }
  // Shuffle a random order
  const shuffled = all.slice().sort(()=>Math.random()-0.5);
  FM = {
    queue: shuffled,
    idx: 0,
    score: 0,
    streak: 0,
    lives: 3,
    answered: 0,
    correct: 0,
    missed: [],
    timeLeft: 45,
    timerInt: null
  };
  showFastQuestion();
}
function showFastQuestion(){
  if(!FM) return;
  if(FM.lives <= 0 || FM.idx >= FM.queue.length){
    showFastGameOver();
    return;
  }
  const item = FM.queue[FM.idx];
  const [stem,opts,correctIdx,explanation,tag] = item.q;
  const cleaned = stripParens(opts);
  const sh = getShuffledOpts("fm_"+item.key+"_"+FM.idx, cleaned, correctIdx);
  FM.currentSh = sh;
  FM.timeLeft = 45;
  const livesStr = "❤️".repeat(FM.lives) + "🖤".repeat(Math.max(0,3-FM.lives));
  const w = document.getElementById("fmWrap");
  w.innerHTML = `
    <div class="fm-header">
      <div class="fm-title">⚡ FAST MODE</div>
      <button class="fm-close" onclick="closeFastMode()">Close</button>
    </div>
    <div class="fm-hud">
      <span>Score: <b>${FM.score}</b></span>
      <span>Streak: <b>${FM.streak}</b></span>
      <span>${livesStr}</span>
      <span>Q ${FM.idx+1}</span>
    </div>
    <div class="fm-timer-bar"><div class="fm-timer-fill" id="fmTimer" style="width:100%"></div></div>
    <div class="fm-q-stem">${escapeHtml(stem)}</div>
    <div class="fm-q-opts" id="fmOpts">
      ${sh.opts.map((o,i)=>`<button class="fm-q-opt" data-pick="${i}">${"ABCD"[i]}. ${escapeHtml(o)}</button>`).join("")}
    </div>
    <div class="fm-explain" id="fmExplain">${escapeHtml(explanation)}</div>
  `;
  document.querySelectorAll(".fm-q-opt").forEach(b=>{
    b.onclick = ()=>handleFastAnswer(parseInt(b.dataset.pick), false);
  });
  if(FM.timerInt) clearInterval(FM.timerInt);
  FM.timerInt = setInterval(tickFastTimer, 250);
}
function tickFastTimer(){
  if(!FM) return;
  FM.timeLeft -= 0.25;
  const pct = Math.max(0, FM.timeLeft / 45 * 100);
  const fill = document.getElementById("fmTimer");
  if(fill){
    fill.style.width = pct + "%";
    if(FM.timeLeft < 10) fill.classList.add("urgent"); else fill.classList.remove("urgent");
  }
  if(FM.timeLeft <= 0){
    clearInterval(FM.timerInt);
    handleFastAnswer(-1, true);
  }
}
function handleFastAnswer(pick, timeout){
  if(!FM || !FM.currentSh) return;
  if(FM.timerInt){clearInterval(FM.timerInt); FM.timerInt=null}
  document.querySelectorAll(".fm-q-opt").forEach(b=>b.classList.add("locked"));
  const correct = FM.currentSh.correct;
  const isCorrect = pick === correct;
  FM.answered++;
  if(isCorrect){
    FM.correct++;
    FM.score++;
    FM.streak++;
    if(FM.streak > 0 && FM.streak % 5 === 0){
      FM.score++;
      showFastBurst("+1 BONUS!");
    }
    if(FM.correct > 0 && FM.correct % 25 === 0){
      FM.lives++;
      showFastBurst("❤️ EXTRA LIFE!");
    }
  } else {
    FM.streak = 0;
    FM.lives--;
    const item = FM.queue[FM.idx];
    FM.missed.push({item, userPick: pick, timedOut: timeout, shuffle: FM.currentSh});
  }
  // Highlight
  document.querySelectorAll(".fm-q-opt").forEach((b,i)=>{
    if(i === correct) b.classList.add("correct");
    else if(i === pick) b.classList.add("wrong");
  });
  document.getElementById("fmExplain").classList.add("shown");
  // Require an explicit click to advance (no auto-advance)
  const isLast = (FM.lives <= 0) || (FM.idx + 1 >= FM.queue.length);
  const btn = document.createElement("button");
  btn.className = "fm-next-btn";
  btn.id = "fmNextBtn";
  btn.textContent = isLast ? "See Results →" : "Next Question →";
  btn.onclick = ()=>{ FM.idx++; showFastQuestion(); };
  const opts = document.getElementById("fmOpts");
  opts.parentNode.insertBefore(btn, opts.nextSibling);
  btn.focus();
}
function showFastBurst(text){
  const w = document.getElementById("fmWrap");
  const b = document.createElement("div");
  b.className = "fm-burst";
  b.innerHTML = `<div class="fm-burst-content">${escapeHtml(text)}</div>`;
  w.appendChild(b);
  setTimeout(()=>b.remove(), 900);
}
function showFastGameOver(){
  const pct = FM.answered ? Math.round(100*FM.correct/FM.answered) : 0;
  if(FM.lives > 0 || FM.answered >= 10) state.achievements.fastSurvivor = true;
  persist();
  const w = document.getElementById("fmWrap");
  w.innerHTML = `
    <div class="fm-header">
      <div class="fm-title">⚡ FAST MODE</div>
      <button class="fm-close" onclick="closeFastMode()">Close</button>
    </div>
    <div class="fm-gameover">
      <h2>${FM.lives <= 0 ? "GAME OVER" : "ROUND COMPLETE"}</h2>
      <div class="fm-stats-grid">
        <div class="fm-stat-box"><div class="fm-stat-num">${FM.answered}</div><div class="fm-stat-label">Answered</div></div>
        <div class="fm-stat-box"><div class="fm-stat-num">${FM.correct}</div><div class="fm-stat-label">Correct</div></div>
        <div class="fm-stat-box"><div class="fm-stat-num">${pct}%</div><div class="fm-stat-label">Accuracy</div></div>
      </div>
      <div class="fm-go-btns">
        <button class="fm-go-play" onclick="startFastRound()">PLAY AGAIN</button>
        ${FM.missed.length ? `<button class="fm-go-review" onclick="showFastReviewMissed()">REVIEW MISSED (${FM.missed.length})</button>` : ""}
        <button class="fm-go-back" onclick="closeFastMode()">Back to Quiz</button>
      </div>
    </div>`;
  renderBadges();
}
function showFastReviewMissed(){
  const w = document.getElementById("fmWrap");
  let html = `
    <div class="fm-header">
      <div class="fm-title">⚡ MISSED QUESTIONS</div>
      <button class="fm-close" onclick="closeFastMode()">Close</button>
    </div>
    <div style="font-size:13px;color:#94a3b8;margin-bottom:14px">${FM.missed.length} question${FM.missed.length===1?"":"s"} missed this round</div>
  `;
  FM.missed.forEach((m,idx)=>{
    const [stem,opts,correctIdx,explanation] = m.item.q;
    const cleaned = stripParens(opts);
    const sh = m.shuffle;
    html += `<div class="fm-review-q">
      <div class="fm-review-meta">Q${idx+1} · Lecture ${m.item.lecNum}. ${escapeHtml(m.item.lecTitle)} · LO ${m.item.loNum}${m.timedOut?" · ⏰ TIMED OUT":""}</div>
      <div class="fm-review-stem">${escapeHtml(stem)}</div>
      ${sh.opts.map((o,i)=>{
        let cls = "fm-review-opt";
        if(i === sh.correct) cls += " correct";
        else if(i === m.userPick) cls += " userwrong";
        return `<div class="${cls}">${"ABCD"[i]}. ${escapeHtml(o)}</div>`;
      }).join("")}
      <div class="fm-review-explain">${escapeHtml(explanation)}</div>
    </div>`;
  });
  html += `<div class="fm-go-btns" style="margin-top:18px">
    <button class="fm-go-review" onclick="showFastGameOver()">BACK TO STATS</button>
    <button class="fm-go-back" onclick="closeFastMode()">Close Fast Mode</button>
  </div>`;
  w.innerHTML = html;
}
