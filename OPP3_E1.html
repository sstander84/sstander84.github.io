      ["Which patient is the BEST candidate for the supine thoracic lymphatic pump as part of acute illness management?", ["A previously healthy 30-year-old with mild influenza-like illness and clear chest exam", "A 75-year-old with bacterial pneumonia on day 3 of IV antibiotics and improving clinically", "A 50-year-old with active untreated tuberculosis", "A 45-year-old with acute pulmonary embolism on heparin drip"], 1, "Thoracic pump is most appropriate as an ADJUNCT for the pneumonia patient who is already on antibiotics and improving (the MOPSE trial supports thoracic pump in elderly pneumonia patients). Untreated TB and active PE on anticoagulation are contraindications. A healthy young patient with mild influenza may benefit but is less classically indicated than the supportive-care pneumonia case.", "advanced"],
      ["The Miller thoracic pump variant adds which element to the standard supine thoracic pump?", ["The operator releases compression quickly to create negative intrathoracic pressure", "The patient performs a continuous Valsalva throughout the technique", "The operator pumps the abdomen instead of the chest wall", "The patient is placed in Trendelenburg position throughout"], 0, "The Miller variant: patient holds breath at full inspiration, operator compresses the chest, then suddenly releases — the rebound inhalation creates an exaggerated negative intrathoracic pressure that augments lymphatic and venous return. Continuous Valsalva, abdominal pumping, and Trendelenburg describe other techniques or are non-standard.", "advanced"]
    ]],
    [5, "Indications, contraindications, and direct vs. indirect techniques", [
      ["A DIRECT osteopathic technique is defined as one that:", ["Moves the patient AWAY from the restrictive barrier into the position of ease", "Moves the patient INTO the restrictive barrier", "Uses no patient positioning", "Is always performed without operator contact"], 1, "DIRECT techniques engage and move INTO the restrictive barrier — examples include muscle energy, HVLA, articulatory, direct myofascial release. INDIRECT techniques move AWAY from the barrier into the position of ease (counterstrain, FPR, indirect MFR, BLT). All techniques involve operator contact and patient positioning.", "basic"],
      ["Counterstrain is classified as which type of technique?", ["Direct, requiring engagement of the restrictive barrier", "Indirect, using the position of ease and a 90-second hold", "High-velocity, low-amplitude thrust", "Active patient force against operator resistance"], 1, "Counterstrain is an INDIRECT technique — operator positions the patient in the position of maximal comfort over a tenderpoint, holds 90 sec, then slowly returns to neutral. HVLA is a direct thrust. Active patient force describes muscle energy.", "basic"],
      ["Which is an ABSOLUTE contraindication to HVLA at the target segment?", ["Mild paraspinal muscle tightness in a healthy adult", "Acute vertebral fracture or atlanto-axial instability", "Chronic postural muscle strain over time", "Stable mild osteoarthritis of the joint"], 1, "Acute vertebral fracture, dislocation, atlanto-axial instability (e.g., Down syndrome, rheumatoid arthritis with C1-C2 instability), bony metastasis, and severe osteoporosis at the segment are absolute contraindications to HVLA. Mild muscle tightness, postural strain, and stable osteoarthritis are not absolute contraindications.", "basic"],
      ["For a frail elderly patient with multiple comorbidities and a Type II cervical somatic dysfunction, the MOST appropriate first-line OMT approach is:", ["HVLA thrust at the dysfunctional segment", "Indirect techniques (counterstrain, FPR, BLT) and gentle soft tissue", "Aggressive long-lever articulatory thrusts", "No treatment at all due to frailty"], 1, "Frail elderly patients are best served by INDIRECT, gentle techniques (counterstrain, FPR, balanced ligamentous tension, gentle myofascial release, soft tissue) — these are well tolerated and effective without the fracture/dissection risks of HVLA. Aggressive thrusts are contraindicated. Doing nothing misses an opportunity to help.", "advanced"],
      ["Balanced ligamentous tension (BLT) is BEST classified as which type of technique?", ["Direct, requiring engagement of the restrictive barrier with a thrust", "Indirect, balancing tensions at the point of maximum ease, using breathing", "A high-velocity, low-amplitude thrust technique only", "Active, requiring patient muscular effort against operator resistance"], 1, "BLT (developed by William Sutherland and refined by Anne Wales) is INDIRECT — operator positions the joint where ligamentous tensions are balanced (the point of stillness), uses respiratory cooperation as the activating force, and waits for inherent correction. It is not direct, not HVLA, and not active muscle-energy.", "advanced"],
      ["A pregnant patient at 32 weeks gestation with persistent low back pain requests OMT. Which of the following is the BEST positioning approach?", ["Strict supine positioning throughout treatment to allow easy access", "Left lateral recumbent (or side-lying) positioning to avoid IVC compression by the gravid uterus", "Prone positioning with pillows under the abdomen for support", "No OMT should be performed in pregnancy"], 1, "Left lateral recumbent (or right side-lying) is preferred in late pregnancy to avoid IVC compression by the gravid uterus, which can cause hypotension and reduce uterine perfusion. Strict supine risks supine hypotension after ~20 weeks. Prone is uncomfortable. OMT is generally safe and helpful in pregnancy with positioning adjustments.", "advanced"],
      ["The ARTICULATORY (low-velocity, moderate-amplitude) technique is classified as:", ["A direct technique using passive joint movement through the restrictive barrier", "An indirect technique relying purely on respiratory cooperation", "A high-velocity, low-amplitude thrust requiring joint cavitation", "An active, patient-driven muscular effort technique"], 0, "Articulatory technique is a DIRECT, low-velocity, moderate-amplitude technique that takes the joint through and past the restrictive barrier with multiple springing repetitions — useful when HVLA is contraindicated or undesirable. It is not indirect, not HVLA, and not active muscle energy.", "advanced"],
      ["A 35-year-old woman with hypermobile Ehlers-Danlos syndrome presents with cervical pain. Which OMT modality requires the MOST caution?", ["Gentle suboccipital soft tissue release work", "HVLA cervical thrust, risking subluxation or vascular injury", "Counterstrain applied at the AC4 cervical tenderpoint", "Soft tissue paravertebral muscle kneading"], 1, "Hypermobility syndromes (EDS, Marfan, joint hypermobility spectrum) carry increased risk of subluxation and vascular injury with cervical HVLA — most experts avoid cervical thrust techniques in these patients in favor of indirect modalities. Suboccipital release, counterstrain, and soft tissue are usually well tolerated.", "advanced"],
      ["Which of the following is the MOST evidence-based ABSOLUTE contraindication to ANY OMT at the targeted region?", ["Mild osteoarthritis of the affected target joint", "Active bone metastasis or pathologic fracture at the site", "Chronic muscle tightness in an otherwise healthy adult", "An acute viral upper respiratory illness"], 1, "Active bone metastasis or pathologic fracture at the segment is an absolute contraindication to any OMT at that region — manipulation risks pathologic fracture, cord compression, and disastrous outcomes. The other options are not absolute contraindications and may actually benefit from OMT.", "advanced"],
      ["A patient on warfarin with an INR of 5.8 has thoracic somatic dysfunction. The MOST important consideration in selecting OMT is:", ["Proceed with HVLA without any modification at all", "Avoid HVLA and aggressive techniques; favor indirect modalities until INR is normal", "Schedule OMT only after vitamin K reversal of the warfarin", "OMT is absolutely contraindicated and the patient must be referred elsewhere"], 1, "Supratherapeutic INR significantly increases bleeding risk with HVLA and aggressive soft tissue (deep hematoma, spinal hematoma); indirect techniques are preferred until INR is corrected. Mandatory vitamin K reversal or universal contraindication overstate the limitation.", "advanced"],
      ["Cervical HVLA carries an increased risk of vertebral artery dissection. The HIGHEST-RISK preoperative maneuver involves:", ["Pure cervical flexion without any rotation", "Combined extension, rotation, and end-range traction", "Pure cervical sidebending without rotation", "Suboccipital release with the patient lying supine"], 1, "The combination of extension + rotation + sustained traction maximally stretches the vertebral artery as it courses through the C1-C2 transverse foramen and is associated with the highest dissection risk; sustained end-range provocative positioning before thrust is particularly concerning. Pure flexion or pure sidebending carries lower risk; suboccipital release is gentle and indirect.", "advanced"],
      ["The 5-point pre-HVLA screen for cervical thrust safety should include all EXCEPT:", ["Vertebrobasilar insufficiency screening (history of dizziness, drop attacks, dysarthria, diplopia)", "Assessment of cervical instability and ligamentous integrity", "Routine carotid Doppler ultrasound for every patient", "Patient history including connective tissue disorders, prior dissection, anticoagulation, recent trauma"], 2, "Routine carotid Doppler for every patient is NOT a standard pre-HVLA requirement. Standard screening includes vertebrobasilar symptoms (the 5 Ds: dizziness, drop attacks, dysarthria, diplopia, dysphagia), instability screen, history of connective tissue/coagulopathy/dissection, and informed consent. Imaging is reserved for clinical suspicion.", "advanced"],
      ["A patient with recent MI 2 weeks ago and active pericarditis presents with thoracic SD. The MOST appropriate OMT approach is:", ["Aggressive HVLA thrust to the affected segment to maximize relief", "Defer HVLA; use gentle indirect modalities and coordinate with cardiology", "OMT is entirely contraindicated here and should not be performed", "Vigorous rib raising to stimulate sympathetic outflow"], 1, "Recent MI and active pericarditis are relative contraindications to HVLA and aggressive techniques — defer such treatment, favor gentle indirect modalities (counterstrain, BLT), and coordinate with cardiology. Aggressive sympathetic stimulation (rib raising) could destabilize the patient. Universal OMT prohibition is overly restrictive.", "advanced"],
      ["A newborn with torticollis (cervical sidebending right with rotation left) is referred for OMT. The SAFEST and most appropriate technique selection is:", ["Cervical HVLA thrust applied at the OA joint", "Gentle indirect techniques with positional stretching education", "Cervical traction using weighted devices and pulleys", "Muscle energy with active patient resistance effort"], 1, "Infant torticollis is managed with gentle indirect techniques and parent-guided positional stretching — HVLA, traction devices, and muscle energy (which requires patient cooperation) are inappropriate in neonates. The cranial bones are also incompletely fused, making any force-based technique risky.", "advanced"]
    ]],
    [6, "Sacrum and pelvis biomechanics, diagnosis, and treatment", [
      ["The sacrum has three primary transverse motion axes named:", ["Superior respiratory, middle postural, and inferior innominate axes", "Sagittal, coronal, and transverse anatomic reference axes", "Anterior, middle, and posterior longitudinal sacral axes", "Type I, Type II, and Type III Fryette-style sacral axes"], 0, "Sacral motion occurs around three transverse axes: SUPERIOR transverse (respiratory, at S2 articulation with occiput-like motion during cranial respiration), MIDDLE transverse (postural sacral nodding, base anterior/posterior), INFERIOR transverse (innominate motion around — the innominates rotate around the inferior axis). Plus left and right oblique axes for torsional motion.", "basic"],
      ["A FORWARD sacral torsion (e.g., L on L) is classically characterized by:", ["Deep right sulcus, posterior left inferior lateral angle, and spring test negative", "Deep LEFT sulcus, posterior RIGHT ILA, spring test NEGATIVE (springs)", "Springs absent (spring test positive)", "Sacrum sidebent and rotated to the same side with positive spring test"], 1, "A LEFT-ON-LEFT FORWARD torsion (sacrum rotates LEFT on the LEFT oblique axis): deep LEFT sulcus, posterior RIGHT inferior lateral angle, NEGATIVE spring test (sacral base springs anteriorly). BACKWARD torsions (e.g., R on L) have a POSITIVE spring test. Naming and physical findings are essential for sacral diagnosis.", "basic"],
      ["Innominate dysfunctions include all of the following EXCEPT:", ["Anterior or posterior innominate rotation", "Inflare or outflare", "Superior or inferior shear (upslip/downslip)", "Sacral oblique torsion"], 3, "Innominate dysfunctions are anterior/posterior rotation, inflare/outflare (medial/lateral movement of the ASIS), and superior/inferior shear (upslip/downslip — vertical translation along the SI joint). Sacral torsion is a SACRAL dysfunction (sacrum rotating on an oblique axis), not an innominate dysfunction.", "basic"],
      ["When diagnosing sacral torsions, the L5 rule states that for FORWARD torsions, L5 rotates:", ["To the SAME side as the sacrum (sacrum rotates left on left → L5 rotates left)", "To the OPPOSITE side from the sacrum (sacrum rotates left → L5 rotates right)", "Always to the right regardless of sacrum", "Always to the left regardless of sacrum"], 1, "L5 rule for sacral torsions: L5 rotates OPPOSITE to the sacrum in forward torsions (L on L → L5 rotates right) and SAME as the sacrum in backward torsions. L5 also sidebends opposite to the rotation per typical lumbar Type II mechanics. Same-direction rotation, always-right, or always-left statements are incorrect.", "advanced"],
      ["The STANDING flexion test is positive on the side where:", ["The PSIS moves first or further during forward bending", "The ASIS moves first or further during forward bending", "Both PSIS move equally throughout the motion", "The sacrum drops bilaterally on flexion"], 0, "Standing flexion test: place thumbs under each PSIS and have patient forward bend; the side where the PSIS moves FIRST or FURTHER is positive — implicating SI joint restriction on that side (innominate moves with the sacrum). The ASIS approach is the seated flexion test (different interpretation). Equal bilateral motion is negative; bilateral sacral drop is normal.", "advanced"],
      ["The SEATED flexion test isolates SI joint motion from leg-driven motion because:", ["Sitting compresses the lumbar spine more, making testing more sensitive", "Sitting removes hamstring and leg influence, so a positive test points to the sacrum", "Sitting eliminates the lordosis and thereby improves diagnosis", "Sitting prevents Trendelenburg gait pattern artifacts"], 1, "Seated flexion test eliminates lower-extremity/hamstring effects on innominate motion, so a positive seated finding implicates the sacrum as the primary driver of the dysfunction; a positive standing test but negative seated test implicates the innominate. Lordosis and gait artifacts are not the rationale.", "advanced"],
      ["A patient with a RIGHT-on-LEFT (R on L) sacral BACKWARD torsion would have:", ["Deep right sacral sulcus, posterior left ILA, NEGATIVE spring test", "Deep left sacral sulcus, posterior right ILA, POSITIVE spring test (sacrum does not spring forward)", "Both sulci deep, both ILAs symmetric, negative spring test", "No reliable physical findings"], 1, "R-on-L backward torsion: sacrum rotates right on the left oblique axis (sidebent left, rotated right). Findings: deep LEFT sulcus, posterior RIGHT ILA (yes, this looks like a forward torsion's depths but the rotation direction is opposite), POSITIVE spring test (sacral base does NOT spring anteriorly in backward torsion), and L5 rotates SAME side as sacrum (right). Negative spring test = forward torsion. Both deep/symmetric or no findings would mean no dysfunction.", "advanced"],
      ["The MOST sensitive single physical finding for differentiating FORWARD vs BACKWARD sacral torsion is:", ["Spring test (positive = backward; negative/springs = forward)", "Sacral sulcus depth comparison", "ILA prominence", "L5 rotation direction"], 0, "The SPRING TEST is the most reliable single discriminator: in a FORWARD torsion the sacral base springs anteriorly (negative test); in a BACKWARD torsion the sacral base does NOT spring (positive test). Sulcus/ILA findings alone overlap between patterns. L5 rotation helps confirm the direction but is not the most sensitive single finding.", "advanced"],
      ["The treatment of choice for a left-on-left forward sacral torsion using muscle energy involves which patient position?", ["Supine with both knees flexed up to the chest", "Lateral recumbent, left side down, top leg off the table", "Prone with operator thenar over the sacral base", "Sims position with both of the legs flexed"], 1, "Forward torsion ME (L on L): patient in LATERAL recumbent on the AXIS SIDE (left side down for L on L), drop the top knee (right) off the table to engage the dysfunction, patient pushes the top leg upward (toward the ceiling) against operator resistance for 3-5 sec, relax, take up new barrier, repeat 3-5 times. Other positions describe other techniques or non-standard setups.", "advanced"],
      ["A patient with a superior shear (upslip) of the right innominate would have:", ["Right ASIS, PSIS, ischial tuberosity, and pubic ramus all displaced INFERIORLY relative to left", "Right ASIS, PSIS, ischial tuberosity, and pubic ramus all displaced SUPERIORLY relative to left", "Only the right ASIS displaced superiorly with PSIS unchanged", "Bilateral asymmetric findings without a consistent pattern"], 1, "An UPSLIP shifts the entire innominate SUPERIORLY — ASIS, PSIS, ischial tuberosity, and pubic ramus all higher on the affected side. Inferior displacement = downslip. Selective ASIS-only or inconsistent patterns describe rotational or other dysfunctions.", "advanced"],
      ["Treatment of an innominate upslip (superior shear) typically uses:", ["Long-axis traction on the affected side with rapid distraction", "A sustained 90-second hold of the position of ease", "Counterstrain performed with the patient sidelying", "Direct manual compression applied at the SI joint"], 0, "Upslip treatment classically uses LONG-AXIS TRACTION: patient supine, operator grasps ipsilateral ankle, internally rotates and slightly abducts, then applies a quick distraction thrust on exhalation to reduce the shear. Counterstrain, sustained hold, and direct SI compression are not the standard approach for upslip.", "advanced"],
      ["Posterior innominate rotation typically presents with which clinical findings on the affected side?", ["Long leg on the affected side, anterior ASIS prominence, posterior PSIS recess", "Short leg on the affected side, posterior PSIS prominence (more cephalad), anterior ASIS recess (more caudad)", "Symmetric leg length with no rotational evidence", "Bilateral posterior rotation with equal compensation"], 1, "Posterior innominate rotation: the innominate rotates posteriorly around the inferior transverse axis — PSIS rises (more cephalad/prominent), ASIS drops (more caudad/recessed), and the ipsilateral leg appears SHORTER. Anterior rotation produces the OPPOSITE findings with a longer leg. Symmetric or bilateral identical patterns are not posterior rotation.", "advanced"],
      ["A patient presents with an asymmetric pubic tubercle — left pubic tubercle is inferior to the right. This is consistent with:", ["A right superior pubic shear", "A left inferior pubic shear (or right superior pubic shear, depending on convention)", "Normal pubic symmetry", "A sacral base anterior bilateral"], 1, "Asymmetric pubic tubercles indicate a pubic shear: left LOW = left inferior pubic shear OR right superior pubic shear (named by the side of the displacement vector). Treatment uses ME with adductor or abductor contraction depending on the direction. Normal pubic is symmetric. Sacral base findings do not produce pubic tubercle asymmetry directly.", "advanced"],
      ["The sacroiliac joint is BEST classified anatomically as which type of joint?", ["A purely synovial joint throughout its entirety", "Part-synovial anteriorly and part-syndesmosis posteriorly", "A pure cartilaginous joint with no synovial component", "A fibrous joint similar to the cranial sutures"], 1, "The SI joint is COMPLEX: the anterior/inferior portion is a true synovial joint with articular cartilage, while the posterior/superior portion is a syndesmosis (fibrous interosseous ligaments). This explains its limited but multi-axial motion and its tendency to develop both inflammatory (sacroiliitis) and degenerative changes. Pure synovial, cartilaginous, or fibrous classifications oversimplify.", "advanced"]
    ]],
    [7, "Psoas and piriformis syndromes", [
      ["Psoas syndrome classically produces which postural pattern?", ["Hyperextended lumbar spine with an anterior pelvic tilt", "Flexed lumbar spine, trunk shifted forward, positive Thomas test", "Marked lumbar scoliosis without associated pain", "No postural change but a severe radiculopathy"], 1, "Psoas syndrome (often from chronic psoas spasm) presents with a flexed lumbar spine, forward trunk shift, ipsilateral pelvic findings, and a POSITIVE Thomas test (inability to fully extend the hip while opposite hip is flexed indicates psoas tightness). Hyperextension would suggest other patterns. Painless scoliosis or pure radiculopathy do not define psoas syndrome.", "basic"],
      ["Piriformis syndrome is characterized by:", ["Anterior thigh sensory loss with quadriceps weakness", "Buttock pain worse with sitting, with a positive FAIR test", "Bilateral foot drop with weakness", "Pure lateral leg numbness in the L5 dermatome"], 1, "Piriformis syndrome compresses the sciatic nerve as it passes the piriformis, producing buttock pain worsened by sitting, radiation down the posterior thigh, and a positive FAIR test (Flexion, Adduction, Internal Rotation). Anterior thigh findings suggest femoral neuropathy. Bilateral foot drop is severe and atypical. L5 dermatome distribution alone fits radiculopathy, not piriformis.", "basic"],
      ["The psoas muscle originates from and inserts where?", ["Origin: the iliac fossa; Insertion: the ischial tuberosity", "Origin: T12-L5 vertebral bodies; Insertion: lesser trochanter", "Origin: the sacrum; Insertion: the greater trochanter", "Origin: anterior sacrum; Insertion: lateral femoral condyle"], 0, "The psoas major originates from T12 through L5 vertebral bodies and transverse processes, joins iliacus, and inserts on the LESSER TROCHANTER of the femur as the iliopsoas — it is the most powerful hip flexor. The other options describe other muscles.", "basic"],
      ["In approximately 15-20% of people, the sciatic nerve runs THROUGH the piriformis muscle rather than below it. This anatomic variant:", ["Has essentially no clinical relevance at all", "Predisposes to piriformis syndrome via direct nerve compression", "Causes congenital foot drop in all affected individuals", "Requires prophylactic surgery during childhood"], 1, "When the sciatic nerve pierces the piriformis (Beaton variant types B-D), muscle hypertrophy or spasm directly compresses the nerve — a recognized predisposition to piriformis syndrome. The variant is usually asymptomatic but increases risk. It does not cause universal foot drop or require prophylactic surgery.", "advanced"],
      ["The psoas major receives its motor innervation from which nerve roots?", ["The femoral nerve, roots L2-L4", "The direct ventral rami of L1-L3", "The obturator nerve, roots L2-L4", "The genitofemoral nerve, L1-L2"], 1, "The psoas major is innervated by direct branches from the ventral rami of L1-L3 (sometimes L4) — NOT by the femoral nerve (which innervates iliacus). Obturator innervates hip adductors. Genitofemoral arises from psoas but does not motor-innervate it.", "advanced"],
      ["The Thomas test for psoas tightness is performed with the patient supine. A POSITIVE test is identified when:", ["The patient cannot fully flex the contralateral hip to the chest", "With the contralateral hip flexed, the tested thigh fails to extend to the table", "Pain occurs on internal rotation of the affected hip", "The patient reports bilateral knee joint pain"], 1, "Thomas test: patient supine, hold contralateral knee to chest to flatten lumbar lordosis; the tested-side leg should rest fully extended on the table. Failure to extend (knee/thigh elevated) = positive test = tight ipsilateral psoas/iliopsoas. The other options describe other tests or non-specific findings.", "advanced"],
      ["A patient with chronic right-sided psoas syndrome typically has WHICH innominate finding on the right?", ["Right posterior innominate rotation", "Right anterior innominate rotation (psoas pulls the lesser trochanter superiorly and anteriorly)", "Right innominate upslip", "Right innominate outflare"], 1, "Chronic psoas spasm pulls the femur (lesser trochanter) into flexion and produces ipsilateral ANTERIOR innominate rotation as a secondary postural adaptation. Posterior rotation, upslip, and outflare are not the classic compensation for psoas hypertonicity.", "advanced"],
      ["The classic counterstrain tenderpoint for psoas dysfunction is located:", ["Posteriorly between the L4 and L5 spinous processes here", "About two-thirds from the ASIS to the umbilicus, over the psoas belly", "Laterally over the greater trochanter of the femur", "Superiorly at the bony iliac crest"], 1, "The anterior counterstrain tenderpoint for psoas (sometimes called AT12 or simply the iliacus/psoas point) sits approximately 2/3 the distance from the ASIS toward the umbilicus, deep in the abdomen — treated with hip flexion, abduction, and external rotation of the ipsilateral leg. Posterior interspinous, trochanteric, and iliac crest points are not the standard psoas tenderpoint.", "advanced"],
      ["The treatment position for the psoas anterior counterstrain tenderpoint is:", ["Supine, hip extended and adducted with internal rotation", "Supine, hip and knee flexed 90/90 with slight external rotation", "Prone with the hip held in full extension", "Sidelying with both of the legs straight"], 1, "Psoas tenderpoint treatment: patient supine with both hips and knees flexed to approximately 90/90, ipsilateral hip slightly externally rotated and adducted (often described as ankles crossed with affected ankle on top), titrate position to 70%+ tenderness reduction, hold 90 sec, slow return. The other positions are not the classic setup.", "advanced"],
      ["The piriformis muscle originates from the:", ["Posterior aspect of the sacrum (anterior surface of S2-S4)", "Greater trochanter of the femur", "Ischial tuberosity bilaterally", "Posterior superior iliac spine"], 0, "The piriformis originates from the ANTERIOR surface of the sacrum (S2-S4) and inserts on the greater trochanter of the femur. Its primary action is external rotation of the extended hip, and abduction of the flexed hip. Greater trochanter is the insertion. Ischial tuberosity and PSIS are unrelated.", "advanced"],
      ["The PACE sign for piriformis syndrome is positive when:", ["Pain is reproduced by resisted abduction and external rotation of the hip", "Pain is reproduced by passive internal rotation of the extended hip", "Numbness occurs only with prolonged periods of sitting", "There is asymmetric leg length on exam"], 0, "PACE SIGN: with patient seated, resisted hip abduction and external rotation reproduces buttock pain — indicates piriformis involvement. FREIBERG: passive internal rotation of the extended hip. FAIR: combined flexion-adduction-internal rotation. Numbness with sitting and leg length asymmetry are non-specific.", "advanced"],
      ["The piriformis classically rotates the hip EXTERNALLY when the hip is in neutral extension, but with the hip in 90 degrees of flexion, the piriformis paradoxically:", ["Continues to externally rotate the hip with even greater force", "Functions as a hip internal rotator and abductor at this angle", "Becomes a pure hip adductor rather than a rotator", "Becomes mechanically inactive with no real effect"], 2, "With the hip flexed to 90 degrees, the piriformis line of pull changes and it functions as an INTERNAL rotator and abductor — basis for the FAIR test (flexed hip, adducted and internally rotated stretches the piriformis maximally and reproduces symptoms). It does not continue to externally rotate, adduct, or become inactive.", "advanced"],
      ["A patient is suspected to have piriformis syndrome but failed conservative therapy. EMG shows normal results. The MOST appropriate next step is:", ["Immediate piriformis release surgery", "MRI of the lumbar spine and pelvis to rule out alternative causes (disc herniation, mass, hamstring tear, ischial bursitis)", "Repeat the same conservative therapy for another 6 months without imaging", "Cervical spine MRI to evaluate for myelopathy"], 1, "Persistent symptoms despite conservative therapy with normal EMG warrant imaging to exclude alternative pathology (disc herniation, intrapelvic mass, hamstring origin tear, ischial bursitis, deep gluteal syndrome). Immediate surgery is premature. Repeating failed therapy without further workup is poor practice. Cervical MRI is not relevant.", "advanced"],
      ["The IOPSAS is anatomically distinct from the psoas major because it:", ["Has a completely different innervation, the sciatic nerve", "Is the combined psoas major and iliacus tendon at the lesser trochanter", "Originates from the femur and inserts on the lumbar spine", "Is the same single muscle with two different names"], 1, "Iliacus (iliac fossa, femoral nerve L2-L4) and psoas major (T12-L5 vertebrae, ventral rami L1-L3) merge their tendons at the lesser trochanter as the iliopsoas — same insertion, distinct origins and innervations. This is why iliopsoas treatment is best approached via BOTH muscles. Same muscle, sciatic innervation, and reverse anatomy are incorrect.", "advanced"]
    ]],
    [8, "Posture, scoliosis, and short leg syndrome", [
      ["A short leg on one side most commonly produces which compensatory pattern at the sacral base?", ["Sacral base unleveling with the LOW side toward the short leg", "Sacral base unleveling with the HIGH side toward the short leg", "No sacral base change", "Pure axial rotation of the sacrum without unleveling"], 0, "A short leg drops the iliac crest and sacral base on that side — the sacral base is LOW on the side of the short leg, producing a compensatory lumbar convexity TOWARD the short side (Type I sidebending opposite, rotation opposite — group curve). The other options misstate the compensation.", "basic"],
      ["A Cobb angle is used to quantify scoliosis. A spinal curve is classified as scoliosis when the Cobb angle exceeds:", ["5 degrees", "10 degrees", "30 degrees", "50 degrees"], 1, "Scoliosis is defined as a lateral curvature with a Cobb angle of 10 degrees or more (with vertebral rotation). 5 degrees is within normal asymmetry. 30 degrees is typically the threshold for bracing in skeletally immature patients. 50 degrees often triggers consideration of surgical evaluation.", "basic"],
      ["The Adams forward bend test is used to screen for:", ["Cauda equina compression syndrome here", "Scoliosis, shown by a rib hump or asymmetry", "A lumbar spinal disc herniation injury", "Narrowing lumbar spinal canal stenosis"], 1, "The Adams forward bend test asks the patient to bend forward; the examiner looks for thoracic rib hump or lumbar paraspinal asymmetry — sensitive for scoliosis screening, especially adolescent idiopathic scoliosis. SLR tests for disc/radiculopathy. Cauda equina is identified by neurologic exam plus history. Stenosis is suggested by neurogenic claudication symptoms.", "basic"],
      ["For chronic anatomic short leg of 1 cm in an adult, the typical heel lift recommendation is:", ["Lift the full 1 cm difference all at once immediately", "Lift one-third to one-half initially, advancing every 2 weeks", "Avoid any heel lift and treat with OMT alone", "Use bilateral 5 cm heel lifts for symmetry"], 1, "Heel lift for chronic short leg is introduced GRADUALLY (one-third to one-half initially, advancing 1/8 inch every 2 weeks) to allow the spine and pelvis to adapt without precipitating new dysfunction. Lifting the full amount at once risks worsening symptoms. OMT alone often is insufficient. Bilateral large lifts are not the approach.", "advanced"],
      ["The Risser sign on plain radiographs is used to assess:", ["Cervical spine instability and motion", "Skeletal maturity by iliac apophysis ossification", "The grade of lumbar disc degeneration here", "The severity of a spondylolisthesis slip"], 1, "The Risser sign grades skeletal maturity (and remaining growth potential) by tracking iliac crest apophyseal ossification from grade 0 (no ossification) to grade 5 (complete fusion to ilium). It is critical for scoliosis bracing decisions in adolescents. The other options describe unrelated assessments.", "advanced"],
      ["The threshold Cobb angle that typically prompts bracing in an adolescent with idiopathic scoliosis and significant remaining growth (Risser 0-2) is:", ["Cobb angle 5-9 degrees", "Cobb angle 25-40 degrees", "Cobb angle 50-70 degrees", "Cobb angle greater than 80 degrees only"], 1, "Bracing is typically indicated for adolescent idiopathic scoliosis at Cobb angles of approximately 25-40 degrees in skeletally immature patients (Risser 0-2) — the BrAIST trial showed bracing reduces progression to surgery. 5-9 degrees is below the scoliosis threshold. 50-70 degrees is usually surgical territory. >80 degrees is severe surgical disease.", "advanced"],
      ["A 15-year-old girl is diagnosed with right thoracic scoliosis (apex T8) with a Cobb angle of 32 degrees. The MOST important next step for her management is:", ["Immediate operative spinal fusion surgery", "Refer for orthotic bracing with serial radiographs", "Reassurance with no further follow-up needed", "A heel lift trial alone with no bracing"], 1, "Skeletally immature adolescent (likely Risser 0-3 at age 15) with moderate scoliosis (32 degrees) is the classic indication for bracing — Boston brace or similar TLSO — to halt progression. Surgery is for severe (>45-50 deg) curves or progression despite bracing. Reassurance alone risks rapid progression. Heel lift addresses pelvic obliquity-driven scoliosis but is not first-line for idiopathic adolescent scoliosis.", "advanced"],
      ["UPPER CROSS SYNDROME describes the pattern of:", ["Weak hip flexor muscles and tight gluteals", "Tight upper trapezius and pecs, weak deep cervical flexors", "Tight psoas muscle with weak quadriceps", "Tight calf muscles and a weak tibialis anterior"], 1, "Upper cross syndrome (Janda): TIGHT upper trapezius, levator scapulae, and pectorals; WEAK deep cervical flexors and lower scapular stabilizers (lower trap, rhomboids) — produces forward head and rounded shoulders. Lower cross involves hip flexors/erector spinae vs gluteals/abdominals. The other options describe other patterns.", "advanced"],
      ["LOWER CROSS SYNDROME involves:", ["Tight upper trap and pectorals with weak deep cervical flexors", "Tight hip flexors and lumbar erectors with weak glutes and abdominals", "Bilateral foot drop with weakness present", "Tight ankle plantarflexor muscles only here"], 1, "Lower cross syndrome (Janda): TIGHT iliopsoas, rectus femoris, and lumbar erectors; WEAK gluteals and deep abdominals — producing anterior pelvic tilt, increased lumbar lordosis, and protruding abdomen. Upper cross is the cervico-thoracic pattern. Foot drop and isolated calf tightness are different problems.", "advanced"],
      ["A patient with a 1.5 cm true anatomic LEFT short leg most commonly shows which spinal curve pattern?", ["Right thoracic curve, left lumbar group curve, sacral base low on left", "Left thoracic curve, right lumbar group curve, sacral base low on right", "Straight thoracic spine with isolated cervical curve", "Bilateral symmetric thoracolumbar lordosis"], 0, "Left short leg → sacral base LOW on the left → compensatory lumbar group curve convex LEFT (Type I: SB right, rotated left across the lumbars) → compensatory thoracic curve convex RIGHT to maintain head position over pelvis. The opposite patterns or straight/symmetric spines do not describe this compensation.", "advanced"],
      ["The Adams forward bend test reveals a thoracic rib hump on the RIGHT in a 13-year-old girl. The most likely scoliosis pattern is:", ["A left thoracic curve with a right rib hump", "Right thoracic curve, convex right, from vertebral rotation", "A pure left lumbar curve with no thoracic involvement", "No scoliosis, since a rib hump alone is non-diagnostic"], 1, "Rib hump corresponds to the SIDE of vertebral rotation — in a right thoracic curve, vertebrae rotate toward the convexity (right), pushing the ribs posteriorly on the right. Right thoracic scoliosis with right rib hump is the classic adolescent idiopathic pattern. Left thoracic curves are more concerning for atypical etiology (consider MRI).", "advanced"],
      ["A 13-year-old presents with LEFT thoracic scoliosis. This finding is more concerning than right thoracic scoliosis because:", ["Left thoracic curves cannot be braced effectively", "Left curves are atypical and suggest an underlying cause; consider MRI", "Left thoracic curves always progress to severe deformity", "Left thoracic curves require immediate surgery"], 1, "ATYPICAL curve patterns (left thoracic, early juvenile onset, rapid progression, painful) should prompt evaluation for underlying pathology — Chiari malformation, syringomyelia, tumor, neuromuscular disease — with MRI. Right thoracic is the typical idiopathic pattern. Left curves CAN be braced and do not always progress severely or require immediate surgery.", "advanced"],
      ["A 50-year-old presents with new-onset scoliosis and back pain. The MOST appropriate workup includes:", ["Watchful waiting only, since scoliosis at this age is benign", "Full spine radiographs, and possibly MRI, to evaluate for degeneration", "A heel lift trial only without any imaging done", "A standard pediatric scoliosis screening protocol"], 1, "ADULT-ONSET scoliosis is NOT idiopathic — it may reflect degenerative spondylosis, vertebral compression fracture (osteoporosis, malignancy), spondylolisthesis, or other pathology. Imaging is warranted. Watchful waiting alone, heel lift without diagnosis, or pediatric protocols are inappropriate.", "advanced"],
      ["The scoliometer reading at the apex of a thoracic scoliosis curve correlates with vertebral rotation. A scoliometer reading of 7 degrees or greater typically warrants:", ["Reassurance offered with no further follow-up at all", "Referral for an upright PA radiograph to measure Cobb angle", "An immediate surgical referral for fusion", "Initiating bracing without any imaging first"], 1, "Scoliometer reading of 7 degrees or more at the apex of a Adams-positive forward bend correlates with ~20 degrees Cobb angle and is the standard threshold to obtain confirmatory upright PA spine radiograph. Bracing decisions require Cobb measurement on imaging. Reassurance, immediate surgery, or unilateral bracing without imaging are inappropriate.", "advanced"]
    ]],
    [9, "Thoracic and lumbar spine biomechanics and diagnosis", [
      ["Fryette's first principle applies to the thoracic and lumbar spine and states that in NEUTRAL spine:", ["Sidebending and rotation occur to the SAME side", "Sidebending and rotation occur to OPPOSITE sides", "Only flexion is possible without sidebending", "No coupled motion occurs between adjacent vertebrae"], 1, "Fryette's First Principle (Type I — NEUTRAL): in a neutral spine, sidebending and rotation are coupled to OPPOSITE sides across a group of vertebrae. Fryette's Second Principle (Type II — non-neutral, flexed or extended): SB and rotation same side at a single segment. The other choices misstate the principles.", "basic"],
      ["Normal lumbar spine alignment in the sagittal plane is:", ["Kyphosis", "Lordosis", "Straight (no curve)", "Scoliosis"], 1, "Lumbar spine has a LORDOSIS (anterior convexity); thoracic spine has a kyphosis (posterior convexity); cervical spine has a lordosis. Straight or scoliotic alignment is abnormal. The S-shaped curves balance the head over the pelvis.", "basic"],
      ["The 'rule of threes' for thoracic spinous processes states that for T4 through T6 (mid thoracic), the spinous process is at the level of the:", ["Transverse process of the SAME vertebra", "Transverse process ONE level below", "Transverse process TWO levels below", "Vertebral body two levels above"], 2, "Rule of threes: T1-T3 spinous processes are level with their OWN transverse processes; T4-T6 are HALFWAY between their own and one below (i.e., approximately one level below — often taught as ~1 to 2 levels); T7-T9 are at the level of the TP ONE TO TWO LEVELS BELOW. The traditional teaching for T4-T6 is the spinous process sits at the level of the TP about half to one level below.", "basic"],
      ["A patient with a thoracic dysfunction at T5 has a posterior transverse process on the LEFT in BOTH flexion and extension that does not change. The proper Fryette naming is:", ["T5 NSRRL (neutral, sidebent right, rotated left)", "T5 ERSL (extended, rotated left, sidebent left) — a Type II dysfunction", "T5 FSRL (flexed, sidebent right, rotated left)", "Cannot be named without additional information"], 1, "If the transverse process is posterior on the LEFT in BOTH flexion and extension (does NOT improve in either), this is a Type II SD (non-neutral, position does not change with flex/ext). Rotation is toward the posterior TP (LEFT), so SB is also LEFT (Fryette II — same side). Naming: T5 (E or F)RLSL depending on which position is more comfortable; commonly given as ERSL if extension is the position of ease. Type I (NSRRL) dysfunctions show position change between flex/ext.", "advanced"],
      ["Fryette's THIRD principle (added later) states that:", ["Lumbar spinal facets are oriented in the coronal plane", "Motion in one plane modifies motion in the other two planes", "All cervical spine motion is fully coupled and predictable", "Sacral motion is entirely independent of lumbar spine motion"], 1, "Fryette III: motion introduced in one plane reduces available motion in the other two planes — clinically relevant for diagnosis and treatment setup. Lumbar facets are sagittally oriented (not coronal). All cervical motion is not 'coupled' as a principle; sacrolumbar mechanics are intimately related, not independent.", "advanced"],
      ["The thoracic facet joints are oriented in approximately which plane, and this orientation primarily allows:", ["Sagittal plane, allowing pure flexion/extension only", "Coronal plane, allowing primarily rotation and sidebending", "Transverse plane, allowing essentially no segmental motion", "Variable, randomly distributed facet orientation throughout"], 1, "Thoracic facets are oriented in the CORONAL (frontal) plane, allowing primarily rotation and sidebending — relatively restricted flexion/extension compared to cervical or lumbar. Cervical facets are oblique (~45 degrees); lumbar facets are sagittal (limiting rotation, favoring flexion/extension).", "advanced"],
      ["Lumbar facet joint orientation is primarily:", ["Coronal — favoring rotation", "Sagittal — favoring flexion/extension and limiting rotation", "Oblique 45 degrees — favoring all motions equally", "Transverse — preventing all motion"], 1, "Lumbar facets are primarily SAGITTALLY oriented, allowing significant flexion-extension and sidebending but RESTRICTING rotation (typically <5 degrees of rotation per segment). This is clinically relevant because excessive rotational force at the lumbar segment can fracture the pars interarticularis.", "advanced"],
      ["The pars interarticularis is the portion of the vertebra connecting:", ["The vertebral body directly to its supporting pedicle", "The superior and inferior articular processes of a vertebra", "Two adjacent vertebrae across the intervertebral disc", "The spinous process directly to the transverse process"], 1, "The pars interarticularis is the bone between the superior and inferior articular processes of the same vertebra — a fracture here is called spondylolysis (commonly L5), and bilateral pars fractures with vertebral slippage = spondylolisthesis. The other anatomic descriptions are incorrect.", "advanced"],
      ["A 16-year-old gymnast presents with insidious lumbar pain that worsens with hyperextension. The MOST appropriate first imaging study is:", ["Immediate MRI of the entire spine as the initial imaging study", "Plain AP, lateral, and oblique lumbar X-rays of the pars interarticularis", "Whole-body nuclear bone scan to localize the lesion", "Plain cervical spine X-rays in multiple views"], 1, "Adolescent athlete with extension-pain LBP raises strong suspicion for SPONDYLOLYSIS — best initial imaging is plain X-rays with OBLIQUE views to visualize the pars; the 'Scotty dog' has a collar (fracture line) when spondylolysis is present. MRI/bone scan add information if X-rays are negative but symptoms persist; cervical imaging is not relevant.", "advanced"],
      ["A patient diagnosed with grade II isthmic spondylolisthesis at L5-S1 is at risk for which complication if the slippage progresses?", ["Cervical radiculopathy with upper extremity weakness and numbness", "L5 radiculopathy or cauda equina from foraminal or central canal stenosis", "Complete sciatic nerve transection occurring at the pelvic outlet", "Isolated lumbar disc herniation without any nerve involvement"], 1, "Progressive spondylolisthesis narrows the L5 neural foramen (L5 nerve root compression) and may cause central stenosis (cauda equina). Cervical pathology is not caused by lumbar slippage. Sciatic transection is not a complication. Disc herniation is not the primary risk.", "advanced"],
      ["A patient with bilateral lower extremity pain that is RELIEVED by spinal flexion (e.g., leaning forward on a shopping cart) and WORSENED by walking downhill or extension most likely has:", ["Peripheral vascular claudication from arterial insufficiency", "Lumbar spinal stenosis with neurogenic claudication worsened by extension", "Acute lumbar disc herniation with nerve root compression", "Cervical myelopathy from spinal cord compression above"], 1, "Neurogenic claudication from lumbar stenosis: worse with extension (further narrows canal) and walking downhill, BETTER with flexion (e.g., shopping cart sign, sitting). Vascular claudication is relieved by REST regardless of position. Acute disc herniation is usually positional but more constant. Cervical myelopathy is an upper-body process.", "advanced"],
      ["The 'rule of threes' for thoracic spinous process to transverse process relationships states that T7 through T9 spinous processes lie at the level of the transverse processes of:", ["The same vertebra (T7 SP = T7 TP)", "One level below (T7 SP = T8 TP)", "TWO levels below (T7 SP = T9 TP)", "One level above (T7 SP = T6 TP)"], 2, "Rule of threes: T1-T3 spinous processes at same level as own TPs; T4-T6 half level below; T7-T9 TWO LEVELS below (the spinous process projects far inferiorly). T10 acts like T9, T11 like T2, T12 like T1.", "advanced"],
      ["A patient with chronic Type I (neutral group) thoracic dysfunction at T5-T8 with sidebending right and rotation left should be treated FIRST by addressing:", ["The most prominent posterior transverse process at the apex of the group", "Any Type II dysfunctions above or below the group, since they perpetuate the group", "The contralateral sacral dysfunction before anything else", "The upper cervical spine before any thoracic treatment"], 1, "Clinical pearl: Type II (single-segment, non-neutral) dysfunctions OFTEN drive secondary Type I group curves; treating the Type II first commonly resolves the Type I. Apex treatment of the group alone or remote regions first is less efficient. Look above, below, and within the group for the driving Type II.", "advanced"],
      ["A patient has L4 ERSright (extended, rotated right, sidebent right) on examination. The muscle energy treatment set-up positions the segment at the barriers in all three planes, which would be:", ["Extension, rotation right, sidebending right", "Flexion, rotation left, sidebending left", "Neutral, sidebending right, rotation left", "Pure flexion only without any rotation or sidebending"], 1, "ME requires positioning at the BARRIERS (opposite of the ease). L4 ERSright lives in extension, rotation right, sidebending right — so the barriers are FLEXION, rotation LEFT, sidebending LEFT. Patient pushes gently into the ease (extension/right/right) against operator resistance, relax, take up new barrier, repeat 3-5x. The other options either describe the ease or do not engage all three barriers.", "advanced"]
    ]],
    [10, "Lumbar radiculopathy and low back pain", [
      ["L5 radiculopathy from L4-L5 disc herniation classically presents with:", ["Weakness of knee extension and decreased patellar reflex on exam", "Weakness of great toe extension and ankle dorsiflexion, dorsal foot sensory loss", "Weakness of plantarflexion and decreased Achilles reflex on the affected side", "Hip flexion weakness with anterior thigh numbness and quadriceps deficit"], 1, "L5 radiculopathy: weakness of great toe extension (EHL) and ankle dorsiflexion, sensory changes over the dorsum of the foot and great toe; reflexes typically unchanged (L5 has no reliable reflex). Knee extension + patellar reflex = L4. Plantarflexion + Achilles = S1. Hip flexion + anterior thigh = L2-L3.", "basic"],
      ["The straight leg raise test is most specific for:", ["S1 radiculopathy arising from an L5-S1 disc herniation", "L5 or S1 nerve root irritation from disc herniation", "Pure muscular low back pain without radiation", "Degenerative arthritis of the hip joint"], 1, "Straight leg raise reproduces radicular pain at 30-70 degrees of hip flexion by stretching the L5/S1 nerve roots — most specific for radiculopathy from disc herniation, especially L4-L5 and L5-S1. Pure muscular LBP and hip arthritis do not produce a true positive SLR.", "basic"],
      ["The most common cause of acute low back pain in adults is:", ["Cauda equina syndrome", "Mechanical/muscular strain or sprain (non-specific musculoskeletal LBP)", "Vertebral fracture", "Spinal infection or malignancy"], 1, "About 80-90% of acute LBP is mechanical, non-specific musculoskeletal pain — typically self-limited. Cauda equina, vertebral fracture, infection, and malignancy are rare RED FLAG causes that must be excluded by history (saddle anesthesia, bowel/bladder, trauma, IVDU, weight loss, fever) but are not the most common.", "basic"],
      ["Which is a RED FLAG for cauda equina syndrome requiring emergent MRI and surgical consultation?", ["Mild bilateral leg fatigue only after prolonged walking distances", "Bilateral leg weakness with urinary retention or saddle anesthesia", "Localized paraspinal tenderness without any radiating pain", "Worsening axial pain that occurs only with prolonged sitting"], 1, "Cauda equina red flags: bilateral leg weakness, urinary retention or incontinence, fecal incontinence, saddle (perineal) anesthesia, recent severe trauma. This is a SURGICAL EMERGENCY requiring immediate MRI and consultation. The other options describe common, non-emergent LBP presentations.", "advanced"],
      ["A patient with L4 radiculopathy classically demonstrates:", ["Quadriceps weakness, decreased patellar reflex, medial leg sensory loss", "EHL weakness with sensory loss over the dorsal foot and great toe", "Plantarflexion weakness with a decreased Achilles tendon reflex", "Hip flexion weakness with sensory loss over the anterior thigh"], 0, "L4 radiculopathy: quadriceps weakness, decreased PATELLAR reflex, sensory loss along medial leg/foot. EHL/dorsal foot = L5; plantarflexion/Achilles = S1; hip flexion = L2-L3.", "advanced"],
      ["The CROSSED straight leg raise test is positive when:", ["Raising the opposite asymptomatic leg reproduces pain in the affected leg", "Both legs are raised simultaneously off the table together", "The patient is completely unable to raise the affected leg", "Raising the affected leg actually reduces the patient's pain"], 0, "Crossed SLR (Fajersztajn sign): raising the ASYMPTOMATIC leg reproduces pain in the AFFECTED leg — highly SPECIFIC (but less sensitive) for large central disc herniation compressing the contralateral nerve root. Bilateral raise, inability to raise, or pain reduction with raise do not define crossed SLR.", "advanced"],
      ["The REVERSE straight leg raise (femoral nerve stretch or prone knee bend) is used to evaluate which nerve roots?", ["The L5 and S1 lower lumbar nerve roots", "L2, L3, and L4 upper lumbar nerve roots", "The C6 and C7 mid cervical nerve roots", "The S2 and S3 sacral plexus nerve roots"], 1, "Reverse SLR / femoral nerve stretch: patient prone, hip extended, knee flexed — stretches L2-L4 roots and reproduces pain in upper lumbar radiculopathies (which are otherwise underdetected by standard SLR). Standard SLR evaluates L5/S1. Cervical and lower sacral roots have different testing maneuvers.", "advanced"],
      ["Modic Type I MRI changes in vertebral endplates indicate:", ["Fatty replacement of marrow (chronic)", "Edema and inflammation (acute, often painful)", "Bone sclerosis (long-standing)", "Normal endplate appearance"], 1, "Modic Type I: hypointense on T1, HYPERintense on T2 — edema/inflammation, often correlates with active discogenic pain. Type II: hyperintense on both T1 and T2 (fatty replacement, more stable). Type III: hypointense on both (sclerosis, chronic). Type I → Type II → Type III progression often occurs over time.", "advanced"],
      ["A patient with chronic LBP relieved by SITTING and worsened by walking/standing/back extension most likely has:", ["Lumbar disc herniation that is typically worse with sitting", "Lumbar spinal stenosis with neurogenic claudication", "Sacroiliac joint dysfunction with localized pain", "Trochanteric bursitis causing lateral hip pain"], 1, "Lumbar stenosis: WORSE with extension/walking (further narrows canal), BETTER with flexion/sitting ('shopping cart sign'). Disc herniation pain is typically WORSE with sitting/flexion. SI joint dysfunction has different positional patterns. Trochanteric bursitis is lateral hip pain, not back pain.", "advanced"],
      ["A grade III spondylolisthesis is defined as:", ["1-25% slippage of one vertebra on the next (grade I)", "26-50% slippage (grade II)", "51-75% slippage", "76-100% slippage (grade IV)"], 2, "Meyerding grading of spondylolisthesis: Grade I = 1-25%, Grade II = 26-50%, Grade III = 51-75%, Grade IV = 76-100%, Grade V (spondyloptosis) = complete dislocation. Grade III and higher often require surgical evaluation.", "advanced"],
      ["A 42-year-old presents with acute LBP after lifting a heavy box. Examination is normal with no neurologic findings and no red flags. The MOST appropriate management is:", ["Immediate MRI of the lumbar spine to identify the underlying cause", "Conservative care: NSAIDs, activity modification, early mobilization, and OMT", "Strict bed rest for at least two full weeks", "Urgent surgical referral within the next 48 hours"], 1, "Acute uncomplicated LBP is managed conservatively without imaging unless red flags appear or symptoms fail to improve over 4-6 weeks (per ACP/AAFP guidelines) — early activity, NSAIDs, OMT, and patient education are first-line. Routine MRI, bed rest (worsens outcomes), and surgical referral are not appropriate for uncomplicated acute LBP.", "advanced"],
      ["A 28-year-old construction worker develops acute low back pain with radiation down the posterior thigh to the heel and lateral foot. Achilles reflex is diminished on that side. The MOST likely level of disc herniation is:", ["L2-L3 disc compressing L3 root", "L4-L5 disc compressing L5 root", "L5-S1 disc compressing S1 root", "T11-T12 disc compressing T12 root"], 2, "Posterior thigh + heel + lateral foot pain with diminished Achilles reflex = S1 radiculopathy, most commonly from L5-S1 disc herniation (the disc compresses the inferior root at that level). L4-L5 disc → L5 root (dorsal foot/great toe, EHL weakness). Upper lumbar/thoracic herniations are uncommon and produce different patterns.", "advanced"],
      ["The MOST evidence-based first-line non-pharmacologic treatment for chronic low back pain (per recent ACP guidelines) is:", ["Strict prolonged bed rest at home for at least one full week", "Multimodal nonpharmacologic care: exercise, CBT, and acupuncture", "Long-term opioid monotherapy as primary treatment", "Early lumbar spinal fusion surgery as first-line care"], 1, "ACP and AAFP recommend multimodal nonpharmacologic therapy as FIRST LINE for chronic LBP: exercise (graded, yoga, tai chi), CBT, mindfulness, spinal manipulation (including OMT), acupuncture. NSAIDs are pharmacologic second-line. Bed rest, opioid monotherapy, and early fusion are not first-line and may cause harm.", "advanced"],
      ["Adolescent isthmic spondylolysis MOST commonly occurs at which vertebral level?", ["L2-L3, a relatively uncommon site for this fracture", "L3-L4, which is only rarely involved in this injury", "L5-S1, the most common site for pars interarticularis fracture", "T12-L1, an atypical level for this type of fracture"], 2, "L5 PARS is by far the most common site of isthmic spondylolysis (~90% of cases) — explained by the high biomechanical load at the lumbosacral junction with repetitive hyperextension (gymnastics, football linemen, weight lifting). L2-L3, L3-L4, and T12-L1 are uncommon spondylolysis sites. If bilateral, spondylolisthesis (Meyerding grade I-V) may develop.", "advanced"]
    ]],
    [11, "Compartment syndrome, fibromyalgia, and chronic pain syndromes", [
      ["The classic '5 Ps' of acute compartment syndrome include all EXCEPT:", ["Pain out of proportion to the injury", "Paresthesias and late paralysis of the limb", "Pallor and pulselessness as late ominous signs", "A productive cough with sputum production"], 3, "The 5 Ps of compartment syndrome are Pain (out of proportion, worse with passive stretch), Paresthesias, Paralysis (late), Pallor, and Pulselessness (late and ominous). Productive cough is not a feature of compartment syndrome — it suggests respiratory pathology.", "basic"],
      ["The threshold compartment pressure that typically warrants fasciotomy is:", ["Greater than 5 mmHg", "Greater than 30 mmHg (or within 30 mmHg of diastolic blood pressure)", "Greater than 60 mmHg only", "Greater than 100 mmHg only"], 1, "Compartment pressure >30 mmHg, or a delta pressure (diastolic BP minus compartment pressure) less than 30 mmHg, is the standard indication for emergent fasciotomy. 5 mmHg is normal. 60 or 100 mmHg thresholds are too high and would delay critical intervention.", "basic"],
      ["The 2016 ACR criteria for fibromyalgia diagnosis use which scoring system?", ["Pure count of 18 specific tender points (11/18 required) without any other criteria", "Widespread Pain Index plus Symptom Severity Scale, symptoms >3 months, no alternative dx", "A single laboratory marker (positive ANA) plus chronic fatigue lasting over 6 months", "Imaging-based criteria using whole-body MRI of skeletal muscles for diagnosis"], 1, "Modern ACR criteria (2010/2016) use the Widespread Pain Index (WPI) plus Symptom Severity Scale (SSS), require symptoms >3 months, and require exclusion of other diagnoses — moving AWAY from the older 18 tender point count. ANA and MRI are not diagnostic for fibromyalgia.", "basic"],
      ["A 65-year-old woman presents with bilateral shoulder and hip girdle pain and morning stiffness lasting hours, plus markedly elevated ESR. The MOST likely diagnosis is:", ["Fibromyalgia", "Polymyalgia rheumatica (PMR)", "Rheumatoid arthritis flare", "Cervical myelopathy"], 1, "POLYMYALGIA RHEUMATICA classically affects women over 50, with bilateral shoulder/hip girdle pain and morning stiffness lasting >45 min, markedly elevated ESR (often >50), and dramatic response to low-dose prednisone. Fibromyalgia has widespread pain with normal ESR. RA shows joint synovitis and positive serologies. Myelopathy presents with long-tract signs, not girdle stiffness.", "advanced"],
      ["The four major compartments of the lower leg are:", ["Anterior, lateral, superficial posterior, deep posterior", "Anterior, medial, posterior, and gluteal compartments", "Quadriceps, hamstring, calf, and plantar sole", "Tibial, fibular, peroneal, and popliteal groups"], 0, "The four leg compartments are ANTERIOR (tib ant, EHL, EDL, peroneus tertius — deep peroneal nerve), LATERAL (peroneus longus/brevis — superficial peroneal nerve), SUPERFICIAL POSTERIOR (gastrocnemius, soleus, plantaris), and DEEP POSTERIOR (tib post, FDL, FHL — tibial nerve). The anterior compartment is most commonly affected in compartment syndrome.", "advanced"],
      ["A patient develops compartment syndrome following a tibial fracture. The MOST sensitive EARLY clinical sign is:", ["Early loss of palpable distal arterial pulses in the foot", "Pain out of proportion to injury, worse with passive muscle stretch", "Pallor of the overlying skin and soft tissues", "Complete paralysis of the foot and ankle"], 1, "Pain out of proportion (especially with passive stretch of the involved muscles) is the EARLIEST and most sensitive sign. Pulselessness, pallor, and paralysis are LATE and OMINOUS — by the time they appear, irreversible muscle and nerve damage may have occurred. Never wait for the late Ps before intervening.", "advanced"],
      ["VOLKMANN ischemic contracture is the chronic sequela of:", ["Untreated long-standing rheumatoid arthritis of the joints", "Untreated forearm compartment syndrome after supracondylar fracture", "Chronic widespread fibromyalgia syndrome", "Long-standing poorly controlled diabetes mellitus"], 1, "Volkmann contracture results from UNTREATED compartment syndrome — classically forearm after supracondylar fracture in children — with muscle/nerve necrosis, fibrosis, and characteristic claw-hand contracture. It is preventable with timely fasciotomy. RA, fibromyalgia, and diabetes do not cause Volkmann.", "advanced"],
      ["CHRONIC EXERTIONAL compartment syndrome differs from ACUTE compartment syndrome in that:", ["It is a true surgical emergency that requires immediate fasciotomy", "Symptoms develop during exercise, resolve with rest, and need pressure testing", "There is never any role for surgical intervention here", "It produces irreversible muscle damage within just hours"], 1, "Chronic exertional compartment syndrome: exercise-induced symptoms (typically running) that resolve with rest, diagnosed by elevated post-exercise compartment pressures. Elective fasciotomy is the treatment but not emergent. The other choices describe ACUTE compartment syndrome features incorrectly applied to the chronic form.", "advanced"],
      ["FDA-approved medications specifically for fibromyalgia include all EXCEPT:", ["Duloxetine (SNRI)", "Milnacipran (SNRI)", "Pregabalin (alpha-2-delta ligand)", "Amitriptyline (TCA)"], 3, "FDA-APPROVED specifically for fibromyalgia: duloxetine, milnacipran, and pregabalin. Amitriptyline is commonly used and effective in fibromyalgia but is NOT FDA-approved for this specific indication. Other options like cyclobenzaprine, low-dose naltrexone, and gabapentin are used off-label.", "advanced"],
      ["The CENTRAL SENSITIZATION phenomenon underlying fibromyalgia is characterized by all EXCEPT:", ["Wind-up — progressive amplification of dorsal horn responses to repeated C-fiber input", "Reduced descending inhibitory control (decreased serotonin/norepinephrine signaling)", "Increased glutamate/Substance P in the CNS", "Predominantly peripheral nerve damage without CNS involvement"], 3, "Central sensitization is fundamentally a CNS process — wind-up, NMDA-receptor activation, increased glutamate/Substance P, and reduced descending inhibition all originate centrally. Peripheral nerve damage is NOT the primary mechanism of fibromyalgia (though peripheral input contributes). This is why central-acting medications (SNRIs, pregabalin) help.", "advanced"],
      ["Polymyalgia rheumatica patients should be SCREENED for which serious co-occurring condition?", ["Congestive heart failure with pulmonary fluid overload", "Giant cell arteritis with headache, jaw claudication, visual loss", "Relapsing-remitting multiple sclerosis flares", "Bilateral carpal tunnel syndrome of the wrists"], 1, "Approximately 10-20% of PMR patients develop GIANT CELL ARTERITIS — a vasculitis of medium/large arteries (especially temporal artery) that can cause SUDDEN PERMANENT BLINDNESS via posterior ciliary artery occlusion. Screen with history (HA, jaw claudication, scalp tenderness, visual changes) and physical exam; if suspected, start HIGH-DOSE prednisone IMMEDIATELY (do not wait for biopsy).", "advanced"],
      ["Treatment of suspected giant cell arteritis with visual symptoms should be initiated:", ["Only after a temporal artery biopsy confirms the diagnosis", "Immediately with high-dose IV steroids, before any biopsy", "With low-dose oral prednisone at 15 mg once daily", "With NSAIDs and watchful clinical observation"], 1, "GCA with visual symptoms is a MEDICAL EMERGENCY — start high-dose IV methylprednisolone immediately to prevent contralateral eye involvement. Biopsy can be obtained within 1-2 weeks of starting steroids without losing diagnostic yield. Waiting for biopsy or using low-dose steroids/NSAIDs risks permanent blindness.", "advanced"],
      ["MYOFASCIAL PAIN SYNDROME is differentiated from FIBROMYALGIA primarily by:", ["Presence of widespread symmetric pain with multiple tender points", "Discrete trigger points with referred pain in a regional distribution", "Markedly elevated ESR and CRP inflammatory markers", "A universal response only to gabapentinoid medications"], 1, "MYOFASCIAL PAIN SYNDROME features TRIGGER POINTS (taut bands with focal hyperirritable spots) with PREDICTABLE REFERRED PAIN patterns, typically regional. FIBROMYALGIA is widespread with tender points but without focal trigger-point referred pain patterns. ESR is normal in both. Treatment differs — myofascial responds to trigger point injection, dry needling, ischemic compression; fibromyalgia responds to systemic medications and graded exercise.", "advanced"],
      ["A patient presents 6 hours after a tibial fracture with severe pain unrelieved by morphine, pain on passive toe flexion, and tense swelling of the anterolateral leg. Compartment pressure measures 38 mmHg with a diastolic BP of 70 (delta = 32). The MOST appropriate next step is:", ["Observe and remeasure in 6 hours", "Emergent four-compartment fasciotomy without delay", "IV mannitol and observation", "Splint the leg in elevation and reassess in the morning"], 1, "Pain out of proportion + pain with passive stretch + tense compartment + pressure >30 mmHg with delta pressure <30 mmHg = compartment syndrome → EMERGENT FASCIOTOMY without delay. Observation, mannitol, and splint elevation all delay definitive treatment and risk irreversible muscle and nerve necrosis (Volkmann contracture).", "advanced"]
    ]]
  ]],
  [8, "OPP in Cardiovascular Medicine", [
    [1, "Explain the effects of the sympathetic nervous system on the cardiac system", [
      ["Preganglionic sympathetic fibers that innervate the heart arise from which spinal cord levels?", ["Cord segments T1 through T6", "Cord segments C3 through C5", "Cord segments T5 through T9", "Cord segments T10 through L2"], 0, "Cardiac sympathetic preganglionic neurons originate in the upper thoracic cord, classically T1 through T6, then synapse in the cervical and upper thoracic chain ganglia before reaching the heart. C3 through C5 is the phrenic motor level for the diaphragm, not the cardiac sympathetics. T5 through T9 supplies upper GI viscera. T10 through L2 supplies the kidneys, adrenals, and lower viscera, not the heart.", "basic"],
      ["A patient has persistent facilitation of the RIGHT upper thoracic sympathetics. Which arrhythmia pattern is this MOST likely to favor?", ["Supraventricular tachycardia from SA node drive", "Ventricular ectopy from AV node delay", "Complete heart block from nodal pause", "Atrial standstill from SA node arrest"], 0, "Right cardiac sympathetics project preferentially to the SA node, so right-sided hypersympathetic tone tends to drive rate upward and favors supraventricular tachycardia. Left sympathetics project to the AV node and ventricle and are more associated with ectopic ventricular foci. Heart block and nodal arrest reflect excess parasympathetic, not sympathetic, tone.", "advanced"],
      ["Increased sympathetic outflow to the myocardium produces which combination of effects?", ["Faster rate, stronger contraction, faster conduction", "Slower rate, weaker contraction, slower conduction", "Faster rate, weaker contraction, slower conduction", "Slower rate, stronger contraction, faster conduction"], 0, "Sympathetic stimulation is positively chronotropic, inotropic, and dromotropic: it raises heart rate, augments contractile force, and speeds conduction, raising cardiac output. The slowing combination describes parasympathetic effects. The mixed options pair effects that do not occur together under pure sympathetic drive.", "basic"],
      ["A patient with no fixed coronary stenosis has recurrent rest angina. Excess cardiac sympathetic tone is thought to contribute MOST directly by which mechanism?", ["Coronary arterial vasospasm reducing flow", "Pericardial effusion compressing vessels", "Valvular regurgitation lowering pressure", "Pulmonary embolism blocking outflow"], 0, "Heightened sympathetic tone can provoke coronary vasospasm, transiently reducing myocardial perfusion and producing angina even with patent arteries. Pericardial effusion, valve regurgitation, and pulmonary embolism are distinct structural or obstructive processes, not autonomically mediated vasospasm.", "advanced"],
      ["Facilitation of the LEFT cardiac sympathetic pathways is MOST associated with which dangerous outcome?", ["Ventricular fibrillation from ectopic foci", "Sinus bradycardia from vagal surge", "First degree block from nodal slowing", "Atrial flutter from rapid SA firing"], 0, "Left cardiac sympathetics influence the ventricular myocardium and AV node, and left-sided hypersympathetic tone is linked to ventricular ectopy and fibrillation. Bradycardia and first degree block reflect parasympathetic dominance. Rapid SA firing producing atrial flutter is a right-sided sympathetic pattern.", "advanced"],
      ["From the osteopathic viewpoint, essential hypertension is BEST understood as which underlying state?", ["Cardiovascular hyperreactivity to sympathetic input", "Fixed structural narrowing of the aortic arch", "Chronic parasympathetic overactivity at the SA node", "Primary failure of baroreceptor afferent nerves"], 0, "Essential hypertension is framed as exaggerated cardiac and vascular reactivity to sympathetic drive, which is why somatic and visceral inputs that raise sympathetic tone matter. Aortic narrowing describes coarctation, a structural secondary cause. Parasympathetic overactivity lowers rate and pressure. Baroreceptor failure is a rare distinct syndrome, not the usual essential mechanism.", "basic"],
      ["An anterior wall myocardial infarction most often produces viscerosomatic findings at which paraspinal location?", ["Left paraspinal tissues at T2 through T3", "Right paraspinal tissues at C2 through C3", "Left paraspinal tissues at T10 through T12", "Right paraspinal tissues at L1 through L2"], 0, "Anterior ischemia drives sympathetic afferents that refer to the upper left thoracic paraspinal tissues, classically T2 through T3, producing palpable tissue texture change there. C2 through C3 reflects vagal and cranial base referral seen with inferior infarction. T10 through L2 levels correspond to abdominal and renal viscera, not the anterior cardiac wall.", "advanced"]
    ]],
    [2, "Explain the effects of the parasympathetic nervous system on the cardiac system", [
      ["Parasympathetic innervation of the heart is carried by which nerve?", ["The vagus nerve from the medulla", "The greater splanchnic nerve from the cord", "The phrenic nerve from the cervical plexus", "The stellate ganglion from the chain"], 0, "Cardiac parasympathetic fibers travel in the vagus nerve, whose cell bodies sit in the medulla. The greater splanchnic and stellate ganglion are sympathetic structures. The phrenic nerve is a motor nerve to the diaphragm and does not carry cardiac parasympathetic fibers.", "basic"],
      ["The RIGHT vagus nerve exerts its predominant effect on which cardiac structure?", ["The SA node, slowing the rate", "The AV node, blocking conduction", "The His bundle, splitting the beat", "The left ventricle, weakening output"], 0, "The right vagus projects mainly to the SA node, so right vagal tone slows the intrinsic rate. The left vagus dominates AV nodal conduction. The His bundle and ventricular myocardium receive sparse parasympathetic supply, so vagal effects on them are minimal.", "advanced"],
      ["Increased parasympathetic tone at the heart produces which set of effects?", ["Reduced rate and slowed conduction", "Raised rate and faster conduction", "Raised rate and stronger contraction", "Reduced rate and stronger contraction"], 0, "Vagal activation is negatively chronotropic and dromotropic: it lowers heart rate and slows AV conduction, with a modest negative effect on atrial contractility. Options describing a rising rate are sympathetic. Stronger contraction is not a parasympathetic effect on the heart.", "basic"],
      ["The vagus nerve is vulnerable to dysfunction where it exits the skull. Which structure is the relevant exit point?", ["The jugular foramen at the cranial base", "The carotid canal in the petrous bone", "The foramen ovale in the sphenoid", "The optic canal at the orbital apex"], 0, "The vagus exits the skull through the jugular foramen, so occipitomastoid and cranial base dysfunction can alter vagal tone. The carotid canal transmits the internal carotid artery. The foramen ovale transmits the mandibular division of the trigeminal nerve. The optic canal transmits the optic nerve.", "advanced"],
      ["An inferior wall myocardial infarction frequently triggers which autonomic response?", ["Vagally mediated bradycardia and hypotension", "Sympathetic tachycardia with hypertension", "Atrial fibrillation with rapid response", "Sustained ventricular tachycardia"], 0, "Inferior infarction often stimulates vagal afferents, producing the bradycardia and hypotension of a Bezold Jarisch type reflex. Sympathetic tachycardia and hypertension are more typical of anterior infarction. Atrial fibrillation and ventricular tachycardia are arrhythmias that are not the characteristic reflex of inferior ischemia.", "advanced"],
      ["Cervical and suboccipital myofascial release in a tachycardic patient is intended to shift autonomic balance how?", ["Toward parasympathetic predominance", "Toward sympathetic predominance", "Toward complete autonomic blockade", "Toward adrenal catecholamine release"], 0, "Releasing the suboccipital and cervical tissues addresses the vagal pathways near the cranial base and shifts the sympathovagal balance toward parasympathetic predominance, helping slow an elevated rate. Increasing sympathetic tone or releasing catecholamines would raise the rate. Treatment modulates tone rather than producing total autonomic blockade.", "basic"],
      ["The preganglionic cell bodies for cardiac vagal fibers are located in which region?", ["The medulla oblongata of the brainstem", "The intermediolateral cell column", "The dorsal root ganglia of the cord", "The superior cervical sympathetic ganglion"], 0, "Cardiac parasympathetic preganglionic neurons reside in the medulla, in the nucleus ambiguus and dorsal motor nucleus of the vagus. The intermediolateral cell column houses sympathetic preganglionic neurons. Dorsal root ganglia hold sensory cell bodies. The superior cervical ganglion is a sympathetic relay.", "advanced"]
    ]],
    [3, "Explain the effects of the lymphatic system on the cardiac system", [
      ["In decompensated congestive heart failure, cardiac lymphatic return may rise to what degree above its resting flow?", ["Roughly three to forty times baseline", "Roughly one to two times baseline", "Roughly one hundred times baseline", "It falls to nearly zero flow"], 0, "Failing hearts generate marked interstitial fluid, and cardiac lymph flow can climb to roughly three to forty times the resting rate to compensate. A one to two fold rise understates the demand. A hundred fold rise overstates the documented range. Flow rises rather than ceasing in failure.", "basic"],
      ["Chronic impairment of cardiac lymphatic drainage is thought to contribute to which set of problems?", ["Arrhythmias, atherosclerosis, and hypertension", "Improved collateral flow and lower pressure", "Reduced edema and stronger contractility", "Faster conduction and slower heart rate"], 0, "Poor lymphatic clearance lets inflammatory mediators and fluid accumulate, which is linked to arrhythmias, accelerated atherosclerosis, and hypertension. The other options describe improvements, which is the opposite of what impaired drainage produces; congestion worsens rather than relieves edema and contractility.", "advanced"],
      ["How does myocardial interstitial edema from lymphatic congestion affect the heart?", ["It impairs contractility and collateral perfusion", "It enhances contractility and stroke volume", "It widens coronary arteries and raises flow", "It speeds AV conduction and shortens PR"], 0, "Interstitial edema increases diffusion distance and tissue pressure, impairing both contractility and collateral perfusion. It does not enhance contractility or stroke volume. It tends to compress rather than widen coronary vessels, and it does not speed conduction.", "basic"],
      ["Lymph collected from the myocardium ultimately drains into the venous circulation by way of which channel?", ["The thoracic duct into the subclavian vein", "The hepatic portal vein into the liver", "The azygos vein into the superior vena cava directly", "The coronary sinus into the right atrium"], 0, "Cardiac lymph travels through mediastinal nodes and joins the thoracic duct, which empties at the junction near the left subclavian vein. The portal vein drains gut blood, not lymph. The azygos vein and coronary sinus return blood, not lymphatic fluid, to the heart.", "advanced"],
