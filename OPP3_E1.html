      ["Why is a vigorous lymphatic pump generally avoided in a patient with acute decompensated heart failure?", ["The added preload can overwhelm the failing heart", "It lowers preload too far and causes shock", "It reliably converts atrial fibrillation", "It selectively dilates the coronary arteries"], 0, "Mobilizing a large volume of lymph and fluid back into circulation increases venous return and preload, which a decompensated heart cannot handle, so the pump is withheld until the patient is stabilized. The technique raises rather than lowers preload, does not convert arrhythmias, and does not selectively dilate coronaries.", "advanced"],
      ["Lymphatic stasis is believed to promote which vascular process over time?", ["Progression of atherosclerotic plaque", "Regression of arterial wall thickening", "Resolution of existing calcified plaque", "Reversal of established hypertension"], 0, "Stagnant lymph allows lipids and inflammatory cells to dwell in the arterial wall, favoring plaque progression. The remaining options describe regression or reversal, which impaired lymphatic clearance does not produce; if anything, stasis worsens these processes.", "basic"],
      ["Releasing the thoracic inlet before treating the rest of the thorax serves what purpose for cardiac lymphatic return?", ["It opens the terminal drainage pathway first", "It closes off the distal lymphatic channels", "It raises central venous pressure sharply", "It blocks thoracic duct emptying temporarily"], 0, "The thoracic inlet is where the great lymphatic ducts empty, so opening it first creates a clear terminal pathway before more distal fluid is mobilized. Doing so opens rather than closes the channels, is intended to lower rather than raise central pressure, and facilitates rather than blocks duct emptying.", "advanced"]
    ]],
    [4, "Formulate basic treatment approaches for patients with common cardiac diseases", [
      ["What is the primary autonomic effect of rib raising in a patient with cardiac hypersympathetic tone?", ["It normalizes elevated sympathetic outflow", "It increases sympathetic outflow further", "It abolishes all vagal tone to the heart", "It directly raises myocardial contractility"], 0, "Rib raising mobilizes the costovertebral region and, after an initial brief stimulation, normalizes excessive sympathetic outflow from the thoracic chain. It is used to lower, not raise, hypersympathetic tone. It does not abolish vagal tone, and any contractility change is indirect through autonomic balance.", "basic"],
      ["To reduce sympathetic drive to the kidneys and adrenals in a hypertensive patient, treatment is directed at which region?", ["The lower thoracic and upper lumbar segments", "The upper thoracic segments at T1 through T4", "The mid cervical segments at C3 through C5", "The sacral segments at S2 through S4"], 0, "Renal and adrenal sympathetics arise from roughly T10 through L2, so inhibition there targets the vascular and adrenal contribution to hypertension. T1 through T4 governs the heart and upper limb. C3 through C5 is the phrenic level. S2 through S4 is the sacral parasympathetic outflow, not sympathetic.", "advanced"],
      ["When is OMT MOST appropriately initiated in a patient with an acute coronary syndrome?", ["After the patient is hemodynamically stabilized", "During the first minutes of active chest pain", "Only once the patient is fully asymptomatic for weeks", "Before any pharmacologic therapy is started"], 0, "OMT is added once the patient is hemodynamically stable, complementing standard care rather than replacing acute medical management. Treating during active instability is unsafe, waiting weeks needlessly forgoes benefit during recovery, and OMT does not precede indicated pharmacologic therapy.", "basic"],
      ["Suboccipital release is selected in a patient with sinus tachycardia for which reason?", ["To enhance vagal tone and slow the rate", "To enhance sympathetic tone and raise output", "To block conduction through the AV node", "To stimulate adrenal catecholamine release"], 0, "The suboccipital region influences the vagal pathways at the cranial base, so release enhances parasympathetic tone and helps slow an elevated sinus rate. Raising sympathetic tone or adrenal output would speed the rate. The technique modulates autonomic balance rather than mechanically blocking the AV node.", "advanced"],
      ["A tender, taut band in the right pectoralis major has been associated with the onset of which arrhythmia?", ["Supraventricular tachycardia", "Third degree heart block", "Sinus bradycardia", "Idioventricular rhythm"], 0, "A trigger point in the right pectoralis major has been described as a somatic source capable of provoking supraventricular tachycardia, and treating it can help. Heart block, bradycardia, and idioventricular rhythm reflect slowed or failed conduction, which is not the association described for this somatic finding.", "advanced"],
      ["For a patient who has just undergone chest compressions, which technique choice is MOST appropriate for the ribs and sternum?", ["Gentle indirect myofascial techniques", "Forceful direct HVLA thrusting", "Aggressive springing of the sternum", "High amplitude rib articulation"], 0, "After CPR the thoracic cage is fragile and possibly fractured, so gentle indirect techniques are favored to avoid further injury. Direct thrusting, aggressive springing, and high amplitude articulation all risk worsening rib or sternal damage in this setting.", "basic"],
      ["A vigorous lymphatic pump is contraindicated in which cardiac scenario?", ["Acute decompensated congestive heart failure", "Stable compensated chronic heart failure", "Well controlled essential hypertension", "Resolved pericarditis on follow up"], 0, "Acute decompensated failure cannot tolerate the surge in venous return a vigorous pump produces, so it is withheld until compensation returns. Stable compensated failure, controlled hypertension, and resolved pericarditis are not absolute contraindications to carefully applied lymphatic technique.", "advanced"]
    ]]
  ]],
  [9, "The Osteopathic Approach to Pulmonology", [
    [1, "Explain the effects of the sympathetic and parasympathetic divisions of the ANS on the respiratory system", [
      ["Sympathetic innervation to the lungs arises from which spinal cord levels?", ["Cord segments T2 through T7", "Cord segments T10 through L2", "Cord segments C3 through C5", "Cord segments S2 through S4"], 0, "Pulmonary sympathetic preganglionic fibers arise from roughly T2 through T7, which is why upper thoracic dysfunction produces respiratory viscerosomatic findings. T10 through L2 supplies abdominal and renal viscera. C3 through C5 is the phrenic motor level. S2 through S4 is sacral parasympathetic outflow.", "basic"],
      ["Increased sympathetic tone to the airways produces which combination of effects?", ["Bronchodilation with thick, scant secretions", "Bronchoconstriction with thin, copious secretions", "Bronchodilation with thin, watery secretions", "Bronchoconstriction with thick, scant secretions"], 0, "Sympathetic activation dilates the bronchi and shifts secretions toward a thick, reduced character through vasoconstriction. Bronchoconstriction is a parasympathetic effect. Thin watery secretions also reflect parasympathetic activity, so the options pairing dilation with watery mucus or constriction with thick mucus mismatch the autonomic physiology.", "advanced"],
      ["Increased parasympathetic (vagal) tone to the lungs produces which set of effects?", ["Bronchoconstriction with thin, increased secretions", "Bronchodilation with thick, reduced secretions", "Bronchoconstriction with thick, reduced secretions", "Bronchodilation with thin, increased secretions"], 0, "Vagal activation constricts the bronchi, dilates the vasculature, and increases thin secretions. Bronchodilation is a sympathetic effect, and thick reduced secretions reflect sympathetic vasoconstriction, so the mismatched options do not represent parasympathetic physiology.", "basic"],
      ["Parasympathetic control of the lungs is most influenced by dysfunction in which region?", ["The occipitoatlantal and upper cervical area", "The lower lumbar and sacral area", "The mid thoracic area at T6 through T8", "The lower thoracic area at T9 through T11"], 0, "Vagal fibers to the lungs are affected by the occipitoatlantal and upper cervical region near the cranial base, where TART changes from OA to C3 can appear. Lower lumbar, mid thoracic, and lower thoracic regions relate to sympathetic and somatic structures, not the cranial vagal pathway.", "advanced"],
      ["Prolonged hypersympathetic tone in the airways eventually leads to which mucosal change?", ["Goblet cell hyperplasia with thick secretions and congestion", "Mucosal atrophy with complete drying of the airway", "Loss of all secretory cells with a smooth lining", "Conversion of bronchial lining to squamous muscle"], 0, "Sustained sympathetic stimulation drives goblet cell and epithelial hyperplasia, producing thick secretions that ultimately congest the airway. Total drying, loss of all secretory cells, and conversion to squamous muscle are not the described consequence of prolonged sympathetic tone.", "advanced"],
      ["During an acute asthma attack, which autonomic effect is therapeutically desirable?", ["Sympathetic stimulation to dilate the bronchi", "Parasympathetic stimulation to relax the bronchi", "Vagal stimulation to thin the secretions", "Sympathetic inhibition to widen the airway"], 0, "In an acute attack the goal is bronchodilation, which is achieved by enhancing sympathetic tone. Parasympathetic and vagal stimulation constrict the bronchi, worsening the attack. Sympathetic inhibition would remove the desired dilating drive rather than open the airway.", "basic"],
      ["Viscerosomatic reflexes from lung pathology classically produce palpable changes at which paraspinal levels?", ["The T2 through T7 paraspinal region", "The T10 through L2 paraspinal region", "The L3 through L5 paraspinal region", "The S1 through S4 paraspinal region"], 0, "Because pulmonary sympathetics arise from T2 through T7, lung disease refers viscerosomatic changes to that paraspinal region. T10 through L2 reflects renal and adrenal viscera, while the lumbar and sacral options correspond to lower body structures unrelated to the lung.", "advanced"]
    ]],
    [2, "Explain the effects of the lymphatic system on the respiratory system", [
      ["Lymph from the lungs ultimately drains predominantly into which terminal channel?", ["The right lymphatic duct", "The cisterna chyli below the diaphragm", "The hepatic lymphatic plexus", "The inguinal lymphatic chain"], 0, "Pulmonary lymph passes through pretracheal and intercostal nodes and drains predominantly into the right lymphatic duct. The cisterna chyli collects lymph from below the diaphragm. The hepatic plexus and inguinal chain drain the liver and lower limb, not the lungs.", "advanced"],
      ["Which structure functions as the primary pump driving thoracic lymphatic return?", ["The thoracic diaphragm", "The pericardial sac", "The visceral pleura", "The carotid sheath"], 0, "The diaphragm generates the pressure gradient that drives lymph and venous return through the thorax, making it the primary lymphatic pump. The pericardial sac, visceral pleura, and carotid sheath are passive structures that do not generate this pumping gradient.", "basic"],
      ["Why should the thoracic inlet be released before applying a lymphatic pump to the chest?", ["To open the terminal pathway and prevent backup", "To deliberately restrict the terminal ducts", "To raise resistance at the thoracic outlet", "To stop lymph from reaching the ducts"], 0, "Opening the thoracic inlet clears the terminal drainage route so mobilized lymph is not forced against a closed outlet. The remaining options describe restricting or blocking flow, which is the opposite of the intended effect and would worsen congestion.", "advanced"],
      ["A correctly applied thoracic lymphatic pump has which effect on lymph movement?", ["It increases thoracic duct flow", "It decreases thoracic duct flow", "It reverses flow toward the periphery", "It halts lymphatic movement entirely"], 0, "The pump augments the pressure gradient and increases thoracic duct flow, accelerating clearance. It does not decrease flow, reverse it toward the periphery, or stop lymphatic movement.", "basic"],
      ["Clinical studies of OMT in respiratory infection have demonstrated which benefit?", ["Reduced duration of intravenous antibiotics", "Increased length of hospital stay", "Higher rates of ventilator dependence", "No measurable change in any outcome"], 0, "Trials such as the pneumonia studies showed OMT shortened intravenous antibiotic duration and length of stay. Increased stay and greater ventilator dependence are the opposite of the findings, and the trials did show measurable benefit rather than none.", "advanced"],
      ["A vigorous lymphatic pump is contraindicated in a patient with which finding?", ["Acute high fever with active infection", "Mild chronic nasal congestion", "Stable well controlled asthma", "Resolving postoperative atelectasis"], 0, "A vigorous pump is withheld during acute febrile infection because of the concern for mobilizing the infectious burden too rapidly. Mild congestion, stable asthma, and resolving atelectasis are settings where carefully applied lymphatic technique is generally acceptable.", "advanced"],
      ["Lymph draining from the lung first passes through which group of regional nodes?", ["The pretracheal and intercostal nodes", "The inguinal and popliteal nodes", "The submandibular and parotid nodes", "The mesenteric and celiac nodes"], 0, "Pulmonary lymph passes through pretracheal, intercostal, and axillary nodes on its way to the great ducts. Inguinal and popliteal nodes drain the lower limb, submandibular and parotid nodes drain the head, and mesenteric and celiac nodes drain the abdominal viscera.", "basic"]
    ]],
    [3, "Describe the physiological response to pulmonary infection", [
      ["Which sequence best describes the pathogenesis of congestion in pulmonary infection?", ["Epithelial irritation, reduced surfactant, exudate, congestion", "Reduced surfactant, congestion, epithelial irritation, exudate", "Exudate, epithelial irritation, congestion, reduced surfactant", "Congestion, exudate, reduced surfactant, epithelial irritation"], 0, "Infection first irritates the bronchial epithelium, which reduces surfactant, allowing exudate to accumulate and produce congestion and edema. The other sequences reorder these steps incorrectly; the irritation precedes the surfactant loss that permits exudate and congestion.", "advanced"],
      ["Because the Hering Breuer reflex cannot distinguish air from fluid in the lung, infection tends to produce which breathing pattern?", ["Rapid shallow breathing from limited diaphragm excursion", "Slow deep breathing from increased excursion", "Prolonged breath holding with apnea", "Irregular gasping with full lung expansion"], 0, "The reflex senses the fluid filled lung as stretched and signals the vagus to limit diaphragm excursion, while chemoreceptors demand more oxygen, producing rapid shallow breathing. Slow deep breaths and full expansion contradict the limited excursion, and sustained breath holding is not the reflex response.", "advanced"],
      ["A patient with pneumonia is likely to show palpable viscerosomatic tissue changes in which region?", ["The T2 through T7 paraspinal tissues", "The L1 through L4 paraspinal tissues", "The S1 through S3 paraspinal tissues", "The C5 through C7 paraspinal tissues"], 0, "Pulmonary sympathetic afferents enter at T2 through T7, so pneumonia refers viscerosomatic changes to that paraspinal level. The lumbar, sacral, and lower cervical levels listed do not correspond to the pulmonary sympathetic supply.", "basic"],
      ["Maintaining diaphragmatic function during pulmonary infection depends on which nerve supply?", ["The phrenic nerve from C3 through C5", "The vagus nerve from the medulla", "The intercostal nerves from T7 through T11", "The long thoracic nerve from C5 through C7"], 0, "The phrenic nerve, arising from C3 through C5, keeps the diaphragm functioning, which is why upper cervical dysfunction threatens ventilation. The vagus supplies bronchial smooth muscle and glands, the intercostals supply the chest wall, and the long thoracic supplies the serratus anterior.", "basic"],
      ["The carotid body chemoreceptors contribute to the response to pneumonia by doing what?", ["Sensing low oxygen and increasing respiratory drive", "Sensing high oxygen and slowing the breathing rate", "Detecting airway stretch and limiting excursion", "Detecting blood pressure and altering heart rate"], 0, "Carotid bodies detect falling oxygen and increase respiratory drive, contributing to the rapid breathing of infection. They respond to low rather than high oxygen, do not sense stretch, and the pressure sensing role belongs to the baroreceptors, not the chemoreceptors.", "advanced"],
      ["Historical data from the 1918 influenza pandemic reported what mortality difference with osteopathic care?", ["Markedly lower mortality with OMT than conventional care", "Identical mortality between OMT and conventional care", "Higher mortality with OMT than conventional care", "No mortality data was ever recorded"], 0, "Reports from 1918 described markedly lower mortality among patients managed with osteopathic care compared with conventional treatment of the era. The claims of identical, higher, or absent data contradict the historical accounts that motivated continued use of OMT in respiratory illness.", "advanced"],
      ["Chronic diaphragmatic dysfunction from pulmonary disease tends to produce which postural change?", ["Increased lumbar lordosis with a flattened diaphragm", "Decreased lumbar lordosis with a domed diaphragm", "A rigid thoracic kyphosis with raised ribs", "A lateral scoliosis with rotated vertebrae"], 0, "A chronically strained, flattened diaphragm pulls the spine into increased lumbar lordosis. A domed diaphragm with reduced lordosis is the healthy configuration, while fixed kyphosis and scoliosis are separate structural patterns not specific to diaphragmatic strain.", "basic"]
    ]],
    [4, "Formulate basic treatment approaches for patients with selected pulmonary disorders", [
      ["In sequencing OMT for a patient with a respiratory infection, which area is addressed FIRST?", ["The hypersympathetic thoracic area", "The peripheral lymphatic pump", "The lower extremity venous pump", "The lumbar paraspinal tissues"], 0, "Treatment begins by normalizing the hypersympathetic thoracic regions before mobilizing fluid, so the autonomic groundwork is laid first. Beginning with a peripheral or lower extremity pump moves fluid before the pathway is prepared, and the lumbar tissues are not the priority for a pulmonary problem.", "advanced"],
      ["Before applying a thoracic lymphatic pump, which step should be performed?", ["Open the thoracic inlet to clear the outlet", "Close the thoracic inlet to build pressure", "Compress the abdomen to trap lymph", "Immobilize the diaphragm to steady the field"], 0, "Releasing and opening the thoracic inlet clears the terminal drainage outlet so the pump does not push fluid against a closed channel. Closing the inlet, trapping lymph, or immobilizing the diaphragm would each impede the drainage the pump is meant to promote.", "basic"],
      ["Controlled trials of adjunctive OMT in hospitalized pneumonia patients showed which result?", ["Reduced length of stay and antibiotic duration", "Increased length of stay and antibiotic duration", "More frequent need for mechanical ventilation", "No effect on any clinical endpoint"], 0, "The pneumonia OMT trials demonstrated reduced length of stay, shorter antibiotic courses, and less ventilator use. The options describing longer stays, more ventilation, or no effect are contrary to those reported benefits.", "advanced"],
      ["The main OMT goal in a patient with COPD is to accomplish what?", ["Improve chest wall compliance and diaphragm excursion", "Permanently reverse the alveolar destruction", "Eliminate the need for all bronchodilators", "Restore normal lung tissue architecture"], 0, "OMT in COPD aims to improve chest wall compliance, diaphragm excursion, and secretion clearance, supporting function. It cannot reverse alveolar destruction, restore normal architecture, or eliminate pharmacologic therapy, which remain irreversible or necessary aspects of the disease.", "basic"],
      ["For a patient in the middle of an acute asthma attack, which autonomic approach is appropriate?", ["Stimulate sympathetic tone to dilate the bronchi", "Stimulate parasympathetic tone to relax the bronchi", "Maximize vagal input to thin secretions", "Inhibit sympathetic tone to rest the airway"], 0, "During an acute attack the airway must be dilated, which is achieved by stimulating sympathetic tone. Parasympathetic and vagal stimulation constrict the airway, and inhibiting sympathetic tone removes the dilating drive, all of which would worsen the attack.", "advanced"],
      ["For postoperative atelectasis, the thoracic lymphatic pump has been compared favorably against which standard measure?", ["Incentive spirometry alone", "Prophylactic antibiotics alone", "Bed rest without intervention", "High flow oxygen alone"], 0, "The lymphatic pump has been studied as an adjunct or comparator to incentive spirometry for preventing and treating postoperative atelectasis. Prophylactic antibiotics, bed rest, and oxygen address different problems and are not the standard reexpansion measure being compared.", "advanced"],
      ["A vigorous lymphatic pump should be withheld in a patient who has which of the following?", ["An acute febrile illness", "A resolving chronic cough", "Stable controlled hypertension", "Mild seasonal allergies"], 0, "Acute febrile illness is a contraindication to a vigorous pump because of the concern for spreading the infectious burden too quickly. A resolving cough, controlled hypertension, and mild allergies are not contraindications to carefully applied lymphatic technique.", "basic"]
    ]]
  ]],
  [10, "Study Table Review — High-Yield (Lectures 1-8)", [
    [1, "Identify entrapment neuropathies by hallmark deficit and compression site (quick-reference table provided).", [
      ["A mixed martial artist takes repeated blows to the lateral proximal lower leg near the fibular head and afterward can barely walk. Compression of which nerve is most likely responsible, and which motor task would be most impaired?", ["Tibial nerve, with loss of toe walking", "Common peroneal nerve, with loss of heel walking", "Tibial nerve, with loss of heel walking", "Common peroneal nerve, with loss of toe walking"], 1, "The common peroneal nerve wraps around the fibular head and is the most commonly entrapped lower-extremity nerve. Injury causes foot drop from loss of dorsiflexion, so the patient cannot heel walk. The tibial nerve drives plantarflexion and toe walking.", "advanced", "<div style=\"font-size:12px;line-height:1.35;margin:4px 0 2px\"><strong>Entrapment Neuropathy Quick Reference &mdash; deficit + memory trick</strong></div>\n<table style=\"border-collapse:collapse;width:100%;font-size:11px\">\n<thead><tr style=\"background:rgba(0,0,0,0.06)\">\n<th style=\"border:1px solid rgba(0,0,0,0.25);padding:3px 5px;text-align:left\">Nerve</th>\n<th style=\"border:1px solid rgba(0,0,0,0.25);padding:3px 5px;text-align:left\">Site / cause</th>\n<th style=\"border:1px solid rgba(0,0,0,0.25);padding:3px 5px;text-align:left\">Hallmark deficit</th>\n<th style=\"border:1px solid rgba(0,0,0,0.25);padding:3px 5px;text-align:left\">Memory trick</th></tr></thead>\n<tbody>\n<tr><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\">Suprascapular</td><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\">Suprascapular / spinoglenoid notch</td><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\">Weak abduction + external rotation</td><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\">Spans the <em>S</em>pine &rarr; <em>S</em>upraspinatus + infraspinatus</td></tr>\n<tr><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\">Axillary</td><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\">Anterior dislocation / surgical neck fx</td><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\">Lost abduction, numb lateral shoulder</td><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\">\"Army badge\" patch goes numb</td></tr>\n<tr><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\">Musculocutaneous</td><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\">Anesthesia malpositioning</td><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\">Weak elbow flexion, numb lateral forearm</td><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\"><em>Muscle</em> for the biceps curl</td></tr>\n<tr><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\">Dorsal scapular</td><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\">Rhomboid / levator hypertrophy</td><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\">Medial border pain, scapular winging</td><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\"><em>D</em>orsal &rarr; rhomboi<em>D</em>s &rarr; wing</td></tr>\n<tr><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\">Median</td><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\">Carpal tunnel (MC); pronator teres; AIN</td><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\">Digits 1-3 paresthesia; weak OK sign</td><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\">Flick sign + cannot make \"OK\"</td></tr>\n<tr><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\">Ulnar</td><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\">Cubital tunnel (elbow); Guyon canal</td><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\">Claw hand, weak digit 4-5, Froment</td><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\">Funny bone &rarr; claw + Froment</td></tr>\n<tr><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\">Radial</td><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\">Spiral groove (Saturday night palsy)</td><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\">Wrist drop, dorsal hand numb</td><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\"><em>R</em>adial &rarr; <em>R</em>est arm over chair &rarr; wrist drop</td></tr>\n<tr><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\">Common peroneal</td><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\">Fibular head (MC lower-limb)</td><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\">Foot drop, cannot heel walk</td><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\"><em>PED</em> = Peroneal Everts + Dorsiflexes</td></tr>\n<tr><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\">Tibial</td><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\">Tarsal tunnel</td><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\">Weak plantarflexion, cannot toe walk</td><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\"><em>T</em>ibial &rarr; <em>T</em>arsal tunnel &rarr; <em>T</em>oe walk lost</td></tr>\n<tr><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\">Femoral</td><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\">Pelvic mass, childbirth, surgery</td><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\">Weak knee extension, numb anterior thigh</td><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\">Front of thigh kicks the ball</td></tr>\n<tr><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\">Obturator</td><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\">Pelvic trauma / mass</td><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\">Weak adduction, numb medial thigh</td><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\">Obturator &rarr; inner thigh squeeze</td></tr>\n<tr><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\">Lateral femoral cutaneous</td><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\">Inguinal ligament; tight belt, obesity</td><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\">Pure sensory burning, anterolateral thigh</td><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\">Meralgia &rarr; belt too tight, no weakness</td></tr>\n<tr><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\">Sciatic (piriformis)</td><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\">Piriformis hypertrophy / spasm</td><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\">Posterior thigh pain, hip prefers ER</td><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\">Piriformis pinches the posterior thigh</td></tr>\n<tr><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\">Superior cluneal</td><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\">Iliac crest; QL hypertrophy</td><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\">Pain along crest radiating to buttock</td><td style=\"border:1px solid rgba(0,0,0,0.2);padding:3px 5px\"><em>Cl</em>uneal &rarr; <em>Cr</em>est &rarr; buttock</td></tr>\n</tbody></table>"],
      ["A competitive gamer reports aching proximal volar forearm pain with numbness of the thumb, index, and middle fingers that worsens with repetitive pronation, and the numbness includes the thenar eminence. Which condition is most likely?", ["Carpal tunnel syndrome", "Anterior interosseous syndrome", "Guyon canal syndrome", "Pronator teres syndrome"], 3, "Pronator teres syndrome compresses the median nerve in the proximal forearm, causing pain with pronation plus sensory loss of digits 1-3 including the thenar eminence. Carpal tunnel spares thenar skin, anterior interosseous syndrome is purely motor, and Guyon canal involves the ulnar nerve.", "advanced"],
      ["After an anterior shoulder dislocation a patient cannot abduct the shoulder and has decreased sensation over the lateral shoulder. Which nerve is injured?", ["Axillary nerve", "Suprascapular nerve", "Musculocutaneous nerve", "Radial nerve"], 0, "The axillary nerve is injured with anterior dislocation or surgical-neck humerus fractures, causing deltoid weakness (lost abduction) and numbness over the lateral shoulder. The other nerves supply different territories.", "basic"],
      ["A volleyball player has deep posterior shoulder pain with weak abduction and external rotation, and imaging shows compression at the spinoglenoid notch. Which nerve is affected?", ["Axillary nerve", "Dorsal scapular nerve", "Suprascapular nerve", "Long thoracic nerve"], 2, "The suprascapular nerve passes the suprascapular and spinoglenoid notches and supplies supraspinatus and infraspinatus, so entrapment weakens abduction and external rotation. The other listed nerves do not supply these cuff muscles.", "advanced"],
      ["A recreational athlete develops lateral forearm numbness and weak elbow flexion after intense biceps training with a new heavy paddle. Which lesion is most likely?", ["Radial nerve compression at the groove", "Musculocutaneous nerve compression", "Median nerve compression at the wrist", "Ulnar nerve compression at the elbow"], 1, "The musculocutaneous nerve innervates the biceps, brachialis, and coracobrachialis and carries lateral forearm sensation, so overuse or compression produces weak elbow flexion with lateral forearm numbness. The other nerves supply different muscles and territories.", "advanced"],
      ["A bodybuilder who trains the upper body heavily presents with medial scapular border pain and mild scapular winging. Which nerve is most likely involved?", ["Axillary nerve", "Suprascapular nerve", "Musculocutaneous nerve", "Dorsal scapular nerve"], 3, "The dorsal scapular nerve supplies the rhomboids and levator scapulae; entrapment from hypertrophy or microtrauma causes medial scapular border pain and winging. The other nerves do not innervate the rhomboids.", "basic"],
      ["A patient awakens with wrist drop and numbness over the dorsum of the hand after sleeping with the arm draped over a chair. Compression at which site explains this?", ["Radial nerve at the spiral groove", "Ulnar nerve at the cubital tunnel", "Median nerve at the carpal tunnel", "Axillary nerve at the surgical neck"], 0, "Radial nerve compression at the spiral groove (Saturday night palsy) causes wrist drop from loss of wrist and finger extensors plus dorsal hand numbness. The other sites affect different nerves and functions.", "advanced"],
      ["An obese patient who wears a tight tool belt reports burning, purely sensory numbness over the anterolateral thigh with no weakness. Which nerve is entrapped?", ["Femoral nerve at the inguinal ligament", "Obturator nerve in the obturator canal", "Lateral femoral cutaneous nerve", "Common peroneal nerve at fibular head"], 2, "Entrapment of the lateral femoral cutaneous nerve beneath the inguinal ligament causes meralgia paresthetica: purely sensory burning over the anterolateral thigh from tight belts, obesity, or pregnancy. The femoral, obturator, and peroneal nerves all carry motor fibers.", "advanced"]
    ]],
    [2, "Classify ribs and diagnose rib somatic dysfunction, including muscle energy targets.", [
      ["A rib that attaches directly to the sternum through its own costal cartilage belongs to which group?", ["False ribs, ribs 8 through 10", "True ribs, ribs 1 through 7", "Floating ribs, ribs 11 and 12", "Atypical ribs, ribs 1 and 2"], 1, "True (vertebrosternal) ribs 1-7 attach to the sternum by their own costal cartilage. False ribs 8-10 attach indirectly to the cartilage above, floating ribs 11-12 have no anterior attachment, and 'atypical' refers to osseous features, not the anterior attachment.", "basic"],
      ["During dissection a rib is found to have no anterior attachment to the sternum or costal cartilage. Which ribs are these?", ["Ribs 1 through 7", "Ribs 8 through 10", "Ribs 9 through 12", "Ribs 11 and 12"], 3, "Floating ribs 11 and 12 have no anterior attachment. True ribs 1-7 attach to the sternum, false ribs 8-10 attach to the cartilage above, and the 9-12 grouping mixes false and floating ribs.", "basic"],
      ["A typical rib articulates with which vertebrae?", ["Its own vertebra and the one above", "Its own vertebra and the one below", "Only its own numbered vertebra", "Two vertebrae above its own level"], 0, "A typical rib head has two articulations: the vertebra of the same number and the vertebra one level above (e.g., rib 4 with T4 and T3). It does not articulate with the vertebra below or with only one vertebra.", "basic"],
      ["Trauma restricts rib 6 motion during inspiration. Which thoracic dimension is most likely decreased?", ["Anterior-posterior diameter", "Vertical diameter", "Transverse diameter", "Thoracic inlet diameter"], 2, "Ribs 6-10 move by bucket-handle motion, raising the lateral edge and increasing the transverse diameter, so restriction decreases transverse expansion. Pump-handle ribs (2-5) affect the anterior-posterior diameter.", "advanced"],
      ["A spinal cord injury impairs the muscles primarily responsible for forced expiration. Which muscle is most likely affected?", ["External intercostals", "Internal intercostals", "Levator costarum", "Diaphragm"], 1, "Forced expiration uses the internal and innermost intercostals plus abdominal muscles. The external intercostals and levator costarum assist inspiration, and the diaphragm is the primary inspiratory muscle.", "basic"],
      ["A patient reports sharp, pinprick pain near the costosternal junction that worsens during inhalation. The most accurate diagnosis is which dysfunction?", ["Pump handle inhalation dysfunction", "Bucket handle inhalation dysfunction", "Bucket handle exhalation dysfunction", "Pump handle exhalation dysfunction"], 3, "Sharp, pinprick pain at the costosternal junction localizes to a pump-handle rib. Dysfunctions are named for the position of ease, and pain on inhalation means restricted inhalation, so this is a pump-handle exhalation dysfunction. Bucket-handle dysfunctions give aching mid-axillary pain.", "advanced"],
      ["On the right, rib 1 moves superiorly during inhalation but fails to move inferiorly during exhalation. The most accurate diagnosis is which of the following?", ["Right rib 1 inhalation dysfunction", "Right rib 1 exhalation dysfunction", "Left rib 1 inhalation dysfunction", "Left rib 1 exhalation dysfunction"], 0, "A rib stuck inhaled moves up with inhalation but will not descend on exhalation, defining an inhalation dysfunction, named for the position of ease on the affected right side. Exhalation dysfunctions show the opposite restriction.", "advanced"],
      ["Muscle energy is planned for a pump-handle exhalation dysfunction of ribs 3 through 5. Which muscle is recruited to raise these ribs?", ["Serratus anterior", "Anterior scalene", "Pectoralis minor", "Quadratus lumborum"], 2, "For pump-handle exhalation dysfunctions the patient contracts the muscle that elevates the affected ribs: pectoralis minor for ribs 3-5. Serratus anterior treats ribs 6-10, the scalenes treat ribs 1-2, and quadratus lumborum treats ribs 11-12.", "advanced"]
    ]],

      ["A woman has severe hand pain with edema, color and sweating changes, and hyperesthesia after a crush injury, plus a documented median nerve transection. Which classification best fits?", ["CRPS type I", "Peripheral neuropathy", "Fibromyalgia", "CRPS type II"], 3, "CRPS type II occurs with identifiable major nerve damage such as a median nerve transection, whereas type I occurs without major nerve injury. Peripheral neuropathy and fibromyalgia do not explain the full vasomotor and sudomotor picture.", "advanced"],

      ["An occipitoatlantal somatic dysfunction prefers flexion. Which intrinsic muscle primarily controls this precise OA motion?", ["Longus colli, a typical cervical flexor", "Longus capitis, a typical cervical flexor", "Splenius capitis, a cervical extensor", "Rectus capitis anterior, an OA flexor"], 3, "Rectus capitis anterior and rectus capitis lateralis are intrinsic muscles controlling flexion specifically at the occipitoatlantal joint. Longus capitis and longus colli flex the typical cervicals (C2-C7), and splenius capitis is an extensor.", "advanced"],
      ["At the occipitoatlantal joint, how do sidebending and rotation occur relative to each other?", ["To opposite sides", "To the same side", "Rotation only, no sidebending", "Sidebending only, no rotation"], 0, "At the OA, sidebending and rotation always occur to opposite sides ('OA = Always Opposite'). The typical cervicals C2-C7 sidebend and rotate to the same side, and the AA is dominated by rotation.", "basic"],

      ["An older man has a broad-based unsteady gait, hand clumsiness, hyperreflexia, positive Babinski and Hoffmann, and shooting arm pain when flexing the chin to the chest. The most likely diagnosis is which condition?", ["Cervical myelopathy", "Cervical radiculopathy", "Lumbar spinal stenosis", "Central cord syndrome"], 0, "Broad-based gait, UMN signs (hyperreflexia, Babinski, Hoffmann), and the Lhermitte phenomenon indicate cervical myelopathy from cord compression. Radiculopathy is a nerve root problem without a broad-based gait, and the other options do not fit the cervical cord picture.", "advanced"],

      ["A patient has neck pain radiating to the middle finger with a reduced triceps reflex and a positive Spurling test. Which structural relationship explains this?", ["C7-T1 disc herniation compressing the root that exits below C7", "C6-C7 disc herniation compressing the root that exits above C7", "C5-C6 disc herniation compressing the root that exits above C6", "C4-C5 disc herniation compressing the root that exits above C5"], 1, "A C6-C7 disc herniation compresses the C7 root, which exits above the C7 vertebra, producing middle-finger symptoms and a reduced triceps reflex. In the cervical spine the root exits above its like-numbered vertebra (except C8).", "advanced"],
