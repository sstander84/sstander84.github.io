let RQ = null;
let RQ_CFG = null;

function fmtClock(sec){
  sec = Math.max(0, Math.round(sec));
  const m = Math.floor(sec/60), s = sec%60;
  return m + ":" + String(s).padStart(2,"0");
}
function openRandomMode(){
  const live = getLiveQuiz();
  RQ_CFG = {
    mode: "count",                       // 'count' | 'pomo'
    count: 20,
    minutes: 25,
    lectures: new Set(live.map(l=>l[0])) // all selected by default
  };
  document.getElementById("randomModeOverlay").classList.add("open");
  renderRandomSetup();
}
function closeRandomMode(){
  document.getElementById("randomModeOverlay").classList.remove("open");
  if(RQ && RQ.timerInt){ clearInterval(RQ.timerInt); RQ.timerInt = null; }
  RQ = null;
}
function renderRandomSetup(){
  const live = getLiveQuiz();
  const cfg = RQ_CFG;
  const countPresets = [10,20,30,50];
  const pomoPresets = [15,25,50];
  let avail = 0;
  live.forEach(([n,t,los])=>{ if(cfg.lectures.has(n)) los.forEach(([ln,lt,qs])=>avail+=qs.length); });

  const lecRows = live.map(([n,t,los])=>{
    let c = 0; los.forEach(([ln,lt,qs])=>c+=qs.length);
    const checked = cfg.lectures.has(n) ? "checked" : "";
    return `<label class="rq-lec-item"><input type="checkbox" data-lec="${n}" ${checked}><span>${n}. ${escapeHtml(t)}</span><span style="margin-left:auto;color:#64748b">${c}</span></label>`;
  }).join("");

  const countChips = countPresets.map(v=>`<button class="rq-chip ${cfg.mode==='count'&&cfg.count===v?'active':''}" data-count="${v}">${v}</button>`).join("")
    + `<button class="rq-chip ${cfg.mode==='count'&&cfg.count==='all'?'active':''}" data-count="all">All (${avail})</button>`;
  const pomoChips = pomoPresets.map(v=>`<button class="rq-chip ${cfg.mode==='pomo'&&cfg.minutes===v?'active':''}" data-min="${v}">${v} min</button>`).join("");

  let body;
  if(cfg.mode==='count'){
    body = `<div class="rq-section"><h3>How many questions?</h3>
      <div class="rq-chips">${countChips}</div>
      <input class="rq-manual" id="rqCountManual" type="number" min="1" placeholder="…or type a number">
    </div>`;
  } else {
    body = `<div class="rq-section"><h3>Pomodoro length</h3>
      <div class="rq-chips">${pomoChips}</div>
      <input class="rq-manual" id="rqMinManual" type="number" min="1" placeholder="…or type minutes">
      <div class="rq-pomo-note">Questions keep coming until the timer runs out — no lives, no per-question clock. When time's up you finish the current question, then see your review.</div>
    </div>`;
  }

  const w = document.getElementById("rqWrap");
  w.innerHTML = `
    <div class="fm-header">
      <div class="rq-title">🎲 Random Questions</div>
      <button class="fm-close" onclick="closeRandomMode()">Close</button>
    </div>
    <div class="rq-mode-tabs">
      <div class="rq-mode-tab ${cfg.mode==='count'?'active':''}" data-mode="count">By number of questions</div>
      <div class="rq-mode-tab ${cfg.mode==='pomo'?'active':''}" data-mode="pomo">Pomodoro timer</div>
    </div>
    ${body}
    <div class="rq-section">
      <h3>Filter by lecture</h3>
      <button class="rq-selectall" id="rqSelAll">Select all / none</button>
      <div class="rq-lec-grid">${lecRows}</div>
    </div>
    <button class="rq-start-btn" id="rqStart" ${avail===0?'disabled':''}>${avail===0?'Select at least one lecture':'START'}</button>
  `;

  w.querySelectorAll(".rq-mode-tab").forEach(t=>{
    t.onclick = ()=>{ cfg.mode = t.dataset.mode; renderRandomSetup(); };
  });
  w.querySelectorAll("[data-count]").forEach(c=>{
    c.onclick = ()=>{ cfg.mode='count'; cfg.count = c.dataset.count==='all'?'all':parseInt(c.dataset.count); renderRandomSetup(); };
  });
  w.querySelectorAll("[data-min]").forEach(c=>{
    c.onclick = ()=>{ cfg.mode='pomo'; cfg.minutes = parseInt(c.dataset.min); renderRandomSetup(); };
  });
  const cm = document.getElementById("rqCountManual");
  if(cm) cm.oninput = ()=>{ const v=parseInt(cm.value); if(v>0){ cfg.count=v; w.querySelectorAll("[data-count]").forEach(x=>x.classList.remove("active")); } };
  const mm = document.getElementById("rqMinManual");
  if(mm) mm.oninput = ()=>{ const v=parseInt(mm.value); if(v>0){ cfg.minutes=v; w.querySelectorAll("[data-min]").forEach(x=>x.classList.remove("active")); } };
  w.querySelectorAll("[data-lec]").forEach(cb=>{
    cb.onchange = ()=>{ const n=parseInt(cb.dataset.lec); if(cb.checked) cfg.lectures.add(n); else cfg.lectures.delete(n); renderRandomSetup(); };
  });
  document.getElementById("rqSelAll").onclick = ()=>{
    if(cfg.lectures.size === live.length) cfg.lectures.clear();
    else live.forEach(l=>cfg.lectures.add(l[0]));
    renderRandomSetup();
  };
  const startBtn = document.getElementById("rqStart");
  if(startBtn && avail>0) startBtn.onclick = startRandomRound;
}
function startRandomRound(){
  const cfg = RQ_CFG;
  const all = getAllQuestionsFlat().filter(it=>cfg.lectures.has(it.lecNum));
  if(all.length===0){ alert("No questions in the selected lectures."); return; }
  const pool = all.slice().sort(()=>Math.random()-0.5);   // shuffled — never in order
  const mode = cfg.mode;
  let queue;
  if(mode==='count'){
    const n = cfg.count==='all' ? pool.length : Math.min(cfg.count, pool.length);
    queue = pool.slice(0,n);
  } else {
    queue = pool.slice();
  }
  RQ = {
    cfg, mode, pool, queue, idx:0,
    answered:0, correct:0, streak:0, bestStreak:0,
    missed:[], results:{}, flagged:new Set(), byKey:{},
    secLeft: mode==='pomo' ? cfg.minutes*60 : 0,
    timeUp:false, timerInt:null, currentSh:null, currentItem:null
  };
  all.forEach(it=>{ RQ.byKey[it.key]=it; });
  if(mode==='pomo') RQ.timerInt = setInterval(rqTick, 1000);
  showRandomQuestion();
}
function rqRefill(){
  const more = RQ.pool.slice().sort(()=>Math.random()-0.5);
  RQ.queue = RQ.queue.concat(more);
}
function rqTick(){
  if(!RQ || RQ.mode!=='pomo') return;
  RQ.secLeft--;
  const c = document.getElementById("rqClock");
  if(RQ.secLeft<=0){
    clearInterval(RQ.timerInt); RQ.timerInt=null;
    RQ.timeUp=true;
    if(c) c.textContent = "⏰ Time's up";
    const nb = document.getElementById("rqNextBtn");
    if(nb){ nb.textContent="See Results →"; nb.onclick=()=>showRandomReview(); }
    return;
  }
  if(c) c.textContent = "⏳ " + fmtClock(RQ.secLeft);
}
function showRandomQuestion(){
  if(!RQ) return;
  if(RQ.mode==='count' && RQ.idx >= RQ.queue.length){ showRandomReview(); return; }
  if(RQ.mode==='pomo'){
    if(RQ.timeUp){ showRandomReview(); return; }
    if(RQ.idx >= RQ.queue.length) rqRefill();
  }
  const item = RQ.queue[RQ.idx];
  const [stem,opts,correctIdx,explanation,tag,imgHtml] = item.q;
  const cleaned = stripParens(opts);
  const sh = getShuffledOpts("rq_"+item.key+"_"+RQ.idx, cleaned, correctIdx);
  RQ.currentSh = sh; RQ.currentItem = item;
  const flagged = isFlagged(item.key);
  const progress = RQ.mode==='count' ? `Q ${RQ.idx+1} / ${RQ.queue.length}` : `Q ${RQ.idx+1}`;
  const clockHtml = RQ.mode==='pomo' ? `<span class="fm-clock" id="rqClock">⏳ ${fmtClock(RQ.secLeft)}</span>` : "";
  const w = document.getElementById("rqWrap");
  w.innerHTML = `
    <div class="fm-header">
      <div class="rq-title">🎲 Random Questions</div>
      <button class="fm-close" onclick="closeRandomMode()">Close</button>
    </div>
    <div class="fm-hud">
      <span>${progress}</span>
      <span>Correct: <b>${RQ.correct}</b> / ${RQ.answered}</span>
      <span class="rq-streak" id="rqStreak">🔥 Streak: <b>${RQ.streak}</b></span>
      ${clockHtml}
    </div>
    <div style="display:flex;justify-content:flex-end;margin-bottom:10px">
      <button class="fm-flag-btn ${flagged?'flagged':''}" id="rqFlagBtn">${flagged?'★ Flagged':'☆ Flag'}</button>
    </div>
    <div class="fm-q-stem">${escapeHtml(stem)}</div>
    ${imgHtml?`<div class="q-img">${imgHtml}</div>`:""}
    <div class="fm-q-opts" id="rqOpts">
      ${sh.opts.map((o,i)=>`<button class="fm-q-opt" data-pick="${i}">${"ABCD"[i]}. ${escapeHtml(o)}</button>`).join("")}
    </div>
    <div class="fm-explain" id="rqExplain">${escapeHtml(explanation)}</div>
  `;
  document.querySelectorAll("#rqOpts .fm-q-opt").forEach(b=>{
    b.onclick = ()=>handleRandomAnswer(parseInt(b.dataset.pick));
  });
  document.getElementById("rqFlagBtn").onclick = ()=>toggleRandomFlag();
}
function toggleRandomFlag(){
  if(!RQ || !RQ.currentItem) return;
  const key = RQ.currentItem.key;
  toggleFlag(key);                       // persists to global state.flagged
  const on = isFlagged(key);
  if(on) RQ.flagged.add(key); else RQ.flagged.delete(key);
  const btn = document.getElementById("rqFlagBtn");
  if(btn){ btn.classList.toggle("flagged", on); btn.textContent = on ? "★ Flagged" : "☆ Flag"; }
}
function handleRandomAnswer(pick){
  if(!RQ || !RQ.currentSh) return;
  const item = RQ.currentItem, sh = RQ.currentSh;
  document.querySelectorAll("#rqOpts .fm-q-opt").forEach(b=>b.classList.add("locked"));
  const isCorrect = pick === sh.correct;
  RQ.answered++;
  if(isCorrect){
    RQ.correct++;
    RQ.streak++;
    if(RQ.streak > RQ.bestStreak) RQ.bestStreak = RQ.streak;
  } else {
    RQ.streak = 0;
  }
  const stEl = document.getElementById("rqStreak");
  if(stEl){
    stEl.innerHTML = `🔥 Streak: <b>${RQ.streak}</b>`;
    if(isCorrect && RQ.streak>0){ stEl.classList.add("bump"); setTimeout(()=>stEl.classList.remove("bump"),180); }
  }
  RQ.results[item.key] = {pick, sh, correct:isCorrect};
  if(!isCorrect) RQ.missed.push({item, userPick:pick, shuffle:sh});
  document.querySelectorAll("#rqOpts .fm-q-opt").forEach((b,i)=>{
    if(i===sh.correct) b.classList.add("correct");
    else if(i===pick) b.classList.add("wrong");
  });
  document.getElementById("rqExplain").classList.add("shown");
  const c = document.getElementById("rqClock"); // keep showing live clock value
  if(c && RQ.mode==='pomo' && !RQ.timeUp) c.textContent = "⏳ " + fmtClock(RQ.secLeft);
  const isLast = (RQ.mode==='count' && RQ.idx+1 >= RQ.queue.length) || (RQ.mode==='pomo' && RQ.timeUp);
  const btn = document.createElement("button");
  btn.className = "fm-next-btn"; btn.id = "rqNextBtn";
  btn.textContent = isLast ? "See Results →" : "Next Question →";
  btn.onclick = isLast ? ()=>showRandomReview() : ()=>{ RQ.idx++; showRandomQuestion(); };
  const opts = document.getElementById("rqOpts");
  opts.parentNode.insertBefore(btn, opts.nextSibling);
  btn.focus();
}
function rqReviewCard(item, userPick, sh, num){
  const [stem,opts,correctIdx,explanation] = item.q;
  return `<div class="fm-review-q">
    <div class="fm-review-meta">Q${num} · Lecture ${item.lecNum}. ${escapeHtml(item.lecTitle)} · LO ${item.loNum}</div>
    <div class="fm-review-stem">${escapeHtml(stem)}</div>
    ${sh.opts.map((o,i)=>{
      let cls="fm-review-opt";
      if(i===sh.correct) cls+=" correct";
      else if(i===userPick) cls+=" userwrong";
      return `<div class="${cls}">${"ABCD"[i]}. ${escapeHtml(o)}</div>`;
    }).join("")}
    <div class="fm-review-explain">${escapeHtml(explanation)}</div>
  </div>`;
}
function showRandomReview(){
  if(RQ && RQ.timerInt){ clearInterval(RQ.timerInt); RQ.timerInt=null; }
  const w = document.getElementById("rqWrap");
  const pct = RQ.answered ? Math.round(100*RQ.correct/RQ.answered) : 0;
  let html = `
    <div class="fm-header">
      <div class="rq-title">🎲 Session Review</div>
      <button class="fm-close" onclick="closeRandomMode()">Close</button>
    </div>
    <div class="fm-stats-grid">
      <div class="fm-stat-box"><div class="fm-stat-num">${RQ.answered}</div><div class="fm-stat-label">Answered</div></div>
      <div class="fm-stat-box"><div class="fm-stat-num">${RQ.correct}</div><div class="fm-stat-label">Correct</div></div>
      <div class="fm-stat-box"><div class="fm-stat-num">${pct}%</div><div class="fm-stat-label">Accuracy</div></div>
      <div class="fm-stat-box"><div class="fm-stat-num">🔥 ${RQ.bestStreak}</div><div class="fm-stat-label">Best Streak</div></div>
    </div>`;

  html += `<div class="rq-section" style="margin-top:18px"><h3>Missed this session (${RQ.missed.length})</h3>`;
  if(RQ.missed.length===0){
    html += `<div style="font-size:13px;color:#94a3b8">Nothing missed — nice work. 🎯</div>`;
  } else {
    RQ.missed.forEach((m,idx)=>{ html += rqReviewCard(m.item, m.userPick, m.shuffle, idx+1); });
  }
  html += `</div>`;

  const flaggedKeys = [...RQ.flagged];
  html += `<div class="rq-section"><h3>Flagged this session (${flaggedKeys.length})</h3>`;
  if(flaggedKeys.length===0){
    html += `<div style="font-size:13px;color:#94a3b8">No questions flagged this session. Use ☆ Flag during a question to bookmark it here and in Review Flagged.</div>`;
  } else {
    flaggedKeys.forEach((key,idx)=>{
      const item = RQ.byKey[key]; if(!item) return;
      const res = RQ.results[key];
      const sh = res ? res.sh : getShuffledOpts("rqrev_"+key, stripParens(item.q[1]), item.q[2]);
      html += rqReviewCard(item, res?res.pick:-1, sh, idx+1);
    });
  }
  html += `</div>`;

  html += `<div class="fm-go-btns" style="margin-top:18px">
    <button class="fm-go-play" onclick="openRandomMode()">NEW SESSION</button>
    <button class="fm-go-back" onclick="closeRandomMode()">Back to Quiz</button>
  </div>`;
  w.innerHTML = html;
  renderSidebar();   // flags may have changed
}

// ============================================================
// RESET MODAL
// ============================================================
function openResetModal(){document.getElementById("resetModal").classList.add("open")}
function closeResetModal(){document.getElementById("resetModal").classList.remove("open")}
function resetProgressOnly(){
  if(!confirm("Reset all question progress, streak, and achievements? Your edits and added questions stay.")) return;
  state.answers = {}; state.achievements = {}; state.streak = 0; state.points = 0;
  state.shuffleCache = {};
  localStorage.removeItem(KEYS.answers);
  localStorage.removeItem(KEYS.achieve);
  closeResetModal();
  renderAll();
}
function resetAllToOriginal(){
  if(!confirm("⚠ This wipes EVERYTHING — answers, edits, additions, deletions, committed snapshot. Continue?")) return;
  Object.values(KEYS).forEach(k=>localStorage.removeItem(k));
  state.answers = {}; state.edits = {}; state.deleted = {}; state.added = {};
  state.achievements = {}; state.streak = 0; state.points = 0;
  state.shuffleCache = {};
  document.body.classList.remove("edit-mode");
  document.getElementById("btnEditMode").textContent = "Enter Edit Mode";
  closeResetModal();
  renderAll();
}

// ============================================================
// RENDER ALL
// ============================================================
function renderAll(){
  renderSidebar();
  if(state.reviewMode){
    renderReviewView();
  } else {
    renderMain();
  }
  renderHdrStats();
  renderRSidebar();
}

// ============================================================
// WIRE HEADER
// ============================================================
document.getElementById("btnFastMode").onclick = openFastMode;
document.getElementById("btnHideSidebar").onclick = ()=>{
  document.body.classList.toggle("rsidebar-hidden");
  localStorage.setItem(KEYS.rsidebar, document.body.classList.contains("rsidebar-hidden") ? "1" : "0");
};
document.getElementById("btnEditMode").onclick = ()=>{
  document.body.classList.toggle("edit-mode");
  const on = document.body.classList.contains("edit-mode");
  document.getElementById("btnEditMode").textContent = on ? "Exit Edit Mode" : "Enter Edit Mode";
  localStorage.setItem(KEYS.editmode, on ? "1" : "0");
};
document.getElementById("btnCommit").onclick = commitChanges;
document.getElementById("btnDownload").onclick = downloadChanges;
document.getElementById("btnReview").onclick = ()=>{
  if(state.reviewMode==='incorrect') exitReviewMode(); else enterReviewMode('incorrect');
};
document.getElementById("btnFlagged").onclick = ()=>{
  if(state.reviewMode==='flagged') exitReviewMode(); else enterReviewMode('flagged');
};
document.getElementById("btnRandomMode").onclick = openRandomMode;
document.getElementById("reviewExit").onclick = exitReviewMode;
document.getElementById("btnReset").onclick = openResetModal;
document.getElementById("resetProgress").onclick = resetProgressOnly;
document.getElementById("resetAll").onclick = resetAllToOriginal;
document.getElementById("resetCancel").onclick = closeResetModal;
document.getElementById("resetModal").onclick = (e)=>{ if(e.target.id==="resetModal") closeResetModal(); };

// ============================================================
// BOOT
// ============================================================
renderAll();
startFactTicker();

</script>
