<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPP III — Sam's Quiz</title>
<style>
:root{
  --bg:#f5f7fa;--surface:#ffffff;--border:#e2e8f0;--text:#1a202c;--muted:#64748b;
  --primary:#166534;--primary-light:#dcfce7;--primary-dark:#14532d;
  --correct:#16a34a;--correct-bg:#dcfce7;
  --wrong:#dc2626;--wrong-bg:#fee2e2;
  --accent:#f59e0b;--accent-light:#fef3c7;
  --shadow:0 1px 3px rgba(0,0,0,0.05),0 1px 2px rgba(0,0,0,0.03);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;position:sticky;top:0;z-index:50;box-shadow:var(--shadow)}
.hdr-row{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.hdr-title{font-size:20px;font-weight:700;color:var(--primary)}
.hdr-stats{font-size:13px;color:var(--muted);display:flex;gap:14px;flex-wrap:wrap}
.hdr-stats b{color:var(--text);font-weight:600}
.hdr-btns{display:flex;gap:8px;flex-wrap:wrap}
.btn{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:7px 13px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.btn:hover{background:var(--bg);border-color:var(--muted)}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:hover{background:var(--primary-dark)}
.btn-amber{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-amber:hover{background:#d97706}
.btn-danger{background:var(--wrong);color:#fff;border-color:var(--wrong)}
.btn-danger:hover{background:#b91c1c}
.btn-fast{background:linear-gradient(135deg,#f59e0b 0%,#ef4444 100%);color:#fff;border:none;animation:pulse-fast 2s ease-in-out infinite;font-weight:600}
@keyframes pulse-fast{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(245,158,11,.5)}50%{transform:scale(1.03);box-shadow:0 0 0 6px rgba(245,158,11,0)}}
.edit-only{display:none}
body.edit-mode .edit-only{display:inline-block}
body.review-mode .review-banner{display:flex}

.layout{display:grid;grid-template-columns:240px 1fr 280px;gap:0;min-height:calc(100vh - 60px)}
body.rsidebar-hidden .layout{grid-template-columns:240px 1fr}
body.rsidebar-hidden aside.rsidebar{display:none}

nav.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:18px 0;overflow-y:auto;max-height:calc(100vh - 60px);position:sticky;top:60px}
.sb-section{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:600;padding:0 18px 8px}
.sb-item{display:block;padding:9px 18px;cursor:pointer;font-size:13px;border-left:3px solid transparent;transition:background .12s}
.sb-item:hover{background:var(--bg)}
.sb-item.active{background:var(--primary-light);border-left-color:var(--primary);color:var(--primary-dark);font-weight:600}
.sb-item-title{display:block}
.sb-item-count{font-size:11px;color:var(--muted);margin-top:2px}
.sb-item.active .sb-item-count{color:var(--primary-dark)}

main{padding:24px 28px;max-width:900px;width:100%}
.lec-head{margin-bottom:16px}
.lec-title{font-size:24px;font-weight:700;color:var(--text);margin-bottom:4px}
.lec-sub{font-size:13px;color:var(--muted)}

.topic-score{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:18px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow)}
.score-bar-wrap{flex:1;height:8px;background:var(--bg);border-radius:99px;overflow:hidden}
.score-bar-fill{height:100%;background:linear-gradient(90deg,var(--primary) 0%,var(--correct) 100%);width:0%;transition:width .4s}
.score-text{font-size:13px;color:var(--muted);font-weight:500;min-width:90px;text-align:right}
.reset-lec-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:5px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-weight:500}
.reset-lec-btn:hover{background:var(--wrong-bg);border-color:var(--wrong);color:var(--wrong)}

.lo-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:18px;overflow:hidden;box-shadow:var(--shadow)}
.lo-head{padding:14px 18px;display:flex;align-items:flex-start;justify-content:space-between;gap:14px;background:linear-gradient(135deg,#f0fdf4 0%,#fff 80%);border-bottom:1px solid var(--border)}
.lo-text{font-size:14px;font-weight:500;color:var(--text);flex:1}
.lo-num{display:inline-block;background:var(--primary);color:#fff;font-size:11px;font-weight:600;padding:2px 7px;border-radius:5px;margin-right:8px;vertical-align:middle}
.lo-answer-btn{background:var(--primary);color:#fff;border:none;padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.lo-answer-btn:hover{background:var(--primary-dark)}
.lo-answer-panel{display:none;padding:14px 18px;background:linear-gradient(135deg,#ecfccb 0%,#f0fdf4 100%);border-bottom:1px solid var(--border);font-size:13.5px;line-height:1.6;color:var(--text)}
.lo-answer-panel.open{display:block}
.lo-questions{padding:14px 18px}

.q-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:12px}
.q-meta{font-size:11px;color:var(--muted);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.q-tag{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:.5px}
.q-tag.basic{background:#dbeafe;color:#1e40af}
.q-tag.advanced{background:var(--accent-light);color:#92400e}
.q-stem{font-size:14.5px;margin-bottom:12px;font-weight:500;line-height:1.55}
.q-img{margin:10px 0;text-align:center}
.q-img img{max-width:100%;border-radius:6px;border:1px solid var(--border)}
.q-opts{display:flex;flex-direction:column;gap:7px;margin-bottom:10px}
.q-opt{padding:9px 13px;border:1px solid var(--border);border-radius:7px;background:var(--surface);cursor:pointer;font-size:13.5px;transition:all .12s;display:flex;gap:9px;align-items:flex-start}
.q-opt:hover:not(.locked){background:var(--bg);border-color:var(--primary)}
.q-opt.locked{cursor:default}
.q-opt.correct{background:var(--correct-bg);border-color:var(--correct);color:#14532d;font-weight:500}
.q-opt.wrong{background:var(--wrong-bg);border-color:var(--wrong);color:#7f1d1d}
.q-opt.dim{opacity:.5}
.opt-letter{font-weight:700;color:var(--muted);min-width:18px}
.q-opt.correct .opt-letter{color:var(--correct)}
.q-opt.wrong .opt-letter{color:var(--wrong)}
.q-explain{background:var(--bg);border-left:3px solid var(--primary);padding:11px 14px;font-size:13px;line-height:1.6;border-radius:5px;margin-top:10px;display:none}
.q-explain.shown{display:block}

.q-edit-row{display:flex;gap:6px;margin-top:8px}
.q-edit-row .btn{font-size:11px;padding:4px 9px}
.add-q-btn{width:100%;padding:11px;background:transparent;border:2px dashed var(--border);color:var(--muted);border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;margin-top:8px}
.add-q-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.empty-lo{padding:18px;background:var(--bg);border:2px dashed var(--border);border-radius:8px;color:var(--muted);font-size:13px;font-style:italic;text-align:center}

.lec-nav{display:flex;justify-content:space-between;margin-top:24px;gap:12px}
.lec-nav .btn{flex:1;text-align:center;padding:11px}

aside.rsidebar{background:var(--surface);border-left:1px solid var(--border);padding:18px;overflow-y:auto;max-height:calc(100vh - 60px);position:sticky;top:60px}
.rs-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px;box-shadow:var(--shadow)}
.rs-card h4{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:10px;font-weight:600}
.hand-card{text-align:center}
.hand-emoji{font-size:48px;display:inline-block;animation:none}
.hand-card.warm .hand-emoji{animation:warm 1.6s ease-in-out infinite}
.hand-card.hot .hand-emoji{animation:warm 1s ease-in-out infinite}
.hand-card.fire .hand-emoji{animation:warm .7s ease-in-out infinite;filter:drop-shadow(0 0 6px #f59e0b)}
@keyframes warm{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}
.hand-zone{font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--primary);margin-top:6px;text-transform:uppercase}
.hand-points{font-size:24px;font-weight:700;color:var(--text);margin-top:4px}

.streak-card .flame{font-size:32px;display:inline-block;filter:grayscale(.8)}
.streak-card.active .flame{filter:none;animation:flicker .8s ease-in-out infinite}
@keyframes flicker{0%,100%{transform:rotate(-3deg) scale(1)}50%{transform:rotate(3deg) scale(1.08)}}
.streak-card .row{display:flex;justify-content:space-between;align-items:center}
.streak-num{font-size:22px;font-weight:700;color:var(--text)}
.streak-meter{height:6px;background:var(--bg);border-radius:99px;overflow:hidden;margin-top:8px}
.streak-meter-fill{height:100%;background:linear-gradient(90deg,#f59e0b 0%,#ef4444 100%);width:0%;transition:width .3s}
.streak-hint{font-size:11px;color:var(--muted);margin-top:4px;text-align:center}

.badges{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.badge{padding:7px 6px;background:var(--bg);border-radius:6px;text-align:center;opacity:.35;font-size:11px;border:1px solid var(--border);transition:all .25s}
.badge.earned{opacity:1;background:var(--primary-light);border-color:var(--primary);color:var(--primary-dark);font-weight:600;animation:pop .5s ease-out}
@keyframes pop{0%{transform:scale(.7)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
.badge-icon{display:block;font-size:18px;margin-bottom:2px}

.fact-card{background:linear-gradient(135deg,#dcfce7 0%,#fef3c7 100%);border:none}
.fact-card h4{color:var(--primary-dark)}
.fact-text{font-size:13px;line-height:1.5;color:var(--text);transition:opacity .4s}

.floating-plus-one{position:fixed;font-size:24px;font-weight:800;color:var(--correct);pointer-events:none;z-index:200;animation:floatUp 1.3s ease-out forwards}
@keyframes floatUp{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-80px);opacity:0}}

.reset-modal-overlay,.fastmode-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.reset-modal-overlay.open,.fastmode-overlay.open{display:flex}
.reset-modal{background:var(--surface);border-radius:14px;padding:26px;max-width:440px;width:100%;box-shadow:0 20px 40px rgba(0,0,0,.2)}
.reset-modal h3{font-size:18px;margin-bottom:6px;color:var(--text)}
.reset-modal p{font-size:13px;color:var(--muted);margin-bottom:18px}
.reset-modal .opt{display:block;width:100%;text-align:left;background:var(--bg);border:1px solid var(--border);padding:13px 14px;margin-bottom:10px;border-radius:8px;cursor:pointer;font-size:13.5px}
.reset-modal .opt:hover{border-color:var(--primary);background:var(--primary-light)}
.reset-modal .opt b{display:block;color:var(--text);margin-bottom:3px}
.reset-modal .opt span{color:var(--muted);font-size:12px}
.reset-modal .cancel{width:100%;background:transparent;border:none;color:var(--muted);padding:8px;cursor:pointer;font-size:13px;margin-top:4px}

/* Review mode banner */
.review-banner{display:none;background:linear-gradient(135deg,var(--primary) 0%,var(--primary-dark) 100%);color:#fff;padding:13px 18px;border-radius:10px;margin-bottom:18px;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap}
.review-banner-title{font-weight:700;font-size:14px}
.review-banner-stats{font-size:12px;opacity:.9}
.review-banner .btn{background:#fff;color:var(--primary)}
.review-lec-h{font-size:16px;font-weight:700;color:var(--primary);margin:18px 0 10px;padding-bottom:6px;border-bottom:2px solid var(--primary-light)}
.review-q-meta{font-size:11px;color:var(--muted);margin-bottom:6px;font-weight:500}
.try-again-btn{background:linear-gradient(135deg,var(--primary) 0%,var(--correct) 100%);color:#fff;border:none;padding:8px 16px;border-radius:99px;font-size:12px;font-weight:600;cursor:pointer;margin-top:8px}
.try-again-btn:hover{filter:brightness(1.1)}
.empty-review{padding:40px;text-align:center;background:var(--surface);border:2px dashed var(--border);border-radius:12px;color:var(--muted);font-size:14px}

/* FAST MODE */
.fm-wrap{background:#0f172a;color:#fff;width:100%;max-width:760px;border-radius:14px;padding:24px;position:relative;max-height:90vh;overflow-y:auto}
.fm-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid #1e293b}
.fm-title{font-size:20px;font-weight:700;background:linear-gradient(135deg,#f59e0b 0%,#ef4444 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.fm-close{background:transparent;border:1px solid #334155;color:#cbd5e1;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px}
.fm-rules{font-size:14px;line-height:1.8}
.fm-rules ul{list-style:none;padding:0;margin:14px 0}
.fm-rules li{padding:8px 12px;background:#1e293b;border-radius:7px;margin-bottom:6px}
.fm-start-btn{display:block;width:100%;padding:14px;background:linear-gradient(135deg,#f59e0b 0%,#ef4444 100%);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;margin-top:14px}
.fm-start-btn:hover{filter:brightness(1.1)}
.fm-hud{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-size:13px;flex-wrap:wrap;gap:10px}
.fm-hud b{font-size:18px}
.fm-timer-bar{height:6px;background:#1e293b;border-radius:99px;overflow:hidden;margin-bottom:18px}
.fm-timer-fill{height:100%;background:linear-gradient(90deg,#16a34a 0%,#f59e0b 50%,#ef4444 100%);width:100%;transition:width .25s linear}
.fm-timer-fill.urgent{animation:pulseUrgent .4s ease-in-out infinite}
@keyframes pulseUrgent{0%,100%{opacity:1}50%{opacity:.4}}
.fm-q-stem{font-size:18px;font-weight:500;margin-bottom:18px;line-height:1.55}
.fm-q-opts{display:flex;flex-direction:column;gap:8px}
.fm-q-opt{padding:13px 16px;background:#1e293b;border:1px solid #334155;color:#fff;border-radius:8px;cursor:pointer;font-size:14.5px;text-align:left;transition:all .15s}
.fm-q-opt:hover:not(.locked){background:#334155;border-color:#475569}
.fm-q-opt.correct{background:rgba(22,163,74,.3);border-color:#16a34a}
.fm-q-opt.wrong{background:rgba(220,38,38,.3);border-color:#dc2626}
.fm-q-opt.locked{cursor:default}
.fm-explain{margin-top:14px;padding:12px;background:#1e293b;border-left:3px solid #f59e0b;font-size:13px;line-height:1.6;border-radius:5px;display:none}
.fm-explain.shown{display:block}
.fm-burst{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:5}
.fm-burst-content{background:linear-gradient(135deg,#f59e0b 0%,#ef4444 100%);color:#fff;padding:18px 36px;border-radius:14px;font-size:24px;font-weight:800;letter-spacing:1px;animation:burstIn .8s ease-out forwards;box-shadow:0 0 30px rgba(245,158,11,.6)}
@keyframes burstIn{0%{transform:scale(.4) rotate(-10deg);opacity:0}40%{transform:scale(1.2) rotate(5deg);opacity:1}100%{transform:scale(1) rotate(0);opacity:0}}
.fm-gameover{text-align:center}
.fm-gameover h2{font-size:32px;color:#ef4444;margin-bottom:14px}
.fm-stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:18px 0}
.fm-stat-box{background:#1e293b;border-radius:8px;padding:14px}
.fm-stat-num{font-size:22px;font-weight:700;color:#f59e0b}
.fm-stat-label{font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
.fm-go-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.fm-go-btns button{flex:1;min-width:140px;padding:12px;border-radius:8px;border:none;font-weight:600;cursor:pointer;font-size:13px}
.fm-go-play{background:linear-gradient(135deg,#f59e0b 0%,#ef4444 100%);color:#fff}
.fm-go-review{background:#475569;color:#fff}
.fm-go-back{background:#1e293b;color:#cbd5e1;border:1px solid #334155}

.fm-review-q{background:#1e293b;border-radius:10px;padding:14px;margin-bottom:12px}
.fm-review-meta{font-size:11px;color:#94a3b8;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.fm-review-stem{font-size:14px;color:#fff;margin-bottom:10px;font-weight:500}
.fm-review-opt{padding:9px 13px;border-radius:7px;font-size:13px;margin-bottom:5px;background:#0f172a;border:1px solid #334155;color:#cbd5e1}
.fm-review-opt.correct{background:rgba(22,163,74,.3);border-color:#16a34a;color:#fff;font-weight:500}
.fm-review-opt.userwrong{background:rgba(220,38,38,.3);border-color:#dc2626;color:#fff;font-weight:500}
.fm-review-explain{margin-top:10px;padding:10px;background:#0f172a;border-left:3px solid #f59e0b;font-size:12.5px;color:#cbd5e1;line-height:1.55;border-radius:5px}
.fm-review-tag{display:inline-block;font-size:10px;font-weight:700;padding:1px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:.5px;margin-left:8px}
.fm-review-tag.miss{background:rgba(220,38,38,.3);color:#fca5a5}
.fm-review-tag.flag{background:rgba(245,158,11,.3);color:#fde68a}

/* Random mode button */
.btn-random{background:linear-gradient(135deg,#6366f1 0%,#8b5cf6 100%);color:#fff;border:none;font-weight:600}
.btn-random:hover{filter:brightness(1.08)}

/* Flag button on cards */
.q-meta-right{display:flex;align-items:center;gap:8px}
.q-flag{background:transparent;border:1px solid var(--border);color:var(--muted);padding:2px 10px;border-radius:99px;font-size:11px;cursor:pointer;font-weight:600;transition:all .12s}
.q-flag:hover{border-color:var(--accent);color:var(--accent)}
.q-flag.flagged{background:var(--accent-light);border-color:var(--accent);color:#92400e}

/* Fast/Random Next + in-overlay flag */
.fm-next-btn{display:block;width:100%;padding:13px;margin-top:16px;background:linear-gradient(135deg,#f59e0b 0%,#ef4444 100%);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer}
.fm-next-btn:hover{filter:brightness(1.1)}
.fm-flag-btn{background:transparent;border:1px solid #334155;color:#cbd5e1;padding:5px 13px;border-radius:99px;cursor:pointer;font-size:12px;font-weight:600}
.fm-flag-btn:hover{border-color:#f59e0b}
.fm-flag-btn.flagged{background:rgba(245,158,11,.25);border-color:#f59e0b;color:#fde68a}

/* Random mode setup */
.rq-title{font-size:20px;font-weight:700;background:linear-gradient(135deg,#818cf8 0%,#c084fc 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.rq-section{margin-bottom:18px}
.rq-section h3{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:#94a3b8;margin-bottom:10px}
.rq-chips{display:flex;flex-wrap:wrap;gap:8px}
.rq-chip{padding:9px 15px;background:#1e293b;border:1px solid #334155;color:#e2e8f0;border-radius:99px;cursor:pointer;font-size:13px;font-weight:600;transition:all .12s}
.rq-chip:hover{border-color:#475569}
.rq-chip.active{background:linear-gradient(135deg,#6366f1 0%,#8b5cf6 100%);border-color:transparent;color:#fff}
.rq-mode-tabs{display:flex;gap:8px;margin-bottom:16px}
.rq-mode-tab{flex:1;padding:12px;background:#1e293b;border:1px solid #334155;color:#cbd5e1;border-radius:9px;cursor:pointer;font-size:13.5px;font-weight:700;text-align:center}
.rq-mode-tab.active{background:#0f172a;border-color:#8b5cf6;color:#c4b5fd}
.rq-manual{width:100%;padding:10px 12px;background:#0f172a;border:1px solid #334155;color:#fff;border-radius:8px;font-size:14px;margin-top:10px}
.rq-manual::placeholder{color:#64748b}
.rq-lec-grid{display:grid;grid-template-columns:1fr;gap:6px;max-height:190px;overflow-y:auto;padding-right:4px}
.rq-lec-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#1e293b;border:1px solid #334155;border-radius:7px;cursor:pointer;font-size:13px;color:#e2e8f0}
.rq-lec-item input{width:16px;height:16px;accent-color:#8b5cf6;cursor:pointer}
.rq-selectall{background:transparent;border:none;color:#a5b4fc;font-size:12px;cursor:pointer;font-weight:600;margin-bottom:8px;padding:2px 0}
.rq-start-btn{display:block;width:100%;padding:15px;background:linear-gradient(135deg,#6366f1 0%,#8b5cf6 100%);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px}

#randomModeOverlay .fm-review-q{background:var(--surface);border:1px solid var(--border)}
#randomModeOverlay .fm-review-meta{color:var(--muted)}
#randomModeOverlay .fm-review-stem{color:var(--text)}
#randomModeOverlay .fm-review-opt{background:var(--bg);border:1px solid var(--border);color:var(--text)}

        <span><b id="hsAnswered">0</b> answered</span>
        <span><b id="hsCorrect">0</b> correct</span>
        <span><b id="hsAccuracy">—</b> accuracy</span>
      </div>
    </div>
    <div class="hdr-btns">
      <button class="btn btn-fast" id="btnFastMode">⚡ Fast Mode</button>
      <button class="btn btn-random" id="btnRandomMode">🎲 Random Questions</button>
      <button class="btn" id="btnHideSidebar">Hide Sidebar</button>
      <button class="btn" id="btnEditMode">Enter Edit Mode</button>
      <button class="btn btn-primary edit-only" id="btnCommit">Commit Changes</button>
      <button class="btn btn-primary edit-only" id="btnDownload">Download Changes</button>
      <button class="btn" id="btnReview">Review Incorrect</button>
      <button class="btn" id="btnFlagged">Review Flagged</button>
      <button class="btn btn-danger" id="btnReset">Reset</button>
    </div>
  </div>
</header>

<div class="layout">

  <main id="main">

      </div>
      <button class="btn" id="reviewExit">Exit Review</button>
    </div>
    <div id="mainContent"></div>
  </main>

  <aside class="rsidebar" id="rsidebar">
    <div class="rs-card hand-card" id="handCard">
      <h4>Palpation Skills</h4>

      <div class="hand-zone" id="handZone">COLD HANDS</div>
      <div class="hand-points" id="handPoints">0</div>

    <div class="rs-card streak-card" id="streakCard">

      <h4>Achievements</h4>

    <button class="opt" id="resetProgress"><b>Reset Question Progress Only</b><span>Clears answers, streak, achievements. Keeps your edits and added questions.</span></button>
    <button class="opt" id="resetAll"><b>Reset Everything to Original</b><span>Wipes everything back to the file's baseline. All edits and added questions are lost.</span></button>
    <button class="cancel" id="resetCancel">Cancel</button>

</div>

<script>
// ============================================================
// QUIZ DATA — edit between QUIZ_START and QUIZ_END
// ============================================================
// QUIZ_START
const QUIZ = [
  [1, "Entrapment Neuropathies", [
    [1, "Identify the etiology and clinical presentation of common entrapment neuropathies (suprascapular, axillary, musculocutaneous, dorsal scapular, median, ulnar, radial, sciatic, superior cluneal, obturator, peroneal, femoral, lateral femoral cutaneous, tibial nerves)", [
      ["A 52-year-old woman reports nighttime numbness and tingling in her thumb, index, and middle fingers, with relief by shaking the hand. Which nerve is most likely entrapped?", ["Median nerve at the carpal tunnel", "Ulnar nerve at the cubital tunnel", "Radial nerve at the spiral groove", "Musculocutaneous nerve at the elbow"], 0, "Carpal tunnel syndrome is the most common upper extremity entrapment, presenting with nocturnal paresthesias in the median distribution (thumb, index, middle, and the lateral half of the ring finger) and the classic flick sign for relief. Ulnar entrapment at the cubital tunnel produces small finger and medial ring finger symptoms, not thumb/index. Radial spiral-groove injury causes wrist drop, not nocturnal sensory symptoms. Musculocutaneous compression produces lateral forearm sensory loss, not hand paresthesias.", "basic"],
      ["A welder presents with numbness along the small finger and the ulnar half of the ring finger, worse when his elbow is bent for prolonged periods. The most likely site of compression is:", ["Guyon canal at the wrist", "Cubital tunnel at the elbow", "Arcade of Frohse in the forearm", "Carpal tunnel at the wrist"], 1, "Ulnar entrapment at the cubital tunnel is the most common site for ulnar neuropathy and is worsened by prolonged elbow flexion that stretches the nerve. Guyon canal entrapment is less common and typically spares dorsal hand sensation. The arcade of Frohse compresses the posterior interosseous branch of the radial nerve. Carpal tunnel causes median symptoms in digits 1 through 3.", "basic"],
      ["After prolonged leg crossing during a long flight, a patient develops weakness in dorsiflexion and numbness over the dorsum of the foot. The nerve most likely affected is:", ["Tibial nerve at the tarsal tunnel", "Sciatic nerve at the sciatic notch", "Common peroneal nerve at the fibular head", "Lateral femoral cutaneous nerve at the inguinal ligament"], 2, "The common peroneal nerve wraps superficially around the fibular head and is highly susceptible to external compression, producing foot drop and dorsal foot numbness. Tarsal tunnel entrapment affects plantar foot sensation. Sciatic compression produces a broader motor and sensory deficit including the hamstrings. LFC compression causes anterolateral thigh sensory loss without motor weakness.", "basic"],
      ["A patient cannot form a circle (the OK sign) with the thumb and index finger because the distal interphalangeal joints will not flex. Sensation is fully intact throughout the hand. The most likely lesion is:", ["Anterior interosseous nerve compression", "Carpal tunnel syndrome at the wrist", "Pronator teres syndrome at the elbow", "Posterior interosseous nerve compression"], 0, "The anterior interosseous nerve is a purely motor branch of the median nerve supplying FPL and FDP to digits 2 and 3, so its compression produces a pure motor deficit (no sensory loss) with inability to flex the thumb IP and index DIP joints. Carpal tunnel causes sensory symptoms in the thenar distribution. Pronator teres syndrome causes proximal forearm pain plus thenar sensory loss. The posterior interosseous nerve is a motor branch of the radial nerve and causes wrist and finger extensor weakness.", "advanced"],
      ["A 35-year-old long-distance runner has buttock pain that worsens after sitting and radiates down the posterior thigh. Internal rotation of the hip is decreased and reproduces the pain. The most likely diagnosis is:", ["Piriformis syndrome with sciatic irritation", "Hamstring syndrome at the ischial tuberosity", "Superior cluneal nerve entrapment at iliac crest", "Common peroneal neuropathy at fibular head"], 0, "Piriformis syndrome compresses the sciatic nerve as it passes the piriformis muscle, producing buttock pain worse with sitting, radiation down the posterior thigh, and a positive FAIR test (flexion, adduction, internal rotation). Hamstring syndrome triad includes pain with sitting, pain on resisted knee flexion at 90 degrees of hip flexion, and tenderness at the ischial tuberosity. Superior cluneal entrapment causes pain along the iliac crest without sciatic radiation. Common peroneal compression occurs at the fibular head and produces foot drop, not buttock pain.", "advanced"],
      ["A 35-year-old new mother presents 6 weeks postpartum with weakness of hip flexion and knee extension on the right, plus sensory loss over the anterior thigh and medial leg. Patellar reflex is diminished on the right. The MOST likely cause is:", ["Acute L5 radiculopathy from a herniated lumbar disc", "Femoral neuropathy from lithotomy positioning during delivery", "Sciatic neuropathy from piriformis muscle hypertrophy", "Meralgia paresthetica from a tight belt or waistband"], 1, "Femoral nerve injury from prolonged lithotomy positioning, instrumented delivery, or pelvic surgery is a recognized obstetric complication producing weak hip flexion (iliopsoas), weak knee extension (quadriceps), decreased patellar reflex, and anteromedial leg sensory loss. L5 radiculopathy affects dorsiflexion/EHL with dorsal foot sensation. Sciatic compression produces posterior thigh symptoms. Meralgia paresthetica is purely sensory in the lateral thigh.", "advanced"],
      ["A 28-year-old patient presents with weakness lifting heavy objects overhead and difficulty actively externally rotating the shoulder. MRI shows a paralabral cyst at the spinoglenoid notch. The MOST likely nerve compressed is:", ["Axillary nerve within the quadrilateral space", "Suprascapular nerve at the spinoglenoid notch", "Long thoracic nerve along the lateral chest wall", "Musculocutaneous nerve at the level of the elbow"], 1, "Spinoglenoid notch compression of the suprascapular nerve affects only the infraspinatus branch (sparing supraspinatus, which is supplied proximally at the suprascapular notch) — producing isolated external rotation weakness. Suprascapular notch compression would affect BOTH supraspinatus and infraspinatus. Axillary nerve injury causes deltoid/teres minor weakness with lateral shoulder numbness. Long thoracic nerve injury causes scapular winging. Musculocutaneous injury affects elbow flexion and lateral forearm sensation.", "advanced"],
      ["A 45-year-old presents with weakness of finger and thumb extension at the MCP joints, but wrist extension is preserved. Sensation is fully intact. The MOST likely lesion is:", ["Radial nerve compression at the spiral groove", "Posterior interosseous nerve at the arcade of Frohse", "Anterior interosseous nerve in the proximal forearm", "Carpal tunnel syndrome with motor involvement"], 1, "PIN syndrome compresses the deep motor branch of the radial nerve in the proximal forearm (often at the arcade of Frohse) — producing finger/thumb extension weakness at the MCP joints with SPARED wrist extension (since the ECRL is innervated proximal to the lesion) and NO sensory deficit (PIN is pure motor). Spiral groove radial injury causes wrist drop with sensory loss. Anterior interosseous syndrome affects thumb IP and index DIP flexion (inability to form OK sign). Carpal tunnel produces median sensory symptoms in digits 1-3.", "advanced"],
      ["A patient sustains an anterior shoulder dislocation and afterward has numbness over the lateral shoulder and difficulty abducting the arm. The nerve most likely injured is the:", ["Axillary nerve at the surgical neck of the humerus", "Suprascapular nerve at the suprascapular notch", "Long thoracic nerve along the chest wall", "Dorsal scapular nerve near the rhomboids"], 0, "The axillary nerve wraps around the surgical neck of the humerus and is injured by anterior dislocation or proximal humeral fracture, producing deltoid weakness and a patch of lateral shoulder numbness over the regimental badge area. The suprascapular nerve weakens external rotation and abduction initiation but spares lateral shoulder sensation. The long thoracic nerve causes scapular winging. The dorsal scapular nerve affects the rhomboids and medial scapular border.", "basic"],
      ["A patient has weak elbow flexion and reduced sensation along the lateral forearm after a difficult shoulder reduction. Which nerve is most likely affected?", ["The musculocutaneous nerve in the upper arm", "The radial nerve within the spiral groove", "The median nerve at the carpal tunnel", "The ulnar nerve through the cubital tunnel"], 0, "The musculocutaneous nerve supplies the biceps and brachialis and continues as the lateral antebrachial cutaneous nerve, so its injury weakens elbow flexion and numbs the lateral forearm. Radial spiral groove injury causes wrist drop with dorsal hand numbness. Carpal tunnel produces median sensory symptoms in the hand. Cubital tunnel ulnar injury affects the small finger and hand intrinsics.", "advanced"],
      ["A weightlifter develops aching along the medial border of the scapula with mild winging of that border. The most likely entrapped nerve is the:", ["Dorsal scapular nerve supplying the rhomboids", "Long thoracic nerve supplying serratus anterior", "Spinal accessory nerve supplying the trapezius", "Suprascapular nerve supplying the infraspinatus"], 0, "The dorsal scapular nerve supplies the rhomboids and levator scapulae, so its entrapment produces medial scapular border aching with lateral winging from rhomboid weakness. The long thoracic nerve injures serratus anterior, producing medial winging that worsens on wall push. The spinal accessory nerve weakens the trapezius with lateral winging and shoulder droop. The suprascapular nerve affects shoulder rotation, not the scapular border.", "advanced"],
      ["A man falls asleep with his arm draped over a chair back and wakes unable to extend the wrist, with numbness over the dorsal first web space. The most likely lesion is:", ["Radial nerve compression at the spiral groove", "Ulnar nerve compression at Guyon canal", "Median nerve compression at the carpal tunnel", "Axillary nerve compression at the quadrilateral space"], 0, "Compression of the radial nerve in the spiral groove, the classic Saturday night palsy, produces wrist drop with sensory loss over the dorsal first web space while sparing the triceps if the lesion is distal. Guyon canal ulnar compression affects the small finger and intrinsics. Carpal tunnel produces palmar median symptoms. Axillary nerve injury affects the deltoid and lateral shoulder sensation.", "basic"],
      ["An overweight patient who wears a tight tool belt reports burning and numbness over the anterolateral thigh with no weakness, and nerve conduction of motor fibers is normal. The most likely diagnosis is:", ["Meralgia paresthetica of the lateral cutaneous nerve", "Femoral neuropathy from a retroperitoneal mass", "Obturator neuropathy from a pelvic mass lesion", "L4 radiculopathy from a herniated lumbar disc"], 0, "Meralgia paresthetica is entrapment of the purely sensory lateral femoral cutaneous nerve under the inguinal ligament, producing burning anterolateral thigh sensory symptoms with no motor deficit and normal motor studies. Femoral neuropathy weakens knee extension and reduces the patellar reflex. Obturator neuropathy affects medial thigh sensation and the adductors. L4 radiculopathy weakens the quadriceps with a reduced patellar reflex.", "advanced"],
      ["A runner has burning pain on the sole of the foot and weakness of toe flexion, worsened by a tight ankle posture. Tapping behind the medial malleolus reproduces the symptoms. The entrapped nerve is the:", ["Tibial nerve within the tarsal tunnel", "Common peroneal nerve at the fibular head", "Sural nerve along the lateral foot", "Deep peroneal nerve at the ankle"], 0, "Tarsal tunnel syndrome compresses the tibial nerve behind the medial malleolus, producing plantar foot burning, weak toe flexion, and a positive Tinel sign at that site. Common peroneal compression causes foot drop and dorsal numbness. The sural nerve gives lateral foot sensation only. The deep peroneal nerve produces first web space numbness with minimal motor loss.", "advanced"],
      ["A patient reports numbness over the medial thigh and weak hip adduction after a difficult pelvic surgery. The most likely injured nerve is the:", ["Obturator nerve in the pelvis", "Femoral nerve under the inguinal ligament", "Sciatic nerve at the greater notch", "Lateral femoral cutaneous nerve at the thigh"], 0, "The obturator nerve supplies the thigh adductors and a patch of medial thigh skin, so pelvic surgical injury produces weak adduction and medial thigh numbness. Femoral injury weakens knee extension with anterior thigh sensory loss. Sciatic injury affects the posterior thigh and the leg below the knee. The lateral femoral cutaneous nerve is purely sensory over the anterolateral thigh.", "advanced"],
      ["A cyclist who leans on a backpack frame reports aching over the iliac crest radiating into the buttock, with no leg weakness or sciatic radiation. The most likely entrapment involves the:", ["Superior cluneal nerves at the iliac crest", "Sciatic nerve at the piriformis muscle", "Common peroneal nerve at the fibular head", "Pudendal nerve in Alcock canal"], 0, "The superior cluneal nerves cross the iliac crest and can be entrapped there, producing local aching that radiates into the buttock without leg weakness or true sciatic radiation. Piriformis sciatic irritation radiates down the posterior thigh. Common peroneal compression causes foot drop. Pudendal entrapment produces perineal symptoms, not iliac crest pain.", "advanced"],
      ["A nerve is compressed firmly enough to block conduction, but the axon and its connective tissue sheaths remain intact, and full recovery follows once the pressure is relieved. This injury is classified as:", ["Neuropraxia with focal conduction block", "Axonotmesis with Wallerian degeneration", "Neurotmesis with complete transection", "Avulsion with root separation"], 0, "Neuropraxia is a focal conduction block from segmental myelin injury with an intact axon, so recovery is complete once compression is relieved. Axonotmesis involves axonal disruption with intact connective tissue, requiring Wallerian degeneration and slow regrowth. Neurotmesis is complete transection of axon and sheaths with poor spontaneous recovery. Root avulsion separates the nerve from the cord entirely.", "advanced"]
    ]],
    [2, "Demonstrate how to diagnose and treat thoracic dysfunctions with HVLA (Lab)", [
      ["HVLA technique applies a thrust at the restrictive barrier with which characteristics?", ["Low velocity and high amplitude", "High velocity and low amplitude", "Sustained pressure with patient effort", "Slow oscillation through neutral range"], 1, "HVLA stands for High-Velocity, Low-Amplitude — a quick, short-distance thrust delivered at the restrictive barrier to restore motion. Sustained pressure with patient effort describes muscle energy. Slow oscillation describes articulatory or Spencer-type techniques. Low velocity with high amplitude is not a recognized osteopathic thrust technique.", "basic"],
      ["Which of the following is an absolute contraindication to thoracic HVLA at the targeted segment?", ["Mild thoracic kyphosis on exam", "Acute fracture of the vertebra", "A Type II somatic dysfunction", "Patient age greater than 70 years"], 1, "Acute fracture at or near the segment is an absolute contraindication because a thrust can displace fragments and cause neurologic injury. Mild kyphosis is a postural finding, not a contraindication. A Type II somatic dysfunction is in fact the classic indication for HVLA. Age alone is not absolute, though severe osteoporosis is a strong relative contraindication.", "basic"],
      ["Fryette's Type II somatic dysfunction is characterized by which of the following?", ["Neutral spine with sidebending and rotation to opposite sides", "Non-neutral spine with sidebending and rotation to same side", "Pure rotation without any sidebending coupled", "Pure sidebending without any rotation coupled"], 1, "Type II involves a non-neutral spine (flexed or extended) with sidebending and rotation coupled to the same side at a single segment. Type I is neutral with sidebending and rotation to opposite sides across multiple segments. Pure rotation or pure sidebending without coupling is not consistent with Fryette mechanics.", "basic"],
      ["A T5 segment is diagnosed as extended, rotated right, sidebent right. According to osteopathic convention, this dysfunction is named for:", ["The barrier and is a Type I dysfunction", "The freedom and is a Type II dysfunction", "The barrier and is a Type II dysfunction", "The freedom and is a Type I dysfunction"], 1, "Osteopathic dysfunctions are named for the freedom (position of ease) where the segment is held, not the barrier. An extended segment with sidebending and rotation to the same side is a non-neutral Type II dysfunction. Naming by the barrier reverses the convention. Type I requires a neutral position with sidebending and rotation in opposite directions across a group of segments.", "advanced"],
      ["When setting up a supine thoracic HVLA thrust for a T4 ERSright dysfunction, the operator places the fulcrum (fist or thenar) against which structure to engage the restrictive barrier?", ["The right transverse process of T4", "The left transverse process of T4", "The spinous process of T5 below", "The right transverse process of T5"], 0, "For an ERSright dysfunction, the vertebrae likes to live rotates RIGHT the goal is to restore flexion, left sidebending, and left rotation. The fulcrum is placed on the ipsilateral (right) transverse process of the dysfunctional segment to act as the lever point against which the thrust drives the freedom. ", "advanced"],
      ["A patient with a T6 FRSleft (flexed, rotated left, sidebent left) Type II dysfunction has the LEAST restricted motion in which direction?", ["Flexion + left sidebending + left rotation (the position of ease)", "Extension + right sidebending + right rotation (the position of barrier)", "Pure right rotation only", "Pure extension only"], 0, "Type II dysfunctions move freely INTO the position of ease (FRSleft) — flexion, left sidebending, left rotation — and resist motion INTO the restrictive barriers (extension, right SB, right rotation). Single-plane motions toward the barrier (pure right rotation or pure extension) are partially restricted because Fryette III states that motion in one plane modifies motion in the others.", "advanced"],
      ["A patient has bilateral Type II thoracic dysfunctions: T4 ERSleft on the LEFT and T7 ERSright on the RIGHT. The MOST efficient HVLA strategy is:", ["Treat both segments at once with a single bilateral thrust", "Treat the upper segment T4 first, then reassess T7 before treating it", "Treat the lower segment T7 first regardless of position", "Defer HVLA because bilateral Type II dysfunctions cannot be corrected"], 1, "Treat the most superior (or most clinically dominant) Type II dysfunction first, then REASSESS — distal dysfunctions are often secondary compensations and may resolve once the primary segment is addressed. Simultaneous bilateral thrust is not the standard approach. Treating T7 first ignores the upper-driver principle. Bilateral Type II dysfunctions are absolutely amenable to HVLA when contraindications are absent.", "advanced"],
      ["A patient with rheumatoid arthritis is referred for thoracic HVLA. Before proceeding, the SAFEST screening priority is to:", ["Check serum CRP and ESR inflammatory markers only", "Obtain cervical flexion-extension films for atlantoaxial instability", "Perform a Spurling compression test for radiculopathy", "Apply moist heat to the thoracic paraspinal muscles"], 1, "Rheumatoid arthritis predisposes to atlantoaxial INSTABILITY from erosion of the transverse ligament; even when treating the thoracic spine, position changes may transmit force to a vulnerable upper cervical region. Screen with lateral cervical X-rays including dynamic views. Serum CRP, Spurling test, and heat do not screen for instability. SEVERE RA (2/2 Atlantoaxial instability) is an ABOSLUTE CI for HVLA", "advanced"],
      ["For a standard supine lower thoracic HVLA technique, how are the patient arms positioned before the thrust?", ["Crossed over the chest so the operator can thrust through the elbows", "Extended overhead so the operator can traction the shoulders", "Placed flat at the sides so the operator can stabilize the pelvis", "Clasped behind the neck so the operator can lift the head"], 0, "In supine thoracic HVLA the patient crosses the arms over the chest, and the operator delivers the corrective thrust through the patient elbows into a fulcrum placed beneath the dysfunctional segment. Overhead, at the sides, or behind the neck positions do not allow the operator to transmit a controlled thrust to the thoracic segment.", "basic"],
      ["A satisfying audible pop occurs during thoracic HVLA. What does this sound represent, and is it required?", ["Joint cavitation, and it is not required for success", "Ligament tearing, and it confirms a successful release", "Bone fracture, and it indicates excessive force", "Tendon snapping, and it signals correct positioning"], 0, "The pop is gas cavitation within the facet joint and is not required for a successful technique, since restoration of motion, not the sound, is the therapeutic goal. The sound is not ligament tearing, bone fracture, or tendon snapping, none of which should occur during a properly performed thrust.", "advanced"],
      ["A patient with severe osteoporosis needs treatment of a thoracic somatic dysfunction. Which approach is MOST appropriate?", ["Use a gentle indirect technique instead of HVLA", "Use forceful HVLA with an added rotational thrust", "Use HVLA but increase the amplitude for safety", "Use HVLA only at the most fragile segment"], 0, "Severe osteoporosis is a contraindication to HVLA because the thrust risks fracture, so a gentle indirect technique is selected instead. Forceful or higher amplitude HVLA increases fracture risk, and applying it at the most fragile segment is the least safe choice for a patient with brittle bone.", "basic"]
    ]]
  ]],
  [2, "Ribs I — Diagnosis and Counterstrain", [
    [1, "Differentiate true ribs vs. false ribs and typical vs. atypical ribs", [
      ["True ribs are defined by which anatomic feature?", ["Direct attachment anteriorly via their own costal cartilage", "Indirect attachment to the cartilage of the rib above", "No anterior attachment at all", "Articulation with only one thoracic vertebra"], 0, "True ribs (1 through 7), also called vertebrosternal ribs, attach anteriorly to the sternum via their own costal cartilage. False ribs (8 through 10) attach indirectly to the cartilage of the rib above (vertebrochondral). Floating ribs (11 and 12) have no anterior attachment. Articulating with only one vertebra is a feature of atypical ribs 1, 11, and 12, not a defining property of true ribs.", "basic"],
      ["Which ribs are classified as floating ribs?", ["Ribs 1 and 2 only", "Ribs 8, 9, and 10", "Ribs 11 and 12", "Ribs 10, 11, and 12 always"], 2, "Floating ribs are 11 and 12 (sometimes 10 in variant anatomy) and have no anterior attachment, with terminal ends embedded in the posterior abdominal musculature. They are also called vertebral or free ribs. Ribs 1 and 2 are atypical true ribs but they are not floating. Ribs 8 through 10 are false ribs but are not floating because they attach indirectly via the cartilage above.", "basic"],
      ["Typical ribs (3 through 9) share which combination of osseous features?", ["Head articulating with two vertebrae, neck, tubercle, body, and costal angle", "Head articulating with only one vertebra and a sharp curve", "No neck or tubercle and short shaft", "Single articulation with the corresponding transverse process only"], 0, "Typical ribs have a head that articulates with two vertebrae (its own level and one above), a neck, a tubercle articulating with the transverse process, a body or shaft, and a costal angle where the rib turns anterolaterally. A head articulating with only one vertebra describes atypical rib 1. Absence of neck and tubercle describes ribs 11 and 12. Articulation with only the transverse process is not anatomically correct for typical ribs.", "basic"],
      ["A student is asked to identify an atypical rib that is broad and sharply curved with a single articulation. Which rib best matches this description?", ["Rib 1 — broadest and most sharply curved, articulates only with T1", "Rib 2 — long and thin with serratus anterior insertion", "Rib 10 — atypical because it articulates with only T10", "Rib 11 — short and floating with no neck"], 0, "Rib 1 is the broadest, shortest, and most sharply curved rib, and uniquely articulates with only T1. Rib 2 is longer and thinner with a rough area for serratus anterior, articulating with both T1 and T2. Rib 10 is atypical because it articulates with only T10 but is not broad or sharply curved. Rib 11 is short and floating with no neck or tubercle, but is not the broadest or most curved.", "advanced"],
      ["The SCALENE TUBERCLE on the SUPERIOR surface of rib 1 is the insertion point for which muscle?", ["Anterior scalene muscle", "Middle scalene muscle", "Posterior scalene muscle", "Subclavius muscle"], 0, "The scalene tubercle on the superior surface of rib 1 marks the insertion of the ANTERIOR scalene. The middle scalene inserts posterior to the scalene tubercle on the upper rib 1 surface. The posterior scalene inserts on rib 2. The subclavius inserts on the inferior clavicle, not rib 1.", "advanced"],
      ["The subclavian artery passes through which anatomic relationship at the level of rib 1?", ["Between the anterior and middle scalene muscles", "Anterior to the anterior scalene with the vein", "Directly through the scalene tubercle of rib 1", "Posterior to the posterior scalene muscle"], 0, "The subclavian ARTERY runs BETWEEN the anterior and middle scalenes (posterior to anterior scalene), grooving rib 1 just posterior to the scalene tubercle. The subclavian VEIN runs ANTERIOR to the anterior scalene. The brachial plexus runs WITH the artery between anterior and middle scalenes — relevant for thoracic outlet syndrome.", "advanced"],
      ["A neonate found to have only 11 pairs of ribs on imaging most likely has an absence of which rib, and what is the typical clinical significance?", ["Absent rib 1, causing serious respiratory compromise", "Absent rib 12, usually a benign asymptomatic variant", "Absent rib 7, causing sternal instability and pain", "Absent rib 6, causing thoracic outlet syndrome"], 1, "Absence of rib 12 is the most common rib aplasia and usually has no clinical consequence — though it has a weak association with chromosomal conditions like Down syndrome. Rib 1 absence is much rarer and could affect brachial plexus/subclavian relationships. Absence of mid-thoracic ribs (6, 7) is rare and could affect chest wall integrity.", "advanced"]
    ]],
    [2, "Discuss the connections of ribs to other areas of the body", [
      ["The thoracic sympathetic chain ganglia lie in what anatomic relationship to the rib heads?", ["Posterior to the rib heads", "Anterior to the rib heads", "Lateral to the costotransverse joints", "Medial to the vertebral bodies"], 1, "The thoracic sympathetic chain ganglia lie anterior to the rib heads, which is why rib somatic dysfunctions can produce viscerosomatic reflexes — mechanical irritation can stimulate the chain. Posterior to the rib heads is occupied by paraspinal musculature. Lateral to the costotransverse joints is the intercostal space. Medial to the vertebral bodies is the spinal canal.", "basic"],
      ["Which structure forms a dome-like fascial covering over the apex of the lung at the thoracic inlet?", ["Sibson suprapleural membrane fascia", "Pectoralis minor investing fascia", "Endothoracic fascia of the diaphragm", "Posterior costotransverse ligament"], 0, "Sibson fascia (the suprapleural membrane) is a dome-like fascial extension of deep cervical fascia covering the lung apex and attaches to the first rib at the thoracic inlet. Pectoralis minor fascia covers the chest wall anteriorly, not the inlet. Endothoracic fascia lines the chest wall but does not form the apical dome. The posterior costotransverse ligament is a small intrinsic ligament of the costotransverse joint.", "basic"],
      ["A 1st rib dysfunction is clinically significant because the 1st rib, manubrium, and which vertebra functionally act together?", ["C7 spinous process", "T1 vertebral body", "T4 transverse process", "C5 lateral mass"], 1, "The 1st rib, manubrium, and T1 act together as a functional unit at the thoracic inlet because of their close fascial connections. C7 lies just above and contributes to the cervicothoracic junction but is not part of this unit. T4 is the level of the carina but not part of the thoracic inlet unit. C5 contributes to the phrenic nerve and brachial plexus but does not form the inlet unit.", "basic"],
      ["Which is NOT a content of the thoracic inlet?", ["Aortic arch and brachiocephalic trunk", "Thoracic duct and right lymphatic duct", "Vagus and phrenic nerves", "Inferior vena cava and abdominal aorta"], 3, "The inferior vena cava and abdominal aorta traverse the diaphragm at the thoracic OUTLET (caudal opening), not the inlet. The thoracic inlet contains the aortic arch, brachiocephalic trunk, common carotid, subclavian arteries, thoracic and right lymphatic ducts, vagus, phrenic, sympathetic chain, trachea, esophagus, and the apex of the lungs.", "advanced"],
      ["The inferior vena cava passes through the diaphragm at the level of:", ["T8 (caval hiatus)", "T10 (esophageal hiatus)", "T12 (aortic hiatus)", "L1 (median arcuate ligament level)"], 0, "Mnemonic: 'I 8 (ate) 10 EGGS (E.G.) AT 12'. The IVC passes through the caval hiatus at T8; the esophagus and vagi (E.G.) at T10; the aorta, azygos, and thoracic duct at T12 (the aortic hiatus is technically behind the diaphragm, not through it). L1 is too caudal for any diaphragmatic hiatus.", "advanced"],
      ["A puncture wound at the right 7th intercostal space at the mid-axillary line would MOST likely injure which structures?", ["The lower lobe of the lung only", "The muscular diaphragm only", "Both the lung base and the liver", "The heart and great vessels"], 2, "At the right mid-axillary line, the 7th ICS sits over the diaphragm and is dangerously close to BOTH the lower lobe of the right lung and the right hepatic lobe — penetrating wounds at this level commonly injure both. The diaphragm RISES to T5 on full exhalation. Heart and great vessels are more medial and superior.", "advanced"],
      ["A patient with right shoulder pain after a motor vehicle accident has a normal shoulder exam and normal cervical imaging. The patient also reports right upper quadrant abdominal tenderness. The MOST important next consideration is:", ["Cervical radiculopathy at the C5 level", "Diaphragmatic irritation from hepatic injury", "Acute pancreatitis with referred pain", "Pulmonary embolism with pleuritic pain"], 1, "Right shoulder pain from diaphragmatic irritation (phrenic referral via C3-C5) plus RUQ tenderness post-trauma raises strong suspicion for HEPATIC INJURY or hemoperitoneum — analogous to the classic LEFT shoulder Kehr sign for splenic rupture. Workup with FAST exam and abdominal CT is critical. C5 radiculopathy is excluded by negative cervical imaging.", "advanced"]
    ]],
    [3, "Identify the muscles of respiration", [
      ["Which muscle is the primary muscle of inspiration?", ["The diaphragm muscle", "External intercostals", "Sternocleidomastoid", "Pectoralis minor"], 0, "The diaphragm is the primary muscle of inspiration, generating most of the negative intrathoracic pressure that drives tidal breathing. External intercostals and levatores costarum are major secondary inspiratory muscles but contribute much less than the diaphragm. SCM and pectoralis minor are accessory inspiratory muscles recruited during increased respiratory demand.", "basic"],
      ["Which group of muscles are classified as ACCESSORY muscles of inspiration?", ["External intercostals and diaphragm", "Sternocleidomastoid and scalenes", "Rectus abdominis and external obliques", "Transversus thoracis and internal intercostals"], 1, "Accessory muscles of inspiration include sternocleidomastoid, scalenes, serratus posterior superior, pectoralis major/minor, inferior portions of serratus anterior and latissimus dorsi, and superior iliocostalis. External intercostals and the diaphragm are primary inspiratory muscles. Rectus abdominis and external obliques are accessory expiratory muscles. Transversus thoracis and internal intercostals contribute to expiration.", "basic"],
      ["Quiet expiration during normal tidal breathing depends primarily on:", ["Active contraction of the rectus abdominis", "Passive elastic recoil of the lungs and chest wall", "Contraction of the external intercostal muscles", "Active contraction of the scalenes"], 1, "Quiet expiration is primarily passive, driven by elastic recoil of lung tissue, costal cartilage, and the chest wall as the diaphragm relaxes. Active rectus abdominis contraction is recruited only for forced expiration. External intercostals contract during inspiration, not expiration. Scalenes are accessory inspiratory muscles.", "basic"],
      ["A COPD patient breathing with pursed lips and recruiting his shoulder girdle muscles is using which group as ACCESSORY EXPIRATORY muscles to push residual air out?", ["Sternocleidomastoid and anterior scalenes", "Rectus abdominis and the obliques", "Diaphragm and external intercostals", "Levator scapulae and trapezius"], 1, "Accessory expiratory muscles include the abdominal wall (rectus abdominis, internal/external obliques, transversus abdominis), serratus posterior inferior, transversus thoracis, quadratus lumborum, and iliocostalis. SCM and scalenes are accessory inspiratory muscles. The diaphragm and external intercostals drive inspiration. Levator scapulae and trapezius do not have a primary respiratory role.", "advanced"],
      ["Transection of the phrenic nerve at the level of C5 would result in:", ["Bilateral diaphragmatic paralysis with respiratory failure", "Ipsilateral hemidiaphragm paralysis with paradoxical motion on inspiration", "Loss of cough reflex only", "Hyperactive diaphragmatic motion on the affected side"], 1, "The phrenic nerve (C3-C4-C5) provides unilateral motor innervation to its corresponding hemidiaphragm; unilateral transection causes IPSILATERAL hemidiaphragm paralysis with paradoxical upward (cephalad) motion on inspiration as negative intrathoracic pressure sucks the paralyzed dome upward. Bilateral paralysis requires bilateral injury. Cough reflex involves multiple innervations. Hyperactivity does not occur with denervation.", "advanced"],
      ["A patient with a high cervical spinal cord injury at C2 develops respiratory failure because:", ["Only the intercostal muscles are paralyzed", "Both intercostals and the diaphragm lose descending drive", "Only the abdominal accessory muscles are lost", "Only the sternocleidomastoid is paralyzed"], 1, "A high cervical SCI (above C3) disrupts descending corticospinal drive to the phrenic motor neurons (C3-C5) as well as the thoracic motor pool, causing DIAPHRAGMATIC AND INTERCOSTAL paralysis with respiratory failure requiring mechanical ventilation. Lower cervical injuries (C5-C8) may spare some diaphragm function. Loss of accessories alone or SCM alone would not cause respiratory failure.", "advanced"],
      ["The diaphragm RISES during expiration. At maximal exhalation, the right hemidiaphragm dome can reach which vertebral level?", ["T2", "T5", "T7", "T10"], 1, "At maximum EXHALATION the right hemidiaphragm dome can rise as high as approximately T5 (or even higher), explaining why penetrating thoracic wounds at mid-thoracic levels can injure subdiaphragmatic structures (liver, spleen) depending on the respiratory phase. T2 is too high; T7-T10 are inspiratory positions.", "advanced"]
    ]],
    [4, "Differentiate between pump handle, bucket handle, and caliper motion of the ribs", [
      ["Pump handle rib motion primarily increases which thoracic diameter?", ["The anterior-posterior diameter", "The transverse (side-to-side) diameter", "The vertical (cephalocaudad) height", "The oblique cross-sectional area"], 0, "Pump handle motion increases the ANTERIOR-POSTERIOR diameter of the ribcage as the anterior end of the rib rises like an old-fashioned water pump handle. Bucket handle motion increases the TRANSVERSE diameter. Vertical height changes are not the primary contribution of rib motion. Oblique cross-section is not a standard descriptor of rib mechanics.", "basic"],
      ["Which ribs exhibit predominantly bucket handle motion?", ["Ribs 2 through 5", "Ribs 6 through 10", "Ribs 11 and 12", "Rib 1 only"], 1, "Ribs 6 through 10 are predominantly bucket handle, increasing transverse chest diameter when the lateral portion rises. Ribs 2 through 5 are predominantly pump handle. Ribs 11 and 12 demonstrate caliper motion. Rib 1 is approximately 50% pump and 50% bucket handle.", "basic"],
      ["Caliper motion of ribs 11 and 12 increases:", ["Only the AP diameter", "Only the transverse diameter", "Both AP and transverse diameters slightly", "The vertical height of the chest"], 2, "Caliper motion (named after old round calipers) produces slight increases in BOTH the AP and transverse diameters because ribs 11 and 12 lack costotransverse articulations and have less restriction in the horizontal plane. Pump handle changes only AP, bucket handle changes only transverse, and vertical chest height is not the primary feature of caliper motion.", "basic"],
      ["Rib 1 is unique among the ribs in that its motion is best described as:", ["Pure pump handle motion only", "Pure bucket handle motion only", "Approximately 50% pump and 50% bucket handle", "Pure caliper motion like ribs 11 and 12"], 2, "Rib 1 is atypical and demonstrates approximately 50% pump handle and 50% bucket handle motion, which is why it is assessed for both inhalation and exhalation dysfunctions at the same medial inlet location. Pure pump handle describes ribs 2 through 5. Pure bucket handle describes ribs 6 through 10. Caliper motion is reserved for ribs 11 and 12.", "advanced"],
      ["A trauma patient has a flail chest with rib fractures of ribs 4-7 anteriorly and posteriorly on the right. The MOST characteristic clinical finding is:", ["Bilateral symmetric chest wall expansion", "Paradoxical inward motion of the segment on inspiration", "Complete inability to take any breath", "Tracheal deviation toward the affected side"], 1, "Flail chest = two or more adjacent ribs each fractured in two or more places, creating a free-floating segment that moves PARADOXICALLY (inward on inspiration, outward on expiration). Bilateral symmetry, complete apnea, and ipsilateral tracheal deviation (which suggests atelectasis or large pneumothorax) are not the hallmark.", "advanced"],
      ["A patient is post-thoracotomy for lung resection and reports persistent ipsilateral rib pain with inhalation 6 weeks postoperatively. Examination reveals restricted excursion of the lateral ribcage at the mid-axillary line for ribs 6-9. The MOST likely set of dysfunctions is:", ["Bilateral pump handle inhalation rib group", "Ipsilateral bucket handle exhalation rib group", "Caliper motion dysfunction of ribs 11-12", "Pure cervical rib outlet syndrome"], 1, "Post-thoracotomy patients commonly develop EXHALATION dysfunction groups (ribs stuck exhaled because of guarding around the incision) — at the mid-axillary line with restriction in inhalation, this is a bucket handle pattern. Bilateral pump handle inhalation would be anterior. Ribs 11-12 caliper motion is far inferior. Cervical rib syndrome is a separate entity.", "advanced"],
      ["Why does dysfunction of rib 1 disproportionately affect upper extremity function and lymphatic return?", ["Rib 1 attaches directly to the clavicle", "Key neurovascular structures cross over rib 1", "Rib 1 has no neurovascular relationships", "Rib 1 is not a clinically relevant structure"], 1, "Rib 1 is the floor of the thoracic inlet — through which pass the subclavian artery and vein, brachial plexus (lower trunk especially), thoracic duct (left), right lymphatic duct (right), and Sibson fascia overlying the lung apex. Elevation or restriction of rib 1 can produce thoracic outlet syndrome, upper extremity lymphedema, and other downstream effects. Rib 1 does not directly articulate with the clavicle.", "advanced"]
    ]],
    [5, "Identify the characteristics of inhaled and exhaled ribs (pump and bucket handle)", [
      ["An inhalation rib somatic dysfunction means that the rib:", ["Prefers the position of exhalation and resists inhalation", "Prefers the position of inhalation and resists exhalation", "Moves equally well in both directions", "Has no motion in either direction"], 1, "An inhalation dysfunction means the rib is stuck in the INHALED position — it prefers inhalation (the position of ease) and resists returning to exhalation (the restrictive barrier). Dysfunctions are named for the freedom, not the restriction. Equal motion in both directions would not be a dysfunction. Complete loss of motion in both directions describes a fused or ankylosed joint, not a typical somatic dysfunction.", "basic"],
      ["A pump handle rib with an inhalation dysfunction will show which static finding?", ["The anterior portion near the sternochondral junction feels recessed", "The anterior portion near the sternochondral junction feels prominent", "The posterior angle is more prominent than the contralateral side", "The mid-axillary line is markedly recessed"], 1, "An inhaled pump handle rib has its anterior end stuck cephalad, so the portion near the sternochondral junction feels prominent compared to the contralateral side. A recessed anterior portion would indicate an exhalation dysfunction. The posterior angle finding is more typical of exhalation dysfunction. The mid-axillary line is the assessment landmark for bucket handle ribs, not pump handle.", "basic"],
      ["A bucket handle rib with an inhalation dysfunction will show which finding at the mid-axillary line?", ["Lateral edge moves easily superiorly with inhalation and fails to recede on exhalation", "Lateral edge moves easily inferiorly with exhalation but fails to rise on inhalation", "Lateral edge is symmetric in motion compared to the contralateral side", "Lateral edge is completely immobile in both directions"], 0, "A bucket handle inhalation dysfunction means the rib readily rises (inhales) at the mid-axillary line but does NOT recede on exhalation — it is stuck inhaled. The opposite pattern (easy descent, restricted ascent) describes an exhalation dysfunction. Symmetric motion is not a dysfunction. Complete immobility describes ankylosis.", "basic"],
      ["You palpate a patient with bilateral pump handle rib prominences at the sternochondral junctions of ribs 3 through 5 that fail to drop with exhalation. The MOST likely group dysfunction is:", ["Bilateral exhalation pump handle dysfunctions of ribs 3 through 5", "Bilateral inhalation pump handle dysfunctions of ribs 3 through 5", "Bilateral exhalation bucket handle dysfunctions of ribs 6 through 10", "Bilateral caliper motion dysfunctions of ribs 11 and 12"], 1, "Anterior prominence at the sternochondral junction that fails to drop with exhalation defines a pump handle INHALATION dysfunction (rib stuck inhaled). Exhalation pump handle dysfunctions would show recessed anterior ends that fail to rise on inhalation. Bucket handle dysfunctions of ribs 6 through 10 are assessed at the mid-axillary line, not sternochondral junction. Caliper motion involves ribs 11 and 12 posteriorly.", "advanced"],
      ["A patient has a single inhaled bucket handle rib 8 on the right. The mid-axillary line on the right at rib 8 will show the rib is:", ["Closer to rib 9 below and further from rib 7 above", "Closer to rib 7 above and further from rib 9 below", "Equidistant from ribs 7 and 9", "Completely fused to rib 7"], 1, "INHALED bucket handle rib 8 rises at the mid-axillary line → it sits CLOSER to the rib ABOVE (rib 7) and FURTHER from the rib BELOW (rib 9). Exhaled rib 8 would be the OPPOSITE (closer to 9, further from 7). Equidistant means no dysfunction. Fusion is not a typical SD finding.", "advanced"],
      ["A patient with a chronic exhalation dysfunction of rib 2 will MOST likely also have:", ["A hypertonic anterior scalene with associated cervical sidebending toward the affected side", "A hypotonic posterior scalene with associated cervical extension and weakness", "No muscle imbalance", "Hypertonic latissimus dorsi"], 1, "Rib 2 exhalation dysfunction is associated with HYPOTONIC posterior scalene (the muscle that should elevate rib 2 has lost tone or is inhibited) — this is why ME for rib 2 exhalation uses the posterior scalene. Hypertonic anterior scalene relates to rib 1, not rib 2. Latissimus dorsi inserts on the humerus and acts on ribs 11-12, not rib 2.", "advanced"],
      ["Why is ipsilateral cervical sidebending often seen as a compensation for chronic ipsilateral RIB 1 inhalation dysfunction?", ["The dysfunction has no postural consequences", "Tight scalenes sidebend the cervical spine ipsilaterally", "It is purely a coincidental, unrelated finding", "It only occurs after a cervical spinal fusion"], 1, "Chronic rib 1 inhalation dysfunction is maintained in part by tight anterior and middle scalenes (which both elevate rib 1 and ipsilaterally sidebend the cervical spine). This produces a postural sidebending compensation and contributes to cervico-thoracic somatic dysfunctions. Cervical fusion is unrelated.", "advanced"]
    ]],
    [6, "Diagnose rib somatic dysfunctions (Lab)", [
      ["Where should the operator palpate to evaluate pump handle rib motion?", ["At the costotransverse junction posteriorly", "Near the costosternal junction anteriorly", "Along the mid-axillary line laterally", "Over the costal angle posterolaterally"], 1, "Pump handle motion is best evaluated as close to the COSTOSTERNAL junction as possible because anterior excursion is greatest there. Bucket handle motion is evaluated at the mid-axillary line. The costotransverse junction is a posterior tenderpoint site but not the primary motion palpation point. The costal angle is the posterior bend, not the area of greatest pump handle excursion.", "basic"],
      ["Where should the operator palpate to evaluate bucket handle rib motion?", ["Costosternal junction anteriorly", "Mid-axillary line laterally", "Costotransverse junction posteriorly", "Over the manubrium superiorly"], 1, "Bucket handle motion is evaluated at the MID-AXILLARY line because that is where lateral excursion is greatest as the rib rises and falls. The costosternal junction is for pump handle evaluation. The costotransverse junction is posterior and not the primary motion landmark. The manubrium is over rib 1 / sternum, not lateral rib evaluation.", "basic"],
      ["Rib 1 is best palpated by placing the fingers at which location?", ["At the inferior border of the clavicle laterally", "At the bottom of the ear lobes and moving directly caudal", "At the sternal notch and moving inferiorly", "At the spinous process of T1 posteriorly"], 1, "Rib 1 is most reliably found by placing fingers at the bottom of the ear lobes and moving directly caudal, landing on the medial thoracic inlet — pulling the trapezius posteriorly helps if needed. The inferior clavicle covers the lateral first rib but is not the standard teaching landmark. The sternal notch overlies the manubrium. The T1 spinous process is posterior and not where rib 1 is palpated directly.", "basic"],
      ["When assessing ribs 11 and 12 with the patient prone, where do you begin palpation and walk up to find the 12th rib?", ["Begin at the iliac crest and walk up to the 12th rib", "Begin at the sacrum and walk up the paraspinals", "Begin at the costal margin and walk posteriorly", "Begin at the T6 spinous process and count down"], 0, "Standard technique: locate the top of the ilium and walk up the quadratus lumborum until you hit bone — that is the 12th rib. Sacral or T6 starting points are inefficient and inaccurate for finding the floating ribs. Anterior approach is impossible because ribs 11 and 12 have no anterior attachment.", "advanced"],
      ["When palpating for rib 1 motion, the most reliable finding for an INHALED rib 1 dysfunction (positive spring test) is:", ["Rib 1 depresses readily on springing pressure", "Rib 1 resists springing and is elevated and tender", "Bilateral symmetric motion with no springiness", "Rib 1 cannot be palpated at all"], 1, "An INHALED rib 1 (stuck inhaled/elevated) resists downward springing pressure (positive spring test), feels elevated compared to the contralateral side, and is tender at the costotransverse junction. Easy depression on spring suggests an exhaled or normal rib. Symmetric springing means no dysfunction. Rib 1 can always be palpated with proper technique.", "advanced"],
      ["A patient who has just completed an OMT session for an exhalation rib 6 dysfunction reports the rib is still tender to palpation but moves freely. The MOST appropriate next step is:", ["Repeat the same treatment immediately to resolve tenderness", "Document partial improvement and reassess next visit", "Refer the patient for orthopedic surgery", "Conclude the dysfunction is permanent and irreversible"], 1, "Restoration of MOTION is the primary endpoint of rib OMT; residual tenderness frequently persists for hours to days after motion is restored and usually resolves with tissue healing. Repeating treatment immediately is unnecessary and may overtreat. Surgical referral and concluding irreversibility are inappropriate.", "advanced"],
      ["A patient with multiple atypical rib dysfunctions and a 'click' on shoulder elevation may have which condition that complicates rib diagnosis?", ["Chronic subscapularis tendinitis", "Snapping scapula syndrome from a bursa", "Median nerve carpal tunnel syndrome", "Partial rotator cuff tear"], 1, "Snapping scapula syndrome (scapulothoracic crepitus from osseous lesions, bursitis, or atrophy/hypertrophy of muscles between the scapula and chest wall) can mimic rib SD symptoms and presents with audible clicks on shoulder elevation. Subscapularis tendinitis, carpal tunnel, and rotator cuff tear produce different clinical pictures.", "advanced"]
    ]],
    [7, "Treat rib somatic dysfunctions using counterstrain (Lab)", [
      ["The standard counterstrain treatment position is held for how long before slowly returning the patient to neutral?", ["30 seconds", "60 seconds", "90 seconds", "3 minutes"], 2, "Counterstrain holds the patient in the position of comfort over a tenderpoint for 90 seconds (120 seconds for rib tenderpoints per some authors), then slowly passively returns the patient to neutral. 30 and 60 seconds are too short for the proprioceptive reset. 3 minutes exceeds the standard hold and is not the published technique time.", "basic"],
      ["The fundamental principle of counterstrain is to:", ["Engage the restrictive barrier and apply a quick thrust", "Move the patient into the position of EASE that maximally reduces tenderpoint tenderness", "Have the patient actively contract muscles against operator resistance", "Apply sustained traction along the affected joint"], 1, "Counterstrain is an INDIRECT technique that moves the patient AWAY from the restrictive barrier into the position of ease/comfort, typically reducing tenderpoint tenderness by at least 70 percent. Engaging the barrier with a thrust describes HVLA. Active patient muscle contraction describes muscle energy. Sustained traction describes traction or articulatory technique, not counterstrain.", "basic"],
      ["Posterior rib tenderpoints associated with INHALATION dysfunctions are typically located at:", ["The angle of the corresponding rib posteriorly", "The sternochondral junction anteriorly", "The mid-clavicular line", "The xiphoid process"], 0, "Posterior rib tenderpoints (associated with INHALATION dysfunctions — the rib that fails to exhale) are found at the angle of the corresponding rib posteriorly. Sternochondral junction tenderpoints are anterior and typically associated with EXHALATION dysfunctions. Mid-clavicular line is the site of anterior rib 1 tenderpoint specifically. The xiphoid is the inferior sternum and not a standard rib tenderpoint.", "basic"],
      ["The anterior tenderpoint for an EXHALATION dysfunction of rib 1 is most often found at which location?", ["At the angle of rib 1 posteriorly between trapezius and scapula", "Lateral to the sternum, at the level of the angle of Louis, below SC joint", "Mid-clavicular line at the level of the SECOND rib interspace", "Along the mid-axillary line at the level of rib 1"], 1, "The anterior rib 1 exhalation tenderpoint is found just inferior to the medial clavicle, near the costoclavicular junction — at the suprasternal notch. Treated by sidebending toward and rotating away from the side of dysfunction with the head flexed. Posterior to the trapezius/scapula is the location of a posterior rib 1 tenderpoint (inhalation dysfunction). The angle of Louis is the manubriosternal joint at rib 2, not rib 1. The mid-axillary line is bucket handle territory, not the rib 1 tenderpoint.", "advanced"],
      ["For a posterior rib 4 tenderpoint, the treatment position requires the operator to extend the patient's thoracic spine and add which additional component?", [" Sidebending and rotation TOWARD the tenderpoint side", " Sidebending and rotation AWAY from the tenderpoint side", "Pure axial traction with no sidebending", "Forced flexion of the thoracic spine"], 1, "Posterior rib tenderpoints (associated with INHALATION dysfunctions): treatment position is THORACIC EXTENSION + sidebending AWAY + rotation AWAY from the tenderpoint to maximally slacken the involved muscles. Sidebending toward, pure traction, and flexion are inappropriate for posterior rib tenderpoint treatment.", "advanced"],
      ["When using counterstrain on rib tenderpoints, the most appropriate ENDPOINT to confirm correct positioning is:", ["A reproducible audible pop", "At least 70 percent reduction in tenderness at the tenderpoint", "Complete elimination of all chest motion", "An immediate increase in operator perceived tissue tension"], 1, "The counterstrain endpoint is at least 70 PERCENT reduction in tenderness — this confirms the position of ease has been achieved. Audible pops belong to HVLA. Complete elimination of motion is not the goal. Increased tissue tension would suggest incorrect positioning (engaging barrier rather than ease).", "advanced"],
      ["A patient with osteoporosis and recent vertebral compression fractures has multiple painful rib tenderpoints. The SAFEST and most appropriate first-line OMT approach is:", ["Vigorous rib HVLA thrusts to all segments", "Gentle counterstrain and myofascial release as tolerated", "Aggressive muscle energy at the involved ribs", "Defer all osteopathic treatment entirely"], 1, "Osteoporosis with recent vertebral compression fractures makes HVLA and aggressive ME contraindicated due to fracture risk; counterstrain and gentle MFR/lymphatic techniques are well-tolerated indirect alternatives that can provide significant relief. Total OMT avoidance forgoes a useful intervention.", "advanced"]
    ]]
  ]],
  [3, "Ribs II — Muscle Energy", [
    [1, "Recognize rib biomechanics and dysfunctions", [
      ["An inhalation rib somatic dysfunction is best described as having a:", ["Restriction of inhalation motion and an exhaled rib position", "Restriction of exhalation motion and an inhaled rib position", "Restriction of both inhalation and exhalation symmetrically", "Restriction limited to side-bending without effect on respiration"], 1, "An inhalation dysfunction means the rib is stuck INHALED — it has exhalation restriction and prefers (rests in) the inhaled position. Restriction of inhalation with an exhaled position describes an exhalation dysfunction. Symmetric restriction of both is unusual and not a typical somatic dysfunction. Pure sidebending restriction without respiratory effect is not a rib dysfunction pattern.", "basic"],
