
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.quiz-wrap { padding: 1rem 0; }
.header { margin-bottom: 1.5rem; }
.header h2 { font-size: 18px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; }

.progress-bar-bg { background: var(--color-background-secondary); border-radius: 4px; height: 6px; margin: 12px 0 4px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: #378ADD; border-radius: 4px; transition: width 0.3s; }
.progress-label { font-size: 12px; color: var(--color-text-secondary); display: flex; justify-content: space-between; }
.section-badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; margin-bottom: 8px; font-weight: 500; }
.q-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
.lo-tag { font-size: 11px; color: var(--color-text-tertiary); margin-bottom: 6px; }

.opts { display: flex; flex-direction: column; gap: 8px; }
.opt-btn { text-align: left; background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 10px 14px; font-size: 14px; color: var(--color-text-primary); cursor: pointer; transition: background 0.15s, border-color 0.15s; line-height: 1.45; }
.opt-btn:hover:not(:disabled) { background: var(--color-background-tertiary); border-color: var(--color-border-secondary); }
.opt-btn.selected { border-color: #378ADD; background: #E6F1FB; color: #0C447C; }
.opt-btn.correct { border-color: #3B6D11; background: #EAF3DE; color: #27500A; }
.opt-btn.wrong { border-color: #A32D2D; background: #FCEBEB; color: #791F1F; }

.filter-btn { font-size: 12px; padding: 4px 10px; border: 0.5px solid var(--color-border-secondary); border-radius: 20px; background: var(--color-background-secondary); color: var(--color-text-secondary); cursor: pointer; }

<div class="quiz-wrap">
<h2 class="sr-only">PDX Medical School Practice Quiz — 100 multiple choice questions across 5 systems</h2>

<div id="quiz-main"></div>
<div id="score-screen" style="display:none"></div>
</div>

<script>
const ALL_QUESTIONS = [
{"sec":"Musculoskeletal","lo":"LO1","stem":"A 45-year-old woman has bilateral wrist swelling and boggy synovitis at the MCPs and PIPs bilaterally with ulnar deviation. Which best describes why her pathology is ARTICULAR?","opts":["A. Pain is focal and reproducible at a single tendon insertion point","B. She has restriction of motion in all planes due to synovial involvement","C. Her pain worsens only with resisted movement against gravity","D. She has tenderness at the lateral epicondyle only"],"answer":"B","exp":"Articular disease involves the joint capsule, synovium, and articular cartilage — producing diffuse pain with restricted ROM in ALL planes. Extra-articular pathology (bursitis, tendinitis) is focal and restricts only specific movements."},
{"sec":"Musculoskeletal","lo":"LO1","stem":"A patient has lateral epicondyle pain with resisted wrist extension. A second patient has equal restriction of knee flexion AND extension. Which patients have articular vs extra-articular pathology, respectively?","opts":["A. Both are articular","B. First is articular; second is extra-articular","C. First is extra-articular; second is articular","D. Both are extra-articular"],"answer":"C","exp":"Focal tenderness at a specific landmark with pain on resisted movement = extra-articular (lateral epicondylitis). Equal restriction of all ROM planes = articular pathology (joint capsule/synovium involved, e.g., OA or inflammatory arthritis)."},
{"sec":"Musculoskeletal","lo":"LO2","stem":"Which joint type is MOST susceptible to rheumatoid arthritis and why?","opts":["A. Fibrous joints — they lack cartilage protection","B. Cartilaginous joints — they bear the most weight","C. Synovial joints — they contain a synovial membrane that can become inflamed","D. All joint types are equally affected"],"answer":"C","exp":"Synovial joints have a synovial membrane that can be targeted by the immune system in RA, leading to pannus formation and joint destruction. Fibrous and cartilaginous joints lack a synovial membrane."},
{"sec":"Musculoskeletal","lo":"LO2","stem":"A 58-year-old man has sudden-onset severe pain in his right first MTP joint with warmth and swelling after a large meal and alcohol. The MOST consistent disease-joint type combination is:","opts":["A. OA; cartilaginous joint","B. RA; fibrous joint","C. Gout; synovial joint","D. Ankylosing spondylitis; cartilaginous joint"],"answer":"C","exp":"Gout is caused by monosodium urate crystal deposition in synovial joints, classically the first MTP (podagra). Dietary purines and alcohol are classic triggers."},
{"sec":"Musculoskeletal","lo":"LO3","stem":"A 55-year-old with known prostate cancer develops new back pain and unintentional 15 lb weight loss. Which red flag MOST warrants urgent imaging?","opts":["A. Pain that improves with rest","B. History of malignancy with new back pain","C. Morning stiffness lasting 20 minutes","D. Pain localized to paraspinal muscles"],"answer":"B","exp":"History of cancer is a major red flag for low back pain — raises concern for vertebral metastasis, pathologic fracture, or epidural compression. Other red flags: age >50, unexplained weight loss, fever, bowel/bladder dysfunction (cauda equina), night pain."},
{"sec":"Musculoskeletal","lo":"LO3","stem":"A 30-year-old with sudden bilateral leg weakness, urinary retention, and saddle anesthesia after lifting heavy boxes presents to the ED. Which red flag does this represent?","opts":["A. Malingering — no red flag present","B. Cauda equina syndrome — surgical emergency","C. Simple lumbar strain — reassure and discharge","D. Spondylolisthesis — refer to orthopedics outpatient"],"answer":"B","exp":"Bowel/bladder dysfunction + saddle anesthesia = cauda equina syndrome — a surgical emergency requiring immediate MRI and decompression. Delay risks permanent incontinence and paralysis."},
{"sec":"Musculoskeletal","lo":"LO4","stem":"A 62-year-old postmenopausal Caucasian woman sustained a wrist fracture after a minor fall. Which combination MOST increases her osteoporosis fracture risk?","opts":["A. High BMI, African American race, regular weight-bearing exercise","B. Long-term corticosteroid use, low body weight, smoking history","C. Hormone replacement therapy, high calcium intake, non-smoker","D. Male sex, high vitamin D levels, manual labor history"],"answer":"B","exp":"Major osteoporosis risk factors: corticosteroid use (suppresses osteoblasts), low body weight (less mechanical loading), smoking (impairs estrogen metabolism), postmenopausal status, white/Asian race, family history, alcohol use, low calcium/vitamin D."},
{"sec":"Musculoskeletal","lo":"LO4","stem":"Which screening question BEST identifies a patient who may have undiagnosed osteoporosis?","opts":["A. 'Do your joints feel stiff in the morning for more than an hour?'","B. 'Have you broken a bone after a minor fall or bump that normally wouldn't cause a fracture?'","C. 'Do you have swelling and redness in multiple joints?'","D. 'Do you experience muscle cramps at night?'"],"answer":"B","exp":"A fragility (low-trauma) fracture is the hallmark screening indicator for osteoporosis. The FRAX tool incorporates this and other risk factors to calculate 10-year fracture probability."},
{"sec":"Musculoskeletal","lo":"LO5","stem":"You can passively abduct a patient's shoulder to full 180° but active abduction stops at 90° with pain and weakness. This pattern MOST suggests:","opts":["A. Glenohumeral osteoarthritis with joint space narrowing","B. Adhesive capsulitis (frozen shoulder)","C. Rotator cuff tear or tendinopathy","D. Acromioclavicular joint pathology"],"answer":"C","exp":"Passive ROM > active ROM = muscle/tendon problem, not the joint itself. A rotator cuff tear reduces active strength while passive motion is preserved. In adhesive capsulitis, BOTH active and passive ROM are equally restricted in all planes."},
{"sec":"Musculoskeletal","lo":"LO5","stem":"During a knee exam you feel a coarse grating sensation with flexion/extension. The patient reports it has been present for years with no pain. What is this finding and when is it clinically significant?","opts":["A. Ballottement — clinically significant if associated with effusion","B. Crepitus — significant when accompanied by pain, swelling, or functional limitation","C. McMurray sign — significant only in acute injuries","D. Varus thrust — always requires surgical evaluation"],"answer":"B","exp":"Crepitus is a coarse crackling/grating felt or heard during joint movement. Fine crepitus can be normal. Coarse crepitus with accompanying pain, swelling, or warmth suggests active joint pathology such as osteoarthritis. Isolated asymptomatic crepitus in an older patient may be incidental."},
{"sec":"Musculoskeletal","lo":"LO6","stem":"Examining a patient with acute monoarthritis of the knee, which combination MOST supports an inflammatory etiology?","opts":["A. Bony enlargement, crepitus, morning stiffness 10 minutes, no warmth","B. Erythema, warmth, swelling, morning stiffness lasting 90 minutes","C. Gradual onset over years, worse with activity, improved with rest","D. Asymmetric, weight-bearing joint, normal ESR"],"answer":"B","exp":"Classic inflammatory signs: erythema, warmth, swelling (PRISH). Morning stiffness >1 hour is a hallmark of inflammatory arthritis. Non-inflammatory OA: brief stiffness, bony enlargement, worse with activity, no erythema/warmth."},
{"sec":"Musculoskeletal","lo":"LO6","stem":"You are assessing a patient for septic arthritis of the right knee. Which finding combination would MOST differentiate septic arthritis from crystal arthropathy (gout)?","opts":["A. Both present identically; differentiation requires synovial fluid analysis","B. Septic arthritis always causes bilateral joint involvement; gout is unilateral","C. Gout always has a rash; septic arthritis never does","D. Septic arthritis is painless; gout is always painful"],"answer":"A","exp":"Septic arthritis and crystal arthropathies (gout, pseudogout) can be clinically indistinguishable — both can cause acute monoarthritis with erythema, warmth, swelling, and fever. Synovial fluid analysis (WBC count, Gram stain, culture, and crystal identification under polarized light) is required to definitively differentiate them."},
{"sec":"Musculoskeletal","lo":"LO7","stem":"When examining the TMJ, you place fingertips just anterior to the tragus and ask the patient to open and close the mouth. A painful click is felt. This MOST represents:","opts":["A. Normal condylar motion","B. TMJ dysfunction with anterior disc displacement with reduction","C. Parotid gland enlargement","D. Styloid process fracture"],"answer":"B","exp":"The condyle of the mandible sits just anterior to the tragus. A painful click on opening = anterior disc displacement with reduction — the disc snaps over the condyle. This is the most common TMJ disorder."},
{"sec":"Musculoskeletal","lo":"LO7","stem":"You suspect a knee effusion. Which maneuver detects a SMALL effusion (5–10 mL)?","opts":["A. Patellar tap (ballottement)","B. Bulge sign (fluid wave across the medial sulcus)","C. Valgus stress test","D. McMurray maneuver"],"answer":"B","exp":"Bulge sign: milk fluid from suprapatellar pouch medially, then tap lateral aspect — a fluid bulge appears medially = positive. Detects small effusions (5–10 mL). Ballottement (patellar tap) detects larger effusions (>10 mL). McMurray and valgus stress test for meniscus and ligament integrity."},
{"sec":"Musculoskeletal","lo":"LO8","stem":"A 35-year-old pitcher has pain on the 'empty can' test (arm abducted 90°, internally rotated, resisted downward pressure). Which rotator cuff muscle is MOST likely affected?","opts":["A. Subscapularis","B. Infraspinatus","C. Supraspinatus","D. Teres minor"],"answer":"C","exp":"The empty can (Jobe) test isolates the supraspinatus. The supraspinatus (S in SITS) initiates abduction from 0–15° and is the most commonly torn rotator cuff muscle. Infraspinatus and teres minor = external rotation. Subscapularis = internal rotation (tested by lift-off and belly press)."},
{"sec":"Musculoskeletal","lo":"LO8","stem":"Which combination of shoulder tests has the HIGHEST predictive value for diagnosing a full-thickness rotator cuff tear?","opts":["A. Neer sign + Hawkins-Kennedy + Apprehension test","B. Painful arc + Drop arm test + Supraspinatus weakness (empty can)","C. Cross-body adduction + Speed's test + O'Brien's test","D. External rotation lag + Lift-off + Belly press"],"answer":"B","exp":"Studies show the combination of painful arc (60–120°), drop arm test, and supraspinatus weakness best predicts full-thickness rotator cuff tears. Neer/Hawkins test for impingement, not tears specifically. Combined likelihood ratio of the three is substantially higher than any single test."},
{"sec":"Musculoskeletal","lo":"LO9","stem":"You flex the knee to 90°, stabilize the foot, and draw the tibia anteriorly. The tibia translates 8mm with a soft endpoint. This test and its interpretation are:","opts":["A. Posterior drawer test; PCL tear","B. Anterior drawer test; ACL tear","C. McMurray test; medial meniscus tear","D. Lachman test; ACL tear"],"answer":"B","exp":"Anterior drawer at 90° flexion: anterior tibial translation >5mm with soft endpoint = ACL deficiency. Lachman (at 20–30° flexion) is MORE sensitive for acute ACL tears. McMurray involves rotation with extension. Posterior drawer: tibia pushed posteriorly = PCL."},
{"sec":"Musculoskeletal","lo":"LO9","stem":"Why is the Lachman test preferred over the anterior drawer test for diagnosing ACUTE ACL tears?","opts":["A. Lachman is easier to perform and does not require patient cooperation","B. At 20–30° flexion, hamstrings cannot splint the knee; also avoids the pain of 90° flexion with acute hemarthrosis","C. Lachman tests the PCL rather than the ACL","D. Lachman requires no special positioning"],"answer":"B","exp":"At 20–30° flexion (Lachman position), the hamstrings are mechanically unable to splint the knee, reducing false negatives. Also, acute hemarthrosis and guarding make 90° flexion uncomfortable, so Lachman has ~85% sensitivity vs ~62% for anterior drawer in acute injury."},
{"sec":"Musculoskeletal","lo":"LO10","stem":"A 42-year-old has numbness/tingling in her thumb, index, and middle fingers, worse at night. Phalen's test is positive at 45 seconds. Which nerve and compartment are involved?","opts":["A. Ulnar nerve; Guyon's canal","B. Radial nerve; radial tunnel","C. Median nerve; carpal tunnel","D. Anterior interosseous nerve; pronator syndrome"],"answer":"C","exp":"Carpal tunnel syndrome: median nerve compressed in the carpal tunnel at the wrist. Classic distribution: thumb, index, middle, radial half of ring. Nocturnal symptoms and positive Phalen's (wrist flexion 60 sec) are hallmarks. Ulnar = 4th-5th digits through Guyon's canal."},
{"sec":"Musculoskeletal","lo":"LO10","stem":"Advanced carpal tunnel syndrome may show which additional physical exam finding?","opts":["A. Hypothenar muscle atrophy","B. Thenar muscle atrophy with weak thumb opposition","C. Clawing of ring and little fingers","D. Weakness of wrist extension"],"answer":"B","exp":"The median nerve innervates thenar muscles (LOAF: Lumbricals 1&2, Opponens pollicis, Abductor pollicis brevis, Flexor pollicis brevis). Long-standing CTS → thenar atrophy + weak pinch/opposition. Hypothenar atrophy + claw hand = ulnar nerve. Wrist extension weakness = radial nerve."},
{"sec":"Musculoskeletal","lo":"LO11","stem":"A 68-year-old woman has nodular swelling at the DIP joints bilaterally and a squared-off thumb base. X-ray shows subchondral sclerosis. This is MOST consistent with:","opts":["A. Rheumatoid arthritis","B. Osteoarthritis","C. Psoriatic arthritis","D. Gout"],"answer":"B","exp":"Heberden's nodes (DIP) and Bouchard's nodes (PIP) are hallmarks of OA. CMC joint 'squaring' at the thumb base is classic OA. OA spares MCPs/wrists typically. RA: MCP/PIP boggy synovitis, ulnar deviation, spares DIP."},
{"sec":"Musculoskeletal","lo":"LO11","stem":"Finkelstein's test is positive in a new mother with radial-sided wrist pain. What condition does this confirm and what tendons are involved?","opts":["A. Scaphoid fracture — scaphoid and trapezium","B. De Quervain's tenosynovitis — APL and EPB tendons of the 1st dorsal compartment","C. Carpal tunnel syndrome — flexor tendons","D. Trigger finger — flexor digitorum superficialis"],"answer":"B","exp":"Finkelstein's: thumb in fist, ulnar deviation → pain at radial styloid. Confirms De Quervain's tenosynovitis (1st dorsal compartment: abductor pollicis longus + extensor pollicis brevis). Common in new mothers from repetitive baby-lifting."},
{"sec":"Musculoskeletal","lo":"LO12","stem":"A wrist laceration results in inability to abduct the little finger, clawing of ring/little fingers, and sensory loss over the hypothenar eminence. Which nerve is injured?","opts":["A. Median nerve","B. Radial nerve","C. Ulnar nerve","D. Musculocutaneous nerve"],"answer":"C","exp":"Ulnar nerve at the wrist: innervates all interossei, hypothenar muscles, medial 2 lumbricals, adductor pollicis. Sensory: little finger and ulnar half of ring finger. Injury → claw hand (ring/little fingers) + hypothenar atrophy + adductor weakness."},
{"sec":"Musculoskeletal","lo":"LO12","stem":"Which intrinsic hand muscles are innervated by the median nerve (the 'LOAF' muscles)?","opts":["A. All interossei and hypothenar group","B. Lumbricals 1&2, Opponens pollicis, Abductor pollicis brevis, Flexor pollicis brevis","C. All lumbricals and thenar eminence","D. Adductor pollicis and dorsal interossei"],"answer":"B","exp":"LOAF = Lumbricals 1&2, Opponens pollicis, Abductor pollicis brevis, Flexor pollicis brevis — all median nerve. The ulnar nerve innervates lumbricals 3&4, all interossei, hypothenar group, and adductor pollicis. The radial nerve has no intrinsic hand muscles."},
{"sec":"Musculoskeletal","lo":"LO13","stem":"A 72-year-old man with hip OA struggles to rise from a chair. The PRIMARY hip flexor and the nerve root mediating it are:","opts":["A. Gluteus maximus; L5-S1","B. Iliopsoas; L1-L3 (femoral nerve)","C. Rectus femoris; L3-L4","D. Tensor fasciae latae; L4-L5"],"answer":"B","exp":"The iliopsoas (iliacus + psoas major) is the primary and most powerful hip flexor, innervated by the femoral nerve (L1–L3). Rectus femoris also flexes the hip but is primarily a knee extensor. Gluteus maximus = primary hip EXTENSOR."},
{"sec":"Musculoskeletal","lo":"LO13","stem":"After total hip replacement, a patient cannot climb stairs using the affected leg and has difficulty rising from a seat. Which muscle group is MOST affected?","opts":["A. Hip abductors (gluteus medius)","B. Hip flexors (iliopsoas)","C. Hip extensors (gluteus maximus and hamstrings)","D. Hip adductors (adductor longus)"],"answer":"C","exp":"Hip extensors — gluteus maximus (primary) and hamstrings — are required for rising from a seat and climbing stairs. Hip abductor weakness causes Trendelenburg gait. Posterior surgical approaches may disrupt gluteus maximus function."},
{"sec":"Musculoskeletal","lo":"LO14","stem":"A 6-year-old boy's knees touch when standing with feet together, with a 6 cm gap between medial malleoli. This deformity is:","opts":["A. Genu varum","B. Genu valgum","C. Flexion contracture","D. Coxa vara"],"answer":"B","exp":"Genu valgum (knock-knees): knees touch, medial malleoli separated. Associated with lateral compartment knee OA and patellofemoral syndrome. Genu varum (bowlegs): knees apart, feet/ankles together — medial compartment OA. Mild valgum is normal in children aged 2–5."},
{"sec":"Musculoskeletal","lo":"LO14","stem":"How does genu varum predispose to osteoarthritis differently from genu valgum?","opts":["A. Genu varum increases lateral compartment loading; genu valgum increases medial loading","B. Genu varum increases medial compartment loading; genu valgum increases lateral compartment loading","C. Both deformities increase medial compartment loading equally","D. Neither deformity directly alters compartmental loading"],"answer":"B","exp":"Genu varum shifts the mechanical axis medially → increased medial compartment loading → medial OA. Genu valgum shifts the axis laterally → lateral compartment OA + increased patellofemoral contact pressures."},
{"sec":"Musculoskeletal","lo":"LO15","stem":"A 22-year-old hears a 'pop' on pivoting, has immediate swelling within 2 hours, and McMurray's test produces a palpable clunk with external rotation. This MOST suggests:","opts":["A. ACL tear with medial meniscus injury","B. Patellofemoral syndrome","C. PCL tear","D. Knee OA"],"answer":"A","exp":"Pop + immediate hemarthrosis (within 2 hours) = ACL tear or patellar dislocation. Positive McMurray (palpable clunk with rotation) = meniscal tear. Combined mechanism (pivot + pop + hemarthrosis + McMurray) strongly suggests the classic 'unhappy triad': ACL + medial meniscus + MCL."},
{"sec":"Musculoskeletal","lo":"LO15","stem":"A 55-year-old woman has anterior knee pain worse when descending stairs and after prolonged sitting (positive 'theater sign'). X-ray shows lateral patellar tilt. The MOST likely diagnosis is:","opts":["A. ACL tear","B. Patellar tendinopathy","C. Patellofemoral syndrome","D. Medial meniscus tear"],"answer":"C","exp":"Patellofemoral syndrome: anterior knee pain with stairs, squatting, and prolonged sitting (theater sign). Positive patellar grind/Clarke's test. Lateral patellar tilt → increased lateral facet pressure. Treatment: VMO strengthening, patellar taping. ACL tear has instability and effusion."},
{"sec":"Eyes","lo":"LO1","stem":"A patient reads the 20/40 line but improves to 20/20 with a pinhole occluder. This finding indicates:","opts":["A. Optic neuritis","B. Macular degeneration","C. Refractive error correctable with glasses","D. Retinal detachment"],"answer":"C","exp":"Pinhole occluder eliminates peripheral light rays and reduces refractive error effect. Improvement = refractive error (myopia, hyperopia, astigmatism) — correctable with glasses. No improvement = media opacity (cataract), retinal disease, or neurologic cause."},
{"sec":"Eyes","lo":"LO1","stem":"What does visual acuity of 20/200 mean, and what is the clinical threshold for legal blindness in the US?","opts":["A. Patient sees at 200 feet what normal sees at 20 feet; legal blindness = 20/100","B. Patient sees at 20 feet what normal sees at 200 feet; legal blindness = 20/200","C. Patient sees at 20 feet what normal sees at 200 feet; legal blindness = 20/400","D. Both eyes test equally; legal blindness is defined differently for each eye"],"answer":"B","exp":"20/200: patient sees at 20 feet what a normal eye sees at 200 feet. Legal blindness in the US = best corrected VA of 20/200 or worse in the better eye, OR visual field ≤20 degrees. This is the threshold for disability classification."},
{"sec":"Eyes","lo":"LO2","stem":"A patient fails to detect movement in the right lower quadrant of both eyes on confrontation testing. This MOST likely indicates a lesion in:","opts":["A. Right optic nerve","B. Optic chiasm","C. Left parietal lobe (superior optic radiation)","D. Left temporal lobe (inferior optic radiation)"],"answer":"C","exp":"Right homonymous inferior quadrantanopia = lesion in LEFT superior optic radiation (parietal lobe). Mnemonic: 'parietal = pie in the floor' (inferior quadrant defect). Temporal lobe = 'pie in the sky' (superior defect). Optic chiasm = bitemporal hemianopia. Optic nerve = monocular."},
{"sec":"Eyes","lo":"LO2","stem":"A patient develops diplopia and cannot look left with the left eye. The right eye abducts normally. Which cranial nerve is involved?","opts":["A. CN III right","B. CN IV left","C. CN VI left","D. CN III left"],"answer":"C","exp":"CN VI (abducens) controls the lateral rectus (abduction). Inability to abduct the left eye = left CN VI palsy. CN VI palsy is the most common isolated ocular motor nerve palsy (causes: elevated ICP, MS, diabetes, HTN). CN III: all other movements + pupil. CN IV: superior oblique."},
{"sec":"Eyes","lo":"LO3","stem":"Hirschberg test: corneal light reflex is centered in the right eye but falls temporal to the pupil in the left eye. This indicates:","opts":["A. Normal alignment","B. Left esotropia (left eye deviated medially)","C. Left exotropia (left eye deviated laterally)","D. Left hypertropia"],"answer":"B","exp":"In Hirschberg testing, the reflex moves OPPOSITE to the direction of deviation. Temporal reflex displacement = the eye is deviated medially = esotropia. Nasal displacement → exotropia (outward deviation)."},
{"sec":"Eyes","lo":"LO3","stem":"Which cranial nerve has the highest ratio of muscles innervated (4 of 6 extraocular muscles)?","opts":["A. CN IV (trochlear)","B. CN VI (abducens)","C. CN III (oculomotor)","D. CN V (trigeminal)"],"answer":"C","exp":"CN III (oculomotor) innervates: medial rectus, superior rectus, inferior rectus, inferior oblique (4 muscles), plus levator palpebrae superioris (lid elevation) and pupillary sphincter/ciliary muscle (parasympathetic). CN IV: superior oblique only. CN VI: lateral rectus only."},
{"sec":"Eyes","lo":"LO4","stem":"You shine a penlight into the right eye — both pupils constrict. You then shine only into the left eye — neither pupil constricts. This MOST indicates:","opts":["A. Left CN III palsy","B. Complete left afferent pupillary defect (left optic nerve lesion)","C. Right Horner's syndrome","D. Bilateral Argyll Robertson pupils"],"answer":"B","exp":"Right eye illumination → both constrict (normal). Left eye illumination → neither constricts = complete left afferent defect. The damaged left optic nerve sends no signal to the EW nucleus, so no efferent drive reaches either pupil. This is a complete RAPD = optic nerve/retinal lesion."},
{"sec":"Eyes","lo":"LO4","stem":"A patient's pupils accommodate normally to near targets but do NOT react to a penlight. This is the _____ pupil, associated with:","opts":["A. Marcus Gunn; optic neuritis","B. Argyll Robertson; neurosyphilis","C. Horner's; carotid dissection","D. Adie's; autonomic neuropathy"],"answer":"B","exp":"'Accommodates but doesn't react' = Argyll Robertson pupil. Damage to the pretectal nucleus disrupts the light reflex while sparing accommodation fibers to the Edinger-Westphal nucleus. Pathognomonic for neurosyphilis (historically). Also called the 'prostitute's pupil.'"},
{"sec":"Eyes","lo":"LO5","stem":"The near reflex (accommodation-convergence) consists of three simultaneous responses when focusing on a near object. Which combination is COMPLETE and CORRECT?","opts":["A. Convergence + mydriasis + lens flattening","B. Divergence + miosis + lens thickening","C. Convergence + miosis + lens thickening (accommodation)","D. Convergence + mydriasis + lens thickening"],"answer":"C","exp":"Near reflex triad: 1) Convergence (bilateral medial rectus contraction via CN III); 2) Pupillary miosis (parasympathetics via CN III → Edinger-Westphal nucleus → ciliary ganglion → sphincter pupillae); 3) Accommodation (ciliary muscle contracts, zonular fibers relax → lens thickens → increased refractive power)."},
{"sec":"Eyes","lo":"LO5","stem":"A 70-year-old man can no longer read menus without holding them at arm's length. He has no difficulty with distance vision. His near vision improves with +2.0 reading glasses. This is BEST explained by:","opts":["A. Myopia — light focused in front of the retina","B. Hyperopia — light focused behind the retina","C. Presbyopia — age-related loss of lens accommodation","D. Astigmatism — irregular corneal curvature"],"answer":"C","exp":"Presbyopia: age-related (typically >40 years) loss of accommodation due to decreased lens elasticity. Patient cannot focus on near objects despite clear distance vision. Corrected with convex reading glasses (+). Distinct from hyperopia, which is a refractive error present from youth."},
{"sec":"Eyes","lo":"LO6","stem":"When performing funduscopy through an undilated pupil in a dim room, which ophthalmoscope aperture reduces glare?","opts":["A. Large aperture — maximizes field of view","B. Small aperture — reduces glare through the small pupil","C. Red-free filter — dilates the pupil using green light","D. Slit beam — assesses corneal topography"],"answer":"B","exp":"The small aperture is used for undilated pupils. A narrower beam reduces corneal/lens glare and passes more easily through the small pupil. Large aperture is used for dilated exams. The red-free filter does not affect pupil size but enhances vascular visibility."},
{"sec":"Eyes","lo":"LO6","stem":"The red-free (green) filter on the ophthalmoscope is MOST useful for identifying:","opts":["A. Papilledema — blurred disc margins","B. Optic disc pallor — loss of nerve fiber layer","C. Retinal microaneurysms and hemorrhages — which appear dark against the retina","D. Macular drusen — lipid deposits in AMD"],"answer":"C","exp":"The red-free filter blocks red wavelengths, making red structures (vessels, hemorrhages) appear dark/black against the lighter retinal background. This dramatically increases contrast and helps detect: microaneurysms, hemorrhages (DR), nerve fiber layer defects (early glaucoma), and subtle vascular changes in HTN."},
{"sec":"Eyes","lo":"LO7","stem":"Funduscopy reveals a cup-to-disc ratio of 0.8 with vertical elongation and disc pallor. The patient has no visual symptoms. This is MOST concerning for:","opts":["A. Diabetic retinopathy","B. Hypertensive retinopathy","C. Glaucomatous optic neuropathy","D. Papilledema"],"answer":"C","exp":"Normal C:D ratio <0.5. Ratio >0.6 with vertical elongation and pallor = classic glaucomatous optic neuropathy. Glaucoma (open-angle) is asymptomatic until late — hence the importance of routine funduscopy. Papilledema: swollen disc + blurred margins (elevated ICP). DR: microaneurysms, hemorrhages."},
{"sec":"Eyes","lo":"LO7","stem":"When examining the macula, you ask the patient to look directly at your light. The fovea in a healthy eye appears as:","opts":["A. A bright white reflex with surrounding cotton-wool spots","B. A bright pinpoint light reflex (foveal reflex) in an avascular region","C. A prominent vascular arcade with crossing arterioles","D. A pale disc with well-defined margins"],"answer":"B","exp":"The fovea is the central depression of the macula, responsible for highest-acuity vision. It appears as a bright pinpoint light reflex when illuminated. The macula is avascular (no major vessels). Having the patient look at the light brings the macula directly into view."},
{"sec":"Eyes","lo":"LO8","stem":"Funduscopy in a poorly controlled diabetic shows new vessel formation arising from the optic disc. This is:","opts":["A. Non-proliferative diabetic retinopathy","B. Proliferative diabetic retinopathy","C. Central retinal artery occlusion","D. Stage II hypertensive retinopathy"],"answer":"B","exp":"Proliferative DR (PDR) is defined by neovascularization — new fragile vessels from the disc (NVD) or elsewhere (NVE) driven by retinal ischemia (VEGF). These can bleed (vitreous hemorrhage) or tractionally detach the retina. NPDR has microaneurysms, hemorrhages, exudates but NO new vessels. PDR requires urgent treatment."},
{"sec":"Eyes","lo":"LO8","stem":"AV nicking on funduscopy is MOST commonly caused by which mechanism?","opts":["A. Diabetes mellitus — glucose deposition in vessel walls","B. Hypertension — thickened arteriolar wall compressing the venule at crossings","C. Hyperlipidemia — lipid plaques narrowing the venule","D. Anemia — increased viscosity compressing veins"],"answer":"B","exp":"In HTN, chronic high pressure causes arteriolar sclerosis. At A-V crossings (shared adventitial sheath), the thickened arteriole compresses the venule = AV nicking. Other HTN signs: copper/silver wire arteries, flame hemorrhages, cotton-wool spots, papilledema (malignant HTN)."},
{"sec":"Eyes","lo":"LO9","stem":"A 28-year-old has acute right eye pain, photophobia, circumcorneal flush, irregular miotic pupil, and cells/flare in the anterior chamber. The MOST likely diagnosis is:","opts":["A. Bacterial conjunctivitis","B. Acute angle-closure glaucoma","C. Anterior uveitis (iritis)","D. Viral keratitis"],"answer":"C","exp":"Anterior uveitis: circumcorneal flush, photophobia, pain, miosis (irregular — posterior synechiae), cells/flare in anterior chamber, decreased vision. Associated with HLA-B27 spondyloarthropathies, sarcoidosis, IBD. Angle-closure: mid-dilated FIXED pupil, rock-hard globe, nausea/vomiting. Conjunctivitis: diffuse redness, discharge, normal pupil."},
{"sec":"Eyes","lo":"LO9","stem":"A patient has severe eye pain, halos around lights, nausea/vomiting, and a rock-hard globe with mid-dilated non-reactive pupil and hazy cornea. This constitutes which emergency?","opts":["A. Retinal detachment","B. Central retinal artery occlusion","C. Acute angle-closure glaucoma","D. Optic neuritis"],"answer":"C","exp":"Acute angle-closure glaucoma: rapid IOP elevation (>40 mmHg) from aqueous outflow obstruction. Classic: severe pain + halos + nausea/vomiting. Exam: mid-dilated FIXED pupil, corneal edema, rock-hard globe. Treatment: IV acetazolamide, topical beta-blockers, pilocarpine + urgent laser iridotomy."},
{"sec":"Eyes","lo":"LO10","stem":"A patient loses both temporal visual fields (cannot see to either side peripherally) but retains central vision. MRI shows a sella turcica mass. This is:","opts":["A. Right homonymous hemianopia","B. Bitemporal hemianopia","C. Left monocular blindness","D. Left homonymous hemianopia"],"answer":"B","exp":"Bitemporal hemianopia = optic chiasm lesion. The chiasm is where nasal fibers (carrying temporal visual fields) decussate. Compression from a pituitary adenoma disrupts both nasal fiber bundles → bilateral temporal field loss. Central vision (papillomacular bundle) is often initially spared."},
{"sec":"Eyes","lo":"LO10","stem":"A lesion of the LEFT temporal lobe (inferior optic radiation, Meyer's loop) produces which visual field defect?","opts":["A. Left homonymous hemianopia","B. Right homonymous superior quadrantanopia ('pie in the sky')","C. Bitemporal hemianopia","D. Right homonymous inferior quadrantanopia ('pie in the floor')"],"answer":"B","exp":"Meyer's loop (inferior optic radiation) runs through the temporal lobe and carries inferior visual field information from the superior retina of BOTH eyes — but representing the CONTRALATERAL superior visual field. Left temporal lobe lesion → right superior quadrantanopia ('pie in the sky'). Parietal = 'pie in the floor' (inferior quadrant defect contralaterally)."},
{"sec":"Eyes","lo":"LO11","stem":"During the swinging flashlight test, when light swings to the LEFT eye, both pupils dilate. This indicates:","opts":["A. Left efferent defect (CN III palsy)","B. Right efferent defect (CN III palsy)","C. Left afferent defect (left optic nerve lesion) — left RAPD","D. Normal accommodation response"],"answer":"C","exp":"RAPD: when light swings to the affected eye, both pupils paradoxically dilate because the damaged optic nerve sends a weaker signal to the EW nucleus, reducing efferent drive to both pupils. Causes: optic neuritis, optic nerve compression, extensive retinal disease. Efferent defect (CN III palsy) = fixed dilated pupil regardless of which eye is illuminated."},
{"sec":"Eyes","lo":"LO11","stem":"To prevent the accommodation reflex from confounding the swinging flashlight test, the patient should:","opts":["A. Close both eyes between flashes","B. Fixate on a distant target throughout the test","C. Cover the untested eye","D. Look up and to the right"],"answer":"B","exp":"Fixating on a distant target prevents accommodation convergence — which also causes pupillary constriction via the near reflex. If the patient repeatedly accommodates (refocuses), pupils constrict with each near fixation, masking the RAPD. Distant fixation isolates the afferent pupillary reflex being tested."},
{"sec":"Eyes","lo":"LO12","stem":"A 24-year-old has difficulty reading but can see distant objects clearly. A +3.00 diopter correction brings her to 20/20. She MOST likely has:","opts":["A. Myopia","B. Presbyopia","C. Hyperopia","D. Astigmatism"],"answer":"C","exp":"Hyperopia (farsightedness): eye too short → light focuses BEHIND retina → difficulty with near vision. Young patients compensate with accommodation. Corrected with PLUS (+) convex lenses. Myopia: difficulty with distance, minus lenses. Presbyopia: age-related accommodation loss (typically >40). Astigmatism: blurred at all distances, irregular corneal curvature."},
{"sec":"Eyes","lo":"LO12","stem":"A 19-year-old has yellow flat deposits on both upper and lower eyelids medially. His total cholesterol is 310 mg/dL. This is MOST likely:","opts":["A. Chalazion","B. Xanthelasma","C. Hordeolum","D. Arcus senilis"],"answer":"B","exp":"Xanthelasma: yellowish lipid plaques on eyelids (medial canthus). In patients under 50, strongly associated with hyperlipidemia. Chalazion: painless chronic granuloma of meibomian gland (lid nodule). Hordeolum (stye): acute painful infection of eyelid gland. Arcus senilis: gray-white ring at corneal periphery."},
{"sec":"Eyes","lo":"LO13","stem":"A 52-year-old has right upper lid ptosis, right miosis, and right facial anhidrosis. Chest X-ray shows a right apical lung mass. The BEST explanation is:","opts":["A. Right CN III palsy from PCA aneurysm","B. Right Horner's syndrome from Pancoast tumor","C. Right Bell's palsy","D. Right CN VII palsy"],"answer":"B","exp":"Horner's syndrome triad: ptosis (partial), miosis, anhidrosis (ipsilateral face). Pancoast (superior sulcus) tumor compresses preganglionic sympathetic fibers. CN III palsy: complete ptosis + DILATED pupil + 'down-and-out' eye. Bell's palsy (CN VII): all facial muscles affected including lower face."},
{"sec":"Eyes","lo":"LO13","stem":"A patient with an internal carotid artery dissection develops Horner's syndrome. Anhidrosis is ABSENT. Which level of the sympathetic pathway does this localize to?","opts":["A. First-order (central) neuron — affects entire ipsilateral body","B. Second-order (preganglionic) neuron — affects ipsilateral face","C. Third-order (postganglionic) neuron — sudomotor fibers travel with external carotid, not internal","D. It cannot be localized without pharmacologic testing"],"answer":"C","exp":"Third-order (postganglionic) Horner's: the sympathetic fibers travel along the internal carotid artery in the cavernous sinus to the orbit. Sudomotor fibers to the face leave with the EXTERNAL carotid artery earlier in the pathway — so internal carotid dissection (postganglionic) causes ptosis + miosis WITHOUT anhidrosis. Painful Horner's + no anhidrosis = think carotid dissection."},
{"sec":"HENT","lo":"LO1","stem":"A 45-year-old describes a headache reaching peak intensity within seconds while lifting weights — the worst of his life. He is afebrile with no neuro deficits. The MOST appropriate next step is:","opts":["A. Prescribe NSAIDs for tension headache","B. Diagnose migraine and start a triptan","C. Emergent non-contrast head CT, then LP if CT negative","D. Prednisone for cluster headache"],"answer":"C","exp":"Thunderclap headache (peak intensity within 60 seconds) = subarachnoid hemorrhage until proven otherwise. Non-contrast CT first (90-98% sensitive in first 6 hours). If negative: LP for xanthochromia (bilirubin from lysed RBCs). Life-threatening emergency — never assume benign without full workup."},
{"sec":"HENT","lo":"LO1","stem":"A 68-year-old woman has new headache, jaw pain with chewing, and right temporal tenderness. ESR is 95 mm/hr. What requires IMMEDIATE treatment to prevent blindness?","opts":["A. Tension-type headache","B. Trigeminal neuralgia","C. Giant cell arteritis (temporal arteritis)","D. Cluster headache"],"answer":"C","exp":"Giant cell arteritis in patients >50 with jaw claudication, temporal tenderness, elevated ESR, and new headache. Risk of irreversible blindness (AION from ophthalmic artery involvement). Treatment: HIGH-DOSE PREDNISONE IMMEDIATELY — do not wait for biopsy. Temporal artery biopsy confirms diagnosis but must not delay steroids."},
{"sec":"HENT","lo":"LO2","stem":"Weber lateralizes LEFT. Left Rinne: BC>AC. Right Rinne: AC>BC. This pattern is MOST consistent with:","opts":["A. Sensorineural hearing loss in the RIGHT ear","B. Conductive hearing loss in the LEFT ear","C. Sensorineural hearing loss in the LEFT ear","D. Normal hearing bilaterally"],"answer":"B","exp":"Weber lateralizes to the affected ear in conductive loss. Negative Rinne (BC≥AC) on the LEFT confirms conductive loss on that side. Normal Rinne (AC>BC) on right confirms intact right ear. Diagnosis: left conductive hearing loss (e.g., otitis media, cerumen, otosclerosis)."},
{"sec":"HENT","lo":"LO2","stem":"Presbycusis (age-related SNHL) would show which Weber and Rinne pattern?","opts":["A. Weber lateralizes to affected ear; negative Rinne on that side","B. Weber midline or toward better ear; positive Rinne bilaterally but reduced on affected side","C. Weber to midline; BC>AC bilaterally","D. Weber to affected ear; AC>BC bilaterally"],"answer":"B","exp":"Sensorineural hearing loss: Weber lateralizes AWAY from the affected ear (toward better hearing). Rinne: positive (AC>BC) bilaterally — air conduction remains better than bone, but both are reduced on the affected side. Presbycusis is bilateral high-frequency SNHL; Weber is often midline (symmetric) or slightly toward the better ear."},
{"sec":"HENT","lo":"LO3","stem":"A 4-year-old has fever, ear tugging, and an erythematous, bulging TM with decreased mobility on pneumatic otoscopy. Pinna traction does NOT worsen pain. The diagnosis is:","opts":["A. Otitis externa","B. Acute otitis media","C. Serous otitis media","D. Mastoiditis"],"answer":"B","exp":"AOM: bulging, erythematous TM with decreased mobility on pneumatic otoscopy (hallmark). Fever, pain, irritability. Pinna/tragus traction does NOT worsen pain — differentiates from OE. Common pathogens: S. pneumoniae, H. influenzae, M. catarrhalis."},
{"sec":"HENT","lo":"LO3","stem":"A swimmer has severe otalgia that worsens dramatically when you pull the pinna superiorly and push on the tragus. The external canal is edematous with discharge. The TM is intact. This is:","opts":["A. Acute otitis media","B. Otitis externa (swimmer's ear)","C. Cholesteatoma","D. Barotrauma"],"answer":"B","exp":"Otitis externa: pinna traction and tragus pressure = severe pain (pathognomonic), external canal edema/erythema/discharge, history of water exposure or cotton swab use. TM typically intact when visible. Intact TM differentiates from AOM with perforation."},
{"sec":"HENT","lo":"LO4","stem":"A patient describes brief episodic spinning when rolling over in bed, lasting about 30 seconds, with no hearing loss or tinnitus. This MOST suggests:","opts":["A. Menière's disease","B. Benign paroxysmal positional vertigo (BPPV)","C. Vestibular neuritis","D. Vertebrobasilar stroke"],"answer":"B","exp":"BPPV: brief (<1 min) positional vertigo triggered by head position change. No hearing loss or tinnitus. Caused by displaced otoconia in semicircular canals. Dix-Hallpike maneuver is diagnostic; Epley maneuver is curative. Menière's: vertigo + tinnitus + hearing loss + aural fullness (triad). Vestibular neuritis: continuous vertigo lasting days."},
{"sec":"HENT","lo":"LO4","stem":"A patient has 'ringing in her ears' that only she can hear, worse at night, present for 2 years. She has subjective tinnitus. Which associated condition would you evaluate for given unilateral tinnitus?","opts":["A. Allergic rhinitis","B. Acoustic neuroma (vestibular schwannoma)","C. Temporal lobe tumor","D. Chronic sinusitis"],"answer":"B","exp":"Unilateral tinnitus + hearing loss is a red flag for acoustic neuroma (vestibular schwannoma) — a benign CN VIII tumor. MRI with contrast (gadolinium) is required to rule this out. Acoustic neuromas also cause progressive unilateral SNHL. Bilateral tinnitus with bilateral SNHL is more consistent with noise-induced damage or presbycusis."},
{"sec":"HENT","lo":"LO5","stem":"A 48-year-old with a 30 pack-year history has hoarseness for 3 months. The MOST important next step is:","opts":["A. Reassure — likely chronic laryngitis from smoking","B. PPI for presumed GERD laryngitis","C. Urgent laryngoscopy to evaluate for laryngeal carcinoma","D. Antibiotics for bacterial laryngitis"],"answer":"C","exp":"Chronic hoarseness >2–3 weeks in a smoker requires direct laryngoscopy to exclude laryngeal carcinoma. Hoarseness can also reflect left RLN palsy (lung/thyroid/mediastinal mass), vocal cord polyps, GERD, hypothyroidism. Never assume benign etiology without visualization."},
{"sec":"HENT","lo":"LO5","stem":"Unilateral nasal obstruction + unilateral epistaxis + a visible mass in a 45-year-old is MOST concerning for:","opts":["A. Deviated nasal septum","B. Allergic rhinitis","C. Sinonasal malignancy","D. Nasal foreign body"],"answer":"C","exp":"Unilateral nasal obstruction + epistaxis + mass = concern for sinonasal malignancy, nasopharyngeal carcinoma, or inverted papilloma. Unilateral findings require imaging and biopsy. Bilateral pale boggy turbinates = allergic. Deviated septum: unilateral obstruction without mass or epistaxis."},
{"sec":"HENT","lo":"LO7","stem":"A 26-year-old woman has coarse, dry hair, loss of the lateral third of her eyebrows (Queen Anne sign), cold intolerance, and weight gain. This MOST suggests:","opts":["A. Hyperthyroidism","B. Hypothyroidism","C. Iron deficiency anemia","D. Polycystic ovarian syndrome"],"answer":"B","exp":"Hypothyroidism: coarse, dry hair; lateral eyebrow loss (Queen Anne sign); cold intolerance; weight gain; constipation; bradycardia; dry skin; periorbital edema; delayed DTR relaxation (hung-up reflexes); hoarseness. Hyperthyroid: fine silky hair, weight loss, heat intolerance, diarrhea, tachycardia, tremor, warm moist skin."},
{"sec":"HENT","lo":"LO8","stem":"In an adult, you pull the pinna in which direction to straighten the external auditory canal for otoscopy?","opts":["A. Down and forward","B. Up and back (superiorly and posteriorly)","C. Forward and medially","D. Down and back"],"answer":"B","exp":"Adults: pull pinna up and back (posterosuperiorly) to straighten the S-shaped canal. Children under 3: pull down and back (canal curves differently). Use the largest speculum that comfortably fits; approach from lateral, slightly angled to visualize the TM."},
{"sec":"HENT","lo":"LO8","stem":"A normal tympanic membrane exam should show all of the following EXCEPT:","opts":["A. A cone of light reflex at the 5 o'clock position (right ear)","B. The handle of the malleus visible in the superior portion","C. Bulging with erythema and decreased mobility","D. A pearly gray, translucent appearance"],"answer":"C","exp":"Bulging, erythematous TM with decreased mobility = acute otitis media — this is ABNORMAL. A normal TM: pearly gray/translucent, cone of light (5 o'clock right, 7 o'clock left), handle of malleus visible, umbo visible, pars tensa and pars flaccida intact, normal mobility on pneumatic otoscopy."},
{"sec":"HENT","lo":"LO9","stem":"Purulent discharge at the floor of the mouth adjacent to the frenulum + tender submandibular mass = obstruction of which duct?","opts":["A. Stensen's duct","B. Bartholin's duct","C. Wharton's duct","D. The parotid duct"],"answer":"C","exp":"Wharton's duct drains the submandibular gland, opening at the floor of the mouth adjacent to the frenulum. Calculi (sialolithiasis) obstruct it → submandibular gland swelling + pain with meals. Stensen's (parotid) duct opens on buccal mucosa opposite upper 2nd molar → parotid swelling if obstructed."},
{"sec":"HENT","lo":"LO10","stem":"A 60-year-old has bilateral high-frequency hearing loss, difficulty in noisy environments, Weber midline, and AC>BC bilaterally. The MOST likely diagnosis is:","opts":["A. Bilateral otitis media","B. Bilateral otosclerosis","C. Presbycusis (age-related SNHL)","D. Bilateral acoustic neuromas"],"answer":"C","exp":"Presbycusis: age-related cochlear hair cell degeneration (basal turn first = high frequencies). Difficulty in noise = loss of consonant discrimination (high frequency). AC>BC (positive Rinne) = sensorineural. Weber midline = symmetric loss. Bilateral acoustic neuromas are extremely rare (consider NF2)."},
{"sec":"HENT","lo":"LO11","stem":"A 30-year-old woman has 12 days of purulent nasal discharge, maxillary facial pressure, fever, and tooth pain worsening when she bends forward. The MOST likely diagnosis is:","opts":["A. Allergic rhinitis","B. Acute bacterial sinusitis","C. Viral rhinitis","D. Nasal polyps"],"answer":"B","exp":"Acute bacterial rhinosinusitis: symptoms >10 days (or worsening after 5-7 days), purulent discharge, facial pain/pressure (worse bending forward), tooth pain (maxillary sinus floor over upper molars), fever, maxillary sinus tenderness on percussion. Viral rhinitis: self-limited <10 days, watery discharge. Allergic: clear discharge, pale boggy turbinates."},
{"sec":"HENT","lo":"LO13","stem":"A white patch on the lateral tongue CANNOT be scraped off. Biopsy is planned. This finding is:","opts":["A. Thrush; Candida infection","B. Leukoplakia; premalignant lesion potentially requiring biopsy to rule out SCC","C. Koplik spots; measles","D. Geographic tongue; benign migratory glossitis"],"answer":"B","exp":"Leukoplakia: white patch that CANNOT be scraped off (differentiates from thrush). Premalignant — 5–17% transform to squamous cell carcinoma. Risk factors: smoking, alcohol, HPV. Biopsy required. Thrush: white curdlike plaques that CAN be scraped, leaving an erythematous base."},
{"sec":"HENT","lo":"LO15","stem":"A 55-year-old smoker has a hard, non-tender, fixed left supraclavicular lymph node and recent dysphagia. This (Virchow's node) is MOST concerning for:","opts":["A. Reactive lymphadenopathy from pharyngitis","B. Metastatic malignancy from thoracic or abdominal origin","C. Cat scratch disease","D. Infectious mononucleosis"],"answer":"B","exp":"Virchow's node: left supraclavicular lymphadenopathy from metastatic malignancy (classic = gastric cancer; also lung, esophageal, pancreatic). Lymph drains from thoracic duct into the left supraclavicular region. Hard, fixed, non-tender in an older smoker with dysphagia = urgent workup (CT, endoscopy). Tender = infection; rubbery = lymphoma."},
{"sec":"HENT","lo":"LO16","stem":"You ask the patient to swallow while palpating the thyroid. This maneuver is performed because:","opts":["A. It relaxes strap muscles, making small nodules palpable","B. The thyroid rises with the larynx during swallowing, distinguishing it from non-thyroid masses","C. It stimulates TSH release, causing the gland to enlarge","D. It compresses Wharton's duct to express secretions"],"answer":"B","exp":"The thyroid is invested in pretracheal fascia and tethered to the trachea and cricoid cartilage. It rises during swallowing, while lymph nodes, lipomas, and sebaceous cysts do NOT. This movement confirms a mass is thyroid in origin."},
{"sec":"HENT","lo":"LO17","stem":"A 38-year-old woman has central weight gain, facial rounding with erythema, wide purple striae, hirsutism, and hypertension. These features MOST suggest:","opts":["A. Acromegaly","B. Cushing syndrome","C. Hypothyroidism","D. Nephrotic syndrome"],"answer":"B","exp":"Cushing syndrome: moon facies (round/plethoric), buffalo hump, central obesity, wide purple striae, hirsutism, acne, HTN, proximal muscle weakness, osteoporosis, hyperglycemia. Caused by exogenous steroids, pituitary adenoma (Cushing disease), or ectopic ACTH. Acromegaly: coarse facies, prognathism, large hands/feet. Nephrotic: periorbital/peripheral edema."},
{"sec":"Neurology","lo":"LO1","stem":"An 82-year-old scores 18/30 on the MMSE — fails 3-word recall at 3 minutes, cannot spell WORLD backwards, and makes errors on the 3-step command. Orientation is intact. Which domain is MOST severely affected?","opts":["A. Orientation","B. Language/naming","C. Short-term memory and executive function (attention/working memory)","D. Visuospatial ability"],"answer":"C","exp":"Failure on 3-word recall = short-term memory impairment. Inability to spell WORLD backwards = attention/working memory deficit. These are most common early deficits in Alzheimer's dementia. MMSE <24 = impaired; 18 = mild-moderate. Orientation was intact (not affected)."},
{"sec":"Neurology","lo":"LO2","stem":"A stroke patient speaks in short, effortful, telegraphic phrases but understands spoken commands accurately. He is frustrated. What type of aphasia?","opts":["A. Wernicke's (receptive) aphasia","B. Global aphasia","C. Broca's (expressive) aphasia","D. Conduction aphasia"],"answer":"C","exp":"Broca's aphasia: non-fluent, effortful, telegraphic speech with PRESERVED comprehension. Patient is aware of their deficit. Lesion in dominant inferior frontal gyrus (BA44/45). Wernicke's: fluent but nonsensical speech, poor comprehension, unaware. Global: both severely affected. Conduction: fluent speech, intact comprehension, impaired repetition."},
{"sec":"Neurology","lo":"LO3","stem":"A patient has fluent speech, intact comprehension, but SEVERELY impaired repetition (cannot repeat 'no ifs, ands, or buts'). Reading and writing are intact. The lesion is in:","opts":["A. Broca's area — dominant inferior frontal gyrus","B. Wernicke's area — dominant superior temporal gyrus","C. Arcuate fasciculus — connecting Wernicke's to Broca's area","D. Angular gyrus — dominant parietal lobe"],"answer":"C","exp":"Conduction aphasia: fluent speech + intact comprehension + severely impaired repetition = lesion in the arcuate fasciculus (white matter tract connecting Wernicke's area to Broca's). Repetition requires direct transfer of auditory input to motor speech output via this pathway."},
{"sec":"Neurology","lo":"LO3","stem":"A patient cannot identify an object placed in their hand with eyes closed despite intact sensation, but immediately recognizes it visually. This is:","opts":["A. Visual agnosia — occipitotemporal lesion","B. Tactile agnosia (astereognosis) — parietal somatosensory association cortex lesion","C. Apraxia — frontal lobe lesion","D. Dysarthria — cerebellar lesion"],"answer":"B","exp":"Tactile agnosia (astereognosis): inability to identify objects by touch alone (eyes closed) despite intact primary sensation. Lesion in parietal somatosensory association cortex. Visual agnosia: inability to recognize objects by sight despite intact acuity — occipitotemporal lesion."},
{"sec":"Neurology","lo":"LO5","stem":"A patient with complete left-sided facial droop (including inability to raise the left eyebrow and inability to close the left eye) most likely has:","opts":["A. Right UMN (cortical) facial nerve lesion — affects contralateral lower face only","B. Left UMN lesion — bilateral forehead sparing","C. Left LMN (peripheral) CN VII lesion — Bell's palsy pattern","D. Pontine glioma affecting right CN VII nucleus"],"answer":"C","exp":"Complete ipsilateral facial weakness including UPPER face (forehead/eyebrow + eye closure) = LMN (peripheral) CN VII lesion = Bell's palsy pattern. UMN lesions SPARE the forehead (bilateral cortical representation of frontalis muscle). Key: forehead involvement = LMN; forehead sparing = UMN."},
{"sec":"Neurology","lo":"LO6","stem":"A stroke patient's right arm exhibits velocity-dependent increased resistance to passive extension that suddenly 'gives way.' This is called:","opts":["A. Cogwheel rigidity","B. Flaccidity with hyporeflexia","C. Clasp-knife spasticity","D. Lead-pipe rigidity"],"answer":"C","exp":"Clasp-knife spasticity: velocity-dependent increased resistance that suddenly releases ('gives way') — UMN pattern with hyperreflexia, clonus, and Babinski sign. Cogwheel rigidity: ratchety resistance throughout ROM (Parkinson's). Lead-pipe: smooth constant resistance (extrapyramidal). Flaccidity: no resistance, hyporeflexia (LMN/cerebellar)."},
{"sec":"Neurology","lo":"LO7","stem":"A 25-year-old has right facial droop, cannot close her right eye, has decreased taste on the right anterior tongue, and hyperacusis on the right. The MOST likely diagnosis is:","opts":["A. Right CN V palsy","B. Left hemispheric stroke","C. Right Bell's palsy (peripheral CN VII palsy)","D. Guillain-Barré syndrome"],"answer":"C","exp":"Bell's palsy: all branches of CN VII peripherally involved — motor (all ipsilateral face), chorda tympani (taste anterior 2/3 tongue), stapedial nerve (hyperacusis), secretomotor (decreased tearing). Complete ipsilateral facial weakness + taste loss + hyperacusis localizes to a lesion proximal to the stylomastoid foramen."},
{"sec":"Neurology","lo":"LO8","stem":"During a routine exam, a knee jerk is 3+ with spread to contralateral adductors. This MOST indicates:","opts":["A. Normal reflex in a relaxed patient","B. L3-L4 nerve root lesion","C. UMN lesion affecting the corticospinal tract","D. Peripheral neuropathy"],"answer":"C","exp":"Hyperreflexia (3-4+) with reflex spread = loss of UMN inhibition of the spinal reflex arc = corticospinal tract lesion above L3-L4. Normal DTRs = 2+. Diminished (0-1+) = LMN lesion or peripheral neuropathy. The patellar reflex arc uses L3-L4; a root lesion would cause diminished, not hyperactive, reflexes."},
{"sec":"Neurology","lo":"LO9","stem":"Grade the following: patient flickers biceps but no joint movement occurs; full elbow flexion against gravity but gives way immediately with any resistance; full ROM against full examiner resistance.","opts":["A. Grade 0 / Grade 2 / Grade 4","B. Grade 1 / Grade 3 / Grade 5","C. Grade 2 / Grade 3 / Grade 5","D. Grade 1 / Grade 2 / Grade 5"],"answer":"B","exp":"Muscle strength scale: 0=no contraction; 1=flicker/trace; 2=full ROM gravity eliminated; 3=full ROM against gravity only; 4=against partial resistance; 5=normal (full resistance). Flicker = 1. Full ROM against gravity but no resistance = 3. Full ROM against full resistance = 5."},
{"sec":"Neurology","lo":"LO10","stem":"A 45-year-old has foot drop and inability to dorsiflex the big toe. L4-L5 disc herniation is confirmed on MRI. Which root is compressed, and what reflex is typically affected?","opts":["A. L4 root; diminished patellar reflex","B. L5 root; no standard reflex consistently affected (medial hamstring sometimes tested)","C. S1 root; diminished Achilles reflex","D. L3 root; diminished patellar reflex"],"answer":"B","exp":"L5 radiculopathy: foot/toe dorsiflexion weakness (EHL, tibialis anterior), sensory loss over dorsum of foot. L5 has no easily elicited standard reflex (unlike L4 = patellar, S1 = Achilles). L4-L5 disc herniation most commonly compresses L5 root (the root exits below the disc at that level)."},
{"sec":"Neurology","lo":"LO11","stem":"A 50-year-old alcoholic has right-sided dysmetria, past-pointing, falls toward the right, and an ataxic gait. Romberg is negative (stable with eyes closed). These signs LOCALIZE to:","opts":["A. Right cerebellum (ipsilateral cerebellar hemisphere)","B. Left parietal lobe","C. Bilateral posterior columns (sensory ataxia)","D. Left basal ganglia"],"answer":"A","exp":"Cerebellar signs are IPSILATERAL (cerebellum controls same-side coordination): dysmetria, past-pointing, dysdiadochokinesia, wide-based gait, falls toward side of lesion. Negative Romberg rules out sensory ataxia — posterior column disease worsens markedly with eye closure. Alcohol is a common cause of cerebellar degeneration."},
{"sec":"Neurology","lo":"LO12","stem":"An unresponsive trauma patient has arms FLEXED at elbows and wrists, with legs extended. GCS is E2V2M3. This posturing is:","opts":["A. Decerebrate (extensor) rigidity — midbrain/pontine lesion","B. Decorticate (flexor) rigidity — cortical/internal capsule lesion","C. Flaccid paralysis — spinal cord injury","D. Hemiplegia — unilateral cortical lesion"],"answer":"B","exp":"Decorticate (flexor): arm FLEXION + leg extension = lesion ABOVE the red nucleus (cortex/internal capsule). Mnemonic: deCORticate = COR = arms to the CORE (flexed in). Decerebrate (extensor): ALL limbs extended + arched back = midbrain/pontine level (below red nucleus) = worse prognosis."},
{"sec":"Neurology","lo":"LO13","stem":"An 88-year-old develops acute confusion over 6 hours in the hospital, fluctuates between agitation and somnolence, and cannot spell his name backwards. His family reports he was alert before admission. The MOST likely 3D is:","opts":["A. Dementia","B. Depression","C. Delirium","D. Drug-induced Parkinsonism"],"answer":"C","exp":"Delirium: ACUTE onset + FLUCTUATING course + inattention (cannot spell backwards) + altered LOC = CAM criteria. Precipitants: infection, medications (opioids, anticholinergics, benzos), metabolic disturbances, urinary retention, pain. Dementia: gradual onset, no acute fluctuation. Depression: weeks-months onset, psychomotor changes without acute confusion."},
{"sec":"Neurology","lo":"LO14","stem":"A patient has ipsilateral loss of proprioception/vibration AND motor weakness BELOW a cord lesion, plus CONTRALATERAL loss of pain/temperature below the lesion. This is:","opts":["A. Syringomyelia","B. Anterior cord syndrome","C. Brown-Séquard syndrome","D. Cauda equina syndrome"],"answer":"C","exp":"Brown-Séquard (lateral hemicord lesion): ipsilateral UMN paralysis + ipsilateral dorsal column loss (proprioception/vibration) + contralateral spinothalamic loss (pain/temperature) below the lesion — because dorsal columns decussate in the medulla while spinothalamic fibers decussate within 1-2 spinal levels."},
{"sec":"Neurology","lo":"LO14","stem":"A patient with a central cord lesion (syringomyelia) from C5-C8 has bilateral loss of pain and temperature in a 'cape' distribution over shoulders and arms, with preserved proprioception and vibration. This dissociated sensory loss reflects:","opts":["A. Spinothalamic fibers decussate in the anterior commissure and are disrupted centrally first","B. Dorsal columns are selectively destroyed by syrinx expansion","C. The posterior horn is compressed by the syrinx","D. All sensation is carried in one pathway at this level"],"answer":"A","exp":"Syringomyelia: the central cavity expands and disrupts the crossing spinothalamic fibers (pain/temperature) in the anterior commissure, producing bilateral suspended cape-like loss of pain/temperature. Dorsal column fibers (proprioception/vibration) run peripherally and are spared initially — hence dissociated sensory loss."},
{"sec":"Pediatrics","lo":"LO2","stem":"A newborn at 1 minute: HR 120, weak cry, some limb flexion, grimace to suction, body pink with blue extremities. Apgar score is:","opts":["A. 5","B. 6","C. 7","D. 8"],"answer":"C","exp":"APGAR: Appearance (body pink, extremities blue) = 1; Pulse (120) = 2; Grimace (grimace) = 1; Activity (some flexion) = 1; Respiration (weak cry) = 1. Total = 7. Score 7-10 = normal reassurance. 4-6 = moderate, may need stimulation/O2. 0-3 = severe, requires resuscitation."},
{"sec":"Pediatrics","lo":"LO2","stem":"A 5-minute Apgar score of 5 indicates:","opts":["A. Normal neonatal transition — reassure parents","B. Moderate neonatal depression — continue resuscitation, reassess at 10 min","C. The infant requires intubation within 1 minute","D. Score should not be obtained at 5 minutes"],"answer":"B","exp":"5-minute Apgar of 5 = moderate depression; continued resuscitation is required. Repeat scoring every 5 minutes up to 20 minutes. Persistently low Apgar (<3 at 10-20 min) correlates with increased risk of hypoxic-ischemic encephalopathy (HIE). The 5-minute score is more predictive of neurologic outcome than the 1-minute score."},
{"sec":"Pediatrics","lo":"LO5","stem":"A 15-month-old has not yet started walking independently. Using Denver II milestones, this is:","opts":["A. Normal — walking range is 9–18 months","B. A developmental red flag requiring evaluation","C. Only concerning if speech is also delayed","D. Expected; most children walk at 18 months"],"answer":"B","exp":"Independent walking is expected by 12 months (Denver II range 9–15 months). Walking absent at 15 months is a developmental red flag requiring evaluation. Early intervention improves outcomes. Other red flags: no smile by 2 months, no babbling by 6 months, no words by 16 months, loss of milestones at any age."},
{"sec":"Pediatrics","lo":"LO7","stem":"A term newborn on day 2 has blotchy erythema with white/yellow papules on an erythematous base on the trunk. The infant is afebrile and feeding well. This is MOST likely:","opts":["A. Herpes simplex neonatal infection","B. Neonatal sepsis","C. Erythema toxicum neonatorum","D. Group B Streptococcal skin infection"],"answer":"C","exp":"Erythema toxicum neonatorum: benign, common (50% of term newborns), peaks day 2-3, blotchy erythema with white/yellow papules on red base ('flea bite' rash), spares palms/soles, eosinophils on smear. No treatment. Neonatal HSV: vesicles in clusters, ill-appearing infant. Sepsis: temperature instability, ill-appearing."},
{"sec":"Pediatrics","lo":"LO8","stem":"Which neonatal jaundice scenario requires IMMEDIATE evaluation for hemolytic disease?","opts":["A. Day 3 with total bilirubin 18 mg/dL and breastfeeding difficulties","B. Day 1 with rapidly rising bilirubin","C. Day 5 in a breastfed infant with adequate weight gain","D. Persistent to day 12 in a well-appearing term infant"],"answer":"B","exp":"Jaundice within the FIRST 24 HOURS is ALWAYS pathologic — most commonly hemolytic disease (Rh/ABO incompatibility, G6PD deficiency). Requires: CBC, Coombs test, bilirubin level, reticulocyte count. Often needs phototherapy or exchange transfusion. Physiologic jaundice appears days 2-4 and resolves by day 7-10."},
{"sec":"Pediatrics","lo":"LO9","stem":"A 2-month-old has a bulging anterior fontanelle, fever, and high-pitched cry. The MOST likely cause and immediate concern is:","opts":["A. Dehydration — replace fluids","B. Normal developmental change at this age","C. Bacterial meningitis with elevated ICP — urgent LP","D. Premature suture closure"],"answer":"C","exp":"Bulging fontanelle (when upright, not crying) = increased ICP → emergency causes include bacterial meningitis, hydrocephalus, intracranial hemorrhage. Fever + bulging fontanelle + high-pitched cry in infant = bacterial meningitis until proven otherwise → urgent LP after blood cultures (unless herniation risk → CT first)."},
{"sec":"Pediatrics","lo":"LO10","stem":"A newborn has soft scalp swelling present at birth that crosses the suture lines and involves the entire left parietal region. The overlying skin is ecchymotic. This is:","opts":["A. Cephalohematoma","B. Caput succedaneum","C. Subgaleal hematoma","D. Craniosynostosis"],"answer":"B","exp":"Caput succedaneum: diffuse scalp edema (subcutaneous, above periosteum) that CROSSES suture lines. Present at birth, soft, pitting, may be ecchymotic. Resolves in days. Cephalohematoma: subperiosteal blood — does NOT cross sutures. Appears hours after birth. Can cause hyperbilirubinemia."},
{"sec":"Pediatrics","lo":"LO14","stem":"You perform the Ortolani maneuver on a newborn and feel a 'clunk' as the left hip reduces. The correct next step is:","opts":["A. Reassure parents — normal ligamentous laxity","B. Hip ultrasound to confirm DDH and plan Pavlik harness","C. Hip X-ray to exclude fracture","D. Orthopedic referral at 6 months if still present"],"answer":"B","exp":"Positive Ortolani (clunk of reduction) = dislocated hip = developmental dysplasia of the hip (DDH). Hip ultrasound is imaging of choice in infants <4-6 months (cartilage not visible on X-ray). Early Pavlik harness treatment (<6 months) has excellent outcomes. Missed DDH → AVN, leg length discrepancy, early OA."},
{"sec":"Pediatrics","lo":"LO15","stem":"A 3-year-old has a positive Babinski sign. How should you interpret this?","opts":["A. Normal — Babinski is physiologic until age 5","B. Abnormal — indicates a UMN lesion at this age (normal limit is 12–18 months)","C. Normal — Babinski remains positive until age 3","D. Cannot assess at this age due to withdrawal"],"answer":"B","exp":"Babinski is physiologic until 12-18 months (some sources say up to 2 years) due to incomplete myelination of the corticospinal tract. After 18-24 months, a positive Babinski = UMN pathology (corticospinal tract lesion). At 3 years, this is an abnormal finding requiring neurologic evaluation."},
{"sec":"Pediatrics","lo":"LO16","stem":"A 13-year-old girl has bilateral breast buds and sparse straight pubic hair. She has not yet had menarche. This is Tanner stage:","opts":["A. Stage 1","B. Stage 2","C. Stage 3","D. Stage 4"],"answer":"B","exp":"Tanner Stage 2 in females: breast budding (elevation of areola/nipple as small mound) + sparse slightly pigmented straight pubic hair at medial labia. First sign of puberty, typically 8-11 years. Menarche occurs at Tanner stage 3-4 (approximately 2-2.5 years after thelarche). Stage 1 = prepubertal."},
{"sec":"Peripheral Vascular","lo":"LO1","stem":"A 62-year-old diabetic has right calf cramping starting after walking 2 blocks, reliably resolving within 5 minutes of rest. ABI right = 0.65. The MOST likely explanation is:","opts":["A. Venous insufficiency","B. Peripheral arterial disease — intermittent claudication","C. Deep vein thrombosis","D. Lumbar spinal stenosis — neurogenic claudication"],"answer":"B","exp":"Intermittent claudication: reproducible exertion-induced muscle pain relieved predictably with rest (supply cannot meet increased demand). ABI 0.65 = moderate PAD. DVT: constant pain + swelling, not relieved by rest. Neurogenic claudication: worse downhill, relieved by sitting/forward flexion, not just standing still."},
{"sec":"Peripheral Vascular","lo":"LO2","stem":"A patient has left leg pitting edema, brawny hyperpigmentation, and a shallow irregular ulcer at the medial malleolus. Distal pulses are 2+ bilaterally. This BEST characterizes:","opts":["A. Arterial insufficiency — punched-out ulcer at toes","B. Venous insufficiency — venous stasis ulcer","C. Lymphedema — non-pitting fibrotic edema","D. Acute arterial occlusion — pallor and pulselessness"],"answer":"B","exp":"Venous insufficiency: pitting edema, brawny hyperpigmentation (hemosiderin), lipodermatosclerosis, venous ulcers at medial malleolus (perforating vein territory). Normal pulses confirm intact arterial supply. Arterial ulcers: toes/heels, punched-out, painful, pale base, diminished pulses."},
{"sec":"Peripheral Vascular","lo":"LO3","stem":"A 65-year-old man has a pulsatile abdominal mass. Ultrasound shows an infrarenal aortic diameter of 5.5 cm. The MOST appropriate management is:","opts":["A. Annual surveillance ultrasound — threshold not yet reached","B. Elective repair (open or EVAR) — threshold reached for men","C. Emergent repair — this represents a ruptured AAA","D. CT angiography to confirm, then discharge with lipid management"],"answer":"B","exp":"AAA is defined as aortic dilation ≥3 cm. Rupture risk increases exponentially above 5.5 cm in men (5.0 cm in women). Elective repair (EVAR or open) is recommended at ≥5.5 cm in males. Screening: one-time ultrasound for men 65-75 with any smoking history (USPSTF Grade B). Rupture risk at 5-6 cm is ~10% per year."},
{"sec":"Peripheral Vascular","lo":"LO4","stem":"A 72-year-old man with CHF and albumin 2.1 g/dL has bilateral lower extremity pitting edema. Pressing over the tibia for 5 seconds leaves a 4mm pit that fills over 20 seconds. This is graded:","opts":["A. 1+","B. 2+","C. 3+","D. 4+"],"answer":"B","exp":"Pitting edema grading: 1+ = 2mm, rapid rebound (<15 sec); 2+ = 4mm, rebound 15-30 sec; 3+ = 6mm, rebound 30-60 sec; 4+ = 8mm, rebound >60 sec (severe). This patient = 4mm pit + ~20 second rebound = 2+. CHF (venous HTN) + hypoalbuminemia (low oncotic pressure) both contribute to edema."},
{"sec":"Peripheral Vascular","lo":"LO5","stem":"A patient with atrial fibrillation (not anticoagulated) has sudden severe left leg pain, pallor, and inability to move the leg. Pulses are absent below the left femoral artery. The MOST ominous of the 6 P's in this scenario is:","opts":["A. Pallor — indicates arterial occlusion","B. Pain — indicates nerve ischemia","C. Paralysis — indicates advanced muscle and nerve necrosis","D. Poikilothermia — indicates loss of sympathetic tone"],"answer":"C","exp":"The 6 P's: Pain, Pallor, Pulselessness, Paresthesia, Paralysis, Poikilothermia. Paralysis is the most ominous — it indicates advanced ischemia with muscle and nerve necrosis and constitutes a limb-threatening emergency. Embolism from AF requires immediate anticoagulation, vascular surgery, and embolectomy within 6 hours."},
{"sec":"Peripheral Vascular","lo":"LO6","stem":"Before radial arterial line placement, you compress both arteries and the palm blanches. You release only the ulnar artery — the palm reperfuses within 5 seconds. This Allen's test result means:","opts":["A. Abnormal — do not use radial artery (inadequate collateral)","B. Normal — safe to proceed with radial artery cannulation","C. Positive Homan's sign","D. Abnormal — suggests radial artery stenosis"],"answer":"B","exp":"Allen's test: normal = palm reperfuses within 5-7 seconds of releasing ulnar artery = adequate palmar arch collateral = safe to use radial artery. Abnormal (>15 sec or no reperfusion) = inadequate collateral = do NOT use radial artery (risk of hand ischemia). Used before arterial line placement or radial artery graft harvest."},
{"sec":"Peripheral Vascular","lo":"LO7","stem":"A 38-year-old on OCPs has 2 days of left calf swelling, warmth, and erythema after a long flight. Wells score is high. The MOST appropriate next step is:","opts":["A. A negative Homan's sign excludes DVT; discharge","B. Duplex ultrasound of the left lower extremity","C. D-dimer only; if negative, discharge","D. Start heparin empirically without imaging"],"answer":"B","exp":"Duplex ultrasound is the gold standard for DVT diagnosis — high sensitivity/specificity for proximal DVT. With HIGH Wells pretest probability, duplex ultrasound should be performed immediately. D-dimer is only useful to RULE OUT DVT with LOW probability. Homan's sign is unreliable (~50% sensitivity)."},
{"sec":"Peripheral Vascular","lo":"LO8","stem":"You palpate the dorsum of a foot and find a barely palpable pulse, significantly diminished compared to the other side. The correct grading is:","opts":["A. 0 — absent","B. 1+ — diminished/barely palpable","C. 2+ — normal","D. 3+ — increased"],"answer":"B","exp":"Pulse grading: 0=absent (use Doppler); 1+=diminished/barely palpable; 2+=normal; 3+=increased/bounding; 4+=aneurysmal. Asymmetry (1+ vs 2+) suggests PAD on the affected side. Absent pulses + symptoms require ABI testing and vascular surgery referral."},
{"sec":"Peripheral Vascular","lo":"LO9","stem":"A 58-year-old diabetic smoker has reproducible calf cramping after 1.5 blocks that resolves within 3 minutes of rest. No rest pain. What ABI range would you expect?","opts":["A. 1.0–1.4 (normal)","B. 0.7–0.9 (mild PAD — claudication range)","C. <0.4 (critical limb ischemia with rest pain expected)","D. >1.4 (non-compressible vessels)"],"answer":"B","exp":"Claudication typically occurs with ABI 0.5-0.9 (mild to moderate PAD). Mild PAD = 0.7-0.9. Moderate = 0.4-0.69. Critical limb ischemia (rest pain, ulcers) = ABI <0.4. ABI >1.4 = arterial calcification (diabetes, ESRD) — falsely elevated, needs toe-brachial index. Normal ABI would not explain symptoms."},
{"sec":"Peripheral Vascular","lo":"LO10","stem":"A 70-year-old diabetic has exertional calf pain and ABI of 1.5 bilaterally. The CORRECT interpretation is:","opts":["A. Normal ABI — symptoms not from PAD","B. Confirms severe PAD — urgent vascular referral","C. Falsely elevated from non-compressible calcified vessels — toe-brachial index needed","D. Aortic regurgitation causing widened pulse pressure"],"answer":"C","exp":"ABI >1.4 = falsely elevated from medial arterial calcification (Mönckeberg's) — non-compressible vessels common in diabetes and ESRD. The cuff cannot compress calcified arteries, artificially inflating ankle pressure. Toe-brachial index (TBI) or pulse volume recordings are used instead — digital vessels are typically spared from calcification. TBI <0.7 suggests PAD."}
];

const SECTION_COLORS = {
  "Musculoskeletal": {bg:"#E6F1FB", border:"#378ADD", text:"#0C447C"},
  "Eyes": {bg:"#EAF3DE", border:"#3B6D11", text:"#27500A"},
  "HENT": {bg:"#FAEEDA", border:"#BA7517", text:"#633806"},
  "Neurology": {bg:"#FBEAF0", border:"#993556", text:"#4B1528"},
  "Peripheral Vascular": {bg:"#F1EFE8", border:"#5F5E5A", text:"#2C2C2A"}
};

let qs = [...ALL_QUESTIONS];
let currentIdx = 0;
let answered = new Array(qs.length).fill(null);
let filterSec = "All";

function shuffle(arr) {
  for (let i = arr.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
}
shuffle(qs);

function getFiltered() {
  if (filterSec === "All") return qs;
  return qs.filter(q => q.sec === filterSec);
}

function render() {
  const filtered = getFiltered();
  if (filtered.length === 0) { renderMain(); return; }
  const q = filtered[currentIdx];
  const qOrigIdx = qs.indexOf(q);
  const ans = answered[qOrigIdx];
  const col = SECTION_COLORS[q.sec] || SECTION_COLORS["Musculoskeletal"];
  const answered_count = answered.filter(a=>a!==null).length;
  const correct_count = qs.filter((q,i) => answered[i] && answered[i] === q.answer).length;

  document.getElementById("quiz-main").innerHTML = `
    <div class="header">
      <h2>PDX practice quiz</h2>
      <p>${ALL_QUESTIONS.length} questions &nbsp;·&nbsp; ${answered_count} answered &nbsp;·&nbsp; ${correct_count} correct</p>
      <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${answered_count/qs.length*100}%"></div></div>
      <div class="progress-label"><span>${answered_count} / ${qs.length} answered</span><span>${Math.round(answered_count/qs.length*100)}%</span></div>
    </div>

    <div class="filter-row">
      <span class="filter-label">Section:</span>
      ${["All","Musculoskeletal","Eyes","HENT","Neurology","Peripheral Vascular"].map(s=>`
        <button class="filter-btn${filterSec===s?' active':''}" onclick="setFilter('${s}')">${s}</button>
      `).join("")}
      <span class="q-counter">Q ${currentIdx+1} / ${filtered.length}</span>
    </div>

    <div class="q-card">
      <div class="lo-tag">
        <span style="display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;background:${col.bg};color:${col.text};border:0.5px solid ${col.border}">${q.sec}</span>
        &nbsp;<span style="color:var(--color-text-tertiary)">${q.lo}</span>
      </div>
      <div class="q-stem">${q.stem}</div>
      <div class="opts" id="opts-container">
        ${q.opts.map((opt, i) => {
          const letter = opt[0];
          let cls = "opt-btn";
          if (ans) {
            if (letter === q.answer) cls += " correct";
            else if (letter === ans && letter !== q.answer) cls += " wrong";
          }
          return `<button class="opt-btn ${ans ? (letter===q.answer ? 'correct' : (letter===ans ? 'wrong' : '')) : ''}" 
            ${ans ? 'disabled' : ''} onclick="selectAnswer('${letter}', ${qOrigIdx})">${opt}</button>`;
        }).join("")}
      </div>
      <div class="explanation ${ans ? 'show' : ''}" id="explanation">
        <strong>Explanation:</strong> ${q.exp}
      </div>
    </div>

    <div class="nav-row">
      <button class="btn-nav" onclick="prev()" ${currentIdx===0?'disabled':''}>← Previous</button>
