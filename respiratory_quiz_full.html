{"sec":"L47","lo":"LO1 — PE causes, risk factors, epidemiology","stem":"A 45-year-old woman on OCP is found to have a DVT and PE. Hypercoagulability workup reveals Factor V Leiden mutation (heterozygous). Which element of Virchow's triad does Factor V Leiden represent?","opts":["A. Vascular endothelial injury","B. Blood stasis","C. Hypercoagulability — Factor V Leiden is resistant to inactivation by activated protein C (APC resistance), the most common inherited thrombophilia in Caucasians","D. All three elements of Virchow's triad simultaneously"],"answer":"C","exp":"Factor V Leiden (FVL): single point mutation (G1691A) in the factor V gene → substitution of Arg506Gln → resistance to cleavage by activated protein C (APC) → prolonged factor Va activity → ↑ thrombin generation → hypercoagulability. Most common inherited thrombophilia in Caucasians (~5%). Heterozygous FVL + OCP: synergistic risk (OCP ↑ factor VIII, ↓ protein S → amplifies FVL effect). Annual VTE risk: heterozygous ~0.5–1%/yr; homozygous ~3–4%/yr."},
{"sec":"L47","lo":"LO1 — PE causes, risk factors, epidemiology","stem":"A 68-year-old male with newly diagnosed stage III colon cancer develops a DVT during chemotherapy. Which mechanism explains the hypercoagulable state in malignancy?","opts":["A. Cancer patients have increased platelet destruction reducing thrombus formation","B. Tumor cells express tissue factor and cancer procoagulant → activate the extrinsic coagulation cascade; cancer also ↑ VEGF (activates endothelium) and ↓ fibrinolysis via PAI-1 → Trousseau syndrome","C. Chemotherapy directly activates the clotting cascade by damaging hepatocytes","D. Cachexia causes dehydration → increased blood viscosity only"],"answer":"B","exp":"Cancer-associated thrombosis (Trousseau syndrome): tumor cells express tissue factor (TF) → activates extrinsic coagulation; release of cancer procoagulant (cysteine protease); VEGF activates endothelium; mucin-producing adenocarcinomas activate platelets directly; inflammatory cytokines upregulate von Willebrand factor; chemotherapy (VEGF inhibitors, thalidomide, L-asparaginase) independently increases VTE risk. Treatment: therapeutic LMWH (preferred over warfarin) or DOACs (rivaroxaban/apixaban) for CAT."},

// LO2: Pathophysiology, clinical manifestations, and complications of PE
{"sec":"L47","lo":"LO2 — PE pathophysiology, manifestations, complications","stem":"In a massive PE, the patient develops hypotension and tachycardia refractory to fluids. Which hemodynamic sequence explains the cardiovascular collapse?","opts":["A. LV systolic dysfunction from hypoxemia-induced myocardial ischemia causing pump failure","B. Abrupt ↑ in RV afterload (↑ PVR) → RV dilation → bowing of interventricular septum (D-sign) → impaired LV filling → ↓ CO → systemic hypotension → RV ischemia → RV failure → obstructive shock","C. Pulmonary vascular steal from the unobstructed side causing left-sided heart failure","D. Direct vasodilatory effects of thrombus-released serotonin causing systemic hypotension"],"answer":"B","exp":"Massive PE hemodynamic sequence: large clot burden → ↑ PVR → RV pressure overload → RV dilation (thin-walled RV not adapted to high pressure) → IV septum shifts left (D-sign on echo) → impaired LV preload → ↓ CO → systemic hypotension → coronary perfusion pressure falls → RV ischemia → RV failure escalates. This spiral is fatal without intervention. RV/LV ratio >0.9 on CTPA or echo = sign of RV strain. McConnell sign (RV free wall akinesis with preserved apex) = massive PE."},
{"sec":"L47","lo":"LO2 — PE pathophysiology, manifestations, complications","stem":"A patient develops chronic exertional dyspnea and right heart failure 2 years after a massive PE that was treated with anticoagulation alone. What is this complication and how is it diagnosed?","opts":["A. Recurrent DVT — requires lower extremity ultrasound","B. Chronic thromboembolic pulmonary hypertension (CTEPH) — diagnosed by V/Q scan (mismatched perfusion defects) + right heart catheterization confirming mPAP >20 mmHg; potentially curable with pulmonary endarterectomy","C. Pulmonary fibrosis from organized thrombus — managed with antifibrotic therapy","D. Cor pulmonale from COPD developing after the PE episode"],"answer":"B","exp":"CTEPH: organized, fibrotic thrombus fails to resolve → chronic obstruction + pulmonary vascular remodeling → progressive pulmonary hypertension → RV failure. Occurs in ~0.5–5% of PE survivors. Diagnosis: V/Q scan (higher sensitivity than CTPA for chronic obstruction), RHC (mPAP >20 mmHg, PVR >3 WU). Treatment: pulmonary endarterectomy (PEA) — potentially curative for proximal disease. Riociguat (sGC stimulator): approved for inoperable/persistent CTEPH. Balloon pulmonary angioplasty for distal/inoperable."},

// LO3: Diagnostic tests, management, and prevention of PE
{"sec":"L47","lo":"LO3 — PE diagnosis, management, prevention","stem":"The Wells PE score for a patient is calculated as 6.5 (high probability). D-dimer is 8,400 ng/mL. CTPA is unavailable for 4 hours. The patient is hemodynamically stable with O2 sat 92%. What should be done while awaiting CTPA?","opts":["A. Administer systemic thrombolysis (tPA) empirically before imaging","B. Administer therapeutic anticoagulation (UFH bolus + infusion, or weight-based LMWH) immediately — anticoagulation should not be delayed while awaiting imaging in high-probability PE","C. Wait for CTPA before any treatment — premature anticoagulation causes more harm than benefit","D. Perform urgent echocardiography and treat only if RV dysfunction is confirmed"],"answer":"B","exp":"In high clinical probability PE: anticoagulation should be started BEFORE imaging if imaging is unavoidably delayed AND bleeding risk is acceptable. Delay in anticoagulation increases mortality and PE recurrence risk. UFH is preferred when thrombolysis may subsequently be needed (can be reversed). LMWH, fondaparinux, or DOAC (rivaroxaban, apixaban — no parenteral lead-in needed) are alternatives for stable patients. Thrombolysis is reserved for hemodynamically unstable patients with confirmed PE."},
{"sec":"L47","lo":"LO3 — PE diagnosis, management, prevention","stem":"After a provoked DVT (following orthopedic surgery), how long should anticoagulation be continued, and when would indefinite anticoagulation be indicated?","opts":["A. Lifelong anticoagulation for all DVT/PE regardless of provoking factor","B. 3 months for provoked (transient risk factor) VTE; indefinite anticoagulation for unprovoked VTE, cancer-associated VTE, antiphospholipid syndrome, recurrent VTE, or certain thrombophilias (homozygous FVL, antithrombin deficiency)","C. 6 weeks for all DVT regardless of provoking factor","D. 6 months for all PE; 3 months for isolated DVT"],"answer":"B","exp":"VTE treatment duration guidelines (CHEST 2016, ASH 2020): Provoked (major transient risk factor: surgery, trauma, hospitalization): 3 months — low recurrence risk after risk factor resolves. Provoked (minor risk factor: OCP, pregnancy): 3 months. Unprovoked DVT/PE: 3 months minimum; strongly consider indefinite based on bleeding risk (D-dimer, HERDOO2 score). Indefinite: cancer, antiphospholipid syndrome, recurrent unprovoked VTE, homozygous FVL/prothrombin gene mutation."},

// ── L48 · Tuberculosis ─────────────────────────────────────────────────────
// LO1: Pathogenesis, transmission, diagnosis, and treatment of TB
{"sec":"L48","lo":"LO1 — TB pathogenesis, transmission, diagnosis, treatment","stem":"A 35-year-old with HIV (CD4 280 cells/μL) is found to have a positive IGRA. CXR shows a small right upper lobe calcified nodule. He has no symptoms. AFB smear × 3 = negative. What is the next appropriate step?","opts":["A. Immediately start RIPE therapy for presumed active TB","B. Treat for latent TB infection (LTBI): preferred regimen is isoniazid + rifapentine weekly × 12 weeks (3HP regimen) or daily INH × 9 months + pyridoxine (B6), after ruling out active TB with symptom review + CXR + 3 AFB smears","C. No treatment needed — calcified nodule confirms cured TB with no residual viability","D. Repeat IGRA in 6 months to confirm positivity before treating"],"answer":"B","exp":"HIV patients with positive TST/IGRA have a 10%/year risk (vs. 10% lifetime risk in immunocompetent) of LTBI reactivation. LTBI treatment is mandated in HIV regardless of CD4 count. ALWAYS exclude active TB before starting LTBI treatment (symptoms + CXR + sputum if any CXR abnormality). Preferred LTBI regimens: 3HP (INH + rifapentine × 12 weekly DOT doses) — high completion; or 9H (INH × 9 months + B6). Rifampin 4 months is an alternative. Pyridoxine (B6) prevents INH-induced peripheral neuropathy."},
{"sec":"L48","lo":"LO1 — TB pathogenesis, transmission, diagnosis, treatment","stem":"An HIV-negative patient is diagnosed with active pulmonary TB (sputum AFB positive). The standard first-line 6-month regimen is started. Which drug in the regimen requires monitoring of visual acuity and color vision, and why?","opts":["A. Isoniazid — causes optic neuritis that manifests as color vision changes","B. Ethambutol — inhibits arabinosyl transferase in mycobacterial cell wall synthesis, but at high doses inhibits human arabinosyl transferases in the optic nerve → optic neuritis → visual acuity loss and red-green color blindness","C. Rifampin — causes orange discoloration of tears and vision changes","D. Pyrazinamide — causes optic neuritis as a side effect of its nitrogen-containing metabolites"],"answer":"B","exp":"Ethambutol (EMB): mechanism — inhibits arabinosyl transferase (InhA alternative) → ↓ arabinogalactan synthesis in mycobacterial cell wall. Toxicity: dose-dependent optic neuritis → ↓ visual acuity (often one eye first), red-green color vision loss (central scotoma). Monthly visual acuity and color vision testing required. Stop EMB if vision changes occur. Risk factors: dose >25 mg/kg, renal failure (ethambutol renally cleared), duration. Avoid in children too young for visual testing."},

// LO2: Multidrug-resistant TB
{"sec":"L48","lo":"LO2 — Multidrug-resistant TB","stem":"A patient with TB failed a standard first-line 6-month RIPE regimen and susceptibility testing reveals MDR-TB (resistant to INH and RIF). Which drug regimen is MOST appropriate?","opts":["A. High-dose INH + rifabutin — MDR-TB can often be overcome with higher antibiotic doses","B. A regimen including bedaquiline + linezolid + a fluoroquinolone (levofloxacin or moxifloxacin) ± clofazimine for ≥18 months (BPaL regimen — TB-PRACTECAL/ZeNix data)","C. Standard RIPE for an extended 12-month course","D. Rifamycin monotherapy — rifabutin overcomes rifampin resistance"],"answer":"B","exp":"MDR-TB (INH+RIF resistant) treatment has been revolutionized: (1) Bedaquiline (diarylquinoline — inhibits mycobacterial ATP synthase): backbone of MDR regimens; (2) Linezolid (protein synthesis inhibitor): highly active; (3) Fluoroquinolones (levofloxacin/moxifloxacin): Group A drugs in WHO classification; (4) Clofazimine: Group B. BPaL regimen (bedaquiline + pretomanid + linezolid) in TB-PRACTECAL: 6 months, >80% treatment success vs. ~50% with older regimens. XDR-TB (MDR + FQ resistance + injectable resistance): pretomanid-containing regimens."},
{"sec":"L48","lo":"LO2 — Multidrug-resistant TB","stem":"What is the PRIMARY driver of MDR-TB emergence globally?","opts":["A. Horizontal gene transfer of resistance genes between Mycobacterium species","B. Inadequate treatment adherence and incomplete treatment courses selecting for resistant mutants — TB resistance is ACQUIRED through mutations, not transmitted horizontally; poor adherence allows resistant strains to survive and proliferate","C. Spontaneous mutation rate of M. tuberculosis is inherently very high","D. Antibiotic resistance develops because M. tuberculosis forms biofilms that protect it from antibiotics"],"answer":"B","exp":"M. tuberculosis resistance develops through SPONTANEOUS CHROMOSOMAL MUTATIONS (not plasmid-mediated, not horizontal gene transfer). Each drug targets a specific gene: INH → katG/inhA mutations; RIF → rpoB mutations; FQ → gyrA mutations; EMB → embB mutations. Critical point: M. tuberculosis mutates spontaneously at ~1 in 10^6–10^8 organisms. A large bacterial burden (cavitary TB) has pre-existing resistant mutants. Incomplete treatment → susceptible organisms killed → resistant mutants selected → MDR-TB. Directly observed therapy (DOT) is the public health solution."},

// LO3: Atypical mycobacteria in immunosuppressed
{"sec":"L48","lo":"LO3 — Atypical mycobacteria in immunosuppressed","stem":"A patient receiving anti-TNF therapy (adalimumab) for rheumatoid arthritis develops pulmonary nodules and cavities in the upper lobes. BAL AFB smear is positive. IGRA is negative. Cultures grow a slow-growing mycobacterium sensitive to rifampin but resistant to pyrazinamide. What organism is most likely and how does it differ from M. tuberculosis?","opts":["A. M. tuberculosis — anti-TNF therapy causes false-negative IGRA","B. M. kansasii — a slow-growing NTM resembling TB radiographically; IGRA is often negative (no M. tuberculosis cross-reactivity); intrinsically PZA-resistant; treated with rifampin + INH + ethambutol × 12 months","C. M. abscessus — rapid grower, requires combination macrolide + aminoglycoside","D. M. marinum — causes granulomatous skin nodules (fish tank granuloma), not pulmonary disease"],"answer":"B","exp":"M. kansasii: photochromogen (Runyon Group I), pulmonary disease resembles TB (upper lobe cavitary infiltrates), IGRA often negative (M. kansasii shares some antigens with M. tuberculosis but IGRA T-SPOT uses ESAT-6/CFP-10 peptides specific to M. tuberculosis complex). Key distinction: intrinsically resistant to pyrazinamide (PZA). Treatment: rifampin + INH + ethambutol × 12 months of culture-negative sputum. Anti-TNF therapy impairs macrophage granuloma formation → reactivation of dormant NTM."},
{"sec":"L48","lo":"LO3 — Atypical mycobacteria in immunosuppressed","stem":"Mycobacterium abscessus causes severe pulmonary disease particularly in patients with cystic fibrosis. Why is M. abscessus challenging to treat?","opts":["A. It is susceptible to standard RIPE TB therapy — the challenge is poor patient adherence","B. M. abscessus is a rapidly growing mycobacterium with intrinsic resistance to most antibiotics — it has a thick, lipid-rich cell wall and produces erm(41) (inducible macrolide methylase) causing macrolide resistance; treatment requires prolonged combination therapy: amikacin + imipenem/cefoxitin + azithromycin (if susceptible) ± clofazimine","C. It only causes skin infections and cannot be eradicated from CF lungs because sputum culture methods are inaccurate","D. M. abscessus forms biofilms only in Pseudomonas-colonized lungs and cannot survive alone"],"answer":"B","exp":"M. abscessus (rapid grower, Runyon Group IV): most antibiotic-resistant NTM. Intrinsic resistance: all β-lactams (except cefoxitin/imipenem), FQs, tetracyclines, macrolides (via erm(41)). Erm(41) inducibility is the key challenge: macrolides may be active initially but inducible resistance emerges with therapy. Test erm(41) genotype (C28→T28 mutation = less erm induction). CF colonization → progressive pulmonary destruction. Treatment: 3-phase protocol (intensive IV amikacin + imipenem/cefoxitin/tigecycline + PO azithromycin) — no curative therapy; goal is culture conversion + stabilization. Contraindication to lung transplant if colonized."},

// ── L49 · Shortness of Breath ──────────────────────────────────────────────
// LO1: HPI/ROS, physical exam, and differential for dyspnea
{"sec":"L49","lo":"LO1 — History, exam, and differential for dyspnea","stem":"A 55-year-old obese woman with hypertension presents with 6-month progressive dyspnea. She reports worsening with lying flat (orthopnea, 3-pillow), awakening at night gasping (PND), and leg swelling. She denies wheezing, fever, or cough. Which two conditions are most likely based on this history?","opts":["A. Asthma and COPD","B. Decompensated heart failure AND obesity hypoventilation syndrome — both cause positional dyspnea and are common in obese patients with hypertension","C. PE and pneumothorax","D. Pulmonary fibrosis and pleural effusion"],"answer":"B","exp":"Orthopnea (dyspnea when supine) and PND (awakening with dyspnea, relieved by sitting up) are highly specific for CHF — fluid redistributes from dependent tissues to the lungs when supine. Obesity hypoventilation syndrome (Pickwickian): BMI >30 + daytime hypercapnia (PaCO2 >45 mmHg) + nocturnal hypoventilation; also causes positional dyspnea, fatigue, and can coexist with CHF in obese hypertensive women. Both require distinct treatments (diuresis vs. NIV)."},
{"sec":"L49","lo":"LO1 — History, exam, and differential for dyspnea","stem":"On physical examination of a dyspneic patient, you percuss dullness and find absent breath sounds over the left lower chest with tracheal deviation to the RIGHT. What is the most likely diagnosis?","opts":["A. Left lower lobe pneumonia — dullness from consolidation, tracheal deviation is contralateral","B. Large left pleural effusion — dullness from fluid, egophony at fluid level, tracheal deviation to the RIGHT (away from the effusion — mass effect)","C. Left-sided pneumothorax — hyperresonance with absent breath sounds, tracheal deviation to the LEFT","D. Left lower lobe atelectasis — dullness, tracheal deviation to the LEFT (toward the lesion)"],"answer":"B","exp":"Physical examination key: Dullness to percussion = fluid (pleural effusion) or consolidation (pneumonia/atelectasis). Absent breath sounds + dullness = effusion (fluid dampens sound transmission). Tracheal deviation AWAY from the dull side = mass effect (large effusion pushing mediastinum to opposite side). Tracheal deviation TOWARD the dull side = volume loss (atelectasis pulling mediastinum). Pneumothorax: hyper-resonance + absent BS + tracheal deviation away from PTX (tension)."},

// LO2: Diagnostic tests and final diagnosis for dyspnea
{"sec":"L49","lo":"LO2 — Diagnostic tests and final diagnosis for dyspnea","stem":"A 50-year-old man has progressive exertional dyspnea and an N-terminal pro-BNP (NT-proBNP) of 3,500 pg/mL. Which diagnosis does this level strongly support, and what is its sensitivity/specificity?","opts":["A. Pulmonary embolism — NT-proBNP rises from right heart strain in massive PE","B. Heart failure — NT-proBNP >900 pg/mL in patients <75 years is highly sensitive (>95%) and specific (~85%) for HF; NT-proBNP <300 pg/mL effectively rules out HF","C. COPD exacerbation — NT-proBNP rises from respiratory muscle stress","D. Pulmonary hypertension — NT-proBNP is the primary diagnostic test for PAH"],"answer":"B","exp":"NT-proBNP (N-terminal prohormone BNP) and BNP are released from ventricular cardiomyocytes in response to wall stress. Age-stratified NT-proBNP rule-in cutoffs: <50 yr: >450 pg/mL; 50–75 yr: >900 pg/mL; >75 yr: >1,800 pg/mL. Rule-out: <300 pg/mL (all ages, NPV >99% for HF). Level of 3,500 pg/mL in a 50-year-old strongly supports HF. Note: NT-proBNP can be elevated in PE, PAH, RV dysfunction, renal failure — but is not the primary diagnostic test for these conditions."},
{"sec":"L49","lo":"LO2 — Diagnostic tests and final diagnosis for dyspnea","stem":"A 38-year-old nurse reports episodic dyspnea and pre-syncope with a tingling sensation around her lips during acute episodes. ABG during an episode shows: pH 7.55, PaCO2 26 mmHg, PaO2 102 mmHg. What does this ABG pattern indicate?","opts":["A. Type 1 respiratory failure — low PaO2 from parenchymal disease","B. Hyperventilation syndrome — respiratory alkalosis (↑ pH, ↓ PaCO2) from excessive ventilation; perioral tingling from hypocalcemia (↑ pH reduces ionized Ca2+)","C. Metabolic alkalosis compensated by hypoventilation","D. Type 2 respiratory failure — high PaCO2 from hypoventilation"],"answer":"B","exp":"Hyperventilation syndrome: ↑ RR → ↓ PaCO2 → respiratory alkalosis → ↑ pH → ↓ ionized Ca2+ (Ca2+ binding to albumin increases at alkaline pH) → perioral tingling, carpopedal spasm, tetany, dizziness, syncope. ABG: ↑ pH, ↓ PaCO2, normal-high PaO2. Often anxiety-related (panic disorder). Treatment: treat underlying anxiety; breathing retraining (diaphragmatic, slow breathing); paper bag breathing (controversial — not evidence-based). Rule out organic causes (PE, asthma, anemia) before diagnosing functional hyperventilation."},

// ── L50 · CVS Complications Related to Respiratory Illnesses ──────────────
// LO1: Cardiovascular-respiratory system interrelationship
{"sec":"L50","lo":"LO1 — CVS-respiratory system interrelationship","stem":"During positive pressure mechanical ventilation, which cardiovascular effect occurs?","opts":["A. Increased venous return to the right heart due to positive intrathoracic pressure augmenting the pressure gradient","B. Decreased venous return (↓ preload) due to positive intrathoracic pressure opposing the pressure gradient for venous return → ↓ RV preload → ↓ CO; also ↑ RV afterload from alveolar overdistension compressing alveolar vessels → RV strain","C. Increased LV afterload from increased aortic transmural pressure","D. No significant cardiovascular effects — ventilation and circulation are independent"],"answer":"B","exp":"Positive pressure ventilation (PPV) cardiovascular effects: (1) ↑ intrathoracic pressure → ↓ pressure gradient for venous return → ↓ RV preload → ↓ CO (clinically significant with high PEEP or hypovolemia); (2) ↑ RV afterload from alveolar vessel compression (especially at high lung volumes); (3) ↓ LV afterload (↑ intrathoracic pressure reduces LV transmural pressure) — this BENEFITS patients with cardiogenic pulmonary edema (less work for the LV). PEEP-induced hemodynamic compromise is managed with volume and/or lower PEEP."},
{"sec":"L50","lo":"LO1 — CVS-respiratory system interrelationship","stem":"A patient with severe asthma exacerbation is found to have pulsus paradoxus of 18 mmHg. What physiological mechanism causes pulsus paradoxus in obstructive lung disease?","opts":["A. Vagal reflex causing bradycardia during inspiration in severe asthma","B. During inspiration with severe airflow obstruction: ↓ intrathoracic pressure → ↑ RV filling → IV septum bows left → ↓ LV preload; simultaneously ↑ LV afterload from ↑ LV transmural pressure → ↓ systolic BP by >10 mmHg on inspiration","C. Aortic stenosis causing reduced stroke volume that is amplified by inspiratory effort","D. Inspiration causes direct cardiac compression by the hyperinflated lungs"],"answer":"B","exp":"Pulsus paradoxus (>10 mmHg fall in SBP with inspiration): in severe asthma/status asthmaticus, dynamic hyperinflation → highly negative intrathoracic pressure during labored inspiration → (1) ↑↑ venous return to RV; (2) IV septum shifts left → ↓ LV preload; (3) ↑ LV transmural pressure → ↑ LV afterload → ↓ LV stroke volume → ↓ SBP. Also seen in cardiac tamponade (different mechanism: fixed pericardial volume forces RV/LV competition). Pulsus paradoxus >18 mmHg in asthma = severe exacerbation."},

// LO2: Complications — pulmonary hypertension, cor pulmonale, heart failure
{"sec":"L50","lo":"LO2 — Pulmonary hypertension, cor pulmonale, and heart failure","stem":"According to the WHO/ESC 2022 classification, which group of pulmonary hypertension is MOST common and is caused by left heart disease?","opts":["A. Group 1 (PAH) — idiopathic or associated with connective tissue disease","B. Group 2 PH — pulmonary hypertension due to left heart disease (LV systolic/diastolic dysfunction, valvular disease) is the most common form of PH overall","C. Group 3 PH — caused by lung disease and hypoxia (COPD, ILD)","D. Group 4 PH — CTEPH from unresolved thromboemboli"],"answer":"B","exp":"WHO/ESC PH Groups: Group 1 (PAH): idiopathic, heritable, drug-induced, associated (CTD, HIV, portopulmonary, CHD). Group 2: LHD — most common form of PH (50–70% of PH referrals). ↑ LA pressure → ↑ pulmonary venous pressure → passive post-capillary PH → eventually pulmonary vascular remodeling. Group 3: hypoxic lung disease (COPD, ILD). Group 4: CTEPH. Group 5: multifactorial. Key clinical implication: PAH-specific therapies (sildenafil, bosentan) are NOT indicated and may worsen Group 2 PH (↑ pulmonary blood flow → pulmonary edema in LHD)."},
{"sec":"L50","lo":"LO2 — Pulmonary hypertension, cor pulmonale, and heart failure","stem":"Physical examination of a patient with cor pulmonale from severe COPD would be MOST likely to show which finding?","opts":["A. S3 gallop and displaced PMI — LV enlargement from cardiomyopathy","B. Loud P2 (pulmonic component of S2), JVD, right parasternal heave (RV hypertrophy), and peripheral edema — signs of RV pressure overload and failure","C. Bilateral basilar crackles from pulmonary edema — cor pulmonale primarily causes LV failure","D. Mitral stenosis murmur — cor pulmonale is caused by valvular disease"],"answer":"B","exp":"Cor pulmonale physical exam (right heart failure signs): (1) Loud P2 (↑ pulmonary artery pressure closes the pulmonic valve more forcefully); (2) Right parasternal heave (RV hypertrophy displaces sternum anteriorly); (3) JVD (↑ CVP from RV failure); (4) Hepatomegaly and hepatojugular reflux; (5) Peripheral dependent edema; (6) Tricuspid regurgitation murmur (holosystolic at LLSB, ↑ with inspiration = Carvallo's sign) from RV dilation. Bilateral crackles suggest concomitant LHF or pulmonary infection."},

// LO3: Pathophysiology, diagnosis, and management of CVS complications
{"sec":"L50","lo":"LO3 — Pathophysiology, diagnosis, management of CVS complications","stem":"Long-term domiciliary oxygen therapy (LTOT) in COPD patients with PaO2 <55 mmHg is the ONLY respiratory intervention proven to improve survival. What is the mechanism of benefit?","opts":["A. Directly increases FEV1 by reducing airway inflammation","B. Reduces hypoxic pulmonary vasoconstriction → lowers pulmonary arterial pressure → reduces RV afterload → slows progression of cor pulmonale; also improves exercise tolerance and reduces polycythemia","C. Prevents nocturnal arrhythmias from hypoxemia-induced sympathetic activation","D. Improves mucociliary clearance by increasing oxygen tension in the airway epithelium"],"answer":"B","exp":"LTOT survival benefit (MRC trial, NOTT trial): ≥15–18 h/day O2 in COPD with PaO2 ≤55 mmHg (or ≤59 mmHg with polycythemia/cor pulmonale). Mechanism: correction of hypoxemia → ↓ HPV → ↓ PVR → ↓ mPAP → slows RV remodeling and cor pulmonale progression. Additional benefits: ↓ polycythemia (Hct falls → ↓ blood viscosity), ↑ renal O2 delivery, improved neuropsychological function. Target SpO2: 88–92% (avoid hyperoxia → hypercapnia from Haldane effect and ↓ hypoxic drive)."},
{"sec":"L50","lo":"LO3 — Pathophysiology, diagnosis, management of CVS complications","stem":"Sildenafil (a PDE-5 inhibitor) is used for Group 1 PAH but is NOT approved for Group 2 or Group 3 PH. Why is it potentially harmful in Group 2 PH (left heart disease)?","opts":["A. Sildenafil causes systemic vasoconstriction → increases LV afterload","B. Sildenafil increases cGMP → pulmonary vasodilation → ↑ pulmonary blood flow to an already congested LV that cannot accommodate the increased preload → worsening pulmonary edema and ↓ LV filling pressure tolerance","C. Sildenafil inhibits phosphodiesterase in the SA node → bradyarrhythmias","D. Sildenafil activates the renin-angiotensin system → sodium retention → fluid overload"],"answer":"B","exp":"Group 2 PH (post-capillary PH from LHD): elevated PAWP (>15 mmHg). Pulmonary vasoconstriction is a PROTECTIVE mechanism limiting blood flow to an already overloaded pulmonary circulation. Sildenafil relaxes pulmonary vasculature → ↑ pulmonary blood flow → ↑ PAWP → acute pulmonary edema. Evidence confirms this: RELAX trial (sildenafil in HFpEF-PH): NO benefit and TREND toward harm. PAH-specific therapies (ERA, PDE-5i, prostanoids): approved ONLY for Group 1 PAH, not Group 2/3."},

// ── L51 · Hemoptysis ───────────────────────────────────────────────────────
// LO1: Hemoptysis — definition and common causes
{"sec":"L51","lo":"LO1 — Hemoptysis definition and causes","stem":"A 35-year-old with bronchiectasis secondary to childhood pertussis coughs up 30 mL of blood. Which anatomical vessel is the source in the VAST MAJORITY of non-iatrogenic hemoptysis?","opts":["A. Pulmonary artery branches (high-pressure, high-flow system)","B. Bronchial arteries (systemic pressure, hypertrophied in chronic lung disease) — responsible for >90% of significant hemoptysis","C. Pulmonary veins (from pulmonary venous hypertension in mitral stenosis)","D. Intercostal arteries (collateral supply to inflamed pleura)"],"answer":"B","exp":"Bronchial arteries (systemic circulation, 70–100 mmHg) supply the airway walls, connective tissue, and supporting structures. In chronic inflammatory lung disease (bronchiectasis, TB, aspergilloma, COPD), bronchial arteries become hypertrophied, tortuous, and fragile → hemorrhage into the airway. This is why bronchial artery embolization (BAE) is so effective — it targets the high-pressure bronchial arterial source. Pulmonary arteries are the source in rare cases (Swan-Ganz catheter perforation, Rasmussen aneurysm in cavitary TB)."},
{"sec":"L51","lo":"LO1 — Hemoptysis definition and causes","stem":"A 45-year-old with a known 2 cm pulmonary aspergilloma in an old TB cavity presents with massive hemoptysis. What is the mechanism of bleeding in aspergilloma?","opts":["A. Aspergillus produces mycotoxins that directly lyse vascular endothelium systemically","B. The fungal ball (mycetoma) physically erodes hypertrophied bronchial artery branches in the cavity wall + Aspergillus produces proteases and oxalic acid that damage blood vessel walls → hemorrhage","C. IgE-mediated type I hypersensitivity causing pulmonary vasculitis","D. Aspergillus invades pulmonary artery branches causing infarction and hemorrhage"],"answer":"B","exp":"Aspergilloma (mycetoma): Aspergillus fumigatus colonizes a pre-existing cavity (old TB, sarcoid, bullae). The fungal ball grows, erodes cavity walls, and causes hypertrophy of surrounding bronchial arteries (from chronic inflammation). Aspergillus produces: (1) proteolytic enzymes that damage blood vessel walls; (2) gliotoxin (immunosuppressive); (3) oxalic acid (calcium oxalate deposits → vascular calcification). Treatment: BAE for acute massive hemoptysis; surgical resection (wedge/lobectomy) for persistent or recurrent massive hemoptysis — definitive treatment."},

// LO2: Hemoptysis — clinical features, diagnosis, and management
{"sec":"L51","lo":"LO2 — Hemoptysis diagnosis and management","stem":"A 70-year-old with a 50 pack-year smoking history and new 3.5 cm left hilar mass presents with blood-streaked sputum × 2 weeks. He is otherwise hemodynamically stable. Which diagnostic procedure is MOST appropriate to simultaneously localize the bleeding site and potentially biopsy the mass?","opts":["A. CTPA — rules out pulmonary embolism as the cause","B. Flexible bronchoscopy — localizes the bleeding site in the airway, can directly visualize and biopsy central masses, and allows therapeutic intervention (epinephrine instillation, electrocautery, argon plasma coagulation, balloon tamponade) if needed","C. CXR only — sufficient for a stable patient with a known mass","D. Rigid bronchoscopy — always preferred over flexible for initial evaluation of hemoptysis"],"answer":"B","exp":"Flexible bronchoscopy (FOB) is the first-line procedure for hemoptysis with a central/hilar mass: (1) Localizes bleeding site (lobar/segmental origin) to guide BAE if needed; (2) Directly biopsies accessible central endobronchial lesions; (3) Can perform therapeutic maneuvers (topical epinephrine, cold saline, endobronchial blockers, electrocautery). Rigid bronchoscopy is superior for MASSIVE hemoptysis (better airway control, suction, balloon tamponade). CT chest before bronchoscopy (if stable) helps plan approach and identifies peripheral lesions."},
{"sec":"L51","lo":"LO2 — Hemoptysis diagnosis and management","stem":"A 55-year-old with systemic lupus erythematosus (SLE) develops acute onset dyspnea and bilateral hemoptysis. CXR shows diffuse bilateral alveolar infiltrates. ABG: PaO2 55 mmHg on room air. Urinalysis shows RBC casts and proteinuria. What syndrome does this represent, and what is the immediate treatment?","opts":["A. Massive PE — systemic thrombolysis required","B. Diffuse alveolar hemorrhage (DAH) from pulmonary-renal syndrome (SLE or Goodpasture syndrome) — immediate high-dose IV methylprednisolone (1 g/day × 3 days) + consider cyclophosphamide (SLE) or plasmapheresis + rituximab (Goodpasture)","C. ARDS from SLE-associated pneumonitis — lung-protective ventilation only","D. Bacterial pneumonia — empiric antibiotics"],"answer":"B","exp":"DAH + glomerulonephritis = pulmonary-renal syndrome. Causes: SLE (anti-dsDNA antibodies, immune complex deposition), Goodpasture syndrome (anti-GBM antibodies — treat with plasmapheresis + steroids + rituximab/cyclophosphamide), ANCA vasculitis (MPO or PR3-ANCA — treat with steroids + rituximab/cyclophosphamide). Diagnosis: BAL showing hemosiderin-laden macrophages (>20% = DAH). Kidney biopsy confirms GN subtype. Treatment is immunosuppressive — not just supportive — and delays worsen outcomes."},

// ── L52 · Neck Masses & Diseases of the Larynx ────────────────────────────
// LO1: Neck compartments and anatomy
{"sec":"L52","lo":"LO1 — Neck compartments and anatomy","stem":"A surgeon is planning lymph node dissection for head and neck cancer. Lymph node level IVA is located where, and drains which primary sites?","opts":["A. Submental triangle (below the chin, between anterior digastric muscles) — drains the floor of mouth and lower lip","B. Lower jugular chain nodes (between the omohyoid muscle and clavicle, lateral to the carotid sheath) — drains the hypopharynx, thyroid, cervical esophagus, and lower oropharynx","C. Posterior triangle nodes along the spinal accessory nerve — drains the scalp and nasopharynx","D. Pre-laryngeal and pre-tracheal nodes (central compartment, level VI) — drains the thyroid and larynx"],"answer":"B","exp":"Neck lymph node levels (Memorial Sloan Kettering system): Level I: submental (IA) and submandibular (IB). Level II: upper jugular (IA-IIB). Level III: mid-jugular. Level IV: lower jugular (IVA = lateral, IVB = medial). Level V: posterior triangle (VA, VB). Level VI: central compartment (pre/paratracheal). Level VII: superior mediastinal. Level IV nodes receive drainage from hypopharynx, thyroid, cervical esophagus. Level IV nodal metastasis in an unknown primary strongly suggests subglottic/thyroid/thoracic primary."},
{"sec":"L52","lo":"LO1 — Neck compartments and anatomy","stem":"Which fascial space infection of the neck is MOST dangerous due to its direct communication with the posterior mediastinum?","opts":["A. Parapharyngeal space — bounded by the parotid and pterygomandibular raphe","B. Retropharyngeal space — communicates directly with the 'danger space' (between alar and prevertebral fascia) which tracks inferiorly to the posterior mediastinum → mediastinitis","C. Masticator space — contains the masseter, pterygoids, and ramus of mandible","D. Submandibular space (Ludwig's angina) — communicates only with the sublingual space"],"answer":"B","exp":"Deep neck space infections: the retropharyngeal space (between posterior pharyngeal wall and alar fascia) and particularly the 'danger space' (between alar and prevertebral fascia: C2–T4) directly communicate with the posterior mediastinum through the thoracic inlet. Infection here → descending necrotizing mediastinitis (mortality 30–50%). Treatment: urgent surgical drainage of neck + mediastinum (video-assisted thoracic drainage). Ludwig's angina (submandibular/sublingual) → airway emergency from tongue elevation, but does not spread to mediastinum directly."},

// LO2: Congenital, inflammatory, neoplastic, and traumatic neck masses
{"sec":"L52","lo":"LO2 — Types of neck masses","stem":"A 25-year-old presents with a painless 3 cm cystic neck mass along the anterior border of the SCM at the level of the hyoid. It does not move with tongue protrusion. He had recurrent episodes of tender swelling at the same site during upper respiratory infections. What is the most likely diagnosis?","opts":["A. Thyroglossal duct cyst — moves with tongue protrusion and swallowing","B. Second branchial cleft cyst — classically at the anterior SCM border at the level of the hyoid/mid-jugular region; fistula opens near the tonsillar fossa internally","C. Cystic hygroma (lymphatic malformation) — typically posterior triangle in infants","D. Dermoid cyst — midline, firm, non-mobile"],"answer":"B","exp":"Second branchial cleft cyst (most common, ~95% of branchial anomalies): anterior to SCM, typically at the junction of upper and middle thirds (angle of mandible to hyoid level). Internal fistula tract courses between the internal and external carotid arteries to open at the tonsillar fossa. Episodes of tenderness during URIs = secondary infection of the cyst. Treatment: complete surgical excision of cyst + tract (usually delayed until age 3–4 to reduce anesthetic risk). Does NOT move with tongue protrusion (distinguishes from thyroglossal duct cyst)."},
{"sec":"L52","lo":"LO2 — Types of neck masses","stem":"A 55-year-old smoker and heavy drinker presents with a firm, non-tender, fixed right neck mass (3 cm) at level II. He has no other symptoms. FNA shows squamous cell carcinoma. What is the most critical next step?","opts":["A. Neck dissection immediately — the primary cancer is the neck node itself","B. Panendoscopy (direct laryngoscopy, esophagoscopy, bronchoscopy) + CT/PET-CT to identify the unknown primary tumor — a level II SCC nodal metastasis in a smoker/drinker most likely originates from the oropharynx, larynx, hypopharynx, or oral cavity","C. Empiric neck radiation without further workup","D. Excisional biopsy of the neck node and await final pathology before further workup"],"answer":"B","exp":"Unknown primary HNSCC with positive neck node: first priority is finding the primary. Work-up: (1) CT neck/chest with contrast; (2) PET-CT (detects occult primary in ~25% of cases); (3) Panendoscopy under anesthesia with directed biopsies (base of tongue, nasopharynx, piriform sinus, tonsillectomy — site of occult HPV+ oropharyngeal primaries); (4) p16 IHC on node (if +, HPV+ oropharyngeal primary until proven otherwise). Treating the node without finding the primary risks inadequate treatment of the primary site."},

// LO3: Evaluation of a patient with a neck mass
{"sec":"L52","lo":"LO3 — Evaluation of neck mass","stem":"In a patient presenting with a neck mass, which historical and physical exam features would raise the HIGHEST concern for malignancy (as opposed to a benign reactive lymph node)?","opts":["A. Tender, soft, mobile node developing after a dental procedure in a 20-year-old","B. Firm, non-tender, progressively enlarging node > 2 cm in a 60-year-old smoker with associated dysphagia, weight loss, and fixed to surrounding structures","C. Multiple soft, bilateral nodes in a 25-year-old with fever and sore throat (mono-like illness)","D. Single mobile, tender node in the submandibular triangle with concurrent peritonsillar abscess"],"answer":"B","exp":"Red flags for malignant neck mass: Age >40, smoking/alcohol history, firmness/hardness, non-tenderness, fixation to surrounding structures (capsular invasion), progressive enlargement, size >2 cm, B-symptoms (fever, night sweats, weight loss = lymphoma), associated head and neck symptoms (dysphagia, hoarseness, odynophagia, ear pain = referred otalgia from pharyngeal SCC). Benign features: tender, mobile, soft, bilateral, acute onset, associated with infection, in young patient, resolving over 2–4 weeks."},
{"sec":"L52","lo":"LO3 — Evaluation of neck mass","stem":"Ultrasound-guided FNA is the first-line biopsy method for most neck masses. In which situation is excisional biopsy preferred over FNA?","opts":["A. All neck masses in patients over 50 — excisional biopsy is more accurate","B. When lymphoma is suspected — FNA provides cells but not the nodal architecture needed to classify lymphoma subtype (HL vs. NHL subtype) and grade, which guides treatment; excisional LN biopsy is required","C. For all cystic neck masses — aspiration always provides insufficient material","D. For neck masses in the posterior triangle only — FNA misses posterior triangle nodes"],"answer":"B","exp":"FNA is preferred for most neck masses (safe, quick, accurate for SCC, thyroid CA, metastatic carcinoma). FNA is INSUFFICIENT for lymphoma: classification requires intact nodal architecture to assess follicular vs. diffuse growth pattern, Reed-Sternberg cells in context, Ki-67, flow cytometry on disaggregated cells. Core needle biopsy (CNB) with flow cytometry is increasingly used as an alternative to excisional biopsy for lymphoma in many centers, but excisional biopsy remains the standard when CNB is inconclusive or architectural assessment is critical."},

];

const SECTIONS = ["All","L27","L28","L29-30","L31","L32","L33","L34","L35","L36","L37","L38","L39","L40-41","L42","L43","L44","L45","L46","L47","L48","L49","L50","L51","L52"];
const SEC_LABELS = {"All":"All lectures","L27":"L27 · Neuromuscular","L28":"L28 · Osteopathic","L29-30":"L29-30 · Imaging","L31":"L31 · Pneumonia","L32":"L32 · Thoracic Surgery","L33":"L33 · Nasal & Sinus","L34":"L34 · Airway Emergency","L35":"L35 · Pulm Rehab","L36":"L36 · Lung Tumors","L37":"L37 · Carcinoid/Pleural","L38":"L38 · Wheezing","L39":"L39 · Ear Disease","L40-41":"L40-41 · Nodules/CA","L42":"L42 · Cough","L43":"L43 · Antihistamines","L44":"L44 · Nutrition/Resp","L45":"L45 · Critical Nutrition","L46":"L46 · ARDS","L47":"L47 · PE","L48":"L48 · Tuberculosis","L49":"L49 · Dyspnea","L50":"L50 · CVS Complications","L51":"L51 · Hemoptysis","L52":"L52 · Neck Masses"};

let qs = [...ALL_QUESTIONS];
let currentIdx = 0;
let answered = new Array(qs.length).fill(null);
let filterSec = "All";

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}
shuffle(qs);

function getFiltered() {
  if (filterSec === "All") return qs;
  return qs.filter(q => q.sec === filterSec);
}

function render() {
  const filtered = getFiltered();
  if (filtered.length === 0) return;
  const q = filtered[currentIdx];
  const qOrigIdx = qs.indexOf(q);
  const ans = answered[qOrigIdx];
  const col = SECTION_COLORS[q.sec] || { bg:"#F1EFE8", border:"#B4B2A9", text:"#2C2C2A" };
  const answered_count = answered.filter(a => a !== null).length;
  const correct_count = qs.filter((q, i) => answered[i] && answered[i] === q.answer).length;

  document.getElementById("quiz-main").innerHTML = `
    <div class="header">
      <h2>Respiratory System Practice Quiz</h2>
      <p>${ALL_QUESTIONS.length} questions &nbsp;·&nbsp; ${answered_count} answered &nbsp;·&nbsp; ${correct_count} correct</p>
      <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${answered_count / qs.length * 100}%"></div></div>
      <div class="progress-label"><span>${answered_count} / ${qs.length} answered</span><span>${Math.round(answered_count / qs.length * 100)}%</span></div>
    </div>
    <div class="filter-row">
      <span class="filter-label">Lecture:</span>
      ${SECTIONS.map(s => `<button class="filter-btn${filterSec === s ? ' active' : ''}" onclick="setFilter('${s}')">${SEC_LABELS[s]}</button>`).join("")}
      <span class="q-counter">Q ${currentIdx + 1} / ${filtered.length}</span>
    </div>
    <div class="q-card">
      <div class="lo-tag">
        <span style="display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;background:${col.bg};color:${col.text};border:0.5px solid ${col.border}">${SEC_LABELS[q.sec] || q.sec}</span>
        &nbsp;<span style="color:var(--color-text-tertiary)">${q.lo}</span>
      </div>
      <div class="q-stem">${q.stem}</div>
      <div class="opts">
        ${q.opts.map(opt => {
          const letter = opt[0];
          let cls = "opt-btn";
          if (ans) {
            if (letter === q.answer) cls += " correct";
            else if (letter === ans && letter !== q.answer) cls += " wrong";
          }
          return `<button class="${cls}" ${ans ? "disabled" : ""} onclick="selectAnswer('${letter}', ${qOrigIdx})">${opt}</button>`;
        }).join("")}
      </div>
      <div class="explanation ${ans ? 'show' : ''}">
        <strong>Explanation:</strong> ${q.exp}
      </div>
    </div>
    <div class="nav-row">
      <button class="btn-nav" onclick="prev()" ${currentIdx === 0 ? 'disabled' : ''}>← Previous</button>
      <button class="btn-nav" onclick="next()" ${currentIdx >= filtered.length - 1 ? 'disabled' : ''}>Next →</button>
      <button class="btn-nav" onclick="jumpRandom()">Random question</button>
      <button class="btn-nav primary" onclick="showScore()">See results ↗</button>
    </div>
  `;
}

function selectAnswer(letter, origIdx) {
  if (answered[origIdx] !== null) return;
  answered[origIdx] = letter;
  render();
}

function setFilter(sec) {
  filterSec = sec;
  currentIdx = 0;
  render();
}

function next() {
  const filtered = getFiltered();
  if (currentIdx < filtered.length - 1) { currentIdx++; render(); }
}

function prev() {
  if (currentIdx > 0) { currentIdx--; render(); }
}

function jumpRandom() {
  const filtered = getFiltered();
  const unanswered = filtered.map((q, i) => i).filter(i => answered[qs.indexOf(filtered[i])] === null);
  if (unanswered.length > 0) currentIdx = unanswered[Math.floor(Math.random() * unanswered.length)];
  else currentIdx = Math.floor(Math.random() * filtered.length);
  render();
}

function showScore() {
  const total = qs.length;
  const attempted = answered.filter(a => a !== null).length;
  const correct = qs.filter((q, i) => answered[i] === q.answer).length;
  const pct = attempted > 0 ? Math.round(correct / attempted * 100) : 0;
  const secs = SECTIONS.filter(s => s !== "All");
  const secData = secs.map(s => {
    const secQs = qs.map((q, i) => ({ q, i })).filter(({ q }) => q.sec === s);
    const secCorrect = secQs.filter(({ q, i }) => answered[i] === q.answer).length;
    const secAttempted = secQs.filter(({ q, i }) => answered[i] !== null).length;
    return { s, correct: secCorrect, attempted: secAttempted, total: secQs.length };
  });
  document.getElementById("quiz-main").style.display = "none";
  document.getElementById("score-screen").style.display = "block";
  document.getElementById("score-screen").innerHTML = `
    <div class="score-panel">
      <div><span class="score-num">${correct}</span><span class="score-denom"> / ${attempted}</span></div>
      <div class="score-pct">${pct}% correct of answered questions</div>
      <div class="score-sub">${total - attempted} question${total - attempted !== 1 ? 's' : ''} not yet answered</div>
      <div class="section-scores">
        ${secData.map(d => `
          <div class="sec-score-card">
            <div class="sec-name">${SEC_LABELS[d.s] || d.s}</div>
            <div class="sec-frac" style="color:${d.attempted > 0 && d.correct / d.attempted >= 0.7 ? '#3B6D11' : d.attempted > 0 && d.correct / d.attempted < 0.5 ? '#A32D2D' : 'var(--color-text-primary)'}">${d.correct}/${d.attempted}<span style="font-size:12px;color:var(--color-text-secondary)"> of ${d.total}</span></div>
          </div>`).join("")}
      </div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <button class="btn-nav primary" onclick="resumeQuiz()">Resume quiz</button>
        <button class="btn-nav" onclick="restartQuiz()">Restart (reshuffle)</button>
        <button class="btn-nav" onclick="reviewWrong()">Review wrong answers</button>
      </div>
    </div>
  `;
}

function resumeQuiz() {
  document.getElementById("quiz-main").style.display = "block";
  document.getElementById("score-screen").style.display = "none";
  render();
}

function restartQuiz() {
  answered = new Array(qs.length).fill(null);
  shuffle(qs);
  currentIdx = 0;
  filterSec = "All";
  document.getElementById("quiz-main").style.display = "block";
  document.getElementById("score-screen").style.display = "none";
  render();
}

function reviewWrong() {
  const wrongSecs = qs.filter((q, i) => answered[i] !== null && answered[i] !== q.answer).map(q => q.sec);
  const wrongSecSet = [...new Set(wrongSecs)];
  document.getElementById("quiz-main").style.display = "block";
  document.getElementById("score-screen").style.display = "none";
  filterSec = wrongSecSet.length === 1 ? wrongSecSet[0] : "All";
  currentIdx = 0;
  const firstWrong = qs.findIndex((q, i) => answered[i] !== null && answered[i] !== q.answer);
  if (firstWrong >= 0) {
    const filtered = getFiltered();
    const wIdx = filtered.indexOf(qs[firstWrong]);
    if (wIdx >= 0) currentIdx = wIdx;
  }
  render();
}

render();
</script>
