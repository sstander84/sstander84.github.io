{"sec":"L35","lo":"LO1 — Rehabilitation in obstructive and restrictive disorders","stem":"A 60-year-old with IPF (restrictive disease, FVC 58%) is referred for pulmonary rehabilitation. Which exercise modality is MOST appropriate, and which should be avoided?","opts":["A. High-intensity interval training (HIIT) without O2 supplementation","B. Moderate-intensity endurance training (walking, cycling) with supplemental O2 as needed to maintain SpO2 >88% — HIIT is not appropriate without O2 monitoring","C. Resistance training only — aerobic exercise is contraindicated in restrictive disease","D. Pulmonary rehabilitation is only evidence-based for COPD, not ILD"],"answer":"B","exp":"Pulmonary rehabilitation benefits ILD patients (including IPF): improves 6MWT distance, dyspnea, and QOL, though evidence is less robust than in COPD. Patients with ILD have impaired O2 diffusion → exercise-induced desaturation. Supplemental O2 titrated to maintain SpO2 >88% during exercise is essential. Moderate endurance training (walking, cycling at 60–80% max HR) is the mainstay; resistance training is adjunctive."},
{"sec":"L35","lo":"LO1 — Rehabilitation in obstructive and restrictive disorders","stem":"Pursed-lip breathing is commonly taught to COPD patients during pulmonary rehabilitation. What is the physiological mechanism of benefit?","opts":["A. Creates positive expiratory pressure that stents open dynamic airway collapse, reducing air trapping and improving CO2 exhalation","B. Increases respiratory rate, improving minute ventilation","C. Strengthens the diaphragm by increasing expiratory resistance","D. Activates the Hering-Breuer reflex to reduce respiratory rate"],"answer":"A","exp":"In COPD, expiratory flow limitation and dynamic hyperinflation occur because the floppy airways collapse on forced expiration. Pursed-lip breathing creates back-pressure (intrinsic PEEP) during exhalation → stents airways open → ↓ air trapping → ↓ dynamic hyperinflation → ↓ WOB → slows RR → improves CO2 exhalation. Also prolongs expiration and reduces breathing rate, giving patients a sense of control. Clinical trial evidence supports improved dyspnea."},

// LO2: Noninvasive treatment options
{"sec":"L35","lo":"LO2 — Noninvasive treatment options","stem":"A patient with advanced COPD (FEV1 22%) and chronic hypercapnia (PaCO2 58 mmHg, pH 7.38 — compensated) has persistent nocturnal desaturation and morning headache despite optimal bronchodilator therapy. Which noninvasive intervention is most appropriate?","opts":["A. High-flow nasal cannula (HFNC) 40 L/min during the day only","B. Long-term nocturnal BiPAP (home non-invasive ventilation) to offload respiratory muscles, reduce hypercapnia, and improve QOL","C. Low-flow oxygen 1 L/min overnight without ventilatory support","D. Initiation of oral corticosteroids to reduce airway inflammation"],"answer":"B","exp":"Chronic hypercapnic COPD with nocturnal hypoventilation (morning headache = CO2 retention): long-term home NIV (nocturnal BiPAP) is now evidence-based (HOT-HMV trial, Kohnlein et al). Targets: PaCO2 reduction ≥4 mmHg or <48 mmHg. Reduces exacerbations, hospitalizations, and may improve survival in severe COPD with persistent hypercapnia after exacerbation. High IPAP (18–22 cmH2O) with backup rate is typically needed."},
{"sec":"L35","lo":"LO2 — Noninvasive treatment options","stem":"Which technique for airway clearance in bronchiectasis patients works by creating oscillating positive expiratory pressure (OPEP) to thin secretions and move them from small to large airways?","opts":["A. Postural drainage — gravity-dependent positioning","B. Flutter valve or Acapella device — creates oscillating PEP that vibrates the airway walls, reduces mucus viscosity, and facilitates cough clearance","C. Incentive spirometry — primarily used for atelectasis prevention","D. Intermittent positive pressure breathing (IPPB) — delivers aerosol medications"],"answer":"B","exp":"OPEP devices (Flutter valve, Acapella): patient exhales through a device creating oscillating PEP (10–20 cmH2O with 10–25 Hz vibrations). Mechanism: (1) oscillations reduce mucus viscoelasticity, (2) back pressure stents airways open during expiration, (3) improved mucus transport from peripheral to central airways for expectoration. Evidence supports use in bronchiectasis and CF. High-frequency chest wall oscillation (vest) is another OPEP option."},

// LO3: Rationale for endurance training and home exercise programs
{"sec":"L35","lo":"LO3 — Endurance training and home exercise programs","stem":"After completing a 12-week supervised pulmonary rehabilitation program, a COPD patient asks how to maintain benefits at home. Which recommendation has the STRONGEST evidence for sustaining gains?","opts":["A. Daily use of incentive spirometry at home","B. Continued regular exercise (walking 30 min most days) with periodic maintenance supervised sessions, and use of pedometers/activity monitors","C. Stretching exercises only — aerobic training is unsafe unsupervised","D. Breathing exercises alone maintain all gains from formal rehabilitation"],"answer":"B","exp":"Pulmonary rehabilitation gains (6MWT, SGRQ, dyspnea) decay within 12 months without maintenance. Evidence supports: home walking programs (pedometer-guided physical activity), maintenance supervised sessions (monthly or bimonthly), phone/telerehabilitation follow-up. Walking is the most accessible, studied, and guideline-supported home exercise. Simple pedometer interventions improve physical activity in COPD (PEDOMETER trial)."},
{"sec":"L35","lo":"LO3 — Endurance training and home exercise programs","stem":"The 6-minute walk test (6MWT) is frequently used in pulmonary rehabilitation. What is the minimum clinically important difference (MCID) in 6MWT distance that is considered meaningful to patients?","opts":["A. 10 meters — any improvement is significant","B. 25–30 meters — the MCID for 6MWT in COPD and ILD patients","C. 100 meters — patients only notice large improvements","D. 50% increase from baseline — relative change is more meaningful than absolute"],"answer":"B","exp":"The MCID for 6MWT in COPD is approximately 25–35 meters (most studies use ~26–30 m). In ILD, the MCID is similar (~24–45 m depending on the study). Pulmonary rehabilitation typically improves 6MWT by 40–60 m in COPD — exceeding the MCID. The 6MWT is also a prognostic tool: 6MWT <350 m in COPD correlates with increased mortality and predicts need for transplant listing in ILD."},

// ── L36 · Pathology of Primary Lung Tumors ────────────────────────────────
// LO1: Hemoptysis — definition and etiology
{"sec":"L36","lo":"LO1 — Hemoptysis","stem":"A 45-year-old with bronchiectasis coughs up >600 mL of blood over 24 hours. He is hypotensive and tachycardic. What is the IMMEDIATE life-threatening mechanism of death in massive hemoptysis, and what is the first priority?","opts":["A. Exsanguination and hemorrhagic shock — immediate blood transfusion is the first priority","B. Asphyxiation from flooding of the contralateral lung with blood — airway protection and positioning (bleeding lung dependent) are the first priorities","C. Tension pneumothorax from ruptured pulmonary vessel — chest tube insertion first","D. Pulmonary infarction from bronchial artery thrombosis — anticoagulation first"],"answer":"B","exp":"In massive hemoptysis, death occurs from asphyxiation (blood filling the airways/alveoli of the non-bleeding lung) rather than from blood loss in most cases. First priority: airway protection — intubate if needed and position the patient with the BLEEDING LUNG DOWN to prevent blood from filling the contralateral lung. Then urgent bronchoscopy (localize source, tamponade), bronchial artery embolization, or surgery."},
{"sec":"L36","lo":"LO1 — Hemoptysis","stem":"Which of the following causes of hemoptysis is MOST common in the outpatient setting in developed countries?","opts":["A. Pulmonary tuberculosis","B. Bronchitis (acute or chronic) and bronchiectasis — most common causes in developed countries","C. Primary lung cancer","D. Pulmonary embolism with infarction"],"answer":"B","exp":"In developed countries, acute/chronic bronchitis and bronchiectasis are the most common causes of hemoptysis (comprising >70% of cases). Lung cancer is the most important to exclude (especially in smokers >40). Worldwide, TB remains the leading cause of massive hemoptysis. Rare but important: Goodpasture syndrome (anti-GBM antibodies), DAH (diffuse alveolar hemorrhage), AVM, and mitral stenosis (pulmonary venous hypertension)."},

// LO2: Incidence, etiology, and pathogenesis of lung cancer
{"sec":"L36","lo":"LO2 — Lung cancer incidence, etiology, pathogenesis","stem":"A 55-year-old lifelong non-smoker develops lung adenocarcinoma. Which exposure is the LEADING cause of lung cancer in non-smokers?","opts":["A. Asbestos","B. Radon gas — a radioactive noble gas from uranium decay that accumulates in buildings, emitting alpha particles that damage bronchial epithelial DNA","C. Secondhand smoke","D. Air pollution (PM2.5 particulates)"],"answer":"B","exp":"Radon-222 (from uranium-238 decay in soil/rock) is the leading environmental cause of lung cancer in non-smokers and the second overall cause of lung cancer (after smoking). It accumulates in poorly ventilated homes/basements. Alpha particles from radon daughter products directly damage bronchial epithelial DNA → mutations in TP53, KRAS. EPA estimates radon causes ~21,000 deaths/year in the US. All homes should be tested."},
{"sec":"L36","lo":"LO2 — Lung cancer incidence, etiology, pathogenesis","stem":"Which oncogene mutation is MOST commonly found in lung adenocarcinoma of smokers, and which mutation is more common in non-smokers and women?","opts":["A. KRAS mutation (in smokers); EGFR mutation (in non-smokers, Asians, women, adenocarcinoma)","B. ALK rearrangement (in smokers); ROS1 rearrangement (in non-smokers)","C. BRAF V600E mutation (in smokers); MET amplification (in non-smokers)","D. TP53 loss (in smokers); RB1 deletion (in non-smokers)"],"answer":"A","exp":"KRAS mutations (~25–30% of lung adenocarcinoma) are strongly associated with smoking history and are more common in Caucasians. EGFR activating mutations (exon 19 del, L858R) occur in ~15% overall but in ~50% of Asian female non-smokers with adenocarcinoma. EGFR mutations are targetable with TKIs (osimertinib). KRAS G12C is now targetable with sotorasib/adagrasib. ALK/ROS1 rearrangements also occur predominantly in non/light smokers."},

// LO3: Classification, clinical manifestations, spread, paraneoplastic syndromes
{"sec":"L36","lo":"LO3 — Lung cancer classification, manifestations, paraneoplastic syndromes","stem":"A 62-year-old male smoker develops confusion, decreased urine output, and urine sodium of 45 mEq/L. Serum sodium is 118 mEq/L, serum osmolality 248, urine osmolality 580. CXR shows a central hilar mass. Which lung cancer type and paraneoplastic syndrome is MOST likely?","opts":["A. Adenocarcinoma — hypercalcemia from PTHrP secretion","B. Small cell carcinoma (SCLC) — SIADH from ectopic ADH (vasopressin) secretion","C. Squamous cell carcinoma — SIADH from PTHrP-mediated renal effects","D. Large cell carcinoma — Cushing syndrome from ectopic ACTH secretion"],"answer":"B","exp":"SIADH (↓ serum Na, ↓ serum osm, ↑ urine Na >40, ↑ urine osm >serum osm, euvolemic) is the most common paraneoplastic syndrome in SCLC. SCLC (neuroendocrine origin) secretes ectopic ADH/vasopressin. Other SCLC paraneoplastic: Cushing (ectopic ACTH), Lambert-Eaton myasthenic syndrome (VGCC antibodies), encephalomyelitis. SCC: PTHrP-hypercalcemia. SCLC is almost exclusively a central/perihilar tumor in smokers."},
{"sec":"L36","lo":"LO3 — Lung cancer classification, manifestations, paraneoplastic syndromes","stem":"A 58-year-old smoker develops shoulder pain, right arm weakness, and right-sided ptosis, miosis, and anhidrosis. CXR shows an apical right-sided mass. What is this syndrome called and what structure is being invaded?","opts":["A. Lambert-Eaton syndrome — paraneoplastic NMJ disorder from VGCC antibodies","B. Pancoast syndrome — apical lung tumor invading the brachial plexus (T1, causing hand weakness) and cervical sympathetic chain (causing Horner syndrome: ptosis, miosis, anhidrosis)","C. Superior vena cava (SVC) syndrome — venous obstruction causing facial and arm swelling","D. Phrenic nerve palsy — diaphragm elevation causing shoulder pain via referred pain"],"answer":"B","exp":"Pancoast tumor (superior sulcus tumor): apical lung tumor invading structures at the thoracic inlet. Pancoast syndrome: (1) Shoulder/arm pain + ulnar nerve distribution paresthesias (T1/C8 brachial plexus) → hand intrinsic muscle weakness. (2) Horner syndrome (ptosis, miosis, anhidrosis, enophthalmos) from invasion of the cervical sympathetic chain. Treated with concurrent chemoradiation followed by surgical resection (SWOG 9416 protocol)."},

// LO4: Diagnosis and staging of lung cancer
{"sec":"L36","lo":"LO4 — Diagnosis and staging of lung cancer","stem":"A patient with a central lung mass undergoes bronchoscopy. The pathology report returns 'small cell carcinoma, positive for synaptophysin and chromogranin A, negative for TTF-1 and p40.' What do synaptophysin and chromogranin A indicate?","opts":["A. Squamous differentiation — consistent with squamous cell carcinoma","B. Neuroendocrine differentiation — SCLC is a high-grade neuroendocrine carcinoma derived from Kulchitsky cells","C. Adenocarcinoma differentiation — TTF-1 positivity expected","D. Mesothelioma markers — calretinin and WT-1 would be expected"],"answer":"B","exp":"Synaptophysin and chromogranin A are the classic IHC markers of neuroendocrine differentiation — present in SCLC, carcinoid, and large cell neuroendocrine carcinoma. SCLC: 'oat cell' morphology, high mitotic index, extensive necrosis, crush artifact. TTF-1 is positive in adenocarcinoma (and SCLC inconsistently). p40/p63 = squamous. Calretinin/WT-1 = mesothelioma. Napsin A = adenocarcinoma."},
{"sec":"L36","lo":"LO4 — Diagnosis and staging of lung cancer","stem":"A patient with NSCLC is staged as T2aN1M0. According to the TNM 8th edition, what is the overall stage, and what is the primary treatment intent?","opts":["A. Stage IA — surgery alone, no adjuvant therapy needed","B. Stage IIB — surgical resection (lobectomy) + adjuvant chemotherapy ± adjuvant immunotherapy (pembrolizumab if PD-L1 ≥1%)","C. Stage IIIA — concurrent chemoradiation, surgery not feasible","D. Stage IV — palliative chemotherapy only"],"answer":"B","exp":"T2a (>3–4 cm or involves main bronchus/visceral pleura) + N1 (ipsilateral peribronchial/hilar nodes) + M0 = Stage IIB per 8th edition TNM. Treatment: curative-intent lobectomy + adjuvant platinum-based chemotherapy (cisplatin/vinorelbine or paclitaxel). Adjuvant osimertinib approved for EGFR-mutant resected Stage IB–IIIA. Adjuvant pembrolizumab (atezolizumab) approved for PD-L1 ≥1% Stage II–IIIA after resection and chemo (IMpower010)."},

// ── L37 · Bronchial Carcinoid, Pleural & Metastatic Lung Tumors ──────────
// LO1: Bronchial carcinoid tumors
{"sec":"L37","lo":"LO1 — Bronchial carcinoid tumors","stem":"A 35-year-old non-smoker has recurrent pneumonias in the same lobe and episodic hemoptysis. Bronchoscopy reveals a pink, vascular, centrally-located endobronchial mass. Biopsy shows uniform round cells with 'salt-and-pepper' chromatin and <2 mitoses per 2 mm2. What is the diagnosis and treatment?","opts":["A. Squamous cell carcinoma — lobectomy + adjuvant chemotherapy","B. Typical carcinoid tumor (low-grade NET Grade 1) — surgical resection (sleeve resection or lobectomy) is curative in >90%","C. SCLC — cisplatin + etoposide chemotherapy","D. Mucoepidermoid carcinoma — radiation therapy"],"answer":"B","exp":"Typical carcinoid: <2 mitoses/2 mm2, no necrosis, Ki-67 <5%, uniform neuroendocrine cells. Central location (80%) → obstructive pneumonia, hemoptysis. Non-smoking-related. Treatment: complete surgical resection is curative for typical carcinoid (>95% 5-yr survival). Atypical carcinoid: 2–10 mitoses/2mm2 or necrosis → worse prognosis, 60–70% 5-yr survival. Somatostatin analogs (octreotide, lanreotide) for metastatic/symptomatic carcinoid syndrome."},
{"sec":"L37","lo":"LO1 — Bronchial carcinoid tumors","stem":"Which cardiac manifestation is associated with carcinoid syndrome and what causes it?","opts":["A. Left-sided valvular disease from high systemic serotonin levels","B. Right-sided fibrotic valvular disease (tricuspid regurgitation, pulmonic stenosis) from serotonin and other vasoactive amines reaching the right heart directly before hepatic inactivation","C. Pericardial effusion from tumor invasion of the pericardium","D. Coronary artery vasospasm from bradykinin released by carcinoid tumors"],"answer":"B","exp":"Carcinoid heart disease (Hedinger syndrome): serotonin, bradykinin, and TGF-β cause fibrous endocardial plaques predominantly on the RIGHT side (pulmonary and tricuspid valves) — because the liver inactivates serotonin before it reaches the LEFT heart via the pulmonary capillaries. Left-sided disease occurs in bronchial carcinoids (bypassing hepatic inactivation) or in patent foramen ovale. Echocardiography is recommended in all carcinoid patients before surgery."},

// LO2: Metastatic pulmonary tumors
{"sec":"L37","lo":"LO2 — Metastatic pulmonary tumors","stem":"A 55-year-old with a history of renal cell carcinoma (RCC) treated 5 years ago presents with multiple bilateral pulmonary nodules on CT — the largest is 4 cm. PET-CT shows all nodules are FDG-avid. Which statement regarding pulmonary metastasectomy in RCC is MOST accurate?","opts":["A. Pulmonary metastasectomy is never beneficial — systemic therapy only","B. Pulmonary metastasectomy may be beneficial in highly selected patients with RCC: resectable metastases, adequate pulmonary reserve, controlled primary tumor, and no other sites of disease — 5-yr survival ~35–40%","C. Metastasectomy is contraindicated if there are more than 2 nodules","D. Radiation therapy is equivalent to surgery for pulmonary RCC metastases"],"answer":"B","exp":"Pulmonary metastasectomy for RCC: selected patients with oligometastatic disease, resectable lesions, adequate pulmonary reserve, and disease-free interval >1 year can achieve 35–45% 5-year survival post-resection — superior to systemic therapy alone in this highly selected group. Other favorable primary tumors for pulmonary metastasectomy: colorectal cancer, sarcoma, germ cell tumors. The International Registry of Lung Metastases supports this approach."},
{"sec":"L37","lo":"LO2 — Metastatic pulmonary tumors","stem":"Lymphangitic carcinomatosis presents with rapidly progressive dyspnea, dry cough, and a distinct radiographic pattern. Which CT finding is MOST characteristic?","opts":["A. Multiple round cannonball nodules evenly distributed throughout both lungs","B. Bilateral thickening of interlobular septa and bronchovascular bundles with beaded or nodular appearance, preserving lobular architecture","C. Bilateral hilar adenopathy without parenchymal involvement","D. Multiple thin-walled cysts distributed throughout both lungs"],"answer":"B","exp":"Lymphangitic carcinomatosis: tumor spreads via pulmonary lymphatics. HRCT: bilateral thickened interlobular septa (smooth or beaded/nodular), thickened bronchovascular bundles, polygonal arcades — all due to lymphatic obstruction and tumor growth in lymphatic channels. Preserved lobular architecture distinguishes it from pulmonary edema (smooth septal thickening without nodular component). Common primaries: breast, lung, gastric, prostate cancer."},

// LO3: Malignant mesothelioma and other pleural tumors
{"sec":"L37","lo":"LO3 — Malignant mesothelioma and pleural tumors","stem":"A 65-year-old with 35 years of shipyard asbestos exposure develops progressive dyspnea and right-sided chest pain. CT shows right pleural thickening that encases the lung ('rind') and a large pleural effusion. Pleural fluid cytology is non-diagnostic. What is the next most appropriate diagnostic step?","opts":["A. Repeat thoracentesis with larger volume","B. Thoracoscopy (VATS) with pleural biopsy — provides adequate tissue for mesothelioma diagnosis and IHC subtyping","C. CT-guided core needle biopsy of the pleural rind","D. Serum mesothelin (SMRP) level alone is diagnostic"],"answer":"B","exp":"Mesothelioma diagnosis requires sufficient tissue for IHC and histological subtyping. Pleural cytology is positive in only ~30% of cases. Options: (1) VATS thoracoscopy — highest yield (>90%), allows visual inspection and multiple biopsies; (2) image-guided pleural biopsy (Abrams needle or core needle) — ~70% yield. Serum SMRP is a biomarker with limited sensitivity/specificity (not diagnostic alone). After diagnosis, port-site seeding risk requires prophylactic radiation at biopsy sites."},
{"sec":"L37","lo":"LO3 — Malignant mesothelioma and pleural tumors","stem":"Solitary fibrous tumor of the pleura (SFTP) differs from malignant mesothelioma in several key ways. Which feature is MOST characteristic of SFTP?","opts":["A. Strong association with asbestos exposure and diffuse pleural thickening","B. Usually a benign, pedunculated pleural mass that is NOT asbestos-related, is resectable with good prognosis, and can cause hypoglycemia (Doege-Potter syndrome) from IGF-2 secretion","C. Requires multimodal treatment with surgery + chemo + radiation","D. Typically presents with bilateral pleural plaques and calcification"],"answer":"B","exp":"Solitary fibrous tumor of the pleura (SFTP): previously called 'benign mesothelioma' (misnomer — can be malignant). Key features distinguishing from MPM: (1) not asbestos-related, (2) pedunculated (movable on scans with position change), (3) usually benign (80%), (4) can secrete IGF-2 → hypoglycemia (Doege-Potter syndrome), (5) surgery is curative for benign lesions. IHC: CD34+, STAT6+, calretinin−, WT-1− (opposite of MPM)."},

// ── L38 · Self-Study: Wheezing ─────────────────────────────────────────────
// LO1: HPI, history, and ROS for wheezing
{"sec":"L38","lo":"LO1 — History taking for wheezing","stem":"A 45-year-old industrial painter develops episodic wheezing and dyspnea that occurs exclusively during work weeks and resolves on weekends. Which historical feature is most critical to ask about next to establish occupational asthma?","opts":["A. Family history of asthma — genetic predisposition is the primary factor","B. Serial peak flow monitoring during work days vs. weekends/vacation — a ≥20% diurnal variation or work-related decline confirms occupational asthma","C. History of prior allergic rhinitis — rhinitis predisposes to occupational asthma","D. Smoking history — determines if COPD is more likely"],"answer":"B","exp":"Occupational asthma (OA): key diagnostic feature is work-relatedness. Serial peak expiratory flow (PEF) monitoring: at least 4 readings/day for ≥3 weeks (both work and non-work periods). ≥20% drop in PEF during work periods with recovery on days off supports OA. Specific inhalation challenge (SIC) in a lab is the gold standard but rarely needed clinically. Common causes: isocyanates (painters), flour dust (bakers), latex, trimellitic anhydride."},
{"sec":"L38","lo":"LO1 — History taking for wheezing","stem":"In the history of a child presenting with wheezing, which triad of historical features is MOST supportive of an asthma diagnosis rather than an alternative cause?","opts":["A. Single episode, fever, recent URI contact, and resolution without treatment","B. Recurrent episodic wheeze triggered by URIs + exercise + allergen exposure, nocturnal cough, personal/family history of atopy (eczema, allergic rhinitis)","C. Onset at birth, continuous wheeze not episodic, poor weight gain","D. Sudden onset while eating, unilateral wheeze, witnessed choking episode"],"answer":"B","exp":"Pediatric asthma features: episodic (not continuous), multiple triggers (URIs, exercise, cold air, allergens), nocturnal cough, personal/family history of atopic disease (atopy is the strongest risk factor for asthma). Age-appropriate spirometry should be performed when possible. Onset at birth + continuous wheeze + failure to thrive → CF, structural airway anomaly. Sudden onset + unilateral wheeze → foreign body aspiration (emergency bronchoscopy)."},

// LO2: Physical exam and differential diagnosis for wheezing
{"sec":"L38","lo":"LO2 — Physical exam and differential for wheezing","stem":"On auscultation, a 70-year-old presents with bilateral expiratory wheeze AND inspiratory crackles (rales) at both bases with JVD and peripheral edema. Which diagnosis should be highest on the differential for the wheezing?","opts":["A. Asthma — bilateral wheeze is classic","B. Cardiac asthma — wheezing from pulmonary edema (fluid in the small airways) and bronchospasm from CHF with decompensation","C. COPD exacerbation — rales are not present in pure COPD","D. Anaphylaxis — requires skin findings and rapid progression"],"answer":"B","exp":"'Cardiac asthma' — wheezing from decompensated heart failure — results from interstitial edema compressing small airways and reflex bronchospasm from pulmonary congestion. Key: JVD, S3, crackles, orthopnea, peripheral edema, ↑BNP. Treatment targets the CHF (diuresis, nitrates), not bronchodilators as primary therapy. Rales are NOT typical in COPD/asthma — their presence suggests CHF, infection, or ILD."},
{"sec":"L38","lo":"LO2 — Physical exam and differential for wheezing","stem":"A 2-year-old is brought to the ED with sudden-onset wheezing and respiratory distress. The wheeze is audible only on the LEFT side. The parent reports the child was eating peanuts. What is the most likely diagnosis and immediate next step?","opts":["A. Asthma exacerbation — give albuterol nebulizer","B. Foreign body aspiration — rigid bronchoscopy for immediate retrieval (unilateral wheeze after choking episode = foreign body until proven otherwise)","C. Viral bronchiolitis — supportive care with humidified oxygen","D. Vascular ring — urgent CT angiography"],"answer":"B","exp":"Unilateral wheeze + choking episode in a toddler = foreign body aspiration until proven otherwise. Right bronchus is more commonly affected (straighter, wider angle), but left is possible. Unilateral hyperinflation may be seen on expiratory CXR (ball-valve mechanism: air enters but cannot exit around the foreign body). Rigid bronchoscopy under general anesthesia is required for foreign body retrieval — flexible bronchoscopy is NOT adequate for most FBA cases."},

// LO3: Tests to distinguish differentials and reach diagnosis for wheezing
{"sec":"L38","lo":"LO3 — Diagnostic tests for wheezing","stem":"A 30-year-old athlete has exertional wheezing and dyspnea. Baseline spirometry shows FEV1/FVC 0.80 (normal). Methacholine challenge is performed and the PC20 is 4 mg/mL. What does this result indicate?","opts":["A. Normal airway hyperresponsiveness — PC20 >16 mg/mL is required for a positive test","B. Positive methacholine challenge (PC20 ≤8 mg/mL) — confirms bronchial hyperresponsiveness consistent with asthma","C. Severe COPD — low PC20 indicates fixed airflow obstruction","D. VCD — methacholine challenge is the gold standard for VCD diagnosis"],"answer":"B","exp":"Methacholine PC20 (provocative concentration causing 20% fall in FEV1): <1 mg/mL = high bronchial hyperresponsiveness (severe asthma); 1–4 mg/mL = moderate; 4–16 mg/mL = mild/borderline. PC20 ≤8 mg/mL is considered a positive test. PC20 >16 mg/mL has a high NPV for ruling out asthma. Methacholine challenge is used when spirometry is normal but asthma is suspected. VCD is diagnosed by flow-volume loop during symptoms or laryngoscopy."},
{"sec":"L38","lo":"LO3 — Diagnostic tests for wheezing","stem":"Spirometry in a 55-year-old COPD patient shows post-bronchodilator FEV1/FVC of 0.62 and FEV1 48% predicted. The flow-volume loop shows a scooped-out (concave) appearance of the expiratory limb. What does this pattern indicate?","opts":["A. Variable intrathoracic obstruction — vocal cord dysfunction or tracheal stenosis","B. Fixed airflow obstruction with loss of elastic recoil and premature small airway collapse during forced expiration — consistent with obstructive lung disease (COPD)","C. Restrictive pattern — reduced volumes with normal flow rates","D. Normal variant in older patients"],"answer":"B","exp":"Obstructive spirometry pattern: FEV1/FVC <0.70 (post-BD, per GOLD) + concave (scooped) expiratory limb. The concavity represents disproportionate loss of flow at lower lung volumes from small airway collapse and loss of elastic recoil (air trapping). Fixed airflow obstruction: no significant reversibility (<12% and <200 mL improvement with bronchodilator). Variable extrathoracic obstruction (VCD): flattened inspiratory loop. Fixed obstruction (tracheal stenosis): both limbs flattened."},

// ── L39 · Ear Diseases ──────────────────────────────────────────────────────
// LO1: Middle ear anatomy, physiology, diagnosis, and treatment
{"sec":"L39","lo":"LO1 — Middle ear disease","stem":"A 35-year-old with recurrent acute otitis media undergoes tympanometry. The result shows a Type B (flat) tympanogram. What does this indicate?","opts":["A. Normal middle ear function with mobile tympanic membrane","B. Middle ear effusion (fluid) or perforation — the flat tympanogram indicates no pressure variation and absent TM compliance","C. Eustachian tube dysfunction without effusion","D. Sensorineural hearing loss from cochlear damage"],"answer":"B","exp":"Tympanometry measures TM compliance vs. ear canal pressure. Type A (peak at 0 daPa) = normal. Type B (flat, no peak) = middle ear effusion OR TM perforation (large canal volume distinguishes perforation from effusion). Type C (peak at negative pressure) = Eustachian tube dysfunction. Absent or reduced stapedial reflex on tympanometry supports ossicular chain abnormality (otosclerosis) or CN VII pathology."},
{"sec":"L39","lo":"LO1 — Middle ear disease","stem":"Otosclerosis causes conductive hearing loss by which mechanism, and what is the definitive treatment?","opts":["A. Bacterial infection causing TM perforation — treated with topical antibiotics","B. Abnormal bone remodeling causing ankylosis (fixation) of the stapes footplate in the oval window, preventing sound transmission — treated with stapedectomy/stapedotomy","C. Cholesteatoma eroding the ossicles — treated with mastoidectomy","D. Eustachian tube dysfunction causing negative middle ear pressure — treated with pressure equalization tubes"],"answer":"B","exp":"Otosclerosis: autosomal dominant (incomplete penetrance), abnormal endochondral bone remodeling in the otic capsule → stapes footplate fixation at the oval window → conductive hearing loss. Clinical: progressive CHL, positive Schwartze sign (flamingo pink blush through TM from active otospongiosis), Carhart notch on audiogram (dip at 2000 Hz), absent stapedial reflexes. Stapedotomy (creating a small hole in fixed footplate + prosthesis) is the surgical treatment."},

// LO2: External ear anatomy, physiology, diagnosis, and treatment
{"sec":"L39","lo":"LO2 — External ear disease","stem":"A 25-year-old competitive swimmer develops painful right ear canal with erythema, edema, and purulent discharge. Pulling the tragus causes intense pain. What is the diagnosis, causative organism, and first-line treatment?","opts":["A. Acute otitis media — oral amoxicillin","B. Acute otitis externa (swimmer's ear) — primarily Pseudomonas aeruginosa (±Staphylococcus aureus) — treated with topical ciprofloxacin/dexamethasone or acetic acid otic drops","C. Herpes zoster oticus — oral acyclovir","D. Malignant otitis externa — IV antipseudomonal antibiotics"],"answer":"B","exp":"Acute otitis externa (AOE): moisture (swimming, humid environment) disrupts cerumen barrier → alkalinizes canal pH → Pseudomonas aeruginosa (most common) and S. aureus proliferate. Classic sign: tragus/pinna pull pain (inflammatory EAC). Treatment: topical ciprofloxacin ± hydrocortisone or acetic acid drops ×7–10 days. Clean canal of debris. Avoid water. Ear canal wick if severe canal edema. NOT oral antibiotics (unless immunocompromised or spreading cellulitis)."},
{"sec":"L39","lo":"LO2 — External ear disease","stem":"Which test is used to differentiate conductive hearing loss (external/middle ear) from sensorineural hearing loss (inner ear/CN VIII) using a 512 Hz tuning fork?","opts":["A. Rinne test only — compares air conduction vs. bone conduction in each ear","B. Weber and Rinne tests together: Weber (vertex) lateralizes to affected ear in CHL and to better ear in SNHL; Rinne (mastoid vs. air): BC>AC in CHL, AC>BC in normal/SNHL","C. Whispered voice test — quantifies hearing threshold in dB","D. Tympanometry — distinguishes middle ear pathology from inner ear disease"],"answer":"B","exp":"Weber test: tuning fork on vertex — lateralizes to WORSE ear in CHL (bone conduction is augmented by middle ear pathology), to BETTER ear in SNHL (better cochlear function). Rinne test: compare air conduction (AC, in front of ear) vs. bone conduction (BC, on mastoid): AC>BC = normal or SNHL. BC>AC = conductive hearing loss (Rinne negative). Together: CHL ear has BC>AC (Rinne negative) AND Weber lateralizes to that ear. SNHL: Rinne positive (AC>BC) AND Weber lateralizes away."},

// ── L40-41 · Clinical Evaluation of Pulmonary Nodules & Neoplastic Lung Disease ─
// LO1: Pulmonary nodules — definition, manifestations, evaluation, management
{"sec":"L40-41","lo":"LO1 — Pulmonary nodule evaluation and management","stem":"A 58-year-old female non-smoker has a 7 mm ground-glass opacity (GGO) found on CT. No prior imaging is available. According to Fleischner Society guidelines for subsolid nodules, what is the recommended management?","opts":["A. No follow-up needed — GGOs <8 mm require no surveillance","B. CT follow-up at 6 months to confirm persistence; if persistent, annual CT for at least 5 years (GGOs have slow doubling times and are often preinvasive adenocarcinoma spectrum lesions)","C. Immediate PET-CT — GGOs are always metabolically active","D. CT-guided biopsy now — any GGO could be invasive adenocarcinoma"],"answer":"B","exp":"Pure GGOs (subsolid nodules): slow-growing (doubling time months–years), often represent atypical adenomatous hyperplasia (AAH) or adenocarcinoma in situ (AIS). Fleischner subsolid guidelines: ≤6 mm GGO = no routine follow-up (low risk). >6 mm GGO = CT at 6–12 months to confirm persistence, then annual CT ×5 years. Growth or development of solid component warrants more aggressive workup (CT/PET/biopsy). PET is unreliable for pure GGOs (low FDG uptake)."},
{"sec":"L40-41","lo":"LO1 — Pulmonary nodule evaluation and management","stem":"A 65-year-old ex-smoker with a 15 mm solid spiculated nodule undergoes CT-guided percutaneous biopsy. Pathology shows 'atypical cells, cannot exclude malignancy.' What is the appropriate next step?","opts":["A. Repeat CT in 12 months — indeterminate biopsy requires watchful waiting","B. Surgical resection (VATS) — a non-diagnostic or indeterminate biopsy of a high-risk nodule requires surgical resection for definitive diagnosis and treatment","C. PET-CT to determine if the nodule is metabolically active before any further intervention","D. Radiation therapy empirically for presumed malignancy"],"answer":"B","exp":"For a high-risk nodule (large, spiculated, smoking history, indeterminate biopsy), surgical resection (VATS wedge resection or lobectomy) is the appropriate next step — it provides definitive diagnosis AND curative treatment if malignant. An indeterminate biopsy does not lower the pre-test probability enough to justify surveillance. The principle: if clinical suspicion is high, proceed to surgery regardless of an equivocal biopsy result."},

// LO2: Epidemiology, etiology, histology, and systemic manifestations of lung cancer
{"sec":"L40-41","lo":"LO2 — Lung cancer epidemiology, etiology, histology","stem":"Adenocarcinoma is now the most common histological subtype of lung cancer. Which feature distinguishes it from squamous cell carcinoma on histology?","opts":["A. Oat cell morphology with high nuclear:cytoplasmic ratio and crush artifact","B. Acinar, papillary, or lepidic growth pattern with mucin production, TTF-1 and Napsin A positivity — arising from peripheral alveolar type II pneumocytes/Clara cells","C. Keratin pearls, intercellular bridges, and p40/p63 positivity — arising from central bronchial squamous epithelium","D. Large cells with abundant cytoplasm, necrosis, and exclusion of all other subtypes"],"answer":"B","exp":"Adenocarcinoma IHC: TTF-1+ (~75%), Napsin A+ — both are highly specific markers of pulmonary/thyroid epithelial origin. Growth patterns: lepidic (formerly BAC), acinar, papillary, micropapillary, solid. Arises peripherally. Squamous cell: p40/p63+ (squamoid markers), p-cadherin+, centrally located, keratinization, intercellular bridges. TTF-1−. SCLC: synaptophysin+, chromogranin+, CD56+, oat cell morphology."},
{"sec":"L40-41","lo":"LO2 — Lung cancer epidemiology, etiology, histology","stem":"Hypertrophic pulmonary osteoarthropathy (HPOA) is a paraneoplastic syndrome most commonly associated with which lung cancer subtype?","opts":["A. Small cell carcinoma — associated with SIADH and Lambert-Eaton","B. Adenocarcinoma — most commonly associated with HPOA and digital clubbing","C. Squamous cell carcinoma — most commonly associated with PTHrP-hypercalcemia and HPOA","D. Carcinoid tumor — associated with carcinoid syndrome"],"answer":"B","exp":"HPOA (periostitis of long bones, arthralgia, clubbing) is most strongly associated with non-small cell lung cancer, particularly adenocarcinoma and less often squamous cell carcinoma. Mechanism: VEGF and PGE2 stimulate periosteal new bone formation. On bone scan: linear uptake along diaphyses ('tram-track'). SCC is most associated with PTHrP-hypercalcemia. SCLC: SIADH, Cushing, Lambert-Eaton."},

// LO3: Clinical evaluation, staging, and treatment of lung cancer
{"sec":"L40-41","lo":"LO3 — Lung cancer staging and treatment","stem":"Endobronchial ultrasound (EBUS)-guided transbronchial needle aspiration (TBNA) is used to sample mediastinal lymph nodes. Which node stations are most accessible by EBUS-TBNA?","opts":["A. Aortopulmonary window (station 5) and subaortic (station 6) nodes — left-sided nodes","B. Paratracheal (stations 2R, 2L, 4R, 4L), subcarinal (station 7), and hilar (stations 10, 11) nodes — mediastinal nodes adjacent to the airway","C. Posterior mediastinal nodes (stations 8, 9) — accessible with standard EBUS","D. Anterior mediastinal nodes (station 3) — accessible via esophageal EUS-FNA"],"answer":"B","exp":"EBUS-TBNA (radial and linear probes at the bronchoscope tip): best accesses lymph nodes adjacent to central airways — paratracheal (2R, 2L, 4R, 4L), subcarinal (7), hilar (10, 11). Aortopulmonary window (5, 6) nodes and posterior mediastinal nodes (8, 9) are best accessed by EUS-FNA via the esophagus. Combined EBUS+EUS (combined endoscopic staging) can access nearly all mediastinal stations non-surgically, with sensitivity ~89% and NPV ~93% for N2/N3 staging."},
{"sec":"L40-41","lo":"LO3 — Lung cancer staging and treatment","stem":"A patient with stage IIIA NSCLC (T2N2M0 — ipsilateral mediastinal nodes) is deemed unresectable after multidisciplinary review. What is the standard of care?","opts":["A. Chemotherapy alone (carboplatin + paclitaxel)","B. Concurrent platinum-based chemoradiation (cCRT) followed by consolidation durvalumab (anti-PD-L1) for 12 months (PACIFIC trial)","C. Surgery alone — radiation is ineffective for N2 disease","D. Palliative care only — stage III is incurable"],"answer":"B","exp":"Unresectable stage III NSCLC (N2–N3): standard of care is concurrent chemoradiation (cisplatin/carboplatin + etoposide or weekly paclitaxel/carboplatin + 60 Gy). PACIFIC trial: consolidation durvalumab (anti-PD-L1) ×12 months after cCRT significantly improved PFS (17 vs. 5.6 months) and OS — now standard of care regardless of PD-L1 expression. Durvalumab is held if grade ≥2 pneumonitis from radiation."},

// ── L42 · Cough ────────────────────────────────────────────────────────────
// LO1: HPI/ROS, physical exam, and differential for cough
{"sec":"L42","lo":"LO1 — History, exam, and differential for cough","stem":"A 35-year-old woman presents with a 10-week history of dry cough. She is a non-smoker, CXR is normal, spirometry is normal, and she is not on any medications. She reports frequent throat-clearing and sensation of post-nasal drip. What is the MOST likely diagnosis?","opts":["A. ACE inhibitor cough — should be the first consideration in all patients","B. Upper airway cough syndrome (UACS) from post-nasal drip — the most common cause of chronic cough in non-smokers","C. Gastroesophageal reflux disease (GERD)","D. Non-asthmatic eosinophilic bronchitis (NAEB)"],"answer":"B","exp":"Chronic cough (>8 weeks) evaluation: first exclude ACE-I use and abnormal CXR/spirometry. In this case: non-smoker, normal CXR, normal spirometry, no medications. UACS/post-nasal drip syndrome is the #1 cause. Symptoms: throat-clearing, post-nasal drip sensation, cobblestoning of posterior pharynx. Initial treatment trial: intranasal corticosteroid + first-generation antihistamine/decongestant (cetirizine-D). Response to treatment supports diagnosis."},
{"sec":"L42","lo":"LO1 — History, exam, and differential for cough","stem":"A 55-year-old smoker (40 pack-years) presents with cough productive of blood-streaked sputum for 3 weeks, 10 lb unintentional weight loss, and right-sided chest pain. CXR shows a right hilar mass. What is the most critical next step?","opts":["A. Empiric antibiotics for presumed pneumonia and repeat CXR in 4 weeks","B. Urgent CT chest and bronchoscopy with biopsy — red flag symptoms (hemoptysis + weight loss + smoking history + hilar mass) mandate immediate workup for lung malignancy","C. Methacholine challenge to evaluate for asthma","D. Initiate GERD treatment empirically"],"answer":"B","exp":"Red flags for serious pathology in cough: hemoptysis (especially blood-streaked), weight loss, smoking history (especially >40 py), age >45, new cough >3 weeks, associated dyspnea, voice change, or a radiographic abnormality. These mandate immediate workup for malignancy. CT + bronchoscopy with BAL/biopsy is appropriate. Delays in lung cancer diagnosis are a major quality of care issue — do NOT empirically treat and reassure with red flag symptoms present."},

// LO2: Diagnostic tests and final diagnosis/treatment for cough
{"sec":"L42","lo":"LO2 — Diagnostic tests and treatment for cough","stem":"A patient with chronic cough has negative methacholine challenge, has already tried a 4-week course of intranasal steroids without improvement, and denies heartburn. However, 24-hour ambulatory pH-impedance monitoring shows multiple non-acid reflux episodes correlating with cough. What diagnosis does this suggest and what is the treatment?","opts":["A. Asthma — add ICS therapy","B. Non-acid (weakly acid or alkaline) GERD-related cough — treatment includes PPI + H2 blocker combination, alginate-containing antacids, dietary modification, and prokinetics","C. VCD — speech therapy","D. NAEB — inhaled corticosteroids"],"answer":"B","exp":"GERD cough can be caused by non-acid (weakly acid pH 4–7 or alkaline >7) reflux — this form is NOT detected by traditional pH monitoring alone (requires combined pH-impedance monitoring). PPI therapy alone is insufficient for non-acid reflux. Treatment: PPI + H2 blocker (famotidine) at bedtime (reduces nocturnal acid and non-acid reflux), alginates (form gel barrier over gastric contents), dietary modification (small meals, avoid late eating, elevate HOB)."},
{"sec":"L42","lo":"LO2 — Diagnostic tests and treatment for cough","stem":"A 60-year-old is diagnosed with non-asthmatic eosinophilic bronchitis (NAEB) as the cause of his chronic cough. How does NAEB differ from asthma, and what is the treatment?","opts":["A. NAEB has airflow obstruction on spirometry; asthma does not","B. NAEB: eosinophilic airway inflammation with cough but WITHOUT airflow obstruction (normal spirometry, negative methacholine challenge, normal PEFR variability) — treated with inhaled corticosteroids (ICS)","C. NAEB is caused by bacterial infection and treated with antibiotics","D. NAEB and asthma are identical — both require ICS + LABA"],"answer":"B","exp":"NAEB: sputum eosinophilia (>3% of non-squamous cells) but NO bronchial hyperresponsiveness, no variable airflow obstruction (normal spirometry + negative methacholine). Mechanism: eosinophilic inflammation sensitizes cough receptors (TRPV1, TRPA1) without causing bronchoconstriction. Treatment: ICS (budesonide inhaler) for 6–12 weeks — highly effective (>80% cough resolution). Unlike asthma, NAEB rarely progresses to asthma; recurrence is common off ICS."},

// ── L43 · Antihistamines ───────────────────────────────────────────────────
// LO1: Histamine synthesis, storage, release, and metabolism
{"sec":"L43","lo":"LO1 — Histamine synthesis, storage, release, metabolism","stem":"Which enzyme converts the amino acid histidine to histamine, and in which cells is histamine stored in the highest concentrations?","opts":["A. Histidine hydroxylase; stored in neurons of the tuberomammillary nucleus","B. Histidine decarboxylase (HDC); stored in mast cells and basophils (in electron-dense granules with heparin), and ECL cells of the gastric mucosa","C. Monoamine oxidase (MAO); stored in platelets","D. Aromatic L-amino acid decarboxylase; stored in enterochromaffin cells of the gut"],"answer":"B","exp":"Histamine biosynthesis: histidine → histamine via histidine decarboxylase (PLP-dependent). Primary storage: mast cells (in granules complexed with heparin and chondroitin sulfate) and basophils in tissues; ECL cells in gastric mucosa; tuberomammillary nucleus neurons in the hypothalamus (histaminergic neurons). Metabolism: (1) MAO → imidazole acetaldehyde → imidazole acetic acid; (2) histamine N-methyltransferase (HNMT) → N-methylhistamine (excreted in urine — used to measure histamine release)."},
{"sec":"L43","lo":"LO1 — Histamine synthesis, storage, release, metabolism","stem":"A patient is given IV morphine during surgery and develops flushing, hypotension, and urticaria without anaphylaxis features (no bronchospasm, no laryngeal edema). Which mechanism explains this reaction?","opts":["A. IgE-mediated type I hypersensitivity to morphine","B. Non-immunological mast cell degranulation — morphine (and codeine) directly triggers mast cell histamine release via Mas-related G protein-coupled receptor X2 (MRGPRX2) without IgE","C. Complement activation causing C3a and C5a release","D. Histamine release from platelets during blood pressure changes"],"answer":"B","exp":"Morphine, codeine, vancomycin ('red man syndrome'), radiocontrast, and certain muscle relaxants (atracurium) cause direct (non-IgE) mast cell degranulation via MRGPRX2. This causes histamine release → flushing, urticaria, hypotension — but NOT bronchospasm/laryngeal edema (no anaphylaxis). Treatment: slow the infusion, diphenhydramine. No IgE testing needed — this is pharmacological, not allergic. Avoid morphine in future by using fentanyl or hydromorphone."},

// LO2: Histamine receptors and signaling
{"sec":"L43","lo":"LO2 — Histamine receptor subtypes and signaling","stem":"A histamine H2 receptor blocker (famotidine) is given to a patient with a peptic ulcer. Which cell type and signaling pathway is being blocked?","opts":["A. Mast cells, Gq/PLC/IP3 → ↑Ca2+ → bronchoconstriction","B. Gastric parietal cells, Gs/adenylyl cyclase → ↑cAMP → protein kinase A → H+/K+ ATPase (proton pump) activation → gastric acid secretion","C. Histaminergic neurons in the tuberomammillary nucleus, Gi → ↓cAMP → reduced wakefulness","D. Immune cells, Gi → ↓cAMP → reduced chemotaxis"],"answer":"B","exp":"H2 receptors on gastric parietal cells are coupled to Gs → adenylyl cyclase → ↑cAMP → PKA activation → activates H+/K+-ATPase (proton pump) → secretion of H+ into the gastric lumen. H2 blockers reduce gastric acid by blocking this pathway. Note: parietal cells also have H2 receptors for gastrin (CCK-B) and ACh (M3) — all converging on acid secretion. PPIs (omeprazole, pantoprazole) directly block the H+/K+-ATPase."},
{"sec":"L43","lo":"LO2 — Histamine receptor subtypes and signaling","stem":"H3 receptors are presynaptic autoreceptors in the central nervous system. What is the clinical significance of blocking H3 receptors?","opts":["A. H3 blockade would reduce gastric acid secretion — rationale for H3 antagonists in GERD","B. H3 blockade would increase histamine and other neurotransmitter release in the CNS → increased wakefulness and cognitive arousal (pitolisant, an H3 inverse agonist, is approved for narcolepsy)","C. H3 blockade causes bronchoconstriction — H3 receptors on airway smooth muscle mediate bronchomotor tone","D. H3 receptors are only present in the GI tract and regulate intestinal motility"],"answer":"B","exp":"H3 receptors: presynaptic autoreceptors on histaminergic neurons (and heteroreceptors on other neurons), coupled to Gi → ↓cAMP → ↓release of histamine, DA, ACh, 5-HT, NE. They serve as 'brakes' on neurotransmission. H3 INVERSE AGONISTS (pitolisant): block the constitutive activity of H3 → disinhibit neurotransmitter release → ↑wakefulness/arousal. Pitolisant (Wakix) is FDA-approved for narcolepsy. No abuse potential (non-stimulant mechanism)."},

// LO3: 1st vs 2nd generation H1 blockers
{"sec":"L43","lo":"LO3 — 1st vs 2nd generation H1 blockers","stem":"A 30-year-old flight attendant with seasonal allergic rhinitis needs a daytime antihistamine. Which agent is MOST appropriate, and which is MOST contraindicated for her occupation?","opts":["A. Fexofenadine (Allegra) — most appropriate (minimal CNS penetration, no sedation); diphenhydramine is contraindicated (significant sedation, impairs cognitive performance)","B. Diphenhydramine — most appropriate (fastest onset); cetirizine is contraindicated","C. Loratadine — most appropriate; fexofenadine is contraindicated due to cardiac effects","D. Hydroxyzine — most appropriate for daytime use; chlorpheniramine is sedating"],"answer":"A","exp":"2nd-gen antihistamines (loratadine, cetirizine, fexofenadine) are non-sedating due to limited CNS penetration (P-glycoprotein efflux at BBB). Fexofenadine is the LEAST sedating — it has the lowest CNS penetration among 2nd-gen agents. Cetirizine is slightly more sedating (~10–15% report sedation). Diphenhydramine (1st gen) is highly sedating and is officially contraindicated for aviation personnel and safety-critical occupations. FAA bans diphenhydramine for pilots."},
{"sec":"L43","lo":"LO3 — 1st vs 2nd generation H1 blockers","stem":"A 5-year-old is given diphenhydramine for an allergic reaction. The parents call 2 hours later because the child is hyperactive and inconsolably agitated. What explains this reaction?","opts":["A. Paradoxical CNS stimulation — in young children, antihistamines can cause excitation rather than sedation due to immature BBB pharmacokinetics and differential receptor sensitivity","B. Anaphylaxis — diphenhydramine failed and the allergic reaction is worsening","C. Anticholinergic toxicity manifesting as agitation — identical in adults and children","D. Drug-drug interaction with another antihistamine taken previously"],"answer":"A","exp":"1st-generation antihistamines can cause paradoxical CNS stimulation in children (ages 2–12) — excitability, agitation, hallucinations, sleep disturbances — instead of the expected sedation seen in adults. This is thought to result from differential H1 receptor distribution in developing brains and immature drug metabolism. FDA cautions against use in children <2 years (respiratory depression risk). 2nd-generation agents (loratadine, cetirizine) are preferred in pediatric patients."},

// LO4: H2 receptor blocker uses and interactions
{"sec":"L43","lo":"LO4 — H2 receptor blockers: uses and interactions","stem":"A patient on warfarin, phenytoin, and theophylline for COPD and epilepsy is admitted for a GI bleed. The gastroenterologist wants to add an H2 blocker for stress ulcer prophylaxis. Which H2 blocker should be AVOIDED?","opts":["A. Famotidine — inhibits CYP1A2 significantly","B. Cimetidine — potent inhibitor of multiple CYP450 enzymes (CYP1A2, 2C9, 2D6, 3A4) increasing levels of warfarin, phenytoin, and theophylline","C. Ranitidine — now recalled but was the safest option","D. Nizatidine — has the most CYP450 interactions of all H2 blockers"],"answer":"B","exp":"Cimetidine is a POTENT inhibitor of multiple CYP450 isoforms (CYP1A2, 2C9, 2C19, 2D6, 3A4). This significantly increases plasma levels of: warfarin (↑ bleeding risk), phenytoin (↑ toxicity), theophylline (↑ toxicity — seizures/arrhythmias), metoprolol, lidocaine, tricyclics. Also has antiandrogenic effects (gynecomastia, impotence). Famotidine has minimal CYP interactions and is the preferred H2 blocker when drug interactions are a concern."},
{"sec":"L43","lo":"LO4 — H2 receptor blockers: uses and interactions","stem":"Which clinical scenario provides a rationale for using an H2 blocker at BEDTIME in addition to a PPI taken in the morning?","opts":["A. To cover midday acid secretion missed by once-daily morning PPI","B. Nocturnal acid breakthrough (NAB) — PPIs suppress daytime meal-stimulated acid but parietal cells recover overnight; H2 blocker at bedtime prevents nocturnal acid secretion that may cause nocturnal GERD symptoms or contribute to Barrett's esophagus","C. H2 blockers are more effective than PPIs for daytime acid control","D. H2 blockers are required to prevent PPI tolerance and tachyphylaxis"],"answer":"B","exp":"Nocturnal acid breakthrough (NAB): acid pH <4 for >1 hour at night, occurring in ~70% of GERD patients on twice-daily PPI. Mechanism: parietal cells regenerate H+/K+-ATPase pumps overnight → unmedicated gastric acid secretion. H2 blockers at bedtime suppress this nocturnal acid secretion. However, tolerance to H2 blockers develops rapidly (~2–4 weeks with daily use) — intermittent use or as-needed dosing is preferred to maintain efficacy."},

// ── L44 · Nutrition and Respiratory Conditions ─────────────────────────────
// LO1: Guidelines for respiratory health and malnutrition-disease link
{"sec":"L44","lo":"LO1 — Respiratory health guidelines and malnutrition","stem":"A 62-year-old patient with severe COPD (FEV1 25%) has a BMI of 16.5. He is being considered for pulmonary rehabilitation. What is the nutritional target, and how does malnutrition specifically worsen his pulmonary status?","opts":["A. BMI should be reduced to <18.5; malnutrition improves COPD by reducing O2 demand from excess fat","B. BMI target 21–25; malnutrition causes diaphragm muscle wasting (↓ MIP/MEP), impaired immune function (↑ infection risk), ↓ mucociliary clearance, and ↓ hypoxic ventilatory drive — all worsening COPD outcomes and increasing mortality","C. No nutritional intervention needed if patient can eat orally","D. High-carbohydrate supplementation to maximize caloric density — respiratory quotient is irrelevant"],"answer":"B","exp":"Malnutrition in COPD (prevalence 25–40% in severe disease): BMI <21 is independently associated with ↑ mortality. Mechanisms of harm: (1) Diaphragm atrophy → ↓ MIP/MEP → impaired cough, ↑ aspiration risk; (2) ↓ CD4+ T cells, NK cells → ↑ pneumonia risk; (3) Impaired mucociliary clearance; (4) ↓ ventilatory response to hypoxia/hypercapnia; (5) ↑ protein catabolism during exacerbations. Nutritional support with high-fat/low-carb supplements + branched-chain amino acids improves body composition and exercise tolerance."},
{"sec":"L44","lo":"LO1 — Respiratory health guidelines and malnutrition","stem":"Which micronutrient deficiency has been most strongly associated with increased COPD exacerbation frequency and impaired innate immune function in the airway?","opts":["A. Vitamin C deficiency — impairs collagen synthesis in airway walls","B. Vitamin D deficiency — associated with ↑ respiratory infections, ↑ exacerbations, and impaired innate immunity (antimicrobial peptides cathelicidin/defensins require 1,25-OH vitamin D for expression)","C. Iron deficiency — causes anemia but not direct airway effects","D. Zinc deficiency — primarily impairs wound healing, not airway immunity"],"answer":"B","exp":"Vitamin D deficiency (25-OH-D <20 ng/mL) is common in COPD (~50–60%) and is associated with: ↑ respiratory tract infections, ↑ exacerbation frequency, ↓ FEV1 decline rate, impaired innate immunity (vitamin D receptor activation induces antimicrobial peptides cathelicidin and β-defensin in airway epithelium). Supplementation trials (ViDA, FINDER): significant reduction in exacerbations only in patients with very low baseline levels (<10 ng/mL). Omega-3 fatty acids have emerging anti-inflammatory evidence in COPD."},

// LO2: Asthma/COVID-19 and obesity
{"sec":"L44","lo":"LO2 — Asthma, COVID-19, and obesity","stem":"Obese patients with asthma ('obese asthma phenotype') have worse asthma control than normal-weight asthmatics despite similar degrees of airway inflammation. Which mechanical factor MOST explains this?","opts":["A. Increased bronchial smooth muscle mass from adipose infiltration","B. Reduced functional residual capacity (FRC) from abdominal obesity compressing the diaphragm, causing tidal breathing below the closing volume of small airways → increased airway resistance and dynamic small airway collapse","C. Elevated serum IgE from adipokine-mediated B cell activation","D. Impaired mucociliary clearance from visceral fat-derived inflammatory mediators"],"answer":"B","exp":"Obese asthma: FRC is significantly reduced (BMI inversely correlates with FRC). When FRC falls below closing volume, tidal breathing occurs at lung volumes where small airways intermittently collapse → increased airway resistance, V/Q mismatch, non-eosinophilic airway inflammation. Weight loss improves FRC and asthma control independent of changes in airway eosinophilia. Obese asthma is often non-eosinophilic (Th1/neutrophilic) — responds less to ICS, better to weight loss."},
{"sec":"L44","lo":"LO2 — Asthma, COVID-19, and obesity","stem":"Which COVID-19 complication is specifically worsened by obesity and relates to the respiratory system?","opts":["A. Ageusia and anosmia — more common in obese patients from nasal polyps","B. Prone positioning therapy for severe ARDS is complicated by obesity — obese patients are harder to prone and benefit less from prone positioning due to restricted chest wall and abdominal pressure","C. Lymphopenia is more severe in obese patients","D. Cardiac arrhythmias are the primary respiratory complication in obese COVID patients"],"answer":"B","exp":"Obesity significantly complicates management of COVID-19 ARDS: (1) Proning in severe COVID ARDS is standard care (reduces mortality) but is physically challenging in obese patients and may be less effective due to restricted chest wall compliance and increased abdominal pressure pushing on the diaphragm; (2) Obese patients require higher PEEP settings; (3) Higher FiO2 requirements; (4) Increased risk of obesity hypoventilation syndrome coexisting with COVID ARDS; (5) Difficulty with vascular access and procedures."},

// LO3: Interventions and helpful nutrients for respiratory conditions
{"sec":"L44","lo":"LO3 — Nutritional interventions for respiratory conditions","stem":"A patient with cystic fibrosis (CF) has fat-soluble vitamin deficiencies despite adequate oral intake. Which mechanism causes malabsorption of vitamins A, D, E, and K in CF?","opts":["A. Impaired intestinal absorption from villous atrophy","B. Exocrine pancreatic insufficiency from thick mucus plugging pancreatic ducts → absent lipase and colipase → fat malabsorption → fat-soluble vitamin malabsorption","C. Bile acid deficiency from CF-related liver disease in all patients","D. Increased renal excretion of fat-soluble vitamins from CF nephropathy"],"answer":"B","exp":"CF pathophysiology: CFTR dysfunction in pancreatic ductal cells → thick inspissated secretions → ductal obstruction → exocrine pancreatic insufficiency (EPI) in ~85% of patients → absent digestive enzymes (lipase, amylase, protease) → fat malabsorption (steatorrhea) → malabsorption of fat-soluble vitamins (A, D, E, K). Treatment: pancreatic enzyme replacement therapy (PERT — pancrelipase) with ALL meals/snacks + supplementation with water-miscible fat-soluble vitamins."},
{"sec":"L44","lo":"LO3 — Nutritional interventions for respiratory conditions","stem":"N-acetylcysteine (NAC) is used as a mucolytic agent. What is its mechanism of action in reducing mucus viscosity?","opts":["A. Activates cAMP in airway epithelium → water secretion into the airway lumen","B. Cleaves disulfide bonds between mucin glycoprotein chains → reduces the crosslinking responsible for the viscoelastic properties of mucus → less viscous, easier to clear","C. Activates parasympathetic pathways → increased mucus hydration","D. Inhibits mast cell degranulation → reduces histamine-mediated mucus hypersecretion"],"answer":"B","exp":"NAC (N-acetylcysteine): a thiol-containing compound that cleaves disulfide bonds between mucin polymers (specifically the cross-linked mucin MUC5B) → reduces viscoelasticity of mucus → easier mucociliary clearance. Also serves as a precursor to glutathione (antioxidant). Used in: COPD (mild benefit in exacerbation prevention), CF (aerosol), paracetamol overdose (hepatoprotection by replenishing glutathione). Recombinant human DNase (dornase alfa) degrades extracellular DNA in CF sputum — a separate mucolytic mechanism."},

// ── L45 · Nutrition Support for Critical Illness ───────────────────────────
// LO1: Nutrient requirements during metabolic stress
{"sec":"L45","lo":"LO1 — Nutrient requirements in metabolic stress","stem":"A 65-year-old mechanically ventilated patient with septic shock has a measured REE (resting energy expenditure) of 1,800 kcal/day by indirect calorimetry. What is the appropriate caloric target for this critically ill patient?","opts":["A. 3,600 kcal/day (200% of REE) — patients need double their REE during critical illness","B. 1,800–2,160 kcal/day (100–120% of REE) or 25–30 kcal/kg/day — full feeding without overfeeding; overfeeding worsens hyperglycemia and hypercapnia","C. 900 kcal/day (50% of REE) — permissive underfeeding improves outcomes in all critically ill patients","D. Caloric intake is irrelevant during the first 7 days — focus only on fluids and electrolytes"],"answer":"B","exp":"Critical illness nutrition: target 25–30 kcal/kg/day (or 100–120% REE). OVERFEEDING harms: ↑ glucose → hyperglycemia → ↑ infections, prolonged ventilation; ↑ CO2 production from excess carbs → ↑ VCO2 → ↑ minute ventilation demand → difficulty weaning. UNDERFEEDING (<70% target) also harmful: muscle catabolism, poor wound healing, immune suppression. Early permissive underfeeding (70–80% of target) may be acceptable in the first 72 hours per PERMIT trial."},
{"sec":"L45","lo":"LO1 — Nutrient requirements in metabolic stress","stem":"During the 'ebb phase' (first 24–48 hours) of critical illness, which metabolic change predominates and influences nutritional strategy?","opts":["A. Anabolic state — high-dose protein supplementation is most beneficial","B. Hypometabolism with altered substrate utilization — reduced insulin sensitivity, mandatory glucose oxidation (brain, wound), and potential harm from overfeeding during this phase","C. Normal metabolism — no adjustment to usual caloric targets needed","D. Obligate fat oxidation — carbohydrates should be avoided completely"],"answer":"B","exp":"Ebb phase (0–48 h): immediate post-injury/insult — low CO, impaired microcirculation, cellular shock. Characterized by: ↓ REE, ↓ thermogenesis, ↑ glucose (counter-regulatory hormones), ↓ insulin sensitivity. Aggressive nutritional support during this phase may overwhelm the cell's metabolic capacity. Flow phase (48 h+): hypermetabolism, ↑ REE, protein catabolism, nitrogen loss — this is when full nutritional support is most beneficial and the body can utilize nutrients."},

// LO2: Role of nutrition support as treatment in critical illness
{"sec":"L45","lo":"LO2 — Nutrition support as treatment in critical illness","stem":"A mechanically ventilated patient on continuous propofol infusion for 5 days is receiving adequate protein and calories from the propofol alone (propofol is formulated in a 10% lipid emulsion providing ~1.1 kcal/mL). What is the clinical significance of this?","opts":["A. Propofol lipid emulsion can be counted toward the patient's daily lipid and caloric requirements — total caloric intake from all sources must be accounted for to prevent overfeeding","B. Propofol provides no clinically significant calories","C. Propofol lipid emulsion is protective against ARDS","D. The lipid in propofol is not absorbed enterally so it doesn't count toward nutrition targets"],"answer":"A","exp":"Propofol lipid emulsion delivers 1.1 kcal/mL (10% lipid, soybean oil-based). At high propofol doses (>4 mg/kg/hour), the lipid calories can be substantial (up to 600–800 kcal/day). If not accounted for in the total caloric prescription, this leads to overfeeding. Risks: hypertriglyceridemia, propofol infusion syndrome (high-dose, prolonged use → metabolic acidosis, rhabdomyolysis, renal failure, cardiac failure). Monitor TG levels with prolonged high-dose propofol."},
{"sec":"L45","lo":"LO2 — Nutrition support as treatment in critical illness","stem":"Glutamine was once recommended as a critical illness supplement. Why is routine high-dose IV glutamine supplementation now DISCOURAGED in critically ill patients?","opts":["A. Glutamine increases gut permeability, worsening bacterial translocation","B. Large RCTs (REDOXS, MetaPlus) showed that high-dose IV glutamine in critically ill patients with MOF INCREASED mortality — possibly from glutamate toxicity and impaired organ protection","C. Glutamine is not metabolized by the critically ill liver","D. Glutamine causes refeeding syndrome"],"answer":"B","exp":"Glutamine: once considered conditionally essential in critical illness (gut epithelial fuel, antioxidant precursor). However, REDOXS trial (2013, NEJM): high-dose IV glutamine in critically ill patients with ≥2 organ failures INCREASED 28-day and 6-month mortality. Hypotheses: excess glutamine → excess glutamate → excitotoxicity, impairs HSP70 expression, depletes alpha-ketoglutarate (TCA cycle). Current guidelines (SCCM/ASPEN): do NOT give high-dose IV glutamine to patients with MOF or shock."},

// LO3: Enteral vs parenteral nutrition
{"sec":"L45","lo":"LO3 — Enteral vs parenteral nutrition","stem":"Which of the following conditions represents a true contraindication to enteral nutrition in the ICU?","opts":["A. Recent abdominal surgery within 24 hours — the gut should never be fed post-operatively","B. Hemodynamic instability requiring escalating vasopressor doses (norepinephrine >0.3 mcg/kg/min) due to risk of non-occlusive mesenteric ischemia from gut hypoperfusion with enteral feeds","C. Elevated gastric residual volumes >250 mL — automatically requires switch to PN","D. Prolonged ileus of the small bowel with maintained colon function"],"answer":"B","exp":"True contraindications to EN: high-dose vasopressors (non-occlusive mesenteric ischemia risk), mechanical small bowel obstruction, abdominal compartment syndrome, bowel ischemia. Gastric residual volumes (GRV): NUTRIREA-2 trial showed measuring GRV and holding EN at >250 mL does NOT improve outcomes and reduces caloric delivery — many ICUs have abandoned routine GRV monitoring. Post-op ileus of small bowel: post-pyloric (jejunal) feeds may still be possible."},
{"sec":"L45","lo":"LO3 — Enteral vs parenteral nutrition","stem":"If a critically ill patient cannot tolerate enteral nutrition after 7 days, parenteral nutrition (PN) is initiated. Which complication is specific to central PN and not enteral nutrition?","opts":["A. Hyperglycemia — affects both EN and PN patients equally","B. Central line-associated bloodstream infection (CLABSI) — PN requires a central venous catheter, which is a significant infection risk (PN is a rich growth medium for bacteria and fungi); not applicable to enteral feeding","C. Diarrhea — exclusively a PN complication","D. Aspiration pneumonia — PN delivered into the bloodstream cannot be aspirated"],"answer":"B","exp":"PN-specific complications: (1) CLABSI — PN requires CVC; lipid-containing PN is an excellent medium for bacterial/Candida growth; strict aseptic technique and lipid cycling (12h on/12h off) reduce risk; (2) Hepatic steatosis/cholestasis from soybean lipid and lack of enteral stimulation; (3) Phlebitis if peripheral PN (osmolality >900 mOsm/L requires CVC). Shared: hyperglycemia (more severe with PN), electrolyte disturbances. EN advantage: maintains gut mucosal integrity and microbiome."},

// LO4: Refeeding syndrome — definition and risk factors
{"sec":"L45","lo":"LO4 — Refeeding syndrome","stem":"A patient with anorexia nervosa (BMI 13, 3-month semi-starvation) is admitted for nutritional rehabilitation. Before starting tube feeds, which interventions should be performed to reduce the risk of refeeding syndrome?","opts":["A. Start at full caloric target immediately to minimize malnutrition duration","B. Check and aggressively correct electrolytes (PO4, K+, Mg2+), administer prophylactic IV thiamine (B1) 200–300 mg IV before any glucose-containing feeds, and start calories at 10–20 kcal/kg/day (maximum 1,000 kcal/day initially), increasing by 10% every 1–2 days","C. Start parenteral nutrition immediately — enteral feeding causes refeeding syndrome","D. Administer insulin prophylactically to prevent the carbohydrate-driven electrolyte shifts"],"answer":"B","exp":"Refeeding syndrome prevention (NICE 2006 criteria): High-risk patients (BMI <16, negligible intake >10+ days, or low baseline electrolytes): (1) Pre-feed thiamine IV (prevents Wernicke encephalopathy from pyruvate/lactate metabolism when glucose is restarted); (2) Correct electrolytes before feeding; (3) Start at 5–10 kcal/kg/day (max 1,000 kcal/day) — increase gradually over 4–7 days; (4) Monitor PO4, K+, Mg2+, glucose daily; (5) Supplement oral phosphate prophylactically."},
{"sec":"L45","lo":"LO4 — Refeeding syndrome","stem":"Hypophosphatemia is the hallmark electrolyte disturbance of refeeding syndrome. Which cellular mechanism causes the drop in serum phosphate when carbohydrates are reintroduced?","opts":["A. Increased renal phosphate excretion from PTH release triggered by high insulin levels","B. Insulin secretion triggered by glucose → ↑ cellular glucose uptake → ↑ glycolysis → increased phosphate utilization for ATP synthesis (phosphorylation of glucose to G6P) + intracellular shift of phosphate → serum phosphate falls precipitously in a depleted patient","C. Phosphate binding to ingested calcium in the gut, reducing absorption","D. Increased bone mineralization triggered by insulin-like growth factor"],"answer":"B","exp":"Refeeding hypophosphatemia mechanism: during starvation, total body phosphate is depleted (chronic PO4 losses) but serum PO4 remains near-normal from transcellular redistribution. When carbohydrates are reintroduced: → insulin surge → ↑ cellular glucose uptake → glucose phosphorylation (G6P) requires PO4 → ↑ ATP synthesis (oxidative phosphorylation) requires PO4 → massive intracellular shift of the already-depleted serum PO4 → profound hypophosphatemia → impairs ATP production → cell dysfunction → myopathy, hemolysis, respiratory failure, cardiac arrhythmias."},

// ── L46 · ARDS & Respiratory Failure ──────────────────────────────────────
// LO1: Definition, etiology, evaluation, and treatment of ARF and ARDS
{"sec":"L46","lo":"LO1 — ARF and ARDS definition, evaluation, treatment","stem":"A patient develops ARDS with P/F ratio of 88 (severe ARDS) despite lung-protective ventilation with TV 6 mL/kg, PEEP 14, FiO2 0.8. Prone positioning is initiated. Which physiological mechanism explains why prone positioning improves oxygenation in ARDS?","opts":["A. Prone position directly compresses the heart, reducing dead space ventilation","B. Redistribution of ventilation and perfusion: in ARDS, dorsal lung regions are atelectatic (dependent edema/collapse) and receive blood flow but no ventilation. Proning makes dorsal regions non-dependent → reopening → improved V/Q matching; also reduces ventral lung overdistension","C. Prone position reduces abdominal pressure on the lungs in obese patients only","D. Gravity causes surfactant to redistribute to atelectatic regions"],"answer":"B","exp":"Prone positioning mechanism: supine ARDS → dorsal (dependent) lung: atelectasis + edema + perfusion-dominant → shunt. Ventral lung: aerated + blood flow → overdistension. Proning → dorsal becomes non-dependent → recruitment of atelectatic dorsal lung → ↓ shunt + ↓ overdistension of ventral lung → ↑ PaO2/FiO2 ratio. PROSEVA trial: prone ≥16h/day in severe ARDS (P/F <150) → 28-day mortality 16% vs 32.8% — landmark RCT. Indication: P/F <150 despite adequate PEEP after 12–24h."},
{"sec":"L46","lo":"LO1 — ARF and ARDS definition, evaluation, treatment","stem":"Which intervention does NOT have mortality benefit in ARDS and has been shown to be harmful in large RCTs?","opts":["A. Lung-protective low tidal volume ventilation (ARDSnet protocol)","B. Prone positioning for ≥16 hours/day in severe ARDS (P/F <150)","C. High-dose intravenous corticosteroids (methylprednisolone) given universally to all ARDS patients in the first 24 hours","D. Conservative fluid management strategy after hemodynamic stability"],"answer":"C","exp":"High-dose corticosteroids (methylprednisolone) given routinely/early in ALL ARDS: NO mortality benefit and POSSIBLE harm in some trials (LaSRS trial: late methylprednisolone — increased 60-day mortality if started >14 days). There is a potential role for lower-dose, prolonged corticosteroids in unresolving ARDS (>7 days), but NOT routine early high-dose use. Established mortality-reducing interventions: low TV ventilation (ARDSnet), prone positioning (PROSEVA), conservative fluid strategy (FACTT)."},

// LO2: ARDS vs acute lung injury
{"sec":"L46","lo":"LO2 — ARDS vs ALI differentiation","stem":"The 2012 Berlin Definition made which major change to the classification of acute hypoxemic respiratory failure?","opts":["A. Lowered the P/F ratio threshold for ARDS diagnosis from 300 to 200 mmHg","B. Eliminated the term 'acute lung injury (ALI)' and replaced it with 'mild ARDS' (P/F 201–300), creating a three-tier severity classification (mild/moderate/severe) based on P/F ratio on PEEP ≥5 cmH2O","C. Required a pulmonary artery catheter measurement to exclude cardiogenic edema","D. Required bilateral infiltrates to be confirmed by CT scan, not CXR"],"answer":"B","exp":"Pre-Berlin (1994 AECC definition): ALI = P/F ≤300; ARDS = P/F ≤200. Problems: poor reliability (interobserver variability), 'ALI' label was confusing. Berlin 2012: (1) Eliminated ALI term; (2) Three severity categories: Mild (201–300), Moderate (101–200), Severe (≤100) on PEEP ≥5; (3) Eliminated PAOP requirement (replaced with clinical judgment to exclude CHF); (4) Required onset within 1 week of insult; (5) Bilateral opacities on CXR or CT. Berlin definition has better predictive validity for mortality."},
{"sec":"L46","lo":"LO2 — ARDS vs ALI differentiation","stem":"A patient has bilateral infiltrates, P/F ratio of 240 on PEEP 5, and no clinical evidence of cardiac failure. BNP is 150 pg/mL (normal). Which diagnosis is MOST consistent with the Berlin criteria?","opts":["A. Cardiogenic pulmonary edema — BNP >100 is diagnostic of CHF","B. Mild ARDS (Berlin 2012) — bilateral infiltrates not fully explained by cardiac failure, P/F 201–300 on PEEP ≥5, onset within 1 week","C. Acute lung injury (ALI) — the older AECC classification applies here","D. Transfusion-related acute lung injury (TRALI) — cannot overlap with ARDS"],"answer":"B","exp":"Berlin mild ARDS criteria: (1) Acute onset ≤1 week; (2) Bilateral opacities (CXR or CT); (3) Not fully explained by cardiac failure or fluid overload; (4) PaO2/FiO2 201–300 with PEEP or CPAP ≥5 cmH2O. BNP 150 pg/mL does not diagnose CHF — ARDS and CHF can coexist, but clinical judgment + echo is needed to exclude cardiogenic edema as the sole explanation. TRALI IS a cause of ARDS and IS classified under the Berlin definition."},

// LO3: Sepsis pathogenesis and treatment
{"sec":"L46","lo":"LO3 — Sepsis pathogenesis and treatment","stem":"The Sepsis-3 definition (2016) defines septic shock as sepsis with which additional criteria?","opts":["A. Systemic inflammatory response syndrome (SIRS) with a source of infection","B. Sepsis + vasopressor requirement to maintain MAP ≥65 mmHg despite adequate fluid resuscitation AND serum lactate >2 mmol/L — hospital mortality >40%","C. Sepsis + any degree of organ dysfunction","D. Sepsis + white cell count >12,000 cells/μL"],"answer":"B","exp":"Sepsis-3 (Singer et al, JAMA 2016): Sepsis = life-threatening organ dysfunction caused by dysregulated host response to infection (SOFA ≥2 from baseline). Septic shock = sepsis + circulatory failure AND cellular/metabolic dysfunction: (1) Vasopressor needed for MAP ≥65 despite adequate fluid resuscitation AND (2) Lactate >2 mmol/L (reflecting cellular hypoxia/dysregulated metabolism). SIRS criteria were abandoned — too non-specific. Septic shock mortality ~40%."},
{"sec":"L46","lo":"LO3 — Sepsis pathogenesis and treatment","stem":"Which of the following represents the CORRECT initial fluid resuscitation strategy for septic shock according to current SSC guidelines?","opts":["A. 60 mL/kg crystalloid bolus in the first 30 minutes regardless of hemodynamic response","B. 30 mL/kg IV crystalloid bolus within the first 3 hours, then reassess fluid responsiveness (dynamic measures: pulse pressure variation, PLR, stroke volume variation) to guide further fluids","C. 1 unit of packed RBCs for every 500 mL of crystalloid given","D. Colloids (albumin) as the primary resuscitation fluid — superior to crystalloids"],"answer":"B","exp":"SSC 2021 guidelines: 30 mL/kg IV crystalloid (normal saline or LR) in the first 3 hours. After initial resuscitation: use dynamic measures of fluid responsiveness (not static CVP) to guide further fluids. Vasopressors (norepinephrine first-line) if MAP <65 after initial fluids. Balanced crystalloids (LR) may be preferred over NS (↓ hyperchloremic acidosis in the SMART trial). Albumin (25%): considered if large crystalloid volumes given or hypoalbuminemia. Starches/colloids: NOT recommended."},

// ── L47 · Pulmonary Embolism ───────────────────────────────────────────────
// LO1: PE causes, risk factors, and epidemiology
