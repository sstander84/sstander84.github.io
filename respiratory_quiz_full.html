  "L49":{ bg:"#E6F1FB", border:"#85B7EB", text:"#042C53" },
  "L50":{ bg:"#EAF3DE", border:"#97C459", text:"#173404" },
  "L51":{ bg:"#FCEBEB", border:"#F09595", text:"#501313" },
  "L52":{ bg:"#EEEDFE", border:"#AFA9EC", text:"#3C3489" },
};

const ALL_QUESTIONS = [

// ── L27 · Neuromuscular Syndromes ──────────────────────────────────────────
// LO1: Identify different neuromuscular syndromes affecting respiration
{"sec":"L27","lo":"LO1 — Neuromuscular syndromes affecting respiration","stem":"Which of the following neuromuscular diseases causes respiratory failure primarily through failure of neuromuscular junction (NMJ) transmission rather than motor neuron degeneration?","opts":["A. Amyotrophic lateral sclerosis (ALS)","B. Myasthenia gravis (MG)","C. Duchenne muscular dystrophy","D. Post-polio syndrome"],"answer":"B","exp":"Myasthenia gravis is an autoimmune disorder in which antibodies against postsynaptic acetylcholine receptors (or MuSK) impair NMJ transmission → fatigable weakness. ALS involves UMN/LMN degeneration. Muscular dystrophies are primary myopathies. Post-polio involves anterior horn cell loss."},
{"sec":"L27","lo":"LO1 — Neuromuscular syndromes affecting respiration","stem":"A 40-year-old woman with ptosis and diplopia that worsen throughout the day is found to have fatigable proximal muscle weakness. Which additional finding would MOST support a neuromuscular junction disorder over a primary myopathy?","opts":["A. Symmetric proximal limb weakness","B. Improvement with rest and worsening with repetitive use (fatigability)","C. Elevated serum creatine kinase (CK)","D. EMG showing myopathic motor unit potentials"],"answer":"B","exp":"Fatigability — weakness that worsens with repetitive activity and improves with rest — is pathognomonic of NMJ disorders such as myasthenia gravis and Lambert-Eaton syndrome. Primary myopathies cause fixed weakness, elevated CK, and myopathic EMG changes without fatigability."},

// LO2: Anatomy and pathophysiology of neuromuscular disease syndromes
{"sec":"L27","lo":"LO2 — Anatomy and pathophysiology of NMD","stem":"In Guillain-Barré syndrome (GBS), respiratory failure results from which primary pathophysiological mechanism?","opts":["A. Direct viral invasion of the diaphragm muscle","B. Ascending demyelination of peripheral motor nerves leading to phrenic nerve dysfunction","C. Autoantibody destruction of neuromuscular junction acetylcholine receptors","D. Upper motor neuron degeneration causing spastic paresis of respiratory muscles"],"answer":"B","exp":"GBS involves immune-mediated demyelination of peripheral nerves (AIDP) or axonal variants (AMAN/AMSAN). Ascending involvement reaches the phrenic nerve (C3–C5) and intercostal nerves → diaphragm and accessory muscle paralysis → respiratory failure. This typically occurs in the first 2–4 weeks and is the most feared complication."},
{"sec":"L27","lo":"LO2 — Anatomy and pathophysiology of NMD","stem":"In Duchenne muscular dystrophy, the absence of dystrophin leads to respiratory failure by which mechanism?","opts":["A. Cholinergic crisis at the neuromuscular junction","B. Structural instability of muscle cell membranes leading to progressive myofiber necrosis and replacement with fibrofatty tissue","C. Autoimmune destruction of anterior horn cells in the spinal cord","D. Mitochondrial dysfunction causing impaired oxidative phosphorylation in respiratory muscles"],"answer":"B","exp":"Dystrophin stabilizes the muscle cell membrane (sarcolemma) during contraction. Without it, membrane tears occur with each contraction → Ca2+ influx → myofiber necrosis → fibrofatty replacement. The diaphragm and accessory muscles are progressively replaced, causing the restrictive respiratory failure typical of DMD."},

// LO3: Pulmonary function abnormalities in NMD
{"sec":"L27","lo":"LO3 — PFT abnormalities in NMD","stem":"A patient with ALS has the following PFTs: FVC 58% predicted (supine: 41%), FEV1/FVC 0.85, TLC 62% predicted, MIP -28 cmH2O (normal > -80). Which pattern is present?","opts":["A. Obstructive pattern with air trapping","B. Restrictive pattern with diaphragm weakness (supine FVC drop >25%)","C. Mixed obstructive-restrictive pattern","D. Normal spirometry with isolated reduced diffusion capacity"],"answer":"B","exp":"Neuromuscular diseases cause a restrictive pattern: ↓ FVC, ↓ TLC, normal FEV1/FVC (>0.70). MIP <-60 cmH2O (low) suggests inspiratory muscle weakness. A supine FVC drop >25% from upright is highly specific for diaphragm weakness (diaphragm cannot work against gravity when supine). This is the classic NMD PFT pattern."},
{"sec":"L27","lo":"LO3 — PFT abnormalities in NMD","stem":"Which pulmonary function measurement is the MOST sensitive early indicator of respiratory muscle weakness in a patient with myasthenia gravis?","opts":["A. FEV1/FVC ratio","B. Diffusion capacity (DLCO)","C. Maximal inspiratory pressure (MIP) and maximal expiratory pressure (MEP)","D. Total lung capacity (TLC) by body plethysmography"],"answer":"C","exp":"MIP (maximal inspiratory pressure) and MEP (maximal expiratory pressure) directly measure respiratory muscle strength and decline early in NMD before FVC becomes significantly reduced. MIP <-60 cmH2O or MEP <40 cmH2O warrant closer monitoring and consideration of ventilatory support. DLCO is reduced in parenchymal lung disease, not NMD."},

// LO4: Evaluation of patients with NMD
{"sec":"L27","lo":"LO4 — Evaluation of NMD patients","stem":"A patient with suspected neuromuscular disease involving respiratory muscles should undergo which evaluation to detect early nocturnal hypoventilation before daytime ABG abnormalities develop?","opts":["A. Daytime pulse oximetry alone","B. Overnight polysomnography or overnight oximetry with capnography","C. Exercise arterial blood gas only","D. Peak expiratory flow rate measurement"],"answer":"B","exp":"Nocturnal hypoventilation precedes daytime hypercapnia in NMD. During REM sleep, accessory muscles are atonic and patients rely entirely on the diaphragm — already weakened. Overnight polysomnography or oximetry with end-tidal CO2 monitoring detects REM-related desaturation and hypercapnia before clinical symptoms appear."},
{"sec":"L27","lo":"LO4 — Evaluation of NMD patients","stem":"A patient with known myasthenia gravis presents with worsening dyspnea and the 20/30/40 rule is being applied. Which set of values would prompt intubation?","opts":["A. FVC 55%, MIP -45 cmH2O, MEP 55 cmH2O","B. FVC 18%, MIP -22 cmH2O, MEP 28 cmH2O","C. FVC 40%, MIP -65 cmH2O, MEP 70 cmH2O","D. FVC 30%, MIP -50 cmH2O, MEP 45 cmH2O"],"answer":"B","exp":"The 20-30-40 rule for myasthenic crisis: intubation is indicated when FVC <20 mL/kg (or <20% predicted), MIP > -30 cmH2O (i.e., less negative than -30), or MEP <40 cmH2O. Option B meets all three thresholds simultaneously and represents imminent respiratory failure requiring intubation."},

// LO5: Treatments for NMD
{"sec":"L27","lo":"LO5 — Treatment of NMD","stem":"A patient with myasthenia gravis has an acute exacerbation (myasthenic crisis) requiring ICU admission. Which TWO treatments are most appropriate for rapid improvement?","opts":["A. Pyridostigmine dose escalation and high-dose oral prednisone","B. IV immunoglobulin (IVIG) or plasmapheresis, plus continuation of immunosuppression","C. Riluzole and edaravone","D. Inhaled corticosteroids and long-acting bronchodilators"],"answer":"B","exp":"Myasthenic crisis requires rapid reduction in acetylcholine receptor antibody titers. IVIG (2 g/kg over 2–5 days) and plasmapheresis/plasma exchange both work within days to weeks. Pyridostigmine is actually held during crisis (excess secretions worsen ventilation). Riluzole/edaravone are for ALS. ICS/LABA have no role."},
{"sec":"L27","lo":"LO5 — Treatment of NMD","stem":"A 14-year-old with spinal muscular atrophy (SMA) type 2 develops progressive nocturnal hypoventilation. In addition to non-invasive ventilation, which disease-modifying therapy is now available?","opts":["A. Pyridostigmine to improve neuromuscular transmission","B. Nusinersen (antisense oligonucleotide) or onasemnogene abeparvovec (gene therapy) targeting SMN protein","C. Azathioprine and mycophenolate mofetil for autoimmune suppression","D. High-dose vitamin D supplementation to prevent muscle atrophy"],"answer":"B","exp":"SMA is caused by SMN1 gene mutations → deficient survival motor neuron (SMN) protein. Disease-modifying therapies: nusinersen (intrathecal antisense oligonucleotide that increases SMN protein from the backup SMN2 gene), onasemnogene abeparvovec (AAV9 gene replacement therapy), and risdiplam (oral SMN2 splicing modifier). These are transformative for SMA prognosis."},

// ── L28 · Osteopathic Approach ─────────────────────────────────────────────
// LO1: Sympathetic and parasympathetic effects on the respiratory system
{"sec":"L28","lo":"LO1 — ANS effects on the respiratory system","stem":"A patient with COPD is given a non-selective beta-blocker for hypertension and develops acute bronchospasm. Which mechanism explains this adverse effect?","opts":["A. Beta-1 receptor blockade reduces heart rate, decreasing pulmonary blood flow","B. Beta-2 receptor blockade on airway smooth muscle removes sympathetic bronchodilation, causing bronchoconstriction","C. Alpha-1 receptor stimulation causes airway smooth muscle contraction","D. Blockade of H2 receptors increases mast cell histamine release"],"answer":"B","exp":"Sympathetic nervous system activates β2 receptors on bronchial smooth muscle → bronchodilation. Non-selective β-blockers (propranolol, carvedilol) block β2 receptors in the airways → loss of sympathetic bronchodilatory tone → bronchoconstriction. This is why selective β1-blockers (metoprolol, bisoprolol) are preferred in patients with obstructive lung disease."},
{"sec":"L28","lo":"LO1 — ANS effects on the respiratory system","stem":"A 30-year-old asthmatic uses ipratropium bromide during acute exacerbations. What is the mechanism of action of this drug, and which division of the ANS does it target?","opts":["A. Beta-2 agonism targeting the sympathetic division to cause bronchodilation","B. Muscarinic (M3) receptor antagonism targeting the parasympathetic division to reduce bronchoconstriction and mucus secretion","C. Alpha-1 antagonism targeting sympathetic vasoconstriction in the bronchial mucosa","D. Nicotinic receptor blockade at the autonomic ganglia"],"answer":"B","exp":"Ipratropium bromide is an anticholinergic (muscarinic antagonist). The parasympathetic nervous system (vagus nerve) activates M3 receptors on airway smooth muscle and submucosal glands → bronchoconstriction + ↑ mucus. Ipratropium blocks M3 → bronchodilation + ↓ secretions. It is particularly effective in COPD (more cholinergic tone) than asthma."},

// LO2: Lymphatic system effects on the respiratory system
{"sec":"L28","lo":"LO2 — Lymphatic system and respiratory system","stem":"The thoracic duct drains the majority of the body's lymph into which structure?","opts":["A. Right subclavian vein","B. Left brachiocephalic vein at the junction with the left subclavian vein","C. Superior vena cava directly","D. Left pulmonary vein"],"answer":"B","exp":"The thoracic duct (draining left side of body, lower extremities, and abdominal viscera) drains into the venous system at the junction of the left subclavian and left internal jugular veins (left brachiocephalic/left venous angle). The right lymphatic duct drains the right upper quadrant into the right subclavian vein. Obstruction of the thoracic duct can cause chylothorax."},
{"sec":"L28","lo":"LO2 — Lymphatic system and respiratory system","stem":"An osteopathic physician applies a thoracic lymphatic pump technique to a patient with bilateral pneumonia. The primary goal is to:","opts":["A. Directly increase tidal volume by stretching the costovertebral joints","B. Enhance lymphatic flow to reduce interstitial edema, improve immune cell trafficking, and facilitate removal of inflammatory debris","C. Stimulate the sympathetic chain ganglia to cause bronchodilation","D. Reduce pulmonary vascular resistance by compressing the chest wall"],"answer":"B","exp":"Osteopathic lymphatic techniques (thoracic pump, pedal pump, thoracic inlet release) create pressure gradients that propel lymph through thoracic channels. This enhances clearance of interstitial fluid (reducing edema), improves trafficking of lymphocytes and macrophages to sites of infection, and aids removal of inflammatory debris — all complementary to standard antibiotic therapy."},

// LO3: Physiological response to pulmonary infection
{"sec":"L28","lo":"LO3 — Physiological response to pulmonary infection","stem":"During acute bacterial pneumonia, hypoxemia is primarily caused by which mechanism?","opts":["A. Increased oxygen consumption by inflammatory cells in the bloodstream","B. Ventilation-perfusion (V/Q) mismatch from alveolar filling with exudate, with continued perfusion of non-ventilated alveoli (intrapulmonary shunt)","C. Hyperventilation causing respiratory alkalosis and reduced oxygen delivery","D. Diffuse bronchospasm reducing inspired oxygen delivery to alveoli"],"answer":"B","exp":"Pneumonia → inflammatory exudate fills alveoli → affected alveoli are perfused but not ventilated (V/Q = 0, intrapulmonary shunt). Deoxygenated blood passes through unventilated segments and mixes with oxygenated blood → hypoxemia. This shunt-type hypoxemia does not fully correct with supplemental O2 (unlike V/Q mismatch), explaining why severe pneumonia can cause refractory hypoxemia."},
{"sec":"L28","lo":"LO3 — Physiological response to pulmonary infection","stem":"Which cytokine pattern is most responsible for the systemic inflammatory response (fever, leukocytosis, acute phase proteins) seen in bacterial pneumonia?","opts":["A. IL-4 and IL-13 driving Th2 polarization and IgE class switching","B. IL-1β, IL-6, and TNF-α released from activated macrophages stimulating the hypothalamus and liver","C. IL-10 and TGF-β suppressing inflammatory responses","D. IL-17 and IL-22 promoting neutrophil recruitment to mucosal surfaces only"],"answer":"B","exp":"Pattern recognition receptors (TLRs) on alveolar macrophages recognize bacterial PAMPs → release of IL-1β, IL-6, TNF-α. IL-1β and IL-6 act on the hypothalamus → fever. TNF-α and IL-6 stimulate liver acute phase proteins (CRP, fibrinogen, procalcitonin). IL-6 drives leukocytosis from bone marrow. These are the key mediators of the systemic inflammatory response in pneumonia."},

// LO4: Basic treatment approaches for pulmonary disorders (OMT)
{"sec":"L28","lo":"LO4 — Osteopathic treatment approaches","stem":"A patient with acute COPD exacerbation has significant accessory muscle use and chest wall rigidity. Which osteopathic technique is MOST appropriate and safe during the acute phase?","opts":["A. High-velocity low-amplitude (HVLA) thrust to thoracic spine","B. Rib-raising technique to reduce sympathetic tone and improve chest wall mobility","C. Muscle energy technique targeting the pelvis","D. Counterstrain to the cervical spine"],"answer":"B","exp":"Rib-raising is a gentle technique that addresses paravertebral muscle hypertonicity, reduces sympathetic firing, and improves chest wall compliance — appropriate in acute settings. HVLA thrusts are generally avoided in acute respiratory distress due to risk and patient intolerance. Rib-raising can complement bronchodilators and reduce work of breathing."},
{"sec":"L28","lo":"LO4 — Osteopathic treatment approaches","stem":"In the osteopathic model, somatic dysfunction at which spinal level would MOST directly affect bronchomotor tone via the sympathetic nervous system?","opts":["A. C1–C2 (upper cervical)","B. T1–T4 (upper thoracic)","C. L1–L2 (upper lumbar)","D. S2–S4 (sacral parasympathetic)"],"answer":"B","exp":"The preganglionic sympathetic neurons innervating the lungs and bronchi arise from T1–T4 spinal cord levels and synapse in the upper thoracic sympathetic chain ganglia. Somatic dysfunction at T1–T4 can alter sympathetic tone to the airways, potentially contributing to bronchospasm or altered mucus secretion. Treatment of T1–T4 dysfunction is an osteopathic target in respiratory disease."},

// ── L29-30 · Imaging ───────────────────────────────────────────────────────
// LO1: Normal anatomy on CXR
{"sec":"L29-30","lo":"LO1 — Normal CXR anatomy","stem":"On a normal PA chest radiograph, at which vertebral level does the carina normally bifurcate?","opts":["A. T1–T2","B. T4–T5","C. T7–T8","D. T10–T11"],"answer":"B","exp":"The carina (bifurcation of the trachea into left and right main bronchi) is located at approximately the T4–T5 vertebral level on a standard PA CXR, roughly corresponding to the angle of Louis (sternal angle) anteriorly. Widening of the carina angle (>70°) suggests left atrial enlargement pushing up from below."},
{"sec":"L29-30","lo":"LO1 — Normal CXR anatomy","stem":"On a lateral chest radiograph, the retrosternal space should normally appear lucent (air-filled). Opacification of this space MOST suggests:","opts":["A. Anterior mediastinal mass or substernal thyroid","B. Right lower lobe pneumonia","C. Left pleural effusion","D. Pulmonary arterial hypertension"],"answer":"A","exp":"The retrosternal (anterior mediastinal) space on lateral CXR should be clear (lucent). Opacification indicates an anterior mediastinal mass — remember the 4 T's: Thymoma, Teratoma (germ cell tumor), Thyroid mass, Terrible lymphoma. Pleural effusions opacify the posterior costophrenic angles and lower retrocardiac space, not the anterior space."},

// LO2: Systematic CXR analysis and major abnormalities
{"sec":"L29-30","lo":"LO2 — Systematic CXR analysis","stem":"Using a systematic approach to CXR analysis, a student notices the cardiac silhouette occupies 58% of the thoracic width on a PA radiograph. What does this indicate?","opts":["A. Normal finding — the heart can occupy up to 60% of thoracic width","B. Cardiomegaly — the cardiothoracic ratio should be less than 50% on a PA CXR","C. Technical error — only AP films can be used to measure cardiothoracic ratio","D. Right ventricular enlargement specifically, as the left border determines the ratio"],"answer":"B","exp":"The cardiothoracic ratio (CTR) = widest cardiac diameter / widest thoracic diameter. On a PA (not AP) CXR, CTR >0.50 (50%) indicates cardiomegaly. AP films magnify the cardiac silhouette and should not be used to measure CTR. Common causes of cardiomegaly: dilated cardiomyopathy, pericardial effusion, valvular disease, CHF."},
{"sec":"L29-30","lo":"LO2 — Systematic CXR analysis","stem":"A CXR shows a left-sided opacity with no air bronchograms, the hemidiaphragm is elevated, and the mediastinum is shifted toward the left. What is the most likely diagnosis?","opts":["A. Left-sided pleural effusion","B. Left lower lobe pneumonia with consolidation","C. Complete left lung atelectasis (collapse)","D. Left-sided pneumothorax"],"answer":"C","exp":"Atelectasis (lung collapse): opacity + volume loss (ipsilateral mediastinal shift, elevated hemidiaphragm, crowded ribs). Pleural effusion causes opacity WITH contralateral mediastinal shift (mass effect). Pneumonia: opacity without volume loss, with air bronchograms. Pneumothorax: lucency without lung markings."},

// LO3: Classic radiologic patterns
{"sec":"L29-30","lo":"LO3 — Classic radiologic patterns","stem":"A 45-year-old non-smoker has a CXR showing bilateral hilar enlargement and bilateral upper-lobe reticular opacities. HRCT shows perilymphatic nodules. What is the most likely diagnosis?","opts":["A. Usual interstitial pneumonia (UIP/IPF)","B. Sarcoidosis","C. Hypersensitivity pneumonitis","D. Pulmonary alveolar proteinosis"],"answer":"B","exp":"Sarcoidosis classic CXR: bilateral hilar adenopathy (BHL) ± paratracheal adenopathy ± upper lobe infiltrates. HRCT shows perilymphatic nodules (along bronchovascular bundles, fissures, subpleural regions) — pathognomonic of sarcoid. UIP/IPF: honeycombing + traction bronchiectasis in lower lobes. HP: upper lobe ground-glass ± air trapping."},
{"sec":"L29-30","lo":"LO3 — Classic radiologic patterns","stem":"A 68-year-old with end-stage pulmonary fibrosis has a CXR showing peripheral, basal, and subpleural honeycombing with traction bronchiectasis. This pattern is MOST consistent with:","opts":["A. Sarcoidosis (Stage IV)","B. Usual interstitial pneumonia (UIP) — the pattern of idiopathic pulmonary fibrosis (IPF)","C. Respiratory bronchiolitis-ILD","D. Cryptogenic organizing pneumonia (COP)"],"answer":"B","exp":"UIP (the histologic/radiologic pattern of IPF): bilateral, basal, peripheral/subpleural honeycombing with or without peripheral traction bronchiectasis. This distribution is the hallmark — lower > upper lobes, peripheral > central. HRCT showing UIP pattern in the right clinical context (age >60, progressive dyspnea, no identifiable cause) establishes IPF without biopsy (per ATS/ERS guidelines)."},

// LO4: Available imaging modalities
{"sec":"L29-30","lo":"LO4 — Imaging modalities for the respiratory system","stem":"A 28-year-old pregnant woman at 20 weeks gestation presents with acute onset dyspnea and pleuritic chest pain. D-dimer is elevated. Which imaging modality is PREFERRED for diagnosing pulmonary embolism in pregnancy?","opts":["A. CT pulmonary angiography (CTPA) — always preferred regardless of pregnancy","B. Ventilation-perfusion (V/Q) scintigraphy — lower fetal radiation dose and adequate diagnostic accuracy","C. MRI pulmonary angiography — no radiation, but requires gadolinium","D. Bilateral lower extremity Doppler ultrasound alone is sufficient"],"answer":"B","exp":"In pregnancy, V/Q scan is preferred over CTPA when the CXR is normal, due to lower fetal radiation exposure (V/Q: ~0.1–0.5 mGy vs CTPA: ~0.01–0.66 mGy to fetus). However, CTPA better evaluates the lung parenchyma and delivers more radiation to maternal breast tissue. Either is acceptable; many centers now prefer CTPA for speed/availability. CXR should be done first to guide choice."},
{"sec":"L29-30","lo":"LO4 — Imaging modalities for the respiratory system","stem":"Which imaging modality provides the BEST evaluation of interstitial lung disease (ILD) parenchymal detail and is considered the gold standard for ILD diagnosis?","opts":["A. Standard chest radiograph","B. High-resolution CT (HRCT) of the chest","C. PET-CT scan","D. MRI chest"],"answer":"B","exp":"HRCT uses thin slices (0.5–1.5 mm) and a high-spatial-frequency reconstruction algorithm to visualize fine parenchymal detail: ground-glass opacities, honeycombing, reticulation, traction bronchiectasis, nodules, air trapping. It is indispensable for ILD classification, can establish UIP/IPF pattern without biopsy in appropriate clinical context, and guides biopsy site selection."},

// LO5: Roles of imaging in selected clinical scenarios
{"sec":"L29-30","lo":"LO5 — Appropriate roles of imaging modalities","stem":"A 55-year-old smoker has an incidentally found 9 mm pulmonary nodule on chest CT. He has no prior imaging for comparison. PET-CT is performed and shows an SUV of 0.8. What does this finding suggest?","opts":["A. Highly metabolically active — strongly malignant, immediate surgery indicated","B. Low metabolic activity — favors a benign etiology; however, CT follow-up is still warranted given size and risk","C. Indeterminate — requires V/Q scan to further characterize","D. Confirms granuloma — no further follow-up needed"],"answer":"B","exp":"PET-CT SUV <2.5 suggests low metabolic activity, favoring a benign lesion (granuloma, hamartoma). However, a 9 mm nodule in a smoker is not negligible. Fleischner guidelines for solid nodules >8 mm in high-risk patients: CT surveillance at 3 months, PET-CT, or biopsy depending on overall clinical assessment. A single SUV <2.5 does not definitively exclude malignancy."},
{"sec":"L29-30","lo":"LO5 — Appropriate roles of imaging modalities","stem":"A 70-year-old man with newly diagnosed NSCLC needs staging. Which imaging sequence is most appropriate?","opts":["A. CXR alone, then surgery if no mediastinal widening","B. CT chest with contrast, followed by PET-CT for systemic staging, and brain MRI if adenocarcinoma or stage III+","C. CXR + V/Q scan to assess lung function before surgery","D. MRI chest first, then CXR to assess treatment response"],"answer":"B","exp":"NSCLC staging sequence: (1) CT chest/abdomen/pelvis with contrast — evaluate primary tumor, mediastinal LN, hepatic/adrenal mets. (2) PET-CT — whole-body metabolic staging, detects occult mets. (3) Brain MRI — adenocarcinoma and stage III+ have significant brain met rates (~20–40%); brain CT is less sensitive. EBUS/mediastinoscopy for pathologic N2/N3 staging before surgery."},

// LO6: Silhouette sign
{"sec":"L29-30","lo":"LO6 — Silhouette sign","stem":"A CXR shows loss of the left heart border. Without any other information, which lobe/segment is MOST likely consolidated?","opts":["A. Right middle lobe","B. Left upper lobe lingula (lingular segment)","C. Left lower lobe","D. Right lower lobe"],"answer":"B","exp":"The left heart border is formed by the left ventricle and the lingula of the left upper lobe. Loss of the left heart border = lingular consolidation (silhouette sign). Loss of right heart border = RML consolidation. Loss of right hemidiaphragm = right lower lobe. Loss of left hemidiaphragm = left lower lobe. Silhouette sign: two adjacent structures of the same radiodensity lose their shared interface."},
{"sec":"L29-30","lo":"LO6 — Silhouette sign","stem":"A CXR shows an opacity in the right lower chest. The right hemidiaphragm is NOT visible, but the right heart border IS visible. Where is the pathology located?","opts":["A. Right middle lobe","B. Right lower lobe — posterior/inferior segment","C. Right upper lobe","D. Anterior mediastinum"],"answer":"B","exp":"The right hemidiaphragm is bordered by the right lower lobe. Loss of the right hemidiaphragm silhouette = right lower lobe consolidation/atelectasis. Preservation of the right heart border confirms the right middle lobe is clear (RML borders the right heart). This localization technique avoids the need for a lateral view in some cases."},

// LO7: Radiographic manifestations of pulmonary edema
{"sec":"L29-30","lo":"LO7 — Pulmonary edema on imaging","stem":"Which CXR finding represents the EARLIEST radiographic change in pulmonary edema due to elevated hydrostatic pressure?","opts":["A. Bilateral perihilar 'bat-wing' consolidation","B. Upper lobe vascular diversion (cephalization)","C. Kerley B lines at the lung bases","D. Air bronchograms within areas of consolidation"],"answer":"B","exp":"Sequential CXR changes in hydrostatic pulmonary edema: (1) Upper lobe vascular diversion (cephalization) — earliest sign, from redistribution of blood flow. (2) Peribronchial cuffing and interstitial opacification. (3) Kerley B lines (interlobular septal thickening). (4) Pleural effusions. (5) Alveolar edema ('bat-wing' perihilar opacification) — latest, most severe. Air bronchograms are seen in both edema and pneumonia."},
{"sec":"L29-30","lo":"LO7 — Pulmonary edema on imaging","stem":"What is the pathological basis of Kerley B lines seen on CXR in pulmonary edema?","opts":["A. Mucus plugging of small bronchioles causing 1 cm opacities","B. Thickening of interlobular septa by fluid accumulation, seen as 1–2 cm horizontal lines at the lung bases perpendicular to the pleural surface","C. Vascular engorgement of pulmonary capillaries along fissure lines","D. Subpleural air trapped after alveolar rupture"],"answer":"B","exp":"Kerley B lines: 1–2 cm horizontal lines at the lung bases, perpendicular to and touching the pleural surface, representing thickened interlobular septa from fluid or cellular infiltration. Seen in: pulmonary edema (CHF), lymphangitic carcinomatosis, and occasionally lymphoma. They are NOT bronchocentric (vs. peribronchial cuffing) and do NOT branch."},

// LO8: Imaging for PE and DVT
{"sec":"L29-30","lo":"LO8 — Imaging for PE and DVT","stem":"A 60-year-old presents with sudden dyspnea and hemoptysis 5 days after knee replacement surgery. CXR shows a small wedge-shaped peripheral opacity at the left base. What is this finding called, and what does it represent?","opts":["A. Westermark sign — oligemia from vascular obstruction","B. Hampton's hump — a peripheral wedge-shaped infarct from pulmonary embolism with infarction","C. Fleischner sign — dilation of a central pulmonary artery","D. Palla sign — right ventricular enlargement on CXR"],"answer":"B","exp":"Hampton's hump: a peripheral, pleural-based, wedge-shaped opacity (base toward the pleura) representing pulmonary infarction from PE. It appears 12–24 hours after PE. Westermark sign: focal oligemia (decreased vascularity) distal to an obstructed artery — also seen in PE. Fleischner sign: enlargement of a central pulmonary artery. All three are classic but uncommon CXR findings in PE."},
{"sec":"L29-30","lo":"LO8 — Imaging for PE and DVT","stem":"Compression ultrasound of the lower extremity veins is positive (non-compressible right femoral vein) in a patient with suspected PE. The patient has a normal eGFR and no contrast allergy. What is the most appropriate next step?","opts":["A. No further imaging needed — DVT confirms PE and anticoagulation should be started","B. CTPA should still be performed to confirm PE and assess clot burden before deciding on anticoagulation vs. thrombolysis","C. V/Q scan because the patient is too high-risk for CT contrast","D. MRI pulmonary angiography as the next step"],"answer":"B","exp":"A positive compression ultrasound (DVT confirmed) does support the diagnosis of VTE and anticoagulation should be started. However, CTPA is still recommended when feasible to: (1) confirm PE definitively, (2) assess RV strain and clot burden (central vs. segmental), and (3) guide decisions about thrombolysis vs. anticoagulation alone. In massive PE with hemodynamic instability, treatment before CTPA is appropriate."},

// LO9: Solitary pulmonary nodule
{"sec":"L29-30","lo":"LO9 — Solitary pulmonary nodule","stem":"A 50-year-old non-smoker has a 7 mm solid pulmonary nodule found on CT. It has smooth margins, a lower lobe location, and contains a central 'popcorn' calcification. What is the most likely diagnosis?","opts":["A. Primary lung adenocarcinoma","B. Pulmonary hamartoma","C. Calcified granuloma from prior histoplasmosis","D. Pulmonary carcinoid tumor"],"answer":"B","exp":"Popcorn calcification (chondroid calcification) is pathognomonic of pulmonary hamartoma — a benign tumor of disorganized normal lung elements (cartilage, fat, fibrous tissue, smooth muscle). Other benign calcification patterns: central (target) or laminar = granuloma (TB/histoplasma); diffuse = granuloma; eccentric = higher malignancy risk. Benign patterns with stable size = no follow-up needed."},
{"sec":"L29-30","lo":"LO9 — Solitary pulmonary nodule","stem":"According to Fleischner Society guidelines, which finding in a solid pulmonary nodule has the HIGHEST risk of malignancy and warrants the most aggressive workup?","opts":["A. 5 mm smooth-margined nodule in a non-smoker","B. 12 mm spiculated nodule in a 65-year-old smoker with upper lobe location","C. 8 mm nodule with central calcification in a 40-year-old","D. 6 mm ground-glass nodule stable on two CTs 2 years apart"],"answer":"B","exp":"High-risk features for malignancy in SPNs: size >8 mm, spiculated margins (irregular border from tumor invasion), upper lobe location (higher carcinogen deposition), smoking history, and patient age >50. A 12 mm spiculated upper lobe nodule in a smoker has high pre-test probability for malignancy and warrants PET-CT ± CT-guided biopsy. Stable GGNs and calcified nodules have much lower risk."},

// ── L31 · Pneumonia ────────────────────────────────────────────────────────
// LO1: Typical vs atypical CAP onset and symptoms
{"sec":"L31","lo":"LO1 — Typical vs atypical CAP","stem":"A 65-year-old smoker presents with sudden onset of high fever (39.8°C), rigors, cough productive of rust-colored sputum, and right-sided pleuritic chest pain. CXR shows right lower lobe lobar consolidation. Which type of pneumonia does this BEST represent?","opts":["A. Atypical pneumonia — gradual onset and patchy infiltrates are not present","B. Typical bacterial pneumonia — abrupt onset, productive purulent cough, lobar consolidation, and pleuritic pain","C. Aspiration pneumonia — requires lower lobe and history of aspiration","D. Viral pneumonia — bilateral infiltrates are expected"],"answer":"B","exp":"Typical (bacterial) CAP hallmarks: abrupt onset, high fever with rigors, productive cough (rust-colored = S. pneumoniae), pleuritic chest pain, lobar consolidation on CXR. The rust-colored sputum is classic for S. pneumoniae — from lysed red cells in pneumococcal pneumonia. Atypical CAP: gradual onset, dry cough, patchy bilateral infiltrates, milder systemic symptoms."},
{"sec":"L31","lo":"LO1 — Typical vs atypical CAP","stem":"Which of the following features is characteristic of ATYPICAL community-acquired pneumonia and helps distinguish it from typical bacterial pneumonia?","opts":["A. Lobar consolidation with air bronchograms on CXR","B. Abrupt onset with productive purulent sputum and high fever","C. Radiographic findings (bilateral patchy infiltrates) out of proportion to mild clinical symptoms — 'walking pneumonia'","D. Positive urinary antigen test for Streptococcus pneumoniae"],"answer":"C","exp":"Atypical CAP key distinguishing feature: CXR appearance (extensive bilateral patchy infiltrates) is worse than the clinical presentation (patient may appear relatively well, still ambulatory). Typical CAP: CXR matches the clinical severity. Atypical organisms: Mycoplasma, Chlamydophila, Legionella. Positive pneumococcal urinary antigen = typical pneumococcal pneumonia."},

// LO2: Most frequent etiology of typical CAP
{"sec":"L31","lo":"LO2 — Bacteriologic etiology of typical CAP","stem":"Which organism is the most common cause of community-acquired pneumonia overall (both outpatient and hospitalized patients) in the United States?","opts":["A. Haemophilus influenzae","B. Streptococcus pneumoniae","C. Klebsiella pneumoniae","D. Staphylococcus aureus"],"answer":"B","exp":"Streptococcus pneumoniae (pneumococcus) is the most common cause of CAP across all severity levels and ages. It produces the rust-colored sputum from hemolytic toxins, presents with lobar consolidation, and can cause bacteremia. H. influenzae is common in COPD patients. Klebsiella classically affects alcoholics/diabetics. S. aureus follows influenza infection."},
{"sec":"L31","lo":"LO2 — Bacteriologic etiology of typical CAP","stem":"A 72-year-old nursing home resident develops typical CAP with bacteremia. Blood cultures grow gram-positive diplococci. Which virulence factor of S. pneumoniae primarily allows it to evade phagocytosis?","opts":["A. Endotoxin (lipopolysaccharide) in the outer membrane","B. Polysaccharide capsule that inhibits opsonization and phagocytosis","C. Protein A binding to the Fc region of immunoglobulins","D. Exotoxin A inhibiting protein synthesis in macrophages"],"answer":"B","exp":"The polysaccharide capsule of S. pneumoniae is the key virulence factor — it inhibits complement deposition and opsonization, preventing phagocytosis by alveolar macrophages and neutrophils. This is the basis for pneumococcal vaccines (PPSV23, PCV13/PCV15/PCV20) — they generate antibodies against specific capsular serotypes, enhancing opsonophagocytosis."},

// LO3: Three most frequent causes of atypical CAP
{"sec":"L31","lo":"LO3 — Atypical CAP organisms","stem":"A 35-year-old college student with 'walking pneumonia' has a positive cold agglutinin test. Which organism and associated extrapulmonary complication is MOST likely?","opts":["A. Legionella pneumophila — hyponatremia from SIADH","B. Mycoplasma pneumoniae — cold agglutinin hemolytic anemia (IgM anti-I antibodies)","C. Chlamydophila pneumoniae — reactive arthritis","D. Coxiella burnetii (Q fever) — hepatitis"],"answer":"B","exp":"Mycoplasma pneumoniae stimulates IgM cold agglutinins (anti-I red cell antibodies) in ~50% of cases. These can cause cold agglutinin hemolytic anemia at low temperatures. Other Mycoplasma extrapulmonary manifestations: erythema multiforme/Stevens-Johnson, myocarditis, meningoencephalitis, arthritis. Legionella causes hyponatremia, elevated LFTs, and diarrhea."},
{"sec":"L31","lo":"LO3 — Atypical CAP organisms","stem":"A 58-year-old hotel guest develops severe pneumonia with diarrhea, confusion, and a sodium of 126 mEq/L. Urinary antigen test is positive. What is the causative organism and its environmental reservoir?","opts":["A. Mycoplasma pneumoniae — spread by respiratory droplets in crowded settings","B. Legionella pneumophila — colonizes freshwater systems (cooling towers, hot tubs, hospital water)","C. Chlamydophila psittaci — transmitted from pet birds","D. Coxiella burnetii — inhaled from infected livestock dusts"],"answer":"B","exp":"Legionella pneumophila: classic epidemiological clues — hotel/cruise ship outbreaks, cooling towers/hot tubs, hospital water. Legionnaires' disease: severe pneumonia with prominent GI symptoms (diarrhea, nausea), neurologic changes (confusion), and SIADH (hyponatremia). Urinary antigen detects serogroup 1 (most common). Treatment: respiratory fluoroquinolone or azithromycin (NOT β-lactams — Legionella is intracellular)."},

// LO4: Treatment of typical CAP
{"sec":"L31","lo":"LO4 — Treatment of typical CAP","stem":"A 45-year-old otherwise healthy outpatient presents with typical CAP. He has no significant comorbidities, no penicillin allergy, and the CXR shows right lower lobe consolidation. What is the recommended first-line outpatient treatment?","opts":["A. Azithromycin monotherapy","B. Amoxicillin 1g three times daily","C. Levofloxacin 750 mg daily","D. Doxycycline monotherapy"],"answer":"B","exp":"2019 ATS/IDSA CAP guidelines: for outpatients WITHOUT comorbidities (no COPD, DM, liver disease, alcoholism, immunosuppression, antibiotic use in past 3 months), amoxicillin is first-line for typical CAP. Azithromycin is an alternative but has high resistance rates for S. pneumoniae in some areas. Respiratory fluoroquinolones are reserved for higher-risk patients or treatment failure."},
{"sec":"L31","lo":"LO4 — Treatment of typical CAP","stem":"A 62-year-old with COPD and diabetes develops CAP and is admitted to a non-ICU hospital ward. Blood cultures are pending, sputum Gram stain shows gram-positive diplococci. What is the most appropriate empiric treatment?","opts":["A. Azithromycin monotherapy","B. Amoxicillin-clavulanate alone","C. Beta-lactam (ceftriaxone) PLUS a macrolide (azithromycin) OR a respiratory fluoroquinolone alone","D. Vancomycin plus piperacillin-tazobactam"],"answer":"C","exp":"ATS/IDSA guidelines for non-ICU hospitalized CAP: preferred regimen is a beta-lactam (ceftriaxone, cefotaxime, or ampicillin-sulbactam) PLUS a macrolide (azithromycin), OR a respiratory fluoroquinolone (levofloxacin or moxifloxacin) alone. Both cover atypical organisms. Combination therapy is preferred over monotherapy in hospitalized patients due to improved outcomes in observational studies."},

// LO5: Treatment of atypical CAP
{"sec":"L31","lo":"LO5 — Treatment of atypical CAP","stem":"A 28-year-old presents with atypical pneumonia and tests positive for Mycoplasma pneumoniae on serology. Beta-lactam antibiotics have been ineffective. Why are beta-lactams ineffective against Mycoplasma?","opts":["A. Mycoplasma produces a beta-lactamase enzyme that inactivates penicillins","B. Mycoplasma lacks a cell wall and therefore has no penicillin-binding proteins (PBPs) as drug targets","C. Mycoplasma is an obligate intracellular organism that cannot be reached by beta-lactams","D. Mycoplasma develops rapid efflux pump-mediated resistance to beta-lactams"],"answer":"B","exp":"Mycoplasma pneumoniae lacks a peptidoglycan cell wall entirely, so beta-lactams (which inhibit PBP-mediated cell wall synthesis) have no target and are intrinsically ineffective. First-line treatments: macrolides (azithromycin) or tetracyclines (doxycycline). Fluoroquinolones are effective for macrolide-resistant strains. Chlamydophila is also intracellular but Mycoplasma is not — it is wall-deficient."},
{"sec":"L31","lo":"LO5 — Treatment of atypical CAP","stem":"A patient is diagnosed with Legionella pneumonia (serogroup 1, urinary antigen positive). Which antibiotic class is MOST appropriate, and why?","opts":["A. Beta-lactams — cover all gram-negative organisms effectively","B. Fluoroquinolones (levofloxacin) or macrolides (azithromycin) — achieve high intracellular concentrations where Legionella resides in macrophages","C. Aminoglycosides — appropriate for all gram-negative pneumonias","D. Carbapenems — broadest spectrum covers atypical organisms"],"answer":"B","exp":"Legionella is a facultative intracellular pathogen — it resides within alveolar macrophage phagosomes. Beta-lactams and aminoglycosides do not penetrate cells adequately. Fluoroquinolones and macrolides achieve high intracellular/tissue concentrations. Fluoroquinolones (levofloxacin) are preferred for severe/ICU Legionella pneumonia (superior microbiologic cure rates). Duration: 5–10 days (longer for immunocompromised)."},

// LO6: Penicillin resistance in S. pneumoniae
{"sec":"L31","lo":"LO6 — Penicillin resistance in S. pneumoniae","stem":"Penicillin resistance in Streptococcus pneumoniae is mediated by which mechanism?","opts":["A. Beta-lactamase production that hydrolyzes the beta-lactam ring","B. Mutation/alteration of penicillin-binding proteins (PBPs) reducing drug affinity","C. Efflux pump upregulation reducing intracellular antibiotic levels","D. Outer membrane porin channel loss reducing drug entry"],"answer":"B","exp":"S. pneumoniae does NOT produce beta-lactamase. Resistance occurs via mutations in PBP genes (mosaic PBPs from horizontal gene transfer from related streptococci) → reduced β-lactam binding affinity. This is distinct from S. aureus (MRSA = altered PBP2a) and gram-negatives (beta-lactamase production). Important: Amoxicillin at high doses can overcome low/intermediate pneumococcal resistance."},
{"sec":"L31","lo":"LO6 — Penicillin resistance in S. pneumoniae","stem":"A hospitalized patient with confirmed penicillin-resistant S. pneumoniae pneumonia (MIC to penicillin >2 mcg/mL = high-level resistance) fails initial ceftriaxone therapy. Which antibiotic is MOST appropriate?","opts":["A. Higher-dose ceftriaxone (2g IV q12h)","B. Respiratory fluoroquinolone (levofloxacin 750 mg IV daily) or vancomycin","C. Macrolide (azithromycin) monotherapy","D. Doxycycline 100 mg IV twice daily"],"answer":"B","exp":"High-level penicillin-resistant S. pneumoniae (MIC ≥2 mcg/mL) is also cross-resistant to most cephalosporins. Vancomycin remains active against all pneumococci (cell wall synthesis inhibitor via D-Ala-D-Lac binding — distinct mechanism). Respiratory fluoroquinolones (levofloxacin, moxifloxacin) are also active against PRSP. Linezolid is an alternative. Macrolide and doxycycline resistance often co-exists with penicillin resistance."},

// LO7: Antibiotics for penicillin-resistant S. pneumoniae
{"sec":"L31","lo":"LO7 — Antibiotics for penicillin-resistant S. pneumoniae","stem":"Which antibiotic class has demonstrated the highest rates of resistance in S. pneumoniae isolates overall, making empiric use unreliable even for typical CAP in some regions?","opts":["A. Third-generation cephalosporins","B. Macrolides (azithromycin, clarithromycin)","C. Respiratory fluoroquinolones","D. Vancomycin"],"answer":"B","exp":"Macrolide resistance in S. pneumoniae is common globally (up to 30–40% in some regions). Two mechanisms: (1) ribosomal methylation (erm genes) — high-level, cross-class resistance; (2) efflux pump (mef genes) — lower-level. This is why ATS/IDSA guidelines no longer recommend macrolide monotherapy for hospitalized CAP and discourage it as sole outpatient treatment in areas with >25% macrolide resistance. Fluoroquinolone resistance in pneumococcus remains low."},
{"sec":"L31","lo":"LO7 — Antibiotics for penicillin-resistant S. pneumoniae","stem":"Linezolid is an option for PRSP pneumonia. What is its mechanism of action?","opts":["A. Inhibits bacterial cell wall synthesis by binding PBP2a","B. Inhibits protein synthesis by binding the 23S rRNA of the 50S ribosomal subunit, preventing 70S initiation complex formation","C. Inhibits DNA gyrase and topoisomerase IV","D. Disrupts the bacterial cell membrane by inserting as a lipopeptide"],"answer":"B","exp":"Linezolid (oxazolidinone class) binds to the 23S rRNA component of the 50S ribosomal subunit → prevents formation of the 70S initiation complex → inhibits translation. It is bacteriostatic against staphylococci and enterococci (bactericidal for some streptococci). 100% oral bioavailability. Active against MRSA, VRE, and PRSP. Key toxicities: myelosuppression (thrombocytopenia), serotonin syndrome (with SSRIs), lactic acidosis."},

// LO8: CAP vs nosocomial pneumonia
{"sec":"L31","lo":"LO8 — CAP vs nosocomial pneumonia","stem":"A 55-year-old patient on mechanical ventilation develops new fever, purulent tracheal secretions, and a new CXR infiltrate on hospital day 6. His CPIS (clinical pulmonary infection score) is 7. Which pneumonia category does this represent?","opts":["A. Community-acquired pneumonia (CAP)","B. Ventilator-associated pneumonia (VAP)","C. Healthcare-associated pneumonia (HCAP) — now incorporated into HAP guidelines","D. Hospital-acquired pneumonia (HAP) — non-ventilated patient"],"answer":"B","exp":"VAP is defined as pneumonia occurring >48–72 hours after endotracheal intubation. It is a subset of HAP. Key distinguishing feature: patient is mechanically ventilated. HAP = pneumonia in hospitalized non-ventilated patient ≥48 hours post-admission. HCAP was a former category (nursing home, dialysis, recent hospitalization) now merged into CAP/HAP guidance. Early VAP (days 2–4): more likely susceptible organisms. Late VAP (>5 days): MDR organisms."},
{"sec":"L31","lo":"LO8 — CAP vs nosocomial pneumonia","stem":"Which feature BEST explains why hospital-acquired pneumonia (HAP) has higher morbidity and mortality than CAP?","opts":["A. Hospital patients are older and therefore cannot mount an immune response","B. HAP is more commonly caused by multidrug-resistant organisms (MRSA, Pseudomonas, Acinetobacter, ESBL gram-negatives) due to prior antibiotic exposure and hospital environment","C. Hospital air quality is significantly worse due to poor ventilation systems","D. HAP occurs in intubated patients only, causing direct airway trauma"],"answer":"B","exp":"HAP/VAP is caused by MDR pathogens selected by hospital antibiotic use: MRSA, MDR Pseudomonas aeruginosa, Acinetobacter baumannii, Klebsiella (ESBL/KPC), Enterobacter. Risk factors for MDR HAP: prior IV antibiotics within 90 days, ≥5 days hospitalization, septic shock, ARDS, renal replacement therapy. These organisms have limited treatment options and require broader empiric regimens."},

// LO9: Etiologies of nosocomial pneumonia
{"sec":"L31","lo":"LO9 — Etiologies of nosocomial pneumonia","stem":"A patient on a medical ward is intubated on day 3 of admission for respiratory failure. On day 5 of intubation, she develops VAP. Which of the following best describes the primary mechanism of pathogen entry in VAP?","opts":["A. Hematogenous seeding from a distant infected site","B. Microaspiration of oropharyngeal secretions colonized with nosocomial pathogens past the endotracheal tube cuff","C. Inhalation of contaminated aerosols from hospital HVAC systems","D. Translocation of gut bacteria through an ischemic intestinal wall"],"answer":"B","exp":"VAP pathogenesis: the endotracheal tube bypasses upper airway defenses and creates a direct conduit. Oropharyngeal secretions pool above the cuff and microaspirate past it → inoculate the lower airways with nosocomial pathogens. Prevention strategies target this mechanism: subglottic secretion drainage, semi-recumbent positioning (30–45°), daily oral decontamination with chlorhexidine, daily sedation interruption to facilitate extubation."},
{"sec":"L31","lo":"LO9 — Etiologies of nosocomial pneumonia","stem":"Which of the following patients is at HIGHEST risk for MDR organism HAP requiring broader empiric antibiotic coverage?","opts":["A. A 45-year-old admitted yesterday with community-acquired pneumonia, no prior antibiotics","B. A 70-year-old on day 8 of hospitalization with prior IV antibiotics in the last 90 days and a prior MRSA isolate","C. A 30-year-old post-appendectomy on day 3 with no prior hospitalizations","D. A 50-year-old admitted with CHF exacerbation, now day 2, no fever yet"],"answer":"B","exp":"MDR HAP risk factors: prior IV antibiotic use within 90 days, hospitalization ≥5 days, septic shock, prior MDR organism isolation, renal replacement therapy, prior multidrug exposure. The 70-year-old on day 8 with prior IV antibiotics AND prior MRSA = highest MDR risk, warranting empiric MRSA coverage (vancomycin/linezolid) + anti-pseudomonal beta-lactam."},

// LO10: Evaluation and treatment of nosocomial pneumonia
{"sec":"L31","lo":"LO10 — Evaluation and treatment of nosocomial pneumonia","stem":"A patient with suspected VAP undergoes bronchoscopy with BAL. The BAL culture grows Pseudomonas aeruginosa at 10^5 CFU/mL (threshold: >10^4 CFU/mL for BAL). Which antibiotic combination is most appropriate empirically, pending susceptibility testing?","opts":["A. Oral amoxicillin-clavulanate — Pseudomonas may be susceptible","B. Piperacillin-tazobactam PLUS either tobramycin or ciprofloxacin — dual anti-pseudomonal coverage empirically for severe VAP","C. Vancomycin monotherapy","D. Ceftriaxone — covers most gram-negative organisms including Pseudomonas"],"answer":"B","exp":"Pseudomonas aeruginosa VAP: empiric dual anti-pseudomonal coverage is recommended for severe VAP in centers with high MDR Pseudomonas rates (>10% of local isolates resistant to a given agent). Combination: anti-pseudomonal beta-lactam (pip-tazo, cefepime, meropenem) PLUS aminoglycoside or anti-pseudomonal fluoroquinolone (ciprofloxacin). De-escalate to monotherapy once susceptibilities are available. Ceftriaxone has NO anti-pseudomonal activity."},
{"sec":"L31","lo":"LO10 — Evaluation and treatment of nosocomial pneumonia","stem":"Which biomarker is most useful for guiding antibiotic de-escalation and duration in HAP/VAP?","opts":["A. C-reactive protein (CRP) — most sensitive marker of bacterial infection","B. Procalcitonin (PCT) — guides stopping antibiotics when trending down (PCT <0.25 ng/mL or >80% decrease from peak) in patients who are clinically improving","C. White blood cell count — normalize to normal range before stopping antibiotics","D. Lactate — antibiotic duration should correlate with lactate clearance"],"answer":"B","exp":"Procalcitonin (PCT) is produced by parenchymal cells in response to bacterial infections (stimulated by endotoxin and cytokines). PCT-guided antibiotic protocols in HAP/VAP: shorter courses (5–7 days) when PCT is falling and patient is improving. Target: PCT <0.25 ng/mL or >80% reduction from peak to consider stopping antibiotics. This reduces antibiotic exposure without worsening outcomes in clinical trials (PRORATA, SAPS trials)."},

// ── L32 · Thoracic Surgery ─────────────────────────────────────────────────
// LO1: Role of surgery in non-cardiac chest diseases
{"sec":"L32","lo":"LO1 — Role of surgery in non-cardiac chest diseases","stem":"A 62-year-old with stage IA non-small cell lung cancer (T1bN0M0, 2.5 cm lesion) has an FEV1 of 78% predicted. Which surgical procedure is the preferred curative treatment?","opts":["A. Pneumonectomy — removes the entire lung to ensure complete resection","B. Lobectomy — anatomic resection of the involved lobe, the preferred curative resection for NSCLC","C. Wedge resection — sufficient for stage IA tumors regardless of FEV1","D. Radiofrequency ablation — equivalent to surgery for stage I disease"],"answer":"B","exp":"Lobectomy is the standard of care for resectable NSCLC (stage I–IIIA). It achieves complete anatomic resection with adequate margins and reduces local recurrence vs. sublobar resection. Wedge resection/segmentectomy is reserved for patients who cannot tolerate lobectomy (poor FEV1 <40%, poor DLCO, or elderly frail). Pneumonectomy is for central tumors requiring removal of a whole lung — higher morbidity/mortality."},
{"sec":"L32","lo":"LO1 — Role of surgery in non-cardiac chest diseases","stem":"Surgery plays a diagnostic role in thoracic disease. Which procedure provides the MOST tissue for diagnosis of an anterior mediastinal mass when core needle biopsy is non-diagnostic?","opts":["A. Bronchoscopy with BAL","B. Anterior mediastinotomy (Chamberlain procedure) or VATS — allows direct visualization and excision/biopsy of anterior mediastinal masses","C. CT-guided fine needle aspiration","D. Flexible bronchoscopy with EBUS-TBNA"],"answer":"B","exp":"Anterior mediastinal masses (thymoma, lymphoma, germ cell tumors) often require adequate tissue for subtype classification. When CT-guided core biopsy is non-diagnostic (especially for lymphoma which needs architecture), surgical approaches (anterior mediastinotomy/Chamberlain procedure for left anterior, VATS for general access) allow larger tissue samples. EBUS-TBNA accesses subcarinal and paratracheal LN but not the anterior compartment directly."},

// LO2: Advantages and disadvantages of surgical intervention
{"sec":"L32","lo":"LO2 — Advantages and disadvantages of thoracic surgery","stem":"A 75-year-old with stage II NSCLC, FEV1 45% predicted, and an EF of 35% (systolic HF) is being evaluated for lobectomy. Which factor MOST limits his surgical candidacy?","opts":["A. His age of 75 years alone — surgery is contraindicated over age 70","B. Poor pulmonary reserve (FEV1 <40–50% predicted) and cardiac dysfunction (low EF) increase perioperative mortality significantly","C. Stage II disease — surgery is only indicated for stage I disease","D. All NSCLC patients with cardiac disease should receive radiation only"],"answer":"B","exp":"Surgical risk stratification for thoracic surgery: predicted postoperative FEV1 (ppoFEV1) <40% or DLCO <40% = high risk; <30% = prohibitive. Cardiac risk (EF <35%, recent MI, unstable angina) adds significantly to perioperative mortality. Both factors present = functional inoperability. Options: stereotactic body radiation therapy (SBRT) or radiofrequency ablation as alternatives to surgery in high-risk patients with early-stage NSCLC."},
{"sec":"L32","lo":"LO2 — Advantages and disadvantages of thoracic surgery","stem":"Which of the following is the MOST significant post-thoracotomy complication that contributes to prolonged hospital stay and long-term morbidity?","opts":["A. Post-thoracotomy pain syndrome — chronic neuropathic pain from intercostal nerve injury","B. Pulmonary hypertension from vascular disruption","C. Obligate requirement for lifelong bronchodilator therapy","D. Permanent recurrent laryngeal nerve palsy in all cases"],"answer":"A","exp":"Post-thoracotomy pain syndrome (PTPS): chronic pain (>2 months post-op) from intercostal nerve injury during rib spreading/resection. Occurs in 30–50% of open thoracotomy patients. VATS approaches significantly reduce PTPS due to smaller incisions. Pain is neuropathic (burning, allodynia) and treated with gabapentinoids, TCAs, local nerve blocks. It is a major reason for the shift toward minimally invasive VATS surgery."},

// LO3: Indications for thoracic surgery consultation
{"sec":"L32","lo":"LO3 — Indications for thoracic surgery consultation","stem":"Which of the following clinical scenarios represents the STRONGEST indication for urgent thoracic surgery consultation?","opts":["A. A stable patient with a 6 mm pulmonary nodule on annual CT screening","B. A patient with massive hemoptysis (>600 mL/24h) not controlled by bronchial artery embolization","C. A patient with mild pleuritic chest pain and a negative D-dimer","D. A patient with community-acquired pneumonia responding well to antibiotics"],"answer":"B","exp":"Massive hemoptysis uncontrolled by bronchial artery embolization (BAE) is an indication for emergent thoracic surgery (lobectomy/pneumonectomy for localized disease). BAE is first-line but fails in ~10–30% due to collateral supply. Other urgent surgical indications: tension pneumothorax, esophageal perforation, aortic rupture, traumatic tracheobronchial injury. Stable nodules and responding pneumonia are non-urgent."},
{"sec":"L32","lo":"LO3 — Indications for thoracic surgery consultation","stem":"A patient with a complicated parapneumonic effusion develops an empyema (frank pus on thoracentesis, loculated on ultrasound, pH <7.0). First-line chest tube drainage fails to fully drain the empyema. Which is the next appropriate step?","opts":["A. Repeat thoracentesis every 48 hours until resolved","B. VATS decortication — surgical drainage and removal of the fibrous peel (cortex) restricting the lung","C. Observation for 4 weeks with repeat imaging","D. Permanent pleuroperitoneal shunt insertion"],"answer":"B","exp":"Empyema management: Stage 1 (exudative) → thoracentesis. Stage 2 (fibrinopurulent, loculated) → chest tube + intrapleural fibrinolytics (tPA + DNase). Stage 3 (organizing, fibrous cortex) → VATS decortication to remove the thickened pleural peel and re-expand the trapped lung. VATS is preferred over open thoracotomy for earlier organizing empyemas; open decortication for very thick, organized empyemas."},

// LO4: Surgical procedures for specific thoracic diseases
{"sec":"L32","lo":"LO4 — Surgical procedures for thoracic diseases","stem":"A 30-year-old woman is found to have a 4 cm anterior mediastinal mass. Serum AFP and beta-hCG are markedly elevated. Which diagnosis and treatment is MOST appropriate?","opts":["A. Thymoma — thymectomy via median sternotomy","B. Malignant germ cell tumor (non-seminomatous) — neoadjuvant cisplatin-based chemotherapy followed by surgical resection","C. Thyroid goiter — radioactive iodine ablation","D. Lymphoma — radiation therapy alone"],"answer":"B","exp":"Elevated AFP and/or beta-hCG in an anterior mediastinal mass = non-seminomatous germ cell tumor (NSGCT). Treatment: cisplatin-based chemotherapy (BEP: bleomycin, etoposide, cisplatin) first → surgical resection of residual mass. Pure seminoma: responds to radiation/chemo; no AFP elevation. Thymoma: AFP/hCG are not elevated; treatment is primary surgical resection."},
{"sec":"L32","lo":"LO4 — Surgical procedures for thoracic diseases","stem":"A 25-year-old presents with his first episode of spontaneous pneumothorax. CXR shows 30% pneumothorax on the right. He is hemodynamically stable with mild dyspnea. What is the most appropriate initial management?","opts":["A. Immediate VATS bullectomy and pleurodesis","B. Needle aspiration or small-bore chest tube — for first-episode, moderate pneumothorax in a stable patient","C. Emergency thoracotomy","D. Observation alone with repeat CXR in 4 hours regardless of size"],"answer":"B","exp":"First-episode spontaneous pneumothorax: BTS guidelines recommend aspiration (with Seldinger technique) or small-bore catheter (8–14 Fr) for symptomatic pneumothorax >2 cm (or >20% on CXR). If successful, outpatient management may be possible. VATS is reserved for recurrence, failure of aspiration, bilateral pneumothorax, or high-risk occupations (pilots, divers). Observation alone is for small (<2 cm) asymptomatic first-episode pneumothorax."},

// ── L33 · Nasal Cavity, Paranasal Sinuses & Respiratory Allergy ───────────
// LO1: Anatomy of the nasal cavity
{"sec":"L33","lo":"LO1 — Anatomy of the nasal cavity","stem":"Kiesselbach's plexus (Little's area) is the most common site of anterior epistaxis. Which vessels anastomose to form this plexus on the anterior nasal septum?","opts":["A. Anterior and posterior ethmoidal arteries only (branches of ophthalmic artery)","B. Anterior ethmoidal, posterior ethmoidal, sphenopalatine, greater palatine, and superior labial arteries — anastomosis of both ICA and ECA territories","C. Facial artery and lingual artery branches exclusively","D. Posterior septal artery and posterior lateral nasal artery from the sphenopalatine only"],"answer":"B","exp":"Kiesselbach's plexus anastomoses branches from both ICA and ECA territories: anterior ethmoidal artery (ophthalmic/ICA), posterior ethmoidal artery (ophthalmic/ICA), sphenopalatine artery (maxillary/ECA), greater palatine artery (maxillary/ECA), and superior labial artery (facial/ECA). This rich anastomosis explains why anterior epistaxis is common and why endoscopic sphenopalatine artery ligation is used for refractory cases."},
{"sec":"L33","lo":"LO1 — Anatomy of the nasal cavity","stem":"The middle meatus receives drainage from which paranasal sinuses?","opts":["A. Frontal sinus, maxillary sinus, and anterior ethmoid air cells — draining via the ostiomeatal complex","B. Sphenoid sinus and posterior ethmoid cells — draining via the sphenoethmoidal recess","C. All sinuses drain into the middle meatus","D. The middle meatus receives only tears from the nasolacrimal duct"],"answer":"A","exp":"Ostiomeatal complex (OMC): the functional unit of the middle meatus including the uncinate process, ethmoidal infundibulum, and hiatus semilunaris. The frontal, maxillary, and anterior ethmoid sinuses all drain here. Posterior ethmoid cells and the sphenoid sinus drain into the superior meatus and sphenoethmoidal recess, respectively. The nasolacrimal duct drains into the inferior meatus (under the inferior turbinate)."},

// LO2: Benign and malignant diseases of the nasal cavity
{"sec":"L33","lo":"LO2 — Nasal cavity diseases","stem":"A 50-year-old furniture maker presents with unilateral nasal obstruction, epistaxis, and a polypoid mass in the right nasal cavity that is locally invasive on CT. Biopsy shows an inverted growth pattern of squamoid epithelium. What is this lesion and what is its clinical significance?","opts":["A. Allergic nasal polyp — treat with steroids","B. Inverted papilloma — locally aggressive, high recurrence rate, and 10–15% risk of malignant transformation to SCC; requires complete surgical resection","C. Esthesioneuroblastoma — requires craniofacial resection and radiation","D. Angiofibroma — seen in adolescent males, hypervascular, embolization before resection"],"answer":"B","exp":"Inverted papilloma (Schneiderian papilloma): associated with HPV, occupational wood/leather dust exposure. Grows endophytically (inverted into stroma). Key features: locally aggressive with high recurrence, 10–15% risk of synchronous or metachronous SCC. Treatment: complete endoscopic or open surgical resection (FESS preferred for limited disease). Annual surveillance endoscopy recommended post-resection."},
{"sec":"L33","lo":"LO2 — Nasal cavity diseases","stem":"Juvenile nasopharyngeal angiofibroma occurs almost exclusively in adolescent males. Which finding on physical exam should prevent you from attempting a biopsy in the office?","opts":["A. Firm consistency suggesting bone involvement","B. Highly vascular, pulsatile mass that can cause life-threatening hemorrhage with biopsy — diagnosis is clinical + CT/MRI","C. Bilateral presentation suggesting lymphoma","D. Purulent discharge suggesting infected polyp"],"answer":"B","exp":"Juvenile nasopharyngeal angiofibroma (JNA): benign but highly vascular tumor arising from the sphenopalatine foramen in adolescent males. Office biopsy is CONTRAINDICATED due to risk of severe hemorrhage. Diagnosis: clinical + CT (bony erosion, widened pterygopalatine fossa) + MRI (salt-and-pepper pattern from flow voids). Treatment: preoperative embolization + surgical resection (FESS or open approach depending on extent)."},

// LO3: Acute and chronic nasal disorders
{"sec":"L33","lo":"LO3 — Acute and chronic nasal disorders","stem":"A 38-year-old develops facial pressure, purulent nasal discharge, and maxillary tooth pain 12 days after a 'cold.' She had initial improvement on day 3–4 but then worsened. This pattern of 'double worsening' MOST suggests:","opts":["A. Viral rhinosinusitis — usual course, reassure and discharge","B. Acute bacterial rhinosinusitis (ABRS) — criteria: symptoms >10 days, severe symptoms ≥3–4 days, or double worsening","C. Allergic rhinitis exacerbation — treat with antihistamines","D. Nasal polyps causing obstruction — requires CT scan and FESS"],"answer":"B","exp":"ABRS diagnostic criteria (IDSA 2012): (1) persistent symptoms ≥10 days without improvement, (2) severe onset (fever ≥39°C + purulent discharge for ≥3–4 consecutive days), or (3) 'double worsening' (initial improvement then sudden deterioration). Most cases are viral (rhinovirus); only ~2% are complicated by ABRS. Treatment: amoxicillin-clavulanate × 5–7 days (adults), nasal saline irrigation, analgesics."},
{"sec":"L33","lo":"LO3 — Acute and chronic nasal disorders","stem":"A patient with chronic rhinosinusitis (CRS) with nasal polyps (CRSwNP) has failed nasal steroids, saline irrigation, and two courses of antibiotics. CT sinuses shows bilateral opacification of all sinuses. What is the next most appropriate step?","opts":["A. Long-term macrolide antibiotic therapy alone","B. Functional endoscopic sinus surgery (FESS) to open the ostiomeatal complex and remove polyps, followed by continued medical therapy","C. Oral antihistamines as the primary treatment","D. Systemic corticosteroids permanently"],"answer":"B","exp":"CRS management: step-up approach. Step 1: nasal saline irrigation + intranasal corticosteroids. Step 2: oral steroids (short course), antibiotics (for exacerbations), leukotriene antagonists. Step 3: FESS — opens sinus ostia, removes polyps, restores ventilation and mucociliary clearance, improves topical drug delivery postoperatively. Biologics (dupilumab — anti-IL-4/IL-13) are now approved for CRSwNP refractory to FESS."},

// LO4: Pathophysiology, testing, symptoms, diagnosis, and treatment of respiratory allergy
{"sec":"L33","lo":"LO4 — Respiratory allergy","stem":"A 22-year-old with allergic rhinitis undergoes skin prick testing (SPT) to evaluate allergen sensitization. A positive result appears within 15–20 minutes as a wheal-and-flare reaction. What immunological mechanism is this testing?","opts":["A. Type II hypersensitivity — antibody-mediated cytotoxicity","B. Type I (IgE-mediated) immediate hypersensitivity — allergen cross-links mast cell-bound IgE → degranulation → histamine release","C. Type III hypersensitivity — immune complex deposition","D. Type IV (delayed-type) hypersensitivity — T-cell mediated"],"answer":"B","exp":"SPT tests for IgE-mediated (Type I) sensitization: allergen → cross-links allergen-specific IgE on skin mast cells → degranulation → histamine + tryptase release → wheal (edema) and flare (erythema) within 15–20 minutes. A wheal ≥3 mm diameter greater than negative control = positive. RAST/specific IgE blood tests measure circulating allergen-specific IgE. Both test the same IgE-mediated mechanism."},
{"sec":"L33","lo":"LO4 — Respiratory allergy","stem":"Allergen immunotherapy (AIT) for allergic rhinitis works by inducing tolerance through which mechanism?","opts":["A. Blocking IgE production permanently by depleting plasma B cells","B. Shifting the immune response from Th2 (IgE, IL-4, IL-13) to a regulatory/Th1 pattern, inducing allergen-specific IgG4 (blocking antibodies) and regulatory T cells (Tregs)","C. Directly neutralizing histamine in the bloodstream after allergen exposure","D. Inducing anaphylaxis tolerance through repeated exposure to life-threatening doses"],"answer":"B","exp":"AIT mechanism: repeated allergen exposure → induction of allergen-specific Tregs (IL-10, TGF-β) → class switch from IgE to IgG4 (blocking antibodies that compete with IgE for allergen) → ↓ mast cell/basophil reactivity → ↓ Th2 cytokines (IL-4, IL-5, IL-13) → ↓ eosinophilia. AIT is the only disease-modifying treatment for allergic disease — it reduces symptoms, medication use, and prevents new sensitizations/asthma."},

// LO5: Physical exam and radiological views for paranasal sinuses
{"sec":"L33","lo":"LO5 — Sinus examination and imaging","stem":"A patient with suspected acute maxillary sinusitis undergoes plain X-ray of the sinuses. Which view BEST evaluates the maxillary sinuses?","opts":["A. Lateral skull X-ray","B. Waters view (occipitomental projection)","C. Caldwell view (occipitofrontal projection)","D. Submentovertex view"],"answer":"B","exp":"Waters view (occipitomental at 37°): specifically designed to visualize the maxillary sinuses and orbital floors by tilting the head so the petrous ridges project below the maxillary sinus floors. Caldwell view (occipitofrontal): best for frontal and ethmoid sinuses. Lateral: sphenoid and frontal sinuses. CT sinuses is now the gold standard — plain films are largely replaced in clinical practice but may still appear on exams."},
{"sec":"L33","lo":"LO5 — Sinus examination and imaging","stem":"Which physical examination finding is considered MOST specific for acute bacterial sinusitis when examining the sinuses?","opts":["A. Nasal congestion — present in virtually all sinusitis cases","B. Tenderness on percussion over the maxillary and frontal sinuses","C. Posterior oropharyngeal cobblestoning from post-nasal drip","D. Pale, boggy nasal mucosa on anterior rhinoscopy"],"answer":"B","exp":"Percussion tenderness over the maxillary sinus (below the medial orbit) or frontal sinus (above the medial eyebrow) is moderately specific for acute bacterial sinusitis. However, no single exam finding is highly specific — clinical diagnosis of ABRS requires meeting defined criteria (see IDSA). Transillumination of the maxillary sinus (reduced light transmission with fluid-filled sinus) has low sensitivity and is rarely used."},

// LO6: Infections and neoplastic diseases of the paranasal sinuses
{"sec":"L33","lo":"LO6 — Sinus infections and neoplasms","stem":"A 65-year-old diabetic with poorly controlled glucose presents to the ED with severe headache, periorbital swelling, and black necrotic tissue visible in the nasal cavity. CT shows erosion into the orbital apex. What is the most likely diagnosis and treatment?","opts":["A. Allergic fungal sinusitis — oral corticosteroids and nasal irrigation","B. Acute invasive fungal sinusitis (Mucormycosis) — emergency surgical debridement + systemic liposomal amphotericin B + glucose control","C. Bacterial rhinosinusitis — IV ceftriaxone + metronidazole","D. Wegener's granulomatosis — high-dose steroids and cyclophosphamide"],"answer":"B","exp":"Rhinocerebral mucormycosis: caused by Mucorales (Rhizopus, Mucor) in diabetics/immunocompromised. Invades blood vessels → ischemic infarction → black necrosis. Life-threatening — spreads to orbit (proptosis, ophthalmoplegia) and brain. Treatment: URGENT surgical debridement (as aggressive as necessary), liposomal amphotericin B (less nephrotoxic), and control of underlying condition. Mortality 30–80% despite treatment. Aspergillus invasive sinusitis in neutropenic patients → voriconazole."},
{"sec":"L33","lo":"LO6 — Sinus infections and neoplasms","stem":"The most common malignancy of the paranasal sinuses originates in which sinus and is of which cell type?","opts":["A. Frontal sinus, adenocarcinoma","B. Maxillary sinus, squamous cell carcinoma","C. Ethmoid sinus, olfactory neuroblastoma (esthesioneuroblastoma)","D. Sphenoid sinus, undifferentiated carcinoma"],"answer":"B","exp":"Maxillary sinus SCC is the most common paranasal sinus malignancy (~80% of sinus cancers, ~60% are SCC). Risk factors: smoking, wood dust (adenocarcinoma of ethmoid), nickel, chromate. Presentation often late: cheek swelling, numbness (V2), trismus, epistaxis. Treated with surgery + radiation ± chemotherapy. Ethmoid adenocarcinoma is strongly associated with wood dust/leather dust exposure."},

// ── L34 · Acute Airway Emergency ──────────────────────────────────────────
// LO1: Access routes for mechanical ventilatory support
{"sec":"L34","lo":"LO1 — Access routes for ventilatory support","stem":"A 55-year-old with COPD exacerbation has increasing PaCO2 (68 mmHg) and pH 7.28 despite maximum medical therapy. He is tachypneic but cooperative. Which approach should be tried FIRST before intubation?","opts":["A. Immediate orotracheal intubation and mechanical ventilation","B. Non-invasive positive pressure ventilation (BiPAP) — reduces WOB, improves gas exchange, and reduces intubation rate in hypercapnic COPD","C. High-flow nasal cannula (HFNC) — preferred over BiPAP for hypercapnic COPD","D. Simple face mask at 10 L/min oxygen"],"answer":"B","exp":"BiPAP is strongly evidence-based in acute hypercapnic COPD exacerbation (pH 7.25–7.35): reduces intubation rate by ~65%, reduces ICU stay, and reduces mortality (Bott, Plant, NICE-SUGAR trials). BiPAP provides inspiratory pressure support (IPAP) to reduce WOB + expiratory pressure (EPAP) to prevent dynamic hyperinflation. HFNC is primarily for hypoxemic (Type 1) respiratory failure and is less effective for hypercapnia."},
{"sec":"L34","lo":"LO1 — Access routes for ventilatory support","stem":"Which of the following is an absolute contraindication to non-invasive positive pressure ventilation (BiPAP/CPAP) in a patient with acute respiratory failure?","opts":["A. Age >80 years","B. Respiratory arrest or inability to protect the airway — immediate intubation required","C. PaO2 <60 mmHg","D. Recent abdominal surgery within the past 6 months"],"answer":"B","exp":"Absolute contraindications to NIV: respiratory arrest (requires invasive ventilation immediately), inability to protect the airway (vomiting, decreased consciousness, absent gag reflex — aspiration risk), facial trauma/burns preventing mask seal, recent upper GI or esophageal surgery (CPAP/BiPAP ↑ gastric distension risk), undrained pneumothorax. Relative contraindications: severe encephalopathy (GCS <10), copious secretions, hemodynamic instability."},

// LO2: Airway management in adults and children
{"sec":"L34","lo":"LO2 — Airway management in adults and children","stem":"During rapid sequence intubation (RSI) of an adult, succinylcholine 1.5 mg/kg IV is given. Which condition is a CONTRAINDICATION to succinylcholine?","opts":["A. Full stomach (aspiration risk)","B. Hyperkalemia risk: burns >48h old, crush injury, prolonged immobility, denervation injury (paraplegia), or severe rhabdomyolysis — succinylcholine causes massive K+ release from upregulated acetylcholine receptors","C. Need for rapid sequence intubation — succinylcholine is specifically indicated here","D. Reactive airway disease — bronchospasm risk from histamine release"],"answer":"B","exp":"Succinylcholine causes depolarization and transient K+ efflux (~0.5 mEq/L normally). In conditions with upregulated extrajunctional acetylcholine receptors (denervation injury, burn >24–48h, prolonged immobility/critical illness myopathy, crush injury), succinylcholine causes massive K+ efflux → life-threatening hyperkalemia → cardiac arrest. In these patients, rocuronium (1.2 mg/kg) with sugammadex reversal is the alternative RSI agent."},
{"sec":"L34","lo":"LO2 — Airway management in adults and children","stem":"An 18-month-old infant requires emergency intubation. The anesthesiologist uses a Miller (straight) blade rather than a Macintosh (curved) blade. Why is the straight blade preferred in infants?","opts":["A. Infants have smaller mouths making curved blades impossible to use","B. The infant epiglottis is omega-shaped, floppy, and angled more anteriorly — the straight Miller blade directly lifts the epiglottis rather than placing the blade tip in the vallecula","C. Curved blades require intravenous sedation while straight blades work with inhalation induction only","D. The straight blade provides a longer working distance from the incisors to the cords"],"answer":"B","exp":"Infant airway differences: the epiglottis is omega-shaped, relatively long, floppy, and angled approximately 45° — it tends to fall over the glottis and is not reliably elevated by placing the blade in the vallecula (Macintosh technique). The Miller blade passes UNDER the epiglottis and directly lifts it, providing better glottic visualization. In older children/adults, the Macintosh vallecula technique indirectly elevates the epiglottis via the hyoepiglottic ligament."},

// LO3: Emergency procedures to obtain an airway and intubation steps
{"sec":"L34","lo":"LO3 — Emergency airway procedures and intubation","stem":"Which of the following statements correctly describes the steps of rapid sequence intubation (RSI)?","opts":["A. Pre-oxygenate → give sedative → wait 3 minutes → give neuromuscular blocker → intubate → confirm placement → inflate cuff","B. Pre-oxygenate → prepare equipment → give induction agent AND NMB simultaneously → cricoid pressure (optional) → intubate at 45–60 seconds → confirm EtCO2 → secure","C. Sedate with benzodiazepine → topicalize larynx → intubate awake → confirm placement → give paralytic","D. Give NMB first → wait for fasciculations → give sedative → intubate"],"answer":"B","exp":"RSI steps (mnemonic SEVEN P's): Preparation → Pre-oxygenation (100% O2 × 3 min) → Pre-treatment (optional: lidocaine, fentanyl) → Paralysis with induction (induction agent + NMB given simultaneously — 'simultaneous push') → Positioning → Placement (laryngoscopy at 45–60 seconds when NMB effect peaks) → Post-intubation management (confirm EtCO2 + bilateral breath sounds, CXR, sedation/analgesia). Cricoid pressure is controversial and no longer routinely recommended."},
{"sec":"L34","lo":"LO3 — Emergency airway procedures and intubation","stem":"After a failed intubation in an obese patient who cannot be ventilated by BVM, you perform a surgical cricothyrotomy. Which anatomical landmark is used to identify the cricothyroid membrane?","opts":["A. The space between the thyroid cartilage superiorly and the first tracheal ring inferiorly","B. The midline depression between the thyroid cartilage (Adam's apple) superiorly and the cricoid cartilage inferiorly","C. The space between the first and second tracheal cartilage rings","D. The thyrohyoid membrane between the hyoid bone and thyroid cartilage"],"answer":"B","exp":"The cricothyroid membrane (CTM) spans the midline depression between the inferior border of the thyroid cartilage (Adam's apple) above and the superior border of the cricoid cartilage below. The CTM is 22–30 mm wide and 9–14 mm tall in adults. It is the preferred surgical airway site — avascular in the midline, superficial (esp. in thin patients), and below the vocal cords. In obese patients: use laryngeal handshake technique + ultrasound guidance if time allows."},

// ── L35 · Pulmonary Rehabilitation ────────────────────────────────────────
// LO1: Rehabilitative management in restrictive and obstructive disorders
